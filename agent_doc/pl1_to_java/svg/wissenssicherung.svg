<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh62" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="720" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Wissenssicherung</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Drei Saeulen fuer nachhaltiges Team-Wissen — ueber Jahre hinweg</text>

  <!-- 1. Lessons Learned -->
  <g filter="url(#sh62)">
    <rect x="60" y="110" width="380" height="440" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="60" y="110" width="380" height="44" rx="14" fill="#2563eb"/>
    <text x="250" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1 · Lessons-Learned-Katalog</text>

    <text x="80" y="180" font-size="12" font-weight="700" fill="#0f172a">Was:</text>
    <text x="80" y="198" font-size="11" fill="#334155">Ein zentrales Dokument, in dem alle</text>
    <text x="80" y="214" font-size="11" fill="#334155">Lessons Learned pro Modul gesammelt werden.</text>

    <text x="80" y="246" font-size="12" font-weight="700" fill="#0f172a">Struktur:</text>
    <rect x="80" y="258" width="320" height="180" rx="6" fill="#f1f5f9"/>
    <text x="94" y="280" font-family="monospace" font-size="10" fill="#0f172a">## Modul: ZINSRECH</text>
    <text x="94" y="298" font-family="monospace" font-size="10" fill="#64748b">Wave: 3 · Datum: 2026-02-15</text>
    <text x="94" y="320" font-family="monospace" font-size="10" fill="#0f172a">### Probleme</text>
    <text x="94" y="336" font-family="monospace" font-size="10" fill="#334155">- BASED-Variablen nicht einheitlich</text>
    <text x="94" y="350" font-family="monospace" font-size="10" fill="#334155">- Rundungsfehler bei Zinsen 5 %</text>
    <text x="94" y="366" font-family="monospace" font-size="10" fill="#334155">- CICS-Timer-Problem in Peak-Zeit</text>
    <text x="94" y="390" font-family="monospace" font-size="10" fill="#0f172a">### Loesungen</text>
    <text x="94" y="406" font-family="monospace" font-size="10" fill="#334155">- Pl1Decimal-Utility eingefuehrt</text>
    <text x="94" y="420" font-family="monospace" font-size="10" fill="#334155">- Async-Ausfuehrung, Retry-Logic</text>

    <text x="80" y="470" font-size="11" font-weight="700" fill="#991b1b">WICHTIG:</text>
    <text x="80" y="488" font-size="11" fill="#7f1d1d">Kein Wiki-Frieden — der Katalog muss beim</text>
    <text x="80" y="504" font-size="11" fill="#7f1d1d">naechsten Projekt greifbar sein.</text>
    <text x="80" y="528" font-size="10" font-style="italic" fill="#1e40af">Storage: Git + S3 + Bedrock KB</text>
  </g>

  <!-- 2. ADRs -->
  <g filter="url(#sh62)">
    <rect x="460" y="110" width="380" height="440" rx="14" fill="#ffffff" stroke="#7b2cbf" stroke-width="3"/>
    <rect x="460" y="110" width="380" height="44" rx="14" fill="#7b2cbf"/>
    <text x="650" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2 · Architecture Decision Records</text>

    <text x="480" y="180" font-size="12" font-weight="700" fill="#0f172a">Was:</text>
    <text x="480" y="198" font-size="11" fill="#334155">Fuer jede wichtige Entscheidung ein ADR schreiben.</text>

    <text x="480" y="228" font-size="12" font-weight="700" fill="#0f172a">Beispielfragen:</text>
    <g font-size="11" fill="#334155">
      <text x="480" y="250">&#8226;  Warum Pointer-Mapping A statt B?</text>
      <text x="480" y="268">&#8226;  Warum ist MQ das richtige Zielsystem?</text>
      <text x="480" y="286">&#8226;  Warum haben wir Reforge NICHT fuer Modul X</text>
      <text x="492" y="300">angewendet?</text>
      <text x="480" y="318">&#8226;  Warum RoundingMode HALF_UP?</text>
      <text x="480" y="336">&#8226;  Warum eigener ON-Unit-Stack?</text>
    </g>

    <rect x="480" y="356" width="320" height="120" rx="6" fill="#f1f5f9"/>
    <text x="494" y="378" font-family="monospace" font-size="10" fill="#6b21a8"># ADR-0042</text>
    <text x="494" y="394" font-family="monospace" font-size="10" fill="#0f172a">## Status: Accepted</text>
    <text x="494" y="410" font-family="monospace" font-size="10" fill="#0f172a">## Kontext</text>
    <text x="494" y="424" font-family="monospace" font-size="10" fill="#334155">BASED-Variable mit 3 Aliases ...</text>
    <text x="494" y="442" font-family="monospace" font-size="10" fill="#0f172a">## Entscheidung</text>
    <text x="494" y="456" font-family="monospace" font-size="10" fill="#334155">ByteBuffer-Layout mit Offset-Map</text>

    <text x="480" y="510" font-size="11" font-weight="700" fill="#6b21a8">ADRs sind die einzige verlaessliche</text>
    <text x="480" y="526" font-size="11" font-weight="700" fill="#6b21a8">Form von Wissenssicherung ueber Jahre.</text>
  </g>

  <!-- 3. Knowledge Base for Agents -->
  <g filter="url(#sh62)">
    <rect x="860" y="110" width="320" height="440" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="860" y="110" width="320" height="44" rx="14" fill="#059669"/>
    <text x="1020" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3 · Knowledge-Base fuer Agenten</text>

    <text x="880" y="182" font-size="12" font-weight="700" fill="#0f172a">Bedrock Knowledge Base</text>
    <text x="880" y="200" font-size="11" fill="#334155">(RAG-Speicher) mit allen:</text>

    <g font-size="11" fill="#334155">
      <circle cx="896" cy="228" r="4" fill="#059669"/>
      <text x="908" y="232">Architektur-Dokumenten</text>
      <circle cx="896" cy="250" r="4" fill="#059669"/>
      <text x="908" y="254">ADRs</text>
      <circle cx="896" cy="272" r="4" fill="#059669"/>
      <text x="908" y="276">Coding-Standards</text>
      <circle cx="896" cy="294" r="4" fill="#059669"/>
      <text x="908" y="298">Lessons Learned</text>
      <circle cx="896" cy="316" r="4" fill="#059669"/>
      <text x="908" y="320">Testdaten-Kataloge</text>
      <circle cx="896" cy="338" r="4" fill="#059669"/>
      <text x="908" y="342">Performance-Baselines</text>
      <circle cx="896" cy="360" r="4" fill="#059669"/>
      <text x="908" y="364">IBM PL/I Reference</text>
      <circle cx="896" cy="382" r="4" fill="#059669"/>
      <text x="908" y="386">Deployment-Runbooks</text>
    </g>

    <text x="880" y="422" font-size="11" font-weight="700" fill="#065f46">Agenten nutzen KB als RAG:</text>
    <text x="880" y="444" font-size="10" fill="#334155">&#8226;  Understanding-Agent</text>
    <text x="880" y="460" font-size="10" fill="#334155">&#8226;  Testing-Agent</text>
    <text x="880" y="476" font-size="10" fill="#334155">&#8226;  Reforge-Agent</text>
    <text x="880" y="492" font-size="10" fill="#334155">&#8226;  Review-Agent</text>
    <text x="880" y="518" font-size="10" font-style="italic" fill="#065f46">Update: bei jedem ADR</text>
  </g>

  <!-- Bottom insight -->
  <g filter="url(#sh62)">
    <rect x="60" y="580" width="1120" height="110" rx="12" fill="#0f172a"/>
    <text x="620" y="610" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Warum Wissenssicherung kritisch ist</text>
    <text x="620" y="632" text-anchor="middle" font-size="11" fill="#cbd5e1">PL/I-Migrationen dauern oft 2–4 Jahre. Teams wechseln, Erinnerungen verblassen, Entscheidungen werden vergessen.</text>
    <text x="620" y="650" text-anchor="middle" font-size="11" fill="#cbd5e1">Ohne strukturierte Wissenssicherung wird dieselbe Entscheidung drei Mal getroffen — oder schlimmer: revidiert.</text>
    <text x="620" y="672" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">Die besten Teams schreiben ADRs nicht als Dokumentations-Pflicht, sondern als Denkwerkzeug.</text>
  </g>
</svg>
