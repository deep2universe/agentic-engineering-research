<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh57" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="800" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Sieben Anti-Patterns fuer PL/I-Migrationen</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Haeufige Fehler, die Projekte zum Scheitern bringen — und die Gegenmassnahmen</text>

  <!-- 7 anti-pattern cards in a grid -->
  <g filter="url(#sh57)">
    <rect x="60" y="100" width="380" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="100,160 120,130 140,160 120,170" fill="#dc2626"/>
    <text x="120" y="164" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="160" y="140" font-size="13" font-weight="700" fill="#991b1b">1 · Big Bang</text>
    <text x="160" y="158" font-size="11" fill="#7f1d1d">"Alle Module auf einmal migrieren"</text>

    <text x="76" y="192" font-size="10" font-weight="700" fill="#0f172a">Gefahr:</text>
    <text x="76" y="208" font-size="10" fill="#334155">Keine Zwischenschritte, kein Rollback,</text>
    <text x="76" y="222" font-size="10" fill="#334155">keine Lessons Learned</text>
    <text x="76" y="244" font-size="10" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="76" y="260" font-size="10" fill="#047857">Wave-Planung mit klaren Gates,</text>
    <text x="76" y="274" font-size="10" fill="#047857">Pilot zuerst, dann inkrementell</text>
  </g>

  <g filter="url(#sh57)">
    <rect x="460" y="100" width="380" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="500,160 520,130 540,160 520,170" fill="#dc2626"/>
    <text x="520" y="164" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="560" y="140" font-size="13" font-weight="700" fill="#991b1b">2 · LLM solves all</text>
    <text x="560" y="158" font-size="11" fill="#7f1d1d">Blindes Vertrauen in Reforge-Agent</text>

    <text x="476" y="192" font-size="10" font-weight="700" fill="#0f172a">Gefahr:</text>
    <text x="476" y="208" font-size="10" fill="#334155">LLM-Halluzinationen, subtile Semantik-</text>
    <text x="476" y="222" font-size="10" fill="#334155">Abweichungen ohne Senior-Review</text>
    <text x="476" y="244" font-size="10" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="476" y="260" font-size="10" fill="#047857">Jeder LLM-Output braucht Senior-Review,</text>
    <text x="476" y="274" font-size="10" fill="#047857">besonders bei regulierten Codepfaden</text>
  </g>

  <g filter="url(#sh57)">
    <rect x="860" y="100" width="320" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="900,160 920,130 940,160 920,170" fill="#dc2626"/>
    <text x="920" y="164" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="960" y="140" font-size="13" font-weight="700" fill="#991b1b">3 · We will test later</text>
    <text x="960" y="158" font-size="11" fill="#7f1d1d">Migration zuerst, Tests danach</text>

    <text x="876" y="192" font-size="10" font-weight="700" fill="#0f172a">Gefahr:</text>
    <text x="876" y="208" font-size="10" fill="#334155">Test-Rueckstand waechst exponentiell,</text>
    <text x="876" y="222" font-size="10" fill="#334155">spaete Fehler sind teuer</text>
    <text x="876" y="244" font-size="10" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="876" y="260" font-size="10" fill="#047857">Dual-Run-Tests ab der ersten Wave</text>
    <text x="876" y="274" font-size="10" fill="#047857">mitlaufen lassen</text>
  </g>

  <g filter="url(#sh57)">
    <rect x="60" y="320" width="380" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="100,380 120,350 140,380 120,390" fill="#dc2626"/>
    <text x="120" y="384" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="160" y="360" font-size="13" font-weight="700" fill="#991b1b">4 · Hotfix-Drift</text>
    <text x="160" y="378" font-size="11" fill="#7f1d1d">Auf MF hotfixen, spaeter Java nachziehen</text>

    <text x="76" y="412" font-size="10" font-weight="700" fill="#0f172a">Gefahr:</text>
    <text x="76" y="428" font-size="10" fill="#334155">Nach 6 Monaten divergieren Staende,</text>
    <text x="76" y="442" font-size="10" fill="#334155">Migration muss neu starten</text>
    <text x="76" y="464" font-size="10" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="76" y="480" font-size="10" fill="#047857">Hotfix-Tracking automatisiert, Catch-Up-</text>
    <text x="76" y="494" font-size="10" fill="#047857">Sprints geplant (siehe Dokument 5)</text>
  </g>

  <g filter="url(#sh57)">
    <rect x="460" y="320" width="380" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="500,380 520,350 540,380 520,390" fill="#dc2626"/>
    <text x="520" y="384" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="560" y="360" font-size="13" font-weight="700" fill="#991b1b">5 · Java-idiomatisch um jeden Preis</text>
    <text x="560" y="378" font-size="11" fill="#7f1d1d">Aggressive Reforge-Anwendung</text>

    <text x="476" y="412" font-size="10" font-weight="700" fill="#0f172a">Gefahr:</text>
    <text x="476" y="428" font-size="10" fill="#334155">Semantik-Zerstoerung durch "Schoenheit",</text>
    <text x="476" y="442" font-size="10" fill="#334155">1-Cent-Fehler in Finanzberechnungen</text>
    <text x="476" y="464" font-size="10" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="476" y="480" font-size="10" fill="#047857">Nicht-idiomatischer ByteBuffer-Code</text>
    <text x="476" y="494" font-size="10" fill="#047857">kann das Richtige sein (Semantik-Treue)</text>
  </g>

  <g filter="url(#sh57)">
    <rect x="860" y="320" width="320" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="900,380 920,350 940,380 920,390" fill="#dc2626"/>
    <text x="920" y="384" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="960" y="360" font-size="13" font-weight="700" fill="#991b1b">6 · Erst Testdaten sammeln</text>
    <text x="960" y="378" font-size="11" fill="#7f1d1d">Warten auf "perfekte" Daten</text>

    <text x="876" y="412" font-size="10" font-weight="700" fill="#0f172a">Gefahr:</text>
    <text x="876" y="428" font-size="10" fill="#334155">Testdaten-Sammlung ist nie "fertig".</text>
    <text x="876" y="442" font-size="10" fill="#334155">Blockade fuer alle anderen Aktivitaeten.</text>
    <text x="876" y="464" font-size="10" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="876" y="480" font-size="10" fill="#047857">Parallel zur Transform-Arbeit starten</text>
    <text x="876" y="494" font-size="10" fill="#047857">und schrittweise anreichern</text>
  </g>

  <g filter="url(#sh57)">
    <rect x="260" y="540" width="720" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="300,600 320,570 340,600 320,610" fill="#dc2626"/>
    <text x="320" y="604" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="360" y="580" font-size="13" font-weight="700" fill="#991b1b">7 · "Wir brauchen keine Doku — wir haben PL/I-Entwickler"</text>
    <text x="360" y="598" font-size="11" fill="#7f1d1d">Verlassen auf implizites Wissen</text>

    <text x="276" y="632" font-size="11" font-weight="700" fill="#0f172a">Gefahr:</text>
    <text x="276" y="650" font-size="11" fill="#334155">PL/I-Entwickler gehen in den naechsten Jahren in Rente. Wenn ihr Wissen nicht kodifiziert ist,</text>
    <text x="276" y="666" font-size="11" fill="#334155">geht es mit ihnen verloren. Retention-Programme und Lifetime-Contracts sind teuer.</text>

    <text x="276" y="696" font-size="11" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="276" y="714" font-size="11" fill="#047857">Wissen JETZT kodifizieren, nicht "irgendwann". Nutze Understanding-Agent (Dokument 4),</text>
    <text x="276" y="730" font-size="11" fill="#047857">ADRs schreiben, Pair-Programming, Anthology of the Old System (siehe Dokument 8).</text>
  </g>
</svg>
