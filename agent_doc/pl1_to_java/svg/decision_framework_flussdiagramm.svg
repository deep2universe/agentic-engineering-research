<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Decision Framework fuer PL/I-Projekte</text>
  <text x="620" y="64" text-anchor="middle" font-size="13" fill="#475569">Entscheidungsbaum: Vom Assessment bis zum Refactor — mit Risikofarben</text>

  <!-- Start -->
  <g filter="url(#shadow3)">
    <rect x="470" y="96" width="300" height="64" rx="32" fill="#1e3a8a"/>
    <text x="620" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">START</text>
    <text x="620" y="146" text-anchor="middle" font-size="12" fill="#bfdbfe">Ist die Codebasis hauptsaechlich PL/I?</text>
  </g>

  <!-- Level 2: Ja / Nein -->
  <g filter="url(#shadow3)">
    <rect x="200" y="210" width="260" height="60" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="330" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Ja (&gt; 60 %)</text>
    <text x="330" y="254" text-anchor="middle" font-size="11" fill="#475569">Preprocessor dominant? (&gt; 30 % via %MACRO)</text>
  </g>
  <g filter="url(#shadow3)">
    <rect x="780" y="210" width="260" height="60" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="910" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Nein (Mischung)</text>
    <text x="910" y="254" text-anchor="middle" font-size="11" fill="#475569">Gemeinsame PL/I+COBOL-Wave?</text>
  </g>

  <!-- Level 3 (left branch) -->
  <g filter="url(#shadow3)">
    <rect x="30" y="330" width="240" height="90" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="150" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Ja — Preprocessor komplex</text>
    <text x="150" y="378" text-anchor="middle" font-size="11" fill="#7c2d12">Zuerst Preprocessor-Expansion</text>
    <text x="150" y="394" text-anchor="middle" font-size="11" fill="#7c2d12">reproduzierbar sicherstellen</text>
    <text x="150" y="410" text-anchor="middle" font-size="10" font-style="italic" fill="#9a3412">Risiko: hoch</text>
  </g>
  <g filter="url(#shadow3)">
    <rect x="320" y="330" width="240" height="90" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="440" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#064e3b">Nein — Direkt Assessment</text>
    <text x="440" y="378" text-anchor="middle" font-size="11" fill="#065f46">Dependency-Graph komplett?</text>
    <text x="440" y="394" text-anchor="middle" font-size="11" fill="#065f46">Wenn nein: Discovery-Loop</text>
    <text x="440" y="410" text-anchor="middle" font-size="10" font-style="italic" fill="#064e3b">Risiko: mittel</text>
  </g>

  <!-- Level 3 (right branch) -->
  <g filter="url(#shadow3)">
    <rect x="660" y="330" width="240" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="780" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Separate Waves</text>
    <text x="780" y="378" text-anchor="middle" font-size="11" fill="#1e40af">Je Sprache eigene Pipeline,</text>
    <text x="780" y="394" text-anchor="middle" font-size="11" fill="#1e40af">je Sprache eigene Tests</text>
    <text x="780" y="410" text-anchor="middle" font-size="10" font-style="italic" fill="#1e3a8a">Risiko: mittel</text>
  </g>
  <g filter="url(#shadow3)">
    <rect x="950" y="330" width="240" height="90" rx="10" fill="#e9d5ff" stroke="#7b2cbf" stroke-width="2"/>
    <text x="1070" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">Gemeinsame Wave</text>
    <text x="1070" y="378" text-anchor="middle" font-size="11" fill="#6b21a8">Wenn Domains ueberlappen,</text>
    <text x="1070" y="394" text-anchor="middle" font-size="11" fill="#6b21a8">eine Pipeline fuer beides</text>
    <text x="1070" y="410" text-anchor="middle" font-size="10" font-style="italic" fill="#581c87">Risiko: hoch (Koordination)</text>
  </g>

  <!-- Level 4 -->
  <g filter="url(#shadow3)">
    <rect x="300" y="480" width="260" height="60" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <text x="430" y="506" text-anchor="middle" font-size="13" font-weight="700" fill="#064e3b">Wave-Planning</text>
    <text x="430" y="524" text-anchor="middle" font-size="11" fill="#065f46">Risiko-sortiert: low → mid → high</text>
  </g>

  <!-- Level 5 -->
  <g filter="url(#shadow3)">
    <rect x="300" y="580" width="260" height="60" rx="10" fill="#059669"/>
    <text x="430" y="606" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Refactor starten</text>
    <text x="430" y="624" text-anchor="middle" font-size="11" fill="#d1fae5">Discovery → Refactor → Reforge → Test</text>
  </g>

  <!-- Golden rule banner -->
  <g filter="url(#shadow3)">
    <rect x="620" y="580" width="580" height="90" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <text x="910" y="608" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Faustregel fuer Senior-Architekten</text>
    <text x="910" y="632" text-anchor="middle" font-size="12" fill="#7f1d1d">Vor dem ersten Transform-Run muss der PL/I-Preprocessor</text>
    <text x="910" y="650" text-anchor="middle" font-size="12" fill="#7f1d1d">vollstaendig und reproduzierbar expandiert sein.</text>
    <text x="910" y="664" text-anchor="middle" font-size="11" font-style="italic" fill="#991b1b">Sonst ist jede Transformation instabil.</text>
  </g>

  <!-- Risk legend -->
  <g font-size="11" fill="#334155">
    <text x="60" y="730" font-weight="700" fill="#0f172a">Legende Risiko:</text>
    <rect x="60" y="745" width="14" height="14" fill="#d1fae5" stroke="#059669"/>
    <text x="80" y="757">niedrig</text>
    <rect x="140" y="745" width="14" height="14" fill="#dbeafe" stroke="#2563eb"/>
    <text x="160" y="757">mittel</text>
    <rect x="220" y="745" width="14" height="14" fill="#fef3c7" stroke="#d97706"/>
    <text x="240" y="757">hoch</text>
    <rect x="300" y="745" width="14" height="14" fill="#e9d5ff" stroke="#7b2cbf"/>
    <text x="320" y="757">hoch (Koordination)</text>
  </g>

  <!-- Connectors -->
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#ar)">
    <path d="M 550 160 L 330 208"/>
    <path d="M 690 160 L 910 208"/>
    <path d="M 280 272 L 150 328"/>
    <path d="M 380 272 L 440 328"/>
    <path d="M 830 272 L 780 328"/>
    <path d="M 970 272 L 1070 328"/>
    <path d="M 440 422 L 430 478"/>
    <path d="M 430 542 L 430 578"/>
  </g>
</svg>
