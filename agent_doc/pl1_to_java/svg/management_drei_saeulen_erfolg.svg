<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="pillar1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="pillar2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="pillar3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="shadow5" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Drei Saeulen fuer Management — Erfolgreiche PL/I-Migration</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#475569">Die Kernaussagen, die Senior-Architekten ans Management weitergeben</text>

  <!-- Roof / Pediment -->
  <g filter="url(#shadow5)">
    <polygon points="180,180 1020,180 1000,130 200,130" fill="#0f172a"/>
    <text x="600" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Erfolgreiche PL/I-zu-Java-Migration mit AWS</text>
  </g>

  <!-- Entablature -->
  <rect x="150" y="180" width="900" height="28" fill="#1e293b" filter="url(#shadow5)"/>

  <!-- Pillar 1: Technisch moeglich -->
  <g filter="url(#shadow5)">
    <rect x="200" y="216" width="200" height="420" fill="url(#pillar1)" stroke="#1e40af" stroke-width="2"/>
    <!-- capital -->
    <rect x="190" y="208" width="220" height="16" fill="#1e293b"/>
    <!-- base -->
    <rect x="190" y="636" width="220" height="16" fill="#1e293b"/>
    <!-- fluting lines -->
    <g stroke="#2563eb" stroke-opacity="0.35" stroke-width="1">
      <line x1="240" y1="232" x2="240" y2="632"/>
      <line x1="270" y1="232" x2="270" y2="632"/>
      <line x1="300" y1="232" x2="300" y2="632"/>
      <line x1="330" y1="232" x2="330" y2="632"/>
      <line x1="360" y1="232" x2="360" y2="632"/>
    </g>
  </g>
  <text x="300" y="260" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">1</text>
  <text x="300" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">TECHNISCH</text>
  <text x="300" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">MOEGLICH</text>
  <g font-size="10" fill="#1e293b">
    <text x="300" y="348" text-anchor="middle">AWS Transform for Mainframe</text>
    <text x="300" y="362" text-anchor="middle">Refactor seit Mai 2025 GA</text>
    <text x="300" y="386" text-anchor="middle" font-weight="600">Reimagine seit Dez 2025</text>
    <text x="300" y="408" text-anchor="middle">Kostenfreie Code-Transformation</text>
    <text x="300" y="422" text-anchor="middle">seit Maerz 2026</text>
    <text x="300" y="446" text-anchor="middle" font-weight="600">Produktionsfaehiger Pfad</text>
    <text x="300" y="470" text-anchor="middle">Vollstaendiger Agent-Stack</text>
    <text x="300" y="484" text-anchor="middle">fuer Assessment, Refactor,</text>
    <text x="300" y="498" text-anchor="middle">Reforge, Testing, Reimagine</text>
    <text x="300" y="540" text-anchor="middle" font-weight="600">PL/I = First-Class-Target</text>
    <text x="300" y="556" text-anchor="middle">gleichwertig zu COBOL</text>
    <text x="300" y="600" text-anchor="middle" font-style="italic" fill="#1e40af">Nachweis: PlanetsDemo,</text>
    <text x="300" y="614" text-anchor="middle" font-style="italic" fill="#1e40af">produktive Kundenprojekte</text>
  </g>

  <!-- Pillar 2: Zeitlich realistisch -->
  <g filter="url(#shadow5)">
    <rect x="500" y="216" width="200" height="420" fill="url(#pillar2)" stroke="#b45309" stroke-width="2"/>
    <rect x="490" y="208" width="220" height="16" fill="#1e293b"/>
    <rect x="490" y="636" width="220" height="16" fill="#1e293b"/>
    <g stroke="#d97706" stroke-opacity="0.35" stroke-width="1">
      <line x1="540" y1="232" x2="540" y2="632"/>
      <line x1="570" y1="232" x2="570" y2="632"/>
      <line x1="600" y1="232" x2="600" y2="632"/>
      <line x1="630" y1="232" x2="630" y2="632"/>
      <line x1="660" y1="232" x2="660" y2="632"/>
    </g>
  </g>
  <text x="600" y="260" text-anchor="middle" font-size="16" font-weight="700" fill="#78350f">2</text>
  <text x="600" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">ZEITLICH</text>
  <text x="600" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">REALISTISCH</text>
  <g font-size="10" fill="#1e293b">
    <text x="600" y="348" text-anchor="middle" font-weight="600">30–50 % Reduktion</text>
    <text x="600" y="362" text-anchor="middle">der Migrationsdauer durch</text>
    <text x="600" y="376" text-anchor="middle">agentic-AI-Workflows</text>
    <text x="600" y="410" text-anchor="middle">PL/I tendenziell am</text>
    <text x="600" y="424" text-anchor="middle">unteren Ende (wegen</text>
    <text x="600" y="438" text-anchor="middle">staerkerem HITL-Anteil)</text>
    <text x="600" y="468" text-anchor="middle" font-weight="600">Pilot in 4–8 Wochen</text>
    <text x="600" y="482" text-anchor="middle">machbar</text>
    <text x="600" y="512" text-anchor="middle">Wave-Groessen</text>
    <text x="600" y="526" text-anchor="middle">zwischen 50 kLOC und</text>
    <text x="600" y="540" text-anchor="middle">250 kLOC pro Welle</text>
    <text x="600" y="588" text-anchor="middle" font-style="italic" fill="#b45309">Aber: Testphase dominiert</text>
    <text x="600" y="602" text-anchor="middle" font-style="italic" fill="#b45309">den Zeitplan</text>
  </g>

  <!-- Pillar 3: Risiken beherrschbar -->
  <g filter="url(#shadow5)">
    <rect x="800" y="216" width="200" height="420" fill="url(#pillar3)" stroke="#047857" stroke-width="2"/>
    <rect x="790" y="208" width="220" height="16" fill="#1e293b"/>
    <rect x="790" y="636" width="220" height="16" fill="#1e293b"/>
    <g stroke="#059669" stroke-opacity="0.35" stroke-width="1">
      <line x1="840" y1="232" x2="840" y2="632"/>
      <line x1="870" y1="232" x2="870" y2="632"/>
      <line x1="900" y1="232" x2="900" y2="632"/>
      <line x1="930" y1="232" x2="930" y2="632"/>
      <line x1="960" y1="232" x2="960" y2="632"/>
    </g>
  </g>
  <text x="900" y="260" text-anchor="middle" font-size="16" font-weight="700" fill="#064e3b">3</text>
  <text x="900" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">RISIKEN</text>
  <text x="900" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">BEHERRSCHBAR</text>
  <g font-size="10" fill="#1e293b">
    <text x="900" y="348" text-anchor="middle" font-weight="600">Projekte scheitern nicht</text>
    <text x="900" y="362" text-anchor="middle">an Tools, sondern an ...</text>
    <text x="900" y="390" text-anchor="middle">• Fehlenden Includes</text>
    <text x="900" y="404" text-anchor="middle">• Undokumentierter Logik</text>
    <text x="900" y="418" text-anchor="middle">• Fehlenden Testdaten</text>
    <text x="900" y="432" text-anchor="middle">• Preprocessor-Chaos</text>
    <text x="900" y="446" text-anchor="middle">• Pointer-Aliasing</text>
    <text x="900" y="460" text-anchor="middle">• Multitasking-Fehlern</text>
    <text x="900" y="474" text-anchor="middle">• FIXED-DECIMAL-Regel-</text>
    <text x="900" y="488" text-anchor="middle">  abweichungen</text>
    <text x="900" y="520" text-anchor="middle" font-weight="600">→ Jedes Risiko hat in</text>
    <text x="900" y="534" text-anchor="middle" font-weight="600">dieser Research eine</text>
    <text x="900" y="548" text-anchor="middle" font-weight="600">konkrete Gegenmassnahme</text>
    <text x="900" y="594" text-anchor="middle" font-style="italic" fill="#047857">Disziplin schlaegt Hoffnung</text>
  </g>

  <!-- Stylobate (base) -->
  <g filter="url(#shadow5)">
    <rect x="120" y="652" width="960" height="20" fill="#1e293b"/>
    <rect x="100" y="672" width="1000" height="14" fill="#0f172a"/>
  </g>

  <text x="600" y="720" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Fundament: Diese Research + Senior-Engineering + Agentic-AI-Tooling</text>
  <text x="600" y="740" text-anchor="middle" font-size="12" fill="#64748b">Eine Botschaft fuers Management: Technisch machbar — aber nur mit Disziplin.</text>
</svg>
