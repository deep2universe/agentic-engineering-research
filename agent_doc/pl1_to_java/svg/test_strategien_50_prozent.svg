<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh35" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="760" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Test-Strategien fuer 50-%-Projekte</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Zusaetzlich zu den Standard-Tests (siehe Dokument 6): vier dedizierte Test-Arten fuer die Koexistenz</text>

  <!-- 4 test strategy cards -->
  <g filter="url(#sh35)">
    <rect x="60" y="110" width="560" height="280" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="60" y="110" width="560" height="44" rx="14" fill="#2563eb"/>
    <text x="340" y="139" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1 · Integration-Tests ueber die Grenze hinweg</text>
    <text x="80" y="178" font-size="12" font-weight="700" fill="#0f172a">Ziel:</text>
    <text x="130" y="178" font-size="11" fill="#334155">Jede API-Schnittstelle zwischen Mainframe und AWS bekommt</text>
    <text x="130" y="194" font-size="11" fill="#334155">einen Contract-Test.</text>

    <text x="80" y="222" font-size="12" font-weight="700" fill="#0f172a">Tools:</text>
    <text x="130" y="222" font-size="11" fill="#334155">Pact, Spring Cloud Contract, OpenAPI-Schema-Tests</text>

    <text x="80" y="250" font-size="12" font-weight="700" fill="#0f172a">Regel:</text>
    <text x="130" y="250" font-size="11" fill="#334155">Consumer-driven Contracts — die Java-Seite definiert,</text>
    <text x="130" y="266" font-size="11" fill="#334155">was sie erwartet, die Mainframe-Seite verifiziert es.</text>

    <text x="80" y="294" font-size="12" font-weight="700" fill="#0f172a">Frequenz:</text>
    <text x="150" y="294" font-size="11" fill="#334155">Bei jedem Deploy + nightly Cross-Boundary-Tests</text>

    <text x="80" y="322" font-size="12" font-weight="700" fill="#0f172a">Risiko-Abdeckung:</text>
    <text x="220" y="322" font-size="11" fill="#334155">Schema-Drift, Breaking Changes, Semantik-Abweichungen</text>

    <text x="80" y="360" font-size="11" font-style="italic" fill="#1e40af">→ Jede Schnittstelle hat einen Owner, der die Contracts pflegt.</text>
  </g>

  <g filter="url(#sh35)">
    <rect x="640" y="110" width="560" height="280" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="640" y="110" width="560" height="44" rx="14" fill="#059669"/>
    <text x="920" y="139" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2 · Shadow-Traffic</text>
    <text x="660" y="178" font-size="12" font-weight="700" fill="#0f172a">Ziel:</text>
    <text x="710" y="178" font-size="11" fill="#334155">Produktions-Traffic parallel auf beide Seiten schicken</text>
    <text x="710" y="194" font-size="11" fill="#334155">und die Ergebnisse vergleichen.</text>

    <text x="660" y="222" font-size="12" font-weight="700" fill="#0f172a">Setup:</text>
    <text x="720" y="222" font-size="11" fill="#334155">Traffic-Mirror auf AWS-Seite via NLB oder API-Gateway</text>
    <text x="720" y="238" font-size="11" fill="#334155">schreibt nur Logs — keine Responses an den Client</text>

    <text x="660" y="266" font-size="12" font-weight="700" fill="#0f172a">Tools:</text>
    <text x="710" y="266" font-size="11" fill="#334155">AWS Traffic Mirroring, VPC Flow Logs, eigene Replay-Tools</text>

    <text x="660" y="294" font-size="12" font-weight="700" fill="#0f172a">KPI:</text>
    <text x="700" y="294" font-size="11" fill="#334155">Aequivalenz-Quote &gt; 99,99 % ueber 14 Tage</text>

    <text x="660" y="322" font-size="12" font-weight="700" fill="#0f172a">Sicherheit:</text>
    <text x="740" y="322" font-size="11" fill="#334155">Kein Risiko fuer den User — Shadow-Antworten werden nicht</text>
    <text x="740" y="336" font-size="11" fill="#334155">zurueckgegeben.</text>

    <text x="660" y="368" font-size="11" font-style="italic" fill="#065f46">→ Sicherstes Go-Live-Vehikel fuer PL/I-Migrationen.</text>
  </g>

  <g filter="url(#sh35)">
    <rect x="60" y="420" width="560" height="280" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="60" y="420" width="560" height="44" rx="14" fill="#dc2626"/>
    <text x="340" y="449" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3 · Chaos-Tests</text>
    <text x="80" y="488" font-size="12" font-weight="700" fill="#0f172a">Ziel:</text>
    <text x="130" y="488" font-size="11" fill="#334155">Netzwerk-Ausfaelle zwischen Mainframe und AWS aktiv</text>
    <text x="130" y="504" font-size="11" fill="#334155">simulieren, um die Koexistenz-Resilienz zu pruefen.</text>

    <text x="80" y="532" font-size="12" font-weight="700" fill="#0f172a">Fehler-Szenarien:</text>
    <text x="80" y="548" font-size="10" fill="#334155">&#8226;  Direct-Connect-Ausfall (Failover zu VPN?)</text>
    <text x="80" y="562" font-size="10" fill="#334155">&#8226;  MQ-Queue-Voll (Backpressure?)</text>
    <text x="80" y="576" font-size="10" fill="#334155">&#8226;  Aurora Read-Replica Lag &gt; 60 Sek</text>
    <text x="80" y="590" font-size="10" fill="#334155">&#8226;  DNS-Fehler, TLS-Handshake-Timeout</text>
    <text x="80" y="604" font-size="10" fill="#334155">&#8226;  Erhoehte Latenz (+ 500 ms)</text>

    <text x="80" y="632" font-size="12" font-weight="700" fill="#0f172a">Tools:</text>
    <text x="130" y="632" font-size="11" fill="#334155">AWS Fault Injection Simulator, Chaos Monkey,</text>
    <text x="130" y="648" font-size="11" fill="#334155">Gremlin, eigene Netzwerk-Simulatoren</text>

    <text x="80" y="680" font-size="11" font-style="italic" fill="#991b1b">→ Muss in einer dedizierten Staging-Umgebung laufen, nicht in Prod.</text>
  </g>

  <g filter="url(#sh35)">
    <rect x="640" y="420" width="560" height="280" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <rect x="640" y="420" width="560" height="44" rx="14" fill="#f59e0b"/>
    <text x="920" y="449" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">4 · Daten-Integrity-Checks</text>
    <text x="660" y="488" font-size="12" font-weight="700" fill="#0f172a">Ziel:</text>
    <text x="710" y="488" font-size="11" fill="#334155">Regelmaessige Checksum-Vergleiche zwischen DB2</text>
    <text x="710" y="504" font-size="11" fill="#334155">und Aurora, wenn CDC-Spiegelung laeuft.</text>

    <text x="660" y="532" font-size="12" font-weight="700" fill="#0f172a">Methoden:</text>
    <text x="660" y="548" font-size="10" fill="#334155">&#8226;  Row-Count-Vergleiche pro Tabelle + Zeitfenster</text>
    <text x="660" y="562" font-size="10" fill="#334155">&#8226;  Hash-Aggregate (SHA-256 ueber kritische Felder)</text>
    <text x="660" y="576" font-size="10" fill="#334155">&#8226;  Sampling-Vergleiche (1 % der Zeilen taeglich)</text>
    <text x="660" y="590" font-size="10" fill="#334155">&#8226;  Business-KPI-Summen-Checks</text>

    <text x="660" y="618" font-size="12" font-weight="700" fill="#0f172a">Frequenz:</text>
    <text x="730" y="618" font-size="11" fill="#334155">Stuendlich (Spot-Check) + nightly Full-Check</text>

    <text x="660" y="646" font-size="12" font-weight="700" fill="#0f172a">Alerting:</text>
    <text x="720" y="646" font-size="11" fill="#334155">CloudWatch Alarms bei Divergenz &gt; Schwellwert</text>

    <text x="660" y="680" font-size="11" font-style="italic" fill="#b45309">→ Unveraenderliche Logs in S3 fuer Audit/Compliance.</text>
  </g>
</svg>
