<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh28" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="780" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Human-in-the-Loop-Regeln fuer PL/I</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Sieben harte Regeln — keine Ausnahmen fuer regulierte Workloads</text>

  <!-- Rule 1 -->
  <g filter="url(#sh28)">
    <rect x="60" y="110" width="360" height="150" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <circle cx="100" cy="150" r="26" fill="#dc2626"/>
    <text x="100" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="140" y="145" font-size="13" font-weight="700" fill="#0f172a">Kein LLM-Output ohne Review</text>
    <text x="140" y="162" font-size="11" fill="#7f1d1d">fuer regulierte Code-Pfade</text>
    <text x="75" y="192" font-size="10" fill="#334155">Finanzen, Versicherungen, Compliance:</text>
    <text x="75" y="208" font-size="10" fill="#334155">Keine automatische Freigabe. Jeder</text>
    <text x="75" y="224" font-size="10" fill="#334155">LLM-Vorschlag muss durch einen</text>
    <text x="75" y="240" font-size="10" fill="#334155">Senior-Engineer gepruft werden.</text>
  </g>

  <!-- Rule 2 -->
  <g filter="url(#sh28)">
    <rect x="440" y="110" width="360" height="150" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="480" cy="150" r="26" fill="#f59e0b"/>
    <text x="480" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="520" y="145" font-size="13" font-weight="700" fill="#0f172a">Reforge ist opt-in pro Modul</text>
    <text x="520" y="162" font-size="11" fill="#92400e">Default ist Refactor</text>
    <text x="455" y="192" font-size="10" fill="#334155">Reforge nur, wenn das Modul in der</text>
    <text x="455" y="208" font-size="10" fill="#334155">Review-Liste markiert wurde. Sonst</text>
    <text x="455" y="224" font-size="10" fill="#334155">bleibt es bei der deterministischen</text>
    <text x="455" y="240" font-size="10" fill="#334155">Refactor-Transformation.</text>
  </g>

  <!-- Rule 3 -->
  <g filter="url(#sh28)">
    <rect x="820" y="110" width="360" height="150" rx="12" fill="#ffffff" stroke="#7b2cbf" stroke-width="3"/>
    <circle cx="860" cy="150" r="26" fill="#7b2cbf"/>
    <text x="860" y="158" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="900" y="145" font-size="13" font-weight="700" fill="#0f172a">Pointer-Code immer pruefen</text>
    <text x="900" y="162" font-size="11" fill="#6b21a8">auch wenn LLM plausibel aussieht</text>
    <text x="835" y="192" font-size="10" fill="#334155">BASED/Pointer-Transformationen</text>
    <text x="835" y="208" font-size="10" fill="#334155">koennen subtile Aliasing-Fehler</text>
    <text x="835" y="224" font-size="10" fill="#334155">enthalten, die nicht im Unit-Test</text>
    <text x="835" y="240" font-size="10" fill="#334155">sichtbar werden.</text>
  </g>

  <!-- Rule 4 -->
  <g filter="url(#sh28)">
    <rect x="60" y="290" width="360" height="150" rx="12" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <circle cx="100" cy="330" r="26" fill="#059669"/>
    <text x="100" y="338" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="140" y="325" font-size="13" font-weight="700" fill="#0f172a">Multitasking immer pruefen</text>
    <text x="140" y="342" font-size="11" fill="#065f46">Race-Condition-Risiko</text>
    <text x="75" y="372" font-size="10" fill="#334155">Automatisch generierter Java-</text>
    <text x="75" y="388" font-size="10" fill="#334155">Concurrency-Code ist ohne manuelle</text>
    <text x="75" y="404" font-size="10" fill="#334155">Validierung nicht vertrauenswuerdig.</text>
    <text x="75" y="420" font-size="10" fill="#334155">Property-Tests sind Pflicht.</text>
  </g>

  <!-- Rule 5 -->
  <g filter="url(#sh28)">
    <rect x="440" y="290" width="360" height="150" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="480" cy="330" r="26" fill="#2563eb"/>
    <text x="480" y="338" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">5</text>
    <text x="520" y="325" font-size="13" font-weight="700" fill="#0f172a">Preprocessor-Expansion nicht</text>
    <text x="520" y="342" font-size="13" font-weight="700" fill="#0f172a">per LLM nachbilden</text>
    <text x="455" y="372" font-size="10" fill="#334155">Die Expansion erfolgt durch den</text>
    <text x="455" y="388" font-size="10" fill="#334155">originalen IBM Compiler im -PP-Modus.</text>
    <text x="455" y="404" font-size="10" fill="#334155">Ein LLM, das Preprocessor-Code selbst</text>
    <text x="455" y="420" font-size="10" fill="#334155">generiert, ist NICHT vertrauenswuerdig.</text>
  </g>

  <!-- Rule 6 -->
  <g filter="url(#sh28)">
    <rect x="820" y="290" width="360" height="150" rx="12" fill="#ffffff" stroke="#c026d3" stroke-width="3"/>
    <circle cx="860" cy="330" r="26" fill="#c026d3"/>
    <text x="860" y="338" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">6</text>
    <text x="900" y="325" font-size="13" font-weight="700" fill="#0f172a">Jeder Agent-Schritt wird</text>
    <text x="900" y="342" font-size="13" font-weight="700" fill="#0f172a">in Audit-Logs dokumentiert</text>
    <text x="835" y="372" font-size="10" fill="#334155">Wer hat wann welches Prompt mit</text>
    <text x="835" y="388" font-size="10" fill="#334155">welchem Modell auf welches Modul</text>
    <text x="835" y="404" font-size="10" fill="#334155">losgelassen? Bedrock CloudTrail</text>
    <text x="835" y="420" font-size="10" fill="#334155">+ eigene Metadaten im Audit-Log.</text>
  </g>

  <!-- Rule 7 (wider, centered) -->
  <g filter="url(#sh28)">
    <rect x="260" y="480" width="720" height="170" rx="14" fill="#ffffff" stroke="#0891b2" stroke-width="3"/>
    <circle cx="310" cy="525" r="30" fill="#0891b2"/>
    <text x="310" y="534" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">7</text>
    <text x="360" y="520" font-size="15" font-weight="700" fill="#0f172a">Jeder Agent-Schritt ist reproduzierbar</text>
    <text x="360" y="540" font-size="12" fill="#0e7490">Gleicher Input + gleiches Modell + gleiches Prompt → identischer oder mindestens semantisch aequivalenter Output</text>

    <g font-size="11" fill="#334155">
      <text x="290" y="580">Praktisch:</text>
      <text x="290" y="600">&#8226;  Prompts als Code in Git halten (Prompt-Templating)</text>
      <text x="290" y="616">&#8226;  Modell-Version explizit festlegen (claude-opus-4-6, nicht "latest")</text>
      <text x="290" y="632">&#8226;  Temperature = 0 fuer deterministische Transformationen (Refactor)</text>
      <text x="700" y="600">&#8226;  Seed fuer Property-Tests festnageln</text>
      <text x="700" y="616">&#8226;  Output-Hash im Audit-Log persistieren</text>
      <text x="700" y="632">&#8226;  Re-Run-faehigkeit in der CI/CD-Pipeline</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g filter="url(#sh28)">
    <rect x="60" y="680" width="1120" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="620" y="710" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Diese sieben Regeln sind harte Constraints, keine Empfehlungen.</text>
    <text x="620" y="732" text-anchor="middle" font-size="11" fill="#7f1d1d">Wer sie umgeht, baut ein Compliance-Risiko in sein Projekt ein, das sich spaeter als Show-Stopper erweist.</text>
  </g>
</svg>
