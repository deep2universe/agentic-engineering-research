<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh25" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr25" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Die acht Phasen im agentic Workflow</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">PL/I-spezifische Abweichungen vom generischen COBOL-Workflow — jede Phase mit ihren Agenten</text>

  <!-- Phase 1: Discovery -->
  <g filter="url(#sh25)">
    <rect x="40" y="110" width="280" height="150" rx="12" fill="#ffffff" stroke="#1e3a8a" stroke-width="3"/>
    <rect x="40" y="110" width="280" height="36" rx="12" fill="#1e3a8a"/>
    <text x="70" y="135" font-size="14" font-weight="700" fill="#ffffff">1 · Discovery</text>
    <text x="56" y="168" font-size="11" font-weight="700" fill="#0f172a">Agenten:</text>
    <text x="56" y="184" font-size="10" fill="#334155">• Source-Scanner</text>
    <text x="56" y="200" font-size="10" fill="#334155">• Dependency-Agent</text>
    <text x="56" y="216" font-size="10" fill="#334155">• Preprocessor-Agent (Pflicht!)</text>
    <text x="56" y="234" font-size="10" fill="#64748b">PL/I-Output: BASED-Inventory,</text>
    <text x="56" y="248" font-size="10" fill="#64748b">ON-Unit-Katalog, %MACRO-Liste</text>
  </g>

  <!-- Phase 2: Planning -->
  <g filter="url(#sh25)">
    <rect x="340" y="110" width="280" height="150" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="340" y="110" width="280" height="36" rx="12" fill="#2563eb"/>
    <text x="370" y="135" font-size="14" font-weight="700" fill="#ffffff">2 · Planning</text>
    <text x="356" y="168" font-size="11" font-weight="700" fill="#0f172a">Agenten:</text>
    <text x="356" y="184" font-size="10" fill="#334155">• Planning-Agent (Waves)</text>
    <text x="356" y="200" font-size="10" fill="#334155">• Risk-Agent (Risiko-Scoring)</text>
    <text x="356" y="216" font-size="10" fill="#334155">• Preprocessor-Complexity-Sort</text>
    <text x="356" y="234" font-size="10" fill="#64748b">PL/I-Besonderheit: dynamisch</text>
    <text x="356" y="248" font-size="10" fill="#64748b">generierter Code spaet in Waves</text>
  </g>

  <!-- Phase 3: Refactor -->
  <g filter="url(#sh25)">
    <rect x="640" y="110" width="280" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
    <rect x="640" y="110" width="280" height="36" rx="12" fill="#7c3aed"/>
    <text x="670" y="135" font-size="14" font-weight="700" fill="#ffffff">3 · Refactor</text>
    <text x="656" y="168" font-size="11" font-weight="700" fill="#0f172a">Tool: AWS Transform (Blu Age)</text>
    <text x="656" y="186" font-size="10" fill="#334155">• Deterministische Transformation</text>
    <text x="656" y="200" font-size="10" fill="#334155">• BASED → ByteBuffer-Layout</text>
    <text x="656" y="214" font-size="10" fill="#334155">• ON-Units → Handler-Stack</text>
    <text x="656" y="228" font-size="10" fill="#334155">• TASK → ExecutorService</text>
    <text x="656" y="244" font-size="10" fill="#64748b">HITL: FIXED DECIMAL-Review</text>
  </g>

  <!-- Phase 4: Reforge -->
  <g filter="url(#sh25)">
    <rect x="940" y="110" width="260" height="150" rx="12" fill="#ffffff" stroke="#a855f7" stroke-width="3"/>
    <rect x="940" y="110" width="260" height="36" rx="12" fill="#a855f7"/>
    <text x="970" y="135" font-size="14" font-weight="700" fill="#ffffff">4 · Reforge</text>
    <text x="956" y="168" font-size="11" font-weight="700" fill="#0f172a">Tool: Bedrock + Claude Opus</text>
    <text x="956" y="186" font-size="10" fill="#334155">• ByteBuffer → POJOs/records</text>
    <text x="956" y="200" font-size="10" fill="#334155">• Handler-Stack → Exceptions</text>
    <text x="956" y="214" font-size="10" fill="#334155">• SQL → Spring-Data-Repos</text>
    <text x="956" y="228" font-size="10" fill="#334155">• Nested Proc → Services</text>
    <text x="956" y="244" font-size="10" fill="#64748b">HITL: Diff-Review Pflicht</text>
  </g>

  <!-- Phase 5: Reimagine -->
  <g filter="url(#sh25)">
    <rect x="40" y="290" width="280" height="150" rx="12" fill="#ffffff" stroke="#c026d3" stroke-width="3"/>
    <rect x="40" y="290" width="280" height="36" rx="12" fill="#c026d3"/>
    <text x="70" y="315" font-size="14" font-weight="700" fill="#ffffff">5 · Reimagine</text>
    <text x="56" y="348" font-size="11" font-weight="700" fill="#0f172a">Tool: Kiro + Bedrock AgentCore</text>
    <text x="56" y="366" font-size="10" fill="#334155">• Bounded Contexts</text>
    <text x="56" y="380" font-size="10" fill="#334155">• Microservice-Design</text>
    <text x="56" y="394" font-size="10" fill="#334155">• Spec-driven Forward-Eng.</text>
    <text x="56" y="410" font-size="10" fill="#334155">• Nur ausgewaehlte Subdomains</text>
    <text x="56" y="428" font-size="10" fill="#64748b">Transaktionskern: refactorisiert</text>
  </g>

  <!-- Phase 6: Test -->
  <g filter="url(#sh25)">
    <rect x="340" y="290" width="280" height="150" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="340" y="290" width="280" height="36" rx="12" fill="#dc2626"/>
    <text x="370" y="315" font-size="14" font-weight="700" fill="#ffffff">6 · Test</text>
    <text x="356" y="348" font-size="11" font-weight="700" fill="#0f172a">Agenten:</text>
    <text x="356" y="364" font-size="10" fill="#334155">• Testing Automation Agent</text>
    <text x="356" y="378" font-size="10" fill="#334155">• Dual-Run-Agent</text>
    <text x="356" y="392" font-size="10" fill="#334155">• Property-Test-Agent</text>
    <text x="356" y="410" font-size="10" fill="#64748b">Details: Dokument 6</text>
    <text x="356" y="424" font-size="10" font-weight="700" fill="#991b1b">Kritischste Phase</text>
  </g>

  <!-- Phase 7: Deploy -->
  <g filter="url(#sh25)">
    <rect x="640" y="290" width="280" height="150" rx="12" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="640" y="290" width="280" height="36" rx="12" fill="#059669"/>
    <text x="670" y="315" font-size="14" font-weight="700" fill="#ffffff">7 · Deploy</text>
    <text x="656" y="348" font-size="11" font-weight="700" fill="#0f172a">Orchestrierung:</text>
    <text x="656" y="364" font-size="10" fill="#334155">• CodePipeline → CodeBuild</text>
    <text x="656" y="378" font-size="10" fill="#334155">• ECR → EKS</text>
    <text x="656" y="392" font-size="10" fill="#334155">• Blue/Green / Canary</text>
    <text x="656" y="406" font-size="10" fill="#334155">• Koexistenz: + z/OS-Jobs</text>
    <text x="656" y="424" font-size="10" fill="#64748b">Details: Dokument 5 (50-%)</text>
  </g>

  <!-- Phase 8: Operate -->
  <g filter="url(#sh25)">
    <rect x="940" y="290" width="260" height="150" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="3"/>
    <rect x="940" y="290" width="260" height="36" rx="12" fill="#0891b2"/>
    <text x="970" y="315" font-size="14" font-weight="700" fill="#ffffff">8 · Operate</text>
    <text x="956" y="348" font-size="11" font-weight="700" fill="#0f172a">Observability-Stack:</text>
    <text x="956" y="364" font-size="10" fill="#334155">• CloudWatch + X-Ray</text>
    <text x="956" y="378" font-size="10" fill="#334155">• OpenTelemetry</text>
    <text x="956" y="392" font-size="10" fill="#334155">• SMF-Extrakte (Mainframe)</text>
    <text x="956" y="406" font-size="10" fill="#334155">• CloudTrail (Audit)</text>
    <text x="956" y="424" font-size="10" fill="#64748b">Korrelierte Traces hybrid</text>
  </g>

  <!-- Arrows between phases -->
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr25)">
    <line x1="320" y1="185" x2="336" y2="185"/>
    <line x1="620" y1="185" x2="636" y2="185"/>
    <line x1="920" y1="185" x2="936" y2="185"/>
    <line x1="320" y1="365" x2="336" y2="365"/>
    <line x1="620" y1="365" x2="636" y2="365"/>
    <line x1="920" y1="365" x2="936" y2="365"/>
    <!-- Wrap from top-right to bottom-left -->
    <path d="M 1070 260 Q 1100 275 180 285"/>
  </g>

  <!-- PL/I-specific overlay -->
  <g filter="url(#sh25)">
    <rect x="60" y="480" width="1140" height="200" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="630" y="508" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">PL/I-spezifische Abweichungen vom COBOL-Standard-Workflow</text>

    <g font-size="11" fill="#7c2d12">
      <text x="80" y="534" font-weight="700">Discovery:</text>
      <text x="180" y="534">Preprocessor-Expansion ist Pflicht — ohne geht nichts. BASED-Variablen und Pointer-Zyklen werden als separate Artefakte erfasst.</text>

      <text x="80" y="554" font-weight="700">Planning:</text>
      <text x="180" y="554">Wave-Sortierung nach Preprocessor-Komplexitaet. Module mit dynamisch generierten Code kommen spaet in die Waves.</text>

      <text x="80" y="574" font-weight="700">Refactor:</text>
      <text x="180" y="574">BASED/Pointer via ByteBuffer-Layout; ON-Units als Handler-Stack; MULTITASKING mit ExecutorService-Wrapper.</text>

      <text x="80" y="594" font-weight="700">Reforge:</text>
      <text x="180" y="594">Opt-in pro Modul. Token-oekonomisch: Batch-Runs, Prompt-Caching, Modell-Wahl Opus/Sonnet/Haiku nach Komplexitaet.</text>

      <text x="80" y="614" font-weight="700">Reimagine:</text>
      <text x="180" y="614">Nur fuer ausgewaehlte Subdomains (z. B. Customer-Portal) — Transaktionskerne bleiben refactorisiert (Semantik-Treue).</text>

      <text x="80" y="634" font-weight="700">Test:</text>
      <text x="180" y="634">Dual-Run + Golden-Master dominieren. FIXED-DECIMAL-Tests mit expliziten Rundungs-Katalogen.</text>

      <text x="80" y="654" font-weight="700">Deploy/Op:</text>
      <text x="180" y="654">In 50-%-Projekten zusaetzlich Mainframe-Seite (z/OS-Jobs) parallel orchestrieren; SMF-Log-Bridge aktiv.</text>
    </g>
  </g>

  <text x="620" y="730" text-anchor="middle" font-size="12" fill="#64748b">Die Phasen sind identisch zu den COBOL-Phasen (siehe ../cobol-migration_aws/) — mit diesen sechs PL/I-Delta-Punkten.</text>
</svg>
