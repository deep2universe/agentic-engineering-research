<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow8" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#sky)"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Disclaimer — Quellen als Fundament</text>
  <text x="600" y="64" text-anchor="middle" font-size="14" fill="#475569">Alle Inhalte basieren auf oeffentlich verfuegbaren Quellen mit Stand April 2026</text>

  <!-- Research document (top) -->
  <g filter="url(#shadow8)">
    <rect x="380" y="110" width="440" height="90" rx="10" fill="#0f172a"/>
    <text x="600" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">PL/I-zu-Java-Research (dieses Dokument)</text>
    <text x="600" y="162" text-anchor="middle" font-size="11" fill="#cbd5e1">8 Dokumente · 75+ SVG-Visualisierungen · _quellen.md</text>
    <text x="600" y="182" text-anchor="middle" font-size="11" fill="#94a3b8">Senior Developer / Architekten · Deep Research · Stand April 2026</text>
  </g>

