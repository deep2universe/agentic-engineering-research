    <rect x="800" y="300" width="200" height="34" rx="8" fill="#059669"/>
    <text x="900" y="323" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Vendor-Sites</text>
    <text x="812" y="355" font-size="11" fill="#0f172a">• Raincode (JVM-Compiler)</text>
    <text x="812" y="371" font-size="11" fill="#0f172a">• Micro Focus / OpenText</text>
