    <line x1="600" y1="200" x2="420" y2="300"/>
    <line x1="600" y1="200" x2="600" y2="300"/>
    <line x1="600" y1="200" x2="780" y2="300"/>
    <line x1="600" y1="200" x2="1020" y2="300"/>
