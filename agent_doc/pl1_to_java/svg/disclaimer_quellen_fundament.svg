  <!-- Ground line -->
  <rect x="60" y="470" width="1080" height="6" fill="#334155"/>

  <!-- Disclaimer banner at bottom -->
  <g filter="url(#shadow8)">
    <rect x="80" y="510" width="1040" height="150" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="600" y="540" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">WICHTIGE HINWEISE</text>
    <text x="100" y="568" font-size="11" fill="#1f2937">&#9888;  AWS, IBM, Blu Age und alle anderen genannten Produkte sind Marken ihrer jeweiligen Inhaber.</text>
    <text x="100" y="588" font-size="11" fill="#1f2937">&#9888;  Aktualitaet nicht garantiert: Der AWS-Stack aendert sich schnell. Vor Projektstart aktuelle Release-Notes pruefen.</text>
    <text x="100" y="608" font-size="11" fill="#1f2937">&#9888;  Projekteignung muss immer individuell bewertet werden — diese Research liefert Patterns, keine Garantien.</text>
    <text x="100" y="628" font-size="11" fill="#1f2937">&#9888;  Quellen-Pflicht: Jede Aussage im Text ist in _quellen.md durch mindestens eine oeffentliche Quelle belegt.</text>
    <text x="100" y="648" font-size="11" fill="#1f2937">&#9888;  Stand der Information: April 2026 — nicht zwingend aktuell bei spaeterer Lektuere.</text>
