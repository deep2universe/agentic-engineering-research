  <!-- Source 5: Community -->
  <g filter="url(#shadow8)">
    <rect x="1020" y="300" width="150" height="150" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <rect x="1020" y="300" width="150" height="34" rx="8" fill="#64748b"/>
