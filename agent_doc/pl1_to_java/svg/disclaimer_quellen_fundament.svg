    <rect x="80" y="300" width="200" height="34" rx="8" fill="#ff9900"/>
    <text x="180" y="323" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">AWS-Quellen</text>
    <text x="92" y="355" font-size="11" fill="#0f172a">• AWS Transform Docs</text>
    <text x="92" y="371" font-size="11" fill="#0f172a">• Bedrock / AgentCore Docs</text>
    <text x="92" y="387" font-size="11" fill="#0f172a">• Blu Age Release Notes</text>
    <text x="92" y="403" font-size="11" fill="#0f172a">• re:Invent 2024/25 Talks</text>
