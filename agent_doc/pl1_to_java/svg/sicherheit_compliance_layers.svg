<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh19" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Sicherheit und Compliance — Defense in Depth</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#475569">Fuenf konzentrische Sicherheits-Schichten fuer regulierte PL/I-Workloads (Banken, Versicherungen, Behoerden)</text>

  <!-- Concentric layers (rectangles nested) -->
  <!-- Layer 1: Perimeter (VPC, Security Groups) -->
  <g filter="url(#sh19)">
    <rect x="100" y="110" width="1000" height="620" rx="20" fill="#fef2f2" stroke="#b91c1c" stroke-width="3"/>
  </g>
  <rect x="100" y="110" width="1000" height="40" rx="20" fill="#b91c1c"/>
  <text x="600" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Schicht 1 — Netzwerk-Perimeter (VPC, SG, WAF, Shield)</text>

  <!-- Layer 2: IAM -->
  <rect x="140" y="170" width="920" height="540" rx="16" fill="#ffedd5" stroke="#c2410c" stroke-width="3"/>
  <rect x="140" y="170" width="920" height="36" rx="16" fill="#c2410c"/>
  <text x="600" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Schicht 2 — Identity &amp; Access (IAM + IAM Identity Center)</text>

  <!-- Layer 3: Key Management -->
  <rect x="180" y="226" width="840" height="466" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <rect x="180" y="226" width="840" height="36" rx="14" fill="#d97706"/>
  <text x="600" y="251" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Schicht 3 — Verschluesselung (KMS, Secrets Manager, Parameter Store)</text>

  <!-- Layer 4: Audit -->
  <rect x="220" y="282" width="760" height="392" rx="14" fill="#d1fae5" stroke="#059669" stroke-width="3"/>
  <rect x="220" y="282" width="760" height="36" rx="14" fill="#059669"/>
  <text x="600" y="307" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Schicht 4 — Audit &amp; Monitoring (CloudTrail, Config, Security Hub)</text>

  <!-- Layer 5: Data (innermost) -->
  <rect x="260" y="338" width="680" height="318" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <rect x="260" y="338" width="680" height="36" rx="12" fill="#0284c7"/>
  <text x="600" y="363" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Schicht 5 — Daten (PII, Regulierte Workloads)</text>

  <!-- Inner content: The asset itself -->
  <g filter="url(#sh19)">
    <rect x="340" y="400" width="520" height="240" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="600" y="432" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Kritische Assets</text>
    <g font-size="11" fill="#1e293b">
      <text x="360" y="460">• PL/I-Sourcen (Business Logic, evtl. Geschaeftsgeheimnisse)</text>
      <text x="360" y="478">• Produktionsdaten (Kontodaten, Gesundheitsdaten, PII)</text>
      <text x="360" y="496">• Generierter Java-Code (Zwischenstand)</text>
      <text x="360" y="514">• Transformations-Artefakte (Preprocessor-Expansion)</text>
      <text x="360" y="532">• Test-Golden-Master (reale Fixtures)</text>
      <text x="360" y="550">• Bedrock-Prompts mit sensiblem Kontext</text>
      <text x="360" y="568">• Audit-Logs (nicht loeschbar)</text>
      <text x="360" y="586">• ADRs mit Architektur-Entscheidungen</text>
      <text x="360" y="604">• Aurora/DynamoDB Snapshots</text>
      <text x="360" y="622">• Keys + Secrets (KMS-geschuetzt)</text>
    </g>
  </g>

  <!-- Labels around for each layer on the sides -->
  <g font-size="10" fill="#334155">
    <!-- Layer 1 annotations -->
    <text x="108" y="160" font-weight="700" fill="#991b1b">VPC-Endpoints</text>
    <text x="940" y="160" font-weight="700" fill="#991b1b">Shield Advanced</text>
    <text x="108" y="720" fill="#991b1b">PrivateLink, TLS 1.3</text>
    <text x="940" y="720" fill="#991b1b">WAF-Rules + Bot Control</text>

    <!-- Layer 2 annotations -->
    <text x="148" y="700" fill="#c2410c">Separation of Duties</text>
    <text x="910" y="700" fill="#c2410c">SSO via IdP (Okta/Azure AD)</text>

    <!-- Layer 3 annotations -->
    <text x="188" y="687" fill="#9a3412">Customer-Managed CMKs</text>
    <text x="875" y="687" fill="#9a3412">Rotation alle 90 Tage</text>

    <!-- Layer 4 annotations -->
    <text x="228" y="668" fill="#065f46">Config-Rules + Remediation</text>
    <text x="820" y="668" fill="#065f46">Unveraenderliches Log</text>
  </g>

  <!-- Compliance frameworks -->
  <g filter="url(#sh19)">
    <rect x="280" y="680" width="640" height="40" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="600" y="706" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Compliance-Frameworks: BaFin · PCI-DSS · HIPAA · DORA · SOC 2 · GDPR · ISO 27001</text>
  </g>
</svg>
