<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh26" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr26" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1240" height="780" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Referenz-Architektur: Custom PL/I-Understanding-Agent</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Ein eigener Bedrock-AgentCore-basierter Agent fuer den Wissensextraktions-Schritt</text>

  <!-- Outer container -->
  <g filter="url(#sh26)">
    <rect x="60" y="110" width="1120" height="540" rx="16" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="60" y="110" width="1120" height="46" rx="16" fill="#0f172a"/>
    <text x="620" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">PL/I Understanding Agent (gehostet auf Amazon Bedrock AgentCore)</text>
  </g>

  <!-- Human input left -->
  <g filter="url(#sh26)">
    <rect x="90" y="190" width="180" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="180" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Architekt</text>
    <text x="180" y="238" text-anchor="middle" font-size="10" fill="#1e40af">stellt Fragen:</text>
    <text x="180" y="254" text-anchor="middle" font-size="10" fill="#1e40af">"Erklaere Modul ZI01"</text>
  </g>

  <!-- Planner -->
  <g filter="url(#sh26)">
    <rect x="320" y="190" width="180" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="410" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Planner</text>
    <text x="410" y="238" text-anchor="middle" font-size="10" fill="#92400e">Zerlegt die Frage in</text>
    <text x="410" y="254" text-anchor="middle" font-size="10" fill="#92400e">Tool-Calls</text>
  </g>

  <!-- Claude Opus -->
  <g filter="url(#sh26)">
    <rect x="550" y="190" width="200" height="80" rx="10" fill="#f3e8ff" stroke="#7b2cbf" stroke-width="2"/>
    <text x="650" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">Claude Opus</text>
    <text x="650" y="238" text-anchor="middle" font-size="10" fill="#6b21a8">LLM-Reasoning</text>
    <text x="650" y="254" text-anchor="middle" font-size="10" fill="#6b21a8">auf Bedrock</text>
  </g>

  <!-- Response composer -->
  <g filter="url(#sh26)">
    <rect x="800" y="190" width="180" height="80" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="890" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Response Composer</text>
    <text x="890" y="238" text-anchor="middle" font-size="10" fill="#047857">Antwort + Belege</text>
    <text x="890" y="254" text-anchor="middle" font-size="10" fill="#047857">+ Quell-Links</text>
  </g>

  <!-- Output -->
  <g filter="url(#sh26)">
    <rect x="1020" y="190" width="140" height="80" rx="10" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
    <text x="1090" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Senior-Review</text>
    <text x="1090" y="238" text-anchor="middle" font-size="10" fill="#7f1d1d">HITL-Schritt</text>
    <text x="1090" y="254" text-anchor="middle" font-size="10" fill="#7f1d1d">vor Persistenz</text>
  </g>

  <!-- Tools layer -->
  <g filter="url(#sh26)">
    <rect x="90" y="310" width="1060" height="170" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="620" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Toolset (MCP-Server)</text>
  </g>

  <g font-size="10" fill="#0f172a">
    <rect x="110" y="360" width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="190" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">read_source</text>
    <text x="190" y="398" text-anchor="middle" font-size="9" fill="#334155">Liest PL/I-Datei</text>
    <text x="190" y="412" text-anchor="middle" font-size="9" fill="#334155">aus S3</text>
    <text x="190" y="430" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b">(module: str)</text>
    <text x="190" y="446" text-anchor="middle" font-size="9" fill="#64748b">→ raw source</text>

    <rect x="285" y="360" width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="365" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">expand_preproc</text>
    <text x="365" y="398" text-anchor="middle" font-size="9" fill="#334155">Expandiert</text>
    <text x="365" y="412" text-anchor="middle" font-size="9" fill="#334155">Preprocessor</text>
    <text x="365" y="430" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b">(module: str)</text>
    <text x="365" y="446" text-anchor="middle" font-size="9" fill="#64748b">→ expanded source</text>

    <rect x="460" y="360" width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="540" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">dep_lookup</text>
    <text x="540" y="398" text-anchor="middle" font-size="9" fill="#334155">Findet Module,</text>
    <text x="540" y="412" text-anchor="middle" font-size="9" fill="#334155">die ein Modul rufen</text>
    <text x="540" y="430" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b">(module: str)</text>
    <text x="540" y="446" text-anchor="middle" font-size="9" fill="#64748b">→ List[Caller]</text>

    <rect x="635" y="360" width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="715" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">grep_code</text>
    <text x="715" y="398" text-anchor="middle" font-size="9" fill="#334155">Ripgrep-artige</text>
    <text x="715" y="412" text-anchor="middle" font-size="9" fill="#334155">Suche (Regex)</text>
    <text x="715" y="430" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b">(pattern: str)</text>
    <text x="715" y="446" text-anchor="middle" font-size="9" fill="#64748b">→ List[Match]</text>

    <rect x="810" y="360" width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="890" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">query_sql_catalog</text>
    <text x="890" y="398" text-anchor="middle" font-size="9" fill="#334155">DB2-Schema-</text>
    <text x="890" y="412" text-anchor="middle" font-size="9" fill="#334155">Information</text>
    <text x="890" y="430" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b">(table: str)</text>
    <text x="890" y="446" text-anchor="middle" font-size="9" fill="#64748b">→ Schema</text>

    <rect x="985" y="360" width="160" height="100" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="1065" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">write_note</text>
    <text x="1065" y="398" text-anchor="middle" font-size="9" fill="#334155">Persistiert</text>
    <text x="1065" y="412" text-anchor="middle" font-size="9" fill="#334155">Erklaerung in S3</text>
    <text x="1065" y="430" text-anchor="middle" font-size="9" font-style="italic" fill="#64748b">(title, md)</text>
    <text x="1065" y="446" text-anchor="middle" font-size="9" fill="#64748b">→ s3://...md</text>
  </g>

  <!-- Storage layer -->
  <g filter="url(#sh26)">
    <rect x="90" y="510" width="520" height="120" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="350" y="540" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Amazon S3</text>
    <text x="110" y="564" font-size="11" fill="#1e40af">• PL/I-Sourcen (Original)</text>
    <text x="110" y="580" font-size="11" fill="#1e40af">• Expandierte Sourcen (Preprocessor-Output)</text>
    <text x="110" y="596" font-size="11" fill="#1e40af">• Dependency-Graph</text>
    <text x="110" y="612" font-size="11" fill="#1e40af">• Persistierte Notes (Agent-Output)</text>
  </g>

  <g filter="url(#sh26)">
    <rect x="630" y="510" width="520" height="120" rx="12" fill="#fce7f3" stroke="#c026d3" stroke-width="2"/>
    <text x="890" y="540" text-anchor="middle" font-size="13" font-weight="700" fill="#86198f">Bedrock Knowledge Base (RAG)</text>
    <text x="650" y="564" font-size="11" fill="#a21caf">• IBM PL/I Language Reference (vektorisiert)</text>
    <text x="650" y="580" font-size="11" fill="#a21caf">• Firmen-eigene Coding-Standards und ADRs</text>
    <text x="650" y="596" font-size="11" fill="#a21caf">• Historische Lessons-Learned-Dokumente</text>
    <text x="650" y="612" font-size="11" fill="#a21caf">• Semantische Suche via Titan Embeddings</text>
  </g>

  <!-- Arrows -->
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr26)">
    <line x1="270" y1="230" x2="318" y2="230"/>
    <line x1="500" y1="230" x2="548" y2="230"/>
    <line x1="750" y1="230" x2="798" y2="230"/>
    <line x1="980" y1="230" x2="1018" y2="230"/>
    <line x1="650" y1="270" x2="650" y2="350"/>
    <line x1="190" y1="460" x2="190" y2="506"/>
    <line x1="890" y1="460" x2="890" y2="506"/>
  </g>

  <!-- Model choice box -->
  <g filter="url(#sh26)">
    <rect x="60" y="680" width="1120" height="80" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="620" y="706" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Modellwahl pro Sub-Task</text>
    <text x="100" y="730" font-size="11" fill="#1f2937"><tspan font-weight="700" fill="#581c87">Opus</tspan>: tiefgehende Erklaerungen, Reforge kritischer Module</text>
    <text x="490" y="730" font-size="11" fill="#1f2937"><tspan font-weight="700" fill="#86198f">Sonnet</tspan>: Massen-Summarization, Code-Erklaerung</text>
    <text x="880" y="730" font-size="11" fill="#1f2937"><tspan font-weight="700" fill="#a21caf">Haiku</tspan>: Tool-Orchestrierung</text>
    <text x="620" y="750" text-anchor="middle" font-size="10" font-style="italic" fill="#713f12">Kostenoptimierung = Token-Budget pro Sub-Task explizit deklarieren</text>
  </g>
</svg>
