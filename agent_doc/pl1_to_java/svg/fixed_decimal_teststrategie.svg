<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh49" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="760" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Kritische FIXED-DECIMAL-Teststrategie</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">FIXED DECIMAL ist der haeufigste Fehler-Herd — dediziertes Vorgehen pro Funktion</text>

  <!-- Warning banner -->
  <g filter="url(#sh49)">
    <rect x="60" y="110" width="1120" height="80" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="620" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Warum FIXED DECIMAL gesondert behandelt wird</text>
    <text x="620" y="162" text-anchor="middle" font-size="11" fill="#7f1d1d">PL/I-FIXED-DECIMAL-Operationen haben Regeln fuer "intermediate precision", die nicht 1:1 zu BigDecimal passen.</text>
    <text x="620" y="180" text-anchor="middle" font-size="11" fill="#7f1d1d">Ergebnis: 1 Cent Abweichung in Kredit-/Zins-Rechnungen — unakzeptabel im Finanzumfeld.</text>
  </g>

  <!-- 6 test case categories -->
  <text x="620" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Katalog der Pflicht-Testfaelle pro FIXED-DECIMAL-Funktion</text>

  <g filter="url(#sh49)">
    <rect x="60" y="240" width="370" height="150" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="60" y="240" width="370" height="34" rx="12" fill="#2563eb"/>
    <text x="245" y="261" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1 · Nullwerte</text>
    <text x="76" y="292" font-size="11" fill="#0f172a">Input: 0, 0.0, 0.00 ... (alle Praezisionen)</text>
    <text x="76" y="310" font-size="11" fill="#0f172a">Pruefe: Korrekte Handhabung in allen</text>
    <text x="76" y="324" font-size="11" fill="#0f172a">Operations (Add, Sub, Mul, Div).</text>
    <text x="76" y="348" font-size="10" fill="#334155">Grenze: Division durch Null</text>
    <text x="76" y="364" font-size="10" fill="#334155">&#8594; PL/I: ZERODIVIDE ON-Unit</text>
    <text x="76" y="378" font-size="10" fill="#334155">&#8594; Java: ArithmeticException</text>
  </g>

  <g filter="url(#sh49)">
    <rect x="450" y="240" width="370" height="150" rx="12" fill="#ffffff" stroke="#059669" stroke-width="2.5"/>
    <rect x="450" y="240" width="370" height="34" rx="12" fill="#059669"/>
    <text x="635" y="261" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2 · Maximale Praezision</text>
    <text x="466" y="292" font-size="11" fill="#0f172a">Input: Exakt p Stellen belegt</text>
    <text x="466" y="310" font-size="11" fill="#0f172a">Pruefe: Kein Verlust, keine Rundung</text>
    <text x="466" y="328" font-size="11" fill="#0f172a">in der Zwischenrechnung.</text>
    <text x="466" y="352" font-size="10" fill="#334155">Beispiel: FIXED DECIMAL(9,2)</text>
    <text x="466" y="366" font-size="10" fill="#334155">Input: 9_999_999.99</text>
    <text x="466" y="380" font-size="10" fill="#334155">+ 0.01 = 10_000_000.00 (OVERFLOW?)</text>
  </g>

  <g filter="url(#sh49)">
    <rect x="840" y="240" width="340" height="150" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="840" y="240" width="340" height="34" rx="12" fill="#f59e0b"/>
    <text x="1010" y="261" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3 · Overflow-Test</text>
    <text x="856" y="292" font-size="11" fill="#0f172a">Input: Eine Stelle mehr als p</text>
    <text x="856" y="310" font-size="11" fill="#0f172a">Pruefe: FIXEDOVERFLOW-Exception</text>
    <text x="856" y="328" font-size="11" fill="#0f172a">wird korrekt ausgeloest.</text>
    <text x="856" y="352" font-size="10" fill="#334155">PL/I: FIXEDOVERFLOW ON-Unit</text>
    <text x="856" y="366" font-size="10" fill="#334155">Java: MathContext-Check +</text>
    <text x="856" y="380" font-size="10" fill="#334155">ArithmeticException</text>
  </g>

  <g filter="url(#sh49)">
    <rect x="60" y="410" width="370" height="150" rx="12" fill="#ffffff" stroke="#7b2cbf" stroke-width="2.5"/>
    <rect x="60" y="410" width="370" height="34" rx="12" fill="#7b2cbf"/>
    <text x="245" y="431" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4 · Negative Werte</text>
    <text x="76" y="462" font-size="11" fill="#0f172a">Input: -1, -0.01, -MAX ...</text>
    <text x="76" y="480" font-size="11" fill="#0f172a">Pruefe: Vorzeichen-Arithmetik</text>
    <text x="76" y="494" font-size="11" fill="#0f172a">konsistent mit PL/I.</text>
    <text x="76" y="518" font-size="10" fill="#334155">Besonders: Division, Modulo</text>
    <text x="76" y="532" font-size="10" fill="#334155">Sign of remainder kann abweichen</text>
    <text x="76" y="548" font-size="10" fill="#334155">zwischen PL/I und Java!</text>
  </g>

  <g filter="url(#sh49)">
    <rect x="450" y="410" width="370" height="150" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
    <rect x="450" y="410" width="370" height="34" rx="12" fill="#dc2626"/>
    <text x="635" y="431" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5 · Rundungs-Kippstellen</text>
    <text x="466" y="462" font-size="11" fill="#0f172a">Input: letzte Stelle = 5 (5.5 / 6.5 / -5.5)</text>
    <text x="466" y="480" font-size="11" fill="#0f172a">Pruefe: RoundingMode korrekt</text>
    <text x="466" y="494" font-size="11" fill="#0f172a">(HALF_UP, HALF_EVEN, HALF_DOWN)</text>
    <text x="466" y="518" font-size="10" fill="#334155">PL/I default: NEAREST</text>
    <text x="466" y="532" font-size="10" fill="#334155">Java: expliziter MathContext</text>
    <text x="466" y="548" font-size="10" fill="#334155">Banker's Rounding vs. Kaufmanns!</text>
  </g>

  <g filter="url(#sh49)">
    <rect x="840" y="410" width="340" height="150" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="2.5"/>
    <rect x="840" y="410" width="340" height="34" rx="12" fill="#0891b2"/>
    <text x="1010" y="431" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6 · Sehr kleine Zahlen</text>
    <text x="856" y="462" font-size="11" fill="#0f172a">Input: q Nachkomma-Stellen</text>
    <text x="856" y="480" font-size="11" fill="#0f172a">Pruefe: Keine Digit-Verluste in</text>
    <text x="856" y="494" font-size="11" fill="#0f172a">Multiplikation/Division.</text>
    <text x="856" y="518" font-size="10" fill="#334155">Beispiel: FIXED DECIMAL(15,8)</text>
    <text x="856" y="532" font-size="10" fill="#334155">Input: 0.00000001 * 1000000</text>
    <text x="856" y="548" font-size="10" fill="#334155">= 0.01 (exakt)</text>
  </g>

  <!-- Automation + MathContext docs -->
  <g filter="url(#sh49)">
    <rect x="60" y="580" width="560" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <rect x="60" y="580" width="560" height="34" rx="12" fill="#2563eb"/>
    <text x="340" y="601" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Automatischer Testfall-Generator</text>
    <text x="76" y="634" font-size="11" fill="#0f172a">Ein kleiner Agent, der aus den DCL-Deklarationen (p, q)</text>
    <text x="76" y="650" font-size="11" fill="#0f172a">automatisch die oben genannten Testfaelle generiert:</text>
    <text x="76" y="676" font-size="10" font-family="monospace" fill="#334155">DCL SALDO FIXED DECIMAL(11,2);</text>
    <text x="76" y="692" font-size="10" font-family="monospace" fill="#334155">&#8594; generiert 6 × N Tests fuer jede Operation</text>
    <text x="76" y="708" font-size="10" font-family="monospace" fill="#334155">&#8594; Tests werden als JUnit + AssertJ + BigDecimal</text>
    <text x="76" y="722" font-size="10" font-family="monospace" fill="#334155">   erzeugt und in die Testsuite eingebettet</text>
  </g>

  <g filter="url(#sh49)">
    <rect x="640" y="580" width="540" height="160" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <rect x="640" y="580" width="540" height="34" rx="12" fill="#059669"/>
    <text x="910" y="601" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">MathContext-Dokumentations-Pflicht</text>
    <text x="656" y="634" font-size="11" fill="#0f172a">Jeder MathContext im transformierten Code MUSS explizit</text>
    <text x="656" y="650" font-size="11" fill="#0f172a">kommentiert sein — wo kommt der Wert her?</text>
    <text x="656" y="676" font-size="10" font-family="monospace" fill="#334155">// Pl1Decimal: FIXED DECIMAL(11,2) mit NEAREST</text>
    <text x="656" y="692" font-size="10" font-family="monospace" fill="#334155">// Referenz: IBM Enterprise PL/I LR SC27-1460</text>
    <text x="656" y="708" font-size="10" font-family="monospace" fill="#334155">// Abschnitt 3.5.2 "Arithmetic precision"</text>
    <text x="656" y="724" font-size="10" font-family="monospace" fill="#334155">MathContext MC = new MathContext(11, HALF_UP);</text>
  </g>
</svg>
