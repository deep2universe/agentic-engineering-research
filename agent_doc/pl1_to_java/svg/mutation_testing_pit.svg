<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 740" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh47" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr47" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b2cbf"/>
    </marker>
  </defs>

  <rect width="1240" height="740" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Mutation Testing mit PIT</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Tests, die die Test-Qualitaet messen — injizieren Fehler und pruefen, ob Tests sie fangen</text>

  <!-- Concept -->
  <g filter="url(#sh47)">
    <rect x="60" y="110" width="1120" height="100" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="620" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Was ist Mutation Testing?</text>
    <text x="620" y="162" text-anchor="middle" font-size="11" fill="#1e40af">Mutation Tests messen die <tspan font-weight="700">Qualitaet der Testsuite selbst</tspan> — nicht die Qualitaet des Produktionscodes.</text>
    <text x="620" y="180" text-anchor="middle" font-size="11" fill="#1e40af">Sie injizieren kleine Fehler ("Mutationen") in den Produktionscode und pruefen, ob die Tests diese Fehler fangen.</text>
    <text x="620" y="198" text-anchor="middle" font-size="10" font-style="italic" fill="#334155">Ein "ueberlebender" Mutant = ein Test, der ihn nicht erkannt hat = ein moeglicher Gap in der Testsuite.</text>
  </g>

  <!-- Flow -->
  <g filter="url(#sh47)">
    <rect x="60" y="240" width="200" height="100" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="160" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#0e7490">1 · Source-Code</text>
    <text x="160" y="288" text-anchor="middle" font-size="10" fill="#0f172a">Transformierter Java-Code</text>
    <text x="160" y="304" text-anchor="middle" font-size="10" fill="#0f172a">(aus Refactor + Reforge)</text>
    <text x="160" y="322" text-anchor="middle" font-size="10" fill="#0f172a">+ bestehende Testsuite</text>
  </g>

  <g filter="url(#sh47)">
    <rect x="300" y="240" width="200" height="100" rx="10" fill="#ffffff" stroke="#7b2cbf" stroke-width="2"/>
    <text x="400" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#6b21a8">2 · PIT erzeugt Mutanten</text>
    <text x="400" y="288" text-anchor="middle" font-size="10" fill="#0f172a">z. B. + → -, &gt; → &gt;=,</text>
    <text x="400" y="304" text-anchor="middle" font-size="10" fill="#0f172a">true → false, &amp;&amp; → ||,</text>
    <text x="400" y="322" text-anchor="middle" font-size="10" fill="#0f172a">return x → return 0</text>
  </g>

  <g filter="url(#sh47)">
    <rect x="540" y="240" width="200" height="100" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="640" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">3 · Tests laufen</text>
    <text x="640" y="288" text-anchor="middle" font-size="10" fill="#0f172a">fuer jeden Mutanten</text>
    <text x="640" y="304" text-anchor="middle" font-size="10" fill="#0f172a">wird die gesamte</text>
    <text x="640" y="322" text-anchor="middle" font-size="10" fill="#0f172a">Testsuite ausgefuehrt</text>
  </g>

  <g filter="url(#sh47)">
    <rect x="780" y="240" width="200" height="100" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <text x="880" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">4 · Ergebnis</text>
    <text x="880" y="288" text-anchor="middle" font-size="10" fill="#047857">Test FAILT = Mutant getoetet</text>
    <text x="880" y="304" text-anchor="middle" font-size="10" fill="#047857">(gut!)</text>
    <text x="880" y="320" text-anchor="middle" font-size="10" fill="#dc2626">Test PASST = Mutant lebt</text>
    <text x="880" y="336" text-anchor="middle" font-size="10" fill="#dc2626">(Luecke!)</text>
  </g>

  <g filter="url(#sh47)">
    <rect x="1020" y="240" width="160" height="100" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="1100" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">5 · Mutation Score</text>
    <text x="1100" y="288" text-anchor="middle" font-size="10" fill="#0f172a">= getoetet / total</text>
    <text x="1100" y="308" text-anchor="middle" font-size="10" fill="#0f172a">Ziel: &gt; 75 %</text>
    <text x="1100" y="324" text-anchor="middle" font-size="10" fill="#0f172a">Start: &gt; 60 %</text>
  </g>

  <g stroke="#7b2cbf" stroke-width="2.5" fill="none" marker-end="url(#arr47)">
    <line x1="260" y1="290" x2="298" y2="290"/>
    <line x1="500" y1="290" x2="538" y2="290"/>
    <line x1="740" y1="290" x2="778" y2="290"/>
    <line x1="980" y1="290" x2="1018" y2="290"/>
  </g>

  <!-- Mutators example -->
  <g filter="url(#sh47)">
    <rect x="60" y="380" width="560" height="260" rx="12" fill="#ffffff" stroke="#7b2cbf" stroke-width="2.5"/>
    <rect x="60" y="380" width="560" height="36" rx="12" fill="#7b2cbf"/>
    <text x="340" y="403" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Beispiel: PIT-Mutatoren</text>

    <rect x="80" y="430" width="520" height="190" rx="6" fill="#f1f5f9"/>
    <text x="96" y="454" font-family="monospace" font-size="11" fill="#334155">// Original</text>
    <text x="96" y="470" font-family="monospace" font-size="11" fill="#0f172a">int zins = kapital * rate / 100;</text>
    <text x="96" y="486" font-family="monospace" font-size="11" fill="#334155">if (zins &gt; limit) throw new OverflowError();</text>
    <text x="96" y="510" font-family="monospace" font-size="11" fill="#334155">// Mutatoren von PIT:</text>
    <text x="96" y="526" font-family="monospace" font-size="11" fill="#dc2626">int zins = kapital * rate * 100;   // * statt /</text>
    <text x="96" y="542" font-family="monospace" font-size="11" fill="#dc2626">int zins = kapital + rate / 100;   // + statt *</text>
    <text x="96" y="558" font-family="monospace" font-size="11" fill="#dc2626">if (zins &gt;= limit) ...              // &gt;= statt &gt;</text>
    <text x="96" y="574" font-family="monospace" font-size="11" fill="#dc2626">if (zins &lt; limit) ...               // &lt; statt &gt;</text>
    <text x="96" y="590" font-family="monospace" font-size="11" fill="#dc2626">// return entfernt / immer 0 / immer 1</text>
    <text x="96" y="608" font-family="monospace" font-size="11" fill="#059669">// Gute Tests fangen ALL diese Mutanten</text>
  </g>

  <!-- Einsatz bei PL/I -->
  <g filter="url(#sh47)">
    <rect x="640" y="380" width="540" height="260" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="640" y="380" width="540" height="36" rx="12" fill="#f59e0b"/>
    <text x="910" y="403" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Warum PIT fuer PL/I-Migrationen?</text>

    <text x="660" y="436" font-size="12" font-weight="700" fill="#0f172a">Problem:</text>
    <text x="660" y="456" font-size="11" fill="#334155">Automatisch generierte Unit-Tests sind oft:</text>
    <text x="676" y="474" font-size="11" fill="#334155">• <tspan font-weight="700">viel</tspan>: hohe Coverage-Zahlen</text>
    <text x="676" y="490" font-size="11" fill="#334155">• <tspan font-weight="700">aber flach</tspan>: nur Happy-Path abgedeckt</text>
    <text x="676" y="506" font-size="11" fill="#334155">• <tspan font-weight="700">"gruen aber sinnlos"</tspan>: assertNotNull(), leere Assertions</text>

    <text x="660" y="536" font-size="12" font-weight="700" fill="#0f172a">Loesung:</text>
    <text x="660" y="556" font-size="11" fill="#334155">PIT deckt "gruene aber sinnlose" Tests auf — weil ein</text>
    <text x="660" y="572" font-size="11" fill="#334155">schlecht geschriebener Test alle Mutanten ueberleben laesst.</text>

    <text x="660" y="604" font-size="11" font-weight="700" fill="#b45309">Senior-Pattern:</text>
    <text x="660" y="620" font-size="11" fill="#334155">Mutation Score pro Modul tracken. Bei Score &lt; 60 %:</text>
    <text x="660" y="636" font-size="11" fill="#334155">Tests als "fragwuerdig" markieren, im Review nachschreiben.</text>
  </g>

  <!-- KPI banner -->
  <g filter="url(#sh47)">
    <rect x="60" y="660" width="1120" height="60" rx="10" fill="#0f172a"/>
    <text x="620" y="690" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Ziel-KPIs: Mutation Score &gt; 60 % als Startwert &#183; &gt; 75 % bei Ende der Migration &#183; &gt; 85 % bei kritischen Modulen</text>
    <text x="620" y="710" text-anchor="middle" font-size="10" font-style="italic" fill="#fbbf24">Tool: pitest.org · Integration in Maven/Gradle · Nightly in CI/CD</text>
  </g>
</svg>
