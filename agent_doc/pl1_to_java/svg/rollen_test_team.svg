<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh52" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="720" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Rollen im Test-Team</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Vier klar abgegrenzte Rollen — jede mit eigener Verantwortung und Deliverables</text>

  <!-- Role 1: Test-Lead -->
  <g filter="url(#sh52)">
    <rect x="60" y="110" width="560" height="270" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="60" y="110" width="560" height="44" rx="14" fill="#dc2626"/>
    <text x="340" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Test-Lead</text>

    <circle cx="110" cy="200" r="36" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="110" y="194" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">LEAD</text>
    <text x="110" y="210" text-anchor="middle" font-size="9" fill="#7f1d1d">Senior</text>

    <text x="160" y="190" font-size="12" font-weight="700" fill="#0f172a">Verantwortung:</text>
    <text x="160" y="208" font-size="11" fill="#334155">Gesamte Teststrategie, KPIs, Kommunikation mit Architekten</text>

    <text x="80" y="250" font-size="11" font-weight="700" fill="#991b1b">Deliverables:</text>
    <g font-size="10" fill="#334155">
      <text x="80" y="270">&#8226;  Test-Strategie-Dokument</text>
      <text x="80" y="286">&#8226;  KPI-Dashboard (taeglich Review)</text>
      <text x="80" y="302">&#8226;  Test-Plan pro Wave</text>
      <text x="80" y="318">&#8226;  Risiko-Reporting an Architekten</text>
      <text x="80" y="334">&#8226;  Go/No-Go-Entscheidung fuer Test-Gate</text>
      <text x="80" y="350">&#8226;  Change-Advisory-Board-Reports</text>
      <text x="80" y="366">&#8226;  Quartals-Retrospektive mit Lessons Learned</text>
    </g>
  </g>

  <!-- Role 2: Senior Test Engineer -->
  <g filter="url(#sh52)">
    <rect x="640" y="110" width="560" height="270" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="640" y="110" width="560" height="44" rx="14" fill="#2563eb"/>
    <text x="920" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Senior Test Engineer</text>

    <circle cx="690" cy="200" r="36" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="690" y="194" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">SR TE</text>
    <text x="690" y="210" text-anchor="middle" font-size="9" fill="#1e40af">Engineer</text>

    <text x="740" y="190" font-size="12" font-weight="700" fill="#0f172a">Verantwortung:</text>
    <text x="740" y="208" font-size="11" fill="#334155">Kritische Tests schreiben + LLM-Tests reviewen</text>

    <text x="660" y="250" font-size="11" font-weight="700" fill="#1e3a8a">Deliverables:</text>
    <g font-size="10" fill="#334155">
      <text x="660" y="270">&#8226;  FIXED-DECIMAL-Test-Kataloge</text>
      <text x="660" y="286">&#8226;  Pointer-Lifecycle-Tests</text>
      <text x="660" y="302">&#8226;  ON-Unit-Behavior-Tests</text>
      <text x="660" y="318">&#8226;  Property-Tests fuer Kern-Logik</text>
      <text x="660" y="334">&#8226;  Review von LLM-generierten Tests (Pflicht)</text>
      <text x="660" y="350">&#8226;  Mutation-Score-Verbesserungen</text>
      <text x="660" y="366">&#8226;  Schulungen fuer Junior-Engineers</text>
    </g>
  </g>

  <!-- Role 3: Dual-Run-Operator -->
  <g filter="url(#sh52)">
    <rect x="60" y="400" width="560" height="270" rx="14" fill="#ffffff" stroke="#7b2cbf" stroke-width="3"/>
    <rect x="60" y="400" width="560" height="44" rx="14" fill="#7b2cbf"/>
    <text x="340" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Dual-Run-Operator</text>

    <circle cx="110" cy="490" r="36" fill="#faf5ff" stroke="#7b2cbf" stroke-width="2"/>
    <text x="110" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#6b21a8">DUAL-RUN</text>
    <text x="110" y="500" text-anchor="middle" font-size="9" fill="#7b2cbf">Ops</text>

    <text x="160" y="480" font-size="12" font-weight="700" fill="#0f172a">Verantwortung:</text>
    <text x="160" y="498" font-size="11" fill="#334155">Testdaten-Refresh, Dual-Run-Ausfuehrung, Diff-Analyse</text>

    <text x="80" y="540" font-size="11" font-weight="700" fill="#6b21a8">Deliverables:</text>
    <g font-size="10" fill="#334155">
      <text x="80" y="560">&#8226;  Taeglich: Dual-Run-Dashboard</text>
      <text x="80" y="576">&#8226;  Diff-Report pro betroffenem Modul</text>
      <text x="80" y="592">&#8226;  Golden-Master-Versionen in S3</text>
      <text x="80" y="608">&#8226;  Shadow-Traffic-Reports</text>
      <text x="80" y="624">&#8226;  Testdaten-Snapshots (pro Release)</text>
      <text x="80" y="640">&#8226;  Incident-Tickets bei Diff &gt; Schwelle</text>
      <text x="80" y="656">&#8226;  Zusammenarbeit mit Precisely/DMS-Team</text>
    </g>
  </g>

  <!-- Role 4: Testing-Agent-Owner -->
  <g filter="url(#sh52)">
    <rect x="640" y="400" width="560" height="270" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="640" y="400" width="560" height="44" rx="14" fill="#059669"/>
    <text x="920" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Testing-Agent-Owner</text>

    <circle cx="690" cy="490" r="36" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="690" y="484" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">AGENT</text>
    <text x="690" y="499" text-anchor="middle" font-size="9" fill="#047857">Owner</text>

    <text x="740" y="480" font-size="12" font-weight="700" fill="#0f172a">Verantwortung:</text>
    <text x="740" y="498" font-size="11" fill="#334155">Testing-Automation-Agent + Prompts + Kostenbilanz</text>

    <text x="660" y="540" font-size="11" font-weight="700" fill="#065f46">Deliverables:</text>
    <g font-size="10" fill="#334155">
      <text x="660" y="560">&#8226;  Prompt-Templates versioniert in Git</text>
      <text x="660" y="576">&#8226;  Modellwahl (Opus/Sonnet/Haiku) begruendet</text>
      <text x="660" y="592">&#8226;  Bedrock-Kostenbericht (monatlich)</text>
      <text x="660" y="608">&#8226;  Agent-Performance-Metriken</text>
      <text x="660" y="624">&#8226;  Test-Generierungs-Qualitaets-Report</text>
      <text x="660" y="640">&#8226;  MCP-Tool-Wartung und Upgrades</text>
      <text x="660" y="656">&#8226;  Cost-Reduction-Initiativen</text>
    </g>
  </g>
</svg>
