<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh14" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="transformGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Primaere AWS-Services fuer PL/I-Migration</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Vier Schluesseldienste — der Stack, auf dem jede Senior-PL/I-Migration steht</text>

  <!-- Main service card: AWS Transform for Mainframe Refactor -->
  <g filter="url(#sh14)">
    <rect x="80" y="110" width="560" height="320" rx="14" fill="url(#transformGrad)"/>
    <text x="360" y="145" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">AWS Transform for Mainframe Refactor</text>
    <text x="360" y="168" text-anchor="middle" font-size="11" fill="#fed7aa">Seit Maerz 2026 · Code-Transformation kostenfrei · ehemals AWS Blu Age</text>

    <!-- Feature checkmarks -->
    <g font-size="11" fill="#ffffff">
      <rect x="104" y="188" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="115" y="207">&#10003;  Dependency Analysis</text>
      <rect x="364" y="188" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="375" y="207">&#10003;  Assessment &amp; Planning Agent</text>

      <rect x="104" y="224" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="115" y="243">&#10003;  Refactor (deterministisch)</text>
      <rect x="364" y="224" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="375" y="243">&#10003;  Reforge (LLM idiomatisch)</text>

      <rect x="104" y="260" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="115" y="279">&#10003;  Reimagine (Microservices)</text>
      <rect x="364" y="260" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="375" y="279">&#10003;  Testing Automation</text>

      <rect x="104" y="296" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="115" y="315">&#10003;  CICS Runtime</text>
      <rect x="364" y="296" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="375" y="315">&#10003;  VSAM Runtime</text>

      <rect x="104" y="332" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="115" y="351">&#10003;  JCL Transformation</text>
      <rect x="364" y="332" width="252" height="28" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <text x="375" y="351">&#10003;  DB2 → Aurora PostgreSQL</text>

      <rect x="104" y="368" width="252" height="28" rx="6" fill="#fde68a" fill-opacity="0.4"/>
      <text x="115" y="387">&#9888;  Preprocessor-Expansion (teilweise)</text>
      <rect x="364" y="368" width="252" height="28" rx="6" fill="#fde68a" fill-opacity="0.4"/>
      <text x="375" y="387">&#10003;  BASED/Pointer via ByteBuffer-Layout</text>
    </g>

    <text x="360" y="416" text-anchor="middle" font-size="11" font-style="italic" fill="#fef3c7">Kein Ein-Knopf-Druck — Parametrierung fuer Preprocessor, Pointer, ON-Units erforderlich</text>
  </g>

  <!-- Amazon Bedrock -->
  <g filter="url(#sh14)">
    <rect x="680" y="110" width="480" height="150" rx="14" fill="#ffffff" stroke="#7b2cbf" stroke-width="3"/>
    <rect x="680" y="110" width="480" height="40" rx="14" fill="#7b2cbf"/>
    <text x="920" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Amazon Bedrock &amp; AgentCore</text>
    <text x="696" y="170" font-size="12" font-weight="600" fill="#0f172a">Rolle:  Grundlage aller agentic-AI-Workflows</text>
    <text x="696" y="192" font-size="11" fill="#334155">• Claude Opus/Sonnet als Default fuer Reforge und Erklaerungen</text>
    <text x="696" y="208" font-size="11" fill="#334155">• Amazon Titan als Fallback fuer interne/proprietaere Workloads</text>
    <text x="696" y="224" font-size="11" fill="#334155">• AgentCore als Runtime fuer Custom-Agents (Bedrock Agents)</text>
    <text x="696" y="240" font-size="11" fill="#334155">• Knowledge Bases als RAG-Layer fuer PL/I-Codebasis</text>
  </g>

  <!-- Amazon Q Developer -->
  <g filter="url(#sh14)">
    <rect x="680" y="280" width="480" height="150" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="680" y="280" width="480" height="40" rx="14" fill="#2563eb"/>
    <text x="920" y="307" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Amazon Q Developer</text>
    <text x="696" y="340" font-size="12" font-weight="600" fill="#0f172a">Rolle:  IDE-Integration fuer agentic Coding</text>
    <text x="696" y="362" font-size="11" fill="#334155">• Plugins fuer VS Code, JetBrains, Eclipse + Q CLI</text>
    <text x="696" y="378" font-size="11" fill="#334155">• Post-Transform: Aufraeumen des generierten Java-Codes</text>
    <text x="696" y="394" font-size="11" fill="#334155">• Refactoring zu idiomatischem Java, Tests, Erklaerungen</text>
    <text x="696" y="410" font-size="11" fill="#334155">• Primaer-Werkzeug fuer Senior-Engineers nach dem Refactor</text>
  </g>

  <!-- Kiro -->
  <g filter="url(#sh14)">
    <rect x="80" y="460" width="1080" height="150" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="80" y="460" width="1080" height="40" rx="14" fill="#059669"/>
    <text x="620" y="487" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Kiro (Amazon Kiro IDE)</text>
    <text x="96" y="520" font-size="12" font-weight="600" fill="#0f172a">Rolle:  Spec-driven, autonomously coding IDE — fuer Reimagine und Forward Engineering</text>
    <text x="96" y="542" font-size="11" fill="#334155">• Einsatz NACH Refactor/Reforge: fuer Reimagine in Microservices oder neu-erdachte Bounded Contexts</text>
    <text x="96" y="558" font-size="11" fill="#334155">• Architekt schreibt Specs (Requirements, Domain Model, Use Cases) → Kiro generiert Java/Spring-Boot-Code</text>
    <text x="96" y="574" font-size="11" fill="#334155">• PL/I-Seite als Referenz-Implementation zur Validierung der Spec — nicht als direkte Code-Quelle</text>
    <text x="96" y="590" font-size="11" fill="#334155">• Fuer PL/I oft selektiv: z. B. Customer-Portal reimagined, Accounts-Kern bleibt refactorisiert</text>
  </g>

  <!-- Foundation layer -->
  <g filter="url(#sh14)">
    <rect x="80" y="640" width="1080" height="120" rx="12" fill="#0f172a"/>
    <text x="620" y="670" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Gemeinsames Fundament aller vier Services</text>
    <g font-size="11" fill="#cbd5e1">
      <text x="150" y="698">• Amazon S3 (Source-Staging)</text>
      <text x="370" y="698">• IAM + IAM Identity Center</text>
      <text x="580" y="698">• CloudWatch + X-Ray</text>
      <text x="790" y="698">• CloudTrail (Audit)</text>
      <text x="960" y="698">• KMS (Encryption)</text>
      <text x="150" y="720">• VPC + Endpoints</text>
      <text x="370" y="720">• Secrets Manager</text>
      <text x="580" y="720">• Parameter Store</text>
      <text x="790" y="720">• Config + Security Hub</text>
      <text x="960" y="720">• CodePipeline Glue</text>
    </g>
    <text x="620" y="748" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">Jeder Service laeuft auf diesem Stack — und Senior-Architekten muessen ihn als Ganzes verstehen</text>
  </g>
</svg>
