<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh17" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr17" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9900"/>
    </marker>
  </defs>

  <rect width="1240" height="780" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">CI/CD und Observability</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Die Pipeline-Kette plus der Observability-Stack fuer hybride PL/I-Java-Umgebungen</text>

  <!-- CI/CD pipeline -->
  <text x="60" y="110" font-size="14" font-weight="700" fill="#1e40af">CI/CD Pipeline (AWS Developer Tools)</text>
  <!-- Pipeline stages as connected boxes -->
  <g filter="url(#sh17)">
    <rect x="60" y="130" width="180" height="90" rx="10" fill="#2563eb"/>
    <text x="150" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CodeCommit</text>
    <text x="150" y="178" text-anchor="middle" font-size="10" fill="#bfdbfe">Git-Repository</text>
    <text x="150" y="192" text-anchor="middle" font-size="10" fill="#bfdbfe">fuer transformierten</text>
    <text x="150" y="206" text-anchor="middle" font-size="10" fill="#bfdbfe">Java-Code</text>
  </g>
  <g filter="url(#sh17)">
    <rect x="260" y="130" width="180" height="90" rx="10" fill="#2563eb"/>
    <text x="350" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CodeBuild</text>
    <text x="350" y="178" text-anchor="middle" font-size="10" fill="#bfdbfe">Build + Unit Tests</text>
    <text x="350" y="192" text-anchor="middle" font-size="10" fill="#bfdbfe">Property Tests</text>
    <text x="350" y="206" text-anchor="middle" font-size="10" fill="#bfdbfe">Mutation Tests (PIT)</text>
  </g>
  <g filter="url(#sh17)">
    <rect x="460" y="130" width="180" height="90" rx="10" fill="#2563eb"/>
    <text x="550" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CodeArtifact</text>
    <text x="550" y="178" text-anchor="middle" font-size="10" fill="#bfdbfe">Maven/Gradle-</text>
    <text x="550" y="192" text-anchor="middle" font-size="10" fill="#bfdbfe">Artifact-Storage</text>
    <text x="550" y="206" text-anchor="middle" font-size="10" fill="#bfdbfe">+ ECR (Container)</text>
  </g>
  <g filter="url(#sh17)">
    <rect x="660" y="130" width="180" height="90" rx="10" fill="#2563eb"/>
    <text x="750" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CodePipeline</text>
    <text x="750" y="178" text-anchor="middle" font-size="10" fill="#bfdbfe">Orchestrierung</text>
    <text x="750" y="192" text-anchor="middle" font-size="10" fill="#bfdbfe">Stage-Gates</text>
    <text x="750" y="206" text-anchor="middle" font-size="10" fill="#bfdbfe">Approval-Steps</text>
  </g>
  <g filter="url(#sh17)">
    <rect x="860" y="130" width="180" height="90" rx="10" fill="#059669"/>
    <text x="950" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CodeDeploy</text>
    <text x="950" y="178" text-anchor="middle" font-size="10" fill="#d1fae5">Blue/Green</text>
    <text x="950" y="192" text-anchor="middle" font-size="10" fill="#d1fae5">Canary</text>
    <text x="950" y="206" text-anchor="middle" font-size="10" fill="#d1fae5">Rolling Updates</text>
  </g>
  <g filter="url(#sh17)">
    <rect x="1060" y="130" width="160" height="90" rx="10" fill="#059669"/>
    <text x="1140" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">EKS / ECS</text>
    <text x="1140" y="178" text-anchor="middle" font-size="10" fill="#d1fae5">Runtime</text>
    <text x="1140" y="192" text-anchor="middle" font-size="10" fill="#d1fae5">Target</text>
  </g>

  <!-- Arrows -->
  <g stroke="#ff9900" stroke-width="2.5" fill="none" marker-end="url(#arr17)">
    <line x1="240" y1="175" x2="258" y2="175"/>
    <line x1="440" y1="175" x2="458" y2="175"/>
    <line x1="640" y1="175" x2="658" y2="175"/>
    <line x1="840" y1="175" x2="858" y2="175"/>
    <line x1="1040" y1="175" x2="1058" y2="175"/>
  </g>

  <!-- Mainframe side -->
  <g filter="url(#sh17)">
    <rect x="60" y="250" width="780" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="450" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Parallel: Mainframe-Seite ueber Jenkins / GitHub Actions</text>
    <text x="450" y="298" text-anchor="middle" font-size="10" fill="#7c2d12">z/OS-Jobs werden via IBM DBB (Dependency-Based Build) und SCLM/Endevor getriggert — hybrider CI/CD-Flow</text>
  </g>

  <!-- Observability layer -->
  <text x="60" y="370" font-size="14" font-weight="700" fill="#065f46">Observability-Stack</text>

  <g filter="url(#sh17)">
    <rect x="60" y="390" width="280" height="220" rx="12" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="60" y="390" width="280" height="36" rx="12" fill="#059669"/>
    <text x="200" y="413" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Amazon CloudWatch</text>
    <text x="76" y="444" font-size="11" font-weight="700" fill="#0f172a">Metriken &amp; Logs:</text>
    <text x="76" y="462" font-size="10" fill="#334155">• JVM-Metriken (Heap, GC)</text>
    <text x="76" y="478" font-size="10" fill="#334155">• Application-Logs + Structured</text>
    <text x="76" y="494" font-size="10" fill="#334155">• Business-KPIs</text>
    <text x="76" y="512" font-size="10" fill="#334155">• Container-Metriken (EKS/ECS)</text>
    <text x="76" y="530" font-size="10" fill="#334155">• Custom Dashboards</text>
    <text x="76" y="548" font-size="10" fill="#334155">• Alarms + Anomaly Detection</text>
    <text x="76" y="566" font-size="10" fill="#334155">• Log Insights (SQL-like Query)</text>
    <text x="76" y="592" font-size="10" font-style="italic" fill="#065f46">Primary Pane of Glass</text>
  </g>

  <g filter="url(#sh17)">
    <rect x="360" y="390" width="280" height="220" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="3"/>
    <rect x="360" y="390" width="280" height="36" rx="12" fill="#0891b2"/>
    <text x="500" y="413" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">AWS X-Ray + OpenTelemetry</text>
    <text x="376" y="444" font-size="11" font-weight="700" fill="#0f172a">Distributed Tracing:</text>
    <text x="376" y="462" font-size="10" fill="#334155">• End-to-End-Traces</text>
    <text x="376" y="478" font-size="10" fill="#334155">• Service-Map-Visualisierung</text>
    <text x="376" y="494" font-size="10" fill="#334155">• Latenz-Heatmaps</text>
    <text x="376" y="512" font-size="10" fill="#334155">• Span-Level Annotations</text>
    <text x="376" y="530" font-size="10" fill="#334155">• OTel-Collector in Sidecar</text>
    <text x="376" y="548" font-size="10" fill="#334155">• Korrelation Mainframe ↔ AWS</text>
    <text x="376" y="566" font-size="10" fill="#334155">  via Trace-ID Propagation</text>
    <text x="376" y="592" font-size="10" font-style="italic" fill="#0e7490">Wichtig fuer Koexistenz-Phase</text>
  </g>

  <g filter="url(#sh17)">
    <rect x="660" y="390" width="280" height="220" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="660" y="390" width="280" height="36" rx="12" fill="#dc2626"/>
    <text x="800" y="413" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">AWS CloudTrail</text>
    <text x="676" y="444" font-size="11" font-weight="700" fill="#0f172a">Audit-Trails:</text>
    <text x="676" y="462" font-size="10" fill="#334155">• API-Aufrufe aller Services</text>
    <text x="676" y="478" font-size="10" fill="#334155">• Wer wann welches Agent-Prompt?</text>
    <text x="676" y="494" font-size="10" fill="#334155">• Bedrock-Invocations</text>
    <text x="676" y="512" font-size="10" fill="#334155">• Datenzugriffe (S3, DynamoDB)</text>
    <text x="676" y="530" font-size="10" fill="#334155">• IAM-Rollen-Wechsel</text>
    <text x="676" y="548" font-size="10" fill="#334155">• Unveraenderlich + S3-Archiv</text>
    <text x="676" y="566" font-size="10" fill="#334155">• Integration mit Security Hub</text>
    <text x="676" y="592" font-size="10" font-style="italic" fill="#991b1b">Fuer Banken + Versicherungen Pflicht</text>
  </g>

  <g filter="url(#sh17)">
    <rect x="960" y="390" width="260" height="220" rx="12" fill="#ffffff" stroke="#7b2cbf" stroke-width="3"/>
    <rect x="960" y="390" width="260" height="36" rx="12" fill="#7b2cbf"/>
    <text x="1090" y="413" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Mainframe-Bridge</text>
    <text x="976" y="444" font-size="11" font-weight="700" fill="#0f172a">Legacy-aware:</text>
    <text x="976" y="462" font-size="10" fill="#334155">• SMF-Extrakte → CloudWatch</text>
    <text x="976" y="478" font-size="10" fill="#334155">• SYSLOG + JOBLOG → S3</text>
    <text x="976" y="494" font-size="10" fill="#334155">• RMF-Metriken → Prometheus</text>
    <text x="976" y="512" font-size="10" fill="#334155">• eigene OTel-Adapter</text>
    <text x="976" y="530" font-size="10" fill="#334155">• IBM OMEGAMON-Integration</text>
    <text x="976" y="548" font-size="10" fill="#334155">• Gemeinsames Dashboard</text>
    <text x="976" y="566" font-size="10" fill="#334155">  fuer beide Welten</text>
    <text x="976" y="592" font-size="10" font-style="italic" fill="#6b21a8">Unverzichtbar in 50-%-Projekten</text>
  </g>

  <!-- Bottom insight -->
  <g filter="url(#sh17)">
    <rect x="60" y="650" width="1160" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="640" y="678" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Senior-Pattern: Observability-First</text>
    <text x="640" y="702" text-anchor="middle" font-size="11" fill="#1e40af">Bevor die erste produktive Wave live geht, muss jede kritische Transaktion mit Trace-ID durch beide Welten folgbar sein.</text>
    <text x="640" y="718" text-anchor="middle" font-size="10" font-style="italic" fill="#334155">Ohne End-to-End-Traces ist jede Fehler-Analyse in der Koexistenz-Phase Rateraten.</text>
  </g>
</svg>
