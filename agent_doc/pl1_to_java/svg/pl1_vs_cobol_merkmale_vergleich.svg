<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow9" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Warum PL/I anders ist als COBOL</text>
  <text x="620" y="66" text-anchor="middle" font-size="14" fill="#475569">Multi-Paradigma-Sprache mit Features, die COBOL nicht kennt — jede Zeile erzeugt Migrations-Mehraufwand</text>

  <!-- Column headers -->
  <rect x="70" y="100" width="360" height="44" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="250" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Merkmal</text>

  <rect x="440" y="100" width="360" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="620" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">COBOL</text>

  <rect x="810" y="100" width="360" height="44" rx="10" fill="#e9d5ff" stroke="#7b2cbf" stroke-width="2"/>
  <text x="990" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#581c87">PL/I</text>

  <!-- Rows -->
  <g font-size="12" fill="#0f172a">
    <!-- Row 1 -->
    <rect x="70" y="160" width="1100" height="60" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="86" y="187" font-weight="700">Pointer / Referenzen</text>
    <text x="86" y="204" font-size="10" fill="#64748b">Speicher-Addressierung</text>
    <text x="456" y="187" fill="#1e40af">keine direkte Pointer-Arithmetik</text>
    <text x="456" y="204" font-size="10" fill="#64748b">USING / BY REFERENCE only</text>
    <text x="826" y="187" font-weight="600" fill="#581c87">POINTER, OFFSET, HANDLE</text>
    <text x="826" y="204" font-size="10" fill="#7b2cbf">ADDR(), BASED-Variablen</text>

    <!-- Row 2 -->
    <rect x="70" y="228" width="1100" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="86" y="255" font-weight="700">Rekursion</text>
    <text x="86" y="272" font-size="10" fill="#64748b">Selbst-Aufrufe von Prozeduren</text>
    <text x="456" y="255" fill="#1e40af">nur mit RECURSIVE-Option</text>
    <text x="456" y="272" font-size="10" fill="#64748b">selten, nicht idiomatisch</text>
    <text x="826" y="255" font-weight="600" fill="#581c87">standardmaessig erlaubt</text>
    <text x="826" y="272" font-size="10" fill="#7b2cbf">idiomatisch genutzt</text>

    <!-- Row 3 -->
    <rect x="70" y="296" width="1100" height="60" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="86" y="323" font-weight="700">Bedingungsbehandlung</text>
    <text x="86" y="340" font-size="10" fill="#64748b">Exception-aehnlich</text>
    <text x="456" y="323" fill="#1e40af">SIZE/OVERFLOW-Klauseln</text>
    <text x="456" y="340" font-size="10" fill="#64748b">lokal, statisch</text>
    <text x="826" y="323" font-weight="600" fill="#581c87">ON-Units mit dynamischem Scope</text>
    <text x="826" y="340" font-size="10" fill="#7b2cbf">zur Laufzeit aenderbar</text>

    <!-- Row 4 -->
    <rect x="70" y="364" width="1100" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="86" y="391" font-weight="700">Multitasking</text>
    <text x="86" y="408" font-size="10" fill="#64748b">Parallel-Ausfuehrung</text>
    <text x="456" y="391" fill="#1e40af">kein Sprachmittel</text>
    <text x="456" y="408" font-size="10" fill="#64748b">nur CICS-Pseudo-Conversational</text>
    <text x="826" y="391" font-weight="600" fill="#581c87">TASK / EVENT / WAIT</text>
    <text x="826" y="408" font-size="10" fill="#7b2cbf">CALL ... TASK native Threads</text>

    <!-- Row 5 -->
    <rect x="70" y="432" width="1100" height="60" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="86" y="459" font-weight="700">Praeprozessor</text>
    <text x="86" y="476" font-size="10" fill="#64748b">Source-Generator</text>
    <text x="456" y="459" fill="#1e40af">COPY + REPLACING</text>
    <text x="456" y="476" font-size="10" fill="#64748b">einfaches Include mit Substitution</text>
    <text x="826" y="459" font-weight="600" fill="#581c87">%INCLUDE, %MACRO, %IF, %PROCEDURE</text>
    <text x="826" y="476" font-size="10" fill="#7b2cbf">Turing-vollstaendige Meta-Sprache</text>

    <!-- Row 6 -->
    <rect x="70" y="500" width="1100" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="86" y="527" font-weight="700">Datentypen</text>
    <text x="86" y="544" font-size="10" fill="#64748b">Primitive + komplexe</text>
    <text x="456" y="527" fill="#1e40af">Fixed, Float, Group</text>
    <text x="456" y="544" font-size="10" fill="#64748b">COMP-3, PIC, PIC X</text>
    <text x="826" y="527" font-weight="600" fill="#581c87">+ BIT, VARYING, AREA, UNION</text>
    <text x="826" y="544" font-size="10" fill="#7b2cbf">+ STRUCTURE, PICTURE, HANDLE</text>

    <!-- Row 7 -->
    <rect x="70" y="568" width="1100" height="60" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="86" y="595" font-weight="700">Dynamischer Speicher</text>
    <text x="86" y="612" font-size="10" fill="#64748b">Heap-Management</text>
    <text x="456" y="595" fill="#1e40af">rar</text>
    <text x="456" y="612" font-size="10" fill="#64748b">hauptsaechlich statisch</text>
    <text x="826" y="595" font-weight="600" fill="#581c87">ALLOCATE / FREE / CONTROLLED</text>
    <text x="826" y="612" font-size="10" fill="#7b2cbf">BASED, AREA, STG-Stacks</text>

    <!-- Row 8 -->
    <rect x="70" y="636" width="1100" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="86" y="663" font-weight="700">Nested Procedures</text>
    <text x="86" y="680" font-size="10" fill="#64748b">Verschachtelte Funktionen</text>
    <text x="456" y="663" fill="#1e40af">nicht</text>
    <text x="456" y="680" font-size="10" fill="#64748b">Programme sind flach</text>
    <text x="826" y="663" font-weight="600" fill="#581c87">ja, mit statischem Scoping</text>
    <text x="826" y="680" font-size="10" fill="#7b2cbf">Begin Blocks mit eigenem ON</text>
  </g>

  <!-- Bottom banner -->
  <g filter="url(#shadow9)">
    <rect x="70" y="716" width="1100" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="620" y="742" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Folge: Der statische Analyseaufwand ist deutlich hoeher — 1:1-Mappings sind oft unmoeglich.</text>
    <text x="620" y="762" text-anchor="middle" font-size="12" fill="#7f1d1d">Jede der acht Zeilen erzeugt eigene Patterns, eigene Tests, eigenen Senior-Review-Bedarf.</text>
    <text x="620" y="778" text-anchor="middle" font-size="12" font-style="italic" fill="#991b1b">PL/I = Multi-Paradigma-Sprache (FORTRAN + COBOL + ALGOL Mix, IBM 1964)</text>
  </g>
</svg>
