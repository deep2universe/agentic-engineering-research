<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 740" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh55" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="740" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Strategische Best Practices</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Vier Prinzipien, die jedes PL/I-Projekt am Anfang klaeren muss</text>

  <!-- BP 1: Pilot -->
  <g filter="url(#sh55)">
    <rect x="60" y="110" width="560" height="280" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="60" y="110" width="560" height="44" rx="14" fill="#2563eb"/>
    <text x="340" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1 · Immer mit einem Pilot starten</text>
    <text x="80" y="182" font-size="12" font-weight="700" fill="#0f172a">Regel:</text>
    <text x="80" y="200" font-size="11" fill="#334155">Eine vollstaendige PL/I-Codebasis in einem grossen Sprung</text>
    <text x="80" y="216" font-size="11" fill="#334155">zu migrieren, ist riskant. Stattdessen:</text>

    <g font-size="11" fill="#334155">
      <circle cx="96" cy="244" r="4" fill="#2563eb"/>
      <text x="108" y="248">Ein abgegrenztes, nicht-kritisches Modul als Pilot waehlen</text>
      <text x="108" y="264" font-size="10" fill="#64748b">(typisch: Reporting, Statistik, Batch-Nachbearbeitung)</text>
      <circle cx="96" cy="290" r="4" fill="#2563eb"/>
      <text x="108" y="294">Kompletten Workflow E2E durchlaufen</text>
      <text x="108" y="310" font-size="10" fill="#64748b">(Discovery → Planning → Transform → Test → Deploy)</text>
      <circle cx="96" cy="336" r="4" fill="#2563eb"/>
      <text x="108" y="340">Lessons Learned dokumentieren</text>
      <text x="108" y="356" font-size="10" fill="#64748b">bevor der naechste, groessere Wave startet</text>
    </g>
  </g>

  <!-- BP 2: Wave by Risk -->
  <g filter="url(#sh55)">
    <rect x="640" y="110" width="560" height="280" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="640" y="110" width="560" height="44" rx="14" fill="#059669"/>
    <text x="920" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2 · Wave-Planung nach Risiko, nicht nach Groesse</text>

    <text x="660" y="182" font-size="12" font-weight="700" fill="#0f172a">Intuitive Logik:</text>
    <text x="660" y="200" font-size="11" fill="#dc2626" font-style="italic">"Zuerst die kleinen, dann die grossen" &#8594; FALSCH</text>

    <text x="660" y="230" font-size="12" font-weight="700" fill="#0f172a">Richtig:</text>
    <g font-size="11" fill="#334155">
      <rect x="680" y="242" width="500" height="30" rx="6" fill="#d1fae5"/>
      <text x="696" y="262" fill="#065f46" font-weight="700">1. Low-Risk</text>
      <text x="780" y="262" fill="#064e3b">wenig Pointer, kein Multitasking, klarer Preprocessor</text>

      <rect x="680" y="280" width="500" height="30" rx="6" fill="#fef3c7"/>
      <text x="696" y="300" fill="#78350f" font-weight="700">2. Medium-Risk</text>
      <text x="788" y="300" fill="#7c2d12">hoehere Komplexitaet, aber Standard-Pattern</text>

      <rect x="680" y="318" width="500" height="30" rx="6" fill="#fee2e2"/>
      <text x="696" y="338" fill="#991b1b" font-weight="700">3. High-Risk</text>
      <text x="776" y="338" fill="#7f1d1d">Pointer-Hotspots, Multitasking, kritische FIXED-DECIMAL</text>
    </g>

    <text x="660" y="374" font-size="10" font-style="italic" fill="#065f46">Warum? Low-Risk-Erfolge bauen Vertrauen und Toolchain-Reife auf.</text>
  </g>

  <!-- BP 3: Business Owner -->
  <g filter="url(#sh55)">
    <rect x="60" y="420" width="560" height="280" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <rect x="60" y="420" width="560" height="44" rx="14" fill="#f59e0b"/>
    <text x="340" y="450" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3 · Business-Owner einbinden</text>

    <text x="80" y="492" font-size="12" font-weight="700" fill="#0f172a">Problem:</text>
    <text x="80" y="510" font-size="11" fill="#334155">PL/I-Code enthaelt oft undokumentierte Business-Regeln.</text>
    <text x="80" y="526" font-size="11" fill="#334155">Die einzigen, die diese wirklich kennen, sind:</text>

    <g font-size="11" fill="#334155">
      <circle cx="96" cy="554" r="4" fill="#f59e0b"/>
      <text x="108" y="558">Fachbereichsleitung (Produkt-Owner)</text>
      <circle cx="96" cy="578" r="4" fill="#f59e0b"/>
      <text x="108" y="582">Langjaehrige Entwickler (Veterans)</text>
      <circle cx="96" cy="602" r="4" fill="#f59e0b"/>
      <text x="108" y="606">Fachabteilung (Buchhaltung, Risiko, Compliance)</text>
      <circle cx="96" cy="626" r="4" fill="#f59e0b"/>
      <text x="108" y="630">Interne Audit-Teams</text>
    </g>

    <text x="80" y="664" font-size="11" font-weight="700" fill="#b45309">Ohne deren aktive Beteiligung:</text>
    <text x="80" y="680" font-size="10" fill="#334155">Entstehen Luecken, die im Test nicht auffallen, aber in der Produktion explodieren.</text>
  </g>

  <!-- BP 4: Rewrite ist der letzte Ausweg -->
  <g filter="url(#sh55)">
    <rect x="640" y="420" width="560" height="280" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="640" y="420" width="560" height="44" rx="14" fill="#dc2626"/>
    <text x="920" y="450" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">4 · Keine Rewrite-Versuchung</text>

    <text x="660" y="492" font-size="12" font-weight="700" fill="#0f172a">Versuchung:</text>
    <text x="660" y="510" font-size="11" fill="#334155">Wenn ein Team frisch startet, will es den PL/I-Code</text>
    <text x="660" y="526" font-size="11" fill="#334155">nicht migrieren, sondern "frisch in Java neu schreiben".</text>

    <text x="660" y="554" font-size="12" font-weight="700" fill="#dc2626">Realitaet:</text>
    <text x="660" y="572" font-size="11" fill="#7f1d1d">&#8805; 80 % der Rewrites schlagen fehl, weil das</text>
    <text x="660" y="588" font-size="11" fill="#7f1d1d">implizite Wissen in der PL/I-Codebasis verloren geht.</text>

    <rect x="660" y="610" width="520" height="70" rx="8" fill="#fef2f2" stroke="#dc2626"/>
    <text x="920" y="634" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Die Regel:</text>
    <text x="920" y="652" text-anchor="middle" font-size="11" fill="#7f1d1d">Refactor-first &#8594; Reforge-second &#8594; Reimagine-only-where-justified</text>
    <text x="920" y="668" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Rewrite-from-scratch = der letzte Ausweg, nicht der erste</text>
  </g>
</svg>
