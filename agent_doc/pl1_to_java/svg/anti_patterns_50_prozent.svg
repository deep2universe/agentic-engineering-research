<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh38" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="780" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Anti-Patterns fuer 50-%-Projekte</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Fuenf haeufige Fehler, die ein 50-%-Projekt zum Scheitern bringen</text>

  <!-- AP 1: Alles auf einmal umschalten -->
  <g filter="url(#sh38)">
    <rect x="60" y="110" width="560" height="200" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <g transform="translate(100, 150)">
      <polygon points="0,-30 30,25 -30,25" fill="#dc2626"/>
      <text x="0" y="15" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">!</text>
    </g>
    <text x="150" y="145" font-size="15" font-weight="700" fill="#991b1b">"Alles auf einmal umschalten"</text>
    <text x="150" y="165" font-size="11" fill="#7f1d1d">Big-Bang statt Koexistenz</text>

    <text x="80" y="198" font-size="11" font-weight="700" fill="#0f172a">Warum falsch:</text>
    <text x="80" y="214" font-size="11" fill="#334155">In 50-%-Projekten gibt es keinen sicheren Big-Bang-Pfad — die</text>
    <text x="80" y="230" font-size="11" fill="#334155">Haelfte ist bereits produktiv. Ein Cutover ohne Koexistenz heisst:</text>
    <text x="80" y="246" font-size="11" fill="#334155">alle Benutzer gleichzeitig in ein ungetestetes System werfen.</text>

    <text x="80" y="274" font-size="11" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="80" y="290" font-size="11" fill="#047857">Koexistenz ist in 50-%-Projekten Pflicht — mindestens 2 Monate</text>
    <text x="80" y="306" font-size="11" fill="#047857">Shadow-Phase vor jedem Go-Live.</text>
  </g>

  <!-- AP 2: Dual-Master ignorieren -->
  <g filter="url(#sh38)">
    <rect x="640" y="110" width="560" height="200" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <g transform="translate(680, 150)">
      <polygon points="0,-30 30,25 -30,25" fill="#dc2626"/>
      <text x="0" y="15" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">!</text>
    </g>
    <text x="730" y="145" font-size="15" font-weight="700" fill="#991b1b">"Dual-Master ist egal"</text>
    <text x="730" y="165" font-size="11" fill="#7f1d1d">"Konsistenz loesen wir im Code"</text>

    <text x="660" y="198" font-size="11" font-weight="700" fill="#0f172a">Warum falsch:</text>
    <text x="660" y="214" font-size="11" fill="#334155">Konfliktaufloesung in verteilten Datenbanken ist KEIN Code-Thema,</text>
    <text x="660" y="230" font-size="11" fill="#334155">sondern ein Datenbank-Thema. Zwei Master fuer dieselbe Tabelle</text>
    <text x="660" y="246" font-size="11" fill="#334155">fuehren unweigerlich zu Konflikten, die sich nicht retrospektiv</text>
    <text x="660" y="262" font-size="11" fill="#334155">aufloesen lassen.</text>

    <text x="660" y="290" font-size="11" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="660" y="306" font-size="11" fill="#047857">Jede Tabelle hat genau EINEN Master. CDC-Richtung ist klar.</text>
  </g>

  <!-- AP 3: Integration-Tests weglassen -->
  <g filter="url(#sh38)">
    <rect x="60" y="330" width="560" height="200" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <g transform="translate(100, 370)">
      <polygon points="0,-30 30,25 -30,25" fill="#dc2626"/>
      <text x="0" y="15" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">!</text>
    </g>
    <text x="150" y="365" font-size="15" font-weight="700" fill="#991b1b">"Java-Seite separat testen"</text>
    <text x="150" y="385" font-size="11" fill="#7f1d1d">"PL/I ist ja schon produktiv"</text>

    <text x="80" y="418" font-size="11" font-weight="700" fill="#0f172a">Warum falsch:</text>
    <text x="80" y="434" font-size="11" fill="#334155">Die Integration ist in Koexistenz-Projekten OFT der Hauptfehler-</text>
    <text x="80" y="450" font-size="11" fill="#334155">herd — beide Seiten "funktionieren" isoliert, aber die Schnittstelle</text>
    <text x="80" y="466" font-size="11" fill="#334155">zwischen ihnen bricht im Produktionsbetrieb.</text>

    <text x="80" y="494" font-size="11" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="80" y="510" font-size="11" fill="#047857">Integration eigenstaendig testen — mit Contract-Tests, Chaos-</text>
    <text x="80" y="526" font-size="11" fill="#047857">Tests, Shadow-Traffic. Die Integration ist ein First-Class-Citizen.</text>
  </g>

  <!-- AP 4: Hotfix-Dokumentation verpasst -->
  <g filter="url(#sh38)">
    <rect x="640" y="330" width="560" height="200" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <g transform="translate(680, 370)">
      <polygon points="0,-30 30,25 -30,25" fill="#dc2626"/>
      <text x="0" y="15" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">!</text>
    </g>
    <text x="730" y="365" font-size="15" font-weight="700" fill="#991b1b">"Hotfixes dokumentieren sie schon"</text>
    <text x="730" y="385" font-size="11" fill="#7f1d1d">Manuelle Disziplin statt Automation</text>

    <text x="660" y="418" font-size="11" font-weight="700" fill="#0f172a">Warum falsch:</text>
    <text x="660" y="434" font-size="11" fill="#334155">Unter Produktionsdruck wird Dokumentation weggelassen. Nach 6</text>
    <text x="660" y="450" font-size="11" fill="#334155">Monaten divergieren die beiden Staende so weit, dass die Migration</text>
    <text x="660" y="466" font-size="11" fill="#334155">effektiv neu starten muss.</text>

    <text x="660" y="494" font-size="11" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="660" y="510" font-size="11" fill="#047857">Hotfix-Tracking muss automatisiert sein — Git-Hooks, JIRA-</text>
    <text x="660" y="526" font-size="11" fill="#047857">Integration, automatische Change-Logs.</text>
  </g>

  <!-- AP 5: Migration verschleppen -->
  <g filter="url(#sh38)">
    <rect x="60" y="550" width="1140" height="200" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <g transform="translate(100, 590)">
      <polygon points="0,-30 30,25 -30,25" fill="#dc2626"/>
      <text x="0" y="15" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">!</text>
    </g>
    <text x="150" y="585" font-size="15" font-weight="700" fill="#991b1b">"Wir migrieren spaeter fertig"</text>
    <text x="150" y="605" font-size="11" fill="#7f1d1d">Zuerst die Haupt-Domain, der Rest kommt irgendwann</text>

    <text x="80" y="638" font-size="11" font-weight="700" fill="#0f172a">Warum falsch:</text>
    <text x="80" y="654" font-size="11" fill="#334155">Eine 50-%-Migration, die laenger als 24–36 Monate dauert, wird immer teurer als eine, die klar beendet wird. Die Koexistenz-Kosten</text>
    <text x="80" y="670" font-size="11" fill="#334155">(Lizenzen, Personal, Monitoring, CI/CD, Knowledge-Split) steigen linear mit der Zeit. Senior-Architekten muessen ein klares ENDE planen.</text>

    <text x="80" y="700" font-size="11" font-weight="700" fill="#065f46">Richtig:</text>
    <text x="80" y="716" font-size="11" fill="#047857">Klares Zielbild und ein Zieltermin (meist 12–24 Monate nach Projektstart). Ggf. bewusst Teile als Retain markieren, aber dann nicht als "kommt noch".</text>
    <text x="80" y="732" font-size="11" fill="#047857">Plane das Ende — entweder vollstaendige Migration oder bewusste Hybrid-Coexistence als Zielzustand. Aber niemals unendlicher Zwischenzustand.</text>
  </g>
</svg>
