<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh51" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="760" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">KPIs fuer PL/I-Testing</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Sieben Kennzahlen, die jedes Projekt taeglich im Blick haben muss</text>

  <!-- KPI gauges as rows -->
  <g filter="url(#sh51)">
    <rect x="60" y="110" width="1120" height="72" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="80" y="140" font-size="13" font-weight="700" fill="#0f172a">Line Coverage (traditionell)</text>
    <text x="80" y="162" font-size="10" fill="#64748b">Anteil der ausgefuehrten Zeilen</text>
    <rect x="450" y="128" width="500" height="26" rx="4" fill="#e2e8f0"/>
    <rect x="450" y="128" width="400" height="26" rx="4" fill="#2563eb"/>
    <text x="450" y="146" font-size="10" fill="#ffffff" dx="10">80 %+</text>
    <text x="970" y="146" font-size="13" font-weight="700" fill="#1e3a8a">&#8805; 80 %</text>
    <text x="970" y="164" font-size="10" fill="#64748b">Ziel fuer alle Module</text>
  </g>

  <g filter="url(#sh51)">
    <rect x="60" y="194" width="1120" height="72" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <text x="80" y="224" font-size="13" font-weight="700" fill="#0f172a">Branch Coverage</text>
    <text x="80" y="246" font-size="10" fill="#64748b">Anteil der durchgefuehrten Branches</text>
    <rect x="450" y="212" width="500" height="26" rx="4" fill="#e2e8f0"/>
    <rect x="450" y="212" width="375" height="26" rx="4" fill="#059669"/>
    <text x="450" y="230" font-size="10" fill="#ffffff" dx="10">75 %+</text>
    <text x="970" y="230" font-size="13" font-weight="700" fill="#065f46">&#8805; 75 %</text>
    <text x="970" y="248" font-size="10" fill="#64748b">Decision-Coverage</text>
  </g>

  <g filter="url(#sh51)">
    <rect x="60" y="278" width="1120" height="72" rx="10" fill="#ffffff" stroke="#7b2cbf" stroke-width="2"/>
    <text x="80" y="308" font-size="13" font-weight="700" fill="#0f172a">Mutation Score (PIT)</text>
    <text x="80" y="330" font-size="10" fill="#64748b">Qualitaet der Testsuite</text>
    <rect x="450" y="296" width="500" height="26" rx="4" fill="#e2e8f0"/>
    <rect x="450" y="296" width="300" height="26" rx="4" fill="#7b2cbf"/>
    <text x="450" y="314" font-size="10" fill="#ffffff" dx="10">60 % → 75 %</text>
    <text x="970" y="314" font-size="13" font-weight="700" fill="#6b21a8">Ziel: 75 %</text>
    <text x="970" y="332" font-size="10" fill="#64748b">Start: 60 %</text>
  </g>

  <g filter="url(#sh51)">
    <rect x="60" y="362" width="1120" height="72" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="80" y="392" font-size="13" font-weight="700" fill="#0f172a">Dual-Run-Aequivalenz (kritisch)</text>
    <text x="80" y="414" font-size="10" fill="#64748b">Byte-genaue Uebereinstimmung PL/I vs Java</text>
    <rect x="450" y="380" width="500" height="26" rx="4" fill="#e2e8f0"/>
    <rect x="450" y="380" width="499" height="26" rx="4" fill="#dc2626"/>
    <text x="450" y="398" font-size="10" fill="#ffffff" dx="10">99,99 %+</text>
    <text x="970" y="398" font-size="13" font-weight="700" fill="#991b1b">&#8805; 99,99 %</text>
    <text x="970" y="416" font-size="10" fill="#64748b">Kritisch, 99 %+ sonst</text>
  </g>

  <g filter="url(#sh51)">
    <rect x="60" y="446" width="1120" height="72" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="80" y="476" font-size="13" font-weight="700" fill="#0f172a">Shadow-Traffic-Aequivalenz</text>
    <text x="80" y="498" font-size="10" fill="#64748b">In Produktion, mind. 14 Tage</text>
    <rect x="450" y="464" width="500" height="26" rx="4" fill="#e2e8f0"/>
    <rect x="450" y="464" width="499" height="26" rx="4" fill="#f59e0b"/>
    <text x="450" y="482" font-size="10" fill="#ffffff" dx="10">99,99 %+</text>
    <text x="970" y="482" font-size="13" font-weight="700" fill="#b45309">&#8805; 99,99 %</text>
    <text x="970" y="500" font-size="10" fill="#64748b">Go-Live-Gate</text>
  </g>

  <g filter="url(#sh51)">
    <rect x="60" y="530" width="1120" height="72" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="80" y="560" font-size="13" font-weight="700" fill="#0f172a">Test-Ausfuehrungsdauer</text>
    <text x="80" y="582" font-size="10" fill="#64748b">Pipeline-Geschwindigkeit</text>
    <text x="450" y="556" font-size="11" font-weight="700" fill="#0f172a">Unit: &lt; 10 Min</text>
    <text x="620" y="556" font-size="11" font-weight="700" fill="#0f172a">Integration: &lt; 60 Min</text>
    <text x="820" y="556" font-size="11" font-weight="700" fill="#0f172a">Nightly: &lt; 3 Std</text>
    <text x="450" y="574" font-size="10" fill="#64748b">CodeBuild fast lane</text>
    <text x="620" y="574" font-size="10" fill="#64748b">Testcontainers</text>
    <text x="820" y="574" font-size="10" fill="#64748b">Dual-Run + PIT</text>
    <text x="970" y="568" font-size="13" font-weight="700" fill="#0e7490">Pipeline-</text>
    <text x="970" y="584" font-size="13" font-weight="700" fill="#0e7490">Zeitbudget</text>
  </g>

  <g filter="url(#sh51)">
    <rect x="60" y="614" width="1120" height="72" rx="10" fill="#ffffff" stroke="#991b1b" stroke-width="2"/>
    <text x="80" y="644" font-size="13" font-weight="700" fill="#0f172a">Flaky-Test-Rate</text>
    <text x="80" y="666" font-size="10" fill="#64748b">Tests, die unregelmaessig fehlschlagen</text>
    <rect x="450" y="632" width="500" height="26" rx="4" fill="#e2e8f0"/>
    <rect x="450" y="632" width="10" height="26" rx="4" fill="#991b1b"/>
    <text x="470" y="650" font-size="10" fill="#0f172a" dx="10">&lt; 1 %</text>
    <text x="970" y="650" font-size="13" font-weight="700" fill="#991b1b">&lt; 1 %</text>
    <text x="970" y="668" font-size="10" fill="#64748b">Vertrauens-Basis</text>
  </g>

  <text x="620" y="720" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">Alle KPIs werden taeglich im Testing-Dashboard (CloudWatch + Grafana) visualisiert.</text>
  <text x="620" y="740" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Unterschreitung eines KPIs = Blocker fuer neue Waves</text>
</svg>
