<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh71" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="700" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Budgetaere und finanzielle Ideen</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Drei Strategien, wie Senior-Architekten die Finanzierung ihrer Migration sichern</text>

  <!-- Option 1: Laufender Betrieb -->
  <g filter="url(#sh71)">
    <rect x="60" y="110" width="380" height="440" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="60" y="110" width="380" height="44" rx="14" fill="#059669"/>
    <text x="250" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1 · Aus laufendem Betrieb</text>

    <text x="80" y="180" font-size="12" font-weight="700" fill="#0f172a">Idee:</text>
    <text x="80" y="198" font-size="11" fill="#334155">Statt separates Migrations-Budget, die</text>
    <text x="80" y="214" font-size="11" fill="#334155">Migration aus dem Betriebsbudget finanzieren.</text>

    <text x="80" y="246" font-size="12" font-weight="700" fill="#065f46">Prinzip:</text>
    <text x="80" y="264" font-size="11" fill="#334155">Jede erfolgreich migrierte Modul-Wave reduziert</text>
    <text x="80" y="280" font-size="11" fill="#334155">die Mainframe-MIPS und damit die Lizenzkosten.</text>
    <text x="80" y="302" font-size="11" fill="#334155">Diese Einsparungen werden in die naechste Wave</text>
    <text x="80" y="318" font-size="11" fill="#334155">reinvestiert.</text>

    <!-- Flow visualization -->
    <g transform="translate(80, 346)">
      <rect x="0" y="0" width="80" height="40" rx="6" fill="#d1fae5" stroke="#059669"/>
      <text x="40" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Wave 1</text>
      <text x="40" y="32" text-anchor="middle" font-size="9" fill="#047857">migriert</text>

      <rect x="100" y="0" width="80" height="40" rx="6" fill="#d1fae5" stroke="#059669"/>
      <text x="140" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Savings</text>
      <text x="140" y="32" text-anchor="middle" font-size="9" fill="#047857">MIPS runter</text>

      <rect x="200" y="0" width="100" height="40" rx="6" fill="#bbf7d0" stroke="#059669"/>
      <text x="250" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">Wave 2</text>
      <text x="250" y="32" text-anchor="middle" font-size="9" fill="#047857">finanziert</text>
    </g>

    <text x="80" y="418" font-size="11" font-weight="700" fill="#065f46">Vorteil:</text>
    <text x="80" y="436" font-size="10" fill="#334155">Kein separater Business-Case noetig</text>
    <text x="80" y="450" font-size="10" fill="#334155">Selbst-tragendes Modell</text>

    <text x="80" y="478" font-size="11" font-weight="700" fill="#991b1b">Risiko:</text>
    <text x="80" y="496" font-size="10" fill="#334155">Erste Wave muss anderweitig finanziert werden</text>
    <text x="80" y="510" font-size="10" fill="#334155">(Initial-Investment)</text>
  </g>

  <!-- Option 2: Cloud Credits verhandeln -->
  <g filter="url(#sh71)">
    <rect x="460" y="110" width="380" height="440" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="460" y="110" width="380" height="44" rx="14" fill="#2563eb"/>
    <text x="650" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2 · Cloud-Credits verhandeln</text>

    <text x="480" y="180" font-size="12" font-weight="700" fill="#0f172a">Idee:</text>
    <text x="480" y="198" font-size="11" fill="#334155">Bei grossen PL/I-Migrationen sind AWS-Cloud-</text>
    <text x="480" y="214" font-size="11" fill="#334155">Credits ueber das AWS Migration Acceleration</text>
    <text x="480" y="230" font-size="11" fill="#334155">Program (MAP) verfuegbar.</text>

    <text x="480" y="262" font-size="12" font-weight="700" fill="#1e40af">Kategorien (2026):</text>
    <g font-size="10" fill="#334155">
      <circle cx="496" cy="284" r="4" fill="#2563eb"/>
      <text x="508" y="288"><tspan font-weight="700">MAP 2.0 Assess</tspan>: Discovery + Planning</text>
      <circle cx="496" cy="304" r="4" fill="#2563eb"/>
      <text x="508" y="308"><tspan font-weight="700">MAP Mobilize</tspan>: Pilot-Phase</text>
      <circle cx="496" cy="324" r="4" fill="#2563eb"/>
      <text x="508" y="328"><tspan font-weight="700">MAP Migrate &amp; Modernize</tspan>: Full Rollout</text>
      <circle cx="496" cy="344" r="4" fill="#2563eb"/>
      <text x="508" y="348"><tspan font-weight="700">Bedrock-Credits</tspan>: Inference-Reduktion</text>
    </g>

    <text x="480" y="380" font-size="11" font-weight="700" fill="#1e40af">Effekt:</text>
    <text x="480" y="398" font-size="10" fill="#334155">Kann die Bedrock-Kosten der Reforge-Phase</text>
    <text x="480" y="412" font-size="10" fill="#334155">erheblich senken (oft 30–50 % der Gesamtkosten).</text>

    <text x="480" y="440" font-size="11" font-weight="700" fill="#0f172a">Kontakt:</text>
    <text x="480" y="458" font-size="10" fill="#334155">&#8226;  AWS Account Manager</text>
    <text x="480" y="474" font-size="10" fill="#334155">&#8226;  AWS Professional Services</text>
    <text x="480" y="490" font-size="10" fill="#334155">&#8226;  Mainframe Modernization Team</text>

    <text x="480" y="518" font-size="10" font-style="italic" fill="#1e40af">Laesst sich mit Zweit-Tool-PoC kombinieren</text>
  </g>

  <!-- Option 3: Risk Insurance -->
  <g filter="url(#sh71)">
    <rect x="860" y="110" width="320" height="440" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="860" y="110" width="320" height="44" rx="14" fill="#dc2626"/>
    <text x="1020" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3 · Risk-Insurance</text>

    <text x="880" y="180" font-size="12" font-weight="700" fill="#0f172a">Idee:</text>
    <text x="880" y="198" font-size="11" fill="#334155">Manche Projekte lassen sich</text>
    <text x="880" y="214" font-size="11" fill="#334155">gegen Migrations-Risiken</text>
    <text x="880" y="230" font-size="11" fill="#334155">versichern.</text>

    <text x="880" y="262" font-size="11" font-weight="700" fill="#991b1b">Versicherungs-Arten:</text>
    <g font-size="10" fill="#334155">
      <text x="880" y="284">&#8226;  Cyber-Insurance</text>
      <text x="880" y="300">&#8226;  Project-Completion-Insurance</text>
      <text x="880" y="316">&#8226;  Compliance-Failure-Insurance</text>
      <text x="880" y="332">&#8226;  Business-Interruption-Insurance</text>
    </g>

    <text x="880" y="364" font-size="11" font-weight="700" fill="#991b1b">Lohnt sich bei:</text>
    <text x="880" y="382" font-size="10" fill="#334155">&#8226;  Sehr grossen Projekten</text>
    <text x="880" y="398" font-size="10" fill="#334155">  (100M+ Budget)</text>
    <text x="880" y="414" font-size="10" fill="#334155">&#8226;  Regulierten Branchen</text>
    <text x="880" y="430" font-size="10" fill="#334155">&#8226;  Hoher Brand-Reputation</text>
    <text x="880" y="446" font-size="10" fill="#334155">&#8226;  Systemrelevanz</text>

    <text x="880" y="476" font-size="10" font-style="italic" fill="#7f1d1d">Anbieter:</text>
    <text x="880" y="492" font-size="10" font-style="italic" fill="#7f1d1d">AIG, Munich Re, Zurich,</text>
    <text x="880" y="506" font-size="10" font-style="italic" fill="#7f1d1d">spezialisierte Cyber-Insurer</text>
  </g>

  <text x="620" y="620" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Senior-Regel: Mindestens zwei der drei Optionen parallel verfolgen</text>
  <text x="620" y="640" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">Selbst-finanzierung fuer Sustainability + Cloud-Credits fuer Kick-Start + Versicherung fuer Risk-Mitigation</text>
</svg>
