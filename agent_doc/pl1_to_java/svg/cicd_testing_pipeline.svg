    <text x="350" y="147" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2 · Pull-Request</text>
    <text x="350" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">&lt; 15 Min</text>
    <text x="274" y="204" font-size="10" fill="#334155">&#9633;  Unit-Test-Suite</text>
    <text x="274" y="220" font-size="10" fill="#334155">   komplett</text>
    <text x="274" y="238" font-size="10" fill="#334155">&#9633;  Property-Tests</text>
    <text x="274" y="254" font-size="10" fill="#334155">   (jqwik)</text>
    <text x="274" y="272" font-size="10" fill="#334155">&#9633;  Kurzer Dual-Run</text>
    <text x="274" y="288" font-size="10" fill="#334155">   auf Smoke-Dataset</text>
    <text x="274" y="306" font-size="10" fill="#334155">&#9633;  Coverage-Report</text>
    <text x="274" y="322" font-size="10" fill="#334155">&#9633;  Security-Scan</text>
    <text x="274" y="340" font-size="10" fill="#334155">   (Q Security)</text>
    <text x="274" y="370" font-size="10" font-weight="700" fill="#065f46">CodeBuild</text>
    <text x="274" y="390" font-size="10" font-style="italic" fill="#64748b">Gate: Tests gruen</text>
  </g>

