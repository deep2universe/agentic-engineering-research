<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh50" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr50" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1240" height="760" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Testing in der CI/CD-Pipeline</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Sechs Pipeline-Stages mit unterschiedlichen Test-Tiefen und Zeitbudgets</text>

  <!-- Pipeline stages as flow -->
  <g filter="url(#sh50)">
    <rect x="60" y="120" width="180" height="580" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="60" y="120" width="180" height="40" rx="12" fill="#2563eb"/>
    <text x="150" y="147" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1 · Pre-Commit</text>
    <text x="150" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">&lt; 1 Min</text>
    <text x="74" y="204" font-size="10" fill="#334155">&#9633;  Statische Analyse</text>
    <text x="74" y="220" font-size="10" fill="#334155">   (SpotBugs)</text>
    <text x="74" y="238" font-size="10" fill="#334155">&#9633;  Error-Prone</text>
    <text x="74" y="256" font-size="10" fill="#334155">&#9633;  Checkstyle</text>
    <text x="74" y="274" font-size="10" fill="#334155">&#9633;  Schnelle Unit-Tests</text>
    <text x="74" y="292" font-size="10" fill="#334155">&#9633;  Code-Formatter</text>
    <text x="74" y="322" font-size="10" font-weight="700" fill="#1e3a8a">Lokal via Git-Hook</text>
    <text x="74" y="342" font-size="10" font-style="italic" fill="#64748b">Keine Cloud-Kosten</text>
    <text x="74" y="362" font-size="10" font-style="italic" fill="#64748b">Developer-feedback</text>
    <text x="74" y="382" font-size="10" font-style="italic" fill="#64748b">binnen Sekunden</text>
  </g>

  <g filter="url(#sh50)">
