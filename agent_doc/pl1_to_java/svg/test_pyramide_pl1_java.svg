<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh41" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Test-Pyramide fuer PL/I-zu-Java</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#475569">Die klassische Pyramide — bei PL/I breit unten (Unit + Dual-Run), schmal oben (E2E)</text>

  <!-- Pyramid layers as trapezoids, largest bottom -->
  <!-- Layer 4: E2E/Shadow (5%) -->
  <g filter="url(#sh41)">
    <polygon points="430,140 770,140 740,220 460,220" fill="#dc2626"/>
    <text x="600" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">End-to-End / Shadow Traffic</text>
    <text x="600" y="192" text-anchor="middle" font-size="11" fill="#fecaca">Vollstaendige Batch-Jobs, Production-Shadow</text>
    <text x="600" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">5 %</text>
  </g>

  <!-- Layer 3: Integration (15%) -->
  <g filter="url(#sh41)">
    <polygon points="380,220 820,220 770,310 430,310" fill="#f59e0b"/>
    <text x="600" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Integration Tests</text>
    <text x="600" y="275" text-anchor="middle" font-size="11" fill="#fef3c7">DB, MQ, API-Grenze, Testcontainers, LocalStack</text>
    <text x="600" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">15 %</text>
  </g>

  <!-- Layer 2: Dual-Run / Golden Master (30%) -->
  <g filter="url(#sh41)">
    <polygon points="310,310 890,310 810,420 390,420" fill="#7b2cbf"/>
    <text x="600" y="346" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Dual-Run / Golden Master</text>
    <text x="600" y="366" text-anchor="middle" font-size="11" fill="#e9d5ff">PL/I vs. Java — I/O-identisch, byte-genauer Vergleich</text>
    <text x="600" y="384" text-anchor="middle" font-size="11" fill="#e9d5ff">Input: Prod-Logs, historische Batches, Edge-Cases</text>
    <text x="600" y="403" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">30 %</text>
  </g>

  <!-- Layer 1: Unit + Property (50%) -->
  <g filter="url(#sh41)">
    <polygon points="180,420 1020,420 940,560 260,560" fill="#059669"/>
    <text x="600" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Unit-Tests + Property Tests</text>
    <text x="600" y="480" text-anchor="middle" font-size="11" fill="#d1fae5">LLM-generiert + Senior-reviewt</text>
    <text x="600" y="498" text-anchor="middle" font-size="11" fill="#d1fae5">JUnit 5 + AssertJ + jqwik</text>
    <text x="600" y="516" text-anchor="middle" font-size="11" fill="#d1fae5">Boundary, Negative, FIXED-DECIMAL, Pointer-Lifecycle, ON-Unit</text>
    <text x="600" y="540" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">50 %</text>
  </g>

  <!-- Labels on side -->
  <g font-size="11" fill="#64748b">
    <text x="80" y="180" font-weight="700" fill="#991b1b">sichtbar</text>
    <text x="80" y="195" font-size="10">(Prod)</text>
    <text x="80" y="260" font-weight="700" fill="#b45309">Ende-zu-</text>
    <text x="80" y="275" font-size="10">Ende</text>
    <text x="80" y="360" font-weight="700" fill="#6b21a8">semantisch</text>
    <text x="80" y="375" font-size="10">staerkste</text>
    <text x="80" y="389" font-size="10">Pruefung</text>
    <text x="80" y="480" font-weight="700" fill="#065f46">Einheiten</text>
    <text x="80" y="495" font-size="10">granular</text>

    <text x="1060" y="180" font-weight="700" fill="#991b1b" text-anchor="start">teuer</text>
    <text x="1060" y="195" font-size="10">langsam</text>
    <text x="1060" y="260" font-weight="700" fill="#b45309">mittel</text>
    <text x="1060" y="360" font-weight="700" fill="#6b21a8">aufwendig</text>
    <text x="1060" y="480" font-weight="700" fill="#065f46">schnell</text>
    <text x="1060" y="495" font-size="10">billig</text>
  </g>

  <!-- Key insight -->
  <g filter="url(#sh41)">
    <rect x="80" y="600" width="1040" height="160" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="600" y="628" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Warum diese Pyramide anders aussieht als die klassische</text>
    <text x="100" y="656" font-size="11" fill="#1e40af">&#8226;  <tspan font-weight="700">Breit bei Unit + Dual-Run</tspan>: Die semantische Aequivalenz ist der wichtigste Qualitaetstreiber — und Dual-Run ist dafuer das staerkste Werkzeug.</text>
    <text x="100" y="676" font-size="11" fill="#1e40af">&#8226;  <tspan font-weight="700">Schmal bei E2E</tspan>: nicht weil sie unwichtig sind, sondern weil Dual-Run fast alle Probleme vorher fängt.</text>
    <text x="100" y="696" font-size="11" fill="#1e40af">&#8226;  <tspan font-weight="700">Property-Tests sind Teil von Unit</tspan>: sie finden Edge-Cases, die handgeschriebene Tests uebersehen — besonders bei FIXED-DECIMAL.</text>
    <text x="100" y="716" font-size="11" fill="#1e40af">&#8226;  <tspan font-weight="700">Shadow-Traffic als Go-Live-Vehikel</tspan>: Die 5 % oben sind das Tor zur Produktion — nicht nur "Deckel".</text>
    <text x="100" y="736" font-size="11" fill="#1e40af">&#8226;  <tspan font-weight="700">Mutation-Tests (PIT) sind quer dazu</tspan>: sie messen die Qualitaet der Testsuite selbst.</text>
  </g>
</svg>
