<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh60" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="720" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Umgang mit Third-Party-Dependencies</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Die versteckten Abhaengigkeiten, die jedes PL/I-Projekt ausbremsen koennen</text>

  <!-- Typical dependencies -->
  <g filter="url(#sh60)">
    <rect x="60" y="110" width="280" height="180" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="60" y="110" width="280" height="36" rx="12" fill="#2563eb"/>
    <text x="200" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CA-Easytrieve</text>
    <text x="76" y="164" font-size="11" fill="#0f172a">Berichts-Generator fuer</text>
    <text x="76" y="180" font-size="11" fill="#0f172a">Mainframe-Batch</text>
    <text x="76" y="204" font-size="11" font-weight="700" fill="#1e3a8a">Typische Einsatzgebiete:</text>
    <text x="76" y="220" font-size="10" fill="#334155">&#8226;  Reporting fuer Management</text>
    <text x="76" y="234" font-size="10" fill="#334155">&#8226;  Compliance-Reports</text>
    <text x="76" y="248" font-size="10" fill="#334155">&#8226;  Tagesend-Auswertungen</text>
    <text x="76" y="272" font-size="10" font-style="italic" fill="#1e40af">Zielsystem: QuickSight + SQL</text>
  </g>

  <g filter="url(#sh60)">
    <rect x="360" y="110" width="280" height="180" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="360" y="110" width="280" height="36" rx="12" fill="#f59e0b"/>
    <text x="500" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">SAS Analytics</text>
    <text x="376" y="164" font-size="11" fill="#0f172a">Statistisches System</text>
    <text x="376" y="180" font-size="11" fill="#0f172a">SAS/BASE, SAS/STAT</text>
    <text x="376" y="204" font-size="11" font-weight="700" fill="#78350f">Einsatz bei:</text>
    <text x="376" y="220" font-size="10" fill="#334155">&#8226;  Aktuariat (Versicherung)</text>
    <text x="376" y="234" font-size="10" fill="#334155">&#8226;  Risk-Modelling (Banken)</text>
    <text x="376" y="248" font-size="10" fill="#334155">&#8226;  Data Science Legacy</text>
    <text x="376" y="272" font-size="10" font-style="italic" fill="#b45309">Zielsystem: SageMaker + Python</text>
  </g>

  <g filter="url(#sh60)">
    <rect x="660" y="110" width="280" height="180" rx="12" fill="#ffffff" stroke="#7b2cbf" stroke-width="2.5"/>
    <rect x="660" y="110" width="280" height="36" rx="12" fill="#7b2cbf"/>
    <text x="800" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Adabas/Natural</text>
    <text x="676" y="164" font-size="11" fill="#0f172a">Nicht-relationale</text>
    <text x="676" y="180" font-size="11" fill="#0f172a">Datenbank + 4GL</text>
    <text x="676" y="204" font-size="11" font-weight="700" fill="#6b21a8">Herausforderung:</text>
    <text x="676" y="220" font-size="10" fill="#334155">&#8226;  Hierarchische Strukturen</text>
    <text x="676" y="234" font-size="10" fill="#334155">&#8226;  Multi-Value-Felder (MU)</text>
    <text x="676" y="248" font-size="10" fill="#334155">&#8226;  Periodic Groups (PE)</text>
    <text x="676" y="272" font-size="10" font-style="italic" fill="#6b21a8">Zielsystem: DynamoDB oder Aurora JSON</text>
  </g>

  <g filter="url(#sh60)">
    <rect x="960" y="110" width="220" height="180" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
    <rect x="960" y="110" width="220" height="36" rx="12" fill="#dc2626"/>
    <text x="1070" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Legacy ohne Source</text>
    <text x="976" y="164" font-size="11" font-weight="700" fill="#991b1b">Worst-Case:</text>
    <text x="976" y="182" font-size="10" fill="#334155">Veraltete eigene Module</text>
    <text x="976" y="196" font-size="10" fill="#334155">ohne Source-Code</text>
    <text x="976" y="220" font-size="10" fill="#334155">Nur Object-Code +</text>
    <text x="976" y="234" font-size="10" fill="#334155">Entry-Point-Names</text>
    <text x="976" y="258" font-size="10" font-style="italic" fill="#7f1d1d">Dekompilieren oder</text>
    <text x="976" y="272" font-size="10" font-style="italic" fill="#7f1d1d">Hersteller fragen</text>
  </g>

  <!-- Decision flow -->
  <g filter="url(#sh60)">
    <rect x="60" y="320" width="1120" height="290" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="620" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Entscheidungs-Flow fuer jede Dependency</text>

    <g transform="translate(120, 390)">
      <rect x="0" y="0" width="220" height="60" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Frage 1:</text>
      <text x="110" y="46" text-anchor="middle" font-size="10" fill="#334155">Java-/Cloud-Aequivalent?</text>
    </g>
    <g transform="translate(400, 390)">
      <rect x="0" y="0" width="220" height="60" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Frage 2:</text>
      <text x="110" y="46" text-anchor="middle" font-size="10" fill="#334155">Kann weiterlaufen?</text>
    </g>
    <g transform="translate(680, 390)">
      <rect x="0" y="0" width="220" height="60" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Frage 3:</text>
      <text x="110" y="46" text-anchor="middle" font-size="10" fill="#334155">Kann ersetzt werden?</text>
    </g>
    <g transform="translate(960, 390)">
      <rect x="0" y="0" width="160" height="60" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
      <text x="80" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Wenn alles Nein:</text>
      <text x="80" y="46" text-anchor="middle" font-size="10" fill="#7f1d1d">Projekt-Stopp</text>
    </g>

    <g font-size="11" fill="#334155">
      <text x="80" y="486">&#8226;  <tspan font-weight="700">Vor der Migration klaeren</tspan>: jede Third-Party-Komponente identifizieren (Assessment-Agent-Aufgabe)</text>
      <text x="80" y="504">&#8226;  <tspan font-weight="700">Komponenten ohne Source-Code</tspan>: Zuerst dekompilieren oder mit Hersteller sprechen — vor der Transform-Phase</text>
      <text x="80" y="522">&#8226;  <tspan font-weight="700">Alternativen pruefen</tspan>: SaaS-Angebote, Open-Source-Ersatz, eigene Entwicklung</text>
      <text x="80" y="540">&#8226;  <tspan font-weight="700">Dependency-Entscheidung dokumentieren</tspan>: ADR fuer jede Third-Party mit Rationale</text>
      <text x="80" y="558">&#8226;  <tspan font-weight="700">Cut-Off-Termin setzen</tspan>: Ab wann duerfen keine neuen Dependencies mehr in die Legacy-Basis?</text>
      <text x="80" y="580">&#8226;  <tspan font-weight="700">Risiko-Bewertung</tspan>: Welche Dependency ist Show-Stopper, welche optional?</text>
    </g>
  </g>

  <!-- Bottom -->
  <g filter="url(#sh60)">
    <rect x="60" y="630" width="1120" height="70" rx="12" fill="#0f172a"/>
    <text x="620" y="660" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Third-Party-Dependencies sind oft der Grund, warum Projekte 6 Monate haengen</text>
    <text x="620" y="682" text-anchor="middle" font-size="11" fill="#cbd5e1">Assessment-Phase muss ALLE Dependencies vollstaendig erfassen — nicht "nur die wichtigen".</text>
  </g>
</svg>
