<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow12" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Lessons Learned aus der Praxis</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#475569">Sechs Erkenntnisse, die jedes PL/I-Projekt in den ersten Wochen verinnerlichen muss</text>

  <!-- Lesson 1: Preprocessor-Expansion zuerst -->
  <g filter="url(#shadow12)">
    <rect x="60" y="110" width="540" height="180" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="60" y="110" width="540" height="36" rx="12" fill="#dc2626"/>
    <circle cx="90" cy="128" r="14" fill="#ffffff"/>
    <text x="90" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">1</text>
    <text x="120" y="134" font-size="14" font-weight="700" fill="#ffffff">Preprocessor-Expansion zuerst</text>
    <text x="76" y="168" font-size="11" fill="#0f172a">Jedes Projekt, das die Expansion nicht vor der ersten</text>
    <text x="76" y="184" font-size="11" fill="#0f172a">Transform-Pipeline kontrolliert, zahlt spaeter den Preis</text>
    <text x="76" y="200" font-size="11" fill="#0f172a">in Form instabiler Transformationen.</text>
    <text x="76" y="226" font-size="11" font-weight="700" fill="#991b1b">→ Originalen IBM Compiler im -PP-Modus nutzen</text>
    <text x="76" y="244" font-size="11" font-weight="700" fill="#991b1b">→ S3 mit Versionierung als Single Source of Truth</text>
    <text x="76" y="262" font-size="11" font-weight="700" fill="#991b1b">→ Jede Preprozessor-Aenderung = neue Transform-Runde</text>
    <text x="76" y="278" font-size="10" font-style="italic" fill="#64748b">Preprocessor-Chaos ist Fehlerursache Nr. 1</text>
  </g>

  <!-- Lesson 2: Exakte Dezimalarithmetik mit Dual-Run -->
  <g filter="url(#shadow12)">
    <rect x="620" y="110" width="540" height="180" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <rect x="620" y="110" width="540" height="36" rx="12" fill="#f59e0b"/>
    <circle cx="650" cy="128" r="14" fill="#ffffff"/>
    <text x="650" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">2</text>
    <text x="680" y="134" font-size="14" font-weight="700" fill="#ffffff">FIXED DECIMAL mit Dual-Run validieren</text>
    <text x="636" y="168" font-size="11" fill="#0f172a">BigDecimal-basiert ist nicht automatisch identisch zu</text>
    <text x="636" y="184" font-size="11" fill="#0f172a">PL/I-FIXED DECIMAL — intermediate precision weicht ab.</text>
    <text x="636" y="200" font-size="11" fill="#0f172a">Differenzen findet man nur im systematischen Vergleich.</text>
    <text x="636" y="226" font-size="11" font-weight="700" fill="#92400e">→ Dual-Run pro kritische Funktion</text>
    <text x="636" y="244" font-size="11" font-weight="700" fill="#92400e">→ Katalog mit Rundungs-Kippstellen bauen</text>
    <text x="636" y="262" font-size="11" font-weight="700" fill="#92400e">→ Byte-genauer Vergleich gegen das Original</text>
    <text x="636" y="278" font-size="10" font-style="italic" fill="#64748b">1 Cent Abweichung = unakzeptabel im Finanzumfeld</text>
  </g>

  <!-- Lesson 3: Pointer-Graph verstehen -->
  <g filter="url(#shadow12)">
    <rect x="60" y="310" width="540" height="180" rx="12" fill="#ffffff" stroke="#7b2cbf" stroke-width="3"/>
    <rect x="60" y="310" width="540" height="36" rx="12" fill="#7b2cbf"/>
    <circle cx="90" cy="328" r="14" fill="#ffffff"/>
    <text x="90" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#7b2cbf">3</text>
    <text x="120" y="334" font-size="14" font-weight="700" fill="#ffffff">Pointer-Graph zuerst verstehen</text>
    <text x="76" y="368" font-size="11" fill="#0f172a">Vor dem Transform die Pointer-Abhaengigkeiten</text>
    <text x="76" y="384" font-size="11" fill="#0f172a">statisch analysieren — besonders BASED-Variablen mit</text>
    <text x="76" y="400" font-size="11" fill="#0f172a">beweglichen Pointern.</text>
    <text x="76" y="426" font-size="11" font-weight="700" fill="#6b21a8">→ Mainframe Dependencies Engine nutzen</text>
    <text x="76" y="444" font-size="11" font-weight="700" fill="#6b21a8">→ Eigener Pointer-Analyzer als Ergaenzung</text>
    <text x="76" y="462" font-size="11" font-weight="700" fill="#6b21a8">→ Alias-Hotspots explizit dokumentieren</text>
    <text x="76" y="478" font-size="10" font-style="italic" fill="#64748b">Unsichtbare Aliasing-Fehler sind nie &quot;reproduzierbar&quot;</text>
  </g>

  <!-- Lesson 4: ON-Unit-Verhalten sichtbar machen -->
  <g filter="url(#shadow12)">
    <rect x="620" y="310" width="540" height="180" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="620" y="310" width="540" height="36" rx="12" fill="#2563eb"/>
    <circle cx="650" cy="328" r="14" fill="#ffffff"/>
    <text x="650" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">4</text>
    <text x="680" y="334" font-size="14" font-weight="700" fill="#ffffff">ON-Unit-Verhalten sichtbar machen</text>
    <text x="636" y="368" font-size="11" fill="#0f172a">Einen expliziten Handler-Stack-Layer aufsetzen,</text>
    <text x="636" y="384" font-size="11" fill="#0f172a">der im Logging sichtbar ist. Sonst laesst sich ein</text>
    <text x="636" y="400" font-size="11" fill="#0f172a">abweichendes Verhalten spaeter nie reproduzieren.</text>
    <text x="636" y="426" font-size="11" font-weight="700" fill="#1e40af">→ OnUnitHandlerStack als first-class object</text>
    <text x="636" y="444" font-size="11" font-weight="700" fill="#1e40af">→ Push/Pop in CloudWatch mit Trace-ID loggen</text>
    <text x="636" y="462" font-size="11" font-weight="700" fill="#1e40af">→ Reihenfolge als Trace-Eigenschaft pruefen</text>
    <text x="636" y="478" font-size="10" font-style="italic" fill="#64748b">Dynamisches Scoping ist nicht naiv uebersetzbar</text>
  </g>

  <!-- Lesson 5: Multitasking immer manuell reviewen -->
  <g filter="url(#shadow12)">
    <rect x="60" y="510" width="540" height="180" rx="12" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="60" y="510" width="540" height="36" rx="12" fill="#059669"/>
    <circle cx="90" cy="528" r="14" fill="#ffffff"/>
    <text x="90" y="534" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">5</text>
    <text x="120" y="534" font-size="14" font-weight="700" fill="#ffffff">Multitasking-Code manuell reviewen</text>
    <text x="76" y="568" font-size="11" fill="#0f172a">Automatisch generierter Java-Concurrency-Code ist</text>
    <text x="76" y="584" font-size="11" fill="#0f172a">ohne manuelle Validierung nicht vertrauenswuerdig.</text>
    <text x="76" y="600" font-size="11" fill="#0f172a">Race Conditions zeigen sich selten im Entwicklertest.</text>
    <text x="76" y="626" font-size="11" font-weight="700" fill="#065f46">→ Property-basierte Tests gegen Race Conditions</text>
    <text x="76" y="644" font-size="11" font-weight="700" fill="#065f46">→ Chaos-Testing fuer ExecutorService-Muster</text>
    <text x="76" y="662" font-size="11" font-weight="700" fill="#065f46">→ Shared-State explizit synchronisieren</text>
    <text x="76" y="678" font-size="10" font-style="italic" fill="#64748b">PL/I-Task-Scheduling &#8800; Java-Thread-Scheduling</text>
  </g>

  <!-- Lesson 6: Nested Procedures nicht in inner classes -->
  <g filter="url(#shadow12)">
    <rect x="620" y="510" width="540" height="180" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="3"/>
    <rect x="620" y="510" width="540" height="36" rx="12" fill="#0891b2"/>
    <circle cx="650" cy="528" r="14" fill="#ffffff"/>
    <text x="650" y="534" text-anchor="middle" font-size="14" font-weight="700" fill="#0891b2">6</text>
    <text x="680" y="534" font-size="14" font-weight="700" fill="#ffffff">Nested Procedures nicht erzwingen</text>
    <text x="636" y="568" font-size="11" fill="#0f172a">Wenn der Scope klein ist: inner class ist OK.</text>
    <text x="636" y="584" font-size="11" fill="#0f172a">Wenn nicht: strukturell zu Services/Aggregaten</text>
    <text x="636" y="600" font-size="11" fill="#0f172a">umbauen — explizites State-Objekt statt Capture.</text>
    <text x="636" y="626" font-size="11" font-weight="700" fill="#0e7490">→ Scope &gt; 50 LOC → Service-Refactor</text>
    <text x="636" y="644" font-size="11" font-weight="700" fill="#0e7490">→ Lambda-Capture nur fuer Single-Use</text>
    <text x="636" y="662" font-size="11" font-weight="700" fill="#0e7490">→ State-Objekt als explizites Record</text>
    <text x="636" y="678" font-size="10" font-style="italic" fill="#64748b">Gezwungene inner classes werden unleserlich</text>
  </g>

  <text x="600" y="740" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">Jede Lesson ist durch reale Kundenprojekte (AWS + IBM + Third-Party) belegt — Details in _quellen.md</text>
</svg>
