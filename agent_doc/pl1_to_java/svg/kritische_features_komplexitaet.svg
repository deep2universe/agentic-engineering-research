<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="complexityGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="50%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <filter id="shadow10" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Die kritischen PL/I-Features im Detail</text>
  <text x="620" y="66" text-anchor="middle" font-size="14" fill="#475569">Komplexitaets-Landschaft: Je weiter rechts, desto mehr manueller Senior-Review</text>

  <!-- Complexity axis -->
  <rect x="80" y="720" width="1080" height="18" rx="9" fill="url(#complexityGrad)" filter="url(#shadow10)"/>
  <text x="100" y="760" font-size="12" font-weight="700" fill="#065f46">niedrig</text>
  <text x="615" y="760" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">mittel-hoch</text>
  <text x="1140" y="760" text-anchor="end" font-size="12" font-weight="700" fill="#991b1b">hoch / kritisch</text>

  <!-- Feature bubbles positioned by complexity -->
  <!-- Low complexity cluster (left) -->
  <g filter="url(#shadow10)">
    <circle cx="210" cy="280" r="72" fill="#d1fae5" stroke="#059669" stroke-width="3"/>
    <text x="210" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#064e3b">Rekursion</text>
    <text x="210" y="284" text-anchor="middle" font-size="10" fill="#065f46">Standard-Java</text>
    <text x="210" y="298" text-anchor="middle" font-size="10" fill="#065f46">direkt abbildbar</text>
  </g>

  <!-- Medium cluster -->
  <g filter="url(#shadow10)">
    <circle cx="430" cy="180" r="80" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="430" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">FIXED DECIMAL</text>
    <text x="430" y="180" text-anchor="middle" font-size="10" fill="#9a3412">BigDecimal mit</text>
    <text x="430" y="194" text-anchor="middle" font-size="10" fill="#9a3412">MathContext &amp; strikter</text>
    <text x="430" y="208" text-anchor="middle" font-size="10" fill="#9a3412">Intermediate Precision</text>
  </g>

  <g filter="url(#shadow10)">
    <circle cx="500" cy="380" r="75" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="500" y="367" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">PICTURE-Typen</text>
    <text x="500" y="384" text-anchor="middle" font-size="10" fill="#9a3412">DecimalFormat</text>
    <text x="500" y="398" text-anchor="middle" font-size="10" fill="#9a3412">Custom-Formatter</text>
  </g>

  <g filter="url(#shadow10)">
    <circle cx="440" cy="560" r="80" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="440" y="543" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">CONTROLLED</text>
    <text x="440" y="560" text-anchor="middle" font-size="10" fill="#9a3412">Deque-Stack</text>
    <text x="440" y="574" text-anchor="middle" font-size="10" fill="#9a3412">pro Variable</text>
    <text x="440" y="588" text-anchor="middle" font-size="10" fill="#9a3412">(allocate/free)</text>
  </g>

  <g filter="url(#shadow10)">
    <circle cx="680" cy="240" r="85" fill="#fed7aa" stroke="#ea580c" stroke-width="3"/>
    <text x="680" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Nested Procedures</text>
    <text x="680" y="240" text-anchor="middle" font-size="10" fill="#9a3412">Inner classes oder</text>
    <text x="680" y="254" text-anchor="middle" font-size="10" fill="#9a3412">Service-Refactor</text>
    <text x="680" y="268" text-anchor="middle" font-size="10" fill="#9a3412">mit State-Objekt</text>
  </g>

  <!-- High complexity cluster (right) -->
  <g filter="url(#shadow10)">
    <circle cx="900" cy="200" r="90" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="900" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">BASED / Pointer</text>
    <text x="900" y="200" text-anchor="middle" font-size="10" fill="#7f1d1d">ByteBuffer-Layout</text>
    <text x="900" y="214" text-anchor="middle" font-size="10" fill="#7f1d1d">oder POJO-Refactor</text>
    <text x="900" y="228" text-anchor="middle" font-size="10" fill="#7f1d1d">(Java Panama optional)</text>
    <text x="900" y="244" text-anchor="middle" font-size="9" font-style="italic" fill="#dc2626">Senior-Review Pflicht</text>
  </g>

  <g filter="url(#shadow10)">
    <circle cx="1080" cy="340" r="85" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="1080" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">AREA</text>
    <text x="1080" y="340" text-anchor="middle" font-size="10" fill="#7f1d1d">DirectByteBuffer</text>
    <text x="1080" y="354" text-anchor="middle" font-size="10" fill="#7f1d1d">+ Allokator oder</text>
    <text x="1080" y="368" text-anchor="middle" font-size="10" fill="#7f1d1d">LinkedHashMap-Refactor</text>
  </g>

  <g filter="url(#shadow10)">
    <circle cx="880" cy="450" r="95" fill="#fecaca" stroke="#b91c1c" stroke-width="3"/>
    <text x="880" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">ON-Units</text>
    <text x="880" y="448" text-anchor="middle" font-size="10" fill="#7f1d1d">ThreadLocal-Stack + Exceptions</text>
    <text x="880" y="462" text-anchor="middle" font-size="10" fill="#7f1d1d">Dynamisches Scoping!</text>
    <text x="880" y="476" text-anchor="middle" font-size="10" fill="#7f1d1d">OnUnitHandlerStack</text>
    <text x="880" y="494" text-anchor="middle" font-size="9" font-style="italic" fill="#991b1b">Nicht naiv zu try/catch!</text>
  </g>

  <g filter="url(#shadow10)">
    <circle cx="1080" cy="560" r="90" fill="#fecaca" stroke="#b91c1c" stroke-width="3"/>
    <text x="1080" y="538" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">TASK / EVENT / WAIT</text>
    <text x="1080" y="558" text-anchor="middle" font-size="10" fill="#7f1d1d">ExecutorService +</text>
    <text x="1080" y="572" text-anchor="middle" font-size="10" fill="#7f1d1d">CompletableFuture</text>
    <text x="1080" y="586" text-anchor="middle" font-size="10" fill="#7f1d1d">Multi-Thread-Race Tests!</text>
    <text x="1080" y="604" text-anchor="middle" font-size="9" font-style="italic" fill="#991b1b">Immer manuell reviewen</text>
  </g>

  <g filter="url(#shadow10)">
    <circle cx="700" cy="600" r="105" fill="#fecaca" stroke="#b91c1c" stroke-width="3"/>
    <text x="700" y="578" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Preprocessor</text>
    <text x="700" y="596" text-anchor="middle" font-size="10" fill="#7f1d1d">%INCLUDE, %MACRO,</text>
    <text x="700" y="610" text-anchor="middle" font-size="10" fill="#7f1d1d">%PROCEDURE, %IF</text>
    <text x="700" y="626" text-anchor="middle" font-size="10" fill="#7f1d1d">Muss VOR Transform</text>
    <text x="700" y="640" text-anchor="middle" font-size="10" fill="#7f1d1d">expandiert sein!</text>
    <text x="700" y="660" text-anchor="middle" font-size="9" font-weight="700" font-style="italic" fill="#991b1b">Wichtigste Regel!</text>
  </g>

  <!-- Legend -->
  <g font-size="11" fill="#334155">
    <text x="95" y="105" font-weight="700" fill="#0f172a">Legende Schwierigkeit:</text>
    <circle cx="250" cy="101" r="9" fill="#d1fae5" stroke="#059669"/>
    <text x="265" y="105">niedrig (auto-mapping)</text>
    <circle cx="420" cy="101" r="9" fill="#fef3c7" stroke="#d97706"/>
    <text x="435" y="105">mittel (mit Review)</text>
    <circle cx="580" cy="101" r="9" fill="#fee2e2" stroke="#dc2626"/>
    <text x="595" y="105">hoch (Senior-Review Pflicht)</text>
    <circle cx="790" cy="101" r="9" fill="#fecaca" stroke="#b91c1c"/>
    <text x="805" y="105">kritisch (Golden-Master &amp; Dual-Run)</text>
  </g>
</svg>
