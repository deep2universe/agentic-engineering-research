<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh56" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Technische Best Practices</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Neun Patterns fuer den Engineering-Alltag — jede mit konkreter Senior-Regel</text>

  <g filter="url(#sh56)">
    <rect x="60" y="110" width="380" height="200" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
    <rect x="60" y="110" width="380" height="34" rx="12" fill="#dc2626"/>
    <text x="250" y="131" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1 · Preprocessor-Expansion reproduzierbar</text>
    <text x="76" y="162" font-size="11" font-weight="700" fill="#0f172a">Immer mit originalem IBM-Compiler im -PP-Modus</text>
    <text x="76" y="182" font-size="10" fill="#334155">&#8226;  Expandierte Sourcen in S3 mit Versionierung</text>
    <text x="76" y="198" font-size="10" fill="#334155">&#8226;  "Single Source of Truth" fuer alle Transform-Laeufe</text>
    <text x="76" y="214" font-size="10" fill="#334155">&#8226;  Makro-Aenderungen &#8594; re-expandieren &#8594; re-transformieren</text>
    <text x="76" y="240" font-size="11" font-weight="700" fill="#991b1b">Kein LLM-Preprocessor-Ersatz!</text>
    <text x="76" y="268" font-size="10" font-style="italic" fill="#dc2626">Die wichtigste Technik-Regel im Projekt.</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="460" y="110" width="380" height="200" rx="12" fill="#ffffff" stroke="#7b2cbf" stroke-width="2.5"/>
    <rect x="460" y="110" width="380" height="34" rx="12" fill="#7b2cbf"/>
    <text x="650" y="131" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2 · Pointer-Lebenszyklus dokumentieren</text>
    <text x="476" y="162" font-size="11" font-weight="700" fill="#0f172a">Fuer jedes BASED / CONTROLLED / POINTER:</text>
    <text x="476" y="184" font-size="10" fill="#334155">&#9633;  Wer allokiert?</text>
    <text x="476" y="200" font-size="10" fill="#334155">&#9633;  Wer dereferenziert?</text>
    <text x="476" y="216" font-size="10" fill="#334155">&#9633;  Wer gibt frei?</text>
    <text x="476" y="232" font-size="10" fill="#334155">&#9633;  Was passiert bei Fehler?</text>
    <text x="476" y="258" font-size="11" font-weight="700" fill="#6b21a8">Taucht in Kommentaren und Tests auf</text>
    <text x="476" y="280" font-size="10" font-style="italic" fill="#6b21a8">Grundlage fuer den Pl1Pointer-Utility-Layer.</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="860" y="110" width="320" height="200" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="860" y="110" width="320" height="34" rx="12" fill="#f59e0b"/>
    <text x="1020" y="131" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3 · Pl1Decimal-Utility</text>
    <text x="876" y="162" font-size="11" font-weight="700" fill="#0f172a">FIXED-DECIMAL einkapseln!</text>
    <text x="876" y="184" font-size="10" fill="#334155">Zentrale Klasse die:</text>
    <text x="876" y="200" font-size="10" fill="#334155">&#8226;  MathContext durchsetzt</text>
    <text x="876" y="216" font-size="10" fill="#334155">&#8226;  RoundingMode dokumentiert</text>
    <text x="876" y="232" font-size="10" fill="#334155">&#8226;  Range-Validierung macht</text>
    <text x="876" y="248" font-size="10" fill="#334155">&#8226;  ToString/Parse einheitlich bietet</text>
    <text x="876" y="272" font-size="10" font-style="italic" fill="#b45309">Alle FIXED-DECIMAL-Ops durch diese Klasse.</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="60" y="330" width="380" height="200" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="60" y="330" width="380" height="34" rx="12" fill="#2563eb"/>
    <text x="250" y="351" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4 · ON-Units nicht auf try/catch vereinfachen</text>
    <text x="76" y="382" font-size="11" fill="#0f172a">PL/I-ON-Units haben dynamisches Scoping</text>
    <text x="76" y="398" font-size="11" fill="#0f172a">und koennen zur Laufzeit geaendert werden.</text>
    <text x="76" y="424" font-size="11" font-weight="700" fill="#1e3a8a">Korrekt: OnUnitHandlerStack</text>
    <text x="76" y="440" font-size="10" fill="#334155">ThreadLocal-Stack pro Condition</text>
    <text x="76" y="456" font-size="10" fill="#334155">Handler beim Prozedur-Eintritt pushen,</text>
    <text x="76" y="472" font-size="10" fill="#334155">beim Verlassen poppen</text>
    <text x="76" y="498" font-size="10" font-style="italic" fill="#1e40af">Naive try/catch-Uebersetzung bricht!</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="460" y="330" width="380" height="200" rx="12" fill="#ffffff" stroke="#059669" stroke-width="2.5"/>
    <rect x="460" y="330" width="380" height="34" rx="12" fill="#059669"/>
    <text x="650" y="351" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5 · VSAM-Zugriffspfade bewahren</text>
    <text x="476" y="382" font-size="11" fill="#0f172a">VSAM-KSDS mit Alternative Index</text>
    <text x="476" y="398" font-size="11" fill="#0f172a">muessen in Aurora/DynamoDB explizit</text>
    <text x="476" y="414" font-size="11" fill="#0f172a">als Tabellen+Indexe nachgebildet werden.</text>
    <text x="476" y="444" font-size="11" font-weight="700" fill="#991b1b">Vergessene AIX &#8594; 100x langsame Queries</text>
    <text x="476" y="466" font-size="10" fill="#334155">&#8226;  Primary Key = VSAM Primary</text>
    <text x="476" y="482" font-size="10" fill="#334155">&#8226;  Secondary Index = Alternative Index</text>
    <text x="476" y="498" font-size="10" fill="#334155">&#8226;  Query-Patterns aus PL/I-Code extrahieren</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="860" y="330" width="320" height="200" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="2.5"/>
    <rect x="860" y="330" width="320" height="34" rx="12" fill="#0891b2"/>
    <text x="1020" y="351" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6 · CICS Pseudo-Conversational</text>
    <text x="876" y="382" font-size="11" font-weight="700" fill="#0f172a">Modell bewahren!</text>
    <text x="876" y="402" font-size="10" fill="#334155">PL/I-CICS-Code ist pseudo-</text>
    <text x="876" y="416" font-size="10" fill="#334155">conversational. Jede Interaktion</text>
    <text x="876" y="430" font-size="10" fill="#334155">ist eine eigene Transaktion, der</text>
    <text x="876" y="444" font-size="10" fill="#334155">Zustand in COMMAREA/Container.</text>
    <text x="876" y="466" font-size="10" fill="#334155">Java-Umsetzung muss dieses</text>
    <text x="876" y="480" font-size="10" fill="#334155">Modell bewahren (REST + Redis).</text>
    <text x="876" y="504" font-size="10" font-style="italic" fill="#0e7490">Sonst: Stateful-Monolith!</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="60" y="550" width="380" height="200" rx="12" fill="#ffffff" stroke="#ea580c" stroke-width="2.5"/>
    <rect x="60" y="550" width="380" height="34" rx="12" fill="#ea580c"/>
    <text x="250" y="571" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">7 · Batch-Windows respektieren</text>
    <text x="76" y="602" font-size="11" fill="#0f172a">Mainframe-Batch-Jobs laufen oft in</text>
    <text x="76" y="618" font-size="11" fill="#0f172a">festen Batch-Windows (z. B. 02:00–06:00).</text>
    <text x="76" y="646" font-size="11" font-weight="700" fill="#c2410c">Java-Fassung muss dasselbe Budget einhalten</text>
    <text x="76" y="664" font-size="11" font-weight="700" fill="#c2410c">— besser noch unterbieten</text>
    <text x="76" y="690" font-size="10" fill="#334155">&#8226;  Performance-Tests sind PFLICHT, nicht Kuer</text>
    <text x="76" y="706" font-size="10" fill="#334155">&#8226;  Profiling vor der Migration</text>
    <text x="76" y="722" font-size="10" fill="#334155">&#8226;  Parallele Ausfuehrung wo moeglich</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="460" y="550" width="380" height="200" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
    <rect x="460" y="550" width="380" height="34" rx="12" fill="#7c3aed"/>
    <text x="650" y="571" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">8 · EBCDIC vs. UTF-8</text>
    <text x="476" y="602" font-size="11" font-weight="700" fill="#0f172a">Expliziter Encoding-Konversionsschritt</text>
    <text x="476" y="624" font-size="10" fill="#334155">&#8226;  S3 als Zwischenablage</text>
    <text x="476" y="640" font-size="10" fill="#334155">&#8226;  Sortier-Reihenfolge beachten!</text>
    <text x="476" y="656" font-size="10" fill="#334155">   EBCDIC-Sort &#8800; ASCII/UTF-8-Sort</text>
    <text x="476" y="672" font-size="10" fill="#334155">&#8226;  Downstream-Jobs pruefen</text>
    <text x="476" y="692" font-size="10" fill="#334155">&#8226;  Edge-Cases: Umlaute, DBCS,</text>
    <text x="476" y="706" font-size="10" fill="#334155">   Euro, Control-Character</text>
    <text x="476" y="728" font-size="10" font-style="italic" fill="#6d28d9">Kann Reports komplett zerbrechen!</text>
  </g>

  <g filter="url(#sh56)">
    <rect x="860" y="550" width="320" height="200" rx="12" fill="#ffffff" stroke="#db2777" stroke-width="2.5"/>
    <rect x="860" y="550" width="320" height="34" rx="12" fill="#db2777"/>
    <text x="1020" y="571" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">9 · Dezimal- vs Lex-Sort</text>
    <text x="876" y="602" font-size="11" font-weight="700" fill="#0f172a">Klassischer Produktionsfehler:</text>
    <text x="876" y="622" font-size="10" fill="#334155">PL/I-FIXED-DECIMAL-Sort = numerisch</text>
    <text x="876" y="638" font-size="10" fill="#334155">Naive Java-String-Sort = lexikalisch</text>
    <text x="876" y="662" font-size="10" font-family="monospace" fill="#991b1b">"0","1","10","11","2",...</text>
    <text x="876" y="682" font-size="10" fill="#334155">Loesung:</text>
    <text x="876" y="698" font-size="10" font-family="monospace" fill="#334155">Comparator.comparing(</text>
    <text x="876" y="712" font-size="10" font-family="monospace" fill="#334155">  BigDecimal::new)</text>
    <text x="876" y="732" font-size="10" font-style="italic" fill="#9d174d">Immer numerische Sortierung nutzen!</text>
  </g>
</svg>
