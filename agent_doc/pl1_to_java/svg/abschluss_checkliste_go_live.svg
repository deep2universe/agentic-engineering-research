<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh63" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Abschluss-Checkliste vor Go-Live eines Moduls</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Dreizehn Punkte, die ALLE gruen sein muessen — keine Ausnahmen</text>

  <!-- Central document icon -->
  <g filter="url(#sh63)">
    <rect x="420" y="110" width="400" height="660" rx="14" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="420" y="110" width="400" height="48" rx="14" fill="#0f172a"/>
    <text x="620" y="142" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">GO-LIVE CHECKLISTE</text>
  </g>

  <g font-size="12" fill="#0f172a">
    <!-- Checklist item 1 -->
    <rect x="440" y="180" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="198" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="199" font-weight="700">Preprocessor-Expansion reproduzierbar</text>
    <text x="476" y="214" font-size="10" fill="#64748b">Versioniert in S3, dokumentiert</text>

    <rect x="440" y="226" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="244" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="245" font-weight="700">Dependency-Graph komplett</text>
    <text x="476" y="260" font-size="10" fill="#64748b">Alle Calls, Includes, DB-Zugriffe erfasst</text>

    <rect x="440" y="272" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="290" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="291" font-weight="700">Unit-Tests &gt; 80 % Coverage, Mutation &gt; 60 %</text>
    <text x="476" y="306" font-size="10" fill="#64748b">Line + Branch + PIT-Score</text>

    <rect x="440" y="318" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="336" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="337" font-weight="700">Property-Tests fuer kritische Funktionen</text>
    <text x="476" y="352" font-size="10" fill="#64748b">jqwik + FIXED-DECIMAL + Pointer-Lifecycle</text>

    <rect x="440" y="364" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="382" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="383" font-weight="700">Dual-Run-Aequivalenz &gt; 99,99 %</text>
    <text x="476" y="398" font-size="10" fill="#64748b">PL/I vs Java auf mindestens 1000 Inputs</text>

    <rect x="440" y="410" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="428" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="429" font-weight="700">Shadow-Traffic &gt; 48 Stunden gruen</text>
    <text x="476" y="444" font-size="10" fill="#64748b">In Staging oder eingeschraenkter Produktion</text>

    <rect x="440" y="456" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="474" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="475" font-weight="700">Performance innerhalb Toleranz</text>
    <text x="476" y="490" font-size="10" fill="#64748b">+/- 20 % gegen PL/I-Baseline</text>

    <rect x="440" y="502" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="520" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="521" font-weight="700">Security-Review abgeschlossen</text>
    <text x="476" y="536" font-size="10" fill="#64748b">IAM, KMS, Dependency-Scan, Pen-Test</text>

    <rect x="440" y="548" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="566" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="567" font-weight="700">Audit-Trails aktiv</text>
    <text x="476" y="582" font-size="10" fill="#64748b">CloudTrail + CloudWatch Logs + Event-Store</text>

    <rect x="440" y="594" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="612" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="613" font-weight="700">Rollback-Plan dokumentiert</text>
    <text x="476" y="628" font-size="10" fill="#64748b">Schritt-fuer-Schritt, getestet in Staging</text>

    <rect x="440" y="640" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="658" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="659" font-weight="700">Ops-Team geschult</text>
    <text x="476" y="674" font-size="10" fill="#64748b">Runbooks + Training + Alerting-Uebung</text>

    <rect x="440" y="686" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="704" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="705" font-weight="700">ADRs geschrieben</text>
    <text x="476" y="720" font-size="10" fill="#64748b">Alle Architektur-Entscheidungen persistiert</text>

    <rect x="440" y="732" width="24" height="24" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <text x="452" y="750" text-anchor="middle" fill="#059669" font-weight="700" font-size="16">&#10003;</text>
    <text x="476" y="751" font-weight="700">Change Advisory Board approved</text>
    <text x="476" y="766" font-size="10" fill="#64748b">Compliance-Review + Business-Sign-off</text>
  </g>

  <!-- Side banner with insight -->
  <g filter="url(#sh63)">
    <rect x="60" y="180" width="340" height="350" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="230" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">HARTE GATES</text>
    <text x="78" y="240" font-size="11" fill="#7f1d1d">Jeder Punkt ist ein harter Gate.</text>
    <text x="78" y="256" font-size="11" fill="#7f1d1d">Kein "fast erreicht", kein "machen</text>
    <text x="78" y="272" font-size="11" fill="#7f1d1d">wir danach", kein "Ausnahmegenehmigung".</text>
    <text x="78" y="302" font-size="11" font-weight="700" fill="#0f172a">Wenn einer rot ist:</text>
    <text x="78" y="320" font-size="11" fill="#7f1d1d">Go-Live blockiert bis</text>
    <text x="78" y="336" font-size="11" fill="#7f1d1d">Gruen erreicht.</text>
    <text x="78" y="370" font-size="11" font-weight="700" fill="#0f172a">Wenn alles gruen:</text>
    <text x="78" y="388" font-size="11" fill="#7f1d1d">Go-Live mit Canary-Deployment</text>
    <text x="78" y="404" font-size="11" fill="#7f1d1d">+ 48h intensivem Monitoring</text>
    <text x="78" y="420" font-size="11" fill="#7f1d1d">+ War-Room besetzt</text>
    <text x="78" y="456" font-size="11" font-weight="700" fill="#991b1b">Kein Senior-Architekt</text>
    <text x="78" y="472" font-size="11" font-weight="700" fill="#991b1b">erlaubt Ausnahmen.</text>
    <text x="78" y="500" font-size="10" font-style="italic" fill="#dc2626">Die Zeitersparnis durch</text>
    <text x="78" y="514" font-size="10" font-style="italic" fill="#dc2626">Skipping ist spaeter verloren.</text>
  </g>

  <!-- Right side: Success pattern -->
  <g filter="url(#sh63)">
    <rect x="840" y="180" width="340" height="350" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="1010" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">GO-LIVE SUCCESS PATTERN</text>
    <text x="858" y="240" font-size="11" fill="#064e3b">Typische Schritte nach Checklisten-</text>
    <text x="858" y="256" font-size="11" fill="#064e3b">Gruen:</text>
    <text x="858" y="284" font-size="11" font-weight="700" fill="#047857">1. Canary 1 %</text>
    <text x="858" y="300" font-size="10" fill="#064e3b">Monitoring: Error-Rate, Latenz</text>
    <text x="858" y="322" font-size="11" font-weight="700" fill="#047857">2. Canary 10 %</text>
    <text x="858" y="338" font-size="10" fill="#064e3b">Nach 2h ohne Incidents</text>
    <text x="858" y="360" font-size="11" font-weight="700" fill="#047857">3. Canary 50 %</text>
    <text x="858" y="376" font-size="10" fill="#064e3b">Nach 6h + positiver Diff-Check</text>
    <text x="858" y="398" font-size="11" font-weight="700" fill="#047857">4. Full rollout 100 %</text>
    <text x="858" y="414" font-size="10" fill="#064e3b">Nach 24h stabil</text>
    <text x="858" y="436" font-size="11" font-weight="700" fill="#047857">5. Shadow weiter 7d</text>
    <text x="858" y="452" font-size="10" fill="#064e3b">Als zusaetzliche Sicherung</text>
    <text x="858" y="486" font-size="11" font-weight="700" fill="#065f46">6. Retrospektive</text>
    <text x="858" y="504" font-size="10" fill="#064e3b">Lessons Learned ins</text>
    <text x="858" y="518" font-size="10" fill="#064e3b">Katalog eintragen</text>
  </g>
</svg>
