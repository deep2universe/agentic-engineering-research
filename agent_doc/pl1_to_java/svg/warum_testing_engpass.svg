<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 740" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh40" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr40" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1240" height="740" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Warum Testing der Engpass in PL/I-Migrationen ist</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Non-obvious Semantik kann durch Transformation leicht verloren gehen — ohne Tests bleibt es unsichtbar</text>

  <!-- PL/I side -->
  <g filter="url(#sh40)">
    <rect x="80" y="120" width="380" height="440" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <rect x="80" y="120" width="380" height="44" rx="14" fill="#dc2626"/>
    <text x="270" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">PL/I Original</text>

    <text x="98" y="186" font-size="12" font-weight="700" fill="#991b1b">Non-obvious Semantik:</text>
    <g font-size="11" fill="#7f1d1d">
      <text x="98" y="212">&#8226;  FIXED-DECIMAL-Rundungsregeln</text>
      <text x="112" y="226" font-size="10" fill="#991b1b">(intermediate precision!)</text>
      <text x="98" y="250">&#8226;  ON-Unit-Reihenfolge</text>
      <text x="112" y="264" font-size="10" fill="#991b1b">(dynamisches Scoping!)</text>
      <text x="98" y="288">&#8226;  Pointer-Aliasing</text>
      <text x="112" y="302" font-size="10" fill="#991b1b">(zwei Pointer → selbe Adresse)</text>
      <text x="98" y="326">&#8226;  Preprocessor-generierter Code</text>
      <text x="112" y="340" font-size="10" fill="#991b1b">(zur Laufzeit materialisiert)</text>
      <text x="98" y="364">&#8226;  Multitasking-Race-Conditions</text>
      <text x="112" y="378" font-size="10" fill="#991b1b">(TASK/EVENT/WAIT-Reihenfolge)</text>
      <text x="98" y="402">&#8226;  I/O-Edge-Cases</text>
      <text x="112" y="416" font-size="10" fill="#991b1b">(Empty-Files, Short-Records,</text>
      <text x="112" y="428" font-size="10" fill="#991b1b">VSAM-Alternativschluessel)</text>
      <text x="98" y="452">&#8226;  EBCDIC-Sort-Reihenfolge</text>
      <text x="98" y="478">&#8226;  CICS-Pseudo-Conversational-State</text>
      <text x="98" y="504">&#8226;  MQ-Persistenz-Semantik</text>
      <text x="98" y="530">&#8226;  Legacy-Error-Conditions (ABEND)</text>
    </g>
  </g>

  <!-- Arrow with question mark -->
  <g fill="none">
    <line x1="470" y1="340" x2="780" y2="340" stroke="#dc2626" stroke-width="4" marker-end="url(#arr40)"/>
  </g>
  <text x="625" y="330" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">Transformation</text>
  <text x="625" y="360" text-anchor="middle" font-size="11" font-style="italic" fill="#991b1b">(AWS Transform / Reforge)</text>

  <text x="625" y="410" text-anchor="middle" font-size="40" font-weight="700" fill="#dc2626">?</text>
  <text x="625" y="450" text-anchor="middle" font-size="11" fill="#7f1d1d">Ohne Tests:</text>
  <text x="625" y="466" text-anchor="middle" font-size="11" fill="#7f1d1d">unbekannt!</text>

  <!-- Java side -->
  <g filter="url(#sh40)">
    <rect x="780" y="120" width="380" height="440" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="3"/>
    <rect x="780" y="120" width="380" height="44" rx="14" fill="#059669"/>
    <text x="970" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Java (generiert)</text>

    <text x="798" y="186" font-size="12" font-weight="700" fill="#065f46">Soll-Semantik:</text>
    <text x="798" y="212" font-size="11" fill="#047857">Exakt das gleiche Verhalten</text>
    <text x="798" y="228" font-size="11" fill="#047857">in allen relevanten Szenarien</text>

    <text x="798" y="262" font-size="12" font-weight="700" fill="#065f46">Ohne Tests unbekannt:</text>
    <g font-size="11" fill="#065f46">
      <text x="798" y="288">&#9746;  Ist BigDecimal exakt wie FIXED DECIMAL?</text>
      <text x="798" y="306">&#9746;  Ist der Handler-Stack reihenfolge-treu?</text>
      <text x="798" y="324">&#9746;  Sind ByteBuffer-Aliases konsistent?</text>
      <text x="798" y="342">&#9746;  Ist der Preprocessor vollstaendig expandiert?</text>
      <text x="798" y="360">&#9746;  Sind Races reproduzierbar unter Last?</text>
      <text x="798" y="378">&#9746;  Sind alle I/O-Edge-Cases abgedeckt?</text>
    </g>

    <text x="798" y="412" font-size="12" font-weight="700" fill="#065f46">Konsequenz:</text>
    <text x="798" y="434" font-size="11" fill="#065f46">Unterschiede bleiben unsichtbar,</text>
    <text x="798" y="450" font-size="11" fill="#065f46">bis sie im Produktionsbetrieb auftauchen.</text>
    <text x="798" y="466" font-size="11" fill="#065f46">Dann sind sie teuer.</text>

    <text x="798" y="498" font-size="12" font-weight="700" fill="#0f172a">Beispielkosten:</text>
    <text x="798" y="518" font-size="10" fill="#334155">&#8226;  1-Cent-Fehler in Zins-Berechnung</text>
    <text x="798" y="530" font-size="10" fill="#334155">  = Regulator-Meldung + manuelle Korrektur</text>
    <text x="798" y="548" font-size="10" fill="#334155">&#8226;  Falscher Sort bei Daily-Batch</text>
    <text x="798" y="560" font-size="10" fill="#334155">  = tagelang falsche Berichte</text>
  </g>

  <!-- Bottom banner -->
  <g filter="url(#sh40)">
    <rect x="60" y="600" width="1120" height="100" rx="12" fill="#0f172a"/>
    <text x="620" y="632" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Das Ziel: semantische Aequivalenz &#8212; nicht nur Syntax-Korrektheit</text>
    <text x="620" y="656" text-anchor="middle" font-size="11" fill="#cbd5e1">Ein transformierter Code, der kompiliert und die Unit-Tests besteht, ist NICHT automatisch aequivalent zum Original.</text>
    <text x="620" y="676" text-anchor="middle" font-size="11" fill="#fbbf24">Deshalb ist die Test-Strategie bei PL/I-Projekten die kritischste Disziplin. Budget nicht sparen.</text>
  </g>
</svg>
