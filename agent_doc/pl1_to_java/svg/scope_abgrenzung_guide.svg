      <text x="10" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">&#10007;</text>
      <text x="32" y="5" font-weight="700" fill="#0f172a">Fertiges Projekt-Template</text>
      <text x="32" y="22" fill="#7f1d1d">Wave-Planung ist immer individuell</text>
      <text x="32" y="38" fill="#7f1d1d">und basiert auf dem Assessment-Output</text>
    </g>
    <g transform="translate(645, 450)">
      <circle cx="10" cy="0" r="12" fill="#dc2626"/>
      <text x="10" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">&#10007;</text>
      <text x="32" y="5" font-weight="700" fill="#0f172a">Garantie der Aktualitaet</text>
      <text x="32" y="22" fill="#7f1d1d">AWS-Stack aendert sich schnell</text>
      <text x="32" y="38" fill="#7f1d1d">Stand: April 2026 — vor Projektstart pruefen</text>
    </g>
    <g transform="translate(645, 530)">
      <circle cx="10" cy="0" r="12" fill="#dc2626"/>
      <text x="10" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">&#10007;</text>
      <text x="32" y="5" font-weight="700" fill="#0f172a">Individuelle Rechtsberatung</text>
      <text x="32" y="22" fill="#7f1d1d">BaFin, PCI, DORA, HIPAA benoetigen</text>
      <text x="32" y="38" fill="#7f1d1d">eigene Compliance-Abklaerung</text>
    </g>
    <g transform="translate(645, 610)">
      <circle cx="10" cy="0" r="12" fill="#dc2626"/>
      <text x="10" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">&#10007;</text>
      <text x="32" y="5" font-weight="700" fill="#0f172a">Garantie von COBOL-Research-Themen</text>
      <text x="32" y="22" fill="#7f1d1d">Generische 7-Rs, CardDemo, Wave Planning-</text>
      <text x="32" y="38" fill="#7f1d1d">Basics → siehe ../cobol-migration_aws/</text>
    </g>
