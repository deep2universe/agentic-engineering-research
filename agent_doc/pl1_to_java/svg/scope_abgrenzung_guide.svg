    <g transform="translate(645, 290)">
      <circle cx="10" cy="0" r="12" fill="#dc2626"/>
      <text x="10" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">&#10007;</text>
      <text x="32" y="5" font-weight="700" fill="#0f172a">Detail-Lizenzanalyse</text>
      <text x="32" y="22" fill="#7f1d1d">IBM Enterprise PL/I, z/OS, MQ, DB2, CICS</text>
