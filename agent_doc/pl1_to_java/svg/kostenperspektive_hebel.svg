<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh22" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Kostenperspektive — Die Hebel in der PL/I-Migration</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#475569">Wo wirklich Geld fliesst (und wo Senior-Architekten steuern koennen)</text>

  <!-- Pie-chart-like breakdown of cost blocks -->
  <g filter="url(#sh22)">
    <!-- Horizontal bars showing relative cost -->
    <rect x="80" y="120" width="1040" height="48" rx="10" fill="#ffffff" stroke="#64748b"/>
    <text x="92" y="140" font-size="12" font-weight="700" fill="#0f172a">AWS Transform for Mainframe Refactor (Code-Transformation)</text>
    <rect x="92" y="144" width="30" height="16" rx="3" fill="#059669"/>
    <text x="130" y="157" font-size="11" fill="#064e3b">kostenfrei seit Maerz 2026 (Pricing-Change in der Konsolidierung)</text>
  </g>

  <g filter="url(#sh22)">
    <rect x="80" y="180" width="1040" height="48" rx="10" fill="#ffffff" stroke="#64748b"/>
    <text x="92" y="200" font-size="12" font-weight="700" fill="#0f172a">Bedrock Inference (Reforge, Testing, Reimagine)</text>
    <rect x="92" y="204" width="700" height="16" rx="3" fill="#dc2626"/>
    <text x="800" y="217" font-size="11" fill="#7f1d1d">DOMINANTER Kostenblock — nach Tokens, Modell-Wahl, Caching steuerbar</text>
  </g>

  <g filter="url(#sh22)">
    <rect x="80" y="240" width="1040" height="48" rx="10" fill="#ffffff" stroke="#64748b"/>
    <text x="92" y="260" font-size="12" font-weight="700" fill="#0f172a">Aurora PostgreSQL (DB2-Ersatz)</text>
    <rect x="92" y="264" width="280" height="16" rx="3" fill="#2563eb"/>
    <text x="380" y="277" font-size="11" fill="#1e40af">nach Instanzgroesse, I/O, Storage — projektspezifisch</text>
  </g>

  <g filter="url(#sh22)">
    <rect x="80" y="300" width="1040" height="48" rx="10" fill="#ffffff" stroke="#64748b"/>
    <text x="92" y="320" font-size="12" font-weight="700" fill="#0f172a">EKS / ECS / Lambda (Runtime)</text>
    <rect x="92" y="324" width="220" height="16" rx="3" fill="#ff9900"/>
    <text x="320" y="337" font-size="11" fill="#c2410c">nach Knoten-Stunden + Control-Plane + Netzwerk</text>
  </g>

  <g filter="url(#sh22)">
    <rect x="80" y="360" width="1040" height="48" rx="10" fill="#ffffff" stroke="#64748b"/>
    <text x="92" y="380" font-size="12" font-weight="700" fill="#0f172a">S3 + DMS + Direct Connect</text>
    <rect x="92" y="384" width="120" height="16" rx="3" fill="#7b2cbf"/>
    <text x="220" y="397" font-size="11" fill="#6b21a8">projektspezifisch, oft nicht dominant</text>
  </g>

  <!-- Levers -->
  <text x="600" y="450" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Die wichtigsten Kostenhebel (Inference-Optimierung)</text>

  <g filter="url(#sh22)">
    <rect x="60" y="470" width="360" height="200" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <rect x="60" y="470" width="360" height="36" rx="12" fill="#2563eb"/>
    <text x="240" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Hebel 1: Modell-Wahl</text>
    <text x="76" y="524" font-size="12" font-weight="700" fill="#0f172a">Claude Opus → Sonnet → Haiku</text>
    <text x="76" y="548" font-size="11" fill="#334155">• Opus fuer tiefgreifende Reforge-Passes</text>
    <text x="76" y="566" font-size="11" fill="#334155">  und schwer erklaerbare Module</text>
    <text x="76" y="586" font-size="11" fill="#334155">• Sonnet fuer Massen-Verarbeitung,</text>
    <text x="76" y="604" font-size="11" fill="#334155">  Zusammenfassungen, Code-Erklaerung</text>
    <text x="76" y="624" font-size="11" fill="#334155">• Haiku fuer billige Tool-Orchestrierung</text>
    <text x="76" y="642" font-size="11" fill="#334155">  (kleine sub-tasks, Agenten-Runner)</text>
    <text x="76" y="660" font-size="10" font-style="italic" fill="#1e40af">Einsparpotential: 40–70 %</text>
  </g>

  <g filter="url(#sh22)">
    <rect x="440" y="470" width="360" height="200" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <rect x="440" y="470" width="360" height="36" rx="12" fill="#059669"/>
    <text x="620" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Hebel 2: Prompt-Caching</text>
    <text x="456" y="524" font-size="12" font-weight="700" fill="#0f172a">Wiederverwendung statischer Kontexte</text>
    <text x="456" y="548" font-size="11" fill="#334155">• System-Prompts cachen</text>
    <text x="456" y="566" font-size="11" fill="#334155">• Codebasis-Kontext cachen</text>
    <text x="456" y="586" font-size="11" fill="#334155">• Coding-Standards cachen</text>
    <text x="456" y="604" font-size="11" fill="#334155">• Claude Prompt-Caching Feature nutzen</text>
    <text x="456" y="622" font-size="11" fill="#334155">• Bedrock Knowledge Base als RAG</text>
    <text x="456" y="640" font-size="11" fill="#334155">  statt Inline-Context</text>
    <text x="456" y="660" font-size="10" font-style="italic" fill="#065f46">Einsparpotential: 30–50 %</text>
  </g>

  <g filter="url(#sh22)">
    <rect x="820" y="470" width="320" height="200" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="820" y="470" width="320" height="36" rx="12" fill="#d97706"/>
    <text x="980" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Hebel 3: Batch-Runs</text>
    <text x="836" y="524" font-size="12" font-weight="700" fill="#0f172a">Module-Granularitaet statt File</text>
    <text x="836" y="548" font-size="11" fill="#334155">• Ganze Module batchen</text>
    <text x="836" y="566" font-size="11" fill="#334155">• Async-Provisioning nutzen</text>
    <text x="836" y="586" font-size="11" fill="#334155">• Cross-Region-Inference</text>
    <text x="836" y="604" font-size="11" fill="#334155">• Off-Peak-Zeiten nutzen</text>
    <text x="836" y="622" font-size="11" fill="#334155">• Provisioned Throughput</text>
    <text x="836" y="640" font-size="11" fill="#334155">  fuer grosse Runs</text>
    <text x="836" y="660" font-size="10" font-style="italic" fill="#78350f">Einsparpotential: 20–40 %</text>
  </g>

  <!-- Bottom guidance -->
  <g filter="url(#sh22)">
    <rect x="60" y="700" width="1080" height="60" rx="10" fill="#0f172a"/>
    <text x="600" y="728" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Senior-Regel: Keine Inference-Kosten ohne Budget-Alarme (CloudWatch + Bedrock Guardrails)</text>
    <text x="600" y="748" text-anchor="middle" font-size="11" fill="#cbd5e1">Preise aendern sich schnell — konkrete Rechnung immer im Business-Case, nicht in der Research.</text>
  </g>
</svg>
