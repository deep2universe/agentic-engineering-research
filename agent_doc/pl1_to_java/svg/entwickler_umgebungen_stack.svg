<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh18" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Entwickler-Umgebungen fuer PL/I-Migration</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#475569">Wo die Senior-Engineers taeglich arbeiten — Cloud-basiert und einheitlich</text>

  <!-- AppStream 2.0 - main environment -->
  <g filter="url(#sh18)">
    <rect x="60" y="120" width="520" height="290" rx="14" fill="#ffffff" stroke="#ff9900" stroke-width="3"/>
    <rect x="60" y="120" width="520" height="44" rx="14" fill="#ff9900"/>
    <text x="320" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">AWS AppStream 2.0</text>
    <text x="76" y="184" font-size="12" font-weight="700" fill="#0f172a">Rolle: Gehosteter Blu Age Developer Client</text>

    <text x="76" y="212" font-size="11" font-weight="700" fill="#9a3412">Warum AppStream statt lokaler Installation?</text>
    <text x="76" y="230" font-size="11" fill="#334155">• Keine lokale Installation noetig (Windows-only Clients)</text>
    <text x="76" y="246" font-size="11" fill="#334155">• Einheitliche Toolchain-Versionen fuer alle Entwickler</text>
    <text x="76" y="262" font-size="11" fill="#334155">• Zentrale Wartung und Updates</text>
    <text x="76" y="278" font-size="11" fill="#334155">• Skalierbar fuer grosse Teams</text>
    <text x="76" y="294" font-size="11" fill="#334155">• GPU-Optionen fuer Compile-Heavy-Jobs</text>
    <text x="76" y="310" font-size="11" fill="#334155">• Datensparsames Setup (kein Code auf Laptops)</text>

    <text x="76" y="338" font-size="11" font-weight="700" fill="#9a3412">Typische Konfiguration:</text>
    <text x="76" y="356" font-size="10" fill="#334155">• Windows 10/11 Base Image</text>
    <text x="76" y="370" font-size="10" fill="#334155">• Blu Age Developer vorinstalliert</text>
    <text x="76" y="384" font-size="10" fill="#334155">• Zugriff auf S3, Bedrock, CodeCommit ueber IAM-Role</text>
    <text x="76" y="398" font-size="10" fill="#334155">• Multi-Region-Streaming fuer globale Teams</text>
  </g>

  <!-- Amazon Q Developer Plugins -->
  <g filter="url(#sh18)">
    <rect x="620" y="120" width="520" height="290" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="620" y="120" width="520" height="44" rx="14" fill="#2563eb"/>
    <text x="880" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Amazon Q Developer IDE-Plugins</text>
    <text x="636" y="184" font-size="12" font-weight="700" fill="#0f172a">Rolle: Post-Transform-Assistent fuer Java-Seite</text>

    <text x="636" y="212" font-size="11" font-weight="700" fill="#1e40af">Unterstuetzte IDEs:</text>

    <g font-size="11" fill="#334155">
      <rect x="636" y="225" width="150" height="60" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="711" y="248" text-anchor="middle" font-weight="700" fill="#1e3a8a">VS Code</text>
      <text x="711" y="264" text-anchor="middle" font-size="9" fill="#1e40af">marketplace-plugin</text>
      <text x="711" y="278" text-anchor="middle" font-size="9" fill="#1e40af">Free tier + Pro</text>

      <rect x="796" y="225" width="150" height="60" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="871" y="248" text-anchor="middle" font-weight="700" fill="#1e3a8a">JetBrains IDEA</text>
      <text x="871" y="264" text-anchor="middle" font-size="9" fill="#1e40af">jetbrains-plugin</text>
      <text x="871" y="278" text-anchor="middle" font-size="9" fill="#1e40af">2023.2 +</text>

      <rect x="956" y="225" width="150" height="60" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="1031" y="248" text-anchor="middle" font-weight="700" fill="#1e3a8a">Eclipse</text>
      <text x="1031" y="264" text-anchor="middle" font-size="9" fill="#1e40af">Marketplace</text>
      <text x="1031" y="278" text-anchor="middle" font-size="9" fill="#1e40af">+ Q CLI</text>
    </g>

    <text x="636" y="310" font-size="11" font-weight="700" fill="#1e40af">Typische Workflows:</text>
    <text x="636" y="328" font-size="10" fill="#334155">• Java-Generator-Output verstehen lassen (Explain)</text>
    <text x="636" y="342" font-size="10" fill="#334155">• Refactoring-Vorschlaege annehmen</text>
    <text x="636" y="356" font-size="10" fill="#334155">• Unit-Tests automatisch erzeugen</text>
    <text x="636" y="370" font-size="10" fill="#334155">• Doc-Strings und Kommentare erzeugen</text>
    <text x="636" y="384" font-size="10" fill="#334155">• Security-Scan (Q Security)</text>
    <text x="636" y="398" font-size="10" fill="#334155">• MCP-Server fuer Custom-Domain-Wissen</text>
  </g>

  <!-- EOL notice: Cloud9 -->
  <g filter="url(#sh18)">
    <rect x="60" y="440" width="1080" height="90" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="76" y="468" font-size="13" font-weight="700" fill="#991b1b">EOL-HINWEIS: AWS Cloud9</text>
    <text x="76" y="490" font-size="11" fill="#7f1d1d">AWS Cloud9 ist fuer Neukunden seit Juli 2024 abgeschaltet. Bestehende Workspaces bleiben erhalten, aber</text>
    <text x="76" y="506" font-size="11" fill="#7f1d1d">neue Projekte sollten auf AppStream 2.0 oder auf lokale IDEs mit Q Developer-Plugin setzen.</text>
    <text x="76" y="522" font-size="10" font-style="italic" fill="#991b1b">Empfehlung: Keine Neu-Investition in Cloud9. Alle Projekte seit 2025 laufen auf AppStream oder lokal.</text>
  </g>

  <!-- Supporting tools -->
  <g filter="url(#sh18)">
    <rect x="60" y="560" width="1080" height="130" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="600" y="588" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Ergaenzende Tools im Entwickler-Alltag</text>
    <g font-size="11" fill="#1e293b">
      <text x="80" y="612">• <tspan font-weight="700">AWS Toolkit for VS Code/JetBrains</tspan> — IAM, CloudWatch Logs, Lambda direkt in der IDE</text>
      <text x="80" y="630">• <tspan font-weight="700">SAM CLI</tspan> — Lokaler Test von Lambda/API Gateway, wenn serverless-Komponenten verwendet werden</text>
      <text x="80" y="648">• <tspan font-weight="700">AWS CDK</tspan> — Infrastructure as Code in TypeScript/Python/Java fuer Projekt-Umgebungen</text>
      <text x="80" y="666">• <tspan font-weight="700">Testcontainers</tspan> — Aurora PostgreSQL und Amazon MQ lokal im Container fuer Integration-Tests</text>
      <text x="80" y="684">• <tspan font-weight="700">LocalStack</tspan> — AWS-Services-Mock fuer schnelle Entwickler-Loops</text>
    </g>
  </g>
</svg>
