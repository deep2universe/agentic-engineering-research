<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh73" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Leitfragen fuer die Entscheidung</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Zehn Fragen, die Senior-Architekten im Strategie-Workshop beantworten muessen</text>

  <g filter="url(#sh73)">
    <rect x="60" y="100" width="560" height="100" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="100" cy="150" r="22" fill="#2563eb"/>
    <text x="100" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
    <text x="140" y="140" font-size="12" font-weight="700" fill="#0f172a">Welcher Teil wird in 5 Jahren noch gebraucht?</text>
    <text x="140" y="160" font-size="10" fill="#64748b">Usage-Analyse + Portfolio-Roadmap</text>
    <text x="140" y="178" font-size="10" fill="#1e40af">&#8594; Basis fuer Retain/Retire-Entscheidungen</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="640" y="100" width="560" height="100" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <circle cx="680" cy="150" r="22" fill="#059669"/>
    <text x="680" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
    <text x="720" y="140" font-size="12" font-weight="700" fill="#0f172a">Welcher Teil braucht aktive Weiterentwicklung?</text>
    <text x="720" y="160" font-size="10" fill="#64748b">Change-Rate + Feature-Pipeline</text>
    <text x="720" y="178" font-size="10" fill="#065f46">&#8594; Kandidaten fuer Reforge / Reimagine</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="60" y="210" width="560" height="100" rx="10" fill="#ffffff" stroke="#7b2cbf" stroke-width="2"/>
    <circle cx="100" cy="260" r="22" fill="#7b2cbf"/>
    <text x="100" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
    <text x="140" y="250" font-size="12" font-weight="700" fill="#0f172a">Welcher Teil ist stabil und kann bleiben?</text>
    <text x="140" y="270" font-size="10" fill="#64748b">Keine Bugs, keine Requests, stabiler Owner</text>
    <text x="140" y="288" font-size="10" fill="#6b21a8">&#8594; Retain oder Replatform-Kandidaten</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="640" y="210" width="560" height="100" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="680" cy="260" r="22" fill="#f59e0b"/>
    <text x="680" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
    <text x="720" y="250" font-size="12" font-weight="700" fill="#0f172a">Wo ist Business-Logik am dichtesten und wertvollsten?</text>
    <text x="720" y="270" font-size="10" fill="#64748b">Domain-Value-Mapping + SME-Interviews</text>
    <text x="720" y="288" font-size="10" fill="#b45309">&#8594; Wave-Priorisierung + Senior-Attention</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="60" y="320" width="560" height="100" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <circle cx="100" cy="370" r="22" fill="#dc2626"/>
    <text x="100" y="378" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
    <text x="140" y="360" font-size="12" font-weight="700" fill="#0f172a">Welche Domaenen haben die staerkste Veraenderungsdynamik?</text>
    <text x="140" y="380" font-size="10" fill="#64748b">Commit-History + Ticket-Frequenz</text>
    <text x="140" y="398" font-size="10" fill="#991b1b">&#8594; Hohe Dynamik rechtfertigt Reimagine</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="640" y="320" width="560" height="100" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <circle cx="680" cy="370" r="22" fill="#0891b2"/>
    <text x="680" y="378" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">6</text>
    <text x="720" y="360" font-size="12" font-weight="700" fill="#0f172a">Welche regulatorischen Anforderungen begrenzen den Pfad?</text>
    <text x="720" y="380" font-size="10" fill="#64748b">BaFin, DORA, DSGVO, PCI, HIPAA — klaeren!</text>
    <text x="720" y="398" font-size="10" fill="#0e7490">&#8594; Compliance-Checkliste pro Modul</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="60" y="430" width="560" height="100" rx="10" fill="#ffffff" stroke="#db2777" stroke-width="2"/>
    <circle cx="100" cy="480" r="22" fill="#db2777"/>
    <text x="100" y="488" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">7</text>
    <text x="140" y="470" font-size="12" font-weight="700" fill="#0f172a">Wer traegt das implizite Wissen? Wie lange verfuegbar?</text>
    <text x="140" y="490" font-size="10" fill="#64748b">Veterans-Mapping + Retirement-Forecast</text>
    <text x="140" y="508" font-size="10" fill="#9d174d">&#8594; Knowledge-Capture-Sprint organisieren</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="640" y="430" width="560" height="100" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
    <circle cx="680" cy="480" r="22" fill="#4f46e5"/>
    <text x="680" y="488" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">8</text>
    <text x="720" y="470" font-size="12" font-weight="700" fill="#0f172a">Welche COTS-Alternativen gibt es?</text>
    <text x="720" y="490" font-size="10" fill="#64748b">Marktanalyse pro Domain</text>
    <text x="720" y="508" font-size="10" fill="#4338ca">&#8594; Repurchase als Option pruefen</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="60" y="540" width="560" height="100" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
    <circle cx="100" cy="590" r="22" fill="#ea580c"/>
    <text x="100" y="598" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">9</text>
    <text x="140" y="580" font-size="12" font-weight="700" fill="#0f172a">Wie hoch ist die Datenkonsistenz-Toleranz in der Koexistenz?</text>
    <text x="140" y="600" font-size="10" fill="#64748b">CDC-Lag-Limits + Consistency-SLAs</text>
    <text x="140" y="618" font-size="10" fill="#c2410c">&#8594; Bestimmt Koexistenz-Pattern (A/B/C)</text>
  </g>

  <g filter="url(#sh73)">
    <rect x="640" y="540" width="560" height="100" rx="10" fill="#ffffff" stroke="#65a30d" stroke-width="2"/>
    <circle cx="680" cy="590" r="22" fill="#65a30d"/>
    <text x="680" y="598" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">10</text>
    <text x="720" y="580" font-size="12" font-weight="700" fill="#0f172a">Wie hoch ist das Management-Commitment?</text>
    <text x="720" y="600" font-size="10" fill="#64748b">Budget, Zeit, Ressourcen, politische Rueckendeckung</text>
    <text x="720" y="618" font-size="10" fill="#4d7c0f">&#8594; Basis fuer Wave-Groesse + Ambition-Level</text>
  </g>

  <!-- Bottom insight -->
  <g filter="url(#sh73)">
    <rect x="60" y="660" width="1120" height="140" rx="12" fill="#0f172a"/>
    <text x="620" y="690" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Die Antworten bestimmen den Mix aus Refactor, Reforge, Reimagine, Replatform und Repurchase</text>
    <text x="620" y="714" text-anchor="middle" font-size="11" fill="#cbd5e1">Jede Frage ist im Strategie-Workshop schriftlich zu beantworten und in einem ADR zu persistieren.</text>
    <text x="620" y="734" text-anchor="middle" font-size="11" fill="#cbd5e1">Diese 10 Fragen sind der Kompass — alle weiteren Entscheidungen fuehren darauf zurueck.</text>
    <text x="620" y="764" text-anchor="middle" font-size="10" font-style="italic" fill="#fbbf24">Kein Senior-Architekt startet ohne diese Antworten — auch nicht unter Zeitdruck.</text>
  </g>
</svg>
