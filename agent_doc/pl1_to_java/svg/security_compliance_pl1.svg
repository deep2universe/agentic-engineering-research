<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 740" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh59" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="740" fill="#f8fafc"/>
  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Security und Compliance</text>
  <text x="620" y="66" text-anchor="middle" font-size="13" fill="#475569">Vier kritische Bereiche fuer regulierte PL/I-Workloads</text>

  <!-- 1. Data Residency -->
  <g filter="url(#sh59)">
    <rect x="60" y="110" width="560" height="270" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <rect x="60" y="110" width="560" height="44" rx="14" fill="#dc2626"/>
    <text x="340" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1 · Data Residency</text>

    <text x="80" y="180" font-size="12" font-weight="700" fill="#0f172a">Problem:</text>
    <text x="80" y="198" font-size="11" fill="#334155">PL/I-Daten sind oft an bestimmte Rechenzentren gebunden</text>
    <text x="80" y="216" font-size="11" fill="#334155">(BaFin, PCI, lokale Datenschutz-Gesetze).</text>

    <text x="80" y="248" font-size="12" font-weight="700" fill="#0f172a">Klaerungsfragen VOR der Migration:</text>
    <g font-size="11" fill="#334155">
      <text x="80" y="272">&#9633;  Duerfen die Daten in der Ziel-AWS-Region liegen?</text>
      <text x="80" y="290">&#9633;  Muessen sie in einem bestimmten Land bleiben?</text>
      <text x="80" y="308">&#9633;  Welche Verschluesselungsanforderungen gelten?</text>
      <text x="80" y="326">&#9633;  Welche Transfer-Rechte gibt es?</text>
      <text x="80" y="344">&#9633;  Backup-Speicherort erlaubt?</text>
    </g>
    <text x="80" y="370" font-size="10" font-style="italic" fill="#991b1b">Wenn nicht geklaert: Projekt-Stopp vor Datenmigration</text>
  </g>

  <!-- 2. Audit Trails -->
  <g filter="url(#sh59)">
    <rect x="640" y="110" width="560" height="270" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <rect x="640" y="110" width="560" height="44" rx="14" fill="#059669"/>
    <text x="920" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2 · Audit-Trails</text>

    <text x="660" y="180" font-size="12" font-weight="700" fill="#0f172a">Regel:</text>
    <text x="660" y="198" font-size="11" fill="#334155">Jede Transaktion muss in der Java-Fassung den gleichen</text>
    <text x="660" y="216" font-size="11" fill="#334155">oder einen besseren Audit-Trail haben als in PL/I.</text>

    <text x="660" y="248" font-size="12" font-weight="700" fill="#0f172a">Typische Komponenten:</text>
    <g font-size="11" fill="#334155">
      <rect x="680" y="260" width="500" height="28" rx="4" fill="#f0fdf4"/>
      <text x="692" y="278" fill="#065f46" font-weight="700">Unveraenderliche Log-Eintraege</text>
      <text x="916" y="278" fill="#047857">CloudWatch Logs + S3-Archiv (WORM)</text>

      <rect x="680" y="294" width="500" height="28" rx="4" fill="#eff6ff"/>
      <text x="692" y="312" fill="#1e3a8a" font-weight="700">Anwendungs-Events</text>
      <text x="846" y="312" fill="#1e40af">Event-Store (DynamoDB, Aurora)</text>

      <rect x="680" y="328" width="500" height="28" rx="4" fill="#fef3c7"/>
      <text x="692" y="346" fill="#78350f" font-weight="700">Zugriffskontrollen</text>
      <text x="828" y="346" fill="#92400e">IAM + CloudTrail + Security Hub</text>
    </g>
  </g>

  <!-- 3. Separation of Duties -->
  <g filter="url(#sh59)">
    <rect x="60" y="410" width="560" height="270" rx="14" fill="#ffffff" stroke="#7b2cbf" stroke-width="3"/>
    <rect x="60" y="410" width="560" height="44" rx="14" fill="#7b2cbf"/>
    <text x="340" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3 · Separation of Duties (SoD)</text>

    <text x="80" y="480" font-size="12" font-weight="700" fill="#0f172a">Compliance-Regel:</text>
    <text x="80" y="498" font-size="11" fill="#334155">Personen, die den Transform-Agent betreiben, duerfen in</text>
    <text x="80" y="514" font-size="11" fill="#334155">vielen Compliance-Regimes NICHT auch die Produktions-</text>
    <text x="80" y="530" font-size="11" fill="#334155">Deployments durchfuehren.</text>

    <text x="80" y="560" font-size="12" font-weight="700" fill="#0f172a">Enforcement via AWS:</text>
    <g font-size="11" fill="#334155">
      <text x="80" y="584">&#8226;  IAM Identity Center (Zentral-Login)</text>
      <text x="80" y="602">&#8226;  Service Control Policies (SCP)</text>
      <text x="80" y="620">&#8226;  Account-Trennung Dev/Staging/Prod</text>
      <text x="80" y="638">&#8226;  Cross-Account-Rollen mit Approval</text>
      <text x="80" y="656">&#8226;  CloudTrail-Protokollierung aller SoD-Events</text>
    </g>
  </g>

  <!-- 4. PII Protection -->
  <g filter="url(#sh59)">
    <rect x="640" y="410" width="560" height="270" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <rect x="640" y="410" width="560" height="44" rx="14" fill="#f59e0b"/>
    <text x="920" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">4 · PII-Schutz</text>

    <text x="660" y="480" font-size="12" font-weight="700" fill="#0f172a">Regel:</text>
    <text x="660" y="498" font-size="11" fill="#334155">Testdaten muessen vor der Nutzung anonymisiert werden.</text>
    <text x="660" y="514" font-size="11" font-weight="700" fill="#991b1b">Kein Produktions-PII in Test-Datenbanken!</text>

    <text x="660" y="544" font-size="12" font-weight="700" fill="#0f172a">Methoden:</text>
    <g font-size="11" fill="#334155">
      <text x="660" y="568">&#8226;  Masking mit reversiblen Hashes</text>
      <text x="660" y="586">&#8226;  Tokenization fuer Kreditkarten-Nummern</text>
      <text x="660" y="604">&#8226;  Differential Privacy bei Aggregaten</text>
      <text x="660" y="622">&#8226;  Synthetic Data fuer Edge-Cases</text>
      <text x="660" y="640">&#8226;  PII-Scanner in CI/CD (Macie)</text>
    </g>
    <text x="660" y="666" font-size="10" font-style="italic" fill="#b45309">Siehe auch: Dokument 6, Kapitel 9</text>
  </g>

  <text x="620" y="720" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Frameworks: BaFin MaRisk · DORA · DSGVO · PCI-DSS · HIPAA · ISO 27001 · SOC 2</text>
</svg>
