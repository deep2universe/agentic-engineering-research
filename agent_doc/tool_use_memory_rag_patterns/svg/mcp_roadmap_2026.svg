<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <defs>
    <linearGradient id="mcpbg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="mcps5">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="440" fill="url(#mcpbg5)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">MCP 2026 Roadmap</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Working Groups als primaeres Entwicklungsvehikel</text>

  <!-- 4 roadmap blocks -->
  <!-- Transport -->
  <rect x="40" y="85" width="400" height="140" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#mcps5)"/>
  <rect x="40" y="85" width="400" height="30" rx="12" fill="#2563EB"/>
  <rect x="40" y="103" width="400" height="12" fill="#2563EB"/>
  <text x="240" y="105" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Transport + Skalierbarkeit</text>

  <text x="65" y="138" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="10">&#x2022; Streamable HTTP Verbesserungen</text>
  <text x="65" y="158" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="10">&#x2022; Horizontale Skalierung ohne Zustand</text>
  <text x="65" y="178" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="10">&#x2022; .well-known Discovery</text>
  <text x="65" y="198" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">&#x2022; Kein neuer Transport in diesem Zyklus</text>

  <!-- Agent Communication -->
  <rect x="460" y="85" width="400" height="140" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#mcps5)"/>
  <rect x="460" y="85" width="400" height="30" rx="12" fill="#059669"/>
  <rect x="460" y="103" width="400" height="12" fill="#059669"/>
  <text x="660" y="105" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Agent Communication</text>

  <text x="485" y="138" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10">&#x2022; Tasks Primitive (SEP-1686)</text>
  <text x="485" y="158" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10">&#x2022; Retry-Semantiken fuer Fehler</text>
  <text x="485" y="178" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10">&#x2022; Result Expiry Policies</text>
  <text x="485" y="198" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10">&#x2022; Iterative Verbesserungen</text>

  <!-- Governance -->
  <rect x="40" y="245" width="400" height="140" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" filter="url(#mcps5)"/>
  <rect x="40" y="245" width="400" height="30" rx="12" fill="#7C3AED"/>
  <rect x="40" y="263" width="400" height="12" fill="#7C3AED"/>
  <text x="240" y="265" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Governance-Reifung</text>

  <text x="65" y="298" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="10">&#x2022; Contributor Ladder (Member → Maintainer)</text>
  <text x="65" y="318" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="10">&#x2022; Working Groups mit SEP-Autoritaet</text>
  <text x="65" y="338" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="10">&#x2022; Core Maintainers: strategische Aufsicht</text>
  <text x="65" y="358" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="10">&#x2022; Delegationsmodell</text>

  <!-- Enterprise -->
  <rect x="460" y="245" width="400" height="140" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2" filter="url(#mcps5)"/>
  <rect x="460" y="245" width="400" height="30" rx="12" fill="#D97706"/>
  <rect x="460" y="263" width="400" height="12" fill="#D97706"/>
  <text x="660" y="265" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Enterprise Readiness</text>

  <text x="485" y="298" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10">&#x2022; Audit Trails — Nachverfolgbarkeit</text>
  <text x="485" y="318" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10">&#x2022; SSO-integrierte Authentifizierung</text>
  <text x="485" y="338" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10">&#x2022; Gateway-Verhalten / Zugangskontrolle</text>
  <text x="485" y="358" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10">&#x2022; Configuration Portability</text>

  <!-- Horizon -->
  <rect x="150" y="400" width="600" height="28" rx="6" fill="#334155"/>
  <text x="450" y="419" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Am Horizont: Triggers, Event-driven Updates, Gestreamte Ergebnisse, Extensions</text>
</svg>