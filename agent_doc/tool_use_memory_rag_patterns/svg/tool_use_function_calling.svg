<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="react_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="650" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Function Calling Patterns</text>

  <!-- === Section 1: Basic Workflow (top) === -->
  <text x="450" y="80" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Grundlegender Function Calling Workflow</text>

  <!-- Step 1 -->
  <rect x="40" y="100" width="180" height="70" rx="10" fill="url(#step1)" filter="url(#sh2)"/>
  <text x="130" y="128" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">1. Context Assembly</text>
  <text x="130" y="148" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="10">System + Tools + User</text>

  <!-- Arrow -->
  <polygon points="230,135 250,128 250,142" fill="#6366F1"/>
  <line x1="220" y1="135" x2="250" y2="135" stroke="#6366F1" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="260" y="100" width="180" height="70" rx="10" fill="url(#step2)" filter="url(#sh2)"/>
  <text x="350" y="128" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">2. Tool Decision</text>
  <text x="350" y="148" text-anchor="middle" fill="#BFDBFE" font-family="system-ui, sans-serif" font-size="10">LLM waehlt Tool + Params</text>

  <!-- Arrow -->
  <polygon points="450,135 470,128 470,142" fill="#3B82F6"/>
  <line x1="440" y1="135" x2="470" y2="135" stroke="#3B82F6" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="480" y="100" width="180" height="70" rx="10" fill="url(#step3)" filter="url(#sh2)"/>
  <text x="570" y="128" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">3. Tool Execution</text>
  <text x="570" y="148" text-anchor="middle" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="10">System fuehrt aus</text>

  <!-- Arrow -->
  <polygon points="670,135 690,128 690,142" fill="#10B981"/>
  <line x1="660" y1="135" x2="690" y2="135" stroke="#10B981" stroke-width="2"/>

  <!-- Step 4 -->
  <rect x="700" y="100" width="180" height="70" rx="10" fill="url(#step4)" filter="url(#sh2)"/>
  <text x="790" y="128" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">4. Response Gen</text>
  <text x="790" y="148" text-anchor="middle" fill="#FEF3C7" font-family="system-ui, sans-serif" font-size="10">Finale Antwort</text>

  <!-- === Section 2: ReAct Pattern (middle) === -->
  <text x="250" y="225" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="16" font-weight="700">ReAct Pattern</text>
  <text x="250" y="245" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Reasoning + Action Loop</text>

  <!-- Circular loop -->
  <!-- Reasoning -->
  <rect x="100" y="270" width="140" height="55" rx="10" fill="url(#react_grad)" filter="url(#sh2)"/>
  <text x="170" y="295" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Reasoning</text>
  <text x="170" y="312" text-anchor="middle" fill="#DDD6FE" font-family="system-ui, sans-serif" font-size="10">Analyse + Planung</text>

  <!-- Arrow down -->
  <line x1="240" y1="300" x2="280" y2="355" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="280,355 272,342 285,345" fill="#8B5CF6"/>

  <!-- Action -->
  <rect x="280" y="340" width="140" height="55" rx="10" fill="url(#step2)" filter="url(#sh2)"/>
  <text x="350" y="365" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Action</text>
  <text x="350" y="382" text-anchor="middle" fill="#BFDBFE" font-family="system-ui, sans-serif" font-size="10">Tool Call</text>

  <!-- Arrow left-down -->
  <line x1="280" y1="370" x2="240" y2="420" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="240,420 248,407 253,420" fill="#3B82F6"/>

  <!-- Observation -->
  <rect x="100" y="410" width="140" height="55" rx="10" fill="url(#step3)" filter="url(#sh2)"/>
  <text x="170" y="435" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Observation</text>
  <text x="170" y="452" text-anchor="middle" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="10">Ergebnis in Context</text>

  <!-- Arrow back up -->
  <line x1="100" y1="430" x2="100" y2="325" stroke="#10B981" stroke-width="2"/>
  <polygon points="100,325 93,340 107,340" fill="#10B981"/>

  <!-- Loop label -->
  <text x="65" y="380" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-style="italic" transform="rotate(-90, 65, 380)">Loop</text>

  <!-- === Section 3: Plan-and-Execute (right) === -->
  <text x="670" y="225" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Plan-and-Execute</text>
  <text x="670" y="245" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Frontier plant, guenstigere fuehren aus</text>

  <!-- Planner (expensive model) -->
  <rect x="590" y="270" width="160" height="55" rx="10" fill="url(#step4)" filter="url(#sh2)"/>
  <text x="670" y="292" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Planner (GPT-4/Opus)</text>
  <text x="670" y="310" text-anchor="middle" fill="#FEF3C7" font-family="system-ui, sans-serif" font-size="10">Erstellt Strategie</text>

  <!-- Arrow down -->
  <line x1="670" y1="325" x2="670" y2="350" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="670,350 663,338 677,338" fill="#F59E0B"/>

  <!-- Executor boxes -->
  <rect x="560" y="360" width="100" height="45" rx="8" fill="url(#step3)" filter="url(#sh2)"/>
  <text x="610" y="380" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Executor 1</text>
  <text x="610" y="395" text-anchor="middle" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="9">Haiku/Flash</text>

  <rect x="680" y="360" width="100" height="45" rx="8" fill="url(#step3)" filter="url(#sh2)"/>
  <text x="730" y="380" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Executor 2</text>
  <text x="730" y="395" text-anchor="middle" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="9">Haiku/Flash</text>

  <!-- Cost badge -->
  <rect x="610" y="425" width="120" height="30" rx="6" fill="#065F46" stroke="#10B981" stroke-width="1"/>
  <text x="670" y="445" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="12" font-weight="700">-90% Kosten</text>

  <!-- Bottom summary -->
  <rect x="60" y="500" width="780" height="50" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="450" y="522" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Best Practice: Thought Paths explizit halten — Begruendung vor jedem Tool Call, Observation danach</text>
  <text x="450" y="540" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">ReAct fuer iteratives Reasoning | Plan-and-Execute fuer Kostenoptimierung</text>

  <!-- Divider lines -->
  <line x1="490" y1="210" x2="490" y2="480" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Section labels -->
  <text x="450" y="595" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Tool Use Patterns fuer AI Agents 2025/2026</text>
</svg>