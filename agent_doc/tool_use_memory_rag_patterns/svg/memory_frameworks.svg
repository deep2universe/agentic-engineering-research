  <rect x="40" y="280" width="400" height="175" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" filter="url(#ms4)"/>
  <rect x="40" y="280" width="400" height="34" rx="12" fill="#7C3AED"/>
