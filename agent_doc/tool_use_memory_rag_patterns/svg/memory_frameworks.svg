  <rect x="485" y="200" width="350" height="22" rx="4" fill="#1E3A5F"/>
  <text x="510" y="216" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10">Open-Domain: F1 49.56 | J 76.60 (hoechste J-Score)</text>
  <rect x="485" y="228" width="140" height="22" rx="4" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <text x="555" y="244" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10" font-weight="700">LANGZEIT-SESSIONS</text>

