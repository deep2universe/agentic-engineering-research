<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="mbg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="ms4">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#mbg4)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Memory Frameworks 2026</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Die vier fuehrenden Frameworks im Vergleich</text>

  <!-- Mem0 -->
  <rect x="40" y="85" width="400" height="175" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#ms4)"/>
  <rect x="40" y="85" width="400" height="34" rx="12" fill="#059669"/>
  <rect x="40" y="105" width="400" height="14" fill="#059669"/>
  <text x="240" y="107" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Mem0</text>

  <rect x="330" y="92" width="100" height="22" rx="4" fill="#065F46"/>
  <text x="380" y="108" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="9" font-weight="700">48K+ Stars</text>

  <text x="65" y="140" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Ausgereifteste Long-Term Memory-Loesung</text>
  <text x="65" y="162" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Architektur: Universal Memory Layer</text>
  <text x="65" y="182" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Lernt kontinuierlich aus User-Interaktionen</text>

  <!-- Performance -->
  <rect x="65" y="200" width="350" height="22" rx="4" fill="#064E3B"/>
  <text x="90" y="216" fill="#34D399" font-family="system-ui, sans-serif" font-size="10">Graph-Variante: F1 51.55 | J 58.13 (Temporal Reasoning)</text>
  <rect x="65" y="228" width="120" height="22" rx="4" fill="#065F46" stroke="#10B981" stroke-width="1"/>
  <text x="125" y="244" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10" font-weight="700">TOP PERFORMER</text>

  <!-- Zep -->
  <rect x="460" y="85" width="400" height="175" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#ms4)"/>
