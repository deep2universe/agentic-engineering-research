  <text x="65" y="357" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Virtual Context Management</text>
  <text x="65" y="377" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Self-Editing Memory — Agents verwalten aktiv</text>

  <!-- Three tier badges -->
  <rect x="65" y="395" width="100" height="20" rx="4" fill="#312E81"/>
  <text x="115" y="410" text-anchor="middle" fill="#A5B4FC" font-family="system-ui, sans-serif" font-size="9">Core (RAM)</text>
  <rect x="175" y="395" width="100" height="20" rx="4" fill="#312E81"/>
  <text x="225" y="410" text-anchor="middle" fill="#A5B4FC" font-family="system-ui, sans-serif" font-size="9">Archival (Disk)</text>
  <rect x="285" y="395" width="100" height="20" rx="4" fill="#312E81"/>
  <text x="335" y="410" text-anchor="middle" fill="#A5B4FC" font-family="system-ui, sans-serif" font-size="9">Recall (History)</text>

  <rect x="65" y="423" width="120" height="22" rx="4" fill="#2E1065" stroke="#8B5CF6" stroke-width="1"/>
  <text x="125" y="439" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="10" font-weight="700">SELF-EDITING</text>

  <!-- LangGraph -->
  <rect x="460" y="280" width="400" height="175" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2" filter="url(#ms4)"/>
  <rect x="460" y="280" width="400" height="34" rx="12" fill="#D97706"/>
  <rect x="460" y="300" width="400" height="14" fill="#D97706"/>
  <text x="660" y="302" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="15" font-weight="700">LangChain / LangGraph</text>

  <rect x="750" y="287" width="100" height="22" rx="4" fill="#78350F"/>
  <text x="800" y="303" text-anchor="middle" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="9" font-weight="700">Multi-Agent</text>

  <text x="485" y="335" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Graph-basierter Ansatz</text>
  <text x="485" y="357" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Stateful Multi-Agent Applications</text>
  <text x="485" y="377" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Explizites State Management + Control Flow</text>

  <rect x="485" y="395" width="100" height="20" rx="4" fill="#78350F"/>
  <text x="535" y="410" text-anchor="middle" fill="#FDE68A" font-family="system-ui, sans-serif" font-size="9">State Graphs</text>
  <rect x="595" y="395" width="100" height="20" rx="4" fill="#78350F"/>
  <text x="645" y="410" text-anchor="middle" fill="#FDE68A" font-family="system-ui, sans-serif" font-size="9">Checkpoints</text>
  <rect x="705" y="395" width="100" height="20" rx="4" fill="#78350F"/>
  <text x="755" y="410" text-anchor="middle" fill="#FDE68A" font-family="system-ui, sans-serif" font-size="9">Modulare Bausteine</text>

  <rect x="485" y="423" width="150" height="22" rx="4" fill="#78350F" stroke="#F59E0B" stroke-width="1"/>
  <text x="560" y="439" text-anchor="middle" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="10" font-weight="700">STATE MANAGEMENT</text>

  <text x="450" y="485" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Jedes Framework hat eine spezifische Staerke — Auswahl nach Use Case und Architektur-Anforderungen</text>
</svg>