<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
    <filter id="sh5">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg5)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Sicherheitsaspekte beim Tool Use</text>

  <!-- Shield icon metaphor -->
  <text x="450" y="65" text-anchor="middle" fill="#EF4444" font-family="system-ui, sans-serif" font-size="13">Angriffserfolgsraten &gt;50% bei Baseline Function-Calling Agents</text>

  <!-- Central agent -->
  <rect x="340" y="100" width="220" height="70" rx="14" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#sh5)"/>
  <text x="450" y="132" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Function-Calling Agent</text>
  <text x="450" y="155" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Angriffsflaeche</text>

  <!-- Attack vectors as red arrows pointing at agent -->
  <!-- Prompt Injection (left) -->
  <line x1="120" y1="135" x2="330" y2="135" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="330,135 318,128 318,142" fill="#EF4444"/>
  <rect x="30" y="100" width="180" height="70" rx="10" fill="#7F1D1D" filter="url(#sh5)"/>
  <text x="120" y="125" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Prompt Injection</text>
  <text x="120" y="145" text-anchor="middle" fill="#FDA4AF" font-family="system-ui, sans-serif" font-size="10">Boesartige Eingaben</text>
  <text x="120" y="160" text-anchor="middle" fill="#FDA4AF" font-family="system-ui, sans-serif" font-size="10">manipulieren den Agent</text>

  <!-- Tool Poisoning (right) -->
  <line x1="780" y1="135" x2="570" y2="135" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="570,135 582,128 582,142" fill="#EF4444"/>
  <rect x="690" y="100" width="180" height="70" rx="10" fill="#7F1D1D" filter="url(#sh5)"/>
  <text x="780" y="125" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Tool Poisoning</text>
  <text x="780" y="145" text-anchor="middle" fill="#FDA4AF" font-family="system-ui, sans-serif" font-size="10">Modifikation von</text>
  <text x="780" y="160" text-anchor="middle" fill="#FDA4AF" font-family="system-ui, sans-serif" font-size="10">Schema/Dokumentation</text>

  <!-- Renaming Attack (bottom) -->
  <line x1="450" y1="250" x2="450" y2="180" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="450,180 443,192 457,192" fill="#EF4444"/>
  <rect x="340" y="250" width="220" height="60" rx="10" fill="#7F1D1D" filter="url(#sh5)"/>
  <text x="450" y="275" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Renaming Attacks</text>
  <text x="450" y="298" text-anchor="middle" fill="#FDA4AF" font-family="system-ui, sans-serif" font-size="10">Umbenennung von Tools zur Taeuschung</text>

  <!-- Semantic Drift section -->
  <rect x="60" y="340" width="360" height="110" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="240" y="370" text-anchor="middle" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Semantischer Drift</text>

  <!-- Drift bar chart -->
  <rect x="90" y="390" width="200" height="16" rx="4" fill="#334155"/>
  <rect x="90" y="390" width="200" height="16" rx="4" fill="#3B82F6" opacity="0.8"/>
  <text x="310" y="403" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">Original: 100%</text>

  <rect x="90" y="415" width="200" height="16" rx="4" fill="#334155"/>
  <rect x="90" y="415" width="162" height="16" rx="4" fill="#F59E0B" opacity="0.8"/>
  <text x="310" y="428" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="11">Paraphrase: -11-19%</text>

  <!-- Mitigation section -->
  <rect x="480" y="340" width="380" height="110" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="670" y="370" text-anchor="middle" fill="#34D399" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Gegenmassnahmen</text>

  <text x="510" y="395" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11">&#x2713; Input-Validierung fuer alle Tool-Aufrufe</text>
  <text x="510" y="415" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11">&#x2713; Prinzip der minimalen Rechte</text>
  <text x="510" y="435" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11">&#x2713; Human-in-the-Loop fuer kritische Aktionen</text>

  <text x="450" y="470" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Sicherheit ist kein Feature — es ist eine architektonische Grundanforderung</text>
</svg>