<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360">
  <defs>
    <linearGradient id="mcpbg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="mcps8">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="360" fill="url(#mcpbg8)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">MCP — Zusammenfassung</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Vom internen Experiment zum Industriestandard in einem Jahr</text>

  <!-- Timeline arrow -->
  <rect x="100" y="80" width="700" height="6" rx="3" fill="#334155"/>
  <defs>
    <linearGradient id="mcp_timeline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <rect x="100" y="80" width="700" height="6" rx="3" fill="url(#mcp_timeline)"/>
  <text x="100" y="75" fill="#6366F1" font-family="system-ui, sans-serif" font-size="9">Nov 2024</text>
  <text x="800" y="75" text-anchor="end" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="9">2026</text>

  <!-- Five pillars -->
  <rect x="40" y="105" width="155" height="130" rx="10" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#mcps8)"/>
  <circle cx="117" cy="130" r="15" fill="#7C3AED"/>
  <text x="117" y="135" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="700">1</text>
  <text x="117" y="160" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Governance</text>
  <text x="117" y="180" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Linux Foundation</text>
  <text x="117" y="195" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Herstellerneutral</text>
  <text x="117" y="225" text-anchor="middle" fill="#7C3AED" font-family="system-ui, sans-serif" font-size="9" font-weight="700">AAIF</text>

  <rect x="210" y="105" width="155" height="130" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#mcps8)"/>
  <circle cx="287" cy="130" r="15" fill="#D97706"/>
  <text x="287" y="135" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="700">2</text>
  <text x="287" y="160" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Enterprise</text>
  <text x="287" y="180" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Audit, SSO</text>
  <text x="287" y="195" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Compliance</text>
  <text x="287" y="225" text-anchor="middle" fill="#D97706" font-family="system-ui, sans-serif" font-size="9" font-weight="700">READY</text>

  <rect x="380" y="105" width="155" height="130" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#mcps8)"/>
  <circle cx="457" cy="130" r="15" fill="#2563EB"/>
  <text x="457" y="135" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="700">3</text>
  <text x="457" y="160" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Skalierbarkeit</text>
  <text x="457" y="180" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Lokal → Cloud</text>
  <text x="457" y="195" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Cloud-native</text>
  <text x="457" y="225" text-anchor="middle" fill="#2563EB" font-family="system-ui, sans-serif" font-size="9" font-weight="700">HORIZONTAL</text>

  <rect x="550" y="105" width="155" height="130" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="1.5" filter="url(#mcps8)"/>
  <circle cx="627" cy="130" r="15" fill="#059669"/>
  <text x="627" y="135" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="700">4</text>
  <text x="627" y="160" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Agent Comms</text>
  <text x="627" y="180" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Multi-Agent</text>
  <text x="627" y="195" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Grundlage</text>
  <text x="627" y="225" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="9" font-weight="700">TASKS</text>

  <rect x="720" y="105" width="155" height="130" rx="10" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" filter="url(#mcps8)"/>
  <circle cx="797" cy="130" r="15" fill="#DC2626"/>
  <text x="797" y="135" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="700">5</text>
  <text x="797" y="160" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Sicherheit</text>
  <text x="797" y="180" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">OAuth 2.1</text>
  <text x="797" y="195" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Autorisierung</text>
  <text x="797" y="225" text-anchor="middle" fill="#DC2626" font-family="system-ui, sans-serif" font-size="9" font-weight="700">KRITISCH</text>

  <!-- Bottom summary -->
  <rect x="100" y="260" width="700" height="40" rx="8" fill="#334155" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="450" y="278" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="700">97M+ Downloads · 10.000+ Server · Alle grossen AI-Anbieter</text>
  <text x="450" y="295" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">MCP ist der Standard — nicht ein Standard</text>

  <text x="450" y="340" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">MCP 2024-2026 — Industriestandard fuer AI Agent Tool/Daten-Integration</text>
</svg>