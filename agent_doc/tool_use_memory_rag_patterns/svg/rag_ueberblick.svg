<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="rbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="rs1">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="400" fill="url(#rbg1)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">RAG Patterns — Ueberblick</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Von einfacher Pipeline zur Enterprise-Intelligence-Architektur</text>

  <!-- Core RAG flow -->
  <rect x="60" y="90" width="160" height="70" rx="12" fill="#1E293B" stroke="#6366F1" stroke-width="2" filter="url(#rs1)"/>
  <text x="140" y="120" text-anchor="middle" fill="#A5B4FC" font-family="system-ui, sans-serif" font-size="14" font-weight="700">User Query</text>
  <text x="140" y="142" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Natuerliche Frage</text>

  <polygon points="230,125 248,118 248,132" fill="#6366F1"/>
  <line x1="220" y1="125" x2="248" y2="125" stroke="#6366F1" stroke-width="2"/>

  <rect x="258" y="90" width="160" height="70" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#rs1)"/>
  <text x="338" y="120" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Retrieve</text>
  <text x="338" y="142" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Relevante Dokumente</text>

  <polygon points="428,125 446,118 446,132" fill="#3B82F6"/>
  <line x1="418" y1="125" x2="446" y2="125" stroke="#3B82F6" stroke-width="2"/>

  <rect x="456" y="90" width="160" height="70" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#rs1)"/>
  <text x="536" y="120" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Augment</text>
  <text x="536" y="142" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Context anreichern</text>

  <polygon points="626,125 644,118 644,132" fill="#10B981"/>
  <line x1="616" y1="125" x2="644" y2="125" stroke="#10B981" stroke-width="2"/>

  <rect x="654" y="90" width="200" height="70" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2" filter="url(#rs1)"/>
  <text x="754" y="120" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Generate</text>
  <text x="754" y="142" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Fundierte Antwort</text>

  <!-- 2026 Status -->
  <rect x="100" y="195" width="700" height="55" rx="12" fill="#334155" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="450" y="218" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="14" font-weight="700">2026: Modulare und Agentische Phase</text>
  <text x="450" y="238" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Nicht mehr linear — iterativ und selbstkorrigierend</text>

  <!-- Key capabilities -->
  <rect x="60" y="275" width="185" height="50" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1" filter="url(#rs1)"/>
  <text x="152" y="298" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Multimodal</text>
  <text x="152" y="315" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Text, Bild, Code</text>

  <rect x="265" y="275" width="185" height="50" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1" filter="url(#rs1)"/>
  <text x="357" y="298" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Hybrid Retrieval</text>
  <text x="357" y="315" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Dense + Sparse</text>

  <rect x="470" y="275" width="185" height="50" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1" filter="url(#rs1)"/>
  <text x="562" y="298" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Self-Correction</text>
  <text x="562" y="315" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Agent-gesteuert</text>

  <rect x="675" y="275" width="185" height="50" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="1" filter="url(#rs1)"/>
  <text x="767" y="298" text-anchor="middle" fill="#F9A8D4" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Enterprise Governance</text>
  <text x="767" y="315" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Access Control, Audit</text>

  <text x="450" y="365" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-style="italic">RAG treibt die meisten modernen AI Agents, Copilots und Chat-Systeme an</text>
  <text x="450" y="390" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">RAG Patterns 2025/2026</text>
</svg>