<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="mcpbg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="mcps7">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="250" fill="url(#mcpbg7)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Entwicklungsflexibilitaet</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">MCP in jeder Programmiersprache implementierbar</text>

  <!-- Two requirements -->
  <rect x="100" y="85" width="300" height="80" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#mcps7)"/>
  <text x="250" y="115" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Stdio Transport</text>
  <text x="250" y="140" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Kann auf stdout drucken?</text>
  <text x="250" y="157" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">→ MCP Server moeglich!</text>

  <text x="450" y="130" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="20" font-weight="700">ODER</text>

  <rect x="500" y="85" width="300" height="80" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#mcps7)"/>
  <text x="650" y="115" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Streamable HTTP</text>
  <text x="650" y="140" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Kann HTTP-Endpoint bereitstellen?</text>
  <text x="650" y="157" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">→ MCP Server moeglich!</text>

  <!-- Languages -->
  <rect x="100" y="185" width="700" height="40" rx="8" fill="#334155"/>
  <text x="450" y="210" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Python · TypeScript · Go · Rust · Java · C# · Ruby · und jede andere Sprache</text>

  <text x="450" y="242" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Entwickler waehlen ihren bevorzugten Technology Stack</text>
</svg>