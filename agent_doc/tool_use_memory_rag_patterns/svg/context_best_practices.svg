  <text x="510" y="183" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Fuer langlebige Agent-Sessions</text>

  <rect x="460" y="206" width="410" height="55" rx="8" fill="#1E293B" stroke="#84CC16" stroke-width="1.5" filter="url(#cs9)"/>
  <circle cx="485" cy="233" r="13" fill="#65A30D"/>
  <text x="485" y="238" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">8</text>
  <text x="510" y="229" fill="#BEF264" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Versionskontrollierte MD-Dateien</text>
  <text x="510" y="246" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Persistenter Projekt-Context (CLAUDE.md)</text>

  <rect x="460" y="269" width="410" height="55" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#cs9)"/>
  <circle cx="485" cy="296" r="13" fill="#D97706"/>
  <text x="485" y="301" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">9</text>
  <text x="510" y="292" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Context Anxiety beachten</text>
  <text x="510" y="309" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Bei Modellen entschaerfen</text>

  <rect x="460" y="332" width="410" height="55" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" filter="url(#cs9)"/>
  <circle cx="485" cy="359" r="13" fill="#DC2626"/>
  <text x="485" y="364" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="9" font-weight="700">10</text>
  <text x="510" y="355" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Lost-in-the-Middle vermeiden</text>
  <text x="510" y="372" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Kritische Infos am Anfang/Ende platzieren</text>

  <!-- Summary -->
  <rect x="150" y="410" width="600" height="40" rx="8" fill="#334155"/>
  <text x="450" y="428" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Context Engineering = Ganzheitliche Informationsumgebung statt einzelner Prompts</text>
  <text x="450" y="445" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Qualitaet &gt; Quantitaet — Signal &gt; Noise — Dynamisch &gt; Statisch</text>

  <text x="450" y="485" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Context Engineering Best Practices 2025/2026</text>
</svg>