  <text x="55" y="301" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">4</text>
  <text x="80" y="292" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Context Pruning aktiv betreiben</text>
  <text x="80" y="309" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Veraltete Informationen entfernen</text>

  <rect x="30" y="332" width="410" height="55" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#cs9)"/>
  <circle cx="55" cy="359" r="13" fill="#D97706"/>
  <text x="55" y="364" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">5</text>
  <text x="80" y="355" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Progressive Disclosure</text>
  <text x="80" y="372" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Nur noetige Infos laden</text>

