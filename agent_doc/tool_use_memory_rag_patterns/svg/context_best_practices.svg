  <text x="510" y="120" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Oder Tool Search nutzen</text>

  <rect x="460" y="143" width="410" height="55" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="1.5" filter="url(#cs9)"/>
