<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="cbg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="cs9">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#cbg9)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Context Engineering — Best Practices</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">10 Empfehlungen fuer optimales Context Management</text>

  <!-- Two columns -->
  <!-- Left: 1-5 -->
  <rect x="30" y="80" width="410" height="55" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" filter="url(#cs9)"/>
  <circle cx="55" cy="107" r="13" fill="#DC2626"/>
  <text x="55" y="112" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">1</text>
  <text x="80" y="103" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Context als knappe Ressource</text>
  <text x="80" y="120" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Jeder Token hat Kosten — Attention Budget</text>

  <rect x="30" y="143" width="410" height="55" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#cs9)"/>
  <circle cx="55" cy="170" r="13" fill="#2563EB"/>
  <text x="55" y="175" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">2</text>
  <text x="80" y="166" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Dynamic Context Assembly</text>
  <text x="80" y="183" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Pro Request implementieren</text>

  <rect x="30" y="206" width="410" height="55" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1.5" filter="url(#cs9)"/>
  <circle cx="55" cy="233" r="13" fill="#059669"/>
  <text x="55" y="238" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">3</text>
  <text x="80" y="229" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Hierarchical Summarization</text>
  <text x="80" y="246" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Progressive Komprimierung nach Alter</text>

  <rect x="30" y="269" width="410" height="55" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#cs9)"/>
