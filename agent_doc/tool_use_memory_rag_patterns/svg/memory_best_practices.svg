<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="mbg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="ms7">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="450" fill="url(#mbg7)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Memory — Best Practices</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">7 Empfehlungen fuer robustes Memory Management</text>

  <!-- Circular layout around center -->
  <!-- Center -->
  <circle cx="450" cy="245" r="50" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Memory</text>
  <text x="450" y="258" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="10">Agent</text>

  <!-- Practice 1 (top) -->
  <line x1="450" y1="195" x2="450" y2="140" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="340" y="88" width="220" height="52" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1.5" filter="url(#ms7)"/>
  <circle cx="365" cy="114" r="12" fill="#059669"/>
  <text x="365" y="118" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">1</text>
  <text x="460" y="109" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Memory als Tool-Aktionen</text>
  <text x="460" y="127" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Autonomes save/get/delete</text>

  <!-- Practice 2 (top-right) -->
  <line x1="490" y1="210" x2="580" y2="140" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="580" y="88" width="220" height="52" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#ms7)"/>
  <circle cx="605" cy="114" r="12" fill="#2563EB"/>
  <text x="605" y="118" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">2</text>
  <text x="700" y="109" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Hierarchical Summary</text>
  <text x="700" y="127" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Progressive Komprimierung</text>

  <!-- Practice 3 (right) -->
  <line x1="500" y1="245" x2="590" y2="215" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="590" y="190" width="250" height="52" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#ms7)"/>
  <circle cx="615" cy="216" r="12" fill="#D97706"/>
  <text x="615" y="220" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">3</text>
  <text x="720" y="211" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">3 Memory-Scopes</text>
  <text x="720" y="229" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Episodic + Semantic + Procedural</text>

  <!-- Practice 4 (bottom-right) -->
  <line x1="490" y1="280" x2="590" y2="315" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="590" y="290" width="250" height="52" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="1.5" filter="url(#ms7)"/>
  <circle cx="615" cy="316" r="12" fill="#DB2777"/>
  <text x="615" y="320" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">4</text>
  <text x="720" y="311" text-anchor="middle" fill="#F9A8D4" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Virtual Context Mgmt</text>
  <text x="720" y="329" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">OS-inspirierter Ansatz</text>

  <!-- Practice 5 (bottom) -->
  <line x1="450" y1="295" x2="450" y2="370" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="340" y="370" width="220" height="52" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" filter="url(#ms7)"/>
  <circle cx="365" cy="396" r="12" fill="#DC2626"/>
  <text x="365" y="400" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">5</text>
  <text x="460" y="391" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Context Pruning</text>
  <text x="460" y="409" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Veraltetes entfernen</text>

  <!-- Practice 6 (bottom-left) -->
  <line x1="410" y1="280" x2="310" y2="315" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="60" y="290" width="250" height="52" rx="8" fill="#1E293B" stroke="#06B6D4" stroke-width="1.5" filter="url(#ms7)"/>
  <circle cx="85" cy="316" r="12" fill="#0891B2"/>
  <text x="85" y="320" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">6</text>
  <text x="195" y="311" text-anchor="middle" fill="#67E8F9" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Extern persistieren</text>
  <text x="195" y="329" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Nicht im Context mitfuehren</text>

  <!-- Practice 7 (left) -->
  <line x1="400" y1="245" x2="310" y2="215" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="60" y="190" width="250" height="52" rx="8" fill="#1E293B" stroke="#84CC16" stroke-width="1.5" filter="url(#ms7)"/>
  <circle cx="85" cy="216" r="12" fill="#65A30D"/>
  <text x="85" y="220" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="10" font-weight="700">7</text>
  <text x="195" y="211" text-anchor="middle" fill="#BEF264" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Temporal Markers</text>
  <text x="195" y="229" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">Zeitliche Zuordnung</text>

  <!-- Top-left -->
  <line x1="410" y1="210" x2="310" y2="140" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <rect x="100" y="88" width="220" height="52" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#ms7)"/>
  <text x="210" y="120" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Autonome Agents</text>
  <text x="210" y="134" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10" font-style="italic">verwalten Memory selbst</text>
</svg>