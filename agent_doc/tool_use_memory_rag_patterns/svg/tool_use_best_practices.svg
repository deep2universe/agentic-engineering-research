  <text x="160" y="110" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Tool-Beschreibungen</text>
  <text x="160" y="132" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Sorgfaeltig gestalten —</text>
