  <text x="160" y="370" text-anchor="middle" fill="#67E8F9" font-family="system-ui, sans-serif" font-size="12" font-weight="700">MCP Standard</text>
  <text x="160" y="392" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Als Integrationsstandard nutzen</text>

