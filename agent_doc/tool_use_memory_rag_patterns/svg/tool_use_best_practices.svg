  <text x="440" y="370" text-anchor="middle" fill="#F9A8D4" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Governance</text>
  <text x="440" y="392" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Human-in-the-Loop: 2x Einsparungen</text>

  <rect x="600" y="345" width="260" height="100" rx="10" fill="#1E293B" stroke="#84CC16" stroke-width="1.5" filter="url(#sh7)"/>
  <circle cx="625" cy="370" r="14" fill="#65A30D"/>
  <text x="625" y="375" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="12" font-weight="700">9</text>
  <text x="720" y="370" text-anchor="middle" fill="#BEF264" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Observability</text>
  <text x="720" y="392" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">89% haben es implementiert</text>

  <text x="450" y="480" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Tool Use Best Practices — Architektonische Grundlagen fuer produktionsreife AI Agents</text>
