  <text x="520" y="375" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Skalierbarkeit</text>
  <text x="670" y="375" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Praezision</text>

  <text x="450" y="412" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Enterprise RAG 2026 — Governance, Multimodal, Knowledge Runtimes</text>
