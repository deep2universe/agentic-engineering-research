<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="gbg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="gs6">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="280" fill="url(#gbg6)" rx="16"/>
  <text x="450" y="35" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Gesamtbericht — MCP (Model Context Protocol)</text>

  <!-- Key metrics -->
  <rect x="40" y="60" width="170" height="60" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#gs6)"/>
  <text x="125" y="85" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="16" font-weight="700">97M+</text>
  <text x="125" y="105" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">SDK-Downloads/Mo</text>

  <rect x="225" y="60" width="170" height="60" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1.5" filter="url(#gs6)"/>
  <text x="310" y="85" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="16" font-weight="700">10.000+</text>
  <text x="310" y="105" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Server</text>

  <rect x="410" y="60" width="240" height="60" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#gs6)"/>
  <text x="530" y="85" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Linux Foundation AAIF</text>
  <text x="530" y="105" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Dez 2025</text>

  <rect x="665" y="60" width="200" height="60" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#gs6)"/>
  <text x="765" y="85" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Tools + Resources</text>
  <text x="765" y="105" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">+ Prompts (3 Primitives)</text>

  <!-- Architecture -->
  <rect x="40" y="140" width="400" height="50" rx="8" fill="#334155"/>
  <text x="240" y="163" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="600">MCP: Wie Agents auf Tools und Daten zugreifen</text>
  <text x="240" y="182" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Client-Server | JSON-RPC | Stdio + HTTP | OAuth 2.1</text>

  <rect x="460" y="140" width="400" height="50" rx="8" fill="#334155"/>
  <text x="660" y="163" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="600">A2A: Wie Agents miteinander kommunizieren</text>
  <text x="660" y="182" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Google Protokoll | 150+ Organisationen | Multi-Agent</text>

  <!-- Roadmap -->
  <rect x="40" y="210" width="820" height="40" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="232" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Roadmap 2026: Transport-Skalierung | Agent Comms | Governance | Enterprise (Audit, SSO)</text>
  <text x="450" y="246" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">MCP + A2A = Komplette Multi-Agent Infrastruktur</text>

  <text x="450" y="275" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">MCP ist DER Industriestandard — herstellerneutral, enterprise-ready</text>
</svg>