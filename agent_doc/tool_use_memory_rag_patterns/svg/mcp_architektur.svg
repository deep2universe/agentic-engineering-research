<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="mcpbg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="mcps2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="450" fill="url(#mcpbg2)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">MCP Architektur</text>

  <!-- Client-Server Model -->
  <!-- Client side -->
  <rect x="60" y="75" width="340" height="180" rx="14" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#mcps2)"/>
  <rect x="60" y="75" width="340" height="32" rx="14" fill="#2563EB"/>
  <rect x="60" y="95" width="340" height="12" fill="#2563EB"/>
  <text x="230" y="97" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">MCP Client (AI App)</text>

  <text x="85" y="130" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">1. Startet + verbindet zu Servern</text>
  <text x="85" y="150" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">2. Fragt: "Welche Faehigkeiten?"</text>
  <text x="85" y="170" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">3. Registriert Faehigkeiten</text>
  <text x="85" y="190" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">4. Macht sie fuer AI verfuegbar</text>

  <rect x="85" y="210" width="130" height="24" rx="4" fill="#1E3A5F"/>
  <text x="150" y="227" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Discovery-Prozess</text>

  <!-- JSON-RPC arrows -->
  <line x1="400" y1="140" x2="490" y2="140" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="490,140 480,133 480,147" fill="#3B82F6"/>
  <line x1="490" y1="160" x2="400" y2="160" stroke="#10B981" stroke-width="2"/>
  <polygon points="400,160 410,153 410,167" fill="#10B981"/>
  <text x="445" y="130" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">JSON-RPC</text>
  <text x="445" y="180" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Request/Response</text>

  <!-- Server side -->
  <rect x="500" y="75" width="340" height="180" rx="14" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#mcps2)"/>
  <rect x="500" y="75" width="340" height="32" rx="14" fill="#059669"/>
  <rect x="500" y="95" width="340" height="12" fill="#059669"/>
  <text x="670" y="97" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">MCP Server</text>

  <text x="525" y="130" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11">Exponiert Faehigkeiten:</text>
  <rect x="525" y="140" width="100" height="24" rx="4" fill="#064E3B"/>
  <text x="575" y="157" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Tools</text>
  <rect x="635" y="140" width="100" height="24" rx="4" fill="#064E3B"/>
  <text x="685" y="157" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Resources</text>
  <rect x="745" y="140" width="80" height="24" rx="4" fill="#064E3B"/>
  <text x="785" y="157" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Prompts</text>

  <text x="525" y="190" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">+ Lifecycle Management</text>
  <text x="525" y="210" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">+ Discovery APIs (*/list, */get)</text>

  <!-- Layer model -->
  <text x="450" y="290" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Zwei-Schichten-Architektur</text>

  <!-- Data Layer -->
  <rect x="100" y="310" width="310" height="60" rx="10" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#mcps2)"/>
  <text x="255" y="335" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Data Layer</text>
  <text x="255" y="355" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">JSON-RPC Protokoll + Lifecycle + Core Primitives</text>

  <!-- Transport Layer -->
  <rect x="490" y="310" width="310" height="60" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#mcps2)"/>
  <text x="645" y="335" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Transport Layer</text>
  <text x="645" y="355" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Stdio (lokal) | Streamable HTTP (remote)</text>

  <!-- Connection -->
  <line x1="410" y1="340" x2="490" y2="340" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="450" y="410" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Client-Server-Modell mit JSON-RPC — Stdio fuer lokale, Streamable HTTP fuer Remote-Server</text>
</svg>