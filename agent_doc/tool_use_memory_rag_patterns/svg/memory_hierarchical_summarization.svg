<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="mbg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="ms5">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="380" fill="url(#mbg5)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Hierarchical Summarization</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Progressive Komprimierung — Aeltere Informationen werden zunehmend verdichtet</text>

  <!-- Time axis -->
  <text x="80" y="95" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">ALT</text>
  <text x="800" y="95" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">NEU</text>
  <rect x="110" y="90" width="680" height="4" rx="2" fill="#334155"/>
  <defs>
    <linearGradient id="time_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>
  <rect x="110" y="90" width="680" height="4" rx="2" fill="url(#time_grad)"/>

  <!-- Level 1: Highly compressed (left) -->
  <rect x="60" y="115" width="190" height="100" rx="10" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" filter="url(#ms5)"/>
  <text x="155" y="140" text-anchor="middle" fill="#A5B4FC" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Hochkomprimiert</text>
  <rect x="80" y="155" width="150" height="12" rx="3" fill="#312E81"/>
  <rect x="80" y="172" width="100" height="12" rx="3" fill="#312E81"/>
  <text x="155" y="200" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Wenige Kernfakten</text>

  <!-- Level 2: Moderate compression -->
  <rect x="270" y="115" width="200" height="100" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#ms5)"/>
  <text x="370" y="140" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Zusammengefasst</text>
  <rect x="290" y="155" width="160" height="10" rx="3" fill="#1E3A5F"/>
  <rect x="290" y="170" width="160" height="10" rx="3" fill="#1E3A5F"/>
  <rect x="290" y="185" width="120" height="10" rx="3" fill="#1E3A5F"/>
  <text x="370" y="210" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Verdichtete Details</text>

  <!-- Level 3: Full verbatim (right) -->
  <rect x="490" y="115" width="370" height="100" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="1.5" filter="url(#ms5)"/>
  <text x="675" y="140" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Woertlich (Verbatim)</text>
  <rect x="510" y="155" width="330" height="8" rx="2" fill="#064E3B"/>
  <rect x="510" y="167" width="330" height="8" rx="2" fill="#064E3B"/>
  <rect x="510" y="179" width="330" height="8" rx="2" fill="#064E3B"/>
  <rect x="510" y="191" width="250" height="8" rx="2" fill="#064E3B"/>
  <text x="675" y="210" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Vollstaendiger Text der juengsten Interaktionen</text>

  <!-- Compression arrows -->
  <text x="260" y="170" fill="#4F46E5" font-family="system-ui, sans-serif" font-size="18">&#x276E;</text>
  <text x="480" y="170" fill="#2563EB" font-family="system-ui, sans-serif" font-size="18">&#x276E;</text>

  <!-- Funnel visualization -->
  <text x="450" y="260" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Komprimierungstrichter</text>

  <!-- Funnel shape -->
  <polygon points="200,280 700,280 600,340 300,340" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" opacity="0.8"/>
  <text x="450" y="300" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">Vollstaendiger Konversationsverlauf</text>

  <polygon points="300,342 600,342 540,360 360,360" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" opacity="0.8"/>
  <text x="450" y="355" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="10">Komprimierter Context</text>

  <text x="450" y="378" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Wesentliche Informationen bleiben erhalten — Details werden progressiv verdichtet</text>
</svg>