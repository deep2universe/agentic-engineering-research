<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="580" fill="url(#bg3)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Tool Selection Patterns</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Vier Strategien fuer die Auswahl des richtigen Tools zur Laufzeit</text>

  <!-- Pattern 1: Direct Selection -->
  <rect x="40" y="90" width="390" height="190" rx="12" fill="#1E293B" stroke="#4F46E5" stroke-width="2" filter="url(#sh3)"/>
  <rect x="40" y="90" width="390" height="36" rx="12" fill="#4F46E5"/>
  <rect x="40" y="110" width="390" height="16" fill="#4F46E5"/>
  <text x="235" y="113" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">3.1 Direkte Tool Selection</text>

  <!-- Flow -->
  <rect x="65" y="145" width="100" height="40" rx="8" fill="#312E81"/>
  <text x="115" y="170" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="11" font-weight="600">User Query</text>
  <polygon points="175,165 190,158 190,172" fill="#6366F1"/>

  <rect x="200" y="145" width="100" height="40" rx="8" fill="#4F46E5"/>
  <text x="250" y="163" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="11" font-weight="600">LLM liest</text>
  <text x="250" y="177" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="9">Beschreibungen</text>
  <polygon points="310,165 325,158 325,172" fill="#6366F1"/>

  <rect x="335" y="145" width="75" height="40" rx="8" fill="#312E81"/>
  <text x="372" y="170" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Tool X</text>

  <text x="235" y="210" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-style="italic">Prompt Engineering fuer Tools —</text>
  <text x="235" y="228" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-style="italic">Beschreibungsqualitaet = Selection Accuracy</text>
  <text x="235" y="265" text-anchor="middle" fill="#6366F1" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Fuer kleine Tool-Sets (&lt;30)</text>

  <!-- Pattern 2: Tool Search -->
  <rect x="470" y="90" width="390" height="190" rx="12" fill="#1E293B" stroke="#2563EB" stroke-width="2" filter="url(#sh3)"/>
  <rect x="470" y="90" width="390" height="36" rx="12" fill="#2563EB"/>
  <rect x="470" y="110" width="390" height="16" fill="#2563EB"/>
  <text x="665" y="113" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">3.2 Tool Search Pattern</text>

  <!-- 2-step flow -->
  <rect x="495" y="145" width="100" height="40" rx="8" fill="#1E3A5F"/>
  <text x="545" y="163" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Such-Tool</text>
  <text x="545" y="177" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="9">RAG auf Tools</text>
  <polygon points="605,165 620,158 620,172" fill="#3B82F6"/>

  <rect x="630" y="145" width="100" height="40" rx="8" fill="#1E3A5F"/>
  <text x="680" y="163" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Top-N laden</text>
  <text x="680" y="177" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="9">&lt;30 Tools</text>
  <polygon points="740,165 755,158 755,172" fill="#3B82F6"/>

  <rect x="765" y="145" width="75" height="40" rx="8" fill="#1E3A5F"/>
  <text x="802" y="170" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Auswahl</text>

  <!-- Performance badge -->
  <rect x="570" y="205" width="190" height="30" rx="6" fill="#065F46" stroke="#10B981" stroke-width="1"/>
  <text x="665" y="225" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="12" font-weight="700">3x bessere Accuracy</text>
  <text x="665" y="265" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Fuer grosse Tool-Sets (&gt;30)</text>

  <!-- Pattern 3: Dynamic Routing -->
  <rect x="40" y="310" width="390" height="190" rx="12" fill="#1E293B" stroke="#059669" stroke-width="2" filter="url(#sh3)"/>
  <rect x="40" y="310" width="390" height="36" rx="12" fill="#059669"/>
  <rect x="40" y="330" width="390" height="16" fill="#059669"/>
  <text x="235" y="333" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">3.3 Dynamic Tool Routing</text>

  <!-- Router visualization -->
  <rect x="170" y="365" width="130" height="45" rx="10" fill="#065F46"/>
  <text x="235" y="385" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Router Agent</text>
  <text x="235" y="402" text-anchor="middle" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="10">Task Analysis</text>

  <!-- Routing arrows -->
  <line x1="175" y1="410" x2="100" y2="450" stroke="#10B981" stroke-width="2"/>
  <line x1="235" y1="410" x2="235" y2="450" stroke="#10B981" stroke-width="2"/>
  <line x1="295" y1="410" x2="370" y2="450" stroke="#10B981" stroke-width="2"/>

  <rect x="60" y="450" width="80" height="30" rx="6" fill="#064E3B"/>
  <text x="100" y="470" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10">Tool A</text>

  <rect x="195" y="450" width="80" height="30" rx="6" fill="#064E3B"/>
  <text x="235" y="470" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10">Tool B</text>

  <rect x="330" y="450" width="80" height="30" rx="6" fill="#064E3B"/>
  <text x="370" y="470" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10">Tool C</text>

  <!-- Pattern 4: Model Tiering -->
  <rect x="470" y="310" width="390" height="190" rx="12" fill="#1E293B" stroke="#D97706" stroke-width="2" filter="url(#sh3)"/>
  <rect x="470" y="310" width="390" height="36" rx="12" fill="#D97706"/>
  <rect x="470" y="330" width="390" height="16" fill="#D97706"/>
  <text x="665" y="333" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">3.4 Model Tiering</text>

  <!-- Tier visualization -->
  <rect x="520" y="365" width="140" height="40" rx="8" fill="#78350F"/>
  <text x="590" y="383" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Tier 1: Triage</text>
  <text x="590" y="398" text-anchor="middle" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="9">Haiku / Flash (guenstig)</text>

  <line x1="660" y1="385" x2="700" y2="385" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="700,385 690,378 690,392" fill="#F59E0B"/>

  <rect x="700" y="365" width="140" height="40" rx="8" fill="#78350F"/>
  <text x="770" y="383" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Tier 2: Reasoning</text>
  <text x="770" y="398" text-anchor="middle" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="9">Opus / GPT-4 (teuer)</text>

  <!-- Cost badge -->
  <rect x="610" y="425" width="120" height="30" rx="6" fill="#7C2D12" stroke="#F59E0B" stroke-width="1"/>
  <text x="670" y="445" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="12" font-weight="700">-40-60% Kosten</text>

  <text x="665" y="485" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11" font-style="italic">Routing-Agent + spezialisierte Reasoning-Agents</text>

  <!-- Footer -->
  <text x="450" y="545" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Tool Selection bestimmt massgeblich die Agent-Performance und -Kosten</text>
</svg>