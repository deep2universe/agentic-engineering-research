<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="sh6">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="400" fill="url(#bg6)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Standards und Protokolle</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Die zwei Sauelen der Agent-Infrastruktur 2026</text>

  <!-- MCP Block -->
  <rect x="60" y="90" width="360" height="260" rx="14" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#sh6)"/>
  <rect x="60" y="90" width="360" height="42" rx="14" fill="#2563EB"/>
  <rect x="60" y="116" width="360" height="16" fill="#2563EB"/>
  <text x="240" y="118" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="17" font-weight="700">MCP</text>

  <text x="240" y="160" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Model Context Protocol</text>
  <text x="240" y="185" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Wie Agents auf Tools und Daten zugreifen</text>

  <!-- MCP features -->
  <rect x="90" y="205" width="300" height="26" rx="6" fill="#1E3A5F"/>
  <text x="240" y="223" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">75+ Connectors allein in Claude</text>

  <rect x="90" y="240" width="300" height="26" rx="6" fill="#1E3A5F"/>
  <text x="240" y="258" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">JSON-RPC · Tools · Resources · Prompts</text>

  <rect x="90" y="275" width="300" height="26" rx="6" fill="#1E3A5F"/>
  <text x="240" y="293" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">Stdio + Streamable HTTP Transport</text>

  <rect x="90" y="310" width="300" height="26" rx="6" fill="#065F46"/>
  <text x="240" y="328" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Industriestandard unter Linux Foundation</text>

  <!-- A2A Block -->
  <rect x="480" y="90" width="360" height="260" rx="14" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" filter="url(#sh6)"/>
  <rect x="480" y="90" width="360" height="42" rx="14" fill="#7C3AED"/>
  <rect x="480" y="116" width="360" height="16" fill="#7C3AED"/>
  <text x="660" y="118" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="17" font-weight="700">A2A</text>

  <text x="660" y="160" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Agent-to-Agent Protocol</text>
  <text x="660" y="185" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Wie Agents miteinander kommunizieren</text>

  <!-- A2A features -->
  <rect x="510" y="205" width="300" height="26" rx="6" fill="#2E1065"/>
  <text x="660" y="223" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11">Google-Protokoll fuer Agent-Kommunikation</text>

  <rect x="510" y="240" width="300" height="26" rx="6" fill="#2E1065"/>
  <text x="660" y="258" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11">150+ unterstuetzende Organisationen</text>

  <rect x="510" y="275" width="300" height="26" rx="6" fill="#2E1065"/>
  <text x="660" y="293" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11">Multi-Agent-System Infrastruktur</text>

  <rect x="510" y="310" width="300" height="26" rx="6" fill="#065F46"/>
  <text x="660" y="328" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Komplementaer zu MCP</text>

  <!-- Connection -->
  <line x1="420" y1="220" x2="480" y2="220" stroke="#64748B" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="450" y="215" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="18">+</text>

  <rect x="280" y="365" width="340" height="26" rx="6" fill="#334155"/>
  <text x="450" y="383" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="12" font-weight="600">MCP + A2A = Komplette Multi-Agent Infrastruktur</text>
</svg>