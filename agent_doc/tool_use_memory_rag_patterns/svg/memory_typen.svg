<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="mbg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="ms2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="560" fill="url(#mbg2)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Memory-Typen fuer AI Agents</text>

  <!-- Two-column layout: Classic (STM/LTM) + Modern (E/S/P) -->

  <!-- Left: Classic -->
  <text x="240" y="80" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Klassische Unterscheidung</text>

  <!-- STM -->
  <rect x="50" y="100" width="380" height="140" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#ms2)"/>
  <rect x="50" y="100" width="380" height="34" rx="12" fill="#2563EB"/>
  <rect x="50" y="120" width="380" height="14" fill="#2563EB"/>
  <text x="240" y="122" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Short-Term Memory (In-Context)</text>

  <text x="75" y="160" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">&#x2022; Live Context Window — "brutal endlich"</text>
  <text x="75" y="180" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">&#x2022; Aktuelle Konversation + Tool-Ergebnisse</text>
  <text x="75" y="200" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11">&#x2022; Reasoning-Schritte + abgerufene Dokumente</text>
  <rect x="280" y="210" width="130" height="22" rx="4" fill="#1E3A5F"/>
  <text x="345" y="226" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">SCHLANK HALTEN</text>

  <!-- LTM -->
  <rect x="50" y="260" width="380" height="120" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" filter="url(#ms2)"/>
  <rect x="50" y="260" width="380" height="34" rx="12" fill="#7C3AED"/>
  <rect x="50" y="280" width="380" height="14" fill="#7C3AED"/>
  <text x="240" y="282" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Long-Term Memory (Out-of-Context)</text>

  <text x="75" y="318" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11">&#x2022; Externer Speicher: Vector DB / Graph DB</text>
  <text x="75" y="338" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11">&#x2022; Wissensbasis des Agents</text>
  <text x="75" y="358" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="11">&#x2022; Diverse Informationen fuer zukuenftige Nutzung</text>

  <!-- Arrow between STM and LTM -->
  <line x1="240" y1="240" x2="240" y2="260" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="300" y="254" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Offloading</text>

  <!-- Right: Modern Tri-Type -->
  <text x="660" y="80" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Drei Memory-Scopes (Standard 2026)</text>

  <!-- Episodic -->
  <rect x="480" y="100" width="380" height="100" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#ms2)"/>
  <rect x="480" y="100" width="380" height="34" rx="12" fill="#059669"/>
  <rect x="480" y="120" width="380" height="14" fill="#059669"/>
  <text x="660" y="122" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Episodic Memory</text>
  <text x="505" y="158" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11">Spezifische Ereignisse + Zeitstempel</text>
  <text x="505" y="178" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10" font-style="italic">"User fragte nach Webhook-Docs am 03.04."</text>

  <!-- Semantic -->
  <rect x="480" y="215" width="380" height="100" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2" filter="url(#ms2)"/>
  <rect x="480" y="215" width="380" height="34" rx="12" fill="#D97706"/>
  <rect x="480" y="235" width="380" height="14" fill="#D97706"/>
  <text x="660" y="237" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Semantic Memory</text>
  <text x="505" y="273" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11">Extrahiertes Wissen, generalisiert</text>
  <text x="505" y="293" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="10" font-style="italic">"User programmiert in TypeScript"</text>

  <!-- Procedural -->
  <rect x="480" y="330" width="380" height="100" rx="12" fill="#1E293B" stroke="#EC4899" stroke-width="2" filter="url(#ms2)"/>
  <rect x="480" y="330" width="380" height="34" rx="12" fill="#DB2777"/>
  <rect x="480" y="350" width="380" height="14" fill="#DB2777"/>
  <text x="660" y="352" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Procedural Memory</text>
  <text x="505" y="388" fill="#F9A8D4" font-family="system-ui, sans-serif" font-size="11">Erlernte Verhaltensmuster</text>
  <text x="505" y="408" fill="#FBCFE8" font-family="system-ui, sans-serif" font-size="10" font-style="italic">"Bevorzugte Code-Formatierung anwenden"</text>

  <!-- Summary bar -->
  <rect x="50" y="460" width="800" height="40" rx="8" fill="#334155"/>
  <text x="450" y="478" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="12">WAS geschah (Episodic) | WAS bekannt ist (Semantic) | WIE gehandelt wird (Procedural)</text>
  <text x="450" y="495" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Alle drei Scopes zusammen bilden das vollstaendige Agent-Gedaechtnis</text>

  <text x="450" y="540" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Memory Patterns fuer AI Agents 2025/2026</text>
</svg>