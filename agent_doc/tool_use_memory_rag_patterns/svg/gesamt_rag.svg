<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="gbg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="gs4">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="280" fill="url(#gbg4)" rx="16"/>
  <text x="450" y="35" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Gesamtbericht — RAG Patterns</text>

  <!-- Evolution line -->
  <text x="450" y="65" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Naive RAG → Advanced RAG → Modular RAG → Agentic RAG → Context Engine (2026)</text>

  <!-- Key variants -->
  <rect x="30" y="85" width="125" height="75" rx="8" fill="#1E293B" stroke="#64748B" stroke-width="1" filter="url(#gs4)"/>
  <text x="92" y="108" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Naive RAG</text>
  <text x="92" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Baseline</text>
  <text x="92" y="148" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="8">Einfach</text>

  <rect x="165" y="85" width="125" height="75" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1" filter="url(#gs4)"/>
  <text x="227" y="108" text-anchor="middle" fill="#A5B4FC" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Self-RAG</text>
  <text x="227" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Reflection Tokens</text>
  <text x="227" y="148" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="8">Verbessert</text>

  <rect x="300" y="85" width="125" height="75" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1" filter="url(#gs4)"/>
  <text x="362" y="108" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="10" font-weight="700">CRAG</text>
  <text x="362" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">3 korrektive Pfade</text>
  <text x="362" y="148" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="8">Hoch</text>

  <rect x="435" y="85" width="125" height="75" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1" filter="url(#gs4)"/>
  <text x="497" y="108" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Adaptive</text>
  <text x="497" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Query-Classifier</text>
  <text x="497" y="148" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="8">Effizient</text>

  <rect x="570" y="85" width="145" height="75" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#gs4)"/>
  <text x="642" y="108" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Agentic RAG</text>
  <text x="642" y="128" text-anchor="middle" fill="#34D399" font-family="system-ui, sans-serif" font-size="9">78% / 94.5%</text>
  <text x="642" y="148" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="8" font-weight="700">DOMINANT</text>

  <rect x="725" y="85" width="145" height="75" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#gs4)"/>
  <text x="797" y="108" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Hybrid RAG</text>
  <text x="797" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Dense + Sparse</text>
  <text x="797" y="148" text-anchor="middle" fill="#2563EB" font-family="system-ui, sans-serif" font-size="8" font-weight="700">ENTERPRISE</text>

  <!-- Key takeaway -->
  <rect x="100" y="185" width="700" height="50" rx="10" fill="#334155" stroke="#10B981" stroke-width="1.5"/>
  <text x="450" y="208" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Agentic RAG dominiert 2026: Selbstkorrigierend, agent-gesteuert, iterativ</text>
  <text x="450" y="228" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Hybrid RAG bleibt Enterprise-Baseline fuer Balance: Accuracy + Cost + Governance</text>

  <text x="450" y="270" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">RAG entwickelt sich vom spezifischen Pattern zum Context Engine</text>
</svg>