<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="gbg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="gs3">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#gbg3)" rx="16"/>
  <text x="450" y="35" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Gesamtbericht — Memory Patterns</text>

  <!-- Three scopes -->
  <rect x="40" y="60" width="260" height="90" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#gs3)"/>
  <text x="170" y="88" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Episodic</text>
  <text x="170" y="110" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Spezifische Ereignisse</text>
  <text x="170" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9" font-style="italic">"User fragte nach Webhooks"</text>

  <rect x="320" y="60" width="260" height="90" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="2" filter="url(#gs3)"/>
  <text x="450" y="88" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Semantic</text>
  <text x="450" y="110" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Extrahiertes Wissen</text>
  <text x="450" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9" font-style="italic">"User nutzt TypeScript"</text>

  <rect x="600" y="60" width="260" height="90" rx="10" fill="#1E293B" stroke="#EC4899" stroke-width="2" filter="url(#gs3)"/>
  <text x="730" y="88" text-anchor="middle" fill="#F9A8D4" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Procedural</text>
  <text x="730" y="110" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Verhaltensmuster</text>
  <text x="730" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9" font-style="italic">"Bevorzugte Code-Formatierung"</text>

  <!-- Architecture + Frameworks -->
  <rect x="40" y="170" width="400" height="55" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#gs3)"/>
  <text x="240" y="195" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Unified Memory Management (Jan 2026)</text>
  <text x="240" y="215" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Memory-Operationen als Tool-basierte Aktionen</text>

  <rect x="460" y="170" width="400" height="55" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#gs3)"/>
  <text x="660" y="195" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="700">OS-inspiriert (Letta/MemGPT)</text>
  <text x="660" y="215" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Core (RAM) | Archival (Disk) | Recall (History)</text>

  <!-- Frameworks bar -->
  <rect x="40" y="245" width="200" height="28" rx="6" fill="#065F46"/>
  <text x="140" y="264" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Mem0 (48K+ Stars)</text>
  <rect x="255" y="245" width="150" height="28" rx="6" fill="#1E3A5F"/>
  <text x="330" y="264" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Zep (Graphiti)</text>
  <rect x="420" y="245" width="160" height="28" rx="6" fill="#2E1065"/>
  <text x="500" y="264" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Letta (Self-Edit)</text>
  <rect x="595" y="245" width="170" height="28" rx="6" fill="#78350F"/>
  <text x="680" y="264" text-anchor="middle" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="10" font-weight="600">LangGraph (State)</text>
</svg>