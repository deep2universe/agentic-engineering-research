<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="gbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="gs1">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="380" fill="url(#gbg1)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Tool Use, Memory und RAG Patterns — Gesamtbericht</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">70+ Quellen | Stand April 2026 | 5 Einzelberichte</text>

  <!-- Central hub with 5 topics radiating out -->
  <circle cx="450" cy="200" r="55" fill="#1E293B" stroke="#F59E0B" stroke-width="2.5" filter="url(#gs1)"/>
  <text x="450" y="195" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">AI Agent</text>
  <text x="450" y="213" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Patterns</text>

  <!-- Tool Use (top-left) -->
  <line x1="405" y1="160" x2="230" y2="110" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
  <rect x="110" y="80" width="180" height="60" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#gs1)"/>
  <text x="200" y="108" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Tool Use</text>
  <text x="200" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Function Calling, Selection</text>

  <!-- Memory (top-right) -->
  <line x1="495" y1="160" x2="670" y2="110" stroke="#10B981" stroke-width="2" opacity="0.6"/>
  <rect x="610" y="80" width="180" height="60" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#gs1)"/>
  <text x="700" y="108" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Memory</text>
  <text x="700" y="128" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">STM, LTM, Episodic</text>

  <!-- RAG (left) -->
  <line x1="395" y1="200" x2="230" y2="230" stroke="#8B5CF6" stroke-width="2" opacity="0.6"/>
  <rect x="60" y="200" width="180" height="60" rx="10" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" filter="url(#gs1)"/>
  <text x="150" y="228" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="14" font-weight="700">RAG</text>
  <text x="150" y="248" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Agentic RAG, Hybrid</text>

  <!-- Context Engineering (right) -->
  <line x1="505" y1="200" x2="670" y2="230" stroke="#EC4899" stroke-width="2" opacity="0.6"/>
  <rect x="660" y="200" width="200" height="60" rx="10" fill="#1E293B" stroke="#EC4899" stroke-width="2" filter="url(#gs1)"/>
  <text x="760" y="228" text-anchor="middle" fill="#F9A8D4" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Context Eng.</text>
  <text x="760" y="248" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Dynamic Assembly, Pruning</text>

  <!-- MCP (bottom) -->
  <line x1="450" y1="255" x2="450" y2="300" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
  <rect x="340" y="300" width="220" height="60" rx="10" fill="#1E293B" stroke="#EF4444" stroke-width="2" filter="url(#gs1)"/>
  <text x="450" y="328" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="14" font-weight="700">MCP</text>
  <text x="450" y="348" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">Industriestandard, 97M+ Downloads</text>
</svg>