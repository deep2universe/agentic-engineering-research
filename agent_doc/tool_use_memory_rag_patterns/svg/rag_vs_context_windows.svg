<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <defs>
    <linearGradient id="rbg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="rs5">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="350" fill="url(#rbg5)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">RAG vs. Long Context Windows</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Warum RAG auch bei 10M Tokens relevant bleibt</text>

  <!-- Scale visualization -->
  <!-- RAG side -->
  <rect x="60" y="90" width="370" height="200" rx="14" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#rs5)"/>
  <text x="245" y="120" text-anchor="middle" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="18" font-weight="700">RAG</text>
  <text x="245" y="140" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Gezielte Retrieval</text>

  <!-- RAG advantages as bars -->
  <text x="85" y="170" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Kosteneffizienz</text>
  <rect x="220" y="158" width="185" height="16" rx="4" fill="#059669" opacity="0.8"/>

  <text x="85" y="198" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Aktualitaet</text>
  <rect x="220" y="186" width="170" height="16" rx="4" fill="#059669" opacity="0.7"/>

  <text x="85" y="226" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Skalierbarkeit</text>
  <rect x="220" y="214" width="190" height="16" rx="4" fill="#059669" opacity="0.8"/>

  <text x="85" y="254" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Praezision</text>
  <rect x="220" y="242" width="175" height="16" rx="4" fill="#059669" opacity="0.75"/>

  <text x="245" y="280" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="10" font-weight="700">GUENSTIGER · AKTUELLER · SKALIERBAR</text>

  <!-- VS -->
  <text x="450" y="195" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="22" font-weight="700">vs</text>

  <!-- Long Context side -->
  <rect x="470" y="90" width="370" height="200" rx="14" fill="#1E293B" stroke="#F59E0B" stroke-width="2" filter="url(#rs5)"/>
  <text x="655" y="120" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Long Context</text>
  <text x="655" y="140" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Voller Context (bis 10M Tokens)</text>

  <text x="495" y="170" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Einfachheit</text>
  <rect x="630" y="158" width="170" height="16" rx="4" fill="#D97706" opacity="0.8"/>

  <text x="495" y="198" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Vollstaendigkeit</text>
  <rect x="630" y="186" width="185" height="16" rx="4" fill="#D97706" opacity="0.8"/>

  <text x="495" y="226" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Kosten</text>
  <rect x="630" y="214" width="185" height="16" rx="4" fill="#DC2626" opacity="0.6"/>
  <text x="822" y="226" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="9">HOCH</text>

  <text x="495" y="254" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Attention Dilution</text>
  <rect x="630" y="242" width="160" height="16" rx="4" fill="#DC2626" opacity="0.5"/>
  <text x="800" y="254" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="9">RISIKO</text>

  <text x="655" y="280" text-anchor="middle" fill="#D97706" font-family="system-ui, sans-serif" font-size="10" font-weight="700">EINFACH · ABER TEUER</text>

  <!-- Conclusion -->
  <rect x="150" y="305" width="600" height="32" rx="8" fill="#334155"/>
  <text x="450" y="326" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Groessere Context Windows ersetzen nicht intelligentes Retrieval</text>
</svg>