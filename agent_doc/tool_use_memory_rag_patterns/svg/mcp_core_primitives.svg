<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="mcpbg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="mcps3">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="380" fill="url(#mcpbg3)" rx="16"/>
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">MCP Core Primitives</text>
  <text x="450" y="62" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Drei Kern-Primitives die MCP Server exponieren</text>

  <!-- Tools -->
  <rect x="40" y="85" width="260" height="200" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#mcps3)"/>
  <rect x="40" y="85" width="260" height="34" rx="12" fill="#2563EB"/>
  <rect x="40" y="105" width="260" height="14" fill="#2563EB"/>
  <text x="170" y="108" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Tools</text>

  <text x="65" y="140" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Ausfuehrbare Funktionen</text>
  <text x="65" y="163" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">~ POST Endpoints in REST</text>
  <text x="65" y="185" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Datenbank-Abfragen</text>
  <text x="65" y="203" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; API-Aufrufe</text>
  <text x="65" y="221" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Berechnungen</text>
  <text x="65" y="239" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Datei-Operationen</text>

  <rect x="65" y="252" width="100" height="20" rx="4" fill="#1E3A5F"/>
  <text x="115" y="267" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="9" font-weight="700">tools/call</text>

  <!-- Resources -->
  <rect x="320" y="85" width="260" height="200" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#mcps3)"/>
  <rect x="320" y="85" width="260" height="34" rx="12" fill="#059669"/>
  <rect x="320" y="105" width="260" height="14" fill="#059669"/>
  <text x="450" y="108" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Resources</text>

  <text x="345" y="140" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Datenquellen</text>
  <text x="345" y="163" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">~ GET Endpoints in REST</text>
  <text x="345" y="185" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Dokumente</text>
  <text x="345" y="203" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Datenbank-Eintraege</text>
  <text x="345" y="221" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Konfigurationen</text>
  <text x="345" y="239" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Logs</text>

  <rect x="345" y="252" width="100" height="20" rx="4" fill="#064E3B"/>
  <text x="395" y="267" text-anchor="middle" fill="#34D399" font-family="system-ui, sans-serif" font-size="9" font-weight="700">*/get</text>

  <!-- Prompts -->
  <rect x="600" y="85" width="260" height="200" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" filter="url(#mcps3)"/>
  <rect x="600" y="85" width="260" height="34" rx="12" fill="#7C3AED"/>
  <rect x="600" y="105" width="260" height="14" fill="#7C3AED"/>
  <text x="730" y="108" text-anchor="middle" fill="#FFF" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Prompts</text>

  <text x="625" y="140" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Wiederverwendbare Templates</text>
  <text x="625" y="163" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Strukturierte Interaktionen</text>
  <text x="625" y="185" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Vordefinierte Anweisungen</text>
  <text x="625" y="203" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Aufgabenspezifisch</text>
  <text x="625" y="221" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">&#x2022; Standardisiertes Verhalten</text>

  <rect x="625" y="252" width="100" height="20" rx="4" fill="#2E1065"/>
  <text x="675" y="267" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="9" font-weight="700">*/list</text>

  <!-- Common methods -->
  <rect x="150" y="310" width="600" height="50" rx="10" fill="#334155" stroke="#64748B" stroke-width="1"/>
  <text x="450" y="333" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Gemeinsame Methoden</text>
  <text x="250" y="352" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">*/list — Discovery</text>
  <text x="450" y="352" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">*/get — Retrieval</text>
  <text x="650" y="352" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">tools/call — Execution</text>
</svg>