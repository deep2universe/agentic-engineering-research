<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Multi-Agent- und Delegationsmuster mit Codex CLI</title>
  <desc>Schwarm und Schachfigurenspiel: vier Muster — Codex-Client mit MCP-Server, Codex plus Claude Code, Issue-Bot und Swarm fuer parallele Cloud-Tasks.</desc>

  <defs>
    <marker id="arrma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" fill="#e2e8f0" font-size="30" font-weight="700">Multi-Agent- &amp; Delegationsmuster</text>
  <text x="40" y="84" fill="#94a3b8" font-size="15">Schwarm-Metapher: jede Figur hat ihre Aufgabe — der Mensch dirigiert, die Agenten ziehen die Linien.</text>
  <text x="1360" y="56" fill="#a78bfa" font-size="14" text-anchor="end">Codex CLI · Multi-Agent</text>

  <!-- Pattern 1 -->
  <g transform="translate(40,140)">
    <rect width="660" height="320" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="16" font-weight="700">Muster 1 — Codex-Client + Codex-MCP-Server</text>
    <text x="20" y="56" fill="#94a3b8" font-size="12">Entwickler in IDE/TUI → delegiert Cloud-Jobs via codex cloud exec (z. B. Big-Refactor)</text>

    <g transform="translate(40,90)">
      <!-- IDE -->
      <rect x="0" y="60" width="160" height="80" rx="10" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
      <text x="80" y="90" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="700">IDE / TUI</text>
      <text x="80" y="110" text-anchor="middle" fill="#cbd5e1" font-size="11">Entwickler</text>
      <text x="80" y="128" text-anchor="middle" fill="#94a3b8" font-size="10">codex (lokal)</text>

      <line x1="160" y1="100" x2="220" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <!-- MCP Server -->
      <rect x="220" y="60" width="160" height="80" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="300" y="90" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">codex mcp serve</text>
      <text x="300" y="110" text-anchor="middle" fill="#cbd5e1" font-size="11">Tool-Server</text>
      <text x="300" y="128" text-anchor="middle" fill="#94a3b8" font-size="10">expose Codex as MCP</text>

      <line x1="380" y1="100" x2="440" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <!-- Cloud -->
      <rect x="440" y="60" width="160" height="80" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <text x="520" y="90" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">Cloud-Worker</text>
      <text x="520" y="110" text-anchor="middle" fill="#cbd5e1" font-size="11">Big-Refactor</text>
      <text x="520" y="128" text-anchor="middle" fill="#94a3b8" font-size="10">Multi-Hour autonom</text>
    </g>
    <text x="20" y="298" fill="#94a3b8" font-size="11">Use Case: Lokal arbeiten, lange Tasks asynchron auslagern.</text>
  </g>

  <!-- Pattern 2 -->
  <g transform="translate(720,140)">
    <rect width="640" height="320" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="34" fill="#a78bfa" font-size="16" font-weight="700">Muster 2 — Codex + Claude Code (Cross-Agent)</text>
    <text x="20" y="56" fill="#94a3b8" font-size="12">codex mcp serve bietet Review-Tool an — Claude steuert, Codex reviewt</text>

    <g transform="translate(40,90)">
      <!-- Claude -->
      <rect x="0" y="60" width="160" height="80" rx="10" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
      <text x="80" y="90" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700">Claude Code</text>
      <text x="80" y="110" text-anchor="middle" fill="#cbd5e1" font-size="11">Orchestrator</text>
      <text x="80" y="128" text-anchor="middle" fill="#94a3b8" font-size="10">Plan + Driver</text>

      <line x1="160" y1="100" x2="220" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>
      <text x="190" y="92" text-anchor="middle" fill="#cbd5e1" font-size="10">MCP call</text>

      <!-- Codex Reviewer -->
      <rect x="220" y="60" width="160" height="80" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="300" y="90" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">Codex (review)</text>
      <text x="300" y="110" text-anchor="middle" fill="#cbd5e1" font-size="11">via mcp serve</text>
      <text x="300" y="128" text-anchor="middle" fill="#94a3b8" font-size="10">/review tool</text>

      <line x1="220" y1="120" x2="160" y2="120" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrma)"/>
      <text x="190" y="148" text-anchor="middle" fill="#fb923c" font-size="10">Findings</text>

      <line x1="380" y1="100" x2="440" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <!-- Repo -->
      <rect x="440" y="60" width="120" height="80" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
      <text x="500" y="90" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">Repo</text>
      <text x="500" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">PR review</text>
    </g>
    <text x="20" y="298" fill="#94a3b8" font-size="11">Use Case: Bias-Reduktion durch heterogene Modell-Heuristiken.</text>
  </g>

  <!-- Pattern 3 -->
  <g transform="translate(40,480)">
    <rect width="660" height="380" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="16" font-weight="700">Muster 3 — Issue-Bot</text>
    <text x="20" y="56" fill="#94a3b8" font-size="12">Codex-Cloud liest GitHub-Issue → lokale Clone → PR-Push. Review durch Menschen.</text>

    <g transform="translate(40,90)">
      <rect x="0" y="0" width="160" height="60" rx="10" fill="#0f172a" stroke="#fb7185" stroke-width="2"/>
      <text x="80" y="26" text-anchor="middle" fill="#fb7185" font-size="13" font-weight="700">Issue gelabeled</text>
      <text x="80" y="44" text-anchor="middle" fill="#94a3b8" font-size="10">label: codex-bot</text>

      <line x1="160" y1="30" x2="220" y2="30" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <rect x="220" y="0" width="160" height="60" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="300" y="26" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Codex Cloud</text>
      <text x="300" y="44" text-anchor="middle" fill="#94a3b8" font-size="10">webhook trigger</text>

      <line x1="380" y1="30" x2="440" y2="30" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <rect x="440" y="0" width="160" height="60" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <text x="520" y="26" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">Repo-Clone</text>
      <text x="520" y="44" text-anchor="middle" fill="#94a3b8" font-size="10">read AGENTS.md</text>

      <line x1="520" y1="60" x2="520" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <rect x="440" y="100" width="160" height="60" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
      <text x="520" y="126" text-anchor="middle" fill="#10b981" font-size="13" font-weight="700">Plan + Patch</text>
      <text x="520" y="144" text-anchor="middle" fill="#94a3b8" font-size="10">apply_patch · test</text>

      <line x1="440" y1="130" x2="380" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <rect x="220" y="100" width="160" height="60" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
      <text x="300" y="126" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">PR-Push</text>
      <text x="300" y="144" text-anchor="middle" fill="#94a3b8" font-size="10">draft / ready-for-review</text>

      <line x1="220" y1="130" x2="160" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrma)"/>

      <rect x="0" y="100" width="160" height="60" rx="10" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
      <text x="80" y="126" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">Mensch reviewt</text>
      <text x="80" y="144" text-anchor="middle" fill="#94a3b8" font-size="10">approve / merge</text>
    </g>
    <text x="20" y="358" fill="#94a3b8" font-size="11">Use Case: Repetitive Issues (deps, lint, low-risk fixes) automatisch abarbeiten.</text>
  </g>

  <!-- Pattern 4: Swarm -->
  <g transform="translate(720,480)">
    <rect width="640" height="380" rx="14" fill="#1e293b" stroke="#fb7185" stroke-width="2"/>
    <text x="20" y="34" fill="#fb7185" font-size="16" font-weight="700">Muster 4 — Swarm (experimentell)</text>
    <text x="20" y="56" fill="#94a3b8" font-size="12">Mehrere Cloud-Tasks parallel, jeder auf separater Issue-/Branch-Scope</text>

    <g transform="translate(60,100)">
      <!-- Conductor -->
      <rect x="240" y="0" width="160" height="60" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <text x="320" y="26" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">Conductor</text>
      <text x="320" y="44" text-anchor="middle" fill="#94a3b8" font-size="10">Mensch / Skill</text>

      <!-- Workers -->
      <line x1="280" y1="60" x2="80" y2="120" stroke="#fb7185" stroke-width="1.5"/>
      <line x1="320" y1="60" x2="240" y2="120" stroke="#fb7185" stroke-width="1.5"/>
      <line x1="320" y1="60" x2="400" y2="120" stroke="#fb7185" stroke-width="1.5"/>
      <line x1="360" y1="60" x2="560" y2="120" stroke="#fb7185" stroke-width="1.5"/>

      <rect x="0" y="120" width="160" height="60" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="80" y="146" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Worker 1</text>
      <text x="80" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">Issue #142</text>

      <rect x="160" y="120" width="160" height="60" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="240" y="146" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Worker 2</text>
      <text x="240" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">Issue #143</text>

      <rect x="320" y="120" width="160" height="60" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="400" y="146" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Worker 3</text>
      <text x="400" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">Issue #144</text>

      <rect x="480" y="120" width="160" height="60" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="560" y="146" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Worker N</text>
      <text x="560" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">Issue #...</text>

      <!-- PR pool -->
      <line x1="80" y1="180" x2="320" y2="220" stroke="#10b981" stroke-width="1.5"/>
      <line x1="240" y1="180" x2="320" y2="220" stroke="#10b981" stroke-width="1.5"/>
      <line x1="400" y1="180" x2="320" y2="220" stroke="#10b981" stroke-width="1.5"/>
      <line x1="560" y1="180" x2="320" y2="220" stroke="#10b981" stroke-width="1.5"/>

      <rect x="200" y="220" width="240" height="60" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
      <text x="320" y="246" text-anchor="middle" fill="#10b981" font-size="13" font-weight="700">PR-Pool · Review-Queue</text>
      <text x="320" y="264" text-anchor="middle" fill="#94a3b8" font-size="10">human triage</text>
    </g>
    <text x="20" y="358" fill="#94a3b8" font-size="11">Vorsicht: Swarm-Tasks brauchen klare Scope-Grenzen, sonst Merge-Konflikte.</text>
  </g>
</svg>
