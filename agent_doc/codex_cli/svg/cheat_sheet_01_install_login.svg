<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Codex CLI Install &amp; Login — Installationspfade und Authentifizierung</title>
  <desc>Drei Installationspfade (npm, brew, cargo/binary) münden in den Codex-CLI-Binary und verzweigen in zwei Auth-Wege (OAuth vs. API-Key), dargestellt als Schlüsselbund-und-Tür-Metapher.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <linearGradient id="door" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Install &amp; Login</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">Drei Installations-Pfade · Auth-Switch OAuth vs. API-Key · Schlüsselbund und Tür</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 01/13</text>

  <text x="60" y="150" fill="#a78bfa" font-size="14" font-weight="600" letter-spacing="2">INSTALL</text>

  <g>
    <rect x="60" y="170" width="360" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
    <circle cx="100" cy="225" r="22" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
    <text x="100" y="231" fill="#818cf8" font-size="15" font-weight="700" text-anchor="middle">npm</text>
    <text x="140" y="205" fill="#e2e8f0" font-size="16" font-weight="600">Node / npm</text>
    <text x="140" y="235" fill="#94a3b8" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">npm install -g @openai/codex</text>
    <text x="140" y="258" fill="#64748b" font-size="12">global · cross-platform · schnellste Updates</text>
  </g>

  <g>
    <rect x="60" y="300" width="360" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
    <circle cx="100" cy="355" r="22" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="100" y="361" fill="#22d3ee" font-size="15" font-weight="700" text-anchor="middle">brew</text>
    <text x="140" y="335" fill="#e2e8f0" font-size="16" font-weight="600">Homebrew (macOS)</text>
    <text x="140" y="365" fill="#94a3b8" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">brew install --cask codex</text>
    <text x="140" y="388" fill="#64748b" font-size="12">signiert · auto-update via brew</text>
  </g>

  <g>
    <rect x="60" y="430" width="360" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
    <circle cx="100" cy="485" r="22" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <text x="100" y="491" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">cargo</text>
    <text x="140" y="465" fill="#e2e8f0" font-size="16" font-weight="600">Cargo · Release-Binary</text>
    <text x="140" y="495" fill="#94a3b8" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">cargo install codex-cli · GH-Releases</text>
    <text x="140" y="518" fill="#64748b" font-size="12">Headless / Air-Gapped · Rust-Toolchain</text>
  </g>

  <path d="M 420 225 C 500 225 520 430 600 430" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 420 355 C 500 355 520 450 600 450" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 420 485 C 500 485 520 470 600 470" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="600" y="400" width="200" height="120" rx="14" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
    <text x="700" y="430" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">Binary</text>
    <text x="700" y="458" fill="#818cf8" font-size="22" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700">codex</text>
    <text x="700" y="485" fill="#94a3b8" font-size="12" text-anchor="middle">im $PATH</text>
    <text x="700" y="505" fill="#64748b" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">codex --version</text>
  </g>

  <text x="700" y="570" fill="#a78bfa" font-size="14" font-weight="600" letter-spacing="2" text-anchor="middle">AUTH-SWITCH</text>
  <g>
    <rect x="580" y="585" width="240" height="64" rx="32" fill="#1e293b" stroke="#334155"/>
    <circle cx="640" cy="617" r="18" fill="#10b981"/>
    <text x="640" y="622" fill="#0f172a" font-size="13" font-weight="700" text-anchor="middle">OAuth</text>
    <circle cx="760" cy="617" r="18" fill="#f59e0b"/>
    <text x="760" y="622" fill="#0f172a" font-size="13" font-weight="700" text-anchor="middle">Key</text>
    <text x="700" y="622" fill="#e2e8f0" font-size="13" text-anchor="middle">vs.</text>
  </g>

  <path d="M 640 649 C 640 680 400 690 320 720" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <path d="M 760 649 C 760 680 1020 690 1080 720" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <g transform="translate(850 410)">
    <circle cx="18" cy="18" r="12" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="18" cy="18" r="4" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <path d="M 28 22 L 70 40 L 74 38 L 78 44 L 74 48 L 72 44 L 66 48 L 64 44" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="18" cy="56" r="10" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <circle cx="18" cy="56" r="3" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <path d="M 26 59 L 72 75 L 76 72 L 80 77 L 76 81 L 74 78" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="50" y="100" fill="#64748b" font-size="11" text-anchor="middle">Schlüsselbund</text>
  </g>

  <g>
    <rect x="60" y="700" width="520" height="170" rx="14" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
    <text x="80" y="730" fill="#10b981" font-size="14" font-weight="700" letter-spacing="1">OAUTH · ChatGPT-Login</text>
    <text x="80" y="760" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">codex login</text>
    <text x="80" y="784" fill="#94a3b8" font-size="12">Browser öffnet · Token in ~/.codex/auth.json</text>
    <text x="80" y="812" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">codex login --device-auth</text>
    <text x="80" y="836" fill="#94a3b8" font-size="12">SSH/Headless · Code am zweiten Gerät bestätigen</text>
    <text x="80" y="858" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">codex logout   ·   Session beenden</text>
  </g>

  <g>
    <rect x="820" y="700" width="520" height="170" rx="14" fill="#0b1220" stroke="#f59e0b" stroke-width="2"/>
    <text x="840" y="730" fill="#f59e0b" font-size="14" font-weight="700" letter-spacing="1">API-KEY · Environment</text>
    <text x="840" y="760" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">export OPENAI_API_KEY=sk-...</text>
    <text x="840" y="784" fill="#94a3b8" font-size="12">überschreibt OAuth silently · CI-tauglich</text>
    <text x="840" y="812" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_API_KEY=…   (CI-freundlich)</text>
    <text x="840" y="836" fill="#94a3b8" font-size="12">bevorzugt in GitHub-Actions / Runner-Env</text>
    <text x="840" y="858" fill="#ef4444" font-size="11" font-weight="600">Warnung: Key im Klartext · Secrets-Store nutzen</text>
  </g>

  <g transform="translate(1180 140)">
    <rect x="0" y="0" width="160" height="220" rx="6" fill="url(#door)" stroke="#334155" stroke-width="2"/>
    <rect x="10" y="10" width="140" height="200" rx="4" fill="none" stroke="#475569"/>
    <circle cx="130" cy="115" r="5" fill="#f59e0b"/>
    <text x="80" y="45" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="600">OpenAI API</text>
    <text x="80" y="65" fill="#94a3b8" font-size="11" text-anchor="middle">Tür zum Modell</text>
    <rect x="40" y="150" width="80" height="40" rx="4" fill="#0f172a" stroke="#6366f1"/>
    <text x="80" y="175" fill="#818cf8" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">200 OK</text>
  </g>
  <path d="M 800 460 C 1000 460 1060 280 1180 250" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="1000" y="320" fill="#64748b" font-size="11">authentifiziert · Requests</text>

  <g transform="translate(60 120)">
    <rect x="0" y="0" width="10" height="10" fill="#10b981"/>
    <text x="18" y="9" fill="#94a3b8" font-size="11">OAuth</text>
    <rect x="70" y="0" width="10" height="10" fill="#f59e0b"/>
    <text x="88" y="9" fill="#94a3b8" font-size="11">API-Key</text>
    <rect x="150" y="0" width="10" height="10" fill="#6366f1"/>
    <text x="168" y="9" fill="#94a3b8" font-size="11">Binary</text>
  </g>
</svg>
