    <rect x="1170" y="609" width="74" height="22" rx="11" fill="#164e63"/>
    <text x="1207" y="624" fill="#a5f3fc" text-anchor="middle" font-size="11">PR draft</text>
    <rect x="1252" y="609" width="68" height="22" rx="11" fill="#083344" stroke="#22d3ee"/>
    <text x="1286" y="624" fill="#a5f3fc" text-anchor="middle" font-size="11">cloud</text>

    <rect x="756" y="646" width="574" height="38" rx="6" fill="#1e293b"/>
    <circle cx="772" cy="665" r="5" fill="#a78bfa"/>
