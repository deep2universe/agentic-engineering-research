    <rect x="1170" y="653" width="74" height="22" rx="11" fill="#3b0764"/>
    <text x="1207" y="668" fill="#c4b5fd" text-anchor="middle" font-size="11">PR merged</text>
    <rect x="1252" y="653" width="68" height="22" rx="11" fill="#0f172a" stroke="#475569"/>
    <text x="1286" y="668" fill="#94a3b8" text-anchor="middle" font-size="11">lokal</text>

    <rect x="756" y="690" width="574" height="38" rx="6" fill="#1e293b"/>
    <circle cx="772" cy="709" r="5" fill="#94a3b8"/>
    <text x="788" y="714" fill="#94a3b8">e2e-flaky-tests · abgeschlossen</text>
    <rect x="1170" y="697" width="74" height="22" rx="11" fill="#1f2937"/>
    <text x="1207" y="712" fill="#94a3b8" text-anchor="middle" font-size="11">PR closed</text>
    <rect x="1252" y="697" width="68" height="22" rx="11" fill="#0f172a" stroke="#475569"/>
    <text x="1286" y="712" fill="#94a3b8" text-anchor="middle" font-size="11">cloud</text>
  </g>

  <path d="M1336 622 C 1370 622, 1380 720, 1346 738" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrIde)"/>
