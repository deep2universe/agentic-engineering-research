  <text x="900" y="848" font-size="12" fill="#94a3b8">CLI-Login authentifiziert auch die Extension.</text>
  <text x="900" y="868" font-size="12" fill="#94a3b8">Sessions, History und Prompts werden gemeinsam genutzt.</text>
