<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Öffentliche Benchmarks — Leaderboard</title>
  <desc>Bar-Charts für SWE-bench Verified, Terminal-Bench und First-pass Accuracy mit Codex als Terminal-Bench-Führer und 4-fach sparsamer Token-Effizienz.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#e2e8f0">Öffentliche Benchmarks — Leaderboard</text>
  <text x="60" y="90" font-size="16" fill="#94a3b8">SWE-bench · Terminal-Bench · First-pass · Tokens pro Task (Q1/2026, gerundet)</text>
  <text x="1340" y="60" font-size="14" fill="#94a3b8" text-anchor="end">Kapitel 4 · Benchmarks</text>

  <!-- SWE-bench Panel -->
  <g transform="translate(60,140)">
    <rect width="420" height="320" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#e2e8f0">SWE-bench Verified</text>
    <text x="20" y="48" font-size="11" fill="#94a3b8">höher = besser (Skala 0–100 %)</text>

    <!-- achsen -->
    <line x1="120" y1="80" x2="120" y2="280" stroke="#334155"/>
    <line x1="120" y1="280" x2="400" y2="280" stroke="#334155"/>

    <!-- Codex 73 -->
    <g transform="translate(120,100)">
      <rect x="0" y="0" width="204" height="34" rx="4" fill="#6366f1"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Codex</text>
      <text x="214" y="22" font-size="12" fill="#c7d2fe">~73 %</text>
    </g>
    <!-- Claude 80.9 -->
    <g transform="translate(120,150)">
      <rect x="0" y="0" width="226" height="34" rx="4" fill="#a78bfa"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Claude</text>
      <text x="236" y="22" font-size="12" font-weight="700" fill="#ddd6fe">~80,9 %</text>
      <g transform="translate(-60,2)"><text font-size="11" fill="#fbbf24">🥇 Sieger</text></g>
    </g>
    <!-- Gemini 66 -->
    <g transform="translate(120,200)">
      <rect x="0" y="0" width="185" height="34" rx="4" fill="#22d3ee"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Gemini</text>
      <text x="195" y="22" font-size="12" fill="#cffafe">~66 %</text>
    </g>
    <!-- Achse % -->
    <g font-size="10" fill="#64748b" text-anchor="middle">
      <text x="120" y="296">0</text>
      <text x="190" y="296">25</text>
      <text x="260" y="296">50</text>
      <text x="330" y="296">75</text>
      <text x="400" y="296">100</text>
    </g>
  </g>

  <!-- Terminal-Bench Panel (Codex Sieger hervorgehoben) -->
  <g transform="translate(490,140)">
    <rect width="420" height="320" rx="12" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#e2e8f0">Terminal-Bench</text>
    <text x="20" y="48" font-size="11" fill="#818cf8">Codex führt · höher = besser</text>

    <line x1="120" y1="80" x2="120" y2="280" stroke="#334155"/>
    <line x1="120" y1="280" x2="400" y2="280" stroke="#334155"/>

    <!-- Codex 77.3 — Sieger -->
    <g transform="translate(120,100)">
      <rect x="0" y="0" width="216" height="34" rx="4" fill="#6366f1"/>
      <rect x="0" y="0" width="216" height="34" rx="4" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Codex</text>
      <text x="226" y="22" font-size="13" font-weight="700" fill="#fde68a">77,3 %</text>
      <text x="232" y="8" font-size="10" fill="#fbbf24">Sieger</text>
    </g>
    <!-- Claude 70 -->
    <g transform="translate(120,150)">
      <rect x="0" y="0" width="196" height="34" rx="4" fill="#a78bfa"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Claude</text>
      <text x="206" y="22" font-size="12" fill="#ddd6fe">~70 %</text>
    </g>
    <!-- Gemini 60 -->
    <g transform="translate(120,200)">
      <rect x="0" y="0" width="168" height="34" rx="4" fill="#22d3ee"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Gemini</text>
      <text x="178" y="22" font-size="12" fill="#cffafe">~60 %</text>
    </g>
    <g font-size="10" fill="#64748b" text-anchor="middle">
      <text x="120" y="296">0</text>
      <text x="190" y="296">25</text>
      <text x="260" y="296">50</text>
      <text x="330" y="296">75</text>
      <text x="400" y="296">100</text>
    </g>

    <!-- Podium Trophy -->
    <g transform="translate(350,76)">
      <path d="M -8 -18 L 8 -18 L 8 -8 L 4 -8 L 4 2 L -4 2 L -4 -8 L -8 -8 Z" fill="#fbbf24"/>
      <rect x="-10" y="2" width="20" height="4" fill="#f59e0b"/>
    </g>
  </g>

  <!-- First-pass Panel -->
  <g transform="translate(920,140)">
    <rect width="420" height="320" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#e2e8f0">First-pass Accuracy</text>
    <text x="20" y="48" font-size="11" fill="#94a3b8">korrekt beim ersten Lauf</text>

    <line x1="130" y1="80" x2="130" y2="280" stroke="#334155"/>
    <line x1="130" y1="280" x2="400" y2="280" stroke="#334155"/>

    <g transform="translate(130,100)">
      <rect x="0" y="0" width="224" height="34" rx="4" fill="#6366f1"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Codex</text>
      <text x="234" y="22" font-size="12" fill="#c7d2fe">hoch</text>
    </g>
    <g transform="translate(130,150)">
      <rect x="0" y="0" width="256" height="34" rx="4" fill="#a78bfa"/>
      <rect x="0" y="0" width="256" height="34" rx="4" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Claude</text>
      <text x="266" y="22" font-size="13" font-weight="700" fill="#fde68a">95 %</text>
    </g>
    <g transform="translate(130,200)">
      <rect x="0" y="0" width="224" height="34" rx="4" fill="#22d3ee"/>
      <text x="-8" y="22" font-size="12" fill="#e2e8f0" text-anchor="end">Gemini</text>
      <text x="234" y="22" font-size="12" fill="#cffafe">hoch</text>
    </g>
  </g>

  <!-- Tokens pro Task — Token-Effizienz-Panel -->
  <g transform="translate(60,490)">
    <rect width="1280" height="310" rx="12" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
    <text x="20" y="36" font-size="18" font-weight="700" fill="#e2e8f0">Tokens pro Task — Codex ist 4× sparsamer als Claude Code</text>
    <text x="20" y="56" font-size="12" fill="#818cf8">niedriger = besser · Glühbirnen-Metapher: Codex-Lampe leuchtet effizienter</text>

    <!-- Codex Bar — kleiner -->
    <g transform="translate(80,90)">
      <text x="0" y="20" font-size="14" fill="#e2e8f0" font-weight="600">Codex CLI</text>
      <text x="0" y="40" font-size="11" fill="#94a3b8">1×  Referenz</text>
      <rect x="130" y="8" width="200" height="28" rx="4" fill="#6366f1"/>
      <text x="340" y="28" font-size="13" font-weight="700" fill="#fde68a">4× sparsamer</text>
      <g transform="translate(570,-2)">
        <!-- Energiespar-Glühbirne -->
        <circle cx="0" cy="16" r="18" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
        <path d="M 0 6 L 0 26" stroke="#fbbf24" stroke-width="2"/>
        <circle cx="0" cy="12" r="6" fill="#fbbf24" opacity="0.8"/>
      </g>
    </g>

    <!-- Claude Bar — groesser -->
    <g transform="translate(80,160)">
      <text x="0" y="20" font-size="14" fill="#e2e8f0" font-weight="600">Claude Code</text>
      <text x="0" y="40" font-size="11" fill="#94a3b8">~4×  viel</text>
      <rect x="130" y="8" width="800" height="28" rx="4" fill="#a78bfa"/>
      <text x="940" y="28" font-size="13" font-weight="700" fill="#ddd6fe">viel</text>
    </g>

    <!-- Gemini Bar — mittel -->
    <g transform="translate(80,230)">
      <text x="0" y="20" font-size="14" fill="#e2e8f0" font-weight="600">Gemini CLI</text>
      <text x="0" y="40" font-size="11" fill="#94a3b8">~2×  mittel</text>
      <rect x="130" y="8" width="430" height="28" rx="4" fill="#22d3ee"/>
      <text x="570" y="28" font-size="13" font-weight="700" fill="#cffafe">mittel</text>
    </g>
  </g>

  <!-- Footer-Legende -->
  <g transform="translate(60,830)" font-size="13">
    <text fill="#94a3b8">Hinweis: Community-Messungen — reale Werte variieren je nach Prompt-Stil und Modell-Version. Siehe _quellen.md.</text>
  </g>
</svg>
