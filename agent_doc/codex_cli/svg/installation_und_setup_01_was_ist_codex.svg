<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Was ist Codex CLI? — Kernmerkmale und Abgrenzung</title>
  <desc>Zentraler Ring mit den vier Kernmerkmalen Agent-Loop, Kernel-Sandbox, Multi-Provider und Open Source. Rechts: Abgrenzungs-Matrix zu Claude Code, Copilot CLI, Aider, Cursor, Gemini CLI.</desc>

  <defs>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/>
    </marker>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" font-size="30" font-weight="700" fill="#e2e8f0">Was ist Codex CLI?</text>
  <text x="40" y="84" font-size="16" fill="#94a3b8">Lightweight coding agent im Terminal — Apache-2.0, Rust-basiert, Multi-Provider</text>
  <text x="1360" y="56" font-size="14" fill="#94a3b8" text-anchor="end">Kapitel 1</text>

  <!-- LINKE SEITE: Kern-Mindmap -->
  <g transform="translate(0,110)">
    <text x="40" y="20" font-size="14" fill="#94a3b8">Kernmerkmale (Ring)</text>

    <!-- Zentrum -->
    <circle cx="370" cy="380" r="110" fill="url(#coreGrad)" stroke="#818cf8" stroke-width="2"/>
    <text x="370" y="360" text-anchor="middle" font-size="22" font-weight="700" fill="#e2e8f0">Codex CLI</text>
    <text x="370" y="388" text-anchor="middle" font-size="13" fill="#c7d2fe">@openai/codex</text>
    <text x="370" y="410" text-anchor="middle" font-size="12" fill="#a5b4fc">Apache-2.0 · ~95% Rust</text>
    <text x="370" y="428" text-anchor="middle" font-size="12" fill="#a5b4fc">67k Stars · 400+ Contrib.</text>

    <!-- Oben: Agent-Loop -->
    <g>
      <line x1="370" y1="270" x2="370" y2="180" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
      <rect x="210" y="60" width="320" height="120" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
      <text x="370" y="90" text-anchor="middle" font-size="17" font-weight="700" fill="#818cf8">Agent-Loop</text>
      <text x="370" y="115" text-anchor="middle" font-size="13" fill="#e2e8f0">Modell-Schleife: Read · Edit · Shell</text>
      <text x="370" y="135" text-anchor="middle" font-size="13" fill="#e2e8f0">bis Task abgeschlossen ist</text>
      <text x="370" y="160" text-anchor="middle" font-size="12" fill="#94a3b8">Terminal-First, keine IDE nötig</text>
    </g>

    <!-- Rechts: Kernel-Sandbox -->
    <g>
      <line x1="480" y1="380" x2="555" y2="380" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
      <rect x="560" y="320" width="240" height="140" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="680" y="350" text-anchor="middle" font-size="17" font-weight="700" fill="#f59e0b">Kernel-Sandbox</text>
      <text x="680" y="375" text-anchor="middle" font-size="12" fill="#e2e8f0">macOS: Apple Seatbelt</text>
      <text x="680" y="395" text-anchor="middle" font-size="12" fill="#e2e8f0">Linux: Landlock + seccomp</text>
      <text x="680" y="415" text-anchor="middle" font-size="12" fill="#e2e8f0">Windows: AppContainer</text>
      <text x="680" y="440" text-anchor="middle" font-size="11" fill="#94a3b8">(nativ seit Anfang 2026)</text>
    </g>

    <!-- Unten: Multi-Provider -->
    <g>
      <line x1="370" y1="490" x2="370" y2="570" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
      <rect x="190" y="580" width="360" height="130" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="370" y="610" text-anchor="middle" font-size="17" font-weight="700" fill="#22d3ee">Multi-Provider</text>
      <text x="370" y="635" text-anchor="middle" font-size="12" fill="#e2e8f0">OpenAI (Default) · Anthropic · Gemini</text>
      <text x="370" y="655" text-anchor="middle" font-size="12" fill="#e2e8f0">OpenRouter · Ollama · LM Studio · Azure</text>
      <text x="370" y="680" text-anchor="middle" font-size="11" fill="#94a3b8">via [model_providers] in config.toml</text>
    </g>

    <!-- Links: Open Source -->
    <g>
      <line x1="260" y1="380" x2="185" y2="380" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
      <rect x="0" y="320" width="180" height="140" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <text x="90" y="350" text-anchor="middle" font-size="17" font-weight="700" fill="#10b981">Open Source</text>
      <text x="90" y="375" text-anchor="middle" font-size="12" fill="#e2e8f0">Apache-2.0 · GitHub</text>
      <text x="90" y="395" text-anchor="middle" font-size="12" fill="#e2e8f0">Rust-Rewrite 06/2025</text>
      <text x="90" y="415" text-anchor="middle" font-size="12" fill="#e2e8f0">wöchentliche Releases</text>
      <text x="90" y="440" text-anchor="middle" font-size="11" fill="#94a3b8">Transparenz &amp; Forks</text>
    </g>
  </g>

  <!-- RECHTE SEITE: Abgrenzungs-Matrix -->
  <g transform="translate(830,120)">
    <text x="0" y="20" font-size="18" font-weight="700" fill="#e2e8f0">Abgrenzung im Markt</text>
    <text x="0" y="42" font-size="12" fill="#94a3b8">Vergleichs-Radar: Lizenz · Fokus · USP</text>

    <!-- Header -->
    <g transform="translate(0,60)">
      <rect x="0" y="0" width="530" height="34" fill="#334155"/>
      <text x="12" y="22" font-size="12" font-weight="700" fill="#e2e8f0">Tool</text>
      <text x="170" y="22" font-size="12" font-weight="700" fill="#e2e8f0">Lizenz</text>
      <text x="270" y="22" font-size="12" font-weight="700" fill="#e2e8f0">Fokus</text>
      <text x="410" y="22" font-size="12" font-weight="700" fill="#e2e8f0">Besonderheit</text>
    </g>

    <!-- Codex CLI (highlight) -->
    <g transform="translate(0,94)">
      <rect x="0" y="0" width="530" height="50" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
      <text x="12" y="22" font-size="13" font-weight="700" fill="#c7d2fe">Codex CLI</text>
      <text x="12" y="40" font-size="11" fill="#94a3b8">@openai/codex</text>
      <text x="170" y="22" font-size="12" fill="#10b981">Apache-2.0</text>
      <text x="270" y="22" font-size="12" fill="#e2e8f0">Autonomer Agent</text>
      <text x="270" y="40" font-size="11" fill="#94a3b8">Terminal-First</text>
      <text x="410" y="22" font-size="12" fill="#22d3ee">Kernel-Sandbox</text>
      <text x="410" y="40" font-size="11" fill="#94a3b8">Multi-Provider</text>
    </g>

    <!-- Claude Code -->
    <g transform="translate(0,146)">
      <rect x="0" y="0" width="530" height="50" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" font-size="13" font-weight="700" fill="#e2e8f0">Claude Code</text>
      <text x="12" y="40" font-size="11" fill="#94a3b8">Anthropic</text>
      <text x="170" y="22" font-size="12" fill="#ef4444">proprietär</text>
      <text x="270" y="22" font-size="12" fill="#e2e8f0">Kollab. Partner</text>
      <text x="270" y="40" font-size="11" fill="#94a3b8">Präzision</text>
      <text x="410" y="22" font-size="12" fill="#a78bfa">17 Hook-Events</text>
      <text x="410" y="40" font-size="11" fill="#94a3b8">Feingranular</text>
    </g>

    <!-- Copilot CLI -->
    <g transform="translate(0,198)">
      <rect x="0" y="0" width="530" height="50" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" font-size="13" font-weight="700" fill="#e2e8f0">GitHub Copilot CLI</text>
      <text x="12" y="40" font-size="11" fill="#94a3b8">Preview</text>
      <text x="170" y="22" font-size="12" fill="#ef4444">proprietär</text>
      <text x="270" y="22" font-size="12" fill="#e2e8f0">GitHub-Ökosystem</text>
      <text x="270" y="40" font-size="11" fill="#94a3b8">Issues · PRs</text>
      <text x="410" y="22" font-size="12" fill="#a78bfa">GH-Integration</text>
      <text x="410" y="40" font-size="11" fill="#94a3b8">tief verzahnt</text>
    </g>

    <!-- Aider -->
    <g transform="translate(0,250)">
      <rect x="0" y="0" width="530" height="50" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" font-size="13" font-weight="700" fill="#e2e8f0">Aider</text>
      <text x="12" y="40" font-size="11" fill="#94a3b8">Python</text>
      <text x="170" y="22" font-size="12" fill="#10b981">MIT</text>
      <text x="270" y="22" font-size="12" fill="#e2e8f0">Git-orientiert</text>
      <text x="270" y="40" font-size="11" fill="#94a3b8">Auto-Commits</text>
      <text x="410" y="22" font-size="12" fill="#a78bfa">Provider-agnostisch</text>
      <text x="410" y="40" font-size="11" fill="#94a3b8">Commit-Flow</text>
    </g>

    <!-- Cursor / Windsurf -->
    <g transform="translate(0,302)">
      <rect x="0" y="0" width="530" height="50" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" font-size="13" font-weight="700" fill="#e2e8f0">Cursor / Windsurf</text>
      <text x="12" y="40" font-size="11" fill="#94a3b8">Editor-Fork</text>
      <text x="170" y="22" font-size="12" fill="#ef4444">proprietär</text>
      <text x="270" y="22" font-size="12" fill="#e2e8f0">IDE-First</text>
      <text x="270" y="40" font-size="11" fill="#94a3b8">GUI-Workflow</text>
      <text x="410" y="22" font-size="12" fill="#a78bfa">Eigener Editor</text>
      <text x="410" y="40" font-size="11" fill="#94a3b8">VSCode-Fork</text>
    </g>

    <!-- Gemini CLI -->
    <g transform="translate(0,354)">
      <rect x="0" y="0" width="530" height="50" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" font-size="13" font-weight="700" fill="#e2e8f0">Gemini CLI</text>
      <text x="12" y="40" font-size="11" fill="#94a3b8">Google</text>
      <text x="170" y="22" font-size="12" fill="#10b981">Apache-2.0</text>
      <text x="270" y="22" font-size="12" fill="#e2e8f0">Google-Stack</text>
      <text x="270" y="40" font-size="11" fill="#94a3b8">Gemini 2.x</text>
      <text x="410" y="22" font-size="12" fill="#a78bfa">Grosser Free-Tier</text>
      <text x="410" y="40" font-size="11" fill="#94a3b8">niedrige Hürde</text>
    </g>

    <!-- Warn-Box unten -->
    <g transform="translate(0,420)">
      <rect x="0" y="0" width="530" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#f59e0b">Verwechslungsgefahr</text>
      <text x="16" y="52" font-size="12" fill="#e2e8f0">· Altes Codex-Modell (2021, deprecated 2023) — nicht identisch!</text>
      <text x="16" y="74" font-size="12" fill="#e2e8f0">· Codex-Cloud (chatgpt.com/codex) — eigenes Produkt, kein CLI.</text>
      <text x="16" y="96" font-size="12" fill="#e2e8f0">· Doku bezieht sich auf lokale CLI (@openai/codex).</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(40,840)">
    <rect x="0" y="0" width="18" height="18" fill="#6366f1"/>
    <text x="26" y="14" font-size="12" fill="#94a3b8">Agent</text>
    <rect x="90" y="0" width="18" height="18" fill="#f59e0b"/>
    <text x="116" y="14" font-size="12" fill="#94a3b8">Sandbox</text>
    <rect x="200" y="0" width="18" height="18" fill="#22d3ee"/>
    <text x="226" y="14" font-size="12" fill="#94a3b8">Provider/Cloud</text>
    <rect x="350" y="0" width="18" height="18" fill="#10b981"/>
    <text x="376" y="14" font-size="12" fill="#94a3b8">Open / Erfolg</text>
    <rect x="470" y="0" width="18" height="18" fill="#ef4444"/>
    <text x="496" y="14" font-size="12" fill="#94a3b8">proprietär / Gefahr</text>
    <rect x="650" y="0" width="18" height="18" fill="#a78bfa"/>
    <text x="676" y="14" font-size="12" fill="#94a3b8">Highlight</text>
  </g>
</svg>
