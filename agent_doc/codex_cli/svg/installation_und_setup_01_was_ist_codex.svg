<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Was ist Codex CLI — Kernmerkmale und Abgrenzung</title>
  <desc>Zentrale Kernmerkmale von Codex CLI (Agent-Loop, Kernel-Sandbox, Multi-Provider, Open Source) als Ring, rechts eine Vergleichsmatrix zu Claude Code, Copilot CLI, Aider, Cursor und Gemini CLI.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="40" y="54" fill="#e2e8f0" font-size="30" font-weight="700">Was ist Codex CLI?</text>
  <text x="40" y="82" fill="#94a3b8" font-size="15">Open-Source-Coding-Agent fürs Terminal — Kernmerkmale und Abgrenzung zum Wettbewerb</text>
  <text x="1360" y="54" fill="#818cf8" font-size="13" text-anchor="end" font-weight="600">Kapitel 1</text>
  <text x="1360" y="74" fill="#64748b" font-size="11" text-anchor="end">@openai/codex · Apache-2.0</text>

  <!-- Linke Sektion: Ring um zentralen Knoten -->
  <g transform="translate(360,470)">
    <!-- Ring -->
    <circle r="230" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="3 5"/>

    <!-- Zentrum -->
    <circle r="110" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="0" y="-14" fill="#e2e8f0" text-anchor="middle" font-size="20" font-weight="700">Codex CLI</text>
    <text x="0" y="10" fill="#818cf8" text-anchor="middle" font-size="12">lightweight coding agent</text>
    <text x="0" y="30" fill="#94a3b8" text-anchor="middle" font-size="11">Rust · ~95 % Codebase</text>
    <text x="0" y="48" fill="#94a3b8" text-anchor="middle" font-size="11">~67 k Stars · 400+ Contrib.</text>

    <!-- Satellit 1: Agent-Loop (oben) -->
    <g transform="translate(0,-230)">
      <rect x="-95" y="-40" width="190" height="80" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
      <text x="0" y="-16" fill="#818cf8" text-anchor="middle" font-size="13" font-weight="700">Agent-Loop</text>
      <text x="0" y="4" fill="#e2e8f0" text-anchor="middle" font-size="11">Read · Edit · Shell</text>
      <text x="0" y="22" fill="#94a3b8" text-anchor="middle" font-size="11">bis Task erfüllt</text>
    </g>

    <!-- Satellit 2: Kernel-Sandbox (rechts) -->
    <g transform="translate(220,-80)">
      <rect x="-100" y="-42" width="200" height="84" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="0" y="-18" fill="#fbbf24" text-anchor="middle" font-size="13" font-weight="700">Kernel-Sandbox</text>
      <text x="0" y="0" fill="#e2e8f0" text-anchor="middle" font-size="11">Seatbelt · Landlock</text>
      <text x="0" y="18" fill="#e2e8f0" text-anchor="middle" font-size="11">seccomp · AppContainer</text>
    </g>

    <!-- Satellit 3: Multi-Provider (unten) -->
    <g transform="translate(0,230)">
      <rect x="-110" y="-42" width="220" height="84" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="0" y="-18" fill="#22d3ee" text-anchor="middle" font-size="13" font-weight="700">Provider-agnostisch</text>
      <text x="0" y="2" fill="#e2e8f0" text-anchor="middle" font-size="11">OpenAI · Anthropic · Gemini</text>
      <text x="0" y="20" fill="#e2e8f0" text-anchor="middle" font-size="11">Ollama · Azure · OpenRouter</text>
    </g>

    <!-- Satellit 4: Open Source (links) -->
    <g transform="translate(-220,-80)">
      <rect x="-100" y="-42" width="200" height="84" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <text x="0" y="-18" fill="#10b981" text-anchor="middle" font-size="13" font-weight="700">Open Source</text>
      <text x="0" y="0" fill="#e2e8f0" text-anchor="middle" font-size="11">Apache-2.0</text>
      <text x="0" y="18" fill="#94a3b8" text-anchor="middle" font-size="11">wöchentliche Releases</text>
    </g>

    <!-- Satellit 5: Terminal-First (links unten) -->
    <g transform="translate(-200,150)">
      <rect x="-90" y="-32" width="180" height="64" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="0" y="-10" fill="#c4b5fd" text-anchor="middle" font-size="12" font-weight="700">Terminal-First</text>
      <text x="0" y="10" fill="#94a3b8" text-anchor="middle" font-size="11">TUI · codex exec</text>
    </g>

    <!-- Satellit 6: Cloud-Bridge (rechts unten) -->
    <g transform="translate(200,150)">
      <rect x="-90" y="-32" width="180" height="64" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="0" y="-10" fill="#c4b5fd" text-anchor="middle" font-size="12" font-weight="700">Codex-Cloud Bridge</text>
      <text x="0" y="10" fill="#94a3b8" text-anchor="middle" font-size="11">chatgpt.com/codex</text>
    </g>

    <!-- Verbindungslinien Satellit→Zentrum -->
    <g stroke="#475569" stroke-width="1" fill="none">
      <line x1="0" y1="-190" x2="0" y2="-110"/>
      <line x1="120" y1="-70" x2="80" y2="-60"/>
      <line x1="-120" y1="-70" x2="-80" y2="-60"/>
      <line x1="0" y1="188" x2="0" y2="110"/>
      <line x1="-110" y1="120" x2="-70" y2="80"/>
      <line x1="110" y1="120" x2="70" y2="80"/>
    </g>
  </g>

  <!-- Rechte Sektion: Vergleichs-Matrix -->
  <g transform="translate(760,130)">
    <text x="0" y="0" fill="#e2e8f0" font-size="18" font-weight="700">Abgrenzung · Agent-CLI-Landschaft</text>
    <text x="0" y="22" fill="#94a3b8" font-size="12">Radar über Lizenz, Fokus und Alleinstellungsmerkmal</text>

    <!-- Kopfzeile -->
    <g transform="translate(0,50)">
      <rect x="0" y="0" width="600" height="34" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="14" y="22" fill="#94a3b8" font-size="12" font-weight="600">Tool</text>
      <text x="160" y="22" fill="#94a3b8" font-size="12" font-weight="600">Lizenz</text>
      <text x="280" y="22" fill="#94a3b8" font-size="12" font-weight="600">Fokus</text>
      <text x="450" y="22" fill="#94a3b8" font-size="12" font-weight="600">Alleinstellung</text>
    </g>

    <!-- Reihe Codex CLI (hervorgehoben) -->
    <g transform="translate(0,92)">
      <rect x="0" y="0" width="600" height="44" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
      <circle cx="14" cy="22" r="5" fill="#818cf8"/>
      <text x="28" y="27" fill="#e2e8f0" font-size="13" font-weight="700">Codex CLI</text>
      <text x="160" y="27" fill="#10b981" font-size="12">Apache-2.0</text>
      <text x="280" y="27" fill="#e2e8f0" font-size="12">autonomer Agent</text>
      <text x="450" y="27" fill="#22d3ee" font-size="12">Kernel-Sandbox + Multi-Prov.</text>
    </g>

    <!-- Claude Code -->
    <g transform="translate(0,144)">
      <rect x="0" y="0" width="600" height="40" rx="6" fill="#1e293b" stroke="#334155"/>
      <circle cx="14" cy="20" r="5" fill="#f59e0b"/>
      <text x="28" y="25" fill="#e2e8f0" font-size="13" font-weight="600">Claude Code</text>
      <text x="160" y="25" fill="#ef4444" font-size="12">proprietär</text>
      <text x="280" y="25" fill="#e2e8f0" font-size="12">Präzisionspartner</text>
      <text x="450" y="25" fill="#fbbf24" font-size="12">17 Hook-Events</text>
    </g>

    <!-- Copilot CLI -->
    <g transform="translate(0,192)">
      <rect x="0" y="0" width="600" height="40" rx="6" fill="#1e293b" stroke="#334155"/>
      <circle cx="14" cy="20" r="5" fill="#a78bfa"/>
      <text x="28" y="25" fill="#e2e8f0" font-size="13" font-weight="600">GitHub Copilot CLI</text>
      <text x="160" y="25" fill="#ef4444" font-size="12">proprietär · Preview</text>
      <text x="280" y="25" fill="#e2e8f0" font-size="12">GitHub-Ökosystem</text>
      <text x="450" y="25" fill="#c4b5fd" font-size="12">Issues / PR nativ</text>
    </g>

    <!-- Aider -->
    <g transform="translate(0,240)">
      <rect x="0" y="0" width="600" height="40" rx="6" fill="#1e293b" stroke="#334155"/>
      <circle cx="14" cy="20" r="5" fill="#10b981"/>
      <text x="28" y="25" fill="#e2e8f0" font-size="13" font-weight="600">Aider</text>
      <text x="160" y="25" fill="#10b981" font-size="12">MIT</text>
      <text x="280" y="25" fill="#e2e8f0" font-size="12">Git-orientiert</text>
      <text x="450" y="25" fill="#34d399" font-size="12">Auto-Commits</text>
    </g>

    <!-- Cursor / Windsurf -->
    <g transform="translate(0,288)">
      <rect x="0" y="0" width="600" height="40" rx="6" fill="#1e293b" stroke="#334155"/>
      <circle cx="14" cy="20" r="5" fill="#22d3ee"/>
      <text x="28" y="25" fill="#e2e8f0" font-size="13" font-weight="600">Cursor / Windsurf</text>
      <text x="160" y="25" fill="#ef4444" font-size="12">proprietär</text>
      <text x="280" y="25" fill="#e2e8f0" font-size="12">IDE-First</text>
      <text x="450" y="25" fill="#22d3ee" font-size="12">eigener Editor</text>
    </g>

    <!-- Gemini CLI -->
    <g transform="translate(0,336)">
      <rect x="0" y="0" width="600" height="40" rx="6" fill="#1e293b" stroke="#334155"/>
      <circle cx="14" cy="20" r="5" fill="#f59e0b"/>
      <text x="28" y="25" fill="#e2e8f0" font-size="13" font-weight="600">Gemini CLI</text>
      <text x="160" y="25" fill="#10b981" font-size="12">Apache-2.0</text>
      <text x="280" y="25" fill="#e2e8f0" font-size="12">Google-Stack</text>
      <text x="450" y="25" fill="#fbbf24" font-size="12">großzügiger Free-Tier</text>
    </g>

    <!-- Hinweisbox Verwechslung -->
    <g transform="translate(0,410)">
      <rect x="0" y="0" width="600" height="92" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
      <text x="16" y="24" fill="#fbbf24" font-size="13" font-weight="700">Verwechslungsgefahr</text>
      <text x="16" y="46" fill="#e2e8f0" font-size="12">Codex-Modell (2021, Copilot-Basis) · deprecated 2023 — nicht dieselbe Sache.</text>
      <text x="16" y="64" fill="#e2e8f0" font-size="12">Codex-Cloud (chatgpt.com/codex) · eigenes Produkt; interagiert nur mit der CLI.</text>
      <text x="16" y="82" fill="#94a3b8" font-size="11">Diese Doku behandelt ausschließlich die lokale CLI @openai/codex (Rust-Binary).</text>
    </g>
  </g>

  <!-- Fußnote Legende -->
  <g transform="translate(40,860)">
    <rect x="0" y="-16" width="14" height="14" rx="3" fill="#6366f1"/>
    <text x="22" y="-4" fill="#94a3b8" font-size="12">Kern / Agent-Loop</text>
    <rect x="180" y="-16" width="14" height="14" rx="3" fill="#f59e0b"/>
    <text x="202" y="-4" fill="#94a3b8" font-size="12">Sicherheit / Sandbox</text>
    <rect x="360" y="-16" width="14" height="14" rx="3" fill="#22d3ee"/>
    <text x="382" y="-4" fill="#94a3b8" font-size="12">Integration / Provider</text>
    <rect x="560" y="-16" width="14" height="14" rx="3" fill="#10b981"/>
    <text x="582" y="-4" fill="#94a3b8" font-size="12">Lizenz / Open Source</text>
    <rect x="760" y="-16" width="14" height="14" rx="3" fill="#a78bfa"/>
    <text x="782" y="-4" fill="#94a3b8" font-size="12">Ergänzende Funktion</text>
  </g>
</svg>
