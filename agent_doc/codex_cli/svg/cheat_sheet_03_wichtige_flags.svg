<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Wichtige Flags — DIP-Switches und Regelreihen</title>
  <desc>Vier Flag-Gruppen (Modell/Profil, Sicherheit, Output, Modus) als Karten mit Monospace-Flags im Synthesizer-/DIP-Switch-Stil.</desc>

  <defs>
    <linearGradient id="chassis" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sw-on" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Wichtige Flags</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">DIP-Switches &amp; Regler — gruppiert nach Wirkung</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 03/13</text>

  <!-- Gruppe 1: Modell / Profil -->
  <g transform="translate(60 140)">
    <rect width="630" height="340" rx="16" fill="url(#chassis)" stroke="#334155"/>
    <rect x="0" y="0" width="8" height="340" fill="#6366f1" rx="4"/>
    <text x="30" y="40" fill="#e2e8f0" font-size="20" font-weight="700">Modell &amp; Profil</text>
    <text x="30" y="62" fill="#94a3b8" font-size="13">welche Engine, welches Setup</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace">
      <!-- -m / --model -->
      <g transform="translate(30 90)">
        <rect width="260" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#818cf8"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="url(#sw-on)"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">-m  --model &lt;name&gt;</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">wählt Modell-ID (z.B. gpt-5.3-codex)</text>
      </g>

      <g transform="translate(310 90)">
        <rect width="290" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#818cf8"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="url(#sw-on)"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">-p  --profile &lt;name&gt;</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">lädt [profiles.&lt;name&gt;] aus config</text>
      </g>

      <g transform="translate(30 180)">
        <rect width="260" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#818cf8"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="url(#sw-on)"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">-c key=value</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">Config-Override, repeat-able</text>
      </g>

      <g transform="translate(310 180)">
        <rect width="290" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#64748b"/>
        <rect x="18" y="36" width="22" height="12" rx="2" fill="#64748b"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">--oss</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">lokales Modell via Ollama/LM Studio</text>
      </g>

      <g transform="translate(30 270)">
        <rect width="570" height="50" rx="10" fill="#0b1220" stroke="#6366f1" stroke-dasharray="3 3"/>
        <text x="20" y="31" fill="#a78bfa" font-size="13">Hinweis: Profile überschreiben Defaults; -c gewinnt über beides.</text>
      </g>
    </g>
  </g>

  <!-- Gruppe 2: Sicherheit -->
  <g transform="translate(710 140)">
    <rect width="630" height="340" rx="16" fill="url(#chassis)" stroke="#334155"/>
    <rect x="0" y="0" width="8" height="340" fill="#f59e0b" rx="4"/>
    <text x="30" y="40" fill="#e2e8f0" font-size="20" font-weight="700">Sicherheit</text>
    <text x="30" y="62" fill="#94a3b8" font-size="13">Sandbox-Mode &amp; Approval-Policy</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace">
      <g transform="translate(30 90)">
        <rect width="570" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#f59e0b"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#f59e0b"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">-s  --sandbox &lt;mode&gt;</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">read-only · workspace-write · danger-full-access</text>
      </g>

      <g transform="translate(30 180)">
        <rect width="570" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#f59e0b"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#f59e0b"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">-a  --ask-for-approval &lt;pol&gt;</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">untrusted · on-request · on-failure · never</text>
      </g>

      <g transform="translate(30 270)">
        <rect width="275" height="50" rx="10" fill="#0b1220" stroke="#10b981"/>
        <text x="20" y="31" fill="#10b981" font-size="13" font-weight="700">--full-auto</text>
        <text x="130" y="31" fill="#94a3b8" font-size="11" font-family="system-ui">write + on-request</text>
      </g>

      <g transform="translate(325 270)">
        <rect width="275" height="50" rx="10" fill="#0b1220" stroke="#ef4444"/>
        <text x="20" y="31" fill="#ef4444" font-size="13" font-weight="700">--yolo</text>
        <text x="85" y="31" fill="#94a3b8" font-size="11" font-family="system-ui">bypass-approvals-and-sandbox</text>
      </g>
    </g>
  </g>

  <!-- Gruppe 3: Output -->
  <g transform="translate(60 510)">
    <rect width="630" height="340" rx="16" fill="url(#chassis)" stroke="#334155"/>
    <rect x="0" y="0" width="8" height="340" fill="#22d3ee" rx="4"/>
    <text x="30" y="40" fill="#e2e8f0" font-size="20" font-weight="700">Output</text>
    <text x="30" y="62" fill="#94a3b8" font-size="13">wie schreibt der Agent nach außen</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace">
      <g transform="translate(30 90)">
        <rect width="260" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#22d3ee"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#22d3ee"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">--json</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">JSONL-Events (nur exec)</text>
      </g>

      <g transform="translate(310 90)">
        <rect width="290" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#22d3ee"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#22d3ee"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">--output-last-message</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">letzte Message → Datei</text>
      </g>

      <g transform="translate(30 180)">
        <rect width="570" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#22d3ee"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#22d3ee"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">--output-schema &lt;json&gt;</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">strukturierter Output nach JSON-Schema (validiert)</text>
      </g>

      <g transform="translate(30 270)">
        <rect width="570" height="50" rx="10" fill="#0b1220" stroke="#22d3ee" stroke-dasharray="3 3"/>
        <text x="20" y="31" fill="#22d3ee" font-size="13">Pipe-tauglich: exec --json | jq '.event == "agent_output"'</text>
      </g>
    </g>
  </g>

  <!-- Gruppe 4: Modus / Input -->
  <g transform="translate(710 510)">
    <rect width="630" height="340" rx="16" fill="url(#chassis)" stroke="#334155"/>
    <rect x="0" y="0" width="8" height="340" fill="#a78bfa" rx="4"/>
    <text x="30" y="40" fill="#e2e8f0" font-size="20" font-weight="700">Modus &amp; Input</text>
    <text x="30" y="62" fill="#94a3b8" font-size="13">was der Agent darf / was er sieht</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace">
      <g transform="translate(30 90)">
        <rect width="260" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#a78bfa"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#a78bfa"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">--search</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">Live-Websearch statt Cache</text>
      </g>

      <g transform="translate(310 90)">
        <rect width="290" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#a78bfa"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#a78bfa"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">-i  --image &lt;path&gt;</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">Bild anhängen (multi-modal)</text>
      </g>

      <g transform="translate(30 180)">
        <rect width="570" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
        <rect x="14" y="18" width="30" height="34" rx="4" fill="#0b1220" stroke="#f59e0b"/>
        <rect x="18" y="22" width="22" height="26" rx="2" fill="#f59e0b"/>
        <text x="56" y="36" fill="#e2e8f0" font-size="14" font-weight="700">--dangerously-bypass-approvals-and-sandbox</text>
        <text x="56" y="56" fill="#94a3b8" font-size="11" font-family="system-ui">Alias: --yolo · nur in isolierten VMs/Containern</text>
      </g>

      <g transform="translate(30 270)">
        <rect width="275" height="50" rx="10" fill="#0b1220" stroke="#a78bfa"/>
        <text x="20" y="31" fill="#a78bfa" font-size="13" font-weight="700">-v / --verbose</text>
        <text x="145" y="31" fill="#94a3b8" font-size="11" font-family="system-ui">Debug-Ausgabe</text>
      </g>

      <g transform="translate(325 270)">
        <rect width="275" height="50" rx="10" fill="#0b1220" stroke="#94a3b8"/>
        <text x="20" y="31" fill="#cbd5e1" font-size="13" font-weight="700">--cwd &lt;path&gt;</text>
        <text x="135" y="31" fill="#94a3b8" font-size="11" font-family="system-ui">Arbeitsverzeichnis setzen</text>
      </g>
    </g>
  </g>
</svg>
