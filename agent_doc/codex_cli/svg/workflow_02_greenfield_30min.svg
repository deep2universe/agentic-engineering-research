<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Greenfield-Projekt in 30 Minuten: 5-Prompt-Pipeline mit Stoppuhr</title>
  <desc>Horizontale Pipeline von Scope über TDD, Implementation, CLI bis Release mit Zeitbudget je Schritt.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" font-size="30" font-weight="700" fill="#e2e8f0">Greenfield in 30 Minuten</text>
  <text x="60" y="100" font-size="16" fill="#94a3b8">Eine 5-Prompt-Sequenz: vom leeren Verzeichnis bis zum getaggten v0.1.0.</text>
  <text x="1340" y="70" text-anchor="end" font-size="14" fill="#64748b">Codex CLI · Workflow 02</text>

  <!-- Stoppuhr -->
  <g transform="translate(1180,140)">
    <circle cx="80" cy="80" r="70" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
    <circle cx="80" cy="80" r="60" fill="none" stroke="#312e81" stroke-width="2"/>
    <line x1="80" y1="80" x2="80" y2="30" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="80" x2="120" y2="80" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <circle cx="80" cy="80" r="4" fill="#e2e8f0"/>
    <text x="80" y="170" text-anchor="middle" font-size="14" fill="#94a3b8">~30 min Total</text>
    <rect x="40" y="10" width="80" height="14" rx="3" fill="#312e81" stroke="#6366f1"/>
    <text x="80" y="21" text-anchor="middle" font-size="10" fill="#a5b4fc">Sprint-Timer</text>
  </g>

  <!-- Setup-Box -->
  <g transform="translate(60,140)">
    <rect width="320" height="170" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="32" font-size="15" font-weight="700" fill="#e2e8f0">Setup (terminal)</text>
    <rect x="20" y="50" width="280" height="100" rx="6" fill="#0f172a" stroke="#334155"/>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12.5" fill="#22d3ee">
      <text x="34" y="74">$ mkdir ~/code/tiny-kv</text>
      <text x="34" y="96">$ cd ~/code/tiny-kv</text>
      <text x="34" y="118">$ codex</text>
    </g>
    <text x="20" y="166" font-size="11" fill="#64748b">Default-Profil reicht; keine Pre-Config.</text>
  </g>

  <!-- Pipeline -->
  <g transform="translate(60,360)">
    <!-- Pipeline-Track -->
    <line x1="80" y1="120" x2="1280" y2="120" stroke="#334155" stroke-width="3"/>

    <!-- Step 1 Scope -->
    <g transform="translate(0,0)">
      <rect width="240" height="240" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
      <circle cx="40" cy="40" r="22" fill="#6366f1"/>
      <text x="40" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">1</text>
      <text x="76" y="36" font-size="15" font-weight="700" fill="#e2e8f0">Scope</text>
      <text x="76" y="54" font-size="11" fill="#a5b4fc">~5 min</text>
      <text x="20" y="92" font-size="12.5" fill="#cbd5e1">Goal: Rust KV-Store, JSONL,</text>
      <text x="20" y="110" font-size="12.5" fill="#cbd5e1">CLI; no async, no unsafe.</text>
      <text x="20" y="138" font-size="12.5" fill="#94a3b8">DoD: cargo test green,</text>
      <text x="20" y="156" font-size="12.5" fill="#94a3b8">clippy clean, AGENTS.md.</text>
      <rect x="20" y="180" width="200" height="40" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="120" y="205" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#22d3ee">cargo new --lib</text>
    </g>
    <line x1="240" y1="120" x2="282" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 2 TDD -->
    <g transform="translate(282,0)">
      <rect width="220" height="240" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
      <circle cx="40" cy="40" r="22" fill="#ef4444"/>
      <text x="40" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">2</text>
      <text x="76" y="36" font-size="15" font-weight="700" fill="#e2e8f0">TDD (rot)</text>
      <text x="76" y="54" font-size="11" fill="#fca5a5">~5 min</text>
      <text x="20" y="92" font-size="12.5" fill="#cbd5e1">Tests für `open`, `put`,</text>
      <text x="20" y="110" font-size="12.5" fill="#cbd5e1">`get`, `delete` — first.</text>
      <text x="20" y="138" font-size="12.5" fill="#fecaca">"Do not implement yet."</text>
      <rect x="20" y="170" width="180" height="50" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="110" y="190" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#fca5a5">commit: test: red</text>
      <text x="110" y="210" text-anchor="middle" font-size="10" fill="#64748b">Red Checkpoint</text>
    </g>
    <line x1="502" y1="120" x2="544" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 3 Impl -->
    <g transform="translate(544,0)">
      <rect width="220" height="240" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <circle cx="40" cy="40" r="22" fill="#10b981"/>
      <text x="40" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">3</text>
      <text x="76" y="36" font-size="15" font-weight="700" fill="#e2e8f0">Impl (grün)</text>
      <text x="76" y="54" font-size="11" fill="#6ee7b7">~10 min</text>
      <text x="20" y="92" font-size="12.5" fill="#cbd5e1">Minimum, um rote Tests</text>
      <text x="20" y="110" font-size="12.5" fill="#cbd5e1">grün zu machen.</text>
      <text x="20" y="138" font-size="12.5" fill="#94a3b8">Kleine Commits — eine</text>
      <text x="20" y="156" font-size="12.5" fill="#94a3b8">public fn pro Commit.</text>
      <rect x="20" y="180" width="180" height="40" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="110" y="205" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#6ee7b7">commit: feat: …</text>
    </g>
    <line x1="764" y1="120" x2="806" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 4 CLI -->
    <g transform="translate(806,0)">
      <rect width="220" height="240" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
      <circle cx="40" cy="40" r="22" fill="#a78bfa"/>
      <text x="40" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">4</text>
      <text x="76" y="36" font-size="15" font-weight="700" fill="#e2e8f0">CLI-Wrapper</text>
      <text x="76" y="54" font-size="11" fill="#c4b5fd">~5 min</text>
      <text x="20" y="92" font-size="12.5" fill="#cbd5e1">`bin/tiny-kv.rs` mit clap,</text>
      <text x="20" y="110" font-size="12.5" fill="#cbd5e1">mappt cmds → lib calls.</text>
      <text x="20" y="138" font-size="12.5" fill="#94a3b8">Integration tests in</text>
      <text x="20" y="156" font-size="12.5" fill="#94a3b8">`tests/cli.rs`.</text>
      <rect x="20" y="180" width="180" height="40" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="110" y="205" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#c4b5fd">tests/cli.rs</text>
    </g>
    <line x1="1026" y1="120" x2="1068" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 5 Release -->
    <g transform="translate(1068,0)">
      <rect width="220" height="240" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
      <circle cx="40" cy="40" r="22" fill="#22d3ee"/>
      <text x="40" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">5</text>
      <text x="76" y="36" font-size="15" font-weight="700" fill="#e2e8f0">Release</text>
      <text x="76" y="54" font-size="11" fill="#67e8f9">~5 min</text>
      <text x="20" y="92" font-size="12.5" fill="#cbd5e1">Skill `release`:</text>
      <text x="20" y="110" font-size="12.5" fill="#cbd5e1">semver-bump, CHANGELOG,</text>
      <text x="20" y="128" font-size="12.5" fill="#cbd5e1">tag, push.</text>
      <rect x="20" y="160" width="180" height="60" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="110" y="184" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#67e8f9">git tag v0.1.0</text>
      <text x="110" y="206" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#67e8f9">git push --tags</text>
    </g>
  </g>

  <!-- Rakete als Metapher unten -->
  <g transform="translate(60,690)">
    <rect width="1280" height="160" rx="14" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="32" font-size="16" font-weight="700" fill="#e2e8f0">Sprint-Tafel · Erfolgs-Rezept</text>

    <!-- 4 Mini-Karten -->
    <g transform="translate(20,50)" font-size="12.5">
      <rect width="300" height="90" rx="8" fill="#0f172a" stroke="#6366f1"/>
      <text x="14" y="22" font-weight="700" fill="#a5b4fc">Goal &amp; DoD pro Prompt</text>
      <text x="14" y="44" fill="#cbd5e1">Jeder der 5 Schritte hat</text>
      <text x="14" y="62" fill="#cbd5e1">explizite Pass-Kriterien.</text>
      <text x="14" y="80" fill="#64748b">→ keine offenen Enden.</text>

      <g transform="translate(320,0)">
        <rect width="300" height="90" rx="8" fill="#0f172a" stroke="#ef4444"/>
        <text x="14" y="22" font-weight="700" fill="#fca5a5">Test before Code</text>
        <text x="14" y="44" fill="#cbd5e1">Rote Tests = ausführbares</text>
        <text x="14" y="62" fill="#cbd5e1">Pflichtenheft des Agents.</text>
        <text x="14" y="80" fill="#64748b">→ Drift unmöglich.</text>
      </g>

      <g transform="translate(640,0)">
        <rect width="300" height="90" rx="8" fill="#0f172a" stroke="#a78bfa"/>
        <text x="14" y="22" font-weight="700" fill="#c4b5fd">Kleine Commits</text>
        <text x="14" y="44" fill="#cbd5e1">Eine public fn pro Commit</text>
        <text x="14" y="62" fill="#cbd5e1">→ Reviewbar, revertbar.</text>
        <text x="14" y="80" fill="#64748b">→ Bisect bleibt nutzbar.</text>
      </g>

      <g transform="translate(960,0)">
        <rect width="300" height="90" rx="8" fill="#0f172a" stroke="#22d3ee"/>
        <text x="14" y="22" font-weight="700" fill="#67e8f9">Release als Skill</text>
        <text x="14" y="44" fill="#cbd5e1">Reproduzierbar, niemand</text>
        <text x="14" y="62" fill="#cbd5e1">vergisst CHANGELOG/Tag.</text>
        <text x="14" y="80" fill="#64748b">→ User pusht final selbst.</text>
      </g>
    </g>
  </g>

  <!-- Legende -->
  <g transform="translate(60,870)" font-size="12" fill="#94a3b8">
    <rect width="14" height="14" fill="#6366f1"/><text x="22" y="12">Plan</text>
    <rect x="80" width="14" height="14" fill="#ef4444"/><text x="102" y="12">Red Test</text>
    <rect x="180" width="14" height="14" fill="#10b981"/><text x="202" y="12">Green Impl</text>
    <rect x="290" width="14" height="14" fill="#a78bfa"/><text x="312" y="12">Tooling</text>
    <rect x="380" width="14" height="14" fill="#22d3ee"/><text x="402" y="12">Release</text>
  </g>
</svg>
