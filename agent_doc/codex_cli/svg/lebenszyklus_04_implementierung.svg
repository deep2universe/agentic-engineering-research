<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Phase 4 — Implementierung mit Ticket-Style-Prompts, TDD und apply_patch</title>
  <desc>Manufaktur-Werkbank: Ticket-Style-Prompts, TDD-Loop, kleine Commits, sandbox workspace-write, /diff vor Akzeptanz, /compact bei Kontext-Druck.</desc>

  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>
    <marker id="arr4r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arr4w" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" fill="#e2e8f0" font-size="30" font-weight="700">Phase 4 — Implementierung</text>
  <text x="40" y="84" fill="#94a3b8" font-size="15">Manufaktur-Werkbank: Schritt für Schritt, kleine Commits, jeder Diff geprüft.</text>
  <text x="1360" y="56" fill="#6366f1" font-size="14" text-anchor="end">Codex CLI · Phase 04</text>

  <!-- Ticket-Style Prompt -->
  <g transform="translate(40,130)">
    <rect width="500" height="240" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="20" y="34" fill="#6366f1" font-size="16" font-weight="700">Ticket-Style-Prompt</text>
    <rect x="20" y="50" width="460" height="170" rx="10" fill="#0f172a" stroke="#334155"/>
    <g font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace" font-size="12" fill="#e2e8f0">
      <text x="34" y="74" fill="#22d3ee">Goal:</text>
      <text x="90" y="74">add fetch_thread() to slack/client.py</text>
      <text x="34" y="96" fill="#22d3ee">Constraints:</text>
      <text x="34" y="114">  · Slack Web API conversations.replies</text>
      <text x="34" y="132">  · retry on 429 (exp. backoff)</text>
      <text x="34" y="150">  · keep public sigs in other modules</text>
      <text x="34" y="172" fill="#22d3ee">Definition of Done:</text>
      <text x="34" y="190">  · tests/test_client.py (respx)</text>
      <text x="34" y="208">  · ruff + mypy clean</text>
    </g>
  </g>

  <!-- TDD Loop -->
  <g transform="translate(560,130)">
    <rect width="800" height="240" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="16" font-weight="700">TDD-Loop · Red → Green → Refactor</text>

    <g transform="translate(40,70)">
      <circle cx="60" cy="80" r="56" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
      <text x="60" y="74" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">RED</text>
      <text x="60" y="92" text-anchor="middle" fill="#cbd5e1" font-size="11">Test schreiben</text>
      <text x="60" y="108" text-anchor="middle" fill="#94a3b8" font-size="10">checkpoint commit</text>

      <circle cx="240" cy="80" r="56" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
      <text x="240" y="74" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">GREEN</text>
      <text x="240" y="92" text-anchor="middle" fill="#cbd5e1" font-size="11">Impl bis grün</text>
      <text x="240" y="108" text-anchor="middle" fill="#94a3b8" font-size="10">apply_patch</text>

      <circle cx="420" cy="80" r="56" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="420" y="74" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">REFACTOR</text>
      <text x="420" y="92" text-anchor="middle" fill="#cbd5e1" font-size="11">/diff prüfen</text>
      <text x="420" y="108" text-anchor="middle" fill="#94a3b8" font-size="10">commit klein</text>

      <circle cx="600" cy="80" r="56" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <text x="600" y="74" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">/compact</text>
      <text x="600" y="92" text-anchor="middle" fill="#cbd5e1" font-size="11">bei &gt;20 Turns</text>
      <text x="600" y="108" text-anchor="middle" fill="#94a3b8" font-size="10">oder &gt;80% ctx</text>

      <line x1="116" y1="80" x2="184" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr4w)"/>
      <line x1="296" y1="80" x2="364" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr4w)"/>
      <line x1="476" y1="80" x2="544" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr4w)"/>
      <path d="M 600 136 Q 600 180 240 180 Q 60 180 60 136" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arr4r)"/>
      <text x="330" y="200" text-anchor="middle" fill="#10b981" font-size="11">nächste Iteration · 1 Turn ≈ 1 logische Änderung</text>
    </g>
  </g>

  <!-- Sandbox -->
  <g transform="translate(40,390)">
    <rect width="500" height="220" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="20" y="34" fill="#f59e0b" font-size="16" font-weight="700">Sandbox · workspace-write</text>
    <g transform="translate(20,54)">
      <rect width="460" height="146" rx="10" fill="#0f172a" stroke="#334155"/>
      <!-- Tresor -->
      <rect x="20" y="20" width="100" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="70" cy="70" r="22" fill="none" stroke="#f59e0b" stroke-width="3"/>
      <circle cx="70" cy="70" r="6" fill="#f59e0b"/>
      <text x="70" y="116" text-anchor="middle" fill="#cbd5e1" font-size="11">Sandbox</text>

      <text x="140" y="34" fill="#10b981" font-size="13" font-weight="700">erlaubt</text>
      <text x="140" y="54" fill="#cbd5e1" font-size="12">· Read/Write im Workspace</text>
      <text x="140" y="72" fill="#cbd5e1" font-size="12">· Test-Runs lokal</text>

      <text x="140" y="100" fill="#ef4444" font-size="13" font-weight="700">verboten</text>
      <text x="140" y="120" fill="#cbd5e1" font-size="12">· Netzwerk-Zugriff (default)</text>
      <text x="140" y="138" fill="#cbd5e1" font-size="12">· pip install ohne Approval</text>
    </g>
  </g>

  <!-- /diff vor Akzeptanz -->
  <g transform="translate(560,390)">
    <rect width="800" height="220" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="16" font-weight="700">/diff vor Akzeptanz</text>
    <g transform="translate(20,54)">
      <rect width="760" height="146" rx="10" fill="#0f172a" stroke="#334155"/>
      <g font-family="'JetBrains Mono', monospace" font-size="13">
        <text x="20" y="28" fill="#94a3b8">diff --git a/src/slack/client.py b/src/slack/client.py</text>
        <text x="20" y="48" fill="#94a3b8">@@ -42,6 +42,18 @@ class SlackClient:</text>
        <text x="20" y="68" fill="#10b981">+    def fetch_thread(self, channel_id: str, ts: str) -&gt; list[Message]:</text>
        <text x="20" y="86" fill="#10b981">+        url = f"{self.base}/conversations.replies"</text>
        <text x="20" y="104" fill="#10b981">+        for attempt in range(5):</text>
        <text x="20" y="122" fill="#10b981">+            r = self._get(url, params={"channel": channel_id, ...})</text>
        <text x="20" y="140" fill="#ef4444">-    # legacy fetch removed</text>
      </g>
    </g>
  </g>

  <!-- Best practices grid bottom -->
  <g transform="translate(40,630)">
    <rect width="660" height="240" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="16" font-weight="700">Best Practices</text>
    <text x="20" y="62" fill="#cbd5e1" font-size="13">· Ticket-Style: Goal, Constraints, Definition of Done</text>
    <text x="20" y="84" fill="#cbd5e1" font-size="13">· TDD-Loop: Test rot committen ("checkpoint"), dann grün</text>
    <text x="20" y="106" fill="#cbd5e1" font-size="13">· Kleine Commits (1 Turn ≈ 1 logische Änderung)</text>
    <text x="20" y="128" fill="#cbd5e1" font-size="13">· Sandbox workspace-write — Netz default aus</text>
    <text x="20" y="150" fill="#cbd5e1" font-size="13">· /diff vor Akzeptanz — nie blind mergen</text>
    <text x="20" y="172" fill="#cbd5e1" font-size="13">· /compact bei &gt; 20 Turns oder &gt; 80% Kontext</text>
    <text x="20" y="194" fill="#cbd5e1" font-size="13">· Profil "daily" mit moderatem Reasoning + workspace-write</text>
    <text x="20" y="216" fill="#cbd5e1" font-size="13">· apply_patch nur dort, wo notwendig — keine kreuzweisen Edits</text>
  </g>
  <g transform="translate(720,630)">
    <rect width="640" height="240" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="34" fill="#ef4444" font-size="16" font-weight="700">Anti-Patterns</text>
    <text x="20" y="62" fill="#cbd5e1" font-size="13">✗ "Fix everything"-Prompts über 10+ Dateien</text>
    <text x="20" y="84" fill="#cbd5e1" font-size="13">✗ --full-auto + Approvals wegklicken ohne Diff-Review</text>
    <text x="20" y="106" fill="#cbd5e1" font-size="13">✗ Kontext zumüllen mit irrelevanten @file-Anhängen</text>
    <text x="20" y="128" fill="#cbd5e1" font-size="13">✗ Tests erst nach Implementation schreiben</text>
    <text x="20" y="150" fill="#cbd5e1" font-size="13">✗ Sandbox auf danger-full-access für Routine-Tasks</text>
    <text x="20" y="172" fill="#cbd5e1" font-size="13">✗ Public Signaturen breaking ändern ohne Refactor-PR</text>
    <text x="20" y="194" fill="#cbd5e1" font-size="13">✗ Kein /compact — Session läuft in Token-Limit</text>
    <text x="20" y="216" fill="#cbd5e1" font-size="13">✗ Mehrere Features parallel im selben Branch</text>
  </g>
</svg>
