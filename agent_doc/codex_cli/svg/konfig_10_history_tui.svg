<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>History und TUI — Terminal mit Einstellungs-Gürtel</title>
  <desc>History-Persistenz und TUI-Optionen für Theme, Mouse, Reverse-Search und Token-Usage-Anzeige.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">History &amp; TUI — Terminal-Cockpit</text>
  <text x="60" y="92" fill="#94a3b8" font-size="16">Zwei Sektionen konfigurieren Persistenz und Bedien-Ergonomie des Terminal-UIs.</text>
  <text x="1340" y="60" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §10</text>

  <!-- Terminal-Screen -->
  <g>
    <rect x="340" y="150" width="720" height="440" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="340" y="150" width="720" height="36" rx="14" fill="#0f172a"/>
    <circle cx="362" cy="168" r="6" fill="#ef4444"/>
    <circle cx="382" cy="168" r="6" fill="#f59e0b"/>
    <circle cx="402" cy="168" r="6" fill="#10b981"/>
    <text x="700" y="174" fill="#94a3b8" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">codex — zsh — 120×34</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
      <text x="360" y="220" fill="#10b981">$ codex "refactor cart.ts"</text>
      <text x="360" y="246" fill="#94a3b8">→ plan: extract pure funcs · add tests</text>
      <text x="360" y="266" fill="#94a3b8">→ applying patch…</text>
      <text x="360" y="288" fill="#22d3ee">▸ thinking…</text>
      <text x="360" y="310" fill="#e2e8f0">tests pass (12/12) · 2.4s</text>
      <text x="360" y="340" fill="#818cf8">[codex] ready for next turn</text>
      <text x="360" y="366" fill="#10b981">$ </text>
      <rect x="378" y="354" width="10" height="18" fill="#10b981" opacity="0.8"/>
    </g>

    <!-- Status-Bar unten im Terminal -->
    <rect x="340" y="554" width="720" height="36" rx="0" fill="#0f172a" stroke="#334155"/>
    <text x="360" y="578" fill="#a78bfa" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">theme: dark</text>
    <text x="520" y="578" fill="#10b981" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">mouse: on</text>
    <text x="660" y="578" fill="#22d3ee" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">^R: reverse</text>
    <text x="820" y="578" fill="#f59e0b" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">tokens: 12.4k / 200k</text>
  </g>

  <!-- Links: [history] -->
  <g>
    <rect x="60" y="150" width="260" height="440" rx="14" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
    <rect x="60" y="150" width="260" height="48" rx="14" fill="#a78bfa" opacity="0.2"/>
    <text x="190" y="182" fill="#a78bfa" font-size="17" font-weight="700" text-anchor="middle">[history]</text>

    <text x="80" y="232" fill="#94a3b8" font-size="13" font-weight="600">persistence</text>
    <rect x="80" y="244" width="220" height="40" rx="8" fill="#10b98133" stroke="#10b981"/>
    <text x="190" y="268" fill="#10b981" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">save-all</text>
    <rect x="80" y="292" width="220" height="32" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="190" y="313" fill="#94a3b8" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">none</text>

    <text x="80" y="370" fill="#94a3b8" font-size="13" font-weight="600">max_bytes</text>
    <rect x="80" y="382" width="220" height="48" rx="8" fill="#0f172a" stroke="#a78bfa"/>
    <text x="190" y="412" fill="#e2e8f0" font-size="14" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">10 485 760</text>
    <text x="190" y="448" fill="#94a3b8" font-size="11" text-anchor="middle">= 10 MiB Rolling-Limit</text>

    <!-- Speicherort -->
    <rect x="80" y="480" width="220" height="92" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="190" y="502" fill="#94a3b8" font-size="12" text-anchor="middle" font-weight="600">SPEICHERORT</text>
    <text x="190" y="524" fill="#e2e8f0" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">~/.codex/sessions/</text>
    <text x="190" y="544" fill="#e2e8f0" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">&lt;uuid&gt;.jsonl</text>
    <text x="190" y="564" fill="#94a3b8" font-size="11" text-anchor="middle">eine Datei pro Session</text>
  </g>

  <!-- Rechts: [tui] -->
  <g>
    <rect x="1080" y="150" width="260" height="440" rx="14" fill="#111827" stroke="#10b981" stroke-width="2"/>
    <rect x="1080" y="150" width="260" height="48" rx="14" fill="#10b981" opacity="0.2"/>
    <text x="1210" y="182" fill="#10b981" font-size="17" font-weight="700" text-anchor="middle">[tui]</text>

    <text x="1100" y="232" fill="#94a3b8" font-size="13" font-weight="600">theme</text>
    <g>
      <rect x="1100" y="244" width="105" height="36" rx="8" fill="#a78bfa"/>
      <text x="1152" y="267" fill="#0f172a" font-size="13" text-anchor="middle" font-weight="700">dark</text>
      <rect x="1215" y="244" width="105" height="36" rx="8" fill="#0f172a" stroke="#334155"/>
      <text x="1268" y="267" fill="#94a3b8" font-size="13" text-anchor="middle">light</text>
    </g>

    <text x="1100" y="318" fill="#94a3b8" font-size="13" font-weight="600">mouse</text>
    <rect x="1260" y="302" width="56" height="28" rx="14" fill="#10b981"/>
    <circle cx="1302" cy="316" r="11" fill="#0f172a"/>
    <text x="1100" y="344" fill="#94a3b8" font-size="11">scroll · click · select</text>

    <text x="1100" y="386" fill="#94a3b8" font-size="13" font-weight="600">reverse_search_key</text>
    <rect x="1100" y="398" width="220" height="40" rx="8" fill="#0f172a" stroke="#22d3ee"/>
    <text x="1210" y="422" fill="#22d3ee" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">ctrl+r</text>

    <text x="1100" y="470" fill="#94a3b8" font-size="13" font-weight="600">show_token_usage</text>
    <rect x="1260" y="454" width="56" height="28" rx="14" fill="#f59e0b"/>
    <circle cx="1302" cy="468" r="11" fill="#0f172a"/>
    <text x="1100" y="498" fill="#94a3b8" font-size="11">zeigt Tokens / Context-Limit</text>

    <rect x="1100" y="520" width="220" height="52" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="1210" y="540" fill="#94a3b8" font-size="11" text-anchor="middle">BONUS</text>
    <text x="1210" y="560" fill="#e2e8f0" font-size="12" text-anchor="middle">Chat-Verlauf scrollbar,</text>
    <text x="1210" y="575" fill="#e2e8f0" font-size="12" text-anchor="middle">Copy/Paste via Selection</text>
  </g>

  <!-- Unten: Visualisierung History-Growth -->
  <g>
    <rect x="60" y="620" width="1280" height="230" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="80" y="650" fill="#94a3b8" font-size="13" font-weight="600">HISTORY-GROWTH · Rolling-Window</text>

    <!-- X-Achse -->
    <line x1="100" y1="790" x2="1300" y2="790" stroke="#334155" stroke-width="1.5"/>
    <text x="100" y="810" fill="#94a3b8" font-size="11">Session 1</text>
    <text x="300" y="810" fill="#94a3b8" font-size="11">…</text>
    <text x="500" y="810" fill="#94a3b8" font-size="11">Session N</text>
    <text x="900" y="810" fill="#94a3b8" font-size="11">… max_bytes erreicht</text>
    <text x="1250" y="810" fill="#94a3b8" font-size="11">heute</text>

    <!-- max_bytes-Linie -->
    <line x1="100" y1="680" x2="1300" y2="680" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="1300" y="674" fill="#f59e0b" font-size="11" text-anchor="end" font-weight="600">max_bytes = 10 MiB</text>

    <!-- Bars -->
    <g fill="#a78bfa">
      <rect x="110" y="760" width="40" height="30"/>
      <rect x="160" y="750" width="40" height="40"/>
      <rect x="210" y="735" width="40" height="55"/>
      <rect x="260" y="740" width="40" height="50"/>
      <rect x="310" y="720" width="40" height="70"/>
      <rect x="360" y="725" width="40" height="65"/>
      <rect x="410" y="715" width="40" height="75"/>
      <rect x="460" y="710" width="40" height="80"/>
      <rect x="510" y="695" width="40" height="95"/>
      <rect x="560" y="690" width="40" height="100"/>
      <rect x="610" y="685" width="40" height="105"/>
      <rect x="660" y="680" width="40" height="110"/>
    </g>
    <!-- Ab hier gekappt -->
    <g fill="#6366f1">
      <rect x="710" y="680" width="40" height="110"/>
      <rect x="760" y="680" width="40" height="110"/>
      <rect x="810" y="680" width="40" height="110"/>
      <rect x="860" y="680" width="40" height="110"/>
      <rect x="910" y="680" width="40" height="110"/>
      <rect x="960" y="680" width="40" height="110"/>
      <rect x="1010" y="680" width="40" height="110"/>
      <rect x="1060" y="680" width="40" height="110"/>
      <rect x="1110" y="680" width="40" height="110"/>
      <rect x="1160" y="680" width="40" height="110"/>
      <rect x="1210" y="680" width="40" height="110"/>
      <rect x="1260" y="680" width="40" height="110"/>
    </g>

    <rect x="1060" y="655" width="240" height="22" rx="6" fill="#0f172a" stroke="#6366f1"/>
    <text x="1180" y="671" fill="#818cf8" font-size="12" text-anchor="middle" font-weight="700">FIFO-Trimming aktiv</text>
  </g>
</svg>
