<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Workspace-Trust — Türsteher-Flow</title>
  <desc>Flow-Diagramm des Workspace-Trust-Mechanismus: Erster Start öffnet den Trust-Dialog, der in trusted (volle Funktionen, .codex/config.toml wird geladen) oder untrusted (read-only mit untrusted approval) mündet. Persistenz in config.toml.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#e2e8f0">Workspace-Trust — der Türsteher vor dem Repo</text>
  <text x="60" y="90" font-size="16" fill="#94a3b8">Projektweite Entscheidung, ob Codex einem Ordner vertraut — Entsperrt Autostarts, Sandbox-Wahl und Repo-Config</text>
  <text x="1340" y="60" font-size="14" fill="#94a3b8" text-anchor="end">Codex CLI · Kap. 3</text>

  <!-- Step 1: First start -->
  <g transform="translate(60,170)">
    <rect x="0" y="0" width="240" height="130" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="120" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">1. Erster Start</text>
    <text x="120" y="60" text-anchor="middle" font-size="12" fill="#cbd5e1">codex</text>
    <text x="120" y="80" text-anchor="middle" font-size="12" fill="#cbd5e1">in neuem Repo-Root</text>
    <text x="120" y="105" text-anchor="middle" font-size="11" fill="#94a3b8">unbekannter Pfad</text>
    <!-- Terminal icon -->
    <g transform="translate(12,12)">
      <rect x="0" y="0" width="28" height="20" rx="3" fill="#0f172a" stroke="#22d3ee"/>
      <text x="6" y="15" font-size="10" fill="#22d3ee" font-family="monospace">&gt;_</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <path d="M300 235 L380 235" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr1)"/>
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#10b981"/>
    </marker>
    <marker id="arrRed2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Step 2: Dialog / bouncer -->
  <g transform="translate(380,140)">
    <rect x="0" y="0" width="320" height="200" rx="14" fill="#3b1e0f" stroke="#f59e0b" stroke-width="2"/>
    <text x="160" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">2. Trust-Dialog</text>
    <!-- Bouncer icon -->
    <g transform="translate(20,48)">
      <circle cx="20" cy="20" r="18" fill="#1e293b" stroke="#fbbf24"/>
      <circle cx="20" cy="16" r="7" fill="#fbbf24"/>
      <rect x="10" y="22" width="20" height="14" rx="3" fill="#fbbf24"/>
      <path d="M20 36 L20 44 M14 40 L26 40" stroke="#fbbf24" stroke-width="2"/>
    </g>
    <text x="80" y="68" font-size="13" fill="#e2e8f0">„Trust this folder?"</text>
    <text x="80" y="90" font-size="12" fill="#cbd5e1">Einmaliger Bestätigungs-Prompt</text>
    <text x="80" y="108" font-size="12" fill="#cbd5e1">beim ersten Eintritt</text>

    <!-- Two buttons -->
    <g transform="translate(28,135)">
      <rect x="0" y="0" width="120" height="44" rx="10" fill="#065f46" stroke="#10b981" stroke-width="2"/>
      <text x="60" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#6ee7b7">[Yes, trust]</text>
    </g>
    <g transform="translate(172,135)">
      <rect x="0" y="0" width="120" height="44" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
      <text x="60" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#fca5a5">[No]</text>
    </g>
  </g>

  <!-- Branch arrows -->
  <path d="M470 340 L380 430" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrGreen2)"/>
  <path d="M610 340 L800 430" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrRed2)"/>
  <text x="380" y="395" font-size="13" fill="#10b981" font-weight="700">trust_level = "trusted"</text>
  <text x="720" y="395" font-size="13" fill="#ef4444" font-weight="700">trust_level = "untrusted"</text>

  <!-- Left branch: Trusted -->
  <g transform="translate(140,440)">
    <rect x="0" y="0" width="500" height="320" rx="14" fill="#052e2b" stroke="#10b981" stroke-width="2"/>
    <!-- Lock open -->
    <g transform="translate(22,22)">
      <rect x="2" y="18" width="28" height="22" rx="3" fill="#10b981"/>
      <path d="M8 18 L8 10 Q8 2 16 2 Q24 2 24 10" fill="none" stroke="#10b981" stroke-width="3"/>
    </g>
    <text x="70" y="44" font-size="18" font-weight="700" fill="#6ee7b7">TRUSTED</text>
    <text x="70" y="66" font-size="12" fill="#cbd5e1">Projektweit, in config.toml persistiert</text>

    <text x="22" y="110" font-size="13" font-weight="700" fill="#e2e8f0">Entsperrt:</text>
    <g font-size="12" fill="#cbd5e1">
      <circle cx="32" cy="132" r="4" fill="#10b981"/>
      <text x="46" y="136">volle Sandbox-Wahl (workspace-write / danger)</text>
      <circle cx="32" cy="156" r="4" fill="#10b981"/>
      <text x="46" y="160">Default approval_policy = on-request</text>
      <circle cx="32" cy="180" r="4" fill="#10b981"/>
      <text x="46" y="184">.codex/config.toml im Repo wird geladen</text>
      <circle cx="32" cy="204" r="4" fill="#10b981"/>
      <text x="46" y="208">Profile, Prompts &amp; MCP aus Repo aktiv</text>
      <circle cx="32" cy="228" r="4" fill="#10b981"/>
      <text x="46" y="232">--full-auto verfügbar</text>
    </g>

    <!-- Code block -->
    <g transform="translate(22,250)">
      <rect x="0" y="0" width="456" height="56" rx="8" fill="#0f172a" stroke="#334155"/>
      <text x="12" y="20" font-family="'JetBrains Mono',monospace" font-size="11" fill="#a78bfa">[projects."/Users/alice/work/app"]</text>
      <text x="12" y="42" font-family="'JetBrains Mono',monospace" font-size="11" fill="#67e8f9">trust_level = "trusted"</text>
    </g>
  </g>

  <!-- Right branch: Untrusted -->
  <g transform="translate(760,440)">
    <rect x="0" y="0" width="500" height="320" rx="14" fill="#3b0f12" stroke="#ef4444" stroke-width="2"/>
    <!-- Lock closed -->
    <g transform="translate(22,22)">
      <rect x="2" y="18" width="28" height="22" rx="3" fill="#ef4444"/>
      <path d="M8 18 L8 10 Q8 2 16 2 Q24 2 24 10 L24 18" fill="none" stroke="#ef4444" stroke-width="3"/>
    </g>
    <text x="70" y="44" font-size="18" font-weight="700" fill="#fca5a5">UNTRUSTED</text>
    <text x="70" y="66" font-size="12" fill="#cbd5e1">Default für alle neuen Ordner</text>

    <text x="22" y="110" font-size="13" font-weight="700" fill="#e2e8f0">Zwänge:</text>
    <g font-size="12" fill="#cbd5e1">
      <circle cx="32" cy="132" r="4" fill="#ef4444"/>
      <text x="46" y="136">sandbox_mode = read-only (forced)</text>
      <circle cx="32" cy="156" r="4" fill="#ef4444"/>
      <text x="46" y="160">approval_policy = untrusted (jede Op fragt)</text>
      <circle cx="32" cy="180" r="4" fill="#ef4444"/>
      <text x="46" y="184">.codex/config.toml im Repo wird ignoriert</text>
      <circle cx="32" cy="204" r="4" fill="#ef4444"/>
      <text x="46" y="208">MCP-Server nur aus User-Config</text>
      <circle cx="32" cy="228" r="4" fill="#ef4444"/>
      <text x="46" y="232">--full-auto disabled</text>
    </g>

    <!-- Code block -->
    <g transform="translate(22,250)">
      <rect x="0" y="0" width="456" height="56" rx="8" fill="#0f172a" stroke="#334155"/>
      <text x="12" y="20" font-family="'JetBrains Mono',monospace" font-size="11" fill="#a78bfa">[projects."/tmp/unknown-repo"]</text>
      <text x="12" y="42" font-family="'JetBrains Mono',monospace" font-size="11" fill="#fca5a5">trust_level = "untrusted"</text>
    </g>
  </g>

  <!-- Persistence file -->
  <g transform="translate(500,790)">
    <rect x="0" y="0" width="400" height="70" rx="10" fill="#1e293b" stroke="#6366f1"/>
    <text x="200" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#a5b4fc">Persistenz: ~/.codex/config.toml</text>
    <text x="200" y="50" text-anchor="middle" font-size="12" fill="#cbd5e1">Projekt-Key pro absolutem Pfad — Trust ist projektweit, nicht global</text>
  </g>

  <!-- Arrows from trust/untrusted to config file -->
  <path d="M390 760 L560 820" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M1000 760 L830 820" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Side note -->
  <g transform="translate(60,790)">
    <rect x="0" y="0" width="360" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="14" y="22" font-size="12" font-weight="700" fill="#fbbf24">Tipp</text>
    <text x="14" y="42" font-size="11" fill="#cbd5e1">Untrusted-Default schützt vor Prompt-Injection</text>
    <text x="14" y="58" font-size="11" fill="#cbd5e1">aus neuen Repos (postinstall, README).</text>
  </g>
  <g transform="translate(980,790)">
    <rect x="0" y="0" width="360" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="14" y="22" font-size="12" font-weight="700" fill="#22d3ee">Wechsel</text>
    <text x="14" y="42" font-size="11" fill="#cbd5e1">In Session: /trust toggelt für aktives Projekt</text>
    <text x="14" y="58" font-size="11" fill="#cbd5e1">oder manuell in config.toml editieren.</text>
  </g>
</svg>
