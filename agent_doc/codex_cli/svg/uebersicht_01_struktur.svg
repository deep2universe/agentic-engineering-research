<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title01 desc01">
  <title id="title01">Struktur der Codex-CLI-Dokumentation als Wissens-Okosystem</title>
  <desc id="desc01">Hub-and-Spoke-Diagramm: Im Zentrum eine Kompass-/Kartenrose „Codex CLI Deep Research", aussenherum elf nummerierte Panels fuer die elf Dokumente mit Titel, Fokus-Wort und farbcodierter Kategorie. Verbindungslinien zeigen die empfohlene Lesereihenfolge von 1 nach 11.</desc>

  <defs>
    <marker id="arr01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <radialGradient id="hub01" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="70%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="titlebar01" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="1400" height="900" fill="#0f172a"/>
