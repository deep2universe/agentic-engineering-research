<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title01 desc01">
  <title id="title01">Struktur der Codex-CLI-Dokumentation als Wissens-Ökosystem</title>
  <desc id="desc01">Hub-and-Spoke-Diagramm: Im Zentrum eine Kompass-Rose „Codex CLI Deep Research", aussenherum elf nummerierte Panels für die elf Dokumente mit Titel, Fokus-Wort und farbcodierter Kategorie. Die innere Ringverbindung zeigt die empfohlene Lesereihenfolge von 1 nach 11. Metapher: Kompass + Karte.</desc>

  <defs>
