  <text x="40" y="78" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">Hub-and-Spoke · Kompass im Zentrum · Ringpfad 1 → 11 · Farbe = Kategorie</text>
