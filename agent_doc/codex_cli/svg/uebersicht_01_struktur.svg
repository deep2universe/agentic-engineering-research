  <text x="40" y="52" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="700" fill="#e2e8f0">Struktur · 11 Dokumente als Wissens-Okosystem</text>
  <text x="40" y="78" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">Kompass &amp; Karte: Lesereihenfolge 1 bis 11, farbkodiert nach Thema</text>
  <text x="1360" y="52" text-anchor="end" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="14" fill="#94a3b8">Codex CLI · uebersicht.md</text>
  <text x="1360" y="78" text-anchor="end" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="12" fill="#64748b">agent_doc/codex_cli/</text>

