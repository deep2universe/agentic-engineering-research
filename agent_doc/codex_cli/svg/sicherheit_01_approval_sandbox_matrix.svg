<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Approval-Modi vs. Sandbox-Modi — die Matrix</title>
  <desc>2D-Matrix mit Sandbox-Modi (read-only, workspace-write, danger-full-access) auf der Y-Achse und Approval-Policies (untrusted, on-request, on-failure, never) auf der X-Achse. Typische Einsätze und Convenience-Flags sind farbcodiert.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#e2e8f0">Approval × Sandbox — das Safety-Grid</text>
  <text x="60" y="90" font-size="16" fill="#94a3b8">Zwei unabhängige Achsen bestimmen, wann gefragt wird und was der Agent darf</text>
  <text x="1340" y="60" font-size="14" fill="#94a3b8" text-anchor="end">Codex CLI · Kap. 1</text>

  <g transform="translate(60,140)">
    <text x="640" y="20" font-size="16" font-weight="600" fill="#e2e8f0" text-anchor="middle">Approval-Policy (--ask-for-approval)</text>
    <text x="-260" y="-30" font-size="16" font-weight="600" fill="#e2e8f0" transform="rotate(-90) translate(-200,0)">Sandbox-Mode (--sandbox)</text>

    <g font-size="14" fill="#e2e8f0" text-anchor="middle">
      <rect x="200" y="40" width="270" height="46" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="335" y="63" font-weight="700">untrusted</text>
      <text x="335" y="80" font-size="12" fill="#94a3b8">jede Schreib-/Shell-Op fragt</text>

      <rect x="475" y="40" width="270" height="46" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="610" y="63" font-weight="700">on-request</text>
      <text x="610" y="80" font-size="12" fill="#94a3b8">Agent entscheidet (Default TUI)</text>

      <rect x="750" y="40" width="270" height="46" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="885" y="63" font-weight="700">on-failure</text>
      <text x="885" y="80" font-size="12" fill="#94a3b8">nur bei Sandbox-Block</text>

      <rect x="1025" y="40" width="270" height="46" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="1160" y="63" font-weight="700">never</text>
      <text x="1160" y="80" font-size="12" fill="#94a3b8">nie — nur mit enger Sandbox</text>
    </g>

    <g font-size="14" fill="#e2e8f0">
      <rect x="10" y="110" width="180" height="170" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="100" y="145" text-anchor="middle" font-weight="700" fill="#22d3ee">read-only</text>
      <text x="100" y="172" text-anchor="middle" font-size="12" fill="#94a3b8">FS: nur lesen</text>
      <text x="100" y="192" text-anchor="middle" font-size="12" fill="#94a3b8">Net: aus</text>
      <text x="100" y="220" text-anchor="middle" font-size="12" fill="#94a3b8">Default für</text>
      <text x="100" y="238" text-anchor="middle" font-size="12" fill="#94a3b8">codex exec</text>

      <rect x="10" y="290" width="180" height="170" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="100" y="325" text-anchor="middle" font-weight="700" fill="#818cf8">workspace-write</text>
      <text x="100" y="352" text-anchor="middle" font-size="12" fill="#94a3b8">cwd + $TMPDIR</text>
      <text x="100" y="370" text-anchor="middle" font-size="12" fill="#94a3b8">+ ~/.codex</text>
      <text x="100" y="398" text-anchor="middle" font-size="12" fill="#94a3b8">Net: aus (togglebar)</text>
      <text x="100" y="418" text-anchor="middle" font-size="12" fill="#94a3b8">Default TUI</text>

      <rect x="10" y="470" width="180" height="170" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="100" y="505" text-anchor="middle" font-weight="700" fill="#ef4444">danger-full-access</text>
      <text x="100" y="532" text-anchor="middle" font-size="12" fill="#94a3b8">FS: uneingeschränkt</text>
      <text x="100" y="550" text-anchor="middle" font-size="12" fill="#94a3b8">Net: an</text>
      <text x="100" y="578" text-anchor="middle" font-size="12" fill="#fca5a5">Nur in VM</text>
      <text x="100" y="596" text-anchor="middle" font-size="12" fill="#fca5a5">oder Container</text>
    </g>

    <g font-size="13" fill="#e2e8f0" text-anchor="middle">
      <rect x="200" y="110" width="270" height="170" rx="10" fill="#0b3a44" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="335" y="140" font-weight="700" fill="#67e8f9">Safe Review</text>
      <text x="335" y="165" font-size="12" fill="#cbd5e1">Mensch bestätigt jedes File,</text>
      <text x="335" y="183" font-size="12" fill="#cbd5e1">falls doch geschrieben werden soll</text>
      <text x="335" y="220" font-size="11" fill="#94a3b8">Audit &amp; Onboarding</text>

      <rect x="475" y="110" width="270" height="170" rx="10" fill="#0b3a44" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="610" y="140" font-weight="700" fill="#67e8f9">Read + Ask</text>
      <text x="610" y="165" font-size="12" fill="#cbd5e1">Analyse, seltene Prompts</text>
      <text x="610" y="183" font-size="12" fill="#cbd5e1">zur Eskalation</text>
      <text x="610" y="220" font-size="11" fill="#94a3b8">Architektur-Frage</text>

      <rect x="750" y="110" width="270" height="170" rx="10" fill="#1f2937" stroke="#334155" stroke-dasharray="4 4"/>
      <text x="885" y="140" font-weight="700" fill="#94a3b8">n.a.</text>
      <text x="885" y="170" font-size="12" fill="#94a3b8">read-only blockiert bereits</text>
      <text x="885" y="188" font-size="12" fill="#94a3b8">nichts eskalierbar</text>

      <rect x="1025" y="110" width="270" height="170" rx="10" fill="#0b3a44" stroke="#10b981" stroke-width="2"/>
      <text x="1160" y="140" font-weight="700" fill="#6ee7b7">CI / PR-Review</text>
      <text x="1160" y="165" font-size="12" fill="#cbd5e1">codex exec --sandbox read-only</text>
      <text x="1160" y="183" font-size="12" fill="#cbd5e1">--ask-for-approval never</text>
      <text x="1160" y="220" font-size="11" fill="#6ee7b7">Safest default für Pipelines</text>
    </g>

    <g font-size="13" fill="#e2e8f0" text-anchor="middle">
      <rect x="200" y="290" width="270" height="170" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
      <text x="335" y="320" font-weight="700" fill="#c7d2fe">Careful Author</text>
      <text x="335" y="345" font-size="12" fill="#cbd5e1">Ältere Untrusted-Repos,</text>
      <text x="335" y="363" font-size="12" fill="#cbd5e1">viele Stops pro Session</text>
      <text x="335" y="400" font-size="11" fill="#94a3b8">hoher Overhead</text>

      <rect x="475" y="290" width="270" height="170" rx="10" fill="#1e1b4b" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="610" y="320" font-weight="700" fill="#fbbf24">--full-auto</text>
      <text x="610" y="345" font-size="12" fill="#fde68a">on-request × workspace-write</text>
      <text x="610" y="378" font-size="11" fill="#cbd5e1">Default für tägliche Arbeit</text>
      <text x="610" y="398" font-size="11" fill="#cbd5e1">im Trusted-Repo</text>
      <text x="610" y="430" font-size="11" fill="#fbbf24">Convenience-Flag</text>

      <rect x="750" y="290" width="270" height="170" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
      <text x="885" y="320" font-weight="700" fill="#c7d2fe">Autonomous + Escape</text>
      <text x="885" y="345" font-size="12" fill="#cbd5e1">läuft durch; fragt nur,</text>
      <text x="885" y="363" font-size="12" fill="#cbd5e1">wenn Sandbox blockt</text>
      <text x="885" y="400" font-size="11" fill="#94a3b8">Loop-Agents, Tests</text>

      <rect x="1025" y="290" width="270" height="170" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
      <text x="1160" y="320" font-weight="700" fill="#c7d2fe">Headless Autofix</text>
      <text x="1160" y="345" font-size="12" fill="#cbd5e1">codex exec --full-auto</text>
      <text x="1160" y="363" font-size="12" fill="#cbd5e1">in kurzlebigem Runner</text>
      <text x="1160" y="400" font-size="11" fill="#94a3b8">Fix-Bot / Agent-Loop</text>
    </g>

    <g font-size="13" fill="#e2e8f0" text-anchor="middle">
      <rect x="200" y="470" width="270" height="170" rx="10" fill="#3b0f12" stroke="#ef4444" stroke-width="1.5"/>
      <text x="335" y="500" font-weight="700" fill="#fca5a5">Paradox</text>
      <text x="335" y="525" font-size="12" fill="#cbd5e1">maximale Rechte trotzdem fragen —</text>
      <text x="335" y="543" font-size="12" fill="#cbd5e1">selten sinnvoll, Benchmarks</text>
      <text x="335" y="580" font-size="11" fill="#94a3b8">selten genutzt</text>

      <rect x="475" y="470" width="270" height="170" rx="10" fill="#3b0f12" stroke="#ef4444" stroke-width="1.5"/>
      <text x="610" y="500" font-weight="700" fill="#fca5a5">Risky Dev-Box</text>
      <text x="610" y="525" font-size="12" fill="#cbd5e1">nur auf Wegwerf-VM</text>
      <text x="610" y="543" font-size="12" fill="#cbd5e1">(Devcontainer / GitHub Codespaces)</text>
      <text x="610" y="580" font-size="11" fill="#fca5a5">Netzwerk erlaubt</text>

      <rect x="750" y="470" width="270" height="170" rx="10" fill="#3b0f12" stroke="#ef4444" stroke-width="1.5"/>
      <text x="885" y="500" font-weight="700" fill="#fca5a5">Selten</text>
      <text x="885" y="525" font-size="12" fill="#cbd5e1">Sandbox blockt kaum noch —</text>
      <text x="885" y="543" font-size="12" fill="#cbd5e1">on-failure löst selten aus</text>
      <text x="885" y="580" font-size="11" fill="#94a3b8">Edge-Case</text>

      <rect x="1025" y="470" width="270" height="170" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="3"/>
      <text x="1160" y="500" font-weight="700" fill="#fecaca">--yolo</text>
      <text x="1160" y="520" font-size="12" fill="#fecaca">--dangerously-bypass-</text>
      <text x="1160" y="536" font-size="12" fill="#fecaca">approvals-and-sandbox</text>
      <text x="1160" y="572" font-size="11" fill="#fca5a5">NUR in isolierter VM</text>
      <text x="1160" y="590" font-size="11" fill="#fca5a5">Daten-Totalverlust möglich</text>
    </g>
  </g>

  <g transform="translate(60,810)" font-size="13" fill="#e2e8f0">
    <text x="0" y="-4" font-weight="700" font-size="14">Legende:</text>
    <rect x="80" y="-14" width="18" height="18" rx="4" fill="#1e1b4b" stroke="#f59e0b" stroke-width="2"/>
    <text x="106" y="0">--full-auto</text>
    <rect x="220" y="-14" width="18" height="18" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
    <text x="246" y="0">--yolo (Daten-Risiko)</text>
    <rect x="420" y="-14" width="18" height="18" rx="4" fill="#0b3a44" stroke="#10b981" stroke-width="2"/>
    <text x="446" y="0">CI-Default</text>
    <rect x="560" y="-14" width="18" height="18" rx="4" fill="#1f2937" stroke="#334155" stroke-dasharray="3 3"/>
    <text x="586" y="0">nicht anwendbar</text>
    <text x="760" y="0" fill="#94a3b8">Sicherheit steigt nach links (mehr Fragen) &amp; nach oben (weniger Rechte)</text>
  </g>

  <defs>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#10b981"/>
    </marker>
  </defs>
  <g transform="translate(1260,830)" fill="none" stroke="#10b981" stroke-width="2">
    <path d="M0 40 L40 0" marker-end="url(#arrGreen)"/>
  </g>
  <text x="1260" y="880" font-size="11" fill="#6ee7b7" text-anchor="end">sicherer</text>
</svg>
