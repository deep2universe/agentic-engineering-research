<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Dependency-Upgrade React 18 → 19 in zwei Phasen</title>
  <desc>Brücken-Sanierung als Metapher: Plan-Profil generiert Migrationsdokument, danach Daily-Profil führt Codemods mit Stop-After-Each aus.</desc>

  <defs>
    <marker id="arrowU" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/>
    </marker>
    <linearGradient id="bridgeGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Title -->
  <text x="60" y="64" font-size="30" font-weight="700" fill="#e2e8f0">Dependency-Upgrade — React 18 → 19</text>
  <text x="60" y="94" font-size="16" fill="#94a3b8">Brücken-Sanierung mit Sicherungsleinen: erst Plan-Profil, dann Daily-Profil mit Stop-After-Each</text>
  <text x="1340" y="64" font-size="14" fill="#94a3b8" text-anchor="end">Codex CLI · Workflow 07</text>

  <!-- Bridge metaphor across the top -->
  <g>
    <!-- Old shore -->
    <rect x="60" y="140" width="120" height="50" rx="6" fill="#1e293b" stroke="#94a3b8"/>
    <text x="120" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#cbd5e1">React 18</text>

    <!-- Bridge -->
    <line x1="180" y1="165" x2="1220" y2="165" stroke="url(#bridgeGrad)" stroke-width="6"/>
    <line x1="180" y1="155" x2="180" y2="200" stroke="#6366f1" stroke-width="2"/>
    <line x1="500" y1="155" x2="500" y2="200" stroke="#6366f1" stroke-width="2"/>
    <line x1="900" y1="155" x2="900" y2="200" stroke="#10b981" stroke-width="2"/>
    <line x1="1220" y1="155" x2="1220" y2="200" stroke="#10b981" stroke-width="2"/>

    <!-- New shore -->
    <rect x="1220" y="140" width="120" height="50" rx="6" fill="#1e293b" stroke="#10b981"/>
    <text x="1280" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">React 19.2</text>

    <!-- Phase labels above bridge -->
    <text x="340" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#a78bfa">Phase 1 — Planning</text>
    <text x="1060" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#22d3ee">Phase 2 — Execution</text>
  </g>

  <!-- Phase 1 panel -->
  <g transform="translate(60,220)">
    <rect width="600" height="600" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="36" font-size="18" font-weight="700" fill="#e2e8f0">Phase 1 · Plan-Profil</text>
    <text x="20" y="58" font-size="12" fill="#94a3b8">Ergebnis ist ein versionierter Plan im Repo</text>

    <rect x="20" y="80" width="560" height="80" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="32" y="102" font-size="12" fill="#a78bfa" font-family="'JetBrains Mono', ui-monospace, monospace">codex --profile planning \</text>
    <text x="32" y="120" font-size="12" fill="#e2e8f0" font-family="'JetBrains Mono', ui-monospace, monospace">  "Plan upgrade React 18 → 19.2.</text>
    <text x="32" y="138" font-size="12" fill="#e2e8f0" font-family="'JetBrains Mono', ui-monospace, monospace">   Output: checklist, codemods,</text>
    <text x="32" y="156" font-size="12" fill="#e2e8f0" font-family="'JetBrains Mono', ui-monospace, monospace">   estimate, rollback plan."</text>

    <!-- Output: 4 sections -->
    <g transform="translate(20,180)">
      <text x="0" y="14" font-size="14" font-weight="700" fill="#22d3ee">Output: docs/plans/react-19.md</text>

      <rect x="0" y="30" width="270" height="180" rx="8" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="50" font-size="13" font-weight="700" fill="#f59e0b">Breaking Changes Checklist</text>
      <text x="14" y="74" font-size="11" fill="#cbd5e1">[ ] React.FC ohne children</text>
      <text x="14" y="90" font-size="11" fill="#cbd5e1">[ ] useFormState → useActionState</text>
      <text x="14" y="106" font-size="11" fill="#cbd5e1">[ ] forwardRef redundant</text>
      <text x="14" y="122" font-size="11" fill="#cbd5e1">[ ] PropTypes entfernt</text>
      <text x="14" y="138" font-size="11" fill="#cbd5e1">[ ] Legacy Context API</text>
      <text x="14" y="154" font-size="11" fill="#cbd5e1">[ ] React.unstable_* APIs</text>
      <text x="14" y="170" font-size="11" fill="#cbd5e1">[ ] StrictMode-Doppelaufrufe</text>
      <text x="14" y="186" font-size="11" fill="#cbd5e1">[ ] testing-library Versionspin</text>

      <rect x="290" y="30" width="270" height="180" rx="8" fill="#0b1220" stroke="#334155"/>
      <text x="304" y="50" font-size="13" font-weight="700" fill="#22d3ee">Codemod-Befehle</text>
      <text x="304" y="74" font-size="11" fill="#cbd5e1" font-family="'JetBrains Mono', ui-monospace, monospace">npx react-codemod \</text>
      <text x="304" y="90" font-size="11" fill="#cbd5e1" font-family="'JetBrains Mono', ui-monospace, monospace">  use-form-state src/</text>
      <text x="304" y="106" font-size="11" fill="#cbd5e1" font-family="'JetBrains Mono', ui-monospace, monospace">npx react-codemod \</text>
      <text x="304" y="122" font-size="11" fill="#cbd5e1" font-family="'JetBrains Mono', ui-monospace, monospace">  forward-ref-removal</text>
      <text x="304" y="138" font-size="11" fill="#cbd5e1" font-family="'JetBrains Mono', ui-monospace, monospace">jscodeshift -t prop-types</text>
      <text x="304" y="154" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">…drei weitere</text>

      <rect x="0" y="226" width="270" height="160" rx="8" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="246" font-size="13" font-weight="700" fill="#10b981">File-by-File Estimate</text>
      <text x="14" y="270" font-size="11" fill="#cbd5e1">apps/web/forms/* · 14 files · M</text>
      <text x="14" y="286" font-size="11" fill="#cbd5e1">apps/admin/* · 22 files · S</text>
      <text x="14" y="302" font-size="11" fill="#cbd5e1">packages/ui/* · 38 files · L</text>
      <text x="14" y="318" font-size="11" fill="#cbd5e1">tests/* · 7 files · S</text>
      <text x="14" y="340" font-size="11" fill="#94a3b8">Σ ≈ 6 PT (1 Person, 1 Woche)</text>
      <text x="14" y="358" font-size="11" fill="#94a3b8">Risiko: medium (Tests-Helper)</text>
      <text x="14" y="376" font-size="11" fill="#94a3b8">CI-Lauf erwartet ~14 min</text>

      <rect x="290" y="226" width="270" height="160" rx="8" fill="#0b1220" stroke="#ef4444"/>
      <text x="304" y="246" font-size="13" font-weight="700" fill="#ef4444">Rollback-Plan</text>
      <text x="304" y="270" font-size="11" fill="#cbd5e1">1. git revert &lt;merge-sha&gt;</text>
      <text x="304" y="286" font-size="11" fill="#cbd5e1">2. pnpm install (lockfile)</text>
      <text x="304" y="302" font-size="11" fill="#cbd5e1">3. Argo CD: rollback prod</text>
      <text x="304" y="318" font-size="11" fill="#cbd5e1">4. Smoke-Test forms+admin</text>
      <text x="304" y="340" font-size="11" fill="#94a3b8">Sicherungsleine: Tag</text>
      <text x="304" y="356" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">v18-last-known-good</text>
      <text x="304" y="376" font-size="11" fill="#94a3b8">Time-to-rollback &lt; 5 min</text>
    </g>
  </g>

  <!-- Phase transition arrow -->
  <line x1="660" y1="500" x2="720" y2="500" stroke="#818cf8" stroke-width="3" marker-end="url(#arrowU)"/>
  <text x="690" y="486" text-anchor="middle" font-size="12" fill="#94a3b8">Plan-Review</text>

  <!-- Phase 2 panel -->
  <g transform="translate(720,220)">
    <rect width="620" height="600" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="36" font-size="18" font-weight="700" fill="#e2e8f0">Phase 2 · Daily-Profil</text>
    <text x="20" y="58" font-size="12" fill="#94a3b8">Plan ausführen, nach jedem Codemod stoppen für Diff-Review</text>

    <rect x="20" y="80" width="580" height="80" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="32" y="102" font-size="12" fill="#22d3ee" font-family="'JetBrains Mono', ui-monospace, monospace">codex --profile daily \</text>
    <text x="32" y="120" font-size="12" fill="#e2e8f0" font-family="'JetBrains Mono', ui-monospace, monospace">  "Execute upgrade plan from</text>
    <text x="32" y="138" font-size="12" fill="#e2e8f0" font-family="'JetBrains Mono', ui-monospace, monospace">   docs/plans/react-19.md.</text>
    <text x="32" y="156" font-size="12" fill="#e2e8f0" font-family="'JetBrains Mono', ui-monospace, monospace">   Stop after EACH codemod."</text>

    <!-- Stop-after-each loop -->
    <g transform="translate(20,180)">
      <text x="0" y="16" font-size="14" font-weight="700" fill="#f59e0b">Schleife pro Codemod</text>

      <!-- Step 1 -->
      <g transform="translate(0,30)">
        <circle cx="20" cy="20" r="16" fill="#312e81"/>
        <text x="20" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">a</text>
        <text x="46" y="18" font-size="13" fill="#cbd5e1" font-weight="700">Codex führt Codemod aus</text>
        <text x="46" y="34" font-size="11" fill="#94a3b8">react-codemod use-form-state src/</text>
      </g>

      <!-- Step 2 -->
      <g transform="translate(0,80)">
        <circle cx="20" cy="20" r="16" fill="#78350f"/>
        <text x="20" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#fde68a">b</text>
        <text x="46" y="18" font-size="13" fill="#fbbf24" font-weight="700">STOP — Diff-Review</text>
        <text x="46" y="34" font-size="11" fill="#94a3b8">git diff zeigen, Mensch validiert</text>
      </g>

      <!-- Step 3 -->
      <g transform="translate(0,130)">
        <circle cx="20" cy="20" r="16" fill="#155e75"/>
        <text x="20" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#a5f3fc">c</text>
        <text x="46" y="18" font-size="13" fill="#cbd5e1" font-weight="700">Compile-Errors fixen</text>
        <text x="46" y="34" font-size="11" fill="#94a3b8">pnpm tsc → 0 Errors anstreben</text>
      </g>

      <!-- Step 4 -->
      <g transform="translate(0,180)">
        <circle cx="20" cy="20" r="16" fill="#064e3b"/>
        <text x="20" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#a7f3d0">d</text>
        <text x="46" y="18" font-size="13" fill="#cbd5e1" font-weight="700">Tests anpassen</text>
        <text x="46" y="34" font-size="11" fill="#94a3b8">Snapshots aktualisieren wenn intentional</text>
      </g>

      <!-- Step 5 -->
      <g transform="translate(0,230)">
        <circle cx="20" cy="20" r="16" fill="#4c1d95"/>
        <text x="20" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#ddd6fe">e</text>
        <text x="46" y="18" font-size="13" fill="#cbd5e1" font-weight="700">Commit + Loop</text>
        <text x="46" y="34" font-size="11" fill="#94a3b8">commit: "chore(react-19): codemod n/N"</text>
      </g>
    </g>

    <!-- Sicherungsleine illustration -->
    <g transform="translate(370,200)">
      <rect width="230" height="280" rx="10" fill="#0b1220" stroke="#ef4444"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#ef4444">Sicherungsleinen</text>

      <g transform="translate(14,40)">
        <circle cx="6" cy="10" r="4" fill="#ef4444"/>
        <text x="18" y="14" font-size="12" fill="#cbd5e1">Stop-After-Each</text>
      </g>
      <g transform="translate(14,68)">
        <circle cx="6" cy="10" r="4" fill="#ef4444"/>
        <text x="18" y="14" font-size="12" fill="#cbd5e1">Branch pro Codemod</text>
      </g>
      <g transform="translate(14,96)">
        <circle cx="6" cy="10" r="4" fill="#ef4444"/>
        <text x="18" y="14" font-size="12" fill="#cbd5e1">CI auf jedem Push</text>
      </g>
      <g transform="translate(14,124)">
        <circle cx="6" cy="10" r="4" fill="#ef4444"/>
        <text x="18" y="14" font-size="12" fill="#cbd5e1">Tag v18-last-good</text>
      </g>
      <g transform="translate(14,152)">
        <circle cx="6" cy="10" r="4" fill="#ef4444"/>
        <text x="18" y="14" font-size="12" fill="#cbd5e1">Rollback-Plan getestet</text>
      </g>

      <text x="14" y="200" font-size="13" font-weight="700" fill="#10b981">Akzeptanz</text>
      <text x="14" y="222" font-size="11" fill="#cbd5e1">- pnpm test grün</text>
      <text x="14" y="240" font-size="11" fill="#cbd5e1">- pnpm tsc 0 Errors</text>
      <text x="14" y="258" font-size="11" fill="#cbd5e1">- E2E auf Staging grün</text>
    </g>

    <!-- Final commit message -->
    <rect x="20" y="500" width="580" height="80" rx="8" fill="#0b1220" stroke="#10b981"/>
    <text x="32" y="522" font-size="12" font-weight="700" fill="#10b981">Final-Commit</text>
    <text x="32" y="544" font-size="11" fill="#cbd5e1" font-family="'JetBrains Mono', ui-monospace, monospace">chore(deps): react 18 → 19.2 (codemods n/N applied)</text>
    <text x="32" y="562" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">Refs: docs/plans/react-19.md · CI green · /review no-blockers</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(60,860)">
    <rect width="14" height="14" fill="#a78bfa"/>
    <text x="22" y="12" font-size="12" fill="#cbd5e1">Plan-Profil (read-only, high reasoning)</text>
    <rect x="320" width="14" height="14" fill="#22d3ee"/>
    <text x="342" y="12" font-size="12" fill="#cbd5e1">Daily-Profil (workspace-write, on-request)</text>
    <rect x="660" width="14" height="14" fill="#f59e0b"/>
    <text x="682" y="12" font-size="12" fill="#cbd5e1">STOP — manuelles Gate</text>
    <rect x="900" width="14" height="14" fill="#ef4444"/>
    <text x="922" y="12" font-size="12" fill="#cbd5e1">Sicherungsleine / Rollback</text>
  </g>
</svg>
