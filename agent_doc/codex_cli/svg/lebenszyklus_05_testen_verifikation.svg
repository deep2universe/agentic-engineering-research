<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Phase 5 — Testen und Verifikation mit Codex Sandbox-Test-Runs</title>
  <desc>Labor und Prüfstand: Codex testet sich selbst in der Sandbox, nutzt Playwright-MCP, respx/vcr, Coverage-Exit-Kriterium, Flake-Resolver-Skill und Property-Based Tests.</desc>

  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" fill="#e2e8f0" font-size="30" font-weight="700">Phase 5 — Testen &amp; Verifikation</text>
  <text x="40" y="84" fill="#94a3b8" font-size="15">Labor-Metapher: Codex baut Tests, lässt sie laufen, fixt Root-Cause statt Assertion zu schwächen.</text>
  <text x="1360" y="56" fill="#10b981" font-size="14" text-anchor="end">Codex CLI · Phase 05</text>

  <!-- Self-test loop center -->
  <g transform="translate(40,130)">
    <rect width="660" height="320" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="16" font-weight="700">Codex testet sich selbst (Sandbox)</text>

    <g transform="translate(40,70)">
      <!-- Codex node -->
      <rect x="0" y="80" width="140" height="80" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="70" y="110" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">Codex</text>
      <text x="70" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">Agent-Loop</text>
      <text x="70" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">Plan → Patch → Run</text>

      <!-- Run -->
      <rect x="220" y="0" width="160" height="80" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
      <text x="300" y="30" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">just test</text>
      <text x="300" y="50" text-anchor="middle" fill="#cbd5e1" font-size="11">Sandbox-Run</text>
      <text x="300" y="68" text-anchor="middle" fill="#94a3b8" font-size="10">pytest / vitest / cargo test</text>

      <!-- Result -->
      <rect x="220" y="160" width="160" height="80" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
      <text x="300" y="190" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700">Result</text>
      <text x="300" y="210" text-anchor="middle" fill="#cbd5e1" font-size="11">stdout / exit-code</text>
      <text x="300" y="228" text-anchor="middle" fill="#94a3b8" font-size="10">parsed by agent</text>

      <!-- Fix loop -->
      <rect x="440" y="80" width="160" height="80" rx="10" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
      <text x="520" y="110" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">Root-Cause-Fix</text>
      <text x="520" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">apply_patch</text>
      <text x="520" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">nicht: skip()!</text>

      <line x1="140" y1="100" x2="220" y2="40" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr5)"/>
      <line x1="300" y1="80" x2="300" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr5)"/>
      <line x1="380" y1="200" x2="440" y2="140" stroke="#ef4444" stroke-width="2" marker-end="url(#arr5)"/>
      <path d="M 520 80 Q 380 0 70 80" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr5)"/>
    </g>
    <text x="20" y="298" fill="#94a3b8" font-size="12">"Run `just test`. If anything fails, debug and fix the root cause — do not weaken assertions."</text>
  </g>

  <!-- Tools rechts -->
  <g transform="translate(720,130)">
    <rect width="640" height="320" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="16" font-weight="700">Test-Werkzeuge im Codex-Arsenal</text>

    <g transform="translate(20,54)">
      <rect width="290" height="120" rx="10" fill="#0f172a" stroke="#22d3ee"/>
      <text x="14" y="24" fill="#22d3ee" font-size="13" font-weight="700">Playwright-MCP</text>
      <text x="14" y="48" fill="#cbd5e1" font-size="12">End-to-End-Tests via MCP-Server</text>
      <text x="14" y="68" fill="#cbd5e1" font-size="12">Codex steuert Browser direkt</text>
      <text x="14" y="88" fill="#cbd5e1" font-size="12">Screenshot-Diffs · Trace-Viewer</text>
      <text x="14" y="106" fill="#94a3b8" font-size="11">Use Case: UI-Regression</text>
    </g>
    <g transform="translate(330,54)">
      <rect width="290" height="120" rx="10" fill="#0f172a" stroke="#a78bfa"/>
      <text x="14" y="24" fill="#a78bfa" font-size="13" font-weight="700">respx / vcr.py</text>
      <text x="14" y="48" fill="#cbd5e1" font-size="12">HTTP-Mocks für externe APIs</text>
      <text x="14" y="68" fill="#cbd5e1" font-size="12">Cassettes versionieren</text>
      <text x="14" y="88" fill="#cbd5e1" font-size="12">Sandbox-Netz bleibt aus</text>
      <text x="14" y="106" fill="#94a3b8" font-size="11">Use Case: Slack/Stripe-Calls</text>
    </g>
    <g transform="translate(20,184)">
      <rect width="290" height="120" rx="10" fill="#0f172a" stroke="#f59e0b"/>
      <text x="14" y="24" fill="#f59e0b" font-size="13" font-weight="700">Flake-Resolver-Skill</text>
      <text x="14" y="48" fill="#cbd5e1" font-size="12">skills/flake/SKILL.md</text>
      <text x="14" y="68" fill="#cbd5e1" font-size="12">3× wiederholen, Random-Seed pinnen</text>
      <text x="14" y="88" fill="#cbd5e1" font-size="12">Isoliert flaky Test &amp; öffnet Issue</text>
      <text x="14" y="106" fill="#94a3b8" font-size="11">Use Case: CI-Stabilität</text>
    </g>
    <g transform="translate(330,184)">
      <rect width="290" height="120" rx="10" fill="#0f172a" stroke="#10b981"/>
      <text x="14" y="24" fill="#10b981" font-size="13" font-weight="700">Property-Based Tests</text>
      <text x="14" y="48" fill="#cbd5e1" font-size="12">hypothesis / proptest / fast-check</text>
      <text x="14" y="68" fill="#cbd5e1" font-size="12">Codex liebt klar definierte Loops</text>
      <text x="14" y="88" fill="#cbd5e1" font-size="12">Generator + Invariante</text>
      <text x="14" y="106" fill="#94a3b8" font-size="11">Use Case: Parser, Math</text>
    </g>
  </g>

  <!-- Coverage Gauge -->
  <g transform="translate(40,470)">
    <rect width="660" height="180" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="16" font-weight="700">Coverage als Exit-Kriterium</text>

    <g transform="translate(60,90)">
      <!-- Gauge bar -->
      <rect x="0" y="20" width="400" height="24" rx="12" fill="#0f172a" stroke="#334155"/>
      <rect x="0" y="20" width="340" height="24" rx="12" fill="#10b981"/>
      <line x1="340" y1="14" x2="340" y2="50" stroke="#f59e0b" stroke-width="2"/>
      <text x="340" y="68" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">85%</text>
      <text x="0" y="14" fill="#cbd5e1" font-size="12">Coverage src/slack/</text>
      <text x="400" y="14" text-anchor="end" fill="#cbd5e1" font-size="12">100%</text>
    </g>
    <g font-family="'JetBrains Mono', monospace" font-size="12" fill="#cbd5e1">
      <text x="20" y="160">"Don't stop until `coverage report -m` shows ≥ 85% for src/slack/."</text>
    </g>
  </g>

  <!-- Anti -->
  <g transform="translate(720,470)">
    <rect width="640" height="180" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="34" fill="#ef4444" font-size="16" font-weight="700">Anti-Patterns</text>
    <text x="20" y="62" fill="#cbd5e1" font-size="13">✗ Codex schaltet failing Tests aus (skip) — in AGENTS.md verbieten</text>
    <text x="20" y="84" fill="#cbd5e1" font-size="13">✗ Integration-Tests gegen Produktion — Sandbox-Netz auf false</text>
    <text x="20" y="106" fill="#cbd5e1" font-size="13">✗ Mock-Cassettes nicht committen — Reproduzierbarkeit weg</text>
    <text x="20" y="128" fill="#cbd5e1" font-size="13">✗ Coverage-Ziel ohne Datei-Scope — gaming via boilerplate</text>
    <text x="20" y="150" fill="#cbd5e1" font-size="13">✗ Flakes ignorieren — sie werden mehr, nicht weniger</text>
  </g>

  <!-- Bottom: Best Practices -->
  <g transform="translate(40,670)">
    <rect width="1320" height="200" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="16" font-weight="700">Best Practices · Phase 5</text>
    <g transform="translate(20,54)">
      <text x="0" y="20" fill="#cbd5e1" font-size="13">· Codex testet sich selbst — Sandbox erlaubt Test-Runs · iterativer Fix↔Run</text>
      <text x="0" y="44" fill="#cbd5e1" font-size="13">· Playwright-MCP für E2E, respx/vcr für externe API-Calls (deterministisch)</text>
      <text x="0" y="68" fill="#cbd5e1" font-size="13">· Coverage als Exit-Kriterium mit Datei-Scope (z. B. ≥ 85% für src/slack/)</text>
      <text x="0" y="92" fill="#cbd5e1" font-size="13">· Flake-Resolver-Skill: 3× Wiederholung, Seed pinnen, Isolation, Issue öffnen</text>
      <text x="0" y="116" fill="#cbd5e1" font-size="13">· Property-Based Tests (hypothesis/proptest) — passen perfekt zum Agent-Loop</text>
      <text x="0" y="140" fill="#cbd5e1" font-size="13">· Test-Failure → Root-Cause fixen, NIE Assertion schwächen oder Test skippen</text>
    </g>
  </g>
</svg>
