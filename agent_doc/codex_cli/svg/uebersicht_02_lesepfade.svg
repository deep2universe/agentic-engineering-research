  <text x="40" y="78" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8">Metro-Plan · Persona-basiert · Stationen = Dokumente · Umstieg bei geteilten Nodes</text>
  <text x="1360" y="52" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" fill="#94a3b8" text-anchor="end">codex_cli / uebersicht · 02</text>

