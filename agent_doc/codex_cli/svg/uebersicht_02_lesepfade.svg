<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title02 desc02">
  <title id="title02">Lesepfade durch die Codex-CLI-Dokumentation als Metro-Plan</title>
  <desc id="desc02">Fünf farblich getrennte Metro-Linien repräsentieren persona-basierte Lesepfade: Quickstart, Team-Produktiv, CI/CD, Lebenszyklus und Senior/SDK. Jede Linie hat drei bis fünf nummerierte Stationen mit Dokumentnamen. Umstieg-Stationen zeigen gemeinsame Kern-Dokumente. Metapher: U-Bahn-/Metro-Plan.</desc>

  <defs>
    <linearGradient id="titlebar02" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="1400" height="900" fill="#0f172a"/>
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <path d="M0 100 H1400 M0 200 H1400 M0 300 H1400 M0 400 H1400 M0 500 H1400 M0 600 H1400 M0 700 H1400 M0 800 H1400"/>
    <path d="M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900"/>
  </g>
  <rect x="0" y="0" width="1400" height="6" fill="url(#titlebar02)"/>

  <!-- Titel -->
