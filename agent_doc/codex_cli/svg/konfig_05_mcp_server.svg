<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>MCP-Server — konfigurierte Steckleiste mit Tool-Schaltern</title>
  <desc>MCP-Server-Stanza mit command, args, env, cwd, enabled, Timeouts, default_tools_approval_mode und per-Tool-Overrides.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">MCP-Server — die Steckleiste für externe Tools</text>
  <text x="60" y="92" fill="#94a3b8" font-size="16">Jeder Server ist ein beschrifteter Stecker · jedes Tool ein Kippschalter mit eigenem Approval-Mode.</text>
  <text x="1340" y="60" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §5</text>

  <!-- Steckleiste -->
  <rect x="60" y="130" width="760" height="720" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="158" fill="#22d3ee" font-size="13" font-weight="600">STECKLEISTE · [mcp_servers.filesystem]</text>

  <!-- Stanza-Felder als Panels -->
  <g>
    <rect x="90" y="180" width="700" height="58" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="110" y="205" fill="#94a3b8" font-size="12">COMMAND</text>
    <text x="110" y="226" fill="#e2e8f0" font-size="15" font-family="'JetBrains Mono', ui-monospace, monospace">command = "npx"</text>
    <text x="770" y="214" fill="#22d3ee" font-size="11" text-anchor="end" font-weight="600">str · required</text>
  </g>

  <g>
    <rect x="90" y="250" width="700" height="58" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="110" y="275" fill="#94a3b8" font-size="12">ARGS</text>
    <text x="110" y="296" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">args = ["-y","@mcp/server-filesystem","/src"]</text>
    <text x="770" y="284" fill="#22d3ee" font-size="11" text-anchor="end" font-weight="600">list</text>
  </g>

  <g>
    <rect x="90" y="320" width="700" height="58" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="110" y="345" fill="#94a3b8" font-size="12">ENV · unterstützt ${env:VAR}-Expansion</text>
    <text x="110" y="366" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">env = { GITHUB_TOKEN = "${env:GITHUB_TOKEN}" }</text>
    <text x="770" y="354" fill="#22d3ee" font-size="11" text-anchor="end" font-weight="600">table</text>
  </g>

  <g>
    <rect x="90" y="390" width="340" height="58" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="110" y="415" fill="#94a3b8" font-size="12">CWD</text>
    <text x="110" y="436" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">cwd = ""</text>
  </g>
  <g>
    <rect x="450" y="390" width="340" height="58" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="470" y="415" fill="#94a3b8" font-size="12">ENABLED</text>
    <text x="470" y="436" fill="#10b981" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">enabled = true</text>
    <circle cx="770" cy="419" r="9" fill="#10b981"/>
  </g>

  <g>
    <rect x="90" y="460" width="340" height="58" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="110" y="485" fill="#94a3b8" font-size="12">STARTUP_TIMEOUT_SEC</text>
    <text x="110" y="506" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">30</text>
  </g>
  <g>
    <rect x="450" y="460" width="340" height="58" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="470" y="485" fill="#94a3b8" font-size="12">TOOL_TIMEOUT_SEC</text>
    <text x="470" y="506" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">60</text>
  </g>

  <g>
    <rect x="90" y="530" width="700" height="58" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="110" y="555" fill="#94a3b8" font-size="12">SUPPORTS_PARALLEL_TOOL_CALLS</text>
    <text x="110" y="576" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">supports_parallel_tool_calls = true</text>
    <text x="770" y="566" fill="#a78bfa" font-size="11" text-anchor="end" font-weight="600">perf</text>
  </g>

  <g>
    <rect x="90" y="600" width="700" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="110" y="625" fill="#f59e0b" font-size="13" font-weight="700">DEFAULT_TOOLS_APPROVAL_MODE</text>
    <text x="110" y="648" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">default_tools_approval_mode = "on-request"</text>
    <text x="770" y="635" fill="#f59e0b" font-size="11" text-anchor="end" font-weight="600">never · on-request · untrusted</text>
    <text x="770" y="655" fill="#94a3b8" font-size="11" text-anchor="end">Fallback für alle Tools</text>
  </g>

  <!-- Legende Approval-Modi -->
  <rect x="90" y="690" width="700" height="140" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="110" y="716" fill="#94a3b8" font-size="13" font-weight="600">APPROVAL-MODUS · Bedeutung</text>
  <circle cx="120" cy="742" r="7" fill="#10b981"/>
  <text x="136" y="747" fill="#e2e8f0" font-size="13"><tspan font-weight="700">never</tspan> — läuft ohne Rückfrage (vertrauenswürdig)</text>
  <circle cx="120" cy="772" r="7" fill="#f59e0b"/>
  <text x="136" y="777" fill="#e2e8f0" font-size="13"><tspan font-weight="700">on-request</tspan> — fragt bei jedem Call</text>
  <circle cx="120" cy="802" r="7" fill="#ef4444"/>
  <text x="136" y="807" fill="#e2e8f0" font-size="13"><tspan font-weight="700">untrusted</tspan> — fragt zusätzlich bei nicht-vertrauten Projekten</text>

  <!-- Per-Tool-Overrides -->
  <rect x="840" y="130" width="520" height="720" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="860" y="158" fill="#22d3ee" font-size="13" font-weight="600">PER-TOOL-OVERRIDES · Kippschalter</text>

  <!-- Tool 1 -->
  <g>
    <rect x="870" y="190" width="460" height="110" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="890" y="218" fill="#e2e8f0" font-size="16" font-weight="700">tools.read_file</text>
    <text x="890" y="240" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">[mcp_servers.filesystem.tools.read_file]</text>
    <text x="890" y="262" fill="#10b981" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">approval_mode = "never"</text>
    <text x="890" y="284" fill="#94a3b8" font-size="12">Lesen ist sicher — kein Prompt nötig</text>
    <!-- Switch -->
    <rect x="1260" y="228" width="56" height="28" rx="14" fill="#10b981"/>
    <circle cx="1302" cy="242" r="11" fill="#0f172a"/>
  </g>

  <!-- Tool 2 -->
  <g>
    <rect x="870" y="320" width="460" height="110" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="890" y="348" fill="#e2e8f0" font-size="16" font-weight="700">tools.delete_file</text>
    <text x="890" y="370" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">[mcp_servers.filesystem.tools.delete_file]</text>
    <text x="890" y="392" fill="#ef4444" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">approval_mode = "untrusted"</text>
    <text x="890" y="414" fill="#94a3b8" font-size="12">Destruktiv — immer fragen</text>
    <rect x="1260" y="358" width="56" height="28" rx="14" fill="#ef4444"/>
    <circle cx="1274" cy="372" r="11" fill="#0f172a"/>
  </g>

  <!-- Tool 3 -->
  <g>
    <rect x="870" y="450" width="460" height="110" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="890" y="478" fill="#e2e8f0" font-size="16" font-weight="700">tools.write_file</text>
    <text x="890" y="500" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">(erbt default_tools_approval_mode)</text>
    <text x="890" y="522" fill="#f59e0b" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">approval_mode = "on-request"</text>
    <text x="890" y="544" fill="#94a3b8" font-size="12">Fallback · kein Override gesetzt</text>
    <rect x="1260" y="488" width="56" height="28" rx="14" fill="#f59e0b"/>
    <circle cx="1288" cy="502" r="11" fill="#0f172a"/>
  </g>

  <!-- Hinweisbox experimental_use_rmcp_client -->
  <rect x="870" y="580" width="460" height="120" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="890" y="608" fill="#a78bfa" font-size="14" font-weight="700">Experimentell · Rust-MCP-Client</text>
  <text x="890" y="632" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">experimental_use_rmcp_client = true</text>
  <text x="890" y="656" fill="#94a3b8" font-size="12">Nativer Rust-Client statt externem Node-Proxy</text>
  <text x="890" y="676" fill="#94a3b8" font-size="12">→ niedrigere Latenz, weniger Deps</text>

  <!-- Hinweisbox env-expansion -->
  <rect x="870" y="720" width="460" height="110" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="890" y="748" fill="#22d3ee" font-size="14" font-weight="700">Secrets per ${env:VAR}</text>
  <text x="890" y="772" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">env = { TOKEN = "${env:GITHUB_TOKEN}" }</text>
  <text x="890" y="794" fill="#94a3b8" font-size="12">Tokens bleiben in OS-Env — nicht in der config.toml</text>
  <text x="890" y="814" fill="#94a3b8" font-size="12">→ ideal für Repos, die config.toml committen</text>
</svg>
