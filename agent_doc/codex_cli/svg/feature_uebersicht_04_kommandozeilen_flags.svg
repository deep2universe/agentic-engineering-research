<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Kommandozeilen-Flags der Codex CLI — DIP-Switches nach Gruppen</title>
  <desc>Flag-Matrix als DIP-Switches, gruppiert in Modell/Profil, Sandbox/Approval, Output, Modus und Debug. Jede Kategorie zeigt die wichtigsten Flags mit Kurz- und Langform sowie Wirkung.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">4. CLI-Flags — DIP-Switches der Codex CLI</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Fünf Gruppen; je Gruppe ein Switch-Block. Flags wirken pro Aufruf, Profile bündeln sie wiederverwendbar.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 4</text>

  <!-- DIP-Switch-Helper via Symbol -->
  <defs>
    <g id="switchOn">
      <rect width="36" height="16" rx="3" fill="#0f172a" stroke="#334155"/>
      <rect x="18" y="2" width="16" height="12" rx="2" fill="#10b981"/>
    </g>
    <g id="switchOff">
      <rect width="36" height="16" rx="3" fill="#0f172a" stroke="#334155"/>
      <rect x="2" y="2" width="16" height="12" rx="2" fill="#475569"/>
    </g>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Gruppe: Modell / Profil -->
  <g transform="translate(60,130)">
    <rect width="400" height="340" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="0" y="0" width="400" height="40" rx="12" fill="#6366f1" opacity="0.2"/>
    <text x="20" y="26" fill="#818cf8" font-size="16" font-weight="700">Modell &amp; Profil</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <use href="#switchOn" x="20" y="62"/>
      <text x="70" y="74" fill="#22d3ee">-m, --model &lt;name&gt;</text>
      <text x="70" y="90" fill="#94a3b8" font-size="11" font-family="system-ui">Modell wählen (z. B. gpt-5.3-codex)</text>

      <use href="#switchOn" x="20" y="118"/>
      <text x="70" y="130" fill="#22d3ee">-p, --profile &lt;name&gt;</text>
      <text x="70" y="146" fill="#94a3b8" font-size="11" font-family="system-ui">Profil aus config.toml laden</text>

      <use href="#switchOn" x="20" y="174"/>
      <text x="70" y="186" fill="#22d3ee">-c, --config &lt;k=v&gt;</text>
      <text x="70" y="202" fill="#94a3b8" font-size="11" font-family="system-ui">Einzelkey ad-hoc überschreiben</text>

      <use href="#switchOn" x="20" y="230"/>
      <text x="70" y="242" fill="#22d3ee">--oss</text>
      <text x="70" y="258" fill="#94a3b8" font-size="11" font-family="system-ui">lokalen OSS-Provider kurzwählen</text>

      <use href="#switchOff" x="20" y="286"/>
      <text x="70" y="298" fill="#22d3ee">--search</text>
      <text x="70" y="314" fill="#94a3b8" font-size="11" font-family="system-ui">Live-Web-Search statt Cache</text>
    </g>
  </g>

  <!-- Gruppe: Sandbox / Approval -->
  <g transform="translate(480,130)">
    <rect width="460" height="340" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="460" height="40" rx="12" fill="#f59e0b" opacity="0.2"/>
    <text x="20" y="26" fill="#f59e0b" font-size="16" font-weight="700">Sandbox &amp; Approval — Sicherheitsregler</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <use href="#switchOn" x="20" y="62"/>
      <text x="70" y="74" fill="#fbbf24">-s, --sandbox &lt;mode&gt;</text>
      <text x="70" y="90" fill="#94a3b8" font-size="11" font-family="system-ui">read-only | workspace-write | danger-full-access</text>

      <use href="#switchOn" x="20" y="118"/>
      <text x="70" y="130" fill="#fbbf24">-a, --ask-for-approval &lt;p&gt;</text>
      <text x="70" y="146" fill="#94a3b8" font-size="11" font-family="system-ui">untrusted | on-request | on-failure | never</text>

      <use href="#switchOn" x="20" y="174"/>
      <text x="70" y="186" fill="#fbbf24">--full-auto</text>
      <text x="70" y="202" fill="#94a3b8" font-size="11" font-family="system-ui">= workspace-write + on-request</text>

      <use href="#switchOff" x="20" y="230"/>
      <text x="70" y="242" fill="#ef4444">--dangerously-bypass-approvals-and-sandbox</text>
      <text x="70" y="258" fill="#fca5a5" font-size="11" font-family="system-ui">Alias: --yolo — KEIN Guard, KEIN Approval</text>
      <rect x="68" y="266" width="370" height="2" fill="#ef4444"/>
    </g>
    <g transform="translate(20,286)">
      <rect width="420" height="40" rx="6" fill="#0b1220" stroke="#ef4444"/>
      <text x="12" y="18" fill="#fca5a5" font-size="12" font-weight="700">Gefahr-Kombi</text>
      <text x="12" y="33" fill="#cbd5e1" font-size="11">--yolo umgeht Sandbox und Approval — nur in ephemeren CI-Runnern sinnvoll.</text>
    </g>
  </g>

  <!-- Gruppe: Output -->
  <g transform="translate(960,130)">
    <rect width="380" height="340" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="40" rx="12" fill="#10b981" opacity="0.2"/>
    <text x="20" y="26" fill="#34d399" font-size="16" font-weight="700">Output &amp; Parsing</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <use href="#switchOn" x="20" y="62"/>
      <text x="70" y="74" fill="#34d399">--json</text>
      <text x="70" y="90" fill="#94a3b8" font-size="11" font-family="system-ui">exec: JSONL-Event-Stream</text>

      <use href="#switchOn" x="20" y="118"/>
      <text x="70" y="130" fill="#34d399">--output-last-message &lt;file&gt;</text>
      <text x="70" y="146" fill="#94a3b8" font-size="11" font-family="system-ui">finale Message in Datei schreiben</text>

      <use href="#switchOn" x="20" y="174"/>
      <text x="70" y="186" fill="#34d399">--output-schema &lt;json&gt;</text>
      <text x="70" y="202" fill="#94a3b8" font-size="11" font-family="system-ui">strukturierter Output gegen Schema</text>

      <use href="#switchOn" x="20" y="230"/>
      <text x="70" y="242" fill="#34d399">-i, --image &lt;path&gt;</text>
      <text x="70" y="258" fill="#94a3b8" font-size="11" font-family="system-ui">Bild als Prompt-Input anhängen</text>
    </g>
    <g transform="translate(20,286)">
      <rect width="340" height="40" rx="6" fill="#0b1220" stroke="#10b981"/>
      <text x="12" y="18" fill="#34d399" font-size="12" font-weight="700">CI-Tipp</text>
      <text x="12" y="33" fill="#cbd5e1" font-size="11">`--json --output-last-message` = parsebar + final-message für PR-Body.</text>
    </g>
  </g>

  <!-- Gruppe: Modus -->
  <g transform="translate(60,490)">
    <rect width="640" height="240" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="0" y="0" width="640" height="40" rx="12" fill="#22d3ee" opacity="0.2"/>
    <text x="20" y="26" fill="#06b6d4" font-size="16" font-weight="700">Modus-Umschalter (Sub-Commands)</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <text x="20" y="74" fill="#22d3ee">codex</text>
      <text x="200" y="74" fill="#94a3b8" font-size="11" font-family="system-ui">Interactive TUI (Default)</text>

      <text x="20" y="104" fill="#22d3ee">codex exec "&lt;prompt&gt;"</text>
      <text x="200" y="104" fill="#94a3b8" font-size="11" font-family="system-ui">Headless, CI/Scripts</text>

      <text x="20" y="134" fill="#22d3ee">codex resume [--last]</text>
      <text x="200" y="134" fill="#94a3b8" font-size="11" font-family="system-ui">Session-Picker bzw. letzte</text>

      <text x="20" y="164" fill="#22d3ee">codex cloud exec --env ID</text>
      <text x="200" y="164" fill="#94a3b8" font-size="11" font-family="system-ui">Remote-Task auslagern</text>

      <text x="20" y="194" fill="#22d3ee">codex mcp serve</text>
      <text x="200" y="194" fill="#94a3b8" font-size="11" font-family="system-ui">Codex als MCP-Server</text>

      <text x="20" y="224" fill="#22d3ee">codex review</text>
      <text x="200" y="224" fill="#94a3b8" font-size="11" font-family="system-ui">Review-Agent</text>
    </g>
  </g>

  <!-- Gruppe: Debug / Verbose -->
  <g transform="translate(720,490)">
    <rect width="620" height="240" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <rect x="0" y="0" width="620" height="40" rx="12" fill="#a78bfa" opacity="0.2"/>
    <text x="20" y="26" fill="#c4b5fd" font-size="16" font-weight="700">Debug &amp; Diagnose</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <use href="#switchOn" x="20" y="62"/>
      <text x="70" y="74" fill="#c4b5fd">-v, --verbose</text>
      <text x="70" y="90" fill="#94a3b8" font-size="11" font-family="system-ui">detailliertes Logging nach `~/.codex/log/`</text>

      <use href="#switchOff" x="20" y="118"/>
      <text x="70" y="130" fill="#c4b5fd">RUST_LOG=debug</text>
      <text x="70" y="146" fill="#94a3b8" font-size="11" font-family="system-ui">ENV für tiefe Diagnose (nicht Flag, kombinierbar)</text>
    </g>
    <g transform="translate(20,180)">
      <rect width="580" height="48" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="12" y="20" fill="#94a3b8" font-size="11">Flag-Priorität:</text>
      <text x="100" y="20" fill="#e2e8f0" font-size="11" font-family="'JetBrains Mono', monospace">CLI &gt; -c &gt; -p Profil &gt; config.toml &gt; Default</text>
      <text x="12" y="38" fill="#94a3b8" font-size="11">Höhere Ebenen übersteuern niedrigere — nützlich für lokale Experimente.</text>
    </g>
  </g>

  <!-- Unten: Flag-Kombi-Beispiele -->
  <g transform="translate(60,750)">
    <rect width="1280" height="100" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Kombi-Rezepte</text>
    <g font-family="'JetBrains Mono', monospace" font-size="12">
      <text x="20" y="56" fill="#22d3ee">codex exec --full-auto --json -o out.json "write tests for auth.rs"</text>
      <text x="20" y="78" fill="#22d3ee">codex --profile local -m qwen2.5-coder -s workspace-write</text>
      <text x="660" y="56" fill="#22d3ee">codex exec -a never -s read-only --output-schema review.json</text>
      <text x="660" y="78" fill="#22d3ee">codex resume --last --search</text>
    </g>
  </g>

  <!-- Legende -->
  <g transform="translate(60,872)">
    <rect x="0" y="-14" width="18" height="14" fill="#6366f1"/>
    <text x="26" y="-2" fill="#cbd5e1" font-size="12">Modell/Profil</text>
    <rect x="140" y="-14" width="18" height="14" fill="#f59e0b"/>
    <text x="166" y="-2" fill="#cbd5e1" font-size="12">Sicherheit</text>
    <rect x="260" y="-14" width="18" height="14" fill="#10b981"/>
    <text x="286" y="-2" fill="#cbd5e1" font-size="12">Output</text>
    <rect x="360" y="-14" width="18" height="14" fill="#22d3ee"/>
    <text x="386" y="-2" fill="#cbd5e1" font-size="12">Modus</text>
    <rect x="450" y="-14" width="18" height="14" fill="#a78bfa"/>
    <text x="476" y="-2" fill="#cbd5e1" font-size="12">Debug</text>
  </g>
</svg>
