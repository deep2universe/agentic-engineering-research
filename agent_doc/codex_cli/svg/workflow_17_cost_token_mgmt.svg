<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Workflow 17 — Cost- und Token-Management</title>
  <desc>Werkzeuge fuer Token-Sparsamkeit: /status, codex usage, Modell-Wahl (gpt-5.3 vs. 5.4), Reasoning-Effort low fuer Trivial-Tasks, /compact nach 20 Turns. Metapher: Tachometer und Kosten-Messer.</desc>

  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1f1a"/>
    </linearGradient>
    <linearGradient id="gauge17" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg17)"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#e2e8f0">17. Cost- und Token-Management</text>
  <text x="60" y="90" font-size="16" fill="#94a3b8">/status  ·  codex usage  ·  Modell-Wahl  ·  Reasoning-Effort  ·  /compact</text>
  <text x="1340" y="60" font-size="14" fill="#94a3b8" text-anchor="end">Codex CLI · Kap. 17</text>

  <!-- Tacho-Metapher -->
  <g transform="translate(40,170)">
    <rect width="500" height="380" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="34" font-size="16" font-weight="700" fill="#e2e8f0">Tacho — Token-Verbrauch der Session</text>

    <!-- Halbkreis-Gauge -->
    <g transform="translate(250,240)">
      <path d="M-180,0 A180,180 0 0 1 180,0" fill="none" stroke="#334155" stroke-width="28"/>
      <path d="M-180,0 A180,180 0 0 1 60,-170" fill="none" stroke="url(#gauge17)" stroke-width="28"/>
      <!-- Skala -->
      <text x="-180" y="20" font-size="11" fill="#94a3b8" text-anchor="middle">0</text>
      <text x="-127" y="-115" font-size="11" fill="#94a3b8" text-anchor="middle">25k</text>
      <text x="0" y="-200" font-size="11" fill="#94a3b8" text-anchor="middle">50k</text>
      <text x="127" y="-115" font-size="11" fill="#94a3b8" text-anchor="middle">100k</text>
      <text x="180" y="20" font-size="11" fill="#94a3b8" text-anchor="middle">200k</text>
      <!-- Nadel -->
      <line x1="0" y1="0" x2="80" y2="-152" stroke="#e2e8f0" stroke-width="3"/>
      <circle cx="0" cy="0" r="10" fill="#818cf8"/>
      <text x="0" y="40" font-size="14" fill="#e2e8f0" text-anchor="middle" font-weight="700">68 240 / 200 000 tokens</text>
      <text x="0" y="60" font-size="11" fill="#94a3b8" text-anchor="middle">Session 4 · Turn 17 · Profil daily</text>
    </g>

    <text x="20" y="354" font-size="11" fill="#94a3b8">Slash-Befehl: /status  ·  zeigt Tokens, Kosten ($), aktuelles Modell, Profil</text>
  </g>

  <!-- Werkzeuge-Block -->
  <g transform="translate(560,170)">
    <rect width="800" height="380" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="34" font-size="16" font-weight="700" fill="#e2e8f0">5 Werkzeuge zur Kosten-Reduktion</text>

    <!-- /status -->
    <g transform="translate(20,54)">
      <rect width="380" height="80" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#22d3ee">1) /status</text>
      <text x="14" y="42" font-size="11" fill="#e2e8f0">Aktueller Token-Verbrauch der Session</text>
      <text x="14" y="58" font-size="11" fill="#94a3b8">Wann: Vor Long-Running-Tasks pruefen</text>
      <text x="14" y="74" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#22d3ee">/status  -&gt; 68k / 200k · $0.43</text>
    </g>

    <!-- codex usage -->
    <g transform="translate(410,54)">
      <rect width="380" height="80" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#22d3ee">2) codex usage</text>
      <text x="14" y="42" font-size="11" fill="#e2e8f0">Tagesstatistik (falls aktiviert)</text>
      <text x="14" y="58" font-size="11" fill="#94a3b8">Wann: Tagesende, Budget-Check</text>
      <text x="14" y="74" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#22d3ee">$ codex usage --since today</text>
    </g>

    <!-- Modell-Wahl -->
    <g transform="translate(20,144)">
      <rect width="380" height="100" rx="10" fill="#0f172a" stroke="#818cf8" stroke-width="1.5"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#818cf8">3) Modell-Wahl</text>
      <text x="14" y="42" font-size="11" fill="#e2e8f0">5.3-codex (Standard)  ·  5.4 (komplex)</text>
      <rect x="14" y="50" width="350" height="22" rx="6" fill="#15102a"/>
      <text x="22" y="66" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#10b981">gpt-5.3-codex  $</text>
      <text x="200" y="66" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#94a3b8">Autofix, Refactor</text>
      <rect x="14" y="74" width="350" height="22" rx="6" fill="#15102a"/>
      <text x="22" y="90" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#f59e0b">gpt-5.4         $$$</text>
      <text x="200" y="90" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#94a3b8">Architektur, Migration</text>
    </g>

    <!-- Reasoning-Effort -->
    <g transform="translate(410,144)">
      <rect width="380" height="100" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#a78bfa">4) Reasoning-Effort</text>
      <text x="14" y="42" font-size="11" fill="#e2e8f0">low | medium | high</text>
      <rect x="14" y="50" width="116" height="42" rx="6" fill="#15102a" stroke="#10b981"/>
      <text x="72" y="66" font-size="11" fill="#10b981" text-anchor="middle" font-weight="700">low</text>
      <text x="72" y="82" font-size="10" fill="#94a3b8" text-anchor="middle">Format, Linting</text>
      <rect x="135" y="50" width="116" height="42" rx="6" fill="#15102a" stroke="#f59e0b"/>
      <text x="193" y="66" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="700">medium</text>
      <text x="193" y="82" font-size="10" fill="#94a3b8" text-anchor="middle">Default</text>
      <rect x="256" y="50" width="116" height="42" rx="6" fill="#15102a" stroke="#ef4444"/>
      <text x="314" y="66" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="700">high</text>
      <text x="314" y="82" font-size="10" fill="#94a3b8" text-anchor="middle">Bug-Hunt, Plan</text>
    </g>

    <!-- /compact -->
    <g transform="translate(20,254)">
      <rect width="770" height="100" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#10b981">5) /compact nach ~20 Turns</text>
      <text x="14" y="42" font-size="11" fill="#e2e8f0">Komprimiert Conversation-History zu einer Zusammenfassung</text>
      <text x="14" y="62" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#94a3b8">vor:  17 Turns · 132 KB Kontext  ->  nach: 1 Summary · 8 KB · ~94 % Ersparnis</text>
      <text x="14" y="84" font-size="11" fill="#94a3b8">Tipp: /compact MIT explizitem Prompt — "behalte API-Kontrakte, verwerfe Build-Logs"</text>
    </g>
  </g>

  <!-- Cost-Curve / Mini-Plot -->
  <g transform="translate(40,570)">
    <rect width="660" height="250" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="34" font-size="16" font-weight="700" fill="#e2e8f0">Token-Wachstum vs. /compact</text>

    <!-- Achsen -->
    <line x1="60" y1="200" x2="630" y2="200" stroke="#94a3b8" stroke-width="1"/>
    <line x1="60" y1="60" x2="60" y2="200" stroke="#94a3b8" stroke-width="1"/>
    <text x="60" y="216" font-size="10" fill="#94a3b8">0</text>
    <text x="200" y="216" font-size="10" fill="#94a3b8" text-anchor="middle">Turn 10</text>
    <text x="350" y="216" font-size="10" fill="#94a3b8" text-anchor="middle">Turn 20</text>
    <text x="500" y="216" font-size="10" fill="#94a3b8" text-anchor="middle">Turn 30</text>
    <text x="630" y="216" font-size="10" fill="#94a3b8" text-anchor="end">Turn 40</text>
    <text x="50" y="200" font-size="10" fill="#94a3b8" text-anchor="end">0</text>
    <text x="50" y="130" font-size="10" fill="#94a3b8" text-anchor="end">100k</text>
    <text x="50" y="60" font-size="10" fill="#94a3b8" text-anchor="end">200k</text>

    <!-- ohne compact: linear steigend -->
    <path d="M60,200 L120,180 L200,150 L280,110 L350,80 L420,65 L500,62 L630,60" stroke="#ef4444" stroke-width="2.5" fill="none"/>
    <text x="540" y="55" font-size="11" fill="#ef4444">ohne /compact</text>

    <!-- mit compact: zwei Saegezahn-Drops -->
    <path d="M60,200 L200,150 L200,180 L350,110 L350,170 L500,120 L500,175 L630,140" stroke="#10b981" stroke-width="2.5" fill="none"/>
    <text x="500" y="195" font-size="11" fill="#10b981">mit /compact</text>

    <!-- Kreuze fuer compact -->
    <circle cx="200" cy="180" r="5" fill="#10b981" stroke="#0f172a" stroke-width="2"/>
    <circle cx="350" cy="170" r="5" fill="#10b981" stroke="#0f172a" stroke-width="2"/>
    <circle cx="500" cy="175" r="5" fill="#10b981" stroke="#0f172a" stroke-width="2"/>
  </g>

  <!-- Entscheidungs-Matrix -->
  <g transform="translate(720,570)">
    <rect width="640" height="250" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="34" font-size="16" font-weight="700" fill="#e2e8f0">Modell + Reasoning Matrix</text>
    <text x="20" y="54" font-size="11" fill="#94a3b8">Faustregel: trivial = klein + niedrig · komplex = gross + hoch</text>

    <!-- Matrix -->
    <g transform="translate(20,72)">
      <rect width="600" height="160" rx="8" fill="#0f172a" stroke="#334155"/>
      <!-- Header -->
      <text x="120" y="22" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">low</text>
      <text x="300" y="22" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">medium</text>
      <text x="480" y="22" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">high</text>

      <text x="60" y="60" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">5.3</text>
      <text x="60" y="100" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">5.4</text>

      <!-- Zellen 5.3 -->
      <rect x="100" y="40" width="160" height="40" rx="6" fill="#10b981" opacity="0.25" stroke="#10b981"/>
      <text x="180" y="64" font-size="11" fill="#e2e8f0" text-anchor="middle">format, lint, rename</text>

      <rect x="260" y="40" width="160" height="40" rx="6" fill="#22d3ee" opacity="0.2" stroke="#22d3ee"/>
      <text x="340" y="64" font-size="11" fill="#e2e8f0" text-anchor="middle">PR-Review, Bugfix</text>

      <rect x="420" y="40" width="160" height="40" rx="6" fill="#f59e0b" opacity="0.2" stroke="#f59e0b"/>
      <text x="500" y="64" font-size="11" fill="#e2e8f0" text-anchor="middle">Refactor (mittel)</text>

      <!-- Zellen 5.4 -->
      <rect x="100" y="80" width="160" height="40" rx="6" fill="#94a3b8" opacity="0.15" stroke="#94a3b8"/>
      <text x="180" y="104" font-size="11" fill="#94a3b8" text-anchor="middle">unnoetig teuer</text>

      <rect x="260" y="80" width="160" height="40" rx="6" fill="#a78bfa" opacity="0.2" stroke="#a78bfa"/>
      <text x="340" y="104" font-size="11" fill="#e2e8f0" text-anchor="middle">Architektur-Plan</text>

      <rect x="420" y="80" width="160" height="40" rx="6" fill="#ef4444" opacity="0.25" stroke="#ef4444"/>
      <text x="500" y="104" font-size="11" fill="#e2e8f0" text-anchor="middle">Cross-Repo Migration</text>

      <text x="300" y="148" font-size="11" fill="#94a3b8" text-anchor="middle">Default: 5.3-codex / medium</text>
    </g>
  </g>

  <!-- Legende -->
  <g transform="translate(60,840)">
    <text x="0" y="14" font-size="12" font-weight="700" fill="#94a3b8">Legende</text>
    <rect x="0" y="26" width="14" height="14" fill="#22d3ee"/><text x="22" y="38" font-size="12" fill="#e2e8f0">Status / Usage</text>
    <rect x="140" y="26" width="14" height="14" fill="#818cf8"/><text x="162" y="38" font-size="12" fill="#e2e8f0">Modell</text>
    <rect x="240" y="26" width="14" height="14" fill="#a78bfa"/><text x="262" y="38" font-size="12" fill="#e2e8f0">Reasoning</text>
    <rect x="350" y="26" width="14" height="14" fill="#10b981"/><text x="372" y="38" font-size="12" fill="#e2e8f0">/compact / spar</text>
    <rect x="500" y="26" width="14" height="14" fill="#ef4444"/><text x="522" y="38" font-size="12" fill="#e2e8f0">teuer / komplex</text>
  </g>
</svg>
