<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Advanced Prompting - Preambles und Phase-Parameter</title>
  <desc>Prompt-Architektur als Baukasten: Rolle, Kontext, Goal/Constraints/DoD, Output-Vertrag. Preambles-Format (1-Satz-Ack + 1-2-Satz-Plan), Phase-Parameter plan/act/summarize sowie Reasoning-Effort-Heuristik. Metapher: Architektur-Blueprint.</desc>

  <defs>
    <marker id="arrIv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="54" fill="#e2e8f0" font-size="30" font-weight="700">Advanced Prompting - Baukasten und Blueprint</text>
  <text x="40" y="82" fill="#94a3b8" font-size="16">Rolle + Kontext + Goal + Output-Vertrag, plus Preambles, Phasen und Reasoning-Effort - Kapitel 4</text>
  <text x="1280" y="54" fill="#6366f1" font-size="16" font-weight="600" text-anchor="end">Codex CLI / Senior 04</text>

  <!-- Linke Spalte: 4-Schichten-Baukasten -->
  <g>
    <rect x="40" y="120" width="500" height="700" rx="14" fill="#111827" stroke="#334155"/>
    <text x="60" y="152" fill="#e2e8f0" font-size="18" font-weight="700">Prompt-Architektur - 4 Bauteile</text>
    <text x="60" y="174" fill="#94a3b8" font-size="12">Jede Schicht ist steckbar - Blueprint-Prinzip</text>

    <g transform="translate(60,200)">
      <rect x="0" y="0" width="460" height="130" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
      <circle cx="30" cy="30" r="18" fill="#312e81" stroke="#818cf8"/>
      <text x="30" y="36" fill="#c7d2fe" font-size="16" font-weight="700" text-anchor="middle">1</text>
      <text x="60" y="36" fill="#e0e7ff" font-size="15" font-weight="700">Rolle / Identitaet</text>
      <text x="20" y="68" fill="#94a3b8" font-size="12">"You are a senior payments engineer"</text>
      <text x="20" y="86" fill="#94a3b8" font-size="12">- Domaene + Seniority + Haltung</text>
      <text x="20" y="104" fill="#94a3b8" font-size="12">- steuert Ton, Tiefe, Risiko-Abwaegung</text>
      <text x="20" y="122" fill="#94a3b8" font-size="12">- wichtig in AGENTS.md verankert</text>
    </g>

    <g transform="translate(60,344)">
      <rect x="0" y="0" width="460" height="130" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
      <circle cx="30" cy="30" r="18" fill="#0e4a5b" stroke="#22d3ee"/>
      <text x="30" y="36" fill="#a5f3fc" font-size="16" font-weight="700" text-anchor="middle">2</text>
      <text x="60" y="36" fill="#a5f3fc" font-size="15" font-weight="700">Kontext-Einbettung</text>
      <text x="20" y="68" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">@file src/billing/*.ts  AGENTS.md  ADRs</text>
      <text x="20" y="88" fill="#94a3b8" font-size="12">- gezielt verlinken, nicht Bulk-dumpen</text>
      <text x="20" y="106" fill="#94a3b8" font-size="12">- Signal-/Rausch-Quote aktiv steuern</text>
      <text x="20" y="124" fill="#94a3b8" font-size="12">- /compact wenn Kontext voll</text>
    </g>

    <g transform="translate(60,488)">
      <rect x="0" y="0" width="460" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="30" cy="30" r="18" fill="#78350f" stroke="#f59e0b"/>
      <text x="30" y="36" fill="#fde68a" font-size="16" font-weight="700" text-anchor="middle">3</text>
      <text x="60" y="36" fill="#fde68a" font-size="15" font-weight="700">Goal / Constraints / DoD</text>
      <text x="20" y="68" fill="#94a3b8" font-size="12">- Was genau (Goal)</text>
      <text x="20" y="86" fill="#94a3b8" font-size="12">- Was nicht (Constraints, Negativ-Listen)</text>
      <text x="20" y="104" fill="#94a3b8" font-size="12">- Definition of Done (Tests gruen, Lint)</text>
      <text x="20" y="122" fill="#94a3b8" font-size="12">- messbar und verifizierbar</text>
    </g>

    <g transform="translate(60,632)">
      <rect x="0" y="0" width="460" height="150" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <circle cx="30" cy="30" r="18" fill="#064e3b" stroke="#10b981"/>
      <text x="30" y="36" fill="#6ee7b7" font-size="16" font-weight="700" text-anchor="middle">4</text>
      <text x="60" y="36" fill="#6ee7b7" font-size="15" font-weight="700">Output-Vertrag</text>
      <text x="20" y="68" fill="#94a3b8" font-size="12">- Schema / Dateinamen / Struktur</text>
      <text x="20" y="86" fill="#94a3b8" font-size="12">- Commit-Konvention (feat, fix, chore)</text>
      <text x="20" y="104" fill="#94a3b8" font-size="12">- Reporting-Format (Markdown, JSON)</text>
      <text x="20" y="122" fill="#94a3b8" font-size="12">- bei SDK: outputSchema + zod</text>
      <text x="20" y="140" fill="#94a3b8" font-size="12">- bei PR: Trailer, Session-ID</text>
    </g>
  </g>

  <!-- Rechte Spalte: Preambles, Phase, Effort -->
  <g>
    <rect x="570" y="120" width="790" height="330" rx="14" fill="#111827" stroke="#334155"/>
    <text x="590" y="152" fill="#e2e8f0" font-size="18" font-weight="700">Preambles - 1-Satz-Ack + 1-2-Saetze-Plan</text>
    <text x="590" y="174" fill="#94a3b8" font-size="12">GPT-5.3-Codex / GPT-5.4 geben Preambles vor Tool-Calls aus - macht den Thread lesbar.</text>

    <g transform="translate(590,200)">
      <rect x="0" y="0" width="750" height="100" rx="10" fill="#0b1220" stroke="#6366f1"/>
      <text x="14" y="26" fill="#c7d2fe" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="600">## Preambles (AGENTS.md)</text>
      <text x="14" y="48" fill="#c7d2fe" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">- ein kurzer Satz Bestaetigung</text>
      <text x="14" y="68" fill="#c7d2fe" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">- ein kurzer Satz Plan</text>
      <text x="14" y="88" fill="#c7d2fe" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">- keine emoji, keine Ausrufezeichen, auf Deutsch</text>
    </g>

    <g transform="translate(590,314)">
      <rect x="0" y="0" width="360" height="116" rx="10" fill="#0b1220" stroke="#22d3ee"/>
      <text x="14" y="26" fill="#a5f3fc" font-size="14" font-weight="700">Stil-Schalter</text>
      <text x="14" y="50" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">model_reasoning_summary =</text>
      <text x="14" y="70" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">  "concise"   # knapp</text>
      <text x="14" y="90" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">  "detailed"  # ausfuehrlich</text>
      <text x="14" y="108" fill="#94a3b8" font-size="12">ueber -c Flag oder config.toml</text>
    </g>

    <g transform="translate(970,314)">
      <rect x="0" y="0" width="370" height="116" rx="10" fill="#0b1220" stroke="#a78bfa"/>
      <text x="14" y="26" fill="#ddd6fe" font-size="14" font-weight="700">AGENTS.md als Style-Anker</text>
      <text x="14" y="50" fill="#94a3b8" font-size="12">- Regeln werden bei jedem Turn wirksam</text>
      <text x="14" y="70" fill="#94a3b8" font-size="12">- verhindert wechselnden Ton im Log</text>
      <text x="14" y="90" fill="#94a3b8" font-size="12">- wichtig fuer Review + Audit-Lesbarkeit</text>
      <text x="14" y="108" fill="#94a3b8" font-size="12">- bleibt unter 32 KB - Auslagerung via Skills</text>
    </g>
  </g>

  <!-- Phase-Parameter Fluss -->
  <g>
    <rect x="570" y="470" width="790" height="200" rx="14" fill="#111827" stroke="#334155"/>
    <text x="590" y="502" fill="#e2e8f0" font-size="18" font-weight="700">Phase-Parameter bei GPT-5.3-Codex</text>
    <text x="590" y="524" fill="#94a3b8" font-size="12">CLI setzt automatisch. Bei direktem Responses-API-Gebrauch SELBST setzen - sonst Performance-Einbruch.</text>

    <g transform="translate(600,542)">
      <rect x="0" y="0" width="220" height="100" rx="10" fill="#1e293b" stroke="#22d3ee"/>
      <text x="110" y="28" fill="#a5f3fc" font-size="15" font-weight="700" text-anchor="middle">plan</text>
      <text x="110" y="52" fill="#94a3b8" font-size="12" text-anchor="middle">analysieren, Lesen,</text>
      <text x="110" y="70" fill="#94a3b8" font-size="12" text-anchor="middle">Strategie formen</text>
      <text x="110" y="90" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">phase=plan</text>
    </g>
    <path d="M820 592 L850 592" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrIv)"/>
    <g transform="translate(850,542)">
      <rect x="0" y="0" width="220" height="100" rx="10" fill="#1e293b" stroke="#f59e0b"/>
      <text x="110" y="28" fill="#fde68a" font-size="15" font-weight="700" text-anchor="middle">act</text>
      <text x="110" y="52" fill="#94a3b8" font-size="12" text-anchor="middle">Tools aufrufen,</text>
      <text x="110" y="70" fill="#94a3b8" font-size="12" text-anchor="middle">Dateien patchen</text>
      <text x="110" y="90" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">phase=act</text>
    </g>
    <path d="M1070 592 L1100 592" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrIv)"/>
    <g transform="translate(1100,542)">
      <rect x="0" y="0" width="220" height="100" rx="10" fill="#1e293b" stroke="#10b981"/>
      <text x="110" y="28" fill="#6ee7b7" font-size="15" font-weight="700" text-anchor="middle">summarize</text>
      <text x="110" y="52" fill="#94a3b8" font-size="12" text-anchor="middle">Ergebnis, Diff,</text>
      <text x="110" y="70" fill="#94a3b8" font-size="12" text-anchor="middle">naechste Schritte</text>
      <text x="110" y="90" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">phase=summarize</text>
    </g>
  </g>

  <!-- Reasoning-Effort-Heuristik -->
  <g>
    <rect x="570" y="690" width="790" height="190" rx="14" fill="#111827" stroke="#334155"/>
    <text x="590" y="722" fill="#e2e8f0" font-size="18" font-weight="700">Reasoning-Effort - Heuristik</text>
    <text x="590" y="742" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">codex -c model_reasoning_effort=&lt;level&gt; "..."</text>

    <g transform="translate(600,754)">
      <rect x="0" y="0" width="240" height="104" rx="10" fill="#1e293b" stroke="#10b981"/>
      <text x="120" y="26" fill="#6ee7b7" font-size="14" font-weight="700" text-anchor="middle">low</text>
      <text x="12" y="50" fill="#94a3b8" font-size="12">- klare Specs, Typos</text>
      <text x="12" y="68" fill="#94a3b8" font-size="12">- trivial Refactor</text>
      <text x="12" y="86" fill="#94a3b8" font-size="12">- kleine Dokuedits</text>
    </g>
    <g transform="translate(860,754)">
      <rect x="0" y="0" width="240" height="104" rx="10" fill="#1e293b" stroke="#22d3ee"/>
      <text x="120" y="26" fill="#a5f3fc" font-size="14" font-weight="700" text-anchor="middle">medium (Default)</text>
      <text x="12" y="50" fill="#94a3b8" font-size="12">- alltaegliche Arbeit</text>
      <text x="12" y="68" fill="#94a3b8" font-size="12">- neue Features</text>
      <text x="12" y="86" fill="#94a3b8" font-size="12">- Standard-Bugfixes</text>
    </g>
    <g transform="translate(1120,754)">
      <rect x="0" y="0" width="220" height="104" rx="10" fill="#1e293b" stroke="#ef4444"/>
      <text x="110" y="26" fill="#fecaca" font-size="14" font-weight="700" text-anchor="middle">high</text>
      <text x="12" y="50" fill="#94a3b8" font-size="12">- Architektur, Migration</text>
      <text x="12" y="68" fill="#94a3b8" font-size="12">- Debug-Sessions</text>
      <text x="12" y="86" fill="#94a3b8" font-size="12">- Refactor-Grossvorhaben</text>
    </g>
  </g>
</svg>
