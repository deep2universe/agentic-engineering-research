<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Shell-Environment-Policy — Filter-Siebbatterie</title>
  <desc>Env-Variablen laufen durch inherit-Sieb, exclude-Sieb und include_only-Allow-List; set überschreibt am Ende.</desc>
  <defs>
    <marker id="arr07" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#818cf8"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">Shell-Environment-Policy — Zollkontrolle für ENV</text>
  <text x="60" y="92" fill="#94a3b8" font-size="16">Env-Variablen passieren vier Filterstufen, bevor sie in die Shell-Sandbox eintreten.</text>
  <text x="1340" y="60" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §7</text>

  <!-- Quelle: OS-Env -->
  <g>
    <rect x="60" y="160" width="220" height="680" rx="14" fill="#1e293b" stroke="#334155"/>
    <text x="170" y="188" fill="#94a3b8" font-size="13" font-weight="700" text-anchor="middle">OS-ENVIRONMENT</text>
    <text x="170" y="206" fill="#94a3b8" font-size="11" text-anchor="middle">Quelle vor Filter</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#e2e8f0">
      <text x="80" y="240">PATH=/usr/bin:…</text>
      <text x="80" y="262">HOME=/home/alice</text>
      <text x="80" y="284">USER=alice</text>
      <text x="80" y="306">LANG=de_DE.UTF-8</text>
      <text x="80" y="328">SHELL=/bin/zsh</text>
      <text x="80" y="350" fill="#f59e0b">AWS_ACCESS_KEY=AKIA…</text>
      <text x="80" y="372" fill="#f59e0b">AWS_SECRET_KEY=…</text>
      <text x="80" y="394" fill="#ef4444">GITHUB_TOKEN=ghp_…</text>
      <text x="80" y="416" fill="#ef4444">SLACK_API_SECRET=…</text>
      <text x="80" y="438">NODE_ENV=development</text>
      <text x="80" y="460">CI=</text>
      <text x="80" y="482">TERM=xterm-256color</text>
      <text x="80" y="504">PWD=/home/alice/app</text>
      <text x="80" y="526">EDITOR=nvim</text>
      <text x="80" y="548">LC_ALL=de_DE.UTF-8</text>
      <text x="80" y="570">TZ=Europe/Berlin</text>
    </g>
    <text x="170" y="800" fill="#94a3b8" font-size="12" text-anchor="middle">~40 Vars typisch</text>
  </g>

  <!-- Pfeil -->
  <line x1="290" y1="500" x2="340" y2="500" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arr07)"/>

  <!-- Stufe 1: inherit -->
  <g>
    <rect x="350" y="160" width="220" height="680" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="350" y="160" width="220" height="48" rx="14" fill="#6366f1" opacity="0.2"/>
    <text x="460" y="192" fill="#818cf8" font-size="16" font-weight="700" text-anchor="middle">1 · inherit</text>

    <rect x="370" y="230" width="180" height="66" rx="8" fill="#0f172a" stroke="#6366f1"/>
    <text x="460" y="254" fill="#e2e8f0" font-size="14" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">"all"</text>
    <text x="460" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">alles durchreichen</text>

    <rect x="370" y="316" width="180" height="66" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <text x="460" y="340" fill="#10b981" font-size="14" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">"core"</text>
    <text x="460" y="364" fill="#94a3b8" font-size="11" text-anchor="middle">Default · sichere Basis</text>

    <rect x="370" y="402" width="180" height="66" rx="8" fill="#0f172a" stroke="#6366f1"/>
    <text x="460" y="426" fill="#e2e8f0" font-size="14" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">"none"</text>
    <text x="460" y="450" fill="#94a3b8" font-size="11" text-anchor="middle">komplett leer</text>

    <!-- Default-Excludes -->
    <rect x="370" y="500" width="180" height="140" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="460" y="524" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">DEFAULT-EXCLUDES</text>
    <text x="460" y="546" fill="#e2e8f0" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">*_KEY</text>
    <text x="460" y="566" fill="#e2e8f0" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">*_TOKEN</text>
    <text x="460" y="586" fill="#e2e8f0" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">*_SECRET</text>
    <text x="460" y="614" fill="#94a3b8" font-size="10" text-anchor="middle">ignore_default_excludes=true</text>
    <text x="460" y="628" fill="#94a3b8" font-size="10" text-anchor="middle">deaktiviert diesen Schutz</text>

    <text x="460" y="680" fill="#94a3b8" font-size="11" text-anchor="middle">→ passes: PATH, HOME, USER,</text>
    <text x="460" y="696" fill="#94a3b8" font-size="11" text-anchor="middle">LANG, TERM, PWD, TZ, EDITOR</text>
    <text x="460" y="716" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">→ blocks: AWS_*_KEY,</text>
    <text x="460" y="732" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">GITHUB_TOKEN, SLACK_*_SECRET</text>
  </g>

  <line x1="580" y1="500" x2="630" y2="500" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arr07)"/>

  <!-- Stufe 2: exclude -->
  <g>
    <rect x="640" y="160" width="220" height="680" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect x="640" y="160" width="220" height="48" rx="14" fill="#ef4444" opacity="0.2"/>
    <text x="750" y="192" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">2 · exclude</text>
    <text x="750" y="234" fill="#94a3b8" font-size="12" text-anchor="middle">zusätzliche Sperrliste</text>
    <text x="750" y="252" fill="#94a3b8" font-size="12" text-anchor="middle">unterstützt Glob-Patterns</text>

    <rect x="660" y="280" width="180" height="160" rx="10" fill="#0f172a" stroke="#ef4444"/>
    <text x="750" y="304" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">BEISPIEL</text>
    <text x="670" y="328" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">exclude = [</text>
    <text x="685" y="348" fill="#f59e0b" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">"AWS_*",</text>
    <text x="685" y="368" fill="#f59e0b" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">"GITHUB_TOKEN",</text>
    <text x="685" y="388" fill="#f59e0b" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">"*_PASSWORD"</text>
    <text x="670" y="408" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">]</text>

    <text x="750" y="476" fill="#94a3b8" font-size="11" text-anchor="middle">Ergänzt Default-Excludes</text>
    <text x="750" y="494" fill="#94a3b8" font-size="11" text-anchor="middle">(nicht ersetzt)</text>

    <rect x="660" y="520" width="180" height="280" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="750" y="546" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">GEBLOCKT</text>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#ef4444">
      <text x="670" y="572">AWS_ACCESS_KEY</text>
      <text x="670" y="592">AWS_SECRET_KEY</text>
      <text x="670" y="612">AWS_REGION</text>
      <text x="670" y="632">GITHUB_TOKEN</text>
    </g>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#10b981">
      <text x="670" y="668">PATH ✓</text>
      <text x="670" y="688">HOME ✓</text>
      <text x="670" y="708">USER ✓</text>
      <text x="670" y="728">LANG ✓</text>
      <text x="670" y="748">NODE_ENV ✓</text>
      <text x="670" y="768">CI ✓</text>
      <text x="670" y="788">EDITOR ✓</text>
    </g>
  </g>

  <line x1="870" y1="500" x2="920" y2="500" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arr07)"/>

  <!-- Stufe 3: include_only -->
  <g>
    <rect x="930" y="160" width="220" height="360" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="930" y="160" width="220" height="48" rx="14" fill="#22d3ee" opacity="0.2"/>
    <text x="1040" y="192" fill="#22d3ee" font-size="16" font-weight="700" text-anchor="middle">3 · include_only</text>
    <text x="1040" y="234" fill="#94a3b8" font-size="12" text-anchor="middle">Allow-List · ersetzt inherit</text>

    <rect x="950" y="260" width="180" height="160" rx="10" fill="#0f172a" stroke="#22d3ee"/>
    <text x="1040" y="284" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">NUR DIESE</text>
    <text x="960" y="308" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">include_only = [</text>
    <text x="975" y="328" fill="#10b981" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">"PATH",</text>
    <text x="975" y="348" fill="#10b981" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">"HOME",</text>
    <text x="975" y="368" fill="#10b981" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">"USER",</text>
    <text x="975" y="388" fill="#10b981" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">"LANG"</text>
    <text x="960" y="408" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">]</text>

    <text x="1040" y="448" fill="#f59e0b" font-size="11" text-anchor="middle">überschreibt inherit</text>
    <text x="1040" y="466" fill="#94a3b8" font-size="11" text-anchor="middle">alles nicht-gelistete fällt weg</text>
    <text x="1040" y="498" fill="#94a3b8" font-size="11" text-anchor="middle">ideal für Enterprise-Hardening</text>
  </g>

  <!-- Stufe 4: set -->
  <g>
    <rect x="930" y="540" width="220" height="300" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <rect x="930" y="540" width="220" height="48" rx="14" fill="#a78bfa" opacity="0.2"/>
    <text x="1040" y="572" fill="#a78bfa" font-size="16" font-weight="700" text-anchor="middle">4 · set</text>
    <text x="1040" y="612" fill="#94a3b8" font-size="12" text-anchor="middle">überschreibt · ergänzt</text>

    <rect x="950" y="630" width="180" height="140" rx="10" fill="#0f172a" stroke="#a78bfa"/>
    <text x="1040" y="654" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">FINALES OVERRIDE</text>
    <text x="960" y="680" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">set = {</text>
    <text x="975" y="700" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">CI = "true",</text>
    <text x="975" y="720" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">LC_ALL = "C"</text>
    <text x="960" y="740" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">}</text>

    <text x="1040" y="798" fill="#94a3b8" font-size="11" text-anchor="middle">→ erzeugt / ersetzt</text>
    <text x="1040" y="816" fill="#94a3b8" font-size="11" text-anchor="middle">unabhängig von allen Filtern</text>
  </g>

  <line x1="1160" y1="500" x2="1210" y2="500" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arr07)"/>

  <!-- Ziel: Shell-Env -->
  <g>
    <rect x="1220" y="260" width="160" height="400" rx="14" fill="#10b98122" stroke="#10b981" stroke-width="2"/>
    <text x="1300" y="290" fill="#10b981" font-size="14" font-weight="700" text-anchor="middle">SANDBOX</text>
    <text x="1300" y="308" fill="#10b981" font-size="14" font-weight="700" text-anchor="middle">SHELL-ENV</text>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#e2e8f0">
      <text x="1234" y="344">PATH=…</text>
      <text x="1234" y="366">HOME=…</text>
      <text x="1234" y="388">USER=alice</text>
      <text x="1234" y="410">LANG=de_DE</text>
      <text x="1234" y="432">CI=true</text>
      <text x="1234" y="454">LC_ALL=C</text>
    </g>
    <text x="1300" y="500" fill="#94a3b8" font-size="11" text-anchor="middle">6 Vars übrig</text>
    <text x="1300" y="518" fill="#94a3b8" font-size="11" text-anchor="middle">von ~40</text>
    <text x="1300" y="560" fill="#10b981" font-size="12" text-anchor="middle" font-weight="700">keine Secrets</text>
    <text x="1300" y="578" fill="#10b981" font-size="12" text-anchor="middle" font-weight="700">deterministisch</text>
  </g>
</svg>
