<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Slash-Commands in der Codex-TUI — 16 Commands gruppiert als Kommando-Tafel</title>
  <desc>Vier Gruppen von Slash-Commands (Session, Modell, Workflow, Utilities) als Kommando-Tafel mit Slash-Dial in der Mitte. Zeigt alle 16 Commands aus Kapitel 3 mit Wirkungsbeschreibung.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">3. Slash-Commands — Kommando-Tafel der TUI</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">16 Markdown-gestützte Befehle, gruppiert nach Funktionsbereich — jeder Command ist eine `.md`-Datei</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 3</text>

  <!-- Zentraler Slash-Dial -->
  <g transform="translate(700,470)">
    <circle cx="0" cy="0" r="70" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <circle cx="0" cy="0" r="55" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
    <text x="0" y="-4" fill="#e2e8f0" font-size="26" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', monospace">/</text>
    <text x="0" y="22" fill="#818cf8" font-size="12" text-anchor="middle">Composer</text>
  </g>

  <!-- Gruppe 1: Session -->
  <g transform="translate(60,130)">
    <rect width="320" height="330" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="40" rx="12" fill="#6366f1" opacity="0.2"/>
    <text x="20" y="26" fill="#818cf8" font-size="16" font-weight="700">Session &amp; Verlauf</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <text x="20" y="74" fill="#22d3ee">/new</text>
      <text x="130" y="74" fill="#cbd5e1" font-size="12" font-family="system-ui">neue Session</text>
      <text x="20" y="104" fill="#22d3ee">/resume</text>
      <text x="130" y="104" fill="#cbd5e1" font-size="12" font-family="system-ui">Session-Picker</text>
      <text x="20" y="134" fill="#22d3ee">/title</text>
      <text x="130" y="134" fill="#cbd5e1" font-size="12" font-family="system-ui">Titel setzen</text>
      <text x="20" y="164" fill="#22d3ee">/compact</text>
      <text x="130" y="164" fill="#cbd5e1" font-size="12" font-family="system-ui">Verlauf komprimieren</text>
      <text x="20" y="194" fill="#22d3ee">/status</text>
      <text x="130" y="194" fill="#cbd5e1" font-size="12" font-family="system-ui">Modell/Tokens</text>
      <text x="20" y="224" fill="#22d3ee">/logout</text>
      <text x="130" y="224" fill="#cbd5e1" font-size="12" font-family="system-ui">abmelden</text>
    </g>
    <rect x="20" y="250" width="280" height="64" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="272" fill="#94a3b8" font-size="11">Zustand und Lebenszyklus der</text>
    <text x="32" y="290" fill="#94a3b8" font-size="11">aktuellen Konversation steuern;</text>
    <text x="32" y="306" fill="#94a3b8" font-size="11">Basis jedes TUI-Workflows.</text>
  </g>

  <!-- Gruppe 2: Modell &amp; Reasoning -->
  <g transform="translate(400,130)">
    <rect width="320" height="330" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="40" rx="12" fill="#22d3ee" opacity="0.2"/>
    <text x="20" y="26" fill="#22d3ee" font-size="16" font-weight="700">Modell &amp; Policies</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <text x="20" y="74" fill="#06b6d4">/model</text>
      <text x="150" y="74" fill="#cbd5e1" font-size="12" font-family="system-ui">Modell umschalten</text>
      <text x="20" y="104" fill="#06b6d4">/reasoning</text>
      <text x="150" y="104" fill="#cbd5e1" font-size="12" font-family="system-ui">low | medium | high</text>
      <text x="20" y="134" fill="#06b6d4">/approvals</text>
      <text x="150" y="134" fill="#cbd5e1" font-size="12" font-family="system-ui">Policy zur Laufzeit</text>
    </g>
    <rect x="20" y="160" width="280" height="64" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="182" fill="#94a3b8" font-size="11">Modell-/Effort-/Approval-Trias —</text>
    <text x="32" y="200" fill="#94a3b8" font-size="11">`/model` triggert häufig direkt</text>
    <text x="32" y="216" fill="#94a3b8" font-size="11">`/reasoning`-Dialog als Follow-up.</text>
    <rect x="20" y="240" width="280" height="74" rx="6" fill="#0b1220" stroke="#22d3ee" opacity="0.9"/>
    <text x="32" y="262" fill="#22d3ee" font-size="11" font-weight="700">Trias-Regel</text>
    <text x="32" y="282" fill="#cbd5e1" font-size="11">Modell + Reasoning + Approval =</text>
    <text x="32" y="298" fill="#cbd5e1" font-size="11">Ausführungs-Profil pro Task.</text>
  </g>

  <!-- Gruppe 3: Workflow -->
  <g transform="translate(740,130)">
    <rect width="320" height="330" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="40" rx="12" fill="#10b981" opacity="0.2"/>
    <text x="20" y="26" fill="#10b981" font-size="16" font-weight="700">Workflow &amp; Review</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <text x="20" y="74" fill="#34d399">/init</text>
      <text x="150" y="74" fill="#cbd5e1" font-size="12" font-family="system-ui">AGENTS.md-Gerüst</text>
      <text x="20" y="104" fill="#34d399">/review</text>
      <text x="150" y="104" fill="#cbd5e1" font-size="12" font-family="system-ui">Review-Agent starten</text>
      <text x="20" y="134" fill="#34d399">/diff</text>
      <text x="150" y="134" fill="#cbd5e1" font-size="12" font-family="system-ui">Git-Diff inline</text>
      <text x="20" y="164" fill="#34d399">/mention</text>
      <text x="150" y="164" fill="#cbd5e1" font-size="12" font-family="system-ui">Datei/Symbol ziehen</text>
      <text x="20" y="194" fill="#34d399">/plugins</text>
      <text x="150" y="194" fill="#cbd5e1" font-size="12" font-family="system-ui">Marketplace</text>
    </g>
    <rect x="20" y="220" width="280" height="94" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="242" fill="#94a3b8" font-size="11">Kern-Entwickler-Workflow:</text>
    <text x="32" y="260" fill="#94a3b8" font-size="11">Repo initialisieren, Kontext</text>
    <text x="32" y="278" fill="#94a3b8" font-size="11">anreichern, Diff prüfen und</text>
    <text x="32" y="296" fill="#94a3b8" font-size="11">Review als Gegencheck fahren.</text>
  </g>

  <!-- Gruppe 4: Utilities -->
  <g transform="translate(1080,130)">
    <rect width="260" height="330" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="40" rx="12" fill="#a78bfa" opacity="0.2"/>
    <text x="20" y="26" fill="#c4b5fd" font-size="16" font-weight="700">Utilities</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <text x="20" y="74" fill="#c4b5fd">/copy</text>
      <text x="110" y="74" fill="#cbd5e1" font-size="12" font-family="system-ui">letzte Antwort</text>
      <text x="20" y="104" fill="#c4b5fd">/help</text>
      <text x="110" y="104" fill="#cbd5e1" font-size="12" font-family="system-ui">Hilfe-Panel</text>
    </g>
    <rect x="20" y="130" width="220" height="184" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="152" fill="#94a3b8" font-size="11">Kleine Helfer — in Muscle-</text>
    <text x="32" y="168" fill="#94a3b8" font-size="11">Memory einbrennen:</text>
    <text x="32" y="198" fill="#e2e8f0" font-size="12" font-weight="700">Custom-Commands</text>
    <text x="32" y="218" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">~/.codex/prompts/</text>
    <text x="32" y="236" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">  &lt;name&gt;.md</text>
    <text x="32" y="264" fill="#94a3b8" font-size="11">Platzhalter:</text>
    <text x="32" y="282" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">$1…$9 · $ARGUMENTS</text>
    <text x="32" y="300" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">$KEY (benannt)</text>
  </g>

  <!-- Unten: Eingabe-Demo -->
  <g transform="translate(60,580)">
    <rect width="1280" height="260" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="32" fill="#e2e8f0" font-size="18" font-weight="700">Composer — Slash-Popup</text>
    <text x="20" y="54" fill="#94a3b8" font-size="13">Tippen von `/` öffnet das Popup mit Fuzzy-Filter über alle Commands (Built-in + Custom + Marketplace).</text>
    <rect x="20" y="76" width="620" height="160" rx="8" fill="#0f172a" stroke="#6366f1"/>
    <text x="38" y="104" fill="#64748b" font-size="12" font-family="'JetBrains Mono', monospace">codex · tui · composer</text>
    <line x1="20" y1="114" x2="640" y2="114" stroke="#334155"/>
    <text x="38" y="140" fill="#818cf8" font-size="14" font-family="'JetBrains Mono', monospace">&gt; /re█</text>
    <g transform="translate(80,150)">
      <rect x="0" y="0" width="300" height="76" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="20" fill="#22d3ee" font-size="12" font-family="'JetBrains Mono', monospace">/resume</text>
      <text x="120" y="20" fill="#94a3b8" font-size="11">Picker letzter Sessions</text>
      <text x="14" y="40" fill="#22d3ee" font-size="12" font-family="'JetBrains Mono', monospace">/review</text>
      <text x="120" y="40" fill="#94a3b8" font-size="11">Review-Agent</text>
      <text x="14" y="60" fill="#22d3ee" font-size="12" font-family="'JetBrains Mono', monospace">/reasoning</text>
      <text x="120" y="60" fill="#94a3b8" font-size="11">Effort low/medium/high</text>
    </g>

    <!-- rechts: Datei-Ursprung -->
    <g transform="translate(680,80)">
      <text x="0" y="20" fill="#e2e8f0" font-size="15" font-weight="700">Ein Command = Eine Markdown-Datei</text>
      <rect x="0" y="36" width="580" height="136" rx="8" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="60" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">~/.codex/prompts/refactor.md</text>
      <line x1="14" y1="70" x2="566" y2="70" stroke="#334155"/>
      <text x="14" y="92" fill="#c4b5fd" font-size="11" font-family="'JetBrains Mono', monospace">---</text>
      <text x="14" y="108" fill="#c4b5fd" font-size="11" font-family="'JetBrains Mono', monospace">description: Refactor $1 to idiomatic style.</text>
      <text x="14" y="124" fill="#c4b5fd" font-size="11" font-family="'JetBrains Mono', monospace">---</text>
      <text x="14" y="146" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace"># Refactor $1</text>
      <text x="14" y="162" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">Wende Clean-Code-Prinzipien an …</text>
    </g>
  </g>

  <!-- Legende -->
  <g transform="translate(60,860)">
    <rect x="0" y="-14" width="18" height="14" fill="#6366f1"/>
    <text x="26" y="-2" fill="#cbd5e1" font-size="12">Session</text>
    <rect x="130" y="-14" width="18" height="14" fill="#22d3ee"/>
    <text x="156" y="-2" fill="#cbd5e1" font-size="12">Modell/Policy</text>
    <rect x="280" y="-14" width="18" height="14" fill="#10b981"/>
    <text x="306" y="-2" fill="#cbd5e1" font-size="12">Workflow</text>
    <rect x="410" y="-14" width="18" height="14" fill="#a78bfa"/>
    <text x="436" y="-2" fill="#cbd5e1" font-size="12">Utilities</text>
  </g>
</svg>
