    <text x="0" y="-14" fill="#22d3ee" font-size="14" font-weight="700" text-anchor="middle">LM Studio (OSS)</text>
    <text x="0" y="4" fill="#cbd5e1" font-size="11" text-anchor="middle">lokale Modelle</text>
