<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Provider-Pluralität — Codex-Hub mit Speichen zu neun Anbietern</title>
  <desc>Codex in der Mitte mit Speichen zu OpenAI, Azure, Anthropic, Gemini, OpenRouter, Mistral, Morph, Ollama, LM Studio. Labels zeigen Wire-API (responses vs. chat), Profil-Beispiel unten.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">14. Provider-Pluralität — Codex als Verteiler-Hub</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Neun Provider-Familien via zwei Wire-APIs; `--oss`-Shortcut; Profile pro Provider in config.toml.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 14</text>

  <defs>
    <marker id="arr14" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Zentrum Codex -->
  <g transform="translate(700,420)">
    <circle r="100" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
    <circle r="80" fill="#0f172a" stroke="#818cf8"/>
    <text x="0" y="-4" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Codex</text>
    <text x="0" y="16" fill="#818cf8" font-size="12" text-anchor="middle">Provider-Hub</text>
    <text x="0" y="36" fill="#94a3b8" font-size="11" text-anchor="middle">Wire-API-Adapter</text>
  </g>

  <!-- Provider-Knoten Positionen: 8 rund -->
  <!-- OpenAI (oben) -->
  <g transform="translate(700,150)">
    <rect x="-110" y="-40" width="220" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="-14" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">OpenAI</text>
    <text x="0" y="4" fill="#cbd5e1" font-size="11" text-anchor="middle">Default</text>
    <text x="0" y="22" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', monospace">wire_api: responses</text>
  </g>

  <!-- Azure -->
  <g transform="translate(1020,200)">
    <rect x="-110" y="-40" width="220" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="-14" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">Azure OpenAI</text>
    <text x="0" y="4" fill="#cbd5e1" font-size="11" text-anchor="middle">Foundry-kompatibel</text>
    <text x="0" y="22" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', monospace">wire_api: responses</text>
  </g>

  <!-- Anthropic -->
  <g transform="translate(1200,400)">
