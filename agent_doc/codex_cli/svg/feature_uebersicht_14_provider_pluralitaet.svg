    <line x1="910" y1="200" x2="770" y2="360"/>
    <line x1="1090" y1="400" x2="800" y2="420"/>
    <line x1="990" y1="610" x2="770" y2="470"/>
    <line x1="780" y1="710" x2="720" y2="520"/>
    <line x1="460" y1="710" x2="660" y2="500"/>
    <line x1="280" y1="610" x2="620" y2="460"/>
    <line x1="180" y1="400" x2="600" y2="420"/>
    <line x1="280" y1="200" x2="640" y2="360"/>
  </g>

  <!-- Wire-API-Badges zentral -->
  <g transform="translate(700,300)">
    <rect x="-120" y="-20" width="240" height="30" rx="6" fill="#0f172a" stroke="#10b981"/>
    <text x="0" y="0" fill="#34d399" font-size="11" text-anchor="middle" font-weight="700">responses-API (OpenAI-Stil)</text>
  </g>
  <g transform="translate(700,540)">
    <rect x="-120" y="-10" width="240" height="30" rx="6" fill="#0f172a" stroke="#a78bfa"/>
    <text x="0" y="10" fill="#c4b5fd" font-size="11" text-anchor="middle" font-weight="700">chat-API (OpenAI-kompatibel)</text>
  </g>

  <!-- Unten: Profil-Block -->
  <g transform="translate(60,830)">
    <rect width="1280" height="50" rx="8" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="30" fill="#cbd5e1" font-size="12" font-family="'JetBrains Mono', monospace">[profiles.local] model_provider = "ollama" · model = "qwen2.5-coder:32b" · Aufruf: codex --profile local · Shortcut: codex --oss</text>
  </g>

  <!-- Legende -->
  <g transform="translate(60,110)">
    <rect width="440" height="30" rx="6" fill="#0b1220" stroke="#334155"/>
    <rect x="10" y="9" width="12" height="12" fill="#10b981"/>
    <text x="28" y="20" fill="#cbd5e1" font-size="11">responses-API</text>
    <rect x="140" y="9" width="12" height="12" fill="#a78bfa"/>
    <text x="158" y="20" fill="#cbd5e1" font-size="11">chat-API</text>
    <rect x="230" y="9" width="12" height="12" fill="#22d3ee"/>
    <text x="248" y="20" fill="#cbd5e1" font-size="11">OSS/lokal</text>
    <rect x="318" y="9" width="12" height="12" fill="#6366f1"/>
    <text x="336" y="20" fill="#cbd5e1" font-size="11">Codex-Core</text>
