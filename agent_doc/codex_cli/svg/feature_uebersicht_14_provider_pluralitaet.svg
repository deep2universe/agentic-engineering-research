    <text x="0" y="-14" fill="#c4b5fd" font-size="14" font-weight="700" text-anchor="middle">Anthropic</text>
    <text x="0" y="4" fill="#cbd5e1" font-size="11" text-anchor="middle">Claude-Modelle</text>
    <text x="0" y="22" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', monospace">wire_api: chat</text>
  </g>

