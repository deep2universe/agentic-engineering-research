  <g transform="translate(170,610)">
    <rect x="-110" y="-40" width="220" height="80" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="0" y="-14" fill="#c4b5fd" font-size="14" font-weight="700" text-anchor="middle">Morph</text>
    <text x="0" y="4" fill="#cbd5e1" font-size="11" text-anchor="middle">Fast-Edits</text>
    <text x="0" y="22" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', monospace">wire_api: chat</text>
  </g>

  <!-- Ollama (lokal) -->
  <g transform="translate(70,400)">
