<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Slash-Commands (TUI) — Speed-Dial</title>
  <desc>Fünfzehn Slash-Commands als Kompass-Dial um ein zentrales Terminal-Symbol angeordnet, mit Key-Cards und Wirkungsbeschreibung.</desc>

  <defs>
    <radialGradient id="dial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Slash-Commands · TUI</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">Speed-Dial: 15 Kurzbefehle für den Codex-TUI — tippe „/“ im Prompt</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 04/13</text>

  <!-- Zentrales Dial -->
  <g transform="translate(700 480)">
    <circle r="330" fill="url(#dial)" stroke="#334155" stroke-width="2"/>
    <circle r="270" fill="none" stroke="#334155" stroke-dasharray="3 4"/>
    <circle r="210" fill="none" stroke="#334155" stroke-dasharray="3 4"/>
    <circle r="140" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
    <text y="-6" fill="#e2e8f0" font-size="22" font-weight="700" text-anchor="middle">Codex TUI</text>
    <text y="22" fill="#94a3b8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">type „/“ …</text>
    <text y="50" fill="#64748b" font-size="11" text-anchor="middle">15 Commands · 1 Tastenschritt</text>
  </g>

  <!-- 15 Commands auf Kreis · 24° Abstand -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace">
    <!-- idx 0: top -->
    <g transform="translate(700 150)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#6366f1"/>
      <text y="-6" fill="#818cf8" font-size="15" font-weight="700" text-anchor="middle">/init</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">AGENTS.md erzeugen</text>
    </g>

    <g transform="translate(890 180)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#6366f1"/>
      <text y="-6" fill="#818cf8" font-size="15" font-weight="700" text-anchor="middle">/model</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Modell wechseln</text>
    </g>

    <g transform="translate(1060 260)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#6366f1"/>
      <text y="-6" fill="#818cf8" font-size="15" font-weight="700" text-anchor="middle">/reasoning</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">low · medium · high</text>
    </g>

    <g transform="translate(1180 400)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#f59e0b"/>
      <text y="-6" fill="#f59e0b" font-size="15" font-weight="700" text-anchor="middle">/approvals</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Policy setzen</text>
    </g>

    <g transform="translate(1210 560)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#a78bfa"/>
      <text y="-6" fill="#a78bfa" font-size="15" font-weight="700" text-anchor="middle">/compact</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Kontext komprimieren</text>
    </g>

    <g transform="translate(1130 710)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#10b981"/>
      <text y="-6" fill="#10b981" font-size="15" font-weight="700" text-anchor="middle">/diff</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Git-Diff anzeigen</text>
    </g>

    <g transform="translate(960 810)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#10b981"/>
      <text y="-6" fill="#10b981" font-size="15" font-weight="700" text-anchor="middle">/review</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Self-Review Diff</text>
    </g>

    <g transform="translate(700 850)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#22d3ee"/>
      <text y="-6" fill="#22d3ee" font-size="15" font-weight="700" text-anchor="middle">/status</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Tokens · Session</text>
    </g>

    <g transform="translate(440 810)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#a78bfa"/>
      <text y="-6" fill="#a78bfa" font-size="15" font-weight="700" text-anchor="middle">/resume</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Session-Picker</text>
    </g>

    <g transform="translate(270 710)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#a78bfa"/>
      <text y="-6" fill="#a78bfa" font-size="15" font-weight="700" text-anchor="middle">/new</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Neue Session</text>
    </g>

    <g transform="translate(190 560)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#94a3b8"/>
      <text y="-6" fill="#cbd5e1" font-size="15" font-weight="700" text-anchor="middle">/title</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Session-Titel</text>
    </g>

    <g transform="translate(220 400)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#6366f1"/>
      <text y="-6" fill="#818cf8" font-size="15" font-weight="700" text-anchor="middle">/mention</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Datei/Symbol ref</text>
    </g>

    <g transform="translate(340 260)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#f59e0b"/>
      <text y="-6" fill="#f59e0b" font-size="15" font-weight="700" text-anchor="middle">/plugins</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Marketplace</text>
    </g>

    <g transform="translate(510 180)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#94a3b8"/>
      <text y="-6" fill="#cbd5e1" font-size="15" font-weight="700" text-anchor="middle">/copy</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Antwort kopieren</text>
    </g>

    <g transform="translate(700 260)">
      <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#0b1220" stroke="#22d3ee"/>
      <text y="-6" fill="#22d3ee" font-size="15" font-weight="700" text-anchor="middle">/help</text>
      <text y="14" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">Hilfe / Referenz</text>
    </g>
  </g>

  <!-- Speichen -->
  <g stroke="#334155" stroke-width="1" opacity="0.5">
    <line x1="700" y1="480" x2="700" y2="180"/>
    <line x1="700" y1="480" x2="890" y2="210"/>
    <line x1="700" y1="480" x2="1060" y2="290"/>
    <line x1="700" y1="480" x2="1180" y2="430"/>
    <line x1="700" y1="480" x2="1210" y2="590"/>
    <line x1="700" y1="480" x2="1130" y2="740"/>
    <line x1="700" y1="480" x2="960" y2="840"/>
    <line x1="700" y1="480" x2="700" y2="820"/>
    <line x1="700" y1="480" x2="440" y2="840"/>
    <line x1="700" y1="480" x2="270" y2="740"/>
    <line x1="700" y1="480" x2="190" y2="590"/>
    <line x1="700" y1="480" x2="220" y2="430"/>
    <line x1="700" y1="480" x2="340" y2="290"/>
    <line x1="700" y1="480" x2="510" y2="210"/>
    <line x1="700" y1="480" x2="700" y2="290"/>
  </g>

  <!-- Legende -->
  <g transform="translate(60 820)">
    <rect x="0" y="0" width="14" height="14" fill="#6366f1"/>
    <text x="22" y="12" fill="#94a3b8" font-size="12">Setup</text>
    <rect x="90" y="0" width="14" height="14" fill="#f59e0b"/>
    <text x="112" y="12" fill="#94a3b8" font-size="12">Sicherheit/Plugins</text>
    <rect x="260" y="0" width="14" height="14" fill="#10b981"/>
    <text x="282" y="12" fill="#94a3b8" font-size="12">Code-Review</text>
    <rect x="400" y="0" width="14" height="14" fill="#a78bfa"/>
    <text x="422" y="12" fill="#94a3b8" font-size="12">Session</text>
    <rect x="510" y="0" width="14" height="14" fill="#22d3ee"/>
    <text x="532" y="12" fill="#94a3b8" font-size="12">Status/Hilfe</text>
    <rect x="640" y="0" width="14" height="14" fill="#94a3b8"/>
    <text x="662" y="12" fill="#94a3b8" font-size="12">Meta</text>
  </g>
</svg>
