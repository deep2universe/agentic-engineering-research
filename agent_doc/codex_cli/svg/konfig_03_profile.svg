<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Profile — fünf Konfigurations-Sets als Umschalt-Panel</title>
  <desc>Cockpit mit fünf Profil-Karten (daily, planning, review, local, ci) und Aktivierungsweg via --profile oder default_profile.</desc>
  <defs>
    <marker id="arr03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#818cf8"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Profile — Konfigurations-Sets auf Knopfdruck</text>
  <text x="60" y="102" fill="#94a3b8" font-size="16">Jedes Profil bündelt Modell, Approval, Sandbox, Reasoning und Provider für einen Einsatzzweck.</text>
  <text x="1340" y="70" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §3</text>

  <!-- Cockpit-Rahmen -->
  <rect x="50" y="130" width="1300" height="480" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="70" y="158" fill="#94a3b8" font-size="13" font-weight="600">COCKPIT · fünf umschaltbare Profile</text>

  <!-- Profil 1: daily -->
  <g>
    <rect x="80" y="180" width="240" height="400" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="80" y="180" width="240" height="42" rx="14" fill="#6366f1" opacity="0.25"/>
    <circle cx="108" cy="201" r="8" fill="#10b981"/>
    <text x="128" y="207" fill="#e2e8f0" font-size="17" font-weight="700">daily</text>
    <text x="308" y="207" fill="#94a3b8" font-size="11" text-anchor="end">Alltag · TUI</text>

    <text x="100" y="252" fill="#94a3b8" font-size="12">model</text>
    <text x="100" y="272" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">gpt-5.3-codex</text>

    <text x="100" y="302" fill="#94a3b8" font-size="12">reasoning_effort</text>
    <text x="100" y="322" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">medium</text>

    <text x="100" y="352" fill="#94a3b8" font-size="12">approval_policy</text>
    <text x="100" y="372" fill="#f59e0b" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">on-request</text>

    <text x="100" y="402" fill="#94a3b8" font-size="12">sandbox_mode</text>
    <text x="100" y="422" fill="#10b981" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">workspace-write</text>

    <rect x="100" y="520" width="200" height="40" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1.5"/>
    <text x="200" y="546" fill="#818cf8" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">--profile daily</text>
  </g>

  <!-- Profil 2: planning -->
  <g>
    <rect x="332" y="180" width="240" height="400" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <rect x="332" y="180" width="240" height="42" rx="14" fill="#a78bfa" opacity="0.25"/>
    <circle cx="360" cy="201" r="8" fill="#94a3b8"/>
    <text x="380" y="207" fill="#e2e8f0" font-size="17" font-weight="700">planning</text>
    <text x="560" y="207" fill="#94a3b8" font-size="11" text-anchor="end">Deep Think</text>

    <text x="352" y="252" fill="#94a3b8" font-size="12">model</text>
    <text x="352" y="272" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">gpt-5.4</text>

    <text x="352" y="302" fill="#94a3b8" font-size="12">reasoning_effort</text>
    <text x="352" y="322" fill="#a78bfa" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">high</text>

    <text x="352" y="352" fill="#94a3b8" font-size="12">plan_mode_effort</text>
    <text x="352" y="372" fill="#a78bfa" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">high</text>

    <text x="352" y="402" fill="#94a3b8" font-size="12">use-case</text>
    <text x="352" y="422" fill="#e2e8f0" font-size="13">Architektur · Spec</text>

    <rect x="352" y="520" width="200" height="40" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="452" y="546" fill="#a78bfa" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">--profile planning</text>
  </g>

  <!-- Profil 3: review -->
  <g>
    <rect x="584" y="180" width="240" height="400" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="584" y="180" width="240" height="42" rx="14" fill="#22d3ee" opacity="0.25"/>
    <circle cx="612" cy="201" r="8" fill="#94a3b8"/>
    <text x="632" y="207" fill="#e2e8f0" font-size="17" font-weight="700">review</text>
    <text x="812" y="207" fill="#94a3b8" font-size="11" text-anchor="end">read-only</text>

    <text x="604" y="252" fill="#94a3b8" font-size="12">approval_policy</text>
    <text x="604" y="272" fill="#ef4444" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">never</text>

    <text x="604" y="302" fill="#94a3b8" font-size="12">sandbox_mode</text>
    <text x="604" y="322" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">read-only</text>

    <text x="604" y="352" fill="#94a3b8" font-size="12">model_verbosity</text>
    <text x="604" y="372" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">quiet</text>

    <text x="604" y="402" fill="#94a3b8" font-size="12">use-case</text>
    <text x="604" y="422" fill="#e2e8f0" font-size="13">Code-Review · PR</text>

    <rect x="604" y="520" width="200" height="40" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="704" y="546" fill="#22d3ee" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">--profile review</text>
  </g>

  <!-- Profil 4: local -->
  <g>
    <rect x="836" y="180" width="240" height="400" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="836" y="180" width="240" height="42" rx="14" fill="#10b981" opacity="0.25"/>
    <circle cx="864" cy="201" r="8" fill="#94a3b8"/>
    <text x="884" y="207" fill="#e2e8f0" font-size="17" font-weight="700">local</text>
    <text x="1064" y="207" fill="#94a3b8" font-size="11" text-anchor="end">Ollama · OSS</text>

    <text x="856" y="252" fill="#94a3b8" font-size="12">model</text>
    <text x="856" y="272" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">llama-3.3-70b</text>

    <text x="856" y="302" fill="#94a3b8" font-size="12">model_provider</text>
    <text x="856" y="322" fill="#10b981" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">ollama</text>

    <text x="856" y="352" fill="#94a3b8" font-size="12">Netz</text>
    <text x="856" y="372" fill="#e2e8f0" font-size="13">lokal · offline-fähig</text>

    <text x="856" y="402" fill="#94a3b8" font-size="12">use-case</text>
    <text x="856" y="422" fill="#e2e8f0" font-size="13">Air-Gap · Privacy</text>

    <rect x="856" y="520" width="200" height="40" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
    <text x="956" y="546" fill="#10b981" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">--profile local</text>
  </g>

  <!-- Profil 5: ci -->
  <g>
    <rect x="1088" y="180" width="240" height="400" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="1088" y="180" width="240" height="42" rx="14" fill="#f59e0b" opacity="0.25"/>
    <circle cx="1116" cy="201" r="8" fill="#94a3b8"/>
    <text x="1136" y="207" fill="#e2e8f0" font-size="17" font-weight="700">ci</text>
    <text x="1316" y="207" fill="#94a3b8" font-size="11" text-anchor="end">headless · ZDR</text>

    <text x="1108" y="252" fill="#94a3b8" font-size="12">approval_policy</text>
    <text x="1108" y="272" fill="#ef4444" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">never</text>

    <text x="1108" y="302" fill="#94a3b8" font-size="12">sandbox_mode</text>
    <text x="1108" y="322" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">read-only</text>

    <text x="1108" y="352" fill="#94a3b8" font-size="12">disable_response_storage</text>
    <text x="1108" y="372" fill="#f59e0b" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">true</text>

    <text x="1108" y="402" fill="#94a3b8" font-size="12">notify</text>
    <text x="1108" y="422" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">[]</text>

    <rect x="1108" y="520" width="200" height="40" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="1208" y="546" fill="#f59e0b" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">--profile ci</text>
  </g>

  <!-- Aktivierung unten -->
  <rect x="50" y="640" width="1300" height="220" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="70" y="668" fill="#94a3b8" font-size="13" font-weight="600">AKTIVIERUNG · zwei Wege</text>

  <g>
    <rect x="90" y="690" width="600" height="150" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="110" y="720" fill="#818cf8" font-size="15" font-weight="700">Ad-hoc per Flag</text>
    <rect x="110" y="738" width="560" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="130" y="766" fill="#e2e8f0" font-size="15" font-family="'JetBrains Mono', ui-monospace, monospace">codex --profile planning "prompt"</text>
    <text x="110" y="810" fill="#94a3b8" font-size="13">pro Aufruf · überschreibt default_profile</text>
  </g>

  <g>
    <rect x="710" y="690" width="600" height="150" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="730" y="720" fill="#a78bfa" font-size="15" font-weight="700">Persistent in config.toml</text>
    <rect x="730" y="738" width="560" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="750" y="766" fill="#e2e8f0" font-size="15" font-family="'JetBrains Mono', ui-monospace, monospace">default_profile = "daily"</text>
    <text x="730" y="810" fill="#94a3b8" font-size="13">Hinweis: Profile sind experimental · können sich ändern</text>
  </g>

  <line x1="390" y1="610" x2="390" y2="680" stroke="#818cf8" stroke-width="2" marker-end="url(#arr03)" stroke-dasharray="4 4"/>
  <line x1="1010" y1="610" x2="1010" y2="680" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr03)" stroke-dasharray="4 4"/>
</svg>
