<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Positionierungs-Matrix der Terminal-first Coding-Agenten</title>
  <desc>Vergleichstabelle in Kartenform mit fünf Tools (Codex CLI, Claude Code, Gemini CLI, Aider, Copilot CLI) und den Spalten Anbieter, Lizenz, Sprache, Modelle, USP. Codex CLI ist visuell hervorgehoben.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#e2e8f0">Positionierungs-Matrix: fünf Terminal-first Agenten</text>
  <text x="60" y="90" font-size="16" fill="#94a3b8">Codex CLI als Leitfigur im Feld · Stand Q1/2026</text>
  <text x="1340" y="60" font-size="14" fill="#94a3b8" text-anchor="end">Kapitel 1 · Positionierung</text>

  <g font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="210" y="140">Tool</text>
    <text x="430" y="140">Anbieter</text>
    <text x="620" y="140">Lizenz</text>
    <text x="810" y="140">Sprache</text>
    <text x="1020" y="140">Modell(e)</text>
    <text x="1250" y="140">USP</text>
  </g>
  <line x1="60" y1="150" x2="1340" y2="150" stroke="#334155" stroke-width="1"/>

  <g>
    <rect x="60" y="170" width="1280" height="125" rx="14" ry="14" fill="#1e293b" stroke="#6366f1" stroke-width="2.5"/>
    <rect x="60" y="170" width="6" height="125" fill="#6366f1"/>
    <g transform="translate(150,232)">
      <circle cx="0" cy="0" r="34" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
      <path d="M -3 -22 L 3 -22 L 3 -14 L 9 -14 L 9 -8 L 3 -8 L 3 18 L -3 18 L -3 -8 L -9 -8 L -9 -14 L -3 -14 Z" fill="#818cf8"/>
      <path d="M -14 18 L 14 18 L 18 25 L -18 25 Z" fill="#818cf8"/>
    </g>
    <text x="210" y="210" font-size="20" font-weight="700" fill="#e2e8f0">Codex CLI</text>
    <text x="210" y="232" font-size="12" fill="#a78bfa">Hauptakteur · König</text>
    <text x="430" y="232" font-size="14" fill="#e2e8f0" text-anchor="middle">OpenAI</text>
    <g text-anchor="middle">
      <rect x="575" y="216" width="90" height="28" rx="6" fill="#064e3b" stroke="#10b981"/>
      <text x="620" y="235" font-size="13" fill="#6ee7b7">Apache-2.0</text>
    </g>
    <g text-anchor="middle">
      <rect x="770" y="216" width="80" height="28" rx="6" fill="#1e3a8a" stroke="#6366f1"/>
      <text x="810" y="235" font-size="13" fill="#c7d2fe">Rust</text>
    </g>
    <text x="1020" y="218" font-size="12" fill="#e2e8f0" text-anchor="middle">GPT-5.3-Codex (+ Spark)</text>
    <text x="1020" y="236" font-size="11" fill="#94a3b8" text-anchor="middle">5.2 / 5.1 / 5-Codex · 5 / 5.4 · o3 · OSS</text>
    <text x="1250" y="218" font-size="12" fill="#e2e8f0" text-anchor="middle">Kernel-Sandbox</text>
    <text x="1250" y="236" font-size="11" fill="#94a3b8" text-anchor="middle">Multi-Hour · Cloud-Handoff</text>
  </g>

  <g>
    <rect x="60" y="310" width="1280" height="100" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <rect x="60" y="310" width="6" height="100" fill="#a78bfa"/>
    <g transform="translate(150,360)">
      <circle cx="0" cy="0" r="28" fill="#2e1065" stroke="#a78bfa" stroke-width="2"/>
      <path d="M -10 -10 L 10 -10 L 14 0 L 10 10 L -10 10 L -14 0 Z" fill="#a78bfa"/>
    </g>
    <text x="210" y="350" font-size="18" font-weight="600" fill="#e2e8f0">Claude Code</text>
    <text x="210" y="370" font-size="12" fill="#94a3b8">Dame — präzise Kollaboration</text>
    <text x="430" y="365" font-size="14" fill="#e2e8f0" text-anchor="middle">Anthropic</text>
    <g text-anchor="middle">
      <rect x="575" y="350" width="90" height="26" rx="6" fill="#450a0a" stroke="#ef4444"/>
      <text x="620" y="368" font-size="12" fill="#fecaca">proprietär</text>
    </g>
    <g text-anchor="middle">
      <rect x="760" y="350" width="100" height="26" rx="6" fill="#1e3a8a" stroke="#6366f1"/>
      <text x="810" y="368" font-size="12" fill="#c7d2fe">TypeScript</text>
    </g>
    <text x="1020" y="354" font-size="12" fill="#e2e8f0" text-anchor="middle">Claude 4.7 / 4.6</text>
    <text x="1020" y="372" font-size="11" fill="#94a3b8" text-anchor="middle">Opus / Sonnet / Haiku</text>
    <text x="1250" y="354" font-size="12" fill="#e2e8f0" text-anchor="middle">17 Hook-Events</text>
    <text x="1250" y="372" font-size="11" fill="#94a3b8" text-anchor="middle">Extended Thinking</text>
  </g>

  <g>
    <rect x="60" y="425" width="1280" height="100" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <rect x="60" y="425" width="6" height="100" fill="#22d3ee"/>
    <g transform="translate(150,475)">
      <circle cx="0" cy="0" r="28" fill="#083344" stroke="#22d3ee" stroke-width="2"/>
      <path d="M -10 -14 L 10 -14 L 14 0 L 0 14 L -14 0 Z" fill="#22d3ee"/>
    </g>
    <text x="210" y="465" font-size="18" font-weight="600" fill="#e2e8f0">Gemini CLI</text>
    <text x="210" y="485" font-size="12" fill="#94a3b8">Läufer — langreichweitig</text>
    <text x="430" y="480" font-size="14" fill="#e2e8f0" text-anchor="middle">Google</text>
    <g text-anchor="middle">
      <rect x="575" y="465" width="90" height="26" rx="6" fill="#064e3b" stroke="#10b981"/>
      <text x="620" y="483" font-size="12" fill="#6ee7b7">Apache-2.0</text>
    </g>
    <g text-anchor="middle">
      <rect x="760" y="465" width="100" height="26" rx="6" fill="#1e3a8a" stroke="#6366f1"/>
      <text x="810" y="483" font-size="12" fill="#c7d2fe">TypeScript</text>
    </g>
    <text x="1020" y="469" font-size="12" fill="#e2e8f0" text-anchor="middle">Gemini 2.5 / 3 Pro</text>
    <text x="1020" y="487" font-size="11" fill="#94a3b8" text-anchor="middle">1 M-Kontext nativ</text>
    <text x="1250" y="469" font-size="12" fill="#e2e8f0" text-anchor="middle">1 M-Token-Kontext</text>
    <text x="1250" y="487" font-size="11" fill="#94a3b8" text-anchor="middle">grosszügiger Free-Tier</text>
  </g>

  <g>
    <rect x="60" y="540" width="1280" height="100" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <rect x="60" y="540" width="6" height="100" fill="#10b981"/>
    <g transform="translate(150,590)">
      <circle cx="0" cy="0" r="28" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
      <path d="M 0 -14 L 12 0 L 0 14 L -12 0 Z" fill="#10b981"/>
      <path d="M 0 -6 L 6 0 L 0 6 L -6 0 Z" fill="#064e3b"/>
    </g>
    <text x="210" y="580" font-size="18" font-weight="600" fill="#e2e8f0">Aider</text>
    <text x="210" y="600" font-size="12" fill="#94a3b8">Springer — wendig, git-nah</text>
    <text x="430" y="595" font-size="14" fill="#e2e8f0" text-anchor="middle">Community</text>
    <g text-anchor="middle">
      <rect x="585" y="580" width="70" height="26" rx="6" fill="#064e3b" stroke="#10b981"/>
      <text x="620" y="598" font-size="12" fill="#6ee7b7">MIT</text>
    </g>
    <g text-anchor="middle">
      <rect x="775" y="580" width="70" height="26" rx="6" fill="#1e3a8a" stroke="#6366f1"/>
      <text x="810" y="598" font-size="12" fill="#c7d2fe">Python</text>
    </g>
    <text x="1020" y="584" font-size="12" fill="#e2e8f0" text-anchor="middle">provider-agnostisch</text>
    <text x="1020" y="602" font-size="11" fill="#94a3b8" text-anchor="middle">beliebige API-Modelle</text>
    <text x="1250" y="584" font-size="12" fill="#e2e8f0" text-anchor="middle">Git-zentriert</text>
    <text x="1250" y="602" font-size="11" fill="#94a3b8" text-anchor="middle">Auto-Commits · Minimal-Agent</text>
  </g>

  <g>
    <rect x="60" y="655" width="1280" height="100" rx="14" ry="14" fill="#1e293b" stroke="#334155"/>
    <rect x="60" y="655" width="6" height="100" fill="#f59e0b"/>
    <g transform="translate(150,705)">
      <circle cx="0" cy="0" r="28" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
      <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#f59e0b"/>
    </g>
    <text x="210" y="695" font-size="18" font-weight="600" fill="#e2e8f0">GitHub Copilot CLI</text>
    <text x="210" y="715" font-size="12" fill="#94a3b8">Turm — in der Festung GitHub</text>
    <text x="430" y="710" font-size="14" fill="#e2e8f0" text-anchor="middle">GitHub / Microsoft</text>
    <g text-anchor="middle">
      <rect x="565" y="695" width="110" height="26" rx="6" fill="#450a0a" stroke="#ef4444"/>
      <text x="620" y="713" font-size="12" fill="#fecaca">prop. (Preview)</text>
    </g>
    <g text-anchor="middle">
      <rect x="760" y="695" width="100" height="26" rx="6" fill="#1e3a8a" stroke="#6366f1"/>
      <text x="810" y="713" font-size="12" fill="#c7d2fe">TypeScript</text>
    </g>
    <text x="1020" y="699" font-size="12" fill="#e2e8f0" text-anchor="middle">GPT- &amp; Claude-Modelle</text>
    <text x="1020" y="717" font-size="11" fill="#94a3b8" text-anchor="middle">GH-kontextuell gebündelt</text>
    <text x="1250" y="699" font-size="12" fill="#e2e8f0" text-anchor="middle">GitHub-Nativ</text>
    <text x="1250" y="717" font-size="11" fill="#94a3b8" text-anchor="middle">Issues / PRs / Repos</text>
  </g>

  <g transform="translate(60,790)">
    <text x="0" y="0" font-size="13" fill="#94a3b8">Metapher: Schachfiguren · Codex als König im Zentrum, daneben Dame, Läufer, Springer und Turm.</text>
    <g transform="translate(0,20)" font-size="12" fill="#e2e8f0">
      <rect x="0" y="-10" width="14" height="14" rx="3" fill="#6366f1"/><text x="22" y="0">Codex</text>
      <rect x="90" y="-10" width="14" height="14" rx="3" fill="#a78bfa"/><text x="112" y="0">Claude</text>
      <rect x="180" y="-10" width="14" height="14" rx="3" fill="#22d3ee"/><text x="202" y="0">Gemini</text>
      <rect x="270" y="-10" width="14" height="14" rx="3" fill="#10b981"/><text x="292" y="0">Aider</text>
      <rect x="340" y="-10" width="14" height="14" rx="3" fill="#f59e0b"/><text x="362" y="0">Copilot</text>
      <rect x="430" y="-10" width="14" height="14" rx="3" fill="#064e3b" stroke="#10b981"/><text x="452" y="0">offene Lizenz</text>
      <rect x="565" y="-10" width="14" height="14" rx="3" fill="#450a0a" stroke="#ef4444"/><text x="587" y="0">proprietär</text>
    </g>
  </g>
</svg>
