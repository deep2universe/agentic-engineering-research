<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Codex CLI Eingabe-Modi — Trichter mit sechs Eingangskanälen</title>
  <desc>Sechs Eingabe-Pipelines fliessen in einen zentralen Trichter: Inline-Prompt, Prompt-Datei mit -f, Image mit -i, Drag-and-Drop aus der GUI, @-Mention und Skill-Trigger. Metapher: Trichter mit verschiedenen Eingängen.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">2. Eingabe-Modi — Vom Input in den Agent-Kontext</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Sechs Kanäle, ein Trichter: wie Prompt, Bild und Metadaten in den Turn fließen</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 2</text>

  <!-- Trichter -->
  <g transform="translate(700,560)">
    <path d="M -240 -80 L 240 -80 L 80 80 L -80 80 Z" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
    <text x="0" y="-30" fill="#e2e8f0" font-size="22" font-weight="700" text-anchor="middle">Agent-Kontext</text>
    <text x="0" y="0" fill="#94a3b8" font-size="14" text-anchor="middle">Turn-Input · Embeddings · Tool-Calls</text>
    <text x="0" y="28" fill="#818cf8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', monospace">→ LLM-Request</text>

    <!-- Auslauf zum Modell -->
    <path d="M -80 80 L -40 200 L 40 200 L 80 80 Z" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
    <rect x="-80" y="200" width="160" height="60" rx="8" fill="#6366f1" opacity="0.2" stroke="#818cf8" stroke-width="2"/>
    <text x="0" y="232" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">GPT-5.3-Codex</text>
  </g>

  <!-- Input-Panels -->
  <!-- 1. Inline Prompt -->
  <g transform="translate(40,160)">
    <rect width="280" height="110" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="14" y="14" width="30" height="30" rx="4" fill="#6366f1" opacity="0.2"/>
    <text x="29" y="35" fill="#818cf8" font-size="16" text-anchor="middle" font-family="'JetBrains Mono', monospace">&gt;_</text>
    <text x="56" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Inline-Prompt</text>
    <text x="56" y="48" fill="#94a3b8" font-size="11">Positional · Quick-Start</text>
    <rect x="14" y="60" width="252" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="83" fill="#22d3ee" font-size="11" font-family="'JetBrains Mono', monospace">codex "fix failing tests"</text>
  </g>

  <!-- 2. Prompt-Datei -->
  <g transform="translate(340,160)">
    <rect width="280" height="110" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <g transform="translate(14,14)">
      <path d="M4 2 L20 2 L28 10 L28 28 L4 28 Z" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <path d="M20 2 L20 10 L28 10" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <line x1="8" y1="16" x2="22" y2="16" stroke="#22d3ee" stroke-width="1.5"/>
      <line x1="8" y1="21" x2="22" y2="21" stroke="#22d3ee" stroke-width="1.5"/>
    </g>
    <text x="56" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Prompt-Datei</text>
    <text x="56" y="48" fill="#94a3b8" font-size="11">Lange Briefings · CI-tauglich</text>
    <rect x="14" y="60" width="252" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="83" fill="#22d3ee" font-size="11" font-family="'JetBrains Mono', monospace">codex exec -f task.md</text>
  </g>

  <!-- 3. Image-Input -->
  <g transform="translate(640,160)">
    <rect width="280" height="110" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <g transform="translate(14,14)">
      <rect x="2" y="2" width="28" height="26" rx="3" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <circle cx="10" cy="10" r="2" fill="#a78bfa"/>
      <path d="M2 22 L10 14 L18 20 L30 10" fill="none" stroke="#a78bfa" stroke-width="2"/>
    </g>
    <text x="56" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Image-Input</text>
    <text x="56" y="48" fill="#94a3b8" font-size="11">Design-Review · Visual-Debug</text>
    <rect x="14" y="60" width="252" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="83" fill="#22d3ee" font-size="11" font-family="'JetBrains Mono', monospace">codex -i screenshot.png</text>
  </g>

  <!-- 4. Drag &amp; Drop / Clipboard -->
  <g transform="translate(940,160)">
    <rect width="280" height="110" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <g transform="translate(14,14)">
      <rect x="4" y="4" width="20" height="20" rx="2" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2"/>
      <path d="M14 14 L24 24 L22 28 L18 24 L16 30 Z" fill="#f59e0b"/>
    </g>
    <text x="56" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Drag &amp; Drop / Paste</text>
    <text x="56" y="48" fill="#94a3b8" font-size="11">Clipboard · direkt in TUI</text>
    <rect x="14" y="60" width="252" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="83" fill="#cbd5e1" font-size="11">Datei-Drop / Bild aus Zwischenablage</text>
  </g>

  <!-- 5. @-Mention -->
  <g transform="translate(200,320)">
    <rect width="280" height="110" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(14,14)">
      <circle cx="18" cy="16" r="14" fill="none" stroke="#10b981" stroke-width="2"/>
      <circle cx="18" cy="16" r="7" fill="none" stroke="#10b981" stroke-width="2"/>
      <path d="M25 16 L25 20 Q25 26 30 26" fill="none" stroke="#10b981" stroke-width="2"/>
    </g>
    <text x="56" y="30" fill="#e2e8f0" font-size="15" font-weight="700">@-Mention</text>
    <text x="56" y="48" fill="#94a3b8" font-size="11">Fuzzy-Finder · File-Ziehen</text>
    <rect x="14" y="60" width="252" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="83" fill="#22d3ee" font-size="11" font-family="'JetBrains Mono', monospace">@src/router.ts</text>
  </g>

  <!-- 6. Skill-Trigger -->
  <g transform="translate(550,320)">
    <rect width="300" height="110" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <g transform="translate(14,14)">
      <path d="M18 4 L22 14 L32 14 L24 20 L27 30 L18 24 L9 30 L12 20 L4 14 L14 14 Z"
            fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="56" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Skill-Trigger (implicit)</text>
    <text x="56" y="48" fill="#94a3b8" font-size="11">Beschreibungs-Match · SKILL.md</text>
    <rect x="14" y="60" width="272" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="83" fill="#cbd5e1" font-size="11">Codex lädt Skill on-demand nach</text>
  </g>

  <!-- 7. Resume / History (Side-Channel) -->
  <g transform="translate(900,320)">
    <rect width="320" height="110" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3"/>
    <g transform="translate(14,14)">
      <circle cx="18" cy="16" r="14" fill="none" stroke="#94a3b8" stroke-width="2"/>
      <path d="M18 8 L18 16 L24 20" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="56" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Session-Resume</text>
    <text x="56" y="48" fill="#94a3b8" font-size="11">Historischer Kontext als Input</text>
    <rect x="14" y="60" width="292" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="83" fill="#22d3ee" font-size="11" font-family="'JetBrains Mono', monospace">codex resume --last</text>
  </g>

  <!-- Flow-Linien zum Trichter -->
  <g stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowBlue)">
    <path d="M180 270 Q280 400 500 480"/>
    <path d="M480 270 Q520 400 590 480"/>
    <path d="M780 270 Q720 400 700 480"/>
    <path d="M1080 270 Q900 400 820 480"/>
    <path d="M340 430 Q420 460 560 500"/>
    <path d="M700 430 Q700 460 700 490"/>
    <path d="M1060 430 Q900 460 830 500"/>
  </g>

  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Legende / Info-Box -->
  <g transform="translate(60,770)">
    <rect width="1280" height="100" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="24" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Hinweise zum Input-Pipeline</text>
    <text x="24" y="56" fill="#cbd5e1" font-size="12">· Image-History persistiert über codex resume — wichtig für Multi-Day-UI-Arbeit.</text>
    <text x="24" y="76" fill="#cbd5e1" font-size="12">· view_image Tool liefert resolvable URLs im Code-Mode.</text>
    <text x="680" y="56" fill="#cbd5e1" font-size="12">· @-Mention unterstützt Fuzzy-Suche über Repo-Dateien.</text>
    <text x="680" y="76" fill="#cbd5e1" font-size="12">· Skill-Trigger lädt nur Metadaten beim Start, Body on-demand.</text>
  </g>
</svg>
