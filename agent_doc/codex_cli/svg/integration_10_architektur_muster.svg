<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Codex CLI – Typische Architektur-Muster</title>
  <desc>Vier Pattern-Karten als Architektur-Galerie: Local-First Cloud-Burst, IDE-Zentral, Agent-gestütztes GitOps und MCP-Orchestrator. Jede Karte mit Mini-Diagramm und passendem Use-Case.</desc>

  <defs>
    <marker id="arrAm1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrAm2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrAm3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrAm4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" font-size="30" font-weight="700" fill="#e2e8f0">Typische Architektur-Muster · Galerie</text>
  <text x="40" y="84" font-size="15" fill="#94a3b8">Vier wiederkehrende Patterns für den Einsatz von Codex CLI in Teams</text>
  <text x="1360" y="56" font-size="14" fill="#64748b" text-anchor="end">Codex CLI · Kapitel 10</text>

  <!-- KARTE 1: Local-First Cloud-Burst -->
  <rect x="40" y="120" width="660" height="370" rx="14" ry="14" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="60" y="148" font-size="18" font-weight="700" fill="#67e8f9">1 · Local-First, Cloud-Burst</text>
  <text x="60" y="170" font-size="12" fill="#94a3b8">lokal prototypisieren · bei Deadline-Druck Cloud-Parallel-Tasks</text>

  <!-- Mini-Diagramm -->
  <g>
    <rect x="80" y="200" width="160" height="80" rx="10" fill="#0b1224" stroke="#6366f1"/>
    <text x="160" y="226" font-size="14" font-weight="700" fill="#a5b4fc" text-anchor="middle">Lokaler Codex</text>
    <text x="160" y="246" font-size="11" fill="#cbd5e1" text-anchor="middle">Iteration · Diff-Review</text>
    <text x="160" y="262" font-size="11" fill="#94a3b8" text-anchor="middle">workspace-write</text>

    <path d="M240 240 L 320 240" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrAm1)"/>
    <text x="280" y="232" font-size="10" fill="#67e8f9" text-anchor="middle">cloud exec</text>

    <rect x="320" y="200" width="160" height="80" rx="10" fill="#0b1224" stroke="#22d3ee"/>
    <text x="400" y="226" font-size="14" font-weight="700" fill="#67e8f9" text-anchor="middle">Cloud Task A</text>
    <text x="400" y="246" font-size="11" fill="#cbd5e1" text-anchor="middle">Refactor · 2h</text>
    <text x="400" y="262" font-size="11" fill="#94a3b8" text-anchor="middle">isolierte VM</text>

    <rect x="500" y="200" width="160" height="80" rx="10" fill="#0b1224" stroke="#22d3ee"/>
    <text x="580" y="226" font-size="14" font-weight="700" fill="#67e8f9" text-anchor="middle">Cloud Task B</text>
    <text x="580" y="246" font-size="11" fill="#cbd5e1" text-anchor="middle">Migration · 4h</text>
    <text x="580" y="262" font-size="11" fill="#94a3b8" text-anchor="middle">parallel</text>

    <path d="M400 280 Q 320 340, 240 320" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrAm4)"/>
    <path d="M580 280 Q 480 360, 240 320" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrAm4)"/>
    <text x="380" y="370" font-size="10" fill="#6ee7b7" text-anchor="middle">cloud pull · Patch lokal anwenden</text>
  </g>

  <text x="60" y="416" font-size="13" font-weight="600" fill="#e2e8f0">Use-Cases</text>
  <text x="60" y="436" font-size="12" fill="#cbd5e1">● Deadline-Druck: 3-5 Cloud-Tasks parallel anstoßen</text>
  <text x="60" y="454" font-size="12" fill="#cbd5e1">● Lange Refactorings ohne lokale Blockade</text>
  <text x="60" y="472" font-size="12" fill="#cbd5e1">● Lokal prüfen, mergen — Hoheit bleibt beim Entwickler</text>

  <!-- KARTE 2: IDE-Zentral -->
  <rect x="720" y="120" width="640" height="370" rx="14" ry="14" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="740" y="148" font-size="18" font-weight="700" fill="#a5b4fc">2 · IDE-Zentral</text>
  <text x="740" y="170" font-size="12" fill="#94a3b8">Entwickler arbeiten in VS Code · Codex schlägt vor · Diffs bleiben überprüfbar</text>

  <g>
    <rect x="760" y="200" width="200" height="170" rx="10" fill="#0b1224" stroke="#6366f1"/>
    <text x="860" y="222" font-size="14" font-weight="700" fill="#a5b4fc" text-anchor="middle">VS Code · Cursor</text>
    <text x="860" y="240" font-size="11" fill="#cbd5e1" text-anchor="middle">Side-Panel-Chat</text>
    <text x="860" y="258" font-size="11" fill="#cbd5e1" text-anchor="middle">Diff-Viewer (Hunk-Approval)</text>
    <text x="860" y="276" font-size="11" fill="#cbd5e1" text-anchor="middle">Inline-Approvals</text>
    <text x="860" y="294" font-size="11" fill="#cbd5e1" text-anchor="middle">Task-Tracker</text>
    <text x="860" y="312" font-size="11" fill="#cbd5e1" text-anchor="middle">Thinking-Panel</text>
    <text x="860" y="334" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#94a3b8" text-anchor="middle">~/.codex/config.toml</text>
    <text x="860" y="352" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#94a3b8" text-anchor="middle">geteilt mit CLI</text>

    <path d="M960 240 L 1040 240" stroke="#6366f1" stroke-width="2" marker-end="url(#arrAm2)"/>
    <path d="M1040 280 L 960 280" stroke="#6366f1" stroke-width="2" marker-end="url(#arrAm2)"/>

    <rect x="1040" y="200" width="280" height="170" rx="10" fill="#0b1224" stroke="#a78bfa"/>
    <text x="1180" y="222" font-size="14" font-weight="700" fill="#c4b5fd" text-anchor="middle">Codex Backend (headless)</text>
    <text x="1180" y="244" font-size="11" fill="#cbd5e1" text-anchor="middle">JSON-RPC zur Extension</text>
    <text x="1180" y="262" font-size="11" fill="#cbd5e1" text-anchor="middle">teilt Auth + History mit CLI</text>
    <text x="1180" y="284" font-size="12" fill="#94a3b8" text-anchor="middle">Sandbox: workspace-write</text>
    <text x="1180" y="304" font-size="12" fill="#94a3b8" text-anchor="middle">Approval: on-request</text>
    <text x="1180" y="328" font-size="11" fill="#67e8f9" text-anchor="middle">Continue in cloud → Cloud-Handoff</text>
  </g>

  <text x="740" y="416" font-size="13" font-weight="600" fill="#e2e8f0">Use-Cases</text>
  <text x="740" y="436" font-size="12" fill="#cbd5e1">● Pair-Programming-Workflow für Senior-Devs</text>
  <text x="740" y="454" font-size="12" fill="#cbd5e1">● Diff bleibt zentrale Review-Einheit (PR-Vorbereitung)</text>
  <text x="740" y="472" font-size="12" fill="#cbd5e1">● Onboarding via gemeinsame .codex/prompts/*.md</text>

  <!-- KARTE 3: Agent-gestütztes GitOps -->
  <rect x="40" y="510" width="660" height="370" rx="14" ry="14" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="60" y="538" font-size="18" font-weight="700" fill="#c4b5fd">3 · Agent-gestütztes GitOps</text>
  <text x="60" y="560" font-size="12" fill="#94a3b8">PR-Open → Review-Action · CI-Fail → Autofix-Action · Release → Changelog-Action</text>

  <g>
    <!-- Trigger -->
    <rect x="60" y="586" width="120" height="50" rx="8" fill="#0b1224" stroke="#a78bfa"/>
    <text x="120" y="608" font-size="12" font-weight="700" fill="#c4b5fd" text-anchor="middle">PR open</text>
    <text x="120" y="624" font-size="10" fill="#94a3b8" text-anchor="middle">pull_request</text>

    <rect x="60" y="650" width="120" height="50" rx="8" fill="#0b1224" stroke="#f59e0b"/>
    <text x="120" y="672" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">CI fail</text>
    <text x="120" y="688" font-size="10" fill="#94a3b8" text-anchor="middle">workflow_run</text>

    <rect x="60" y="714" width="120" height="50" rx="8" fill="#0b1224" stroke="#10b981"/>
    <text x="120" y="736" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">Release tag</text>
    <text x="120" y="752" font-size="10" fill="#94a3b8" text-anchor="middle">release.published</text>

    <!-- Pfeile zum Action -->
    <path d="M180 610 L 260 610" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrAm3)"/>
    <path d="M180 674 L 260 674" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAm1)"/>
    <path d="M180 738 L 260 738" stroke="#10b981" stroke-width="2" marker-end="url(#arrAm4)"/>

    <!-- Action -->
    <rect x="260" y="586" width="200" height="50" rx="8" fill="#0b1224" stroke="#a78bfa"/>
    <text x="360" y="608" font-size="12" font-weight="700" fill="#c4b5fd" text-anchor="middle">Codex Review-Action</text>
    <text x="360" y="624" font-size="10" fill="#94a3b8" text-anchor="middle">.codex/review.md · sandbox: ro</text>

    <rect x="260" y="650" width="200" height="50" rx="8" fill="#0b1224" stroke="#f59e0b"/>
    <text x="360" y="672" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">Codex Autofix-Action</text>
    <text x="360" y="688" font-size="10" fill="#94a3b8" text-anchor="middle">workspace-write · --full-auto</text>

    <rect x="260" y="714" width="200" height="50" rx="8" fill="#0b1224" stroke="#10b981"/>
    <text x="360" y="736" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">Codex Changelog-Action</text>
    <text x="360" y="752" font-size="10" fill="#94a3b8" text-anchor="middle">commits → CHANGELOG.md</text>

    <!-- Output -->
    <path d="M460 610 L 520 610" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrAm3)"/>
    <path d="M460 674 L 520 674" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAm1)"/>
    <path d="M460 738 L 520 738" stroke="#10b981" stroke-width="2" marker-end="url(#arrAm4)"/>

    <rect x="520" y="586" width="160" height="50" rx="8" fill="#0b1224" stroke="#475569"/>
    <text x="600" y="608" font-size="12" fill="#cbd5e1" text-anchor="middle">PR-Kommentare</text>
    <text x="600" y="624" font-size="10" fill="#94a3b8" text-anchor="middle">inline + summary</text>

    <rect x="520" y="650" width="160" height="50" rx="8" fill="#0b1224" stroke="#475569"/>
    <text x="600" y="672" font-size="12" fill="#cbd5e1" text-anchor="middle">Fix-PR</text>
    <text x="600" y="688" font-size="10" fill="#94a3b8" text-anchor="middle">automatisch geöffnet</text>

    <rect x="520" y="714" width="160" height="50" rx="8" fill="#0b1224" stroke="#475569"/>
    <text x="600" y="736" font-size="12" fill="#cbd5e1" text-anchor="middle">Release-Notes</text>
    <text x="600" y="752" font-size="10" fill="#94a3b8" text-anchor="middle">an Tag angeheftet</text>
  </g>

  <text x="60" y="800" font-size="13" font-weight="600" fill="#e2e8f0">Use-Cases</text>
  <text x="60" y="820" font-size="12" fill="#cbd5e1">● Repo wird zur Self-Healing-Pipeline · weniger manuelle Triage</text>
  <text x="60" y="838" font-size="12" fill="#cbd5e1">● Permission-Modell pro Action getrennt (allow-users, allow-bots)</text>
  <text x="60" y="856" font-size="12" fill="#cbd5e1">● safety-strategy: drop-sudo / unprivileged-user empfohlen</text>

  <!-- KARTE 4: MCP-Orchestrator -->
  <rect x="720" y="510" width="640" height="370" rx="14" ry="14" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="740" y="538" font-size="18" font-weight="700" fill="#6ee7b7">4 · MCP-Orchestrator</text>
  <text x="740" y="560" font-size="12" fill="#94a3b8">Codex als MCP-Client für GitHub+Postgres+Sentry · oder umgekehrt als MCP-Server für Claude Code</text>

  <g>
    <!-- Variant A: Codex als Client -->
    <text x="760" y="586" font-size="13" font-weight="700" fill="#e2e8f0">Variante A · Codex als Client</text>
    <rect x="760" y="600" width="270" height="120" rx="10" fill="#0b1224" stroke="#10b981"/>
    <text x="895" y="624" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">Codex CLI (MCP-Client)</text>

    <rect x="780" y="640" width="80" height="30" rx="6" fill="#1e293b" stroke="#10b981"/>
    <text x="820" y="660" font-size="11" fill="#cbd5e1" text-anchor="middle">github</text>
    <rect x="868" y="640" width="80" height="30" rx="6" fill="#1e293b" stroke="#10b981"/>
    <text x="908" y="660" font-size="11" fill="#cbd5e1" text-anchor="middle">postgres</text>
    <rect x="956" y="640" width="80" height="30" rx="6" fill="#1e293b" stroke="#10b981"/>
    <text x="996" y="660" font-size="11" fill="#cbd5e1" text-anchor="middle">sentry</text>

    <rect x="780" y="680" width="160" height="30" rx="6" fill="#1e293b" stroke="#10b981"/>
    <text x="860" y="700" font-size="11" fill="#cbd5e1" text-anchor="middle">slack · linear · notion</text>
    <rect x="950" y="680" width="80" height="30" rx="6" fill="#1e293b" stroke="#10b981"/>
    <text x="990" y="700" font-size="11" fill="#cbd5e1" text-anchor="middle">playwright</text>

    <!-- Variant B: Codex als Server -->
    <text x="1080" y="586" font-size="13" font-weight="700" fill="#e2e8f0">Variante B · Codex als Server</text>
    <rect x="1080" y="600" width="260" height="120" rx="10" fill="#0b1224" stroke="#a78bfa"/>
    <text x="1210" y="624" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">Claude Code (Orchestrator)</text>

    <path d="M1210 632 L 1210 664" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrAm3)"/>

    <rect x="1100" y="664" width="220" height="44" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="1210" y="684" font-size="12" font-weight="700" fill="#c4b5fd" text-anchor="middle">codex mcp serve</text>
    <text x="1210" y="700" font-size="10" fill="#94a3b8" text-anchor="middle">Codex als Sub-Agent / Tool</text>
  </g>

  <text x="740" y="754" font-size="13" font-weight="600" fill="#e2e8f0">Use-Cases</text>
  <text x="740" y="774" font-size="12" fill="#cbd5e1">● Variante A: Datenbank-Triage, Incident-Response, Cross-Tool-Workflows</text>
  <text x="740" y="792" font-size="12" fill="#cbd5e1">● Variante B: heterogene Agent-Stacks, Codex als Spezialist für Refactoring</text>
  <text x="740" y="810" font-size="12" fill="#cbd5e1">● Per-Tool-Approval-Mode trennt riskante von harmlosen Tools</text>
  <text x="740" y="828" font-size="12" fill="#cbd5e1">● Bundles als Plugins (qa-stack, obs-stack) reduzieren Setup-Zeit</text>
</svg>
