<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Config-Precedence — 6-stufiger Prioritäts-Stack</title>
  <desc>Schichttorte von CLI-Flags (oben, höchste Priorität) bis Built-in Defaults (unten) mit Überschreibungs-Pfeil.</desc>
  <defs>
    <marker id="arrHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Config-Precedence — wer überschreibt wen?</text>
  <text x="60" y="102" fill="#94a3b8" font-size="16">Codex fügt Werte aus sechs Quellen zusammen. Oben gewinnt. TOML ist das Schema.</text>
  <text x="1260" y="70" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §1</text>

  <!-- Prioritäts-Pfeil links -->
  <line x1="130" y1="780" x2="130" y2="180" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrHead)"/>
  <text x="95" y="460" fill="#f59e0b" font-size="14" font-weight="600" transform="rotate(-90 95 460)">höhere Prio überschreibt niedrigere</text>

  <!-- Layer 1 (oberste, höchste Prio) -->
  <g>
    <rect x="200" y="160" width="1080" height="80" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="200" y="160" width="8" height="80" rx="4" fill="#6366f1"/>
    <text x="230" y="192" fill="#e2e8f0" font-size="20" font-weight="700">1. CLI-Flags</text>
    <text x="230" y="218" fill="#94a3b8" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">-m gpt-5.4 · -c key=value · -s read-only · -a never · --profile ci</text>
    <text x="1240" y="195" fill="#818cf8" font-size="13" text-anchor="end" font-weight="600">höchste Priorität</text>
    <text x="1240" y="222" fill="#94a3b8" font-size="12" text-anchor="end">ad-hoc · pro Aufruf</text>
  </g>

  <!-- Layer 2 -->
  <g>
    <rect x="210" y="250" width="1060" height="78" rx="12" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="210" y="250" width="6" height="78" rx="3" fill="#818cf8"/>
    <text x="240" y="282" fill="#e2e8f0" font-size="18" font-weight="700">2. Aktives Profil</text>
    <text x="240" y="308" fill="#94a3b8" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">--profile planning → [profiles.planning]</text>
    <text x="1230" y="285" fill="#818cf8" font-size="13" text-anchor="end" font-weight="600">Szenario-Set</text>
    <text x="1230" y="312" fill="#94a3b8" font-size="12" text-anchor="end">bündelt mehrere Keys</text>
  </g>

  <!-- Layer 3 -->
  <g>
    <rect x="220" y="338" width="1040" height="78" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="220" y="338" width="6" height="78" rx="3" fill="#a78bfa"/>
    <text x="250" y="370" fill="#e2e8f0" font-size="18" font-weight="700">3. Projekt-Config</text>
    <text x="250" y="396" fill="#94a3b8" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">.codex/config.toml  (nur in Trusted Projects)</text>
    <text x="1220" y="373" fill="#a78bfa" font-size="13" text-anchor="end" font-weight="600">Repo-Root</text>
    <text x="1220" y="400" fill="#94a3b8" font-size="12" text-anchor="end">per-Projekt, gated</text>
  </g>

  <!-- Layer 4 -->
  <g>
    <rect x="230" y="426" width="1020" height="78" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <rect x="230" y="426" width="6" height="78" rx="3" fill="#22d3ee"/>
    <text x="260" y="458" fill="#e2e8f0" font-size="18" font-weight="700">4. User-Config</text>
    <text x="260" y="484" fill="#94a3b8" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">~/.codex/config.toml   bzw. $CODEX_HOME/config.toml</text>
    <text x="1210" y="461" fill="#22d3ee" font-size="13" text-anchor="end" font-weight="600">persönlich</text>
    <text x="1210" y="488" fill="#94a3b8" font-size="12" text-anchor="end">über alle Projekte</text>
  </g>

  <!-- Layer 5 -->
  <g>
    <rect x="240" y="514" width="1000" height="78" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect x="240" y="514" width="6" height="78" rx="3" fill="#10b981"/>
    <text x="270" y="546" fill="#e2e8f0" font-size="18" font-weight="700">5. System-Config</text>
    <text x="270" y="572" fill="#94a3b8" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">/etc/codex/config.toml</text>
    <text x="1200" y="549" fill="#10b981" font-size="13" text-anchor="end" font-weight="600">Enterprise-Baseline</text>
    <text x="1200" y="576" fill="#94a3b8" font-size="12" text-anchor="end">MDM / Ansible</text>
  </g>

  <!-- Layer 6 (unterste) -->
  <g>
    <rect x="250" y="602" width="980" height="78" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
    <rect x="250" y="602" width="6" height="78" rx="3" fill="#334155"/>
    <text x="280" y="634" fill="#cbd5e1" font-size="18" font-weight="700">6. Built-in Defaults</text>
    <text x="280" y="660" fill="#94a3b8" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace">model=gpt-5.3-codex · sandbox=workspace-write · approval=on-request</text>
    <text x="1190" y="637" fill="#94a3b8" font-size="13" text-anchor="end" font-weight="600">niedrigste Priorität</text>
    <text x="1190" y="664" fill="#64748b" font-size="12" text-anchor="end">im Binary</text>
  </g>

  <!-- Hinweisbox -->
  <rect x="200" y="720" width="1080" height="130" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="230" y="752" fill="#f59e0b" font-size="16" font-weight="700">Merge-Regel</text>
  <text x="230" y="778" fill="#cbd5e1" font-size="14">Pro Key wird der Wert der höchsten anwesenden Ebene genommen. Tabellen-Blöcke (z. B. [mcp_servers.*]) werden</text>
  <text x="230" y="800" fill="#cbd5e1" font-size="14">key-wise gemerged, nicht ganz ersetzt. Listen werden ersetzt — nicht konkateniert.</text>
  <text x="230" y="828" fill="#94a3b8" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">Beispiel: CLI -c sandbox_mode=read-only  &gt;  [profiles.daily].sandbox_mode  &gt;  ~/.codex/config.toml</text>
</svg>
