<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Kontext- und Session-Management — Compaction, Resume, History als Akkordeon</title>
  <desc>Timeline einer Codex-Session: viele Turns werden durch /compact zu einem Summary verdichtet; Resume lädt alte Sessions zurück; History (SQLite) speichert Commands für Ctrl+R Reverse-Search. Metapher: Akkordeon, das Turns zusammenfaltet.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">5. Kontext &amp; Session — Akkordeon statt überlaufendem Puffer</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Compaction, Resume und History halten Multi-Hour-Sessions mit GPT-5.x robust unterhalb des Kontext-Limits.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 5</text>

  <defs>
    <marker id="arr5" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
    <linearGradient id="fade" x1="0" x2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Timeline-Leiste -->
  <g transform="translate(60,150)">
    <text x="0" y="0" fill="#e2e8f0" font-size="18" font-weight="700">Session-Timeline</text>
    <text x="0" y="22" fill="#94a3b8" font-size="12">Turns links → rechts, Kontext-Budget-Bar oben</text>

    <!-- Kontextbalken -->
    <rect x="0" y="40" width="1280" height="24" rx="6" fill="#1e293b" stroke="#334155"/>
    <rect x="0" y="40" width="900" height="24" rx="6" fill="url(#fade)"/>
    <line x1="1100" y1="32" x2="1100" y2="72" stroke="#ef4444" stroke-dasharray="4 3"/>
    <text x="1106" y="40" fill="#fca5a5" font-size="11">Kontext-Limit</text>
    <text x="10" y="57" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', monospace">ctx-usage</text>

    <!-- Turns -->
    <g transform="translate(0,90)" font-family="'JetBrains Mono', monospace" font-size="11">
      <g>
        <rect x="0" y="0" width="90" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="45" y="22" fill="#818cf8" font-size="11" text-anchor="middle">Turn 1</text>
        <text x="45" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="system-ui">Init-Prompt</text>
        <text x="45" y="54" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">2k tok</text>
      </g>
      <g transform="translate(110,0)">
        <rect x="0" y="0" width="90" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="45" y="22" fill="#818cf8" font-size="11" text-anchor="middle">Turn 2</text>
        <text x="45" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="system-ui">Read Files</text>
        <text x="45" y="54" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">8k tok</text>
      </g>
      <g transform="translate(220,0)">
        <rect x="0" y="0" width="90" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="45" y="22" fill="#818cf8" font-size="11" text-anchor="middle">Turn 3</text>
        <text x="45" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="system-ui">Edit + Test</text>
        <text x="45" y="54" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">14k tok</text>
      </g>
      <text x="340" y="34" fill="#64748b" font-size="22">…</text>
      <g transform="translate(370,0)">
        <rect x="0" y="0" width="90" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="45" y="22" fill="#818cf8" font-size="11" text-anchor="middle">Turn N</text>
        <text x="45" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="system-ui">Debug</text>
        <text x="45" y="54" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">ΣN tok</text>
      </g>

      <!-- Akkordeon-Arrow Pfeil -->
      <path d="M 480 30 Q 560 -30 640 30" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arr5)"/>
      <text x="560" y="-10" fill="#22d3ee" font-size="12" text-anchor="middle" font-family="system-ui">/compact</text>

      <!-- Summary -->
      <g transform="translate(640,0)">
        <rect x="0" y="0" width="220" height="60" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
        <text x="110" y="22" fill="#22d3ee" font-size="12" text-anchor="middle">Compact-Summary</text>
        <text x="110" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="system-ui">~3k tok, semantisch gefaltet</text>
        <text x="110" y="54" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">model_reasoning_summary</text>
      </g>

      <!-- Neue Turns nach Compact -->
      <g transform="translate(880,0)">
        <rect x="0" y="0" width="90" height="60" rx="6" fill="#1e293b" stroke="#10b981"/>
        <text x="45" y="22" fill="#34d399" font-size="11" text-anchor="middle">Turn N+1</text>
        <text x="45" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="system-ui">weiter</text>
      </g>
      <g transform="translate(990,0)">
        <rect x="0" y="0" width="90" height="60" rx="6" fill="#1e293b" stroke="#10b981"/>
        <text x="45" y="22" fill="#34d399" font-size="11" text-anchor="middle">Turn N+2</text>
        <text x="45" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="system-ui">Refactor</text>
      </g>
    </g>
  </g>

  <!-- Bereich: Resume -->
  <g transform="translate(60,370)">
    <rect width="420" height="240" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="18" font-weight="700">Resume — Session zurückholen</text>
    <text x="20" y="58" fill="#94a3b8" font-size="12">Voller State inkl. Images, Diffs, Prompts</text>
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <text x="20" y="92" fill="#22d3ee">codex resume</text>
      <text x="180" y="92" fill="#cbd5e1" font-size="11" font-family="system-ui">Picker</text>
      <text x="20" y="116" fill="#22d3ee">codex resume --last</text>
      <text x="220" y="116" fill="#cbd5e1" font-size="11" font-family="system-ui">letzte Session</text>
      <text x="20" y="140" fill="#22d3ee">/resume</text>
      <text x="180" y="140" fill="#cbd5e1" font-size="11" font-family="system-ui">innerhalb TUI</text>
    </g>
    <rect x="20" y="160" width="380" height="66" rx="6" fill="#0b1220" stroke="#334155"/>
    <text x="32" y="182" fill="#e2e8f0" font-size="12" font-weight="700">Speicher</text>
    <text x="32" y="202" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">~/.codex/sessions/*.jsonl</text>
    <text x="32" y="218" fill="#94a3b8" font-size="11">Multi-Day-UI-Arbeit mit erhaltener Image-History</text>
  </g>

  <!-- Bereich: History / SQLite -->
  <g transform="translate(500,370)">
    <rect width="420" height="240" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="34" fill="#c4b5fd" font-size="18" font-weight="700">History — SQLite + Reverse-Search</text>
    <text x="20" y="58" fill="#94a3b8" font-size="12">Ctrl+R blättert rückwärts durch Prompts (seit v0.121.0)</text>
    <g font-family="'JetBrains Mono', monospace" font-size="12">
      <text x="20" y="90" fill="#c4b5fd">history.persistence = "save-all"</text>
      <text x="20" y="110" fill="#c4b5fd">history.max_bytes = 10_000_000</text>
    </g>
    <!-- kleine Reverse-Search-Demo -->
    <rect x="20" y="128" width="380" height="96" rx="6" fill="#0b1220" stroke="#a78bfa"/>
    <text x="32" y="150" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">(reverse-i-search)`tests`:</text>
    <text x="32" y="172" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', monospace">fix the failing tests in auth module</text>
    <text x="32" y="192" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">↑ Ctrl+R weiter · Enter übernehmen</text>
    <text x="32" y="212" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">→ Prompt wird geseedet im Composer</text>
  </g>

  <!-- Bereich: Title &amp; PR-Badges -->
  <g transform="translate(940,370)">
    <rect width="400" height="240" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#34d399" font-size="18" font-weight="700">Title &amp; PR-Badges</text>
    <text x="20" y="58" fill="#94a3b8" font-size="12">Wiederfinden von Sessions in IDE und TUI</text>
    <g transform="translate(20,80)">
      <rect width="360" height="40" rx="6" fill="#0b1220" stroke="#334155"/>
      <circle cx="24" cy="20" r="6" fill="#10b981"/>
      <text x="40" y="24" fill="#e2e8f0" font-size="12">Session "Auth-Refactor" · 12m · draft PR #412</text>
    </g>
    <g transform="translate(20,128)">
      <rect width="360" height="40" rx="6" fill="#0b1220" stroke="#334155"/>
      <circle cx="24" cy="20" r="6" fill="#6366f1"/>
      <text x="40" y="24" fill="#e2e8f0" font-size="12">Session "OAuth-Bug" · 3h · merged PR #401</text>
    </g>
    <g transform="translate(20,176)">
      <rect width="360" height="40" rx="6" fill="#0b1220" stroke="#334155"/>
      <circle cx="24" cy="20" r="6" fill="#f59e0b"/>
      <text x="40" y="24" fill="#e2e8f0" font-size="12">Session "Lint-Fix" · 2d · stale (open)</text>
    </g>
  </g>

  <!-- Unten: Kontext-Engineering -->
  <g transform="translate(60,640)">
    <rect width="1280" height="230" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="34" fill="#e2e8f0" font-size="18" font-weight="700">Kontext-Engineering-Strategien</text>
    <g transform="translate(20,60)">
      <rect width="400" height="150" rx="8" fill="#1e293b" stroke="#22d3ee"/>
      <text x="16" y="26" fill="#22d3ee" font-size="14" font-weight="700">1. Proaktives /compact</text>
      <text x="16" y="52" fill="#cbd5e1" font-size="12">Alle 5–8 Turns oder bei 60–70 %</text>
      <text x="16" y="70" fill="#cbd5e1" font-size="12">Kontext-Nutzung manuell ausführen.</text>
      <text x="16" y="96" fill="#94a3b8" font-size="11">Vorteil: Agent bleibt fokussiert,</text>
      <text x="16" y="112" fill="#94a3b8" font-size="11">spätere Turns haben Raum für Tools.</text>
      <text x="16" y="134" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">Trigger: /compact</text>
    </g>
    <g transform="translate(440,60)">
      <rect width="400" height="150" rx="8" fill="#1e293b" stroke="#a78bfa"/>
      <text x="16" y="26" fill="#c4b5fd" font-size="14" font-weight="700">2. /new für Kontextwechsel</text>
      <text x="16" y="52" fill="#cbd5e1" font-size="12">Wenn Task-Fokus wechselt,</text>
      <text x="16" y="70" fill="#cbd5e1" font-size="12">besser neu starten als zu compacten.</text>
      <text x="16" y="96" fill="#94a3b8" font-size="11">Alte Session bleibt über /resume</text>
      <text x="16" y="112" fill="#94a3b8" font-size="11">erreichbar.</text>
      <text x="16" y="134" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">Trigger: /new · /title</text>
    </g>
    <g transform="translate(860,60)">
      <rect width="400" height="150" rx="8" fill="#1e293b" stroke="#10b981"/>
      <text x="16" y="26" fill="#34d399" font-size="14" font-weight="700">3. Multi-Hour-Sessions</text>
      <text x="16" y="52" fill="#cbd5e1" font-size="12">Mit GPT-5.1-Codex-Max und</text>
      <text x="16" y="70" fill="#cbd5e1" font-size="12">5.3-Codex robust dank Compaction</text>
      <text x="16" y="88" fill="#cbd5e1" font-size="12">+ Reasoning-Summaries.</text>
      <text x="16" y="112" fill="#94a3b8" font-size="11">Kombi mit `/status` zur Kontrolle.</text>
      <text x="16" y="134" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">Trigger: /status · /compact</text>
    </g>
  </g>
</svg>
