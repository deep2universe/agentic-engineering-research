  <g transform="translate(40,820)">
    <text fill="#94a3b8" font-size="13" font-weight="600">Phasen-Farbfamilien:</text>
    <g transform="translate(170,-12)">
      <rect width="14" height="14" rx="3" fill="#a78bfa"/><text x="20" y="11" fill="#cbd5e1" font-size="12">Idee</text>
      <rect x="80" width="14" height="14" rx="3" fill="#818cf8"/><text x="100" y="11" fill="#cbd5e1" font-size="12">Setup</text>
      <rect x="170" width="14" height="14" rx="3" fill="#22d3ee"/><text x="190" y="11" fill="#cbd5e1" font-size="12">Design</text>
      <rect x="265" width="14" height="14" rx="3" fill="#6366f1"/><text x="285" y="11" fill="#cbd5e1" font-size="12">Impl</text>
      <rect x="345" width="14" height="14" rx="3" fill="#10b981"/><text x="365" y="11" fill="#cbd5e1" font-size="12">Test</text>
      <rect x="425" width="14" height="14" rx="3" fill="#14b8a6"/><text x="445" y="11" fill="#cbd5e1" font-size="12">Review</text>
      <rect x="515" width="14" height="14" rx="3" fill="#f59e0b"/><text x="535" y="11" fill="#cbd5e1" font-size="12">Doku</text>
      <rect x="595" width="14" height="14" rx="3" fill="#fb923c"/><text x="615" y="11" fill="#cbd5e1" font-size="12">Deploy</text>
      <rect x="685" width="14" height="14" rx="3" fill="#ef4444"/><text x="705" y="11" fill="#cbd5e1" font-size="12">Betrieb</text>
      <rect x="775" width="14" height="14" rx="3" fill="#fb7185"/><text x="795" y="11" fill="#cbd5e1" font-size="12">Wartung</text>
    </g>
    <text x="0" y="30" fill="#64748b" font-size="11">Linear lesbar — in der Praxis parallel: Branches, Cloud-Tasks, Reviews überlappen sich.</text>
  </g>
