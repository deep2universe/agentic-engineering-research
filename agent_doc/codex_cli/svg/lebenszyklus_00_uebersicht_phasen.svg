<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Übersicht der 10 Codex-CLI-Lebenszyklus-Phasen als Ringfluss</title>
  <desc>Ringförmige Wertschöpfungskette der zehn Phasen von Idee bis Wartung mit Codex-Feature und Modus, farbkodiert nach Phasenfamilie.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0"/>
      <stop offset="80%" stop-color="#1e293b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" fill="#e2e8f0" font-size="30" font-weight="700">Codex-CLI-Lebenszyklus — 10 Phasen als Ring</text>
  <text x="40" y="84" fill="#94a3b8" font-size="15">Wertschöpfungskette von Idee bis Wartung — jede Phase mit primärem Feature und Modus.</text>
  <text x="1360" y="56" fill="#94a3b8" font-size="14" text-anchor="end">Codex CLI · Übersicht 00</text>

  <g transform="translate(700,470)">
    <circle r="380" fill="url(#ringGlow)"/>
    <circle r="120" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text y="-18" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Lebenszyklus</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-size="14">Idee → Spec → Code</text>
    <text y="32" text-anchor="middle" fill="#94a3b8" font-size="14">→ Test → Deploy → Run</text>
    <text y="58" text-anchor="middle" fill="#a78bfa" font-size="13">Kontext-Engineering</text>

    <g transform="rotate(-90) translate(0,-300) rotate(90)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#a78bfa"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">1</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Idee &amp; Spec</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">--search · high reasoning</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI + Plan</text>
    </g>
    <g transform="rotate(-54) translate(0,-300) rotate(54)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#818cf8"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">2</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Setup</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">/init · AGENTS.md · Skills</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI</text>
    </g>
    <g transform="rotate(-18) translate(0,-300) rotate(18)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#22d3ee"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">3</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Design</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">Plan-Mode · ADR · Mermaid</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI + Cloud</text>
