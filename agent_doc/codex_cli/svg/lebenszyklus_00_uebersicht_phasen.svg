      <circle cx="-72" cy="-22" r="14" fill="#6366f1"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">4</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Implementierung</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">TDD · apply_patch · /diff</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI / IDE</text>
    </g>
    <g transform="rotate(54) translate(0,-300) rotate(-54)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#10b981"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">5</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Testen</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">Sandbox-Run · Playwright-MCP</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI + exec</text>
    </g>
    <g transform="rotate(90) translate(0,-300) rotate(-90)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#14b8a6"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">6</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Review</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">/review · Codex GH App</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI + Action</text>
    </g>
    <g transform="rotate(126) translate(0,-300) rotate(-126)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#f59e0b"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">7</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Doku</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">Skills · /docs · OpenAPI</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI</text>
    </g>
    <g transform="rotate(162) translate(0,-300) rotate(-162)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#fb923c"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">8</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Deployment</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">codex exec · Docker · Action</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: Action/Script</text>
    </g>
    <g transform="rotate(198) translate(0,-300) rotate(-198)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#ef4444"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">9</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Betrieb</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">Sentry/Grafana-MCP · Hotfix</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: TUI + MCP</text>
    </g>
    <g transform="rotate(234) translate(0,-300) rotate(-234)">
      <rect x="-95" y="-44" width="190" height="88" rx="12" fill="#1e293b" stroke="#fb7185" stroke-width="2"/>
      <circle cx="-72" cy="-22" r="14" fill="#fb7185"/>
      <text x="-72" y="-18" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">10</text>
      <text x="-50" y="-18" fill="#e2e8f0" font-size="14" font-weight="600">Wartung</text>
      <text x="-85" y="6" fill="#94a3b8" font-size="11">Cloud · Audit · Migration</text>
      <text x="-85" y="24" fill="#94a3b8" font-size="11">Modus: Cloud + TUI</text>
    </g>

    <g fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,4">
