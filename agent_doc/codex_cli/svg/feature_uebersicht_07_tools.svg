<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Tools des Codex-Agenten — Werkzeuggürtel mit acht Kategorien</title>
  <desc>Codex-Agent in der Mitte mit Werkzeuggürtel: File R/W/E, Shell Exec, Web Search, View Image, Apply Patch, Plan Mode, MCP Tools, Custom Tools. Jede Tool-Kategorie mit Icon, Kurzbeschreibung und Risiko/Approval-Hinweis.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">7. Tools — Werkzeuggürtel des Codex-Agenten</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Acht Tool-Kategorien: lesend und schreibend, lokal und remote. Jede Kategorie trägt ihr Approval-/Sandbox-Profil mit.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 7</text>

  <defs>
    <marker id="arr7" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Zentrum: Agent -->
  <g transform="translate(700,470)">
    <circle cx="0" cy="0" r="90" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
    <circle cx="0" cy="0" r="72" fill="#0f172a" stroke="#818cf8" stroke-width="1"/>
    <text x="0" y="-8" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Codex</text>
    <text x="0" y="14" fill="#818cf8" font-size="14" text-anchor="middle">Agent</text>
    <text x="0" y="34" fill="#94a3b8" font-size="11" text-anchor="middle">Tool-Dispatcher</text>
  </g>

  <!-- Hilfsfunktion: Tool-Karte -->
  <!-- Tool 1: File R/W/E -->
  <g transform="translate(60,140)">
    <rect width="300" height="140" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#6366f1"/>
      <path d="M6 8 h24 M6 16 h16 M6 24 h20" stroke="#818cf8" stroke-width="2"/>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">File R / W / E</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">Read, Write, Edit — primäre Tools</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12">Diff-Erzeugung intern,</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">Patch-Apply über `apply_patch`.</text>
    <text x="20" y="130" fill="#fbbf24" font-size="11" font-weight="700">Schreib-Tools: Approval abhängig von sandbox_mode</text>
  </g>

  <!-- Tool 2: Shell Exec -->
  <g transform="translate(380,140)">
    <rect width="300" height="140" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#f59e0b"/>
      <text x="18" y="24" fill="#fbbf24" font-size="14" text-anchor="middle" font-family="'JetBrains Mono', monospace">&gt;_</text>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">Shell Exec</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">Sandboxed Prozessstart</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12">stdout/stderr gestreamt,</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">Landlock/Seatbelt/bwrap Wrapper.</text>
    <text x="20" y="130" fill="#fbbf24" font-size="11" font-weight="700">Haupt-Gefahrvektor — strikt approval-gated</text>
  </g>

  <!-- Tool 3: Web Search -->
  <g transform="translate(700,140)">
    <rect width="300" height="140" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <g transform="translate(20,22)">
      <circle cx="18" cy="18" r="16" fill="#0f172a" stroke="#22d3ee"/>
      <circle cx="18" cy="18" r="10" fill="none" stroke="#22d3ee"/>
      <line x1="2" y1="18" x2="34" y2="18" stroke="#22d3ee"/>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">Web Search</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">Default cached, live via --search</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12" font-family="'JetBrains Mono', monospace">tools.web_search = {...}</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">Quellenangaben im Kontext.</text>
    <text x="20" y="130" fill="#22d3ee" font-size="11" font-weight="700">Kein Schreibzugriff — niedriges Risiko</text>
  </g>

  <!-- Tool 4: View Image -->
  <g transform="translate(1020,140)">
    <rect width="320" height="140" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#a78bfa"/>
      <circle cx="14" cy="14" r="3" fill="#a78bfa"/>
      <polyline points="6,28 16,18 22,24 30,14" fill="none" stroke="#a78bfa" stroke-width="2"/>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">View Image</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">Resolvable URL aus Image-Inputs</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12">Design-Review, Visual-Debugging</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">Full-Resolution-Inspection.</text>
    <text x="20" y="130" fill="#c4b5fd" font-size="11" font-weight="700">Image-History persistiert über resume</text>
  </g>

  <!-- Tool 5: Apply Patch -->
  <g transform="translate(60,740)">
    <rect width="300" height="140" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#6366f1"/>
      <text x="18" y="24" fill="#818cf8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono', monospace">+/-</text>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">Apply Patch</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">Unified-Diff-Format</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12">Konsistentes Protokoll für</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">LLM-gelieferte Edits.</text>
    <text x="20" y="130" fill="#818cf8" font-size="11" font-weight="700">Atomar, lesbar im Review</text>
  </g>

  <!-- Tool 6: Plan Mode -->
  <g transform="translate(380,740)">
    <rect width="300" height="140" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#10b981"/>
      <line x1="6" y1="10" x2="14" y2="10" stroke="#10b981" stroke-width="2"/>
      <line x1="18" y1="10" x2="30" y2="10" stroke="#34d399" stroke-width="2"/>
      <line x1="6" y1="20" x2="14" y2="20" stroke="#10b981" stroke-width="2"/>
      <line x1="18" y1="20" x2="28" y2="20" stroke="#34d399" stroke-width="2"/>
      <line x1="6" y1="30" x2="14" y2="30" stroke="#10b981" stroke-width="2"/>
      <line x1="18" y1="30" x2="26" y2="30" stroke="#34d399" stroke-width="2"/>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">Plan Mode / Todo</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">Agent pflegt eigene Task-Liste</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12" font-family="'JetBrains Mono', monospace">plan_mode_reasoning_effort</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">separat konfigurierbar.</text>
    <text x="20" y="130" fill="#34d399" font-size="11" font-weight="700">Planungs-Transparenz für Senior-Reviews</text>
  </g>

  <!-- Tool 7: MCP Tools -->
  <g transform="translate(700,740)">
    <rect width="300" height="140" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#22d3ee"/>
      <circle cx="12" cy="18" r="4" fill="#22d3ee"/>
      <circle cx="24" cy="10" r="3" fill="#22d3ee"/>
      <circle cx="24" cy="26" r="3" fill="#22d3ee"/>
      <line x1="12" y1="18" x2="24" y2="10" stroke="#22d3ee"/>
      <line x1="12" y1="18" x2="24" y2="26" stroke="#22d3ee"/>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">MCP-Tools</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">Fremde Server als Funktionen</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12">stdio + HTTP (ab v0.115),</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">Per-Tool-Approval-Mode.</text>
    <text x="20" y="130" fill="#22d3ee" font-size="11" font-weight="700">Unbegrenzt erweiterbar, vertrauensbasiert</text>
  </g>

  <!-- Tool 8: Custom Tools -->
  <g transform="translate(1020,740)">
    <rect width="320" height="140" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#a78bfa"/>
      <path d="M8 18 L18 8 L28 18 L18 28 Z" fill="none" stroke="#a78bfa" stroke-width="2"/>
    </g>
    <text x="70" y="40" fill="#e2e8f0" font-size="16" font-weight="700">Custom Tools</text>
    <text x="70" y="58" fill="#94a3b8" font-size="11">via [tools]-Namespace in config.toml</text>
    <text x="20" y="92" fill="#cbd5e1" font-size="12">Eigene Funktionen registrieren,</text>
    <text x="20" y="110" fill="#cbd5e1" font-size="12">z. B. Datenbank-Abfragen.</text>
    <text x="20" y="130" fill="#c4b5fd" font-size="11" font-weight="700">Opt-in — bewusster Engineering-Hebel</text>
  </g>

  <!-- Verbindungen Agent -> Tools (Gürtel-Metapher) -->
  <g stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arr7)">
    <line x1="610" y1="470" x2="370" y2="210"/>
    <line x1="620" y1="480" x2="680" y2="210"/>
    <line x1="660" y1="400" x2="840" y2="210"/>
    <line x1="760" y1="410" x2="1150" y2="210"/>
    <line x1="620" y1="480" x2="370" y2="740"/>
    <line x1="660" y1="530" x2="530" y2="740"/>
    <line x1="720" y1="560" x2="830" y2="740"/>
    <line x1="780" y1="520" x2="1150" y2="740"/>
  </g>

  <!-- Mitte-Legende -->
  <g transform="translate(460,400)">
    <rect width="480" height="140" rx="12" fill="#0b1220" stroke="#334155" opacity="0.0"/>
  </g>

  <!-- Unten-Mitte: Tool-Wahl-Heuristik -->
  <g transform="translate(330,320)">
    <rect width="740" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="700">Tool-Wahl-Heuristik (Senior-Level)</text>
    <text x="20" y="50" fill="#cbd5e1" font-size="12">Lesen vor Schreiben · Patch vor Overwrite · Plan vor Ausführung · MCP vor Custom-Tool wenn Standard-Server existiert.</text>
  </g>

  <!-- Legende Risiko -->
  <g transform="translate(60,310)">
    <rect width="220" height="80" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="14" y="22" fill="#e2e8f0" font-size="13" font-weight="700">Risiko-Farbcode</text>
    <rect x="14" y="32" width="12" height="12" fill="#10b981"/>
    <text x="34" y="42" fill="#cbd5e1" font-size="11">niedrig (Read/Plan)</text>
    <rect x="14" y="48" width="12" height="12" fill="#f59e0b"/>
    <text x="34" y="58" fill="#cbd5e1" font-size="11">mittel (Write/Apply)</text>
    <rect x="14" y="64" width="12" height="12" fill="#ef4444"/>
    <text x="34" y="74" fill="#cbd5e1" font-size="11">hoch (Shell/Net)</text>
  </g>

  <g transform="translate(1120,310)">
    <rect width="220" height="80" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="14" y="22" fill="#e2e8f0" font-size="13" font-weight="700">Config-Hebel</text>
    <text x="14" y="40" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">tools.web_search</text>
    <text x="14" y="56" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">tools.&lt;name&gt;.approval_mode</text>
    <text x="14" y="72" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">mcp_servers.*</text>
  </g>
</svg>
