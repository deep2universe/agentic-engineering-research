<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Tools-Block — Werkzeugregal mit Schaltern</title>
  <desc>Tools-Block als Werkzeugregal mit web_search, apply_patch, view_image und shell inklusive Config-Reglern.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">Tools-Block — das Werkzeugregal</text>
  <text x="60" y="92" fill="#94a3b8" font-size="16">[tools]-Sektion steuert eingebaute Codex-Werkzeuge. Jedes Tool hat eigene Config-Regler.</text>
  <text x="1340" y="60" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §8</text>

  <!-- Regalrahmen -->
  <rect x="60" y="130" width="1280" height="720" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="158" fill="#94a3b8" font-size="13" font-weight="600">[tools] · Werkzeugregal</text>

  <!-- Regal-Linien -->
  <line x1="60" y1="490" x2="1340" y2="490" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Tool 1: web_search (oben links) -->
  <g>
    <rect x="90" y="180" width="610" height="290" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="90" y="180" width="610" height="48" rx="14" fill="#22d3ee" opacity="0.2"/>
    <circle cx="118" cy="204" r="9" fill="#22d3ee"/>
    <text x="140" y="210" fill="#e2e8f0" font-size="18" font-weight="700">tools.web_search</text>
    <text x="680" y="210" fill="#94a3b8" font-size="12" text-anchor="end">Websuche · RAG</text>

    <text x="110" y="260" fill="#94a3b8" font-size="13">enabled</text>
    <rect x="260" y="244" width="56" height="28" rx="14" fill="#10b981"/>
    <circle cx="302" cy="258" r="11" fill="#0f172a"/>
    <text x="336" y="263" fill="#10b981" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">true</text>

    <text x="110" y="312" fill="#94a3b8" font-size="13">mode</text>
    <g>
      <rect x="260" y="296" width="120" height="28" rx="14" fill="#6366f1"/>
      <text x="320" y="315" fill="#0f172a" font-size="13" text-anchor="middle" font-weight="700">cached</text>
      <rect x="390" y="296" width="120" height="28" rx="14" fill="#0f172a" stroke="#334155"/>
      <text x="450" y="315" fill="#94a3b8" font-size="13" text-anchor="middle">live</text>
    </g>
    <text x="110" y="370" fill="#94a3b8" font-size="12">cached — deterministisch, schneller, günstiger</text>
    <text x="110" y="390" fill="#94a3b8" font-size="12">live — aktuelle Web-Ergebnisse (höhere Latenz)</text>

    <rect x="110" y="412" width="560" height="40" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="130" y="438" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">[tools.web_search]  enabled = true  mode = "cached"</text>
  </g>

  <!-- Tool 2: apply_patch (oben rechts) -->
  <g>
    <rect x="720" y="180" width="590" height="290" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="720" y="180" width="590" height="48" rx="14" fill="#6366f1" opacity="0.2"/>
    <circle cx="748" cy="204" r="9" fill="#6366f1"/>
    <text x="770" y="210" fill="#e2e8f0" font-size="18" font-weight="700">tools.apply_patch</text>
    <text x="1290" y="210" fill="#94a3b8" font-size="12" text-anchor="end">Datei-Edits · Diffs</text>

    <text x="740" y="260" fill="#94a3b8" font-size="13">enabled</text>
    <rect x="890" y="244" width="56" height="28" rx="14" fill="#10b981"/>
    <circle cx="932" cy="258" r="11" fill="#0f172a"/>
    <text x="966" y="263" fill="#10b981" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">true</text>

    <text x="740" y="308" fill="#94a3b8" font-size="13">Funktion</text>
    <text x="740" y="332" fill="#e2e8f0" font-size="13">· strukturierte Datei-Edits via Diff-Format</text>
    <text x="740" y="354" fill="#e2e8f0" font-size="13">· deterministisch · auditierbar</text>
    <text x="740" y="376" fill="#e2e8f0" font-size="13">· Alternative zu Shell-Heredocs</text>

    <rect x="740" y="412" width="550" height="40" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="760" y="438" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">[tools.apply_patch]  enabled = true</text>
  </g>

  <!-- Tool 3: view_image (unten links) -->
  <g>
    <rect x="90" y="510" width="610" height="310" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <rect x="90" y="510" width="610" height="48" rx="14" fill="#a78bfa" opacity="0.2"/>
    <circle cx="118" cy="534" r="9" fill="#a78bfa"/>
    <text x="140" y="540" fill="#e2e8f0" font-size="18" font-weight="700">tools.view_image</text>
    <text x="680" y="540" fill="#94a3b8" font-size="12" text-anchor="end">Bild-Analyse · Multimodal</text>

    <text x="110" y="590" fill="#94a3b8" font-size="13">enabled</text>
    <rect x="260" y="574" width="56" height="28" rx="14" fill="#10b981"/>
    <circle cx="302" cy="588" r="11" fill="#0f172a"/>
    <text x="336" y="593" fill="#10b981" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">true</text>

    <text x="110" y="642" fill="#94a3b8" font-size="13">Use-Cases</text>
    <text x="110" y="666" fill="#e2e8f0" font-size="13">· Screenshots analysieren (UI-Bugs, Mock-ups)</text>
    <text x="110" y="688" fill="#e2e8f0" font-size="13">· Whiteboard-Fotos transkribieren</text>
    <text x="110" y="710" fill="#e2e8f0" font-size="13">· Architektur-Diagramme interpretieren</text>
    <text x="110" y="732" fill="#94a3b8" font-size="12">benötigt multimodales Modell (gpt-5.x-codex)</text>

    <rect x="110" y="762" width="560" height="40" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="130" y="788" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">[tools.view_image]  enabled = true</text>
  </g>

  <!-- Tool 4: shell (unten rechts) -->
  <g>
    <rect x="720" y="510" width="590" height="310" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="720" y="510" width="590" height="48" rx="14" fill="#f59e0b" opacity="0.2"/>
    <circle cx="748" cy="534" r="9" fill="#f59e0b"/>
    <text x="770" y="540" fill="#e2e8f0" font-size="18" font-weight="700">tools.shell</text>
    <text x="1290" y="540" fill="#94a3b8" font-size="12" text-anchor="end">Kommando-Ausführung</text>

    <text x="740" y="590" fill="#94a3b8" font-size="13">enabled</text>
    <rect x="890" y="574" width="56" height="28" rx="14" fill="#10b981"/>
    <circle cx="932" cy="588" r="11" fill="#0f172a"/>

    <text x="740" y="642" fill="#94a3b8" font-size="13">max_output_bytes</text>
    <rect x="890" y="624" width="300" height="28" rx="6" fill="#0f172a" stroke="#f59e0b"/>
    <text x="904" y="644" fill="#f59e0b" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">1 048 576</text>
    <text x="1200" y="644" fill="#94a3b8" font-size="11">= 1 MiB · schützt Context vor Log-Fluten</text>

    <text x="740" y="688" fill="#94a3b8" font-size="13">Truncation</text>
    <text x="740" y="712" fill="#e2e8f0" font-size="13">→ Überlange stdout werden abgeschnitten</text>
    <text x="740" y="734" fill="#e2e8f0" font-size="13">→ Token-Explosion bei <tspan font-family="'JetBrains Mono', ui-monospace, monospace">npm test</tspan> vermeiden</text>

    <rect x="740" y="762" width="550" height="40" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="760" y="788" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">[tools.shell]  max_output_bytes = 1048576</text>
  </g>
</svg>
