<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Codex CLI – Beispiel-Setup: Codex + Slack + GitHub + Playwright</title>
  <desc>Verkabeltes Architektur-Setup mit ~/.codex/config.toml: Notify-Hook für Slack, MCP-Server github und playwright (default approval never), Profil ci. Beispiel-Prompt: Issue lesen, Bug reproduzieren, fixen, PR öffnen, Slack-Message.</desc>

  <defs>
    <marker id="arrSet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" font-size="30" font-weight="700" fill="#e2e8f0">Beispiel-Setup · Codex + Slack + GitHub + Playwright</text>
  <text x="40" y="84" font-size="15" fill="#94a3b8">Verkabeltes Architektur-Setup mit ~/.codex/config.toml und einem Issue-zu-PR-Workflow</text>
  <text x="1360" y="56" font-size="14" fill="#64748b" text-anchor="end">Codex CLI · Kapitel 9</text>

  <!-- Linke Hälfte: config.toml -->
  <rect x="40" y="120" width="640" height="540" rx="14" ry="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="60" y="148" font-size="18" font-weight="700" fill="#a5b4fc">~/.codex/config.toml</text>
  <text x="60" y="170" font-size="12" fill="#94a3b8">eine Datei verkabelt vier Bausteine</text>

  <!-- Block: Defaults -->
  <rect x="60" y="186" width="600" height="76" rx="10" fill="#0b1224" stroke="#475569"/>
  <text x="76" y="208" font-size="12" fill="#94a3b8"># Defaults</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
    <text x="76" y="228" fill="#a5b4fc">model</text>
    <text x="156" y="228" fill="#cbd5e1">= "gpt-5.3-codex"</text>
    <text x="76" y="246" fill="#a5b4fc">approval_policy</text>
    <text x="216" y="246" fill="#cbd5e1">= "on-request"</text>
  </g>

  <!-- Block: Sandbox + Notify -->
  <rect x="60" y="270" width="600" height="76" rx="10" fill="#0b1224" stroke="#f59e0b"/>
  <text x="76" y="292" font-size="12" fill="#fbbf24"># Sandbox + Slack-Notify</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
    <text x="76" y="312" fill="#a5b4fc">sandbox_mode</text>
    <text x="216" y="312" fill="#cbd5e1">= "workspace-write"</text>
    <text x="76" y="330" fill="#a5b4fc">notify</text>
    <text x="156" y="330" fill="#cbd5e1">= ["/home/alice/.codex/notify_slack.sh"]</text>
  </g>

  <!-- Block: GitHub MCP -->
  <rect x="60" y="354" width="600" height="92" rx="10" fill="#0b1224" stroke="#a78bfa"/>
  <text x="76" y="376" font-size="12" fill="#c4b5fd"># GitHub MCP</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
    <text x="76" y="396" fill="#c4b5fd">[mcp_servers.github]</text>
    <text x="76" y="414" fill="#a5b4fc">command</text>
    <text x="166" y="414" fill="#cbd5e1">= "npx"</text>
    <text x="76" y="432" fill="#a5b4fc">args</text>
    <text x="142" y="432" fill="#cbd5e1">= ["-y","@modelcontextprotocol/server-github"]</text>
  </g>
  <text x="60" y="448" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">env = { GITHUB_TOKEN = "${env:GITHUB_TOKEN}" }</text>

  <!-- Block: Playwright MCP -->
  <rect x="60" y="466" width="600" height="92" rx="10" fill="#0b1224" stroke="#10b981"/>
  <text x="76" y="488" font-size="12" fill="#6ee7b7"># Playwright MCP · Browser-Klicks immer erlauben</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
    <text x="76" y="508" fill="#6ee7b7">[mcp_servers.playwright]</text>
    <text x="76" y="526" fill="#a5b4fc">command</text>
    <text x="166" y="526" fill="#cbd5e1">= "npx"</text>
    <text x="76" y="544" fill="#a5b4fc">args</text>
    <text x="142" y="544" fill="#cbd5e1">= ["@playwright/mcp@latest"]</text>
  </g>
  <text x="60" y="560" font-size="11" fill="#fbbf24" font-family="'JetBrains Mono', ui-monospace, monospace">default_tools_approval_mode = "never"</text>

  <!-- Block: Profile CI -->
  <rect x="60" y="578" width="600" height="74" rx="10" fill="#0b1224" stroke="#22d3ee"/>
  <text x="76" y="600" font-size="12" fill="#67e8f9"># Profil ci · readonly + keine Pings</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
    <text x="76" y="620" fill="#67e8f9">[profiles.ci]</text>
    <text x="76" y="638" fill="#a5b4fc">approval_policy = </text>
    <text x="240" y="638" fill="#cbd5e1">"never" </text>
    <text x="320" y="638" fill="#a5b4fc">sandbox_mode = </text>
    <text x="465" y="638" fill="#cbd5e1">"read-only" </text>
    <text x="76" y="656" fill="#a5b4fc">notify = </text>
    <text x="160" y="656" fill="#cbd5e1">[]</text>
  </g>

  <!-- Rechte Hälfte: Verkabelung & Prompt -->
  <!-- Codex CLI Hub -->
  <rect x="740" y="120" width="240" height="100" rx="12" ry="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="860" y="148" font-size="16" font-weight="700" fill="#a5b4fc" text-anchor="middle">Codex CLI</text>
  <text x="860" y="170" font-size="12" fill="#cbd5e1" text-anchor="middle">gpt-5.3-codex · workspace-write</text>
  <text x="860" y="190" font-size="11" fill="#94a3b8" text-anchor="middle">approval: on-request</text>
  <text x="860" y="208" font-size="11" fill="#94a3b8" text-anchor="middle">profile: default | ci</text>

  <!-- Notify -->
  <rect x="1040" y="120" width="320" height="100" rx="12" ry="12" fill="#1e293b" stroke="#f59e0b"/>
  <text x="1200" y="148" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">Slack-Notify</text>
  <text x="1200" y="170" font-size="12" fill="#cbd5e1" text-anchor="middle">notify_slack.sh · agent-turn-complete</text>
  <text x="1200" y="190" font-size="11" fill="#94a3b8" text-anchor="middle">chat.postMessage · #codex-runs</text>
  <text x="1200" y="208" font-size="11" fill="#94a3b8" text-anchor="middle">JSON-Payload via stdin</text>

  <!-- GitHub MCP -->
  <rect x="740" y="240" width="280" height="100" rx="12" ry="12" fill="#1e293b" stroke="#a78bfa"/>
  <text x="880" y="268" font-size="16" font-weight="700" fill="#c4b5fd" text-anchor="middle">GitHub MCP</text>
  <text x="880" y="290" font-size="12" fill="#cbd5e1" text-anchor="middle">@modelcontextprotocol/server-github</text>
  <text x="880" y="310" font-size="11" fill="#94a3b8" text-anchor="middle">env: GITHUB_TOKEN</text>
  <text x="880" y="328" font-size="11" fill="#94a3b8" text-anchor="middle">issues · pulls · comments</text>

  <!-- Playwright MCP -->
  <rect x="1040" y="240" width="320" height="100" rx="12" ry="12" fill="#1e293b" stroke="#10b981"/>
  <text x="1200" y="268" font-size="16" font-weight="700" fill="#6ee7b7" text-anchor="middle">Playwright MCP</text>
  <text x="1200" y="290" font-size="12" fill="#cbd5e1" text-anchor="middle">@playwright/mcp@latest · approval never</text>
  <text x="1200" y="310" font-size="11" fill="#94a3b8" text-anchor="middle">browse · click · screenshot</text>
  <text x="1200" y="328" font-size="11" fill="#94a3b8" text-anchor="middle">E2E-Repro im Hintergrund</text>

  <!-- Verkabelung -->
  <path d="M860 220 L 860 240" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrSet)"/>
  <path d="M980 170 L 1040 170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrSet)"/>
  <path d="M980 220 L 1040 290" stroke="#10b981" stroke-width="2" marker-end="url(#arrSet)"/>

  <!-- Beispiel-Prompt -->
  <rect x="740" y="360" width="620" height="160" rx="12" ry="12" fill="#1e293b" stroke="#22d3ee"/>
  <text x="760" y="388" font-size="16" font-weight="700" fill="#67e8f9">Beispiel-Prompt</text>
  <text x="760" y="408" font-size="12" fill="#94a3b8">Issue lesen → Bug reproduzieren → Fix → PR → Slack-Message</text>

  <rect x="760" y="420" width="580" height="84" rx="8" fill="#0b1224" stroke="#475569"/>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12">
    <text x="776" y="440" fill="#cbd5e1">Use the GitHub MCP to read issue #142,</text>
    <text x="776" y="458" fill="#cbd5e1">reproduce the bug with Playwright,</text>
    <text x="776" y="476" fill="#cbd5e1">fix it, add a regression test, and open a PR.</text>
    <text x="776" y="494" fill="#cbd5e1">Post a Slack message when done.</text>
  </g>

  <!-- Workflow-Pipeline -->
  <rect x="740" y="540" width="620" height="320" rx="12" ry="12" fill="#1e293b" stroke="#334155"/>
  <text x="760" y="568" font-size="16" font-weight="700" fill="#e2e8f0">Workflow im Detail</text>

  <g font-size="12">
    <!-- Schritt 1 -->
    <circle cx="780" cy="610" r="18" fill="#312e81" stroke="#a5b4fc"/>
    <text x="780" y="615" text-anchor="middle" font-size="13" font-weight="700" fill="#a5b4fc">1</text>
    <text x="810" y="608" font-weight="600" fill="#e2e8f0">Issue lesen</text>
    <text x="810" y="624" fill="#94a3b8">github.get_issue("repo", 142) → Title, Body, Labels</text>

    <!-- Schritt 2 -->
    <circle cx="780" cy="652" r="18" fill="#064e3b" stroke="#6ee7b7"/>
    <text x="780" y="657" text-anchor="middle" font-size="13" font-weight="700" fill="#6ee7b7">2</text>
    <text x="810" y="650" font-weight="600" fill="#e2e8f0">Bug reproduzieren</text>
    <text x="810" y="666" fill="#94a3b8">playwright.launch → repro flow → screenshot</text>

    <!-- Schritt 3 -->
    <circle cx="780" cy="694" r="18" fill="#3b0764" stroke="#c4b5fd"/>
    <text x="780" y="699" text-anchor="middle" font-size="13" font-weight="700" fill="#c4b5fd">3</text>
    <text x="810" y="692" font-weight="600" fill="#e2e8f0">Fix umsetzen</text>
    <text x="810" y="708" fill="#94a3b8">apply_patch · workspace-write · approval on-request</text>

    <!-- Schritt 4 -->
    <circle cx="780" cy="736" r="18" fill="#312e81" stroke="#a5b4fc"/>
    <text x="780" y="741" text-anchor="middle" font-size="13" font-weight="700" fill="#a5b4fc">4</text>
    <text x="810" y="734" font-weight="600" fill="#e2e8f0">Regression-Test</text>
    <text x="810" y="750" fill="#94a3b8">tests/checkout.spec.ts erweitern · pnpm test</text>

    <!-- Schritt 5 -->
    <circle cx="780" cy="778" r="18" fill="#3b0764" stroke="#c4b5fd"/>
    <text x="780" y="783" text-anchor="middle" font-size="13" font-weight="700" fill="#c4b5fd">5</text>
    <text x="810" y="776" font-weight="600" fill="#e2e8f0">PR öffnen</text>
    <text x="810" y="792" fill="#94a3b8">github.create_pull_request("fix #142") · Reviewer</text>

    <!-- Schritt 6 -->
    <circle cx="780" cy="820" r="18" fill="#451a03" stroke="#fbbf24"/>
    <text x="780" y="825" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">6</text>
    <text x="810" y="818" font-weight="600" fill="#e2e8f0">Slack-Message</text>
    <text x="810" y="834" fill="#94a3b8">notify_slack.sh erhält JSON · postet "PR #143 ready"</text>
  </g>

  <!-- Verbindungslinien (config -> hub) -->
  <path d="M680 386 Q 720 320, 740 220" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="710" y="350" font-size="10" fill="#67e8f9" text-anchor="middle">lädt</text>
</svg>
