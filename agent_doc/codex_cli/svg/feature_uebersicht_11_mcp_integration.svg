<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>MCP-Integration — Codex als Client und als Server, bidirektionaler Bus</title>
  <desc>Codex in der Mitte als Stecker-Hub, links Client-Rolle (stdio/HTTP-Server werden angebunden), rechts Server-Rolle (codex mcp serve). Approval-Tor pro Tool, parallele Tool-Calls.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">11. MCP-Integration — bidirektionaler Stecker</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Codex ist Client UND Server zugleich. Per-Tool-Approval, Parallel-Tool-Calls, stdio + HTTP-Transport.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 11</text>

  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrL" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M10,0 L0,5 L10,10 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Codex-Hub in der Mitte -->
  <g transform="translate(700,470)">
    <rect x="-130" y="-90" width="260" height="180" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
    <rect x="-120" y="-80" width="240" height="30" rx="6" fill="#6366f1" opacity="0.3"/>
    <text x="0" y="-60" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Codex CLI</text>
    <text x="0" y="-30" fill="#818cf8" font-size="12" text-anchor="middle">MCP-Hub</text>
    <text x="0" y="-6" fill="#cbd5e1" font-size="11" text-anchor="middle">Client + Server</text>

    <!-- Approval-Tor in der Mitte -->
    <g transform="translate(0,30)">
      <rect x="-100" y="-16" width="200" height="44" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
      <text x="0" y="6" fill="#fbbf24" font-size="12" text-anchor="middle" font-weight="700">Per-Tool Approval</text>
      <text x="0" y="22" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">tools.&lt;name&gt;.approval_mode</text>
    </g>
  </g>

  <!-- Client-Seite (links) -->
  <g transform="translate(60,140)">
    <rect width="500" height="660" rx="12" fill="#0b1220" stroke="#22d3ee" stroke-width="2"/>
    <rect x="0" y="0" width="500" height="40" rx="12" fill="#22d3ee" opacity="0.2"/>
    <text x="20" y="26" fill="#22d3ee" font-size="16" font-weight="700">Codex als MCP-CLIENT</text>
    <text x="20" y="64" fill="#94a3b8" font-size="12">Bindet fremde MCP-Server als Tools ein</text>

    <!-- Transport-Hinweis -->
    <g transform="translate(20,84)">
      <rect width="460" height="60" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" fill="#e2e8f0" font-size="12" font-weight="700">Transport</text>
      <text x="12" y="40" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">stdio (Child-Prozess) · HTTP (ab v0.115)</text>
      <text x="12" y="54" fill="#94a3b8" font-size="11">HTTP ermöglicht Remote-Server-Konsum über Netzwerk.</text>
    </g>

    <!-- Config-Snippet -->
    <g transform="translate(20,156)">
      <rect width="460" height="130" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" fill="#e2e8f0" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">~/.codex/config.toml</text>
      <g font-family="'JetBrains Mono', monospace" font-size="11">
        <text x="12" y="46" fill="#c4b5fd">[mcp_servers.sequential_thinking]</text>
        <text x="12" y="62" fill="#cbd5e1">command = "npx"</text>
        <text x="12" y="78" fill="#cbd5e1">args = ["-y", "@modelcontextprotocol/..."]</text>
        <text x="12" y="98" fill="#c4b5fd">[mcp_servers.github]</text>
        <text x="12" y="114" fill="#cbd5e1">url = "https://mcp.github.example"</text>
      </g>
    </g>

    <!-- Fremde Server -->
    <g transform="translate(20,304)">
      <text x="0" y="20" fill="#e2e8f0" font-size="13" font-weight="700">Angebundene Server (Beispiele)</text>
      <g transform="translate(0,30)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#a78bfa"/>
        <text x="14" y="22" fill="#c4b5fd" font-size="12" font-weight="700">github-mcp</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">PRs, Issues, Search</text>
        <text x="14" y="54" fill="#94a3b8" font-size="10">HTTP · OAuth</text>
      </g>
      <g transform="translate(240,30)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#a78bfa"/>
        <text x="14" y="22" fill="#c4b5fd" font-size="12" font-weight="700">filesystem-mcp</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">secure file ops</text>
        <text x="14" y="54" fill="#94a3b8" font-size="10">stdio · local</text>
      </g>
      <g transform="translate(0,100)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#a78bfa"/>
        <text x="14" y="22" fill="#c4b5fd" font-size="12" font-weight="700">postgres-mcp</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">SQL-Queries</text>
        <text x="14" y="54" fill="#94a3b8" font-size="10">stdio · sandboxed</text>
      </g>
      <g transform="translate(240,100)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#a78bfa"/>
        <text x="14" y="22" fill="#c4b5fd" font-size="12" font-weight="700">slack-mcp</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">Channels, Search, Post</text>
        <text x="14" y="54" fill="#94a3b8" font-size="10">HTTP · token</text>
      </g>
      <g transform="translate(0,170)">
        <rect width="460" height="60" rx="6" fill="#1e293b" stroke="#a78bfa"/>
        <text x="14" y="22" fill="#c4b5fd" font-size="12" font-weight="700">seq-thinking, memory, figma, ...</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">beliebig viele Community-Server</text>
      </g>
    </g>

    <!-- Parallel-Tool-Calls -->
    <g transform="translate(20,542)">
      <rect width="460" height="96" rx="6" fill="#1e293b" stroke="#10b981"/>
      <text x="12" y="22" fill="#34d399" font-size="13" font-weight="700">Parallel-Tool-Calls</text>
      <text x="12" y="42" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">supports_parallel_tool_calls = true</text>
      <text x="12" y="62" fill="#cbd5e1" font-size="11">Mehrere unabhängige Tool-Aufrufe gleichzeitig —</text>
      <text x="12" y="78" fill="#cbd5e1" font-size="11">Latenz-Gewinn bei I/O-gebundenen Tasks.</text>
    </g>
  </g>

  <!-- Server-Seite (rechts) -->
  <g transform="translate(840,140)">
    <rect width="500" height="660" rx="12" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="500" height="40" rx="12" fill="#10b981" opacity="0.2"/>
    <text x="20" y="26" fill="#34d399" font-size="16" font-weight="700">Codex als MCP-SERVER</text>
    <text x="20" y="64" fill="#94a3b8" font-size="12">Exponiert sich andere Agenten (Claude, Cursor, Custom)</text>

    <g transform="translate(20,84)">
      <rect width="460" height="60" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="24" fill="#e2e8f0" font-size="13" font-weight="700" font-family="'JetBrains Mono', monospace">codex mcp serve</text>
      <text x="12" y="46" fill="#94a3b8" font-size="11">Startet MCP-Server; andere Agenten sprechen Codex an.</text>
    </g>

    <g transform="translate(20,156)">
      <rect width="460" height="120" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="12" y="22" fill="#e2e8f0" font-size="12" font-weight="700">Exponierte Tools (Auswahl)</text>
      <g font-family="'JetBrains Mono', monospace" font-size="11">
        <text x="12" y="46" fill="#34d399">codex.plan</text>
        <text x="190" y="46" fill="#cbd5e1" font-family="system-ui" font-size="11">Planungs-Mode auslösen</text>
        <text x="12" y="66" fill="#34d399">codex.exec</text>
        <text x="190" y="66" fill="#cbd5e1" font-family="system-ui" font-size="11">Headless-Task starten</text>
        <text x="12" y="86" fill="#34d399">codex.review</text>
        <text x="190" y="86" fill="#cbd5e1" font-family="system-ui" font-size="11">Working-Tree reviewen</text>
        <text x="12" y="106" fill="#34d399">codex.search</text>
        <text x="190" y="106" fill="#cbd5e1" font-family="system-ui" font-size="11">Web-Search delegieren</text>
      </g>
    </g>

    <g transform="translate(20,288)">
      <text x="0" y="20" fill="#e2e8f0" font-size="13" font-weight="700">Consumer-Agenten (Beispiele)</text>
      <g transform="translate(0,30)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="14" y="22" fill="#818cf8" font-size="12" font-weight="700">Claude Code</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">nutzt codex.review</text>
      </g>
      <g transform="translate(240,30)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="14" y="22" fill="#818cf8" font-size="12" font-weight="700">Cursor</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">nutzt codex.exec</text>
      </g>
      <g transform="translate(0,100)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="14" y="22" fill="#818cf8" font-size="12" font-weight="700">Custom Agent</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">orchestriert mehrere Codexe</text>
      </g>
      <g transform="translate(240,100)">
        <rect width="220" height="60" rx="6" fill="#1e293b" stroke="#6366f1"/>
        <text x="14" y="22" fill="#818cf8" font-size="12" font-weight="700">CI-Bot</text>
        <text x="14" y="42" fill="#cbd5e1" font-size="11">reviewt PRs automatisch</text>
      </g>
    </g>

    <!-- Use-Case -->
    <g transform="translate(20,472)">
      <rect width="460" height="166" rx="6" fill="#1e293b" stroke="#22d3ee"/>
      <text x="12" y="24" fill="#22d3ee" font-size="13" font-weight="700">Typischer Orchestrierungs-Use-Case</text>
      <text x="12" y="48" fill="#cbd5e1" font-size="11">1. Master-Agent erhält Feature-Request</text>
      <text x="12" y="66" fill="#cbd5e1" font-size="11">2. Delegiert Code-Änderung an codex.exec</text>
      <text x="12" y="84" fill="#cbd5e1" font-size="11">3. Parallel: codex.review prüft Diff</text>
      <text x="12" y="102" fill="#cbd5e1" font-size="11">4. github-mcp öffnet PR</text>
      <text x="12" y="120" fill="#cbd5e1" font-size="11">5. slack-mcp benachrichtigt Reviewer</text>
      <text x="12" y="144" fill="#94a3b8" font-size="11">→ Multi-Agent ohne menschlichen Dispatcher</text>
    </g>
  </g>

  <!-- Pfeile Hub -->
  <g>
    <line x1="560" y1="470" x2="570" y2="470" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrR)"/>
    <line x1="830" y1="470" x2="840" y2="470" stroke="#10b981" stroke-width="3" marker-end="url(#arrR)"/>
    <line x1="570" y1="500" x2="560" y2="500" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrL)"/>
    <line x1="840" y1="500" x2="830" y2="500" stroke="#10b981" stroke-width="3" marker-end="url(#arrL)"/>
  </g>

  <!-- unten Legende -->
  <g transform="translate(60,830)">
    <rect width="1280" height="50" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="30" fill="#cbd5e1" font-size="12">Approval-Hinweis: Jedes MCP-Tool erbt `approval_mode`; `never` nur für read-only/vertrauenswürdige Server; Secrets über ENV, nicht in config.toml hardcoden.</text>
  </g>
</svg>
