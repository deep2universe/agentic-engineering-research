<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>AGENTS.md — Leuchtturm mit Anweisungs-Ebenen</title>
  <desc>Struktur-Sektionen, Precedence-Hierarchie (override > main > fallback, nächste zu cwd gewinnt) und 32-KiB-Limit.</desc>
