<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Model Providers — Codex als Zentrum einer Provider-Galaxie</title>
  <desc>Sonnensystem mit Codex in der Mitte und Satelliten OpenAI, Azure, Anthropic, OpenRouter, Morph, Ollama, LM Studio; Wire-API-farbcodiert.</desc>
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
    <marker id="arr04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">Model Providers — Galaxie um den Codex-Kern</text>
  <text x="60" y="92" fill="#94a3b8" font-size="16">Built-in: openai · ollama · lmstudio. Custom-IDs beliebig. Wire-API: responses vs. chat.</text>
  <text x="1340" y="60" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §4</text>

  <!-- Umlaufbahnen -->
  <circle cx="700" cy="480" r="180" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="700" cy="480" r="300" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- Zentrum: Codex -->
  <circle cx="700" cy="480" r="90" fill="url(#sunGrad)"/>
  <circle cx="700" cy="480" r="90" fill="none" stroke="#818cf8" stroke-width="2"/>
  <text x="700" y="472" fill="#0f172a" font-size="22" font-weight="800" text-anchor="middle">Codex</text>
  <text x="700" y="498" fill="#0f172a" font-size="13" font-weight="600" text-anchor="middle">model_provider =</text>
  <text x="700" y="515" fill="#0f172a" font-size="13" font-weight="700" text-anchor="middle">&lt;id&gt;</text>

  <!-- Planet 1: OpenAI (responses, built-in) -->
  <g>
    <circle cx="700" cy="180" r="56" fill="#1e293b" stroke="#6366f1" stroke-width="2.5"/>
    <text x="700" y="172" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle">openai</text>
    <text x="700" y="192" fill="#6366f1" font-size="11" text-anchor="middle">built-in</text>
    <text x="700" y="210" fill="#818cf8" font-size="11" text-anchor="middle">responses</text>
    <line x1="700" y1="236" x2="700" y2="390" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Planet 2: Azure (responses) -->
  <g>
    <circle cx="990" cy="260" r="54" fill="#1e293b" stroke="#6366f1" stroke-width="2.5"/>
    <text x="990" y="252" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle">azure</text>
    <text x="990" y="272" fill="#94a3b8" font-size="10" text-anchor="middle">api_version</text>
    <text x="990" y="288" fill="#818cf8" font-size="11" text-anchor="middle">responses</text>
    <line x1="960" y1="308" x2="770" y2="420" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Planet 3: Anthropic (chat) -->
  <g>
    <circle cx="1140" cy="480" r="60" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="1140" y="470" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle">anthropic</text>
    <text x="1140" y="490" fill="#94a3b8" font-size="10" text-anchor="middle">ANTHROPIC_API_KEY</text>
    <text x="1140" y="508" fill="#f59e0b" font-size="11" text-anchor="middle">chat</text>
    <line x1="1080" y1="480" x2="790" y2="480" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Planet 4: OpenRouter (chat) -->
  <g>
    <circle cx="990" cy="700" r="56" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="990" y="692" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">openrouter</text>
    <text x="990" y="712" fill="#94a3b8" font-size="10" text-anchor="middle">multi-model</text>
    <text x="990" y="728" fill="#f59e0b" font-size="11" text-anchor="middle">chat</text>
    <line x1="960" y1="670" x2="770" y2="540" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Planet 5: Morph (chat) -->
  <g>
    <circle cx="700" cy="780" r="54" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="700" y="772" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle">morph</text>
    <text x="700" y="792" fill="#94a3b8" font-size="10" text-anchor="middle">morphllm.com</text>
    <text x="700" y="810" fill="#f59e0b" font-size="11" text-anchor="middle">chat</text>
    <line x1="700" y1="726" x2="700" y2="570" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Planet 6: Ollama (built-in, lokal) -->
  <g>
    <circle cx="410" cy="700" r="56" fill="#1e293b" stroke="#10b981" stroke-width="2.5"/>
    <text x="410" y="692" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle">ollama</text>
    <text x="410" y="712" fill="#10b981" font-size="10" text-anchor="middle">lokal · built-in</text>
    <text x="410" y="728" fill="#f59e0b" font-size="11" text-anchor="middle">chat</text>
    <line x1="440" y1="670" x2="630" y2="540" stroke="#10b981" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Planet 7: LM Studio (built-in, lokal) -->
  <g>
    <circle cx="260" cy="480" r="56" fill="#1e293b" stroke="#10b981" stroke-width="2.5"/>
    <text x="260" y="472" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">lmstudio</text>
    <text x="260" y="492" fill="#10b981" font-size="10" text-anchor="middle">lokal · built-in</text>
    <text x="260" y="510" fill="#f59e0b" font-size="11" text-anchor="middle">chat</text>
    <line x1="320" y1="480" x2="610" y2="480" stroke="#10b981" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Planet 8: Custom (frei) -->
  <g>
    <circle cx="410" cy="260" r="54" fill="#1e293b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="410" y="252" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle">custom</text>
    <text x="410" y="272" fill="#94a3b8" font-size="10" text-anchor="middle">eigener Proxy</text>
    <text x="410" y="288" fill="#a78bfa" font-size="11" text-anchor="middle">chat | responses</text>
    <line x1="440" y1="308" x2="630" y2="420" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Legende Wire-API -->
  <rect x="60" y="130" width="290" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="80" y="158" fill="#94a3b8" font-size="13" font-weight="600">WIRE-API · Farbcode</text>
  <rect x="80" y="174" width="14" height="14" rx="3" fill="#6366f1"/>
  <text x="104" y="186" fill="#e2e8f0" font-size="13">responses — OpenAI-native</text>
  <rect x="80" y="196" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="104" y="208" fill="#e2e8f0" font-size="13">chat — OpenAI-Chat-Completions-kompat.</text>
  <rect x="80" y="218" width="14" height="14" rx="3" fill="#10b981"/>
  <text x="104" y="230" fill="#e2e8f0" font-size="13">lokal / built-in (ollama · lmstudio)</text>

  <!-- Legende Config-Stanza -->
  <rect x="1050" y="130" width="310" height="160" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="1070" y="158" fill="#94a3b8" font-size="13" font-weight="600">CUSTOM-PROVIDER-STANZA</text>
  <text x="1070" y="182" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">[model_providers.&lt;id&gt;]</text>
  <text x="1070" y="202" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">name     = "Anthropic"</text>
  <text x="1070" y="222" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">base_url = "https://..."</text>
  <text x="1070" y="242" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">env_key  = "ANTHROPIC_API_KEY"</text>
  <text x="1070" y="262" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">wire_api = "chat"</text>
  <text x="1070" y="282" fill="#ef4444" font-size="11">openai/ollama/lmstudio sind reserviert</text>
</svg>
