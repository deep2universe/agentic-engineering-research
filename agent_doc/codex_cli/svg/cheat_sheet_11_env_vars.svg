<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Umgebungsvariablen — Labels an Kabeln</title>
  <desc>Schlüssel-Wert-Karten für CODEX_HOME, CODEX_API_KEY, CODEX_SQLITE_HOME, CODEX_CA_CERTIFICATE, OPENAI_API_KEY (Warnung) und RUST_LOG als Etiketten an Kabeln.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Umgebungsvariablen</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">Beschriftete Kabel an der Codex-Runtime · export ein, Verhalten dreht sich</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 11/13</text>

  <!-- Zentraler Hub -->
  <g transform="translate(580 400)">
    <rect x="0" y="0" width="240" height="130" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="120" y="40" fill="#e2e8f0" font-size="17" font-weight="700" text-anchor="middle">Codex Runtime</text>
    <text x="120" y="64" fill="#94a3b8" font-size="12" text-anchor="middle">liest env beim Start</text>
    <g transform="translate(30 78)">
      <circle cx="10" cy="20" r="5" fill="#10b981"/>
      <circle cx="30" cy="20" r="5" fill="#22d3ee"/>
      <circle cx="50" cy="20" r="5" fill="#a78bfa"/>
      <circle cx="70" cy="20" r="5" fill="#f59e0b"/>
      <circle cx="90" cy="20" r="5" fill="#ef4444"/>
      <circle cx="110" cy="20" r="5" fill="#818cf8"/>
      <text x="140" y="24" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">env-ports</text>
    </g>
  </g>

  <!-- Kabel + Karten -->
  <!-- CODEX_HOME -->
  <g>
    <path d="M 580 420 C 450 420 360 250 180 250" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(60 160)">
      <rect width="340" height="140" rx="12" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
      <rect x="0" y="0" width="12" height="140" fill="#10b981" rx="4"/>
      <text x="28" y="30" fill="#10b981" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_HOME</text>
      <text x="28" y="56" fill="#e2e8f0" font-size="12">Basis-Verzeichnis für Config, Auth, Sessions</text>
      <text x="28" y="76" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">Default: ~/.codex</text>
      <text x="28" y="108" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">export CODEX_HOME=/opt/codex</text>
      <text x="28" y="128" fill="#64748b" font-size="11">Wichtig für Multi-User-Setups &amp; Docker</text>
    </g>
  </g>

  <!-- CODEX_API_KEY -->
  <g>
    <path d="M 580 440 C 480 440 400 430 180 430" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(60 340)">
      <rect width="340" height="140" rx="12" fill="#0b1220" stroke="#22d3ee" stroke-width="2"/>
      <rect x="0" y="0" width="12" height="140" fill="#22d3ee" rx="4"/>
      <text x="28" y="30" fill="#22d3ee" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_API_KEY</text>
      <text x="28" y="56" fill="#e2e8f0" font-size="12">CI-freundliches Secret · überlagert keinen OAuth</text>
      <text x="28" y="78" fill="#94a3b8" font-size="11">Verwendet durch Codex CLI, wenn gesetzt</text>
      <text x="28" y="108" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_API_KEY=${{ secrets.OPENAI_KEY }}</text>
      <text x="28" y="128" fill="#64748b" font-size="11">Empfohlen für GitHub-Actions/Runner</text>
    </g>
  </g>

  <!-- CODEX_SQLITE_HOME -->
  <g>
    <path d="M 580 480 C 480 480 400 600 180 600" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(60 530)">
      <rect width="340" height="140" rx="12" fill="#0b1220" stroke="#a78bfa" stroke-width="2"/>
      <rect x="0" y="0" width="12" height="140" fill="#a78bfa" rx="4"/>
      <text x="28" y="30" fill="#a78bfa" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_SQLITE_HOME</text>
      <text x="28" y="56" fill="#e2e8f0" font-size="12">Ort der SQLite-State-DB</text>
      <text x="28" y="76" fill="#94a3b8" font-size="11">Sessions, Indizes, Search-Cache</text>
      <text x="28" y="108" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">tmpfs möglich für schnelle IO</text>
      <text x="28" y="128" fill="#64748b" font-size="11">Trennung von Config und Daten</text>
    </g>
  </g>

  <!-- CODEX_CA_CERTIFICATE -->
  <g>
    <path d="M 820 420 C 950 420 1040 250 1220 250" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(1000 160)">
      <rect width="340" height="140" rx="12" fill="#0b1220" stroke="#f59e0b" stroke-width="2"/>
      <rect x="328" y="0" width="12" height="140" fill="#f59e0b" rx="4"/>
      <text x="18" y="30" fill="#f59e0b" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_CA_CERTIFICATE</text>
      <text x="18" y="56" fill="#e2e8f0" font-size="12">Pfad zu custom CA-Zertifikat (PEM)</text>
      <text x="18" y="76" fill="#94a3b8" font-size="11">für Corp-Proxies &amp; MITM-TLS-Inspection</text>
      <text x="18" y="108" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">export CODEX_CA_CERTIFICATE=/etc/ssl/corp.pem</text>
      <text x="18" y="128" fill="#64748b" font-size="11">Ergänzt, ersetzt nicht das System-Store</text>
    </g>
  </g>

  <!-- OPENAI_API_KEY — Warning -->
  <g>
    <path d="M 820 440 C 920 440 1000 430 1220 430" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(1000 340)">
      <rect width="340" height="140" rx="12" fill="#0b1220" stroke="#ef4444" stroke-width="2"/>
      <rect x="328" y="0" width="12" height="140" fill="#ef4444" rx="4"/>
      <g transform="translate(14 14)">
        <polygon points="10,0 20,18 0,18" fill="#ef4444"/>
        <text x="10" y="15" fill="#0f172a" font-size="12" font-weight="800" text-anchor="middle">!</text>
      </g>
      <text x="50" y="30" fill="#ef4444" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">OPENAI_API_KEY</text>
      <text x="18" y="56" fill="#e2e8f0" font-size="12">API-Key für OpenAI SDK</text>
      <text x="18" y="76" fill="#ef4444" font-size="11" font-weight="700">überschreibt OAuth silently!</text>
      <text x="18" y="108" fill="#94a3b8" font-size="11">In Dev-Machines vorsichtig exportieren —</text>
      <text x="18" y="128" fill="#94a3b8" font-size="11">sonst läuft CI-Key lokal mit</text>
    </g>
  </g>

  <!-- RUST_LOG -->
  <g>
    <path d="M 820 480 C 920 480 1000 600 1220 600" fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(1000 530)">
      <rect width="340" height="140" rx="12" fill="#0b1220" stroke="#818cf8" stroke-width="2"/>
      <rect x="328" y="0" width="12" height="140" fill="#818cf8" rx="4"/>
      <text x="18" y="30" fill="#818cf8" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">RUST_LOG</text>
      <text x="18" y="56" fill="#e2e8f0" font-size="12">Log-Level des Rust-Binarys</text>
      <text x="18" y="76" fill="#94a3b8" font-size="11">Subcommand-spezifische Filter möglich</text>
      <text x="18" y="108" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">RUST_LOG=codex=debug,info</text>
      <text x="18" y="128" fill="#64748b" font-size="11">Ausgabe in ~/.codex/log/codex.log</text>
    </g>
  </g>

  <!-- Bottom-Hinweis-Karte -->
  <g transform="translate(60 720)">
    <rect width="1280" height="140" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="30" fill="#a78bfa" font-size="14" font-weight="700" letter-spacing="1">PRECEDENCE · GELTUNGSBEREICH</text>
    <text x="20" y="58" fill="#cbd5e1" font-size="12">1. Flags (<tspan fill="#818cf8" font-family="'JetBrains Mono', ui-monospace, monospace">-c key=val</tspan>) gewinnen über Profile, Profile über [projects], [projects] über globale Defaults.</text>
    <text x="20" y="80" fill="#cbd5e1" font-size="12">2. <tspan fill="#ef4444" font-family="'JetBrains Mono', ui-monospace, monospace">OPENAI_API_KEY</tspan> überschreibt OAuth; für CI besser <tspan fill="#22d3ee" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_API_KEY</tspan> nutzen.</text>
    <text x="20" y="102" fill="#cbd5e1" font-size="12">3. <tspan fill="#10b981" font-family="'JetBrains Mono', ui-monospace, monospace">CODEX_HOME</tspan> isoliert mehrere Setups pro User (Profile-Sandboxing).</text>
    <text x="20" y="124" fill="#cbd5e1" font-size="12">4. <tspan fill="#818cf8" font-family="'JetBrains Mono', ui-monospace, monospace">RUST_LOG</tspan> für Debug; in Prod weglassen — sonst geht Token in Logs.</text>
  </g>
</svg>
