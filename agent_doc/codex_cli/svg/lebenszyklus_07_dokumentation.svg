<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Phase 7 — Living Documentation mit Codex CLI</title>
  <desc>Buch mit lebendigen Seiten: README-First, OpenAPI/TSDoc/Sphinx/mdBook, regelmaessige Architektur-Diagramm-Generierung, Skill docs_sync zur Konsistenzpruefung.</desc>

  <defs>
    <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" fill="#e2e8f0" font-size="30" font-weight="700">Phase 7 — Dokumentation</text>
  <text x="40" y="84" fill="#94a3b8" font-size="15">Buch-Metapher: lebendige Seiten — Doku altert nicht still im Wiki, sondern wird mit jedem Commit gepflegt.</text>
  <text x="1360" y="56" fill="#f59e0b" font-size="14" text-anchor="end">Codex CLI · Phase 07</text>

  <!-- Open book metaphor -->
  <g transform="translate(40,140)">
    <rect width="660" height="320" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="20" y="34" fill="#f59e0b" font-size="16" font-weight="700">Living Documentation · Buch-Metapher</text>

    <!-- Book pages -->
    <g transform="translate(40,70)">
      <rect x="0" y="0" width="270" height="220" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="280" y="0" width="270" height="220" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="275" y1="0" x2="275" y2="220" stroke="#475569" stroke-width="1"/>

      <!-- Left page: README -->
      <text x="14" y="24" fill="#f59e0b" font-size="13" font-weight="700">README.md (always-fresh)</text>
      <line x1="14" y1="32" x2="256" y2="32" stroke="#475569"/>
      <text x="14" y="56" fill="#cbd5e1" font-size="11">## Quickstart</text>
      <text x="14" y="74" fill="#94a3b8" font-size="11">$ pipx install slacker</text>
      <text x="14" y="92" fill="#94a3b8" font-size="11">$ slacker download #channel</text>
      <text x="14" y="118" fill="#cbd5e1" font-size="11">## Architecture</text>
      <text x="14" y="136" fill="#94a3b8" font-size="11">→ docs/architecture.md</text>
      <text x="14" y="162" fill="#cbd5e1" font-size="11">## Roadmap</text>
      <text x="14" y="180" fill="#94a3b8" font-size="11">→ docs/roadmap.md</text>
      <text x="14" y="206" fill="#10b981" font-size="11">✓ aktualisiert mit jedem Feature</text>

      <!-- Right page: API docs -->
      <text x="294" y="24" fill="#f59e0b" font-size="13" font-weight="700">API-Docs (autogen)</text>
      <line x1="294" y1="32" x2="536" y2="32" stroke="#475569"/>
      <text x="294" y="56" fill="#cbd5e1" font-size="11">### fetch_thread(channel, ts)</text>
      <text x="294" y="74" fill="#94a3b8" font-size="11">Returns: list[Message]</text>
      <text x="294" y="92" fill="#94a3b8" font-size="11">Raises: SlackAPIError</text>
      <text x="294" y="118" fill="#cbd5e1" font-size="11">### Mermaid Data Flow</text>
      <text x="294" y="136" fill="#94a3b8" font-size="11">CLI → Slack → SQLite → FS</text>
      <text x="294" y="162" fill="#cbd5e1" font-size="11">### OpenAPI / TSDoc / Sphinx</text>
      <text x="294" y="180" fill="#94a3b8" font-size="11">regenerated on tag</text>
      <text x="294" y="206" fill="#10b981" font-size="11">✓ verifiziert: keine toten Links</text>
    </g>
  </g>

  <!-- Doc generators -->
  <g transform="translate(720,140)">
    <rect width="640" height="320" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="16" font-weight="700">Doc-Generators · Codex generiert &amp; verifiziert</text>

    <g transform="translate(20,54)">
      <rect width="290" height="80" rx="10" fill="#0f172a" stroke="#22d3ee"/>
      <text x="14" y="24" fill="#22d3ee" font-size="13" font-weight="700">OpenAPI</text>
      <text x="14" y="46" fill="#cbd5e1" font-size="12">REST-API → openapi.yaml</text>
      <text x="14" y="64" fill="#94a3b8" font-size="11">Codex schreibt + redocly lint</text>
    </g>
    <g transform="translate(330,54)">
      <rect width="290" height="80" rx="10" fill="#0f172a" stroke="#a78bfa"/>
      <text x="14" y="24" fill="#a78bfa" font-size="13" font-weight="700">TSDoc / JSDoc</text>
      <text x="14" y="46" fill="#cbd5e1" font-size="12">TypeScript-Symbole → typedoc</text>
      <text x="14" y="64" fill="#94a3b8" font-size="11">Inline + generated site</text>
    </g>
    <g transform="translate(20,144)">
      <rect width="290" height="80" rx="10" fill="#0f172a" stroke="#10b981"/>
      <text x="14" y="24" fill="#10b981" font-size="13" font-weight="700">Sphinx (Python)</text>
      <text x="14" y="46" fill="#cbd5e1" font-size="12">docstrings (Google) → HTML</text>
      <text x="14" y="64" fill="#94a3b8" font-size="11">autodoc + intersphinx</text>
    </g>
    <g transform="translate(330,144)">
      <rect width="290" height="80" rx="10" fill="#0f172a" stroke="#f59e0b"/>
      <text x="14" y="24" fill="#f59e0b" font-size="13" font-weight="700">mdBook (Rust)</text>
      <text x="14" y="46" fill="#cbd5e1" font-size="12">Markdown → statische Site</text>
      <text x="14" y="64" fill="#94a3b8" font-size="11">CI-Build, gh-pages</text>
    </g>
    <g transform="translate(20,234)">
      <rect width="600" height="68" rx="10" fill="#0f172a" stroke="#fb923c"/>
      <text x="14" y="24" fill="#fb923c" font-size="13" font-weight="700">Architektur-Diagramme regenerieren</text>
      <text x="14" y="44" fill="#cbd5e1" font-size="12">Mermaid/PlantUML im Docs-Ordner — Codex aktualisiert bei Änderungen am</text>
      <text x="14" y="60" fill="#cbd5e1" font-size="12">Datenmodell oder Component-Layout · Versionskontrolliert als Quelltext</text>
    </g>
  </g>

  <!-- Skill docs_sync -->
  <g transform="translate(40,480)">
    <rect width="660" height="200" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="34" fill="#a78bfa" font-size="16" font-weight="700">Skill docs_sync · Konsistenz-Check</text>
    <rect x="20" y="50" width="620" height="130" rx="10" fill="#0f172a" stroke="#334155"/>
    <g font-family="'JetBrains Mono', monospace" font-size="12">
      <text x="36" y="74" fill="#22d3ee">$ codex skills/docs_sync/</text>
      <text x="36" y="96" fill="#94a3b8">› liest README.md, src/, docs/</text>
      <text x="36" y="118" fill="#94a3b8">› vergleicht Public-API, CLI-Flags, Konfig-Schema</text>
      <text x="36" y="140" fill="#10b981">  ✓ alle dokumentierten Flags existieren</text>
      <text x="36" y="158" fill="#ef4444">  ✗ Flag --since fehlt in README · Flag --legacy entfernt aber dokumentiert</text>
    </g>
  </g>

  <!-- Best/Anti -->
  <g transform="translate(720,480)">
    <rect width="640" height="200" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="16" font-weight="700">Best Practices</text>
    <text x="20" y="62" fill="#cbd5e1" font-size="13">· README-First: AGENTS.md verlangt README-Update bei jedem Feature</text>
    <text x="20" y="84" fill="#cbd5e1" font-size="13">· API-Docs autogen (OpenAPI/TSDoc/Sphinx/mdBook)</text>
    <text x="20" y="106" fill="#cbd5e1" font-size="13">· Architektur-Diagramme regelmäßig regenerieren (Mermaid in docs/)</text>
    <text x="20" y="128" fill="#cbd5e1" font-size="13">· Skill docs_sync prüft Konsistenz README ↔ Code</text>
    <text x="20" y="150" fill="#cbd5e1" font-size="13">· "Generate missing docstrings, keep existing untouched"</text>
    <text x="20" y="172" fill="#cbd5e1" font-size="13">· CHANGELOG via Conventional Commits + Keep-a-Changelog</text>
  </g>

  <!-- Bottom: Anti -->
  <g transform="translate(40,700)">
    <rect width="1320" height="170" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="34" fill="#ef4444" font-size="16" font-weight="700">Anti-Patterns</text>
    <g transform="translate(20,54)">
      <text x="0" y="20" fill="#cbd5e1" font-size="13">✗ Docs-Generation als seltener separater Task → veraltet schnell, niemand vertraut der Doku mehr</text>
      <text x="0" y="44" fill="#cbd5e1" font-size="13">✗ Auto-generierte Docs ohne Review committen — Codex erfindet plausible Beispiele, die nicht stimmen</text>
      <text x="0" y="68" fill="#cbd5e1" font-size="13">✗ Mermaid-Bilder als PNG einchecken statt als Quelltext → Edits brauchen externes Tool</text>
      <text x="0" y="92" fill="#cbd5e1" font-size="13">✗ README mit veralteten Quickstart-Snippets — der wichtigste Eindruck für neue Devs</text>
      <text x="0" y="116" fill="#cbd5e1" font-size="13">✗ AGENTS.md ohne Verweis auf docs_sync-Skill → Konsistenz-Drift unbemerkt</text>
    </g>
  </g>
</svg>
