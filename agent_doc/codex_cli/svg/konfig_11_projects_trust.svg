<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Projects und Workspace-Trust — Tresor vs. unverbindliches Regal</title>
  <desc>Trusted Projekte laden .codex/config.toml; untrusted Projekte ignorieren sie.</desc>
  <defs>
    <marker id="arr11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">Projects &amp; Workspace-Trust — Tresor vs. Regal</text>
  <text x="60" y="92" fill="#94a3b8" font-size="16">Nur in trusted Projekten wird die Repo-lokale .codex/config.toml geladen. Untrusted ignoriert sie.</text>
  <text x="1340" y="60" fill="#6366f1" font-size="14" text-anchor="end" font-weight="600">Codex CLI · §11</text>

  <!-- TRUSTED -->
  <g>
    <rect x="60" y="140" width="620" height="700" rx="16" fill="#111827" stroke="#10b981" stroke-width="2.5"/>
    <rect x="60" y="140" width="620" height="58" rx="16" fill="#10b981" opacity="0.2"/>
    <text x="370" y="178" fill="#10b981" font-size="20" font-weight="700" text-anchor="middle">TRUSTED · Tresor mit Siegel</text>

    <!-- Tresor-Icon -->
    <g transform="translate(100 220)">
      <rect x="0" y="0" width="170" height="170" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
      <circle cx="85" cy="85" r="52" fill="none" stroke="#10b981" stroke-width="3"/>
      <circle cx="85" cy="85" r="28" fill="#10b981" opacity="0.3"/>
      <circle cx="85" cy="85" r="8" fill="#10b981"/>
      <line x1="85" y1="40" x2="85" y2="28" stroke="#10b981" stroke-width="3"/>
      <line x1="130" y1="85" x2="142" y2="85" stroke="#10b981" stroke-width="3"/>
      <line x1="85" y1="130" x2="85" y2="142" stroke="#10b981" stroke-width="3"/>
      <line x1="40" y1="85" x2="28" y2="85" stroke="#10b981" stroke-width="3"/>
    </g>

    <!-- TOML-Stanza -->
    <rect x="290" y="220" width="370" height="170" rx="10" fill="#0f172a" stroke="#334155"/>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
      <text x="306" y="244" fill="#94a3b8">[projects."/Users/alice/work/app"]</text>
      <text x="306" y="272" fill="#e2e8f0">trust_level = </text>
      <text x="432" y="272" fill="#10b981" font-weight="700">"trusted"</text>
    </g>
    <text x="306" y="318" fill="#94a3b8" font-size="12">Registrierung via codex · manuell in config.toml</text>
    <text x="306" y="340" fill="#94a3b8" font-size="12">oder beim ersten Start im Projekt (Prompt).</text>
    <text x="306" y="370" fill="#10b981" font-size="12" font-weight="600">→ Repo-Config wird geladen</text>

    <!-- Was wird geladen -->
    <rect x="90" y="420" width="570" height="200" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="110" y="448" fill="#10b981" font-size="14" font-weight="700">GELADEN IN TRUSTED</text>

    <rect x="110" y="464" width="530" height="40" rx="8" fill="#0f172a" stroke="#10b981"/>
    <text x="130" y="490" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">&lt;repo&gt;/.codex/config.toml</text>
    <text x="610" y="488" fill="#10b981" font-size="11" text-anchor="end" font-weight="600">Repo-Override</text>

    <rect x="110" y="512" width="530" height="40" rx="8" fill="#0f172a" stroke="#10b981"/>
    <text x="130" y="538" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">&lt;repo&gt;/AGENTS.md · AGENTS.override.md</text>
    <text x="610" y="536" fill="#10b981" font-size="11" text-anchor="end" font-weight="600">Kontext</text>

    <rect x="110" y="560" width="530" height="40" rx="8" fill="#0f172a" stroke="#10b981"/>
    <text x="130" y="586" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">&lt;repo&gt;/skills/*/SKILL.md</text>
    <text x="610" y="584" fill="#10b981" font-size="11" text-anchor="end" font-weight="600">Capabilities</text>

    <!-- Nutzen -->
    <text x="90" y="660" fill="#94a3b8" font-size="13" font-weight="600">NUTZEN</text>
    <text x="90" y="684" fill="#e2e8f0" font-size="13">· Team-weite Config pro Repo versionierbar</text>
    <text x="90" y="708" fill="#e2e8f0" font-size="13">· MCP-Server und Skills projektspezifisch</text>
    <text x="90" y="732" fill="#e2e8f0" font-size="13">· Sandbox-Modes lokal angepasst</text>
    <text x="90" y="756" fill="#f59e0b" font-size="12">⚠ Repo-Config kann User-Config überschreiben</text>
    <text x="90" y="776" fill="#f59e0b" font-size="12">⚠ Nur bei echtem Vertrauen aktivieren</text>
    <text x="90" y="810" fill="#94a3b8" font-size="12">Precedence: CLI &gt; Profil &gt; Projekt &gt; User &gt; System</text>
  </g>

  <!-- UNTRUSTED -->
  <g>
    <rect x="720" y="140" width="620" height="700" rx="16" fill="#111827" stroke="#ef4444" stroke-width="2.5"/>
    <rect x="720" y="140" width="620" height="58" rx="16" fill="#ef4444" opacity="0.2"/>
    <text x="1030" y="178" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">UNTRUSTED · offenes Regal</text>

    <!-- Regal-Icon (Kreuz durchgestrichen) -->
    <g transform="translate(760 220)">
      <rect x="0" y="0" width="170" height="170" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="3" stroke-dasharray="6 4"/>
      <line x1="0" y1="50" x2="170" y2="50" stroke="#ef4444" stroke-width="2"/>
      <line x1="0" y1="100" x2="170" y2="100" stroke="#ef4444" stroke-width="2"/>
      <line x1="0" y1="150" x2="170" y2="150" stroke="#ef4444" stroke-width="2"/>
      <rect x="10" y="10" width="30" height="35" fill="#ef4444" opacity="0.3"/>
      <rect x="50" y="20" width="30" height="25" fill="#ef4444" opacity="0.3"/>
      <rect x="100" y="15" width="30" height="30" fill="#ef4444" opacity="0.3"/>
      <!-- Dickes rotes Kreuz -->
      <line x1="10" y1="10" x2="160" y2="160" stroke="#ef4444" stroke-width="6" opacity="0.6"/>
      <line x1="160" y1="10" x2="10" y2="160" stroke="#ef4444" stroke-width="6" opacity="0.6"/>
    </g>

    <!-- TOML-Stanza -->
    <rect x="950" y="220" width="370" height="170" rx="10" fill="#0f172a" stroke="#334155"/>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
      <text x="966" y="244" fill="#94a3b8">[projects."/Users/alice/forks/sus"]</text>
      <text x="966" y="272" fill="#e2e8f0">trust_level = </text>
      <text x="1092" y="272" fill="#ef4444" font-weight="700">"untrusted"</text>
    </g>
    <text x="966" y="318" fill="#94a3b8" font-size="12">Default für geklonte Forks · unbekannte Repos</text>
    <text x="966" y="340" fill="#94a3b8" font-size="12">→ Codex prompt bei erstem Start</text>
    <text x="966" y="370" fill="#ef4444" font-size="12" font-weight="600">→ Repo-Config wird ignoriert</text>

    <!-- Was wird NICHT geladen -->
    <rect x="750" y="420" width="570" height="200" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="770" y="448" fill="#ef4444" font-size="14" font-weight="700">IGNORIERT IN UNTRUSTED</text>

    <rect x="770" y="464" width="530" height="40" rx="8" fill="#0f172a" stroke="#ef4444" stroke-dasharray="4 3"/>
    <text x="790" y="490" fill="#94a3b8" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-decoration="line-through">&lt;repo&gt;/.codex/config.toml</text>
    <text x="1290" y="488" fill="#ef4444" font-size="11" text-anchor="end" font-weight="600">SKIPPED</text>

    <rect x="770" y="512" width="530" height="40" rx="8" fill="#0f172a" stroke="#10b981"/>
    <text x="790" y="538" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">~/.codex/config.toml</text>
    <text x="1290" y="536" fill="#10b981" font-size="11" text-anchor="end" font-weight="600">OK · User-Config</text>

    <rect x="770" y="560" width="530" height="40" rx="8" fill="#0f172a" stroke="#f59e0b"/>
    <text x="790" y="586" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">AGENTS.md · wird gelesen (nur Text)</text>
    <text x="1290" y="584" fill="#f59e0b" font-size="11" text-anchor="end" font-weight="600">READ-ONLY</text>

    <!-- Nutzen -->
    <text x="750" y="660" fill="#94a3b8" font-size="13" font-weight="600">SCHUTZ</text>
    <text x="750" y="684" fill="#e2e8f0" font-size="13">· Keine versteckten MCP-Server aus Repo</text>
    <text x="750" y="708" fill="#e2e8f0" font-size="13">· Kein Sandbox-Downgrade durch Fork</text>
    <text x="750" y="732" fill="#e2e8f0" font-size="13">· Keine Provider-Override auf Phishing-URL</text>
    <text x="750" y="766" fill="#10b981" font-size="12" font-weight="600">Default für fremde Repos → Safe by Default</text>
    <text x="750" y="790" fill="#94a3b8" font-size="12">Zum Upgraden: trust_level = "trusted" setzen</text>
    <text x="750" y="810" fill="#94a3b8" font-size="12">oder im TUI "Trust this project" bestätigen</text>
  </g>
</svg>
