    <text x="400" y="575" fill="#d1fae5" font-size="13" font-weight="700" text-anchor="middle">Client + Server</text>
    <text x="400" y="592" fill="#a7f3d0" font-size="11" text-anchor="middle">bidirektional</text>
  </g>
  <g>
    <rect x="510" y="540" width="160" height="70" rx="8" fill="#064e3b" stroke="#34d399"/>
    <text x="590" y="575" fill="#d1fae5" font-size="13" font-weight="700" text-anchor="middle">Client + Server</text>
    <text x="590" y="592" fill="#a7f3d0" font-size="11" text-anchor="middle">bidirektional</text>
  </g>
  <g>
    <rect x="700" y="540" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="780" y="580" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">Client</text>
  </g>
  <g>
    <rect x="890" y="540" width="160" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="970" y="580" fill="#fecaca" font-size="13" font-weight="700" text-anchor="middle">nein</text>
  </g>
  <g>
    <rect x="1080" y="540" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="1160" y="580" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">Client</text>
  </g>

  <!-- Scoring-Radar unten: Zusammenfassung -->
  <g transform="translate(60,660)">
    <rect x="0" y="0" width="1280" height="170" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="24" y="30" fill="#e2e8f0" font-size="16" font-weight="700">Aggregierte Sicherheits-Dichte (Sandbox + Approval + Sub-Agents + Hooks + MCP)</text>
    <g font-size="13" fill="#94a3b8">
      <!-- Codex -->
      <text x="24" y="65" fill="#e2e8f0">Codex CLI</text>
      <rect x="150" y="53" width="900" height="16" rx="3" fill="#0f172a"/>
      <rect x="150" y="53" width="810" height="16" rx="3" fill="#6366f1"/>
      <text x="1070" y="66" fill="#a5b4fc">9 / 10 · Security-Kern</text>
      <!-- Claude -->
      <text x="24" y="95" fill="#e2e8f0">Claude Code</text>
      <rect x="150" y="83" width="900" height="16" rx="3" fill="#0f172a"/>
      <rect x="150" y="83" width="720" height="16" rx="3" fill="#a78bfa"/>
      <text x="1070" y="96" fill="#c4b5fd">8 / 10 · Kollab-Hooks</text>
      <!-- Gemini -->
      <text x="24" y="125" fill="#e2e8f0">Gemini CLI</text>
      <rect x="150" y="113" width="900" height="16" rx="3" fill="#0f172a"/>
      <rect x="150" y="113" width="450" height="16" rx="3" fill="#22d3ee"/>
      <text x="1070" y="126" fill="#67e8f9">5 / 10 · Allowlist</text>
      <!-- Aider -->
