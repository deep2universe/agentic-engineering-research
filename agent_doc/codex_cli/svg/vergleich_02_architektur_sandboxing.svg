  <g>
    <rect x="890" y="360" width="160" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="970" y="400" fill="#fecaca" font-size="13" font-weight="700" text-anchor="middle">nein</text>
  </g>
  <g>
    <rect x="1080" y="360" width="160" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="1160" y="400" fill="#fecaca" font-size="13" font-weight="700" text-anchor="middle">nein</text>
  </g>

