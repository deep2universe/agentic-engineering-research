      <rect x="150" y="143" width="900" height="16" rx="3" fill="#0f172a"/>
      <rect x="150" y="143" width="180" height="16" rx="3" fill="#10b981"/>
      <text x="1070" y="156" fill="#6ee7b7">2 / 10 · Minimal</text>
    </g>
  </g>

  <!-- Legende Heatmap -->
  <g transform="translate(60,855)" font-size="12" fill="#94a3b8">
    <rect x="0" y="-12" width="16" height="16" rx="3" fill="#065f46" stroke="#10b981"/>
    <text x="24" y="0">stark / vorhanden</text>
    <rect x="180" y="-12" width="16" height="16" rx="3" fill="#78350f" stroke="#f59e0b"/>
    <text x="204" y="0">mittel / eingeschränkt</text>
    <rect x="380" y="-12" width="16" height="16" rx="3" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="404" y="0">fehlt / nein</text>
    <text x="1340" y="0" fill="#475569" text-anchor="end">Metapher · Dichte-Matrix / Radar</text>
