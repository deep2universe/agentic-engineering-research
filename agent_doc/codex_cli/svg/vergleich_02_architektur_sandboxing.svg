<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Architektur und Sandboxing: Heatmap-Vergleich der fünf Coding-Agenten</title>
  <desc>Dichte-Matrix mit Sandbox, Approval, Sub-Agents, Hooks und MCP-Support. Grün = stark, Gelb = mittel, Rot = fehlt. Codex CLI dominiert die Sicherheits-Achse.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">Architektur &amp; Sandboxing · Dichte-Matrix</text>
  <text x="60" y="90" fill="#94a3b8" font-size="15">Heatmap über fünf Kern-Dimensionen · grün = stark, gelb = mittel, rot = fehlt</text>
  <text x="1340" y="60" fill="#6366f1" font-size="16" font-weight="600" text-anchor="end">Kapitel 2</text>

  <!-- Zeilenköpfe (Dimensionen) -->
  <g font-size="14" fill="#e2e8f0" font-weight="600">
    <text x="270" y="215" text-anchor="end">Sandbox</text>
    <text x="270" y="305" text-anchor="end">Approval-Modell</text>
    <text x="270" y="395" text-anchor="end">Sub-Agents</text>
    <text x="270" y="485" text-anchor="end">Hooks</text>
    <text x="270" y="575" text-anchor="end">MCP Client/Server</text>
  </g>

  <!-- Spaltenköpfe (Tools) -->
  <g font-size="15" font-weight="700">
    <g transform="translate(400,140)">
      <rect x="-80" y="-30" width="160" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
      <text x="0" y="-3" fill="#e2e8f0" text-anchor="middle">Codex CLI</text>
    </g>
    <g transform="translate(590,140)">
      <rect x="-80" y="-30" width="160" height="40" rx="8" fill="#1e293b" stroke="#a78bfa"/>
      <text x="0" y="-3" fill="#e2e8f0" text-anchor="middle">Claude Code</text>
    </g>
    <g transform="translate(780,140)">
      <rect x="-80" y="-30" width="160" height="40" rx="8" fill="#1e293b" stroke="#22d3ee"/>
      <text x="0" y="-3" fill="#e2e8f0" text-anchor="middle">Gemini CLI</text>
    </g>
    <g transform="translate(970,140)">
      <rect x="-80" y="-30" width="160" height="40" rx="8" fill="#1e293b" stroke="#10b981"/>
      <text x="0" y="-3" fill="#e2e8f0" text-anchor="middle">Aider</text>
    </g>
    <g transform="translate(1160,140)">
      <rect x="-80" y="-30" width="160" height="40" rx="8" fill="#1e293b" stroke="#f59e0b"/>
      <text x="0" y="-3" fill="#e2e8f0" text-anchor="middle">Copilot CLI</text>
    </g>
  </g>

  <!-- Heatmap-Zellen -->
  <!-- Sandbox (y=180) -->
  <g>
    <rect x="320" y="180" width="160" height="70" rx="8" fill="#065f46" stroke="#10b981"/>
    <text x="400" y="210" fill="#d1fae5" font-size="13" font-weight="700" text-anchor="middle">Kernel</text>
    <text x="400" y="228" fill="#a7f3d0" font-size="11" text-anchor="middle">Seatbelt/Landlock</text>
    <text x="400" y="242" fill="#a7f3d0" font-size="11" text-anchor="middle">AppContainer</text>
  </g>
  <g>
    <rect x="510" y="180" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="590" y="215" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">Allowlist</text>
    <text x="590" y="233" fill="#fde68a" font-size="11" text-anchor="middle">+ Bind-Mount</text>
  </g>
  <g>
    <rect x="700" y="180" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="780" y="220" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">Allowlist</text>
  </g>
  <g>
    <rect x="890" y="180" width="160" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="970" y="220" fill="#fecaca" font-size="13" font-weight="700" text-anchor="middle">keine</text>
  </g>
  <g>
    <rect x="1080" y="180" width="160" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="1160" y="220" fill="#fecaca" font-size="13" font-weight="700" text-anchor="middle">keine</text>
  </g>

