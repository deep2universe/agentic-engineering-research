    <text x="590" y="502" fill="#a7f3d0" font-size="11" text-anchor="middle">pre/post · Stop · …</text>
  </g>
  <g>
    <rect x="700" y="450" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="780" y="490" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">limitiert</text>
  </g>
  <g>
    <rect x="890" y="450" width="160" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="970" y="490" fill="#fecaca" font-size="13" font-weight="700" text-anchor="middle">nein</text>
  </g>
  <g>
    <rect x="1080" y="450" width="160" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="1160" y="490" fill="#fecaca" font-size="13" font-weight="700" text-anchor="middle">nein</text>
