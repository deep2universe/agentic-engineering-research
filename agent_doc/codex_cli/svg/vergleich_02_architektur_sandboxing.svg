    <rect x="320" y="270" width="160" height="70" rx="8" fill="#065f46" stroke="#10b981"/>
    <text x="400" y="305" fill="#d1fae5" font-size="13" font-weight="700" text-anchor="middle">4 Stufen</text>
    <text x="400" y="322" fill="#a7f3d0" font-size="11" text-anchor="middle">read·auto·on-fail·never</text>
  </g>
  <g>
    <rect x="510" y="270" width="160" height="70" rx="8" fill="#065f46" stroke="#10b981"/>
    <text x="590" y="305" fill="#d1fae5" font-size="13" font-weight="700" text-anchor="middle">Permissions</text>
    <text x="590" y="322" fill="#a7f3d0" font-size="11" text-anchor="middle">+ Hooks</text>
  </g>
  <g>
    <rect x="700" y="270" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="780" y="310" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">auto / ask</text>
  </g>
  <g>
    <rect x="890" y="270" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="970" y="310" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">auto</text>
  </g>
  <g>
    <rect x="1080" y="270" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="1160" y="310" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">auto / ask</text>
  </g>

  <!-- Sub-Agents (y=360) -->
  <g>
    <rect x="320" y="360" width="160" height="70" rx="8" fill="#065f46" stroke="#10b981"/>
    <text x="400" y="395" fill="#d1fae5" font-size="13" font-weight="700" text-anchor="middle">ja</text>
    <text x="400" y="412" fill="#a7f3d0" font-size="11" text-anchor="middle">via AGENTS.md</text>
  </g>
  <g>
    <rect x="510" y="360" width="160" height="70" rx="8" fill="#065f46" stroke="#10b981"/>
    <text x="590" y="395" fill="#d1fae5" font-size="13" font-weight="700" text-anchor="middle">ja</text>
    <text x="590" y="412" fill="#a7f3d0" font-size="11" text-anchor="middle">Task-Tool · SDK</text>
  </g>
  <g>
    <rect x="700" y="360" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="780" y="395" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">eingeschränkt</text>
