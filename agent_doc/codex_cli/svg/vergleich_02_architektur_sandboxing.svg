    <rect x="320" y="450" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b"/>
    <text x="400" y="485" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">notify</text>
    <text x="400" y="502" fill="#fde68a" font-size="11" text-anchor="middle">nur turn-end</text>
