    <text x="0" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Multi-Hour-Tasks → Cloud</text>
    <text x="0" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Multi-Agent: Handoffs + Tools</text>
    <text x="0" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">deckt 10 Phasen lückenlos ab</text>
  </g>

  <!-- Hexagon 6 (unten-rechts): Prompt = Programm -->
  <g transform="translate(1040 700)">
    <polygon points="-140,-80 -140,80 0,160 140,80 140,-80 0,-160" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
