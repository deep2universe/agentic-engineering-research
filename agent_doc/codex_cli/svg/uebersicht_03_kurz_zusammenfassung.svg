      <text x="15" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fecaca">Approval</text>
      <rect x="50" y="0" width="30" height="60" rx="4" fill="#7f1d1d" stroke="#ef4444"/>
      <text x="65" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fecaca">Sandbox</text>
      <rect x="100" y="0" width="30" height="60" rx="4" fill="#7f1d1d" stroke="#ef4444"/>
      <text x="115" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fecaca">Trust</text>
    </g>
    <text x="0" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Kernel-Sandboxes:</text>
    <text x="0" y="58" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#fca5a5">Seatbelt · Landlock · AppContainer</text>
    <text x="0" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">schützt selbst bei Prompt-Injection</text>
  </g>

  <!-- Hexagon 3 (links): Zentrale Config -->
  <g transform="translate(260 470)">
    <polygon points="-140,-80 -140,80 0,160 140,80 140,-80 0,-160" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <!-- Icon: Zahnrad -->
    <g transform="translate(-110 -90)" fill="none" stroke="#22d3ee" stroke-width="2">
      <circle cx="14" cy="14" r="8"/>
      <circle cx="14" cy="14" r="3" fill="#22d3ee"/>
      <g stroke-linecap="round">
        <path d="M14,2 V6"/>
        <path d="M14,22 V26"/>
        <path d="M2,14 H6"/>
        <path d="M22,14 H26"/>
        <path d="M5,5 L8,8"/>
