    <text x="0" y="-108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#ef4444">2 · Drei Säulen Sicherheit</text>
    <text x="0" y="-80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">Approval × Sandbox × Trust</text>
