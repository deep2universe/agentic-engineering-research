      <text x="0" y="-32" text-anchor="middle">JetBrains Plugin</text>
      <text x="0" y="-12" text-anchor="middle">openai/codex-action@v1</text>
      <text x="0" y="10" text-anchor="middle">Codex Cloud (chatgpt.com)</text>
      <text x="0" y="32" text-anchor="middle">MCP · Client + Server</text>
    </g>
    <text x="0" y="62" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#6ee7b7">openai.chatgpt (VS Code)</text>
    <text x="0" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Notify-Hook · Slack · Plugins</text>
  </g>

