    <text x="0" y="-78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">Rust · Apache-2.0</text>
    <text x="0" y="-54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Offizieller OpenAI-Coding-Agent</text>
    <text x="0" y="-34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">öffentliches GitHub-Repo</text>
    <text x="0" y="-14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">binär oder via npm/brew/cargo</text>
    <text x="0" y="14" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#22d3ee">github.com/openai/codex</text>
    <text x="0" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Default-Modell seit 02/2026:</text>
    <text x="0" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#c7d2fe">GPT-5.3-Codex</text>
    <text x="0" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">freie Nutzung · forkbar · auditierbar</text>
  </g>

