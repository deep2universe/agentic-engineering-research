    <g transform="translate(0 -66)" fill="#818cf8">
      <circle r="10" fill="none" stroke="#818cf8" stroke-width="2"/>
      <circle r="3" fill="#818cf8"/>
      <g stroke="#818cf8" stroke-width="2" stroke-linecap="round">
        <path d="M0,-13 V-17"/>
        <path d="M0,13 V17"/>
        <path d="M-13,0 H-17"/>
        <path d="M13,0 H17"/>
        <path d="M-9,-9 L-12,-12"/>
        <path d="M9,9 L12,12"/>
        <path d="M9,-9 L12,-12"/>
        <path d="M-9,9 L-12,12"/>
      </g>
    </g>
  </g>

