    <text x="0" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Kontext-Engineering skaliert</text>
    <text x="0" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">reproduzierbar · versionierbar · teilbar</text>
