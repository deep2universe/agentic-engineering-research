<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title03 desc03">
  <title id="title03">Kurz-Zusammenfassung Codex CLI als Hexagon-Mindmap</title>
  <desc id="desc03">Sechs Hexagon-Karten um einen zentralen Codex-CLI-Kern gruppiert, jede mit Icon, Überschrift und Kernaussage: Rust-Agent Apache-2.0, drei Säulen Approval × Sandbox × Trust, zentrale Config, IDE/GitHub/MCP-Integrationen, End-to-End-Lebenszyklus und Prompt = Programm. Metapher: Wabenstruktur einer Wissensbasis.</desc>

  <defs>
    <linearGradient id="titlebar03" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="core03" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <marker id="arr03" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Hintergrund -->
  <rect width="1400" height="900" fill="#0f172a"/>
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <path d="M0 100 H1400 M0 200 H1400 M0 300 H1400 M0 400 H1400 M0 500 H1400 M0 600 H1400 M0 700 H1400 M0 800 H1400"/>
    <path d="M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900"/>
  </g>

  <rect x="0" y="0" width="1400" height="6" fill="url(#titlebar03)"/>
  <text x="40" y="52" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="#e2e8f0">Kurz-Zusammenfassung · Sechs Wabenkerne</text>
  <text x="40" y="78" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8">Hexagon-Mindmap · Jeder Kern = eine Kernaussage · Kern im Zentrum verbindet alles</text>
  <text x="1360" y="52" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" fill="#94a3b8" text-anchor="end">codex_cli / uebersicht · 03</text>

  <!-- Verbindungslinien zwischen Kern und Hexagonen -->
  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M700 470 L 360 260"/>
    <path d="M700 470 L 1040 260"/>
    <path d="M700 470 L 260 470"/>
    <path d="M700 470 L 1140 470"/>
    <path d="M700 470 L 360 700"/>
    <path d="M700 470 L 1040 700"/>
  </g>

  <!-- Zentrales Hexagon: Codex CLI Kern -->
  <g transform="translate(700 470)">
    <polygon points="-130,-75 -130,75 0,150 130,75 130,-75 0,-150" fill="url(#core03)" stroke="#6366f1" stroke-width="3"/>
    <polygon points="-90,-52 -90,52 0,104 90,52 90,-52 0,-104" fill="none" stroke="#334155" stroke-dasharray="3 4"/>
    <text y="-20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Codex CLI</text>
    <text y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c7d2fe">OpenAI · Rust</text>
    <text y="28" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#94a3b8">@openai/codex</text>
    <text y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Default 02/2026:</text>
    <text y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#22d3ee">GPT-5.3-Codex</text>
