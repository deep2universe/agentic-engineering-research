    <text x="0" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Profile decken Szenarien ab:</text>
    <text x="0" y="44" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#cbd5e1">daily · planning · review</text>
    <text x="0" y="62" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#cbd5e1">ci · local</text>
    <text x="0" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Precedence: CLI > Profile > Global</text>
  </g>

