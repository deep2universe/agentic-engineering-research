    <text x="0" y="-80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">Spec → Impl → Betrieb</text>
    <g font-family="system-ui, sans-serif" font-size="12" fill="#fde68a">
