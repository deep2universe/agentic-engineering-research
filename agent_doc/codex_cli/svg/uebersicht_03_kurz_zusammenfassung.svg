  <!-- Legende / Fussnote -->
  <g transform="translate(40 840)" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">
    <rect x="0" y="0" width="1320" height="44" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="27" fill="#94a3b8">Zentrale Botschaft: Codex CLI verbindet offene Implementierung · strikte Sicherheit · zentrale Konfig · breite Integration · durchgehenden Lebenszyklus · Prompt-als-Programm.</text>
