<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Experimentelle und neuere Features — Labor-Tisch Stand 04/2026</title>
  <desc>Labor-Metapher mit neun Experiment-Flaschen: Plan-Mode, Realtime-Start-Instructions, RMCP-Client, Spark, Devcontainer via bwrap, Marketplace, Reverse-Search, Phase-Parameter, MCP-Apps. Stabilitätsampel je Experiment.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">16. Experimentelle Features (Stand 04/2026) — Labor-Tisch</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Neun neue/experimentelle Bausteine. Jedes Flaschen-Kärtchen: Ort, Zustand (stable | opt-in | research) und Einsatzzweck.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 16</text>

  <defs>
    <!-- Flasche -->
    <g id="flask">
      <path d="M -12 -30 h 24 v 16 l 16 48 a 18 18 0 0 1 -18 20 h -20 a 18 18 0 0 1 -18 -20 l 16 -48 z" fill="#0f172a" stroke="#334155" stroke-width="2"/>
      <rect x="-14" y="-34" width="28" height="8" fill="#64748b"/>
    </g>
  </defs>

  <!-- Labor-Tisch -->
  <g transform="translate(60,820)">
    <rect width="1280" height="10" fill="#334155"/>
    <rect x="0" y="10" width="1280" height="4" fill="#475569"/>
  </g>

  <!-- 9 Flaschen, 3x3-Grid -->
  <!-- Zeile 1 -->
  <g transform="translate(170,200)">
    <use href="#flask" transform="translate(0,80) scale(1.8)"/>
    <rect x="-130" y="40" width="260" height="20" fill="#a78bfa" opacity="0.3"/>
    <rect x="-150" y="170" width="300" height="110" rx="10" fill="#1e293b" stroke="#a78bfa"/>
    <text x="0" y="192" fill="#c4b5fd" font-size="14" font-weight="700" text-anchor="middle">Plan-Mode mit separatem Effort</text>
    <text x="-140" y="216" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">plan_mode_reasoning_effort</text>
    <text x="-140" y="236" fill="#94a3b8" font-size="11">Plan mit "high", Execution mit "low"</text>
    <text x="-140" y="256" fill="#94a3b8" font-size="11">→ bessere Pläne, günstigere Ausführung.</text>
    <rect x="-140" y="264" width="60" height="16" rx="3" fill="#10b981"/>
    <text x="-110" y="276" fill="#022c22" font-size="10" text-anchor="middle" font-weight="700">stable</text>
  </g>

  <g transform="translate(570,200)">
    <use href="#flask" transform="translate(0,80) scale(1.8)"/>
    <rect x="-130" y="40" width="260" height="20" fill="#22d3ee" opacity="0.3"/>
    <rect x="-150" y="170" width="300" height="110" rx="10" fill="#1e293b" stroke="#22d3ee"/>
    <text x="0" y="192" fill="#22d3ee" font-size="14" font-weight="700" text-anchor="middle">Realtime-Start-Instructions</text>
    <text x="-140" y="216" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">experimental_realtime_start_instructions</text>
    <text x="-140" y="236" fill="#94a3b8" font-size="11">Kurze Start-Briefings reduzieren</text>
    <text x="-140" y="256" fill="#94a3b8" font-size="11">initiale Latenz spürbar.</text>
    <rect x="-140" y="264" width="60" height="16" rx="3" fill="#f59e0b"/>
    <text x="-110" y="276" fill="#451a03" font-size="10" text-anchor="middle" font-weight="700">opt-in</text>
  </g>

  <g transform="translate(970,200)">
    <use href="#flask" transform="translate(0,80) scale(1.8)"/>
    <rect x="-130" y="40" width="260" height="20" fill="#10b981" opacity="0.3"/>
    <rect x="-150" y="170" width="300" height="110" rx="10" fill="#1e293b" stroke="#10b981"/>
    <text x="0" y="192" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">RMCP-Client (Rust-nativ)</text>
    <text x="-140" y="216" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">experimental_use_rmcp_client</text>
    <text x="-140" y="236" fill="#94a3b8" font-size="11">Native Rust-MCP-Client-Impl.</text>
    <text x="-140" y="256" fill="#94a3b8" font-size="11">Geringerer Overhead, bessere Logs.</text>
    <rect x="-140" y="264" width="60" height="16" rx="3" fill="#f59e0b"/>
    <text x="-110" y="276" fill="#451a03" font-size="10" text-anchor="middle" font-weight="700">opt-in</text>
  </g>

  <!-- Zeile 2 -->
  <g transform="translate(170,490)">
    <use href="#flask" transform="translate(0,40) scale(1.8)"/>
    <rect x="-130" y="0" width="260" height="20" fill="#ef4444" opacity="0.3"/>
    <rect x="-150" y="130" width="300" height="110" rx="10" fill="#1e293b" stroke="#ef4444"/>
    <text x="0" y="152" fill="#fca5a5" font-size="14" font-weight="700" text-anchor="middle">Codex-Spark (GPT-5.3-Codex-Spark)</text>
    <text x="-140" y="176" fill="#cbd5e1" font-size="11">&gt;1000 tok/s, Realtime-Coding</text>
    <text x="-140" y="196" fill="#94a3b8" font-size="11">ChatGPT Pro Preview.</text>
    <text x="-140" y="216" fill="#94a3b8" font-size="11">Für Streaming-Editor-Integrationen.</text>
    <rect x="-140" y="224" width="80" height="16" rx="3" fill="#ef4444"/>
    <text x="-100" y="236" fill="#450a0a" font-size="10" text-anchor="middle" font-weight="700">research</text>
  </g>

  <g transform="translate(570,490)">
    <use href="#flask" transform="translate(0,40) scale(1.8)"/>
    <rect x="-130" y="0" width="260" height="20" fill="#f59e0b" opacity="0.3"/>
    <rect x="-150" y="130" width="300" height="110" rx="10" fill="#1e293b" stroke="#f59e0b"/>
    <text x="0" y="152" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">Devcontainer-Sandbox via bwrap</text>
    <text x="-140" y="176" fill="#cbd5e1" font-size="11">bubblewrap-basierte Isolation</text>
    <text x="-140" y="196" fill="#94a3b8" font-size="11">seit v0.121.0 — Linux-Standard</text>
    <text x="-140" y="216" fill="#94a3b8" font-size="11">für Devcontainer-Flows.</text>
    <rect x="-140" y="224" width="60" height="16" rx="3" fill="#10b981"/>
    <text x="-110" y="236" fill="#022c22" font-size="10" text-anchor="middle" font-weight="700">stable</text>
  </g>

  <g transform="translate(970,490)">
    <use href="#flask" transform="translate(0,40) scale(1.8)"/>
    <rect x="-130" y="0" width="260" height="20" fill="#a78bfa" opacity="0.3"/>
    <rect x="-150" y="130" width="300" height="110" rx="10" fill="#1e293b" stroke="#a78bfa"/>
    <text x="0" y="152" fill="#c4b5fd" font-size="14" font-weight="700" text-anchor="middle">Marketplace</text>
    <text x="-140" y="176" fill="#cbd5e1" font-size="11" font-family="'JetBrains Mono', monospace">codex marketplace add &lt;name&gt;</text>
    <text x="-140" y="196" fill="#94a3b8" font-size="11">Bundles aus Commands + Skills</text>
    <text x="-140" y="216" fill="#94a3b8" font-size="11">+ MCP-Server, ab v0.121.0.</text>
    <rect x="-140" y="224" width="60" height="16" rx="3" fill="#10b981"/>
    <text x="-110" y="236" fill="#022c22" font-size="10" text-anchor="middle" font-weight="700">stable</text>
  </g>

  <!-- Zeile 3 -->
  <g transform="translate(300,760)">
    <rect x="-140" y="-70" width="280" height="60" rx="10" fill="#1e293b" stroke="#22d3ee"/>
    <text x="0" y="-48" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">Reverse-Search (Ctrl+R)</text>
    <text x="0" y="-28" fill="#cbd5e1" font-size="11" text-anchor="middle">History rückwärts durchsuchen · v0.121.0</text>
  </g>
  <g transform="translate(700,760)">
    <rect x="-160" y="-70" width="320" height="60" rx="10" fill="#1e293b" stroke="#6366f1"/>
    <text x="0" y="-48" fill="#818cf8" font-size="13" font-weight="700" text-anchor="middle">Phase-Parameter</text>
    <text x="0" y="-28" fill="#cbd5e1" font-size="11" text-anchor="middle">GPT-5.3-Codex · zwingend gesetzt (Performance)</text>
  </g>
  <g transform="translate(1100,760)">
    <rect x="-160" y="-70" width="320" height="60" rx="10" fill="#1e293b" stroke="#10b981"/>
    <text x="0" y="-48" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle">MCP-Apps</text>
    <text x="0" y="-28" fill="#cbd5e1" font-size="11" text-anchor="middle">Tool-Calls via MCP-Registry, ab 04/2026</text>
  </g>

  <!-- Kleine Gas-Blasen Dekoration -->
  <g fill="#22d3ee" opacity="0.4">
    <circle cx="170" cy="150" r="4"/>
    <circle cx="185" cy="130" r="3"/>
    <circle cx="570" cy="150" r="4"/>
    <circle cx="970" cy="150" r="4"/>
    <circle cx="170" cy="430" r="4"/>
    <circle cx="570" cy="430" r="4"/>
    <circle cx="970" cy="430" r="4"/>
  </g>
</svg>
