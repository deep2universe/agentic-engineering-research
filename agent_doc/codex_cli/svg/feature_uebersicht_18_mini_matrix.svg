<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Mini-Matrix — Feature vs. Aktivierungspfad als Stellwerks-Dashboard</title>
  <desc>Tabelle mit zwölf Features und vier Aktivierungswegen (CLI-Flag, Slash, config.toml, Env). Jede Zelle zeigt den konkreten Aktivator oder einen Strich.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">Mini-Matrix — Feature × Aktivierung</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Stellwerks-Dashboard: Wo wird welches Feature aktiviert? Viele Features haben mehrere Wege.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Mini-Matrix</text>

  <!-- Tabellenrahmen -->
  <g transform="translate(60,140)">
    <rect width="1280" height="720" rx="12" fill="#0b1220" stroke="#334155"/>

    <!-- Header -->
    <rect x="0" y="0" width="1280" height="56" fill="#1e293b"/>
    <text x="24" y="36" fill="#e2e8f0" font-size="15" font-weight="700">Feature</text>
    <text x="400" y="36" fill="#818cf8" font-size="15" font-weight="700" text-anchor="middle">CLI-Flag</text>
    <text x="670" y="36" fill="#34d399" font-size="15" font-weight="700" text-anchor="middle">Slash-Command</text>
    <text x="940" y="36" fill="#c4b5fd" font-size="15" font-weight="700" text-anchor="middle">config.toml</text>
    <text x="1190" y="36" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">Environment-Variable</text>

    <!-- Spaltentrenner -->
    <line x1="260" y1="0" x2="260" y2="720" stroke="#334155"/>
    <line x1="540" y1="0" x2="540" y2="720" stroke="#334155"/>
    <line x1="800" y1="0" x2="800" y2="720" stroke="#334155"/>
    <line x1="1080" y1="0" x2="1080" y2="720" stroke="#334155"/>

    <!-- Zeilen -->
    <g font-family="'JetBrains Mono', monospace" font-size="13">
      <!-- Zeile 1: Modellwechsel -->
      <g transform="translate(0,56)">
        <rect width="1280" height="52" fill="#0b1220"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Modellwechsel</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle">-m</text>
        <text x="670" y="32" fill="#34d399" text-anchor="middle">/model</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">model</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 2: Reasoning -->
      <g transform="translate(0,108)">
        <rect width="1280" height="52" fill="#1e293b" opacity="0.3"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Reasoning-Effort</text>
        <text x="400" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="670" y="32" fill="#34d399" text-anchor="middle">/reasoning</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">model_reasoning_effort</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 3: Approval -->
      <g transform="translate(0,160)">
        <rect width="1280" height="52" fill="#0b1220"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Approval-Policy</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle">-a</text>
        <text x="670" y="32" fill="#34d399" text-anchor="middle">/approvals</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">approval_policy</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 4: Sandbox -->
      <g transform="translate(0,212)">
        <rect width="1280" height="52" fill="#1e293b" opacity="0.3"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Sandbox-Mode</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle">-s</text>
        <text x="670" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">sandbox_mode</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 5: Web-Search -->
      <g transform="translate(0,264)">
        <rect width="1280" height="52" fill="#0b1220"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Web-Search</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle">--search</text>
        <text x="670" y="32" fill="#34d399" text-anchor="middle">/search</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">tools.web_search.enabled</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 6: Image-Input -->
      <g transform="translate(0,316)">
        <rect width="1280" height="52" fill="#1e293b" opacity="0.3"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Image-Input</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle">-i</text>
        <text x="670" y="32" fill="#34d399" text-anchor="middle" font-size="12">drag &amp; paste</text>
        <text x="940" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 7: Custom Prompt -->
      <g transform="translate(0,368)">
        <rect width="1280" height="52" fill="#0b1220"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Custom Prompt (Slash)</text>
        <text x="400" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="670" y="32" fill="#34d399" text-anchor="middle" font-size="12">.md-Datei</text>
        <text x="940" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="1190" y="32" fill="#fbbf24" text-anchor="middle">CODEX_HOME</text>
      </g>
      <!-- Zeile 8: MCP-Server -->
      <g transform="translate(0,420)">
        <rect width="1280" height="52" fill="#1e293b" opacity="0.3"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">MCP-Server</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle" font-size="12">codex mcp add</text>
        <text x="670" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">[mcp_servers.*]</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 9: Cloud-Handoff -->
      <g transform="translate(0,472)">
        <rect width="1280" height="52" fill="#0b1220"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Cloud-Handoff</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle" font-size="12">codex cloud exec</text>
        <text x="670" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="940" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 10: Profile -->
      <g transform="translate(0,524)">
        <rect width="1280" height="52" fill="#1e293b" opacity="0.3"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Profile</text>
        <text x="400" y="32" fill="#818cf8" text-anchor="middle">-p</text>
        <text x="670" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">[profiles.*]</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 11: ZDR -->
      <g transform="translate(0,576)">
        <rect width="1280" height="52" fill="#0b1220"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Zero-Data-Retention (ZDR)</text>
        <text x="400" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="670" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">disable_response_storage</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 12: Notify -->
      <g transform="translate(0,628)">
        <rect width="1280" height="52" fill="#1e293b" opacity="0.3"/>
        <text x="24" y="32" fill="#e2e8f0" font-family="system-ui" font-weight="700">Notify-Hook</text>
        <text x="400" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="670" y="32" fill="#475569" text-anchor="middle">—</text>
        <text x="940" y="32" fill="#c4b5fd" text-anchor="middle">notify</text>
        <text x="1190" y="32" fill="#475569" text-anchor="middle">—</text>
      </g>
      <!-- Zeile 13: OSS-Shortcut -->
      <g transform="translate(0,680)">
        <rect width="1280" height="40" fill="#0b1220"/>
        <text x="24" y="26" fill="#e2e8f0" font-family="system-ui" font-weight="700">OSS-Shortcut</text>
        <text x="400" y="26" fill="#818cf8" text-anchor="middle">--oss</text>
        <text x="670" y="26" fill="#475569" text-anchor="middle">—</text>
        <text x="940" y="26" fill="#c4b5fd" text-anchor="middle">model_provider</text>
        <text x="1190" y="26" fill="#475569" text-anchor="middle">—</text>
      </g>
    </g>
  </g>

  <!-- Legende -->
  <g transform="translate(60,870)">
    <rect x="0" y="-16" width="14" height="14" fill="#818cf8"/>
    <text x="22" y="-4" fill="#cbd5e1" font-size="12">CLI-Flag (pro Aufruf)</text>
    <rect x="220" y="-16" width="14" height="14" fill="#34d399"/>
    <text x="242" y="-4" fill="#cbd5e1" font-size="12">Slash-Command (zur Laufzeit)</text>
    <rect x="500" y="-16" width="14" height="14" fill="#c4b5fd"/>
    <text x="522" y="-4" fill="#cbd5e1" font-size="12">config.toml (persistent)</text>
    <rect x="760" y="-16" width="14" height="14" fill="#fbbf24"/>
    <text x="782" y="-4" fill="#cbd5e1" font-size="12">Environment-Variable (Shell/CI)</text>
    <rect x="1060" y="-16" width="14" height="14" fill="#475569"/>
    <text x="1082" y="-4" fill="#cbd5e1" font-size="12">nicht verfügbar</text>
  </g>
</svg>
