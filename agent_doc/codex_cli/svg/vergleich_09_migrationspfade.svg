<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Migrationspfade zu Codex CLI</title>
  <desc>Drei parallele Gleise mit Weichen: Migration von Aider, Claude Code und Copilot CLI zu Codex CLI. Pro Pfad Config-Mapping, AGENTS.md-Umstieg und Hinweise.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#e2e8f0">Migrationspfade zu Codex CLI — Gleis-Weichen</text>
  <text x="60" y="90" font-size="16" fill="#94a3b8">Drei Ausgangstools · klare Übersetzungen für Config, AGENTS und Hinweise</text>
  <text x="1340" y="60" font-size="14" fill="#94a3b8" text-anchor="end">Kapitel 9 · Migration</text>

  <defs>
    <marker id="arrMig" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#818cf8"/>
    </marker>
  </defs>

  <!-- Ziel-Endbahnhof Codex rechts -->
  <g transform="translate(1100,130)">
    <rect x="0" y="0" width="260" height="680" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="2.5"/>
    <rect x="0" y="0" width="260" height="44" rx="16" fill="#312e81"/>
    <text x="130" y="30" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Codex CLI</text>
    <text x="130" y="70" font-size="13" fill="#c7d2fe" text-anchor="middle">Ziel-Bahnhof</text>
    <!-- Einfahrten Markierung -->
    <g font-size="11" fill="#94a3b8">
      <circle cx="20" cy="220" r="7" fill="#6366f1"/><text x="36" y="224">Gleis 1 · Aider</text>
      <circle cx="20" cy="420" r="7" fill="#6366f1"/><text x="36" y="424">Gleis 2 · Claude</text>
      <circle cx="20" cy="620" r="7" fill="#6366f1"/><text x="36" y="624">Gleis 3 · Copilot</text>
    </g>
    <!-- Key Artefakte -->
    <g transform="translate(20,260)">
      <rect width="220" height="100" rx="8" fill="#1e293b" stroke="#6366f1"/>
      <text x="10" y="24" font-size="12" font-weight="700" fill="#c7d2fe">~/.codex/config.toml</text>
      <text x="10" y="44" font-size="10" fill="#94a3b8">model · provider · approvals</text>
      <text x="10" y="62" font-size="10" fill="#94a3b8">mcp · profiles · sandbox</text>
      <text x="10" y="80" font-size="10" fill="#94a3b8">notify-Skript-Pfade</text>
    </g>
    <g transform="translate(20,460)">
      <rect width="220" height="100" rx="8" fill="#1e293b" stroke="#fbbf24"/>
      <text x="10" y="24" font-size="12" font-weight="700" fill="#fbbf24">AGENTS.md</text>
      <text x="10" y="44" font-size="10" fill="#94a3b8">Repo-Instructions</text>
      <text x="10" y="62" font-size="10" fill="#94a3b8">Sub-Agents · Policies</text>
      <text x="10" y="80" font-size="10" fill="#94a3b8">Commit-Disziplin</text>
    </g>
  </g>

  <!-- Gleis 1: Aider -->
  <g transform="translate(60,180)">
    <rect width="330" height="160" rx="14" fill="#022c22" stroke="#10b981"/>
    <rect width="330" height="36" rx="14" fill="#065f46"/>
    <text x="18" y="25" font-size="16" font-weight="700" fill="#fff">Ausgangs-Bahnhof: Aider</text>
    <g transform="translate(18,60)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">.aider.conf.yml</text>
      <text y="18" font-size="11" fill="#a7f3d0">model · provider · auto-commit</text>
      <text y="48" font-weight="600">.aider/CONVENTIONS.md</text>
      <text y="66" font-size="11" fill="#a7f3d0">Projekt-spezifische Regeln</text>
      <text y="96" font-weight="600">Auto-Commits pro Edit</text>
    </g>
  </g>
  <!-- Weiche und Mapping-Pfeile -->
  <g transform="translate(395,260)">
    <!-- 3 Brueckenschilder -->
    <g>
      <rect x="0" y="-70" width="680" height="40" rx="8" fill="#1e293b" stroke="#10b981"/>
      <text x="14" y="-45" font-size="12" fill="#6ee7b7" font-weight="700">.aider.conf.yml → ~/.codex/config.toml</text>
      <text x="360" y="-45" font-size="11" fill="#d1fae5">(model, provider-Feld mappen)</text>
    </g>
    <g>
      <rect x="0" y="-20" width="680" height="40" rx="8" fill="#1e293b" stroke="#fbbf24"/>
      <text x="14" y="5" font-size="12" fill="#fbbf24" font-weight="700">.aider/CONVENTIONS.md → AGENTS.md</text>
      <text x="330" y="5" font-size="11" fill="#fde68a">(direkte Übernahme der Regeln)</text>
    </g>
    <g>
      <rect x="0" y="30" width="680" height="40" rx="8" fill="#1e293b" stroke="#818cf8"/>
      <text x="14" y="55" font-size="12" fill="#c7d2fe" font-weight="700">Auto-Commit-Disziplin in AGENTS.md festlegen</text>
      <text x="430" y="55" font-size="11" fill="#ddd6fe">(Codex: Commit pro Turn)</text>
    </g>
  </g>
  <line x1="390" y1="260" x2="1100" y2="350" stroke="#818cf8" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrMig)"/>

  <!-- Gleis 2: Claude Code -->
  <g transform="translate(60,400)">
    <rect width="330" height="160" rx="14" fill="#2e1065" stroke="#a78bfa"/>
    <rect width="330" height="36" rx="14" fill="#4c1d95"/>
    <text x="18" y="25" font-size="16" font-weight="700" fill="#fff">Ausgangs-Bahnhof: Claude Code</text>
    <g transform="translate(18,60)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">.claude/settings.json</text>
      <text y="18" font-size="11" fill="#ddd6fe">permissions · mcpServers</text>
      <text y="48" font-weight="600">CLAUDE.md</text>
      <text y="66" font-size="11" fill="#ddd6fe">Repo-Kontext · Konventionen</text>
      <text y="96" font-weight="600">17 Hook-Events</text>
    </g>
  </g>
  <g transform="translate(395,480)">
    <g>
      <rect x="0" y="-70" width="680" height="40" rx="8" fill="#1e293b" stroke="#a78bfa"/>
      <text x="14" y="-45" font-size="12" fill="#ddd6fe" font-weight="700">.claude/settings.json → ~/.codex/config.toml</text>
      <text x="400" y="-45" font-size="11" fill="#ede9fe">(Approvals + MCP-Server)</text>
    </g>
    <g>
      <rect x="0" y="-20" width="680" height="40" rx="8" fill="#1e293b" stroke="#fbbf24"/>
      <text x="14" y="5" font-size="12" fill="#fbbf24" font-weight="700">CLAUDE.md → AGENTS.md</text>
      <text x="260" y="5" font-size="11" fill="#fde68a">(Codex liest via project_doc_fallback_filenames auch CLAUDE.md)</text>
    </g>
    <g>
      <rect x="0" y="30" width="680" height="40" rx="8" fill="#1e293b" stroke="#ef4444"/>
      <text x="14" y="55" font-size="12" fill="#fca5a5" font-weight="700">Hooks eindampfen: Codex hat nur notify</text>
      <text x="340" y="55" font-size="11" fill="#fecaca">(restliche Logik via Wrapper-Skripts)</text>
    </g>
  </g>
  <line x1="390" y1="480" x2="1100" y2="545" stroke="#818cf8" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrMig)"/>

  <!-- Gleis 3: Copilot CLI -->
  <g transform="translate(60,620)">
    <rect width="330" height="160" rx="14" fill="#451a03" stroke="#f59e0b"/>
    <rect width="330" height="36" rx="14" fill="#92400e"/>
    <text x="18" y="25" font-size="16" font-weight="700" fill="#fff">Ausgangs-Bahnhof: Copilot CLI</text>
    <g transform="translate(18,60)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">gh-auth · Copilot-Seat</text>
      <text y="18" font-size="11" fill="#fde68a">GH-Token · Issue/PR-Kontext</text>
      <text y="48" font-weight="600">Slash-Commands</text>
      <text y="66" font-size="11" fill="#fde68a">/fix · /explain · /review</text>
      <text y="96" font-weight="600">Preview-Features</text>
    </g>
  </g>
  <g transform="translate(395,700)">
    <g>
      <rect x="0" y="-70" width="680" height="40" rx="8" fill="#1e293b" stroke="#f59e0b"/>
      <text x="14" y="-45" font-size="12" fill="#fde68a" font-weight="700">Parallele Installation · getrennte Auth</text>
      <text x="350" y="-45" font-size="11" fill="#fed7aa">(kein Konflikt; beide Tools koexistieren)</text>
    </g>
    <g>
      <rect x="0" y="-20" width="680" height="40" rx="8" fill="#1e293b" stroke="#fbbf24"/>
      <text x="14" y="5" font-size="12" fill="#fbbf24" font-weight="700">Slash-Commands → AGENTS.md-Prompts / Skills</text>
      <text x="430" y="5" font-size="11" fill="#fde68a">(benannte Workflows im Repo)</text>
    </g>
    <g>
      <rect x="0" y="30" width="680" height="40" rx="8" fill="#1e293b" stroke="#818cf8"/>
      <text x="14" y="55" font-size="12" fill="#c7d2fe" font-weight="700">GH-Operations weiter via Copilot · Codex für Code</text>
      <text x="450" y="55" font-size="11" fill="#ddd6fe">(Hybrid-Betrieb möglich)</text>
    </g>
  </g>
  <line x1="390" y1="700" x2="1100" y2="750" stroke="#818cf8" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrMig)"/>

  <!-- Legende / Tipp -->
  <g transform="translate(60,830)" font-size="12" fill="#94a3b8">
    <text x="0" y="0" font-size="13" fill="#e2e8f0" font-weight="600">Metapher: Gleis-Weichen — drei Zuläufe, ein Ziel</text>
    <text y="20">Jedes Gleis zeigt die typischen Übersetzungen. AGENTS.md ist in jedem Pfad der zentrale Knoten.</text>
  </g>
</svg>
