    <text x="516" y="376" fill="#94a3b8">Eingabe: ns, manifest</text>
    <text x="516" y="392" fill="#94a3b8">Ausgabe: diff (yaml)</text>
    <text x="516" y="412" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#a5b4fc">tool.exec(...)</text>

    <rect x="720" y="318" width="200" height="120" rx="8" fill="#0b1224" stroke="#22d3ee"/>
    <text x="736" y="340" font-weight="600" fill="#67e8f9">openapi-lint</text>
