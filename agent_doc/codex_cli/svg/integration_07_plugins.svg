    <text x="296" y="392" fill="#94a3b8">Ausgabe: series[]</text>
    <text x="296" y="412" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#a5b4fc">tool.exec(...)</text>

