<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Codex CLI – Plugins (experimentell, ab 03/2026)</title>
  <desc>Plugin-Konzept als App-Store / Plug-in-Regal: wiederverwendbare Slash-Commands, Custom Tools und MCP-Server-Bundles. Distribution über codex marketplace add. Stand 04/2026 noch klein, wächst schnell.</desc>

  <defs>
    <marker id="arrPlg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="56" font-size="30" font-weight="700" fill="#e2e8f0">Plugins · App-Store für Codex CLI</text>
  <text x="40" y="84" font-size="15" fill="#94a3b8">Wiederverwendbare Slash-Commands, Custom Tools und gebundelte MCP-Server · ab Codex 0.121.0 (03/2026)</text>
  <text x="1360" y="56" font-size="14" fill="#64748b" text-anchor="end">Codex CLI · Kapitel 7</text>

