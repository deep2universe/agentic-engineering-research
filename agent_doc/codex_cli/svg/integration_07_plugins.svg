    <text x="76" y="274" fill="#94a3b8">Slash-Command-Bundle</text>

    <rect x="280" y="218" width="200" height="64" rx="8" fill="#0b1224" stroke="#a78bfa"/>
    <text x="296" y="240" font-weight="600" fill="#c4b5fd">/changelog</text>
