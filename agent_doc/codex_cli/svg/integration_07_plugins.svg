  <text x="990" y="548" font-size="16" font-weight="700" fill="#e2e8f0">Plugin-Skelett</text>
  <text x="990" y="568" font-size="12" fill="#94a3b8">~/.codex/plugins/&lt;name&gt;/</text>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12">
    <text x="1006" y="594" fill="#a5b4fc">plugin.toml</text>
    <text x="1140" y="594" fill="#94a3b8">Manifest, Version</text>
    <text x="1006" y="614" fill="#a5b4fc">commands/</text>
    <text x="1140" y="614" fill="#94a3b8">*.md Slash-Commands</text>
    <text x="1006" y="634" fill="#a5b4fc">tools/</text>
    <text x="1140" y="634" fill="#94a3b8">Custom-Tool-Skripte</text>
    <text x="1006" y="654" fill="#a5b4fc">mcp/</text>
