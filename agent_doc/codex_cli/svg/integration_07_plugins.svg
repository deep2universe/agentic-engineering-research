  <text x="990" y="730" font-size="14" font-weight="600" fill="#e2e8f0">Beispiel · plugin.toml</text>
  <rect x="990" y="742" width="350" height="116" rx="8" fill="#0b1224" stroke="#475569"/>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">
    <text x="1006" y="762" fill="#a5b4fc">name</text>
    <text x="1056" y="762" fill="#cbd5e1">= "qa-stack"</text>
    <text x="1006" y="780" fill="#a5b4fc">version</text>
    <text x="1080" y="780" fill="#cbd5e1">= "0.4.1"</text>
    <text x="1006" y="798" fill="#a5b4fc">codex_min</text>
    <text x="1110" y="798" fill="#cbd5e1">= "0.121.0"</text>
    <text x="1006" y="816" fill="#a5b4fc">commands</text>
    <text x="1110" y="816" fill="#cbd5e1">= ["e2e", "perf"]</text>
    <text x="1006" y="834" fill="#a5b4fc">mcp_servers</text>
    <text x="1132" y="834" fill="#cbd5e1">= ["pw","lh","axe"]</text>
    <text x="1006" y="852" fill="#a5b4fc">approval</text>
    <text x="1090" y="852" fill="#cbd5e1">= "never"</text>
  </g>

