<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Dateipfade — Verzeichnisbaum ~/.codex und &lt;repo&gt;</title>
  <desc>Baumstruktur von ~/.codex und dem Repo mit Dateirollen: config, auth, prompts, sessions, log, AGENTS.md, skills — leicht 3D.</desc>

  <defs>
    <linearGradient id="folder" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Dateipfade</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">Zwei Verzeichnisbäume: User-Scope (~/.codex) und Repo-Scope (&lt;repo&gt;)</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 12/13</text>

  <!-- Linker Baum: ~/.codex -->
  <g transform="translate(60 150)">
    <rect width="640" height="700" rx="14" fill="url(#folder)" stroke="#6366f1" stroke-width="2"/>
    <text x="20" y="40" fill="#818cf8" font-size="18" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">~/.codex/</text>
    <text x="20" y="62" fill="#94a3b8" font-size="12">User-Scope · überall verfügbar</text>

    <!-- Root folder icon -->
    <g transform="translate(480 30)">
      <path d="M 10 10 L 50 10 L 55 18 L 120 18 L 120 70 L 10 70 Z" fill="none" stroke="#6366f1" stroke-width="2"/>
      <text x="65" y="50" fill="#818cf8" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">HOME</text>
    </g>

    <!-- Tree lines -->
    <g stroke="#334155" stroke-width="1.5" fill="none">
      <line x1="40" y1="100" x2="40" y2="660"/>
      <line x1="40" y1="140" x2="70" y2="140"/>
      <line x1="40" y1="220" x2="70" y2="220"/>
      <line x1="40" y1="300" x2="70" y2="300"/>
      <line x1="40" y1="430" x2="70" y2="430"/>
      <line x1="40" y1="560" x2="70" y2="560"/>
      <line x1="40" y1="640" x2="70" y2="640"/>
    </g>

    <!-- config.toml -->
    <g transform="translate(80 120)">
      <rect width="540" height="70" rx="10" fill="#0b1220" stroke="#22d3ee"/>
      <rect x="12" y="12" width="28" height="36" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="50" y="28" fill="#22d3ee" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">config.toml</text>
      <text x="50" y="48" fill="#94a3b8" font-size="12">User-Config: model, sandbox, approval, profiles, mcp, providers</text>
      <text x="360" y="62" fill="#64748b" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace">← primäre Stellschraube</text>
    </g>

    <!-- auth.json -->
    <g transform="translate(80 200)">
      <rect width="540" height="70" rx="10" fill="#0b1220" stroke="#10b981"/>
      <rect x="12" y="12" width="28" height="36" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="50" y="28" fill="#10b981" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">auth.json</text>
      <text x="50" y="48" fill="#94a3b8" font-size="12">OAuth-Token-Cache · von codex login befüllt</text>
      <text x="360" y="62" fill="#64748b" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace">nie committen — Secret!</text>
    </g>

    <!-- prompts/ -->
    <g transform="translate(80 280)">
      <rect width="540" height="120" rx="10" fill="#0b1220" stroke="#a78bfa"/>
      <path d="M 12 14 L 34 14 L 38 20 L 72 20 L 72 46 L 12 46 Z" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="80" y="30" fill="#a78bfa" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">prompts/</text>
      <text x="80" y="52" fill="#94a3b8" font-size="12">Custom Slash-Commands (Markdown)</text>
      <g transform="translate(24 60)" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">
        <text x="0" y="14" fill="#64748b">└─</text>
        <text x="20" y="14" fill="#c4b5fd">review_pr.md</text>
        <text x="140" y="14" fill="#64748b">  ·  eigene /review_pr</text>
        <text x="0" y="34" fill="#64748b">└─</text>
        <text x="20" y="34" fill="#c4b5fd">gen_tests.md</text>
        <text x="140" y="34" fill="#64748b">  ·  eigene /gen_tests</text>
        <text x="0" y="54" fill="#64748b">└─</text>
        <text x="20" y="54" fill="#c4b5fd">&lt;beliebig&gt;.md</text>
        <text x="140" y="54" fill="#64748b">  ·  Dateiname = Command</text>
      </g>
    </g>

    <!-- sessions/ -->
    <g transform="translate(80 410)">
      <rect width="540" height="120" rx="10" fill="#0b1220" stroke="#22d3ee"/>
      <path d="M 12 14 L 34 14 L 38 20 L 72 20 L 72 46 L 12 46 Z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="80" y="30" fill="#22d3ee" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">sessions/</text>
      <text x="80" y="52" fill="#94a3b8" font-size="12">JSONL-Transkripte pro Session — resume + Audit</text>
      <g transform="translate(24 60)" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">
        <text x="0" y="14" fill="#64748b">└─</text>
        <text x="20" y="14" fill="#22d3ee">2026-04-17_14-02.jsonl</text>
        <text x="220" y="14" fill="#64748b"> · letzter Run</text>
        <text x="0" y="34" fill="#64748b">└─</text>
        <text x="20" y="34" fill="#22d3ee">2026-04-17_09-31.jsonl</text>
        <text x="0" y="54" fill="#64748b">└─</text>
        <text x="20" y="54" fill="#22d3ee">…</text>
        <text x="60" y="54" fill="#64748b">  gesplittet nach Zeit/Titel</text>
      </g>
    </g>

    <!-- log -->
    <g transform="translate(80 540)">
      <rect width="540" height="70" rx="10" fill="#0b1220" stroke="#f59e0b"/>
      <path d="M 12 14 L 34 14 L 38 20 L 72 20 L 72 46 L 12 46 Z" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="80" y="30" fill="#f59e0b" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">log/codex.log</text>
      <text x="80" y="52" fill="#94a3b8" font-size="12">Rotating-Log; mit RUST_LOG=codex=debug sehr gesprächig</text>
    </g>

    <!-- skills hint -->
    <g transform="translate(80 620)">
      <rect width="540" height="60" rx="10" fill="#0b1220" stroke="#64748b" stroke-dasharray="4 4"/>
      <text x="20" y="26" fill="#94a3b8" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">~/.codex/skills/</text>
      <text x="20" y="46" fill="#64748b" font-size="11">User-weite Skills (optional) · werden vor repo-lokalen geladen</text>
    </g>
  </g>

  <!-- Rechter Baum: <repo> -->
  <g transform="translate(720 150)">
    <rect width="620" height="700" rx="14" fill="url(#folder)" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="40" fill="#10b981" font-size="18" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">&lt;repo&gt;/</text>
    <text x="20" y="62" fill="#94a3b8" font-size="12">Repo-Scope · nur in trusted Projekten aktiv</text>

    <g transform="translate(460 30)">
      <path d="M 10 10 L 50 10 L 55 18 L 120 18 L 120 70 L 10 70 Z" fill="none" stroke="#10b981" stroke-width="2"/>
      <text x="65" y="50" fill="#10b981" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">REPO</text>
    </g>

    <g stroke="#334155" stroke-width="1.5" fill="none">
      <line x1="40" y1="100" x2="40" y2="660"/>
      <line x1="40" y1="140" x2="70" y2="140"/>
      <line x1="40" y1="240" x2="70" y2="240"/>
      <line x1="40" y1="370" x2="70" y2="370"/>
      <line x1="40" y1="500" x2="70" y2="500"/>
      <line x1="40" y1="620" x2="70" y2="620"/>
    </g>

    <!-- AGENTS.md -->
    <g transform="translate(80 120)">
      <rect width="520" height="90" rx="10" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
      <rect x="12" y="12" width="28" height="36" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="50" y="28" fill="#10b981" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">AGENTS.md</text>
      <text x="50" y="48" fill="#94a3b8" font-size="12">Projekt-Instruktionen (Tooling, Tests, Security)</text>
      <text x="50" y="70" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">wird automatisch in den Kontext geladen</text>
    </g>

    <!-- .codex/config.toml -->
    <g transform="translate(80 220)">
      <rect width="520" height="130" rx="10" fill="#0b1220" stroke="#22d3ee"/>
      <path d="M 12 14 L 34 14 L 38 20 L 72 20 L 72 46 L 12 46 Z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="80" y="30" fill="#22d3ee" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">.codex/</text>
      <g transform="translate(24 50)" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">
        <text x="0" y="14" fill="#64748b">└─</text>
        <text x="20" y="14" fill="#22d3ee" font-size="13">config.toml</text>
        <text x="134" y="14" fill="#94a3b8"> · Projekt-Overrides</text>
        <text x="20" y="30" fill="#ef4444" font-size="10">nur in „trusted“ Projekten aktiv</text>
        <text x="0" y="54" fill="#64748b">└─</text>
        <text x="20" y="54" fill="#a78bfa" font-size="13">prompts/</text>
        <text x="108" y="54" fill="#94a3b8">  · Projekt-Slash-Commands</text>
      </g>
    </g>

    <!-- skills/ -->
    <g transform="translate(80 350)">
      <rect width="520" height="130" rx="10" fill="#0b1220" stroke="#a78bfa"/>
      <path d="M 12 14 L 34 14 L 38 20 L 72 20 L 72 46 L 12 46 Z" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="80" y="30" fill="#a78bfa" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">skills/&lt;name&gt;/SKILL.md</text>
      <text x="80" y="52" fill="#94a3b8" font-size="12">geteilte Skills — wiederverwendbare Routinen</text>
      <g transform="translate(24 66)" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">
        <text x="0" y="14" fill="#64748b">└─</text>
        <text x="20" y="14" fill="#c4b5fd">skills/release/SKILL.md</text>
        <text x="0" y="34" fill="#64748b">└─</text>
        <text x="20" y="34" fill="#c4b5fd">skills/migrate_db/SKILL.md</text>
        <text x="0" y="54" fill="#64748b">└─</text>
        <text x="20" y="54" fill="#c4b5fd">skills/&lt;…&gt;/  · jede mit eigener SKILL.md</text>
      </g>
    </g>

    <!-- git -->
    <g transform="translate(80 480)">
      <rect width="520" height="120" rx="10" fill="#0b1220" stroke="#f59e0b"/>
      <path d="M 12 14 L 34 14 L 38 20 L 72 20 L 72 46 L 12 46 Z" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="80" y="30" fill="#f59e0b" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">.git/</text>
      <text x="80" y="52" fill="#94a3b8" font-size="12">Codex nutzt Git für /diff · /review · commit-Vorschläge</text>
      <text x="20" y="90" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">sandbox liest erlaubt, schreibt nur mit workspace-write</text>
    </g>

    <!-- README -->
    <g transform="translate(80 600)">
      <rect width="520" height="80" rx="10" fill="#0b1220" stroke="#94a3b8"/>
      <rect x="12" y="12" width="28" height="36" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="50" y="28" fill="#cbd5e1" font-size="14" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">README.md · src/ · tests/</text>
      <text x="50" y="48" fill="#94a3b8" font-size="12">dein Code — Codex liest &amp; schreibt hier (je Sandbox-Mode)</text>
    </g>
  </g>

  <!-- Precedence-Badge -->
  <g transform="translate(530 400)">
    <rect x="-80" y="0" width="180" height="100" rx="14" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
    <text x="10" y="28" fill="#818cf8" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">PRECEDENCE</text>
    <text x="10" y="52" fill="#e2e8f0" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">repo &gt; user</text>
    <text x="10" y="72" fill="#94a3b8" font-size="10" text-anchor="middle">Repo-Config überschreibt</text>
    <text x="10" y="86" fill="#94a3b8" font-size="10" text-anchor="middle">User-Defaults (wenn trusted)</text>
  </g>
</svg>
