<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Workflow 11 — Multi-Agent: Codex + Claude als Reviewer</title>
  <desc>Codex startet als MCP-Server via codex mcp serve --profile review. Claude Code bindet ihn als mcpServers-Eintrag (stdio) ein und nutzt das Tool codex-reviewer. Bidirektionale Variante möglich. Metapher: Tandem / Verstärker-Setup.</desc>

  <defs>
    <marker id="arrow_violet11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow_indigo11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="60" y="68" fill="#e2e8f0" font-size="30" font-weight="700">11. Multi-Agent: Codex + Claude als Reviewer</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">Tandem-Setup über MCP — Codex als Tool im Claude-Workflow (oder umgekehrt)</text>
  <text x="1340" y="68" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 11</text>

  <!-- Linke Spalte: Claude (Konsument) -->
  <g>
    <rect x="60" y="150" width="420" height="500" rx="16" ry="16" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="80" y="180" fill="#c4b5fd" font-size="14" font-weight="700">CLAUDE CODE · KONSUMENT</text>
    <text x="80" y="208" fill="#e2e8f0" font-size="18" font-weight="600">Primär-Agent (Coder)</text>

    <!-- mcpServers JSON -->
    <rect x="80" y="226" width="380" height="220" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="92" y="248" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">// claude mcpServers (JSON)</text>
    <text x="92" y="268" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', monospace">{</text>
    <text x="106" y="286" fill="#67e8f9" font-size="12" font-family="'JetBrains Mono', monospace">"mcpServers": {</text>
    <text x="120" y="304" fill="#a5b4fc" font-size="12" font-family="'JetBrains Mono', monospace">"codex-reviewer": {</text>
    <text x="134" y="322" fill="#fbbf24" font-size="12" font-family="'JetBrains Mono', monospace">"type": "stdio",</text>
    <text x="134" y="340" fill="#fbbf24" font-size="12" font-family="'JetBrains Mono', monospace">"command": "codex",</text>
    <text x="134" y="358" fill="#fbbf24" font-size="12" font-family="'JetBrains Mono', monospace">"args": ["mcp", "serve",</text>
    <text x="148" y="376" fill="#fbbf24" font-size="12" font-family="'JetBrains Mono', monospace">"--profile", "review"]</text>
    <text x="120" y="394" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', monospace">}</text>
    <text x="106" y="412" fill="#67e8f9" font-size="12" font-family="'JetBrains Mono', monospace">}</text>
    <text x="92" y="430" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', monospace">}</text>

    <!-- Aufruf -->
    <rect x="80" y="466" width="380" height="160" rx="8" fill="#0f172a" stroke="#a78bfa"/>
    <text x="92" y="488" fill="#c4b5fd" font-size="12" font-weight="700">PROMPT-AUFRUF</text>
    <text x="92" y="510" fill="#e2e8f0" font-size="13">"Use the codex-reviewer MCP to get</text>
    <text x="92" y="530" fill="#e2e8f0" font-size="13">a second opinion on the last commit.</text>
    <text x="92" y="550" fill="#e2e8f0" font-size="13">Summarize its findings."</text>
    <text x="92" y="582" fill="#94a3b8" font-size="12">Claude → ruft Tool → erhält Codex-Output</text>
    <text x="92" y="602" fill="#94a3b8" font-size="12">→ aggregiert mit eigenem Kontext.</text>
  </g>

  <!-- Rechte Spalte: Codex (MCP-Server) -->
  <g>
    <rect x="920" y="150" width="420" height="500" rx="16" ry="16" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="940" y="180" fill="#a5b4fc" font-size="14" font-weight="700">CODEX CLI · MCP-SERVER</text>
    <text x="940" y="208" fill="#e2e8f0" font-size="18" font-weight="600">Reviewer (read-only)</text>

    <rect x="940" y="226" width="380" height="120" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="952" y="248" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">$ Start des Servers</text>
    <text x="952" y="270" fill="#67e8f9" font-size="13" font-family="'JetBrains Mono', monospace">codex mcp serve --profile review</text>
    <text x="952" y="296" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">stdio-Transport (default)</text>
    <text x="952" y="316" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', monospace">Profil "review" = read-only Sandbox</text>

    <rect x="940" y="366" width="380" height="260" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="952" y="388" fill="#a5b4fc" font-size="12" font-weight="700">EXPONIERTE TOOLS</text>
    <g transform="translate(952,402)">
      <circle cx="6" cy="14" r="3" fill="#10b981"/>
      <text x="20" y="18" fill="#e2e8f0" font-size="13">review_diff(range)</text>
      <circle cx="6" cy="38" r="3" fill="#10b981"/>
      <text x="20" y="42" fill="#e2e8f0" font-size="13">explain_file(path)</text>
      <circle cx="6" cy="62" r="3" fill="#10b981"/>
      <text x="20" y="66" fill="#e2e8f0" font-size="13">grep_codebase(pattern)</text>
      <circle cx="6" cy="86" r="3" fill="#10b981"/>
      <text x="20" y="90" fill="#e2e8f0" font-size="13">test_subset(filter)</text>
      <circle cx="6" cy="110" r="3" fill="#10b981"/>
      <text x="20" y="114" fill="#e2e8f0" font-size="13">summarize_repo()</text>
      <circle cx="6" cy="138" r="3" fill="#fbbf24"/>
      <text x="20" y="142" fill="#fbbf24" font-size="12">Profil "review" verbietet Writes</text>
      <circle cx="6" cy="162" r="3" fill="#a78bfa"/>
      <text x="20" y="166" fill="#a78bfa" font-size="12">Eigener Modell-Endpoint möglich</text>
      <circle cx="6" cy="186" r="3" fill="#22d3ee"/>
      <text x="20" y="190" fill="#22d3ee" font-size="12">Verschachtelung erlaubt</text>
    </g>
  </g>

  <!-- Mittlere Bridge -->
  <g>
    <rect x="500" y="280" width="400" height="240" rx="14" ry="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="520" y="310" fill="#67e8f9" font-size="13" font-weight="700">MCP — TANDEM-BRIDGE</text>
    <text x="520" y="338" fill="#e2e8f0" font-size="16" font-weight="600">Model Context Protocol</text>
    <text x="520" y="362" fill="#94a3b8" font-size="13">stdio · JSON-RPC · listTools/callTool</text>

    <!-- Tandem-Symbol: zwei Räder verbunden -->
    <g transform="translate(560,400)">
      <circle cx="40" cy="60" r="34" fill="none" stroke="#a78bfa" stroke-width="3"/>
      <circle cx="40" cy="60" r="6" fill="#a78bfa"/>
      <circle cx="240" cy="60" r="34" fill="none" stroke="#6366f1" stroke-width="3"/>
      <circle cx="240" cy="60" r="6" fill="#6366f1"/>
      <line x1="74" y1="60" x2="206" y2="60" stroke="#22d3ee" stroke-width="3"/>
      <rect x="124" y="44" width="32" height="20" rx="3" fill="#0f172a" stroke="#67e8f9" stroke-width="1.5"/>
      <text x="140" y="58" fill="#67e8f9" font-size="11" text-anchor="middle">MCP</text>
      <text x="40" y="118" fill="#c4b5fd" font-size="11" text-anchor="middle">Claude</text>
      <text x="240" y="118" fill="#a5b4fc" font-size="11" text-anchor="middle">Codex</text>
    </g>
  </g>

  <!-- Pfeile zwischen Claude und MCP-Bridge -->
  <line x1="480" y1="380" x2="498" y2="380" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow_violet11)"/>
  <line x1="498" y1="420" x2="480" y2="420" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow_indigo11)"/>

  <line x1="900" y1="380" x2="918" y2="380" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow_violet11)"/>
  <line x1="918" y1="420" x2="900" y2="420" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow_indigo11)"/>

  <text x="700" y="270" fill="#94a3b8" font-size="12" text-anchor="middle">callTool(name, args) ↕ result/stream</text>

  <!-- Bidirektionale Variante unten -->
  <g>
    <rect x="60" y="680" width="1280" height="180" rx="12" ry="12" fill="#1e293b" stroke="#334155"/>
    <text x="80" y="710" fill="#fbbf24" font-size="14" font-weight="700">BIDIREKTIONALE VARIANTE — wer ist Server, wer ist Client?</text>

    <g transform="translate(80,728)">
      <rect x="0" y="0" width="600" height="120" rx="10" fill="#0f172a" stroke="#a78bfa"/>
      <text x="14" y="22" fill="#c4b5fd" font-size="12" font-weight="700">VARIANTE A · CLAUDE PRIMÄR (oben gezeigt)</text>
      <text x="14" y="46" fill="#e2e8f0" font-size="13">codex mcp serve · Claude orchestriert</text>
      <text x="14" y="68" fill="#e2e8f0" font-size="13">Use-Case: Claude codiert, Codex reviewt unabhängig</text>
      <text x="14" y="92" fill="#94a3b8" font-size="12">Stärke: Modell-Diversität, Bias-Reduktion</text>
    </g>

    <g transform="translate(720,728)">
      <rect x="0" y="0" width="600" height="120" rx="10" fill="#0f172a" stroke="#6366f1"/>
      <text x="14" y="22" fill="#a5b4fc" font-size="12" font-weight="700">VARIANTE B · CODEX PRIMÄR (umgekehrt)</text>
      <text x="14" y="46" fill="#e2e8f0" font-size="13">Claude als MCP-Server in ~/.codex/config.toml registrieren</text>
      <text x="14" y="68" fill="#e2e8f0" font-size="13">Use-Case: Codex codiert, Claude liefert Style-Critique</text>
      <text x="14" y="92" fill="#94a3b8" font-size="12">Achtung: Token-Kosten verdoppeln sich, klar deckeln</text>
    </g>
  </g>
</svg>
