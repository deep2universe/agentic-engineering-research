<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Notify-Payload — Brief mit Postroute</title>
  <desc>JSON-Payload als Brief mit Feldern status/title/summary/duration/url/last_assistant_message; Pipeline-Pfeile zu drei Outputs: Slack, Desktop, CI.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-em" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Notify-Payload · stdin</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">Brief mit Postroute: ein JSON-Objekt, drei Ziele</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 08/13</text>

  <!-- Briefumschlag / Payload links -->
  <g transform="translate(60 170)">
    <rect width="540" height="580" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>

    <!-- "Stempel" oben -->
    <g transform="translate(440 20)">
      <rect width="80" height="80" rx="6" fill="#0b1220" stroke="#f59e0b" stroke-width="2" transform="rotate(8 40 40)"/>
      <text x="40" y="38" fill="#f59e0b" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" transform="rotate(8 40 40)">NOTIFY</text>
      <text x="40" y="56" fill="#f59e0b" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" transform="rotate(8 40 40)">stdin</text>
    </g>

    <text x="30" y="50" fill="#e2e8f0" font-size="18" font-weight="700">JSON-Payload</text>
    <text x="30" y="72" fill="#94a3b8" font-size="12">via pipe auf stdin der notify-Hook-Binary</text>

    <!-- Code-Block -->
    <g transform="translate(30 100)" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
      <rect width="480" height="460" rx="10" fill="#0b1220" stroke="#334155"/>

      <text x="20" y="30" fill="#94a3b8">{</text>

      <text x="40" y="60" fill="#22d3ee">"status"</text>
      <text x="120" y="60" fill="#e2e8f0">: </text>
      <text x="140" y="60" fill="#10b981">"success"</text>
      <text x="230" y="60" fill="#64748b">   ← success · error · cancelled</text>

      <text x="40" y="90" fill="#22d3ee">"title"</text>
      <text x="120" y="90" fill="#e2e8f0">: </text>
      <text x="140" y="90" fill="#10b981">"Codex run"</text>
      <text x="260" y="90" fill="#64748b">   ← kurz &amp; prägnant</text>

      <text x="40" y="120" fill="#22d3ee">"summary"</text>
      <text x="140" y="120" fill="#e2e8f0">: </text>
      <text x="160" y="120" fill="#10b981">"…"</text>
      <text x="200" y="120" fill="#64748b">   ← 1-2 Sätze, was passiert ist</text>

      <text x="40" y="150" fill="#22d3ee">"duration"</text>
      <text x="140" y="150" fill="#e2e8f0">: </text>
      <text x="160" y="150" fill="#f59e0b">123</text>
      <text x="200" y="150" fill="#64748b">    ← Sekunden (Zahl)</text>

      <text x="40" y="180" fill="#22d3ee">"url"</text>
      <text x="120" y="180" fill="#e2e8f0">: </text>
      <text x="140" y="180" fill="#10b981">"https://chatgpt.com/codex/tasks/…"</text>

      <text x="40" y="210" fill="#22d3ee">"last_assistant_message"</text>
      <text x="40" y="226" fill="#e2e8f0">: </text>
      <text x="60" y="226" fill="#10b981">"…"</text>
      <text x="100" y="226" fill="#64748b"> ← letzter Agenten-Text</text>

      <text x="20" y="256" fill="#94a3b8">}</text>

      <line x1="20" y1="276" x2="460" y2="276" stroke="#334155" stroke-dasharray="3 3"/>

      <text x="20" y="300" fill="#a78bfa" font-size="11" font-weight="700">Config-Einbindung</text>
      <text x="20" y="322" fill="#94a3b8" font-size="11">notify = ["/usr/local/bin/codex-notify"]</text>

      <text x="20" y="356" fill="#a78bfa" font-size="11" font-weight="700">Trigger</text>
      <text x="20" y="378" fill="#94a3b8" font-size="11">nach jeder Session · success &amp; failure</text>

      <text x="20" y="412" fill="#a78bfa" font-size="11" font-weight="700">Exit-Codes</text>
      <text x="20" y="434" fill="#94a3b8" font-size="11">0 = OK · ≠0 wird geloggt, Codex läuft weiter</text>
    </g>
  </g>

  <!-- Pipeline-Pfeil -->
  <g transform="translate(620 300)">
    <path d="M 0 160 L 220 160" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="40" y="130" width="140" height="60" rx="8" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
    <text x="110" y="155" fill="#818cf8" font-size="13" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">notify-hook</text>
    <text x="110" y="175" fill="#94a3b8" font-size="11" text-anchor="middle">Router / Dispatcher</text>
    <text x="110" y="220" fill="#64748b" font-size="11" text-anchor="middle">stdin → stdout/HTTP</text>
  </g>

  <!-- 3 Outputs rechts -->
  <!-- Slack -->
  <g transform="translate(900 200)">
    <rect width="440" height="150" rx="12" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(30 30)">
      <rect width="30" height="30" rx="6" fill="#10b981"/>
      <text x="15" y="21" fill="#0f172a" font-size="15" font-weight="800" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">S</text>
    </g>
    <text x="80" y="48" fill="#10b981" font-size="17" font-weight="700">Slack</text>
    <text x="80" y="72" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">POST /slack/webhook</text>
    <text x="30" y="104" fill="#94a3b8" font-size="12">Team-Channel: Status, Link zum Task</text>
    <text x="30" y="124" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">jq '{text: .title}' | curl -d @- …</text>
  </g>

  <!-- Desktop -->
  <g transform="translate(900 380)">
    <rect width="440" height="150" rx="12" fill="#0b1220" stroke="#818cf8" stroke-width="2"/>
    <g transform="translate(30 30)">
      <rect width="30" height="22" rx="3" fill="none" stroke="#818cf8" stroke-width="2"/>
      <rect x="4" y="4" width="22" height="14" fill="#818cf8"/>
      <rect x="10" y="24" width="10" height="4" fill="#818cf8"/>
    </g>
    <text x="80" y="48" fill="#818cf8" font-size="17" font-weight="700">Desktop</text>
    <text x="80" y="72" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">osascript · notify-send</text>
    <text x="30" y="104" fill="#94a3b8" font-size="12">OS-Notifier bei längeren Läufen</text>
    <text x="30" y="124" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">terminal-notifier -title "$title" …</text>
  </g>

  <!-- CI -->
  <g transform="translate(900 560)">
    <rect width="440" height="150" rx="12" fill="#0b1220" stroke="#f59e0b" stroke-width="2"/>
    <g transform="translate(30 30)">
      <circle cx="15" cy="15" r="13" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <path d="M 10 15 L 14 19 L 22 10" fill="none" stroke="#f59e0b" stroke-width="2"/>
    </g>
    <text x="80" y="48" fill="#f59e0b" font-size="17" font-weight="700">CI / PR-Bot</text>
    <text x="80" y="72" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">gh pr comment · GitHub API</text>
    <text x="30" y="104" fill="#94a3b8" font-size="12">Automatischer Kommentar mit Summary</text>
    <text x="30" y="124" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">gh pr comment "$PR" --body "$summary"</text>
  </g>

  <!-- Pfeile vom Router zu den 3 Zielen -->
  <g>
    <path d="M 840 460 C 880 460 880 275 900 275" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arr-em)"/>
    <path d="M 840 460 L 900 455" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M 840 460 C 880 460 880 635 900 635" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- Fussnote -->
  <g transform="translate(60 800)">
    <rect width="1280" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="28" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="1">ROUTE</text>
    <text x="20" y="50" fill="#cbd5e1" font-size="12">Codex → Payload auf stdin → notify-Hook (eigene Binary/Script) → beliebige Kanäle (Webhooks, OS, CI-API). Kein Netz-Zugriff aus der Sandbox nötig, wenn Hook außerhalb läuft.</text>
  </g>
</svg>
