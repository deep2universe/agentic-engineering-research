<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>10-Sekunden-Workflow — Stoppuhr-Ticker mit fünf Schritten</title>
  <desc>Horizontaler Zeitstrahl mit Stoppuhr-Metapher: cd, codex, /diff, /review, git commit — fünf Stempel entlang einer Timeline.</desc>

  <defs>
    <marker id="aw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset=".5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">10-Sekunden-Workflow</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">Vom Terminal zum Commit: fünf Takte, eine Session</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 13/13</text>

  <!-- Stoppuhr oben rechts -->
  <g transform="translate(1120 140)">
    <rect x="96" y="0" width="28" height="16" rx="4" fill="#334155"/>
    <rect x="104" y="-12" width="12" height="14" rx="2" fill="#334155"/>
    <rect x="160" y="14" width="36" height="20" rx="4" fill="#334155" transform="rotate(35 178 24)"/>
    <circle cx="110" cy="110" r="100" fill="#0b1220" stroke="#334155" stroke-width="4"/>
    <circle cx="110" cy="110" r="92" fill="none" stroke="#1e293b" stroke-width="2"/>

    <g stroke="#64748b" stroke-width="2">
      <line x1="110" y1="22" x2="110" y2="34"/>
      <line x1="110" y1="186" x2="110" y2="198"/>
      <line x1="22" y1="110" x2="34" y2="110"/>
      <line x1="186" y1="110" x2="198" y2="110"/>
    </g>

    <text x="110" y="80" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">10 s</text>
    <!-- zeiger -->
    <line x1="110" y1="110" x2="170" y2="60" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <circle cx="110" cy="110" r="6" fill="#10b981"/>
    <text x="110" y="160" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="700">READY</text>
  </g>

  <!-- Zeitstrahl -->
  <g transform="translate(80 520)">
    <rect x="0" y="0" width="1080" height="16" rx="8" fill="#1e293b"/>
    <rect x="0" y="0" width="1080" height="16" rx="8" fill="url(#bar)" opacity="0.8"/>

    <!-- tick marks -->
    <g stroke="#0f172a" stroke-width="2">
      <line x1="120" y1="0" x2="120" y2="16"/>
      <line x1="360" y1="0" x2="360" y2="16"/>
      <line x1="600" y1="0" x2="600" y2="16"/>
      <line x1="840" y1="0" x2="840" y2="16"/>
    </g>

    <!-- sekunden labels -->
    <g fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle">
      <text x="0" y="38">0s</text>
      <text x="240" y="38">~2s</text>
      <text x="480" y="38">~4s</text>
      <text x="720" y="38">~6s</text>
      <text x="960" y="38">~8s</text>
      <text x="1080" y="38">~10s</text>
    </g>

    <!-- Step nodes -->
    <g>
      <circle cx="120" cy="8" r="14" fill="#6366f1" stroke="#0f172a" stroke-width="3"/>
      <text x="120" y="12" fill="#0f172a" font-size="13" font-weight="800" text-anchor="middle">1</text>

      <circle cx="360" cy="8" r="14" fill="#22d3ee" stroke="#0f172a" stroke-width="3"/>
      <text x="360" y="12" fill="#0f172a" font-size="13" font-weight="800" text-anchor="middle">2</text>

      <circle cx="600" cy="8" r="14" fill="#a78bfa" stroke="#0f172a" stroke-width="3"/>
      <text x="600" y="12" fill="#0f172a" font-size="13" font-weight="800" text-anchor="middle">3</text>

      <circle cx="840" cy="8" r="14" fill="#f59e0b" stroke="#0f172a" stroke-width="3"/>
      <text x="840" y="12" fill="#0f172a" font-size="13" font-weight="800" text-anchor="middle">4</text>

      <circle cx="1080" cy="8" r="14" fill="#10b981" stroke="#0f172a" stroke-width="3"/>
      <text x="1080" y="12" fill="#0f172a" font-size="13" font-weight="800" text-anchor="middle">5</text>
    </g>
  </g>

  <!-- Stempel-Karten (oben + unten abwechselnd) -->
  <!-- 1: cd  -->
  <g transform="translate(20 180)">
    <rect width="220" height="280" rx="12" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
    <text x="20" y="34" fill="#818cf8" font-size="14" font-weight="700" letter-spacing="1">SCHRITT 1</text>
    <text x="20" y="64" fill="#e2e8f0" font-size="20" font-weight="700">cd</text>
    <text x="20" y="94" fill="#94a3b8" font-size="12">ins Repo wechseln · Codex scoped auf cwd</text>
    <rect x="20" y="110" width="180" height="50" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="140" fill="#818cf8" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">cd ~/code/app</text>
    <text x="20" y="190" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">AGENTS.md wird geladen</text>
    <text x="20" y="210" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">.codex/ wird geprüft</text>
    <text x="20" y="244" fill="#94a3b8" font-size="11">Trust-Check nötig?</text>
    <text x="20" y="262" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">→ yes, trusted</text>
  </g>
  <line x1="130" y1="460" x2="200" y2="528" stroke="#6366f1" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- 2: codex  -->
  <g transform="translate(260 580)">
    <rect width="240" height="280" rx="12" fill="#0b1220" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="14" font-weight="700" letter-spacing="1">SCHRITT 2</text>
    <text x="20" y="64" fill="#e2e8f0" font-size="20" font-weight="700">codex</text>
    <text x="20" y="94" fill="#94a3b8" font-size="12">TUI starten · Prompt eingeben</text>
    <rect x="20" y="108" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="128" fill="#22d3ee" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">codex "&lt;ticket-prompt&gt;"</text>
    <text x="30" y="148" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">z.B. "impl. endpoint /v2/users"</text>
    <text x="30" y="168" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">Tab = accept · S-Tab = reject</text>
    <text x="20" y="200" fill="#94a3b8" font-size="11">Approvals durchklicken</text>
    <text x="20" y="218" fill="#94a3b8" font-size="11">Agent schreibt in workspace</text>
    <text x="20" y="252" fill="#64748b" font-size="11">Default: --full-auto</text>
  </g>
  <line x1="380" y1="580" x2="440" y2="536" stroke="#22d3ee" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- 3: /diff -->
  <g transform="translate(520 180)">
    <rect width="240" height="280" rx="12" fill="#0b1220" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="34" fill="#a78bfa" font-size="14" font-weight="700" letter-spacing="1">SCHRITT 3</text>
    <text x="20" y="64" fill="#e2e8f0" font-size="20" font-weight="700">/diff</text>
    <text x="20" y="94" fill="#94a3b8" font-size="12">Git-Diff der Session ansehen</text>
    <rect x="20" y="108" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="130" fill="#a78bfa" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">/diff</text>
    <text x="30" y="150" fill="#10b981" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">+ added   lines</text>
    <text x="30" y="168" fill="#ef4444" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">- removed lines</text>
    <text x="20" y="200" fill="#94a3b8" font-size="11">Schneller Sicht-Check:</text>
    <text x="20" y="218" fill="#94a3b8" font-size="11">Scope · Tests · Imports</text>
    <text x="20" y="252" fill="#64748b" font-size="11">vor /review nützlich</text>
  </g>
  <line x1="640" y1="460" x2="680" y2="528" stroke="#a78bfa" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- 4: /review -->
  <g transform="translate(760 580)">
    <rect width="240" height="280" rx="12" fill="#0b1220" stroke="#f59e0b" stroke-width="2"/>
    <text x="20" y="34" fill="#f59e0b" font-size="14" font-weight="700" letter-spacing="1">SCHRITT 4</text>
    <text x="20" y="64" fill="#e2e8f0" font-size="20" font-weight="700">/review</text>
    <text x="20" y="94" fill="#94a3b8" font-size="12">Self-Review der Änderungen</text>
    <rect x="20" y="108" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="130" fill="#f59e0b" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">/review</text>
    <text x="30" y="148" fill="#94a3b8" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">findings: critical/warn/nit</text>
    <text x="30" y="168" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">automatisch vor commit</text>
    <text x="20" y="200" fill="#94a3b8" font-size="11">Agent sucht Regressionen,</text>
    <text x="20" y="218" fill="#94a3b8" font-size="11">fehlende Tests, TODOs.</text>
    <text x="20" y="252" fill="#64748b" font-size="11">Fix-Vorschläge direkt anwenden</text>
  </g>
  <line x1="880" y1="580" x2="920" y2="536" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- 5: git commit -->
  <g transform="translate(1020 180)">
    <rect width="240" height="280" rx="12" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="14" font-weight="700" letter-spacing="1">SCHRITT 5</text>
    <text x="20" y="64" fill="#e2e8f0" font-size="20" font-weight="700">git commit</text>
    <text x="20" y="94" fill="#94a3b8" font-size="12">Änderungen versionieren</text>
    <rect x="20" y="108" width="200" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="130" fill="#10b981" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">git add -p</text>
    <text x="30" y="150" fill="#10b981" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">git commit -m "…"</text>
    <text x="30" y="168" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">oder /copy → PR-Body</text>
    <text x="20" y="200" fill="#94a3b8" font-size="11">Hunks selektiv stagen</text>
    <text x="20" y="218" fill="#94a3b8" font-size="11">Commit-Message per Session</text>
    <text x="20" y="252" fill="#64748b" font-size="11">Push wenn Hooks grün</text>
  </g>
  <line x1="1140" y1="460" x2="1160" y2="528" stroke="#10b981" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- Untere Hinweiszeile -->
  <g transform="translate(80 750)">
    <rect width="1080" height="90" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="30" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="2">MUSTER</text>
    <text x="20" y="58" fill="#cbd5e1" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">$ cd ~/code/app &amp;&amp; codex "impl /v2/users" &amp;&amp; /diff &amp;&amp; /review &amp;&amp; git add -p &amp;&amp; git commit</text>
    <text x="20" y="78" fill="#64748b" font-size="11">Einmal eingeübt: Ticket → Working-Branch → Commit in unter einer Minute — Review inklusive.</text>
  </g>
</svg>
