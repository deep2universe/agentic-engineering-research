<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>GitHub-Integration — vier Arme der Codex-Octopus</title>
  <desc>Zentrale Codex-Einheit mit vier Armen: GitHub Action, Codex Review App, Autofix-Pattern via workflow_run und Issue-to-PR-Flow über Cloud-Tasks. Pro Arm Config-Snippet und Trigger.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">12. GitHub-Integration — vier Arme der Codex-Automation</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Action + Review-App + Autofix + Cloud-Issue-Flow: vier komplementäre Wege, Codex in GitHub-Workflows zu binden.</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 12</text>

  <defs>
    <marker id="arr12" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Zentrum -->
  <g transform="translate(700,470)">
    <circle r="110" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
    <circle r="88" fill="#0f172a" stroke="#818cf8"/>
    <text x="0" y="-8" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Codex</text>
    <text x="0" y="14" fill="#818cf8" font-size="14" text-anchor="middle">+</text>
    <text x="0" y="36" fill="#cbd5e1" font-size="12" text-anchor="middle">GitHub</text>
  </g>

  <!-- Arm 1 (links oben): GitHub Action -->
  <g transform="translate(60,140)">
    <rect width="420" height="280" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="420" height="40" rx="12" fill="#10b981" opacity="0.2"/>
    <text x="20" y="26" fill="#34d399" font-size="16" font-weight="700">1 · openai/codex-action@v1</text>
    <text x="20" y="60" fill="#94a3b8" font-size="12">GitHub Action als Reusable-Step in beliebigen Workflows</text>

    <rect x="20" y="78" width="380" height="180" rx="6" fill="#0f172a" stroke="#334155"/>
    <g font-family="'JetBrains Mono', monospace" font-size="11">
      <text x="32" y="100" fill="#94a3b8">.github/workflows/codex.yml</text>
      <text x="32" y="124" fill="#c4b5fd">on:</text>
      <text x="32" y="140" fill="#cbd5e1">  issue_comment:</text>
      <text x="32" y="156" fill="#cbd5e1">    types: [created]</text>
      <text x="32" y="180" fill="#c4b5fd">jobs.codex:</text>
      <text x="32" y="196" fill="#cbd5e1">  uses: openai/codex-action@v1</text>
      <text x="32" y="212" fill="#cbd5e1">  with:</text>
      <text x="32" y="228" fill="#cbd5e1">    prompt: ${{ github.event.comment.body }}</text>
      <text x="32" y="244" fill="#cbd5e1">    api-key: ${{ secrets.OPENAI_API_KEY }}</text>
    </g>
  </g>

  <!-- Arm 2 (rechts oben): Review-App -->
  <g transform="translate(920,140)">
    <rect width="420" height="280" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="0" y="0" width="420" height="40" rx="12" fill="#6366f1" opacity="0.2"/>
    <text x="20" y="26" fill="#818cf8" font-size="16" font-weight="700">2 · Codex Review App</text>
    <text x="20" y="60" fill="#94a3b8" font-size="12">GitHub App mit Auto-Review bei PR-Events</text>

    <g transform="translate(20,78)">
      <rect width="380" height="180" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="16" y="24" fill="#e2e8f0" font-size="12" font-weight="700">PR #412 · auth-skew-fix</text>
      <line x1="16" y1="34" x2="360" y2="34" stroke="#334155"/>
      <circle cx="28" cy="58" r="6" fill="#6366f1"/>
      <text x="44" y="62" fill="#cbd5e1" font-size="11">Codex Review · 3 Kommentare</text>
      <rect x="44" y="72" width="320" height="40" rx="4" fill="#1e293b" stroke="#334155"/>
      <text x="56" y="90" fill="#fbbf24" font-size="11">Hinweis: verify() bricht bei skew &gt; Token-Dauer.</text>
      <text x="56" y="106" fill="#94a3b8" font-size="10">src/auth.rs:44 · severity: warning</text>
      <rect x="44" y="120" width="320" height="40" rx="4" fill="#1e293b" stroke="#334155"/>
      <text x="56" y="138" fill="#fca5a5" font-size="11">Test fehlt: expired-by-exactly-skew-boundary</text>
      <text x="56" y="154" fill="#94a3b8" font-size="10">tests/auth_tests.rs · severity: behavior</text>
    </g>
  </g>

  <!-- Arm 3 (links unten): Autofix via workflow_run -->
  <g transform="translate(60,460)">
    <rect width="420" height="280" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="420" height="40" rx="12" fill="#f59e0b" opacity="0.2"/>
    <text x="20" y="26" fill="#fbbf24" font-size="16" font-weight="700">3 · Autofix-Pattern</text>
    <text x="20" y="60" fill="#94a3b8" font-size="12">Cookbook: `workflow_run` triggert Codex auf CI-Fail</text>

    <g transform="translate(20,78)">
      <rect width="380" height="180" rx="6" fill="#0f172a" stroke="#334155"/>
      <g font-family="'JetBrains Mono', monospace" font-size="11">
        <text x="12" y="22" fill="#94a3b8">.github/workflows/autofix.yml</text>
        <text x="12" y="46" fill="#c4b5fd">on:</text>
        <text x="12" y="62" fill="#cbd5e1">  workflow_run:</text>
        <text x="12" y="78" fill="#cbd5e1">    workflows: ["CI"]</text>
        <text x="12" y="94" fill="#cbd5e1">    types: [completed]</text>
        <text x="12" y="116" fill="#c4b5fd">jobs.fix:</text>
        <text x="12" y="132" fill="#cbd5e1">  if: conclusion == 'failure'</text>
        <text x="12" y="148" fill="#cbd5e1">  uses: openai/codex-action@v1</text>
        <text x="12" y="164" fill="#cbd5e1">  with: { mode: "autofix" }</text>
      </g>
    </g>
  </g>

  <!-- Arm 4 (rechts unten): Issue-to-PR -->
  <g transform="translate(920,460)">
    <rect width="420" height="280" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="0" y="0" width="420" height="40" rx="12" fill="#22d3ee" opacity="0.2"/>
    <text x="20" y="26" fill="#22d3ee" font-size="16" font-weight="700">4 · Issue-to-PR über Cloud-Tasks</text>
    <text x="20" y="60" fill="#94a3b8" font-size="12">Issue-Body wird Prompt, Codex öffnet Draft-PR</text>

    <g transform="translate(20,78)">
      <rect width="380" height="60" rx="6" fill="#0f172a" stroke="#22d3ee"/>
      <text x="14" y="22" fill="#22d3ee" font-size="12" font-weight="700">Issue #123</text>
      <text x="14" y="42" fill="#cbd5e1" font-size="11">"Expired-token UX logged as 500 instead of 401"</text>
    </g>
    <g transform="translate(20,148)">
      <rect width="380" height="40" rx="6" fill="#0f172a" stroke="#a78bfa"/>
      <text x="14" y="24" fill="#c4b5fd" font-size="12" font-family="'JetBrains Mono', monospace">codex cloud exec --env prod --issue 123</text>
    </g>
    <g transform="translate(20,198)">
      <rect width="380" height="60" rx="6" fill="#0f172a" stroke="#10b981"/>
      <text x="14" y="22" fill="#34d399" font-size="12" font-weight="700">PR #418 · Draft</text>
      <text x="14" y="42" fill="#cbd5e1" font-size="11">3 Files changed · 18 + · 4 - · linked to #123</text>
    </g>
  </g>

  <!-- Verbindungslinien -->
  <g stroke="#334155" stroke-width="2" fill="none" stroke-dasharray="5 3">
    <line x1="480" y1="280" x2="600" y2="440"/>
    <line x1="920" y1="280" x2="800" y2="440"/>
    <line x1="480" y1="600" x2="600" y2="500"/>
    <line x1="920" y1="600" x2="800" y2="500"/>
  </g>

  <!-- Unten: Trigger-Mapping -->
  <g transform="translate(60,780)">
    <rect width="1280" height="90" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="20" y="30" fill="#e2e8f0" font-size="15" font-weight="700">Trigger-Mapping (Auswahl)</text>
    <g font-size="12" font-family="'JetBrains Mono', monospace">
      <text x="20" y="54" fill="#34d399">@codex-bot fix</text>
      <text x="20" y="72" fill="#22d3ee">pull_request.opened</text>
      <text x="280" y="54" fill="#cbd5e1" font-family="system-ui">→ Action antwortet im PR-Kommentar</text>
      <text x="280" y="72" fill="#cbd5e1" font-family="system-ui">→ Review-App liefert strukturierte Findings</text>
      <text x="780" y="54" fill="#fbbf24">workflow_run · conclusion:failure</text>
      <text x="780" y="72" fill="#22d3ee">issues.opened · label:auto-fix</text>
      <text x="1040" y="54" fill="#cbd5e1" font-family="system-ui">→ Autofix-Job</text>
      <text x="1040" y="72" fill="#cbd5e1" font-family="system-ui">→ Cloud-Task mit Draft-PR</text>
    </g>
  </g>
</svg>
