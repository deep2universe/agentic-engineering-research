<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Risiken und offene Punkte — Codex CLI Risiko-Register</title>
  <desc>Wachtafel-Metapher mit sechs Risiko-Karten: 0.x-Schema, OAuth-Override, auth.json-Token, Cloud-ZDR, experimentelle Features, Phase-Parameter. Jede Karte zeigt Severity, Mitigation und Bereich.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#e2e8f0">Risiko-Register — Codex CLI (Stand Q1/2026)</text>
  <text x="60" y="90" font-size="16" fill="#94a3b8">Wachtafel-Metapher · sechs Karten · Severity-Skala &amp; Mitigation-Hinweise</text>
  <text x="1340" y="60" font-size="14" fill="#94a3b8" text-anchor="end">Kapitel 10 · Risiken</text>

  <!-- Skala-Legende oben -->
  <g transform="translate(60,120)" font-size="12">
    <text x="0" y="0" fill="#94a3b8" font-weight="600">Severity</text>
    <g transform="translate(90,-8)">
      <rect x="0" y="-2" width="16" height="16" rx="3" fill="#f59e0b"/><text x="22" y="10" fill="#fde68a">mittel</text>
      <rect x="90" y="-2" width="16" height="16" rx="3" fill="#ef4444"/><text x="112" y="10" fill="#fecaca">hoch</text>
      <rect x="180" y="-2" width="16" height="16" rx="3" fill="#a3a3a3"/><text x="202" y="10" fill="#e2e8f0">niedrig/Prozess</text>
    </g>
    <text x="520" y="2" fill="#94a3b8">Alle Einträge beziehen sich auf Codex CLI Version 0.x.</text>
  </g>

  <!-- Risk Card helper: einen Kartenbau pro Punkt -->
  <!-- 1. 0.x-Schema -->
  <g transform="translate(60,160)">
    <rect width="420" height="300" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect width="420" height="44" rx="14" fill="#3f2903"/>
    <text x="18" y="30" font-size="16" font-weight="700" fill="#fde68a">1 · 0.x-Schema</text>
    <text x="402" y="30" font-size="11" fill="#fde68a" text-anchor="end">SemVer-Stabilität</text>
    <g transform="translate(20,72)">
      <text font-size="12" fill="#94a3b8" font-weight="700">Severity</text>
      <rect x="80" y="-11" width="80" height="18" rx="4" fill="#f59e0b"/>
      <text x="120" y="3" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">MITTEL</text>
    </g>
    <g transform="translate(20,110)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">Beschreibung</text>
      <text y="18" font-size="11" fill="#cbd5e1">Breaking Changes zwischen Minor-Versions möglich.</text>
      <text y="36" font-size="11" fill="#cbd5e1">Config-Schlüssel können umbenannt werden.</text>
    </g>
    <g transform="translate(20,170)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600" fill="#6ee7b7">Mitigation</text>
      <text y="18" font-size="11" fill="#cbd5e1">Version pinnen, Release-Notes prüfen,</text>
      <text y="36" font-size="11" fill="#cbd5e1">Upgrade-Runs in Staging.</text>
    </g>
    <g transform="translate(20,240)">
      <rect width="380" height="44" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="18" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Betroffen: config.toml · AGENTS.md-Felder</text>
      <text x="14" y="35" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Bereich: Releases &amp; Tooling</text>
    </g>
  </g>

  <!-- 2. OAuth-Override -->
  <g transform="translate(500,160)">
    <rect width="420" height="300" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect width="420" height="44" rx="14" fill="#450a0a"/>
    <text x="18" y="30" font-size="16" font-weight="700" fill="#fecaca">2 · OAuth-Override</text>
    <text x="402" y="30" font-size="11" fill="#fecaca" text-anchor="end">Auth-Fallstrick</text>
    <g transform="translate(20,72)">
      <text font-size="12" fill="#94a3b8" font-weight="700">Severity</text>
      <rect x="80" y="-11" width="80" height="18" rx="4" fill="#ef4444"/>
      <text x="120" y="3" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">HOCH</text>
    </g>
    <g transform="translate(20,110)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">Beschreibung</text>
      <text y="18" font-size="11" fill="#cbd5e1">OPENAI_API_KEY übersteuert OAuth still.</text>
      <text y="36" font-size="11" fill="#cbd5e1">Kein Hinweis, keine Log-Warnung.</text>
    </g>
    <g transform="translate(20,170)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600" fill="#6ee7b7">Mitigation</text>
      <text y="18" font-size="11" fill="#cbd5e1">In CI CODEX_API_KEY verwenden.</text>
      <text y="36" font-size="11" fill="#cbd5e1">Env-Variablen explizit whitelisten.</text>
    </g>
    <g transform="translate(20,240)">
      <rect width="380" height="44" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="18" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Betroffen: CI-Pipelines · Dev-Shells</text>
      <text x="14" y="35" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Bereich: Authentication</text>
    </g>
  </g>

  <!-- 3. auth.json -->
  <g transform="translate(940,160)">
    <rect width="420" height="300" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect width="420" height="44" rx="14" fill="#450a0a"/>
    <text x="18" y="30" font-size="16" font-weight="700" fill="#fecaca">3 · Token in auth.json</text>
    <text x="402" y="30" font-size="11" fill="#fecaca" text-anchor="end">Keystore-Defizit</text>
    <g transform="translate(20,72)">
      <text font-size="12" fill="#94a3b8" font-weight="700">Severity</text>
      <rect x="80" y="-11" width="80" height="18" rx="4" fill="#ef4444"/>
      <text x="120" y="3" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">HOCH</text>
    </g>
    <g transform="translate(20,110)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">Beschreibung</text>
      <text y="18" font-size="11" fill="#cbd5e1">Auth-Token liegt im Dateisystem,</text>
      <text y="36" font-size="11" fill="#cbd5e1">nicht in OS-Keychain / Credential-Manager.</text>
    </g>
    <g transform="translate(20,170)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600" fill="#6ee7b7">Mitigation</text>
      <text y="18" font-size="11" fill="#cbd5e1">Dateirechte 600, Disk-Encryption nutzen,</text>
      <text y="36" font-size="11" fill="#cbd5e1">Token-Rotation automatisieren.</text>
    </g>
    <g transform="translate(20,240)">
      <rect width="380" height="44" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="18" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Betroffen: ~/.codex/auth.json</text>
      <text x="14" y="35" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Bereich: Secrets-Handling</text>
    </g>
  </g>

  <!-- 4. Cloud-ZDR -->
  <g transform="translate(60,480)">
    <rect width="420" height="300" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect width="420" height="44" rx="14" fill="#3f2903"/>
    <text x="18" y="30" font-size="16" font-weight="700" fill="#fde68a">4 · Cloud-Privacy / ZDR</text>
    <text x="402" y="30" font-size="11" fill="#fde68a" text-anchor="end">Tier-abhängig</text>
    <g transform="translate(20,72)">
      <text font-size="12" fill="#94a3b8" font-weight="700">Severity</text>
      <rect x="80" y="-11" width="80" height="18" rx="4" fill="#f59e0b"/>
      <text x="120" y="3" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">MITTEL</text>
    </g>
    <g transform="translate(20,110)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">Beschreibung</text>
      <text y="18" font-size="11" fill="#cbd5e1">ZDR nur für Enterprise/Edu garantiert.</text>
      <text y="36" font-size="11" fill="#cbd5e1">Plus/Pro nutzt Default-Policy.</text>
    </g>
    <g transform="translate(20,170)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600" fill="#6ee7b7">Mitigation</text>
      <text y="18" font-size="11" fill="#cbd5e1">Tier prüfen, Privacy-Setting aktivieren,</text>
      <text y="36" font-size="11" fill="#cbd5e1">sensible Repos lokal halten.</text>
    </g>
    <g transform="translate(20,240)">
      <rect width="380" height="44" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="18" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Betroffen: Cloud-Handoff · Task-Cloud</text>
      <text x="14" y="35" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Bereich: Privacy / Compliance</text>
    </g>
  </g>

  <!-- 5. Experimentelle Features -->
  <g transform="translate(500,480)">
    <rect width="420" height="300" rx="14" fill="#1e293b" stroke="#a3a3a3" stroke-width="2"/>
    <rect width="420" height="44" rx="14" fill="#262626"/>
    <text x="18" y="30" font-size="16" font-weight="700" fill="#e5e5e5">5 · Experimentelle Features</text>
    <text x="402" y="30" font-size="11" fill="#d4d4d4" text-anchor="end">Wackelkandidaten</text>
    <g transform="translate(20,72)">
      <text font-size="12" fill="#94a3b8" font-weight="700">Severity</text>
      <rect x="80" y="-11" width="80" height="18" rx="4" fill="#a3a3a3"/>
      <text x="120" y="3" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">PROZESS</text>
    </g>
    <g transform="translate(20,110)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">Beschreibung</text>
      <text y="18" font-size="11" fill="#cbd5e1">Profile und rmcp-Client stehen</text>
      <text y="36" font-size="11" fill="#cbd5e1">unter experimentellem Flag.</text>
    </g>
    <g transform="translate(20,170)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600" fill="#6ee7b7">Mitigation</text>
      <text y="18" font-size="11" fill="#cbd5e1">Nur in Dev-Umgebungen, Release-Notes</text>
      <text y="36" font-size="11" fill="#cbd5e1">pro Minor-Version sichten.</text>
    </g>
    <g transform="translate(20,240)">
      <rect width="380" height="44" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="18" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Betroffen: profiles · rmcp-Client</text>
      <text x="14" y="35" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Bereich: Feature-Flags</text>
    </g>
  </g>

  <!-- 6. Phase-Parameter -->
  <g transform="translate(940,480)">
    <rect width="420" height="300" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect width="420" height="44" rx="14" fill="#3f2903"/>
    <text x="18" y="30" font-size="16" font-weight="700" fill="#fde68a">6 · Phase-Parameter</text>
    <text x="402" y="30" font-size="11" fill="#fde68a" text-anchor="end">API-Fallstrick</text>
    <g transform="translate(20,72)">
      <text font-size="12" fill="#94a3b8" font-weight="700">Severity</text>
      <rect x="80" y="-11" width="80" height="18" rx="4" fill="#f59e0b"/>
      <text x="120" y="3" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">MITTEL</text>
    </g>
    <g transform="translate(20,110)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600">Beschreibung</text>
      <text y="18" font-size="11" fill="#cbd5e1">Bei direkter Responses-API-Nutzung ohne</text>
      <text y="36" font-size="11" fill="#cbd5e1">CLI leicht zu vergessen (GPT-5.3-Codex).</text>
    </g>
    <g transform="translate(20,170)" font-size="12" fill="#e2e8f0">
      <text y="0" font-weight="600" fill="#6ee7b7">Mitigation</text>
      <text y="18" font-size="11" fill="#cbd5e1">Wrapper/SDK nutzen, CI-Linter gegen</text>
      <text y="36" font-size="11" fill="#cbd5e1">fehlenden phase-Parameter.</text>
    </g>
    <g transform="translate(20,240)">
      <rect width="380" height="44" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="14" y="18" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Betroffen: Responses-API · Custom-SDK</text>
      <text x="14" y="35" font-size="10" fill="#94a3b8" font-family="'JetBrains Mono', monospace">Bereich: Model-API</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60,810)" font-size="12" fill="#94a3b8">
    <text font-size="13" font-weight="600" fill="#e2e8f0">Metapher: Wachtafel</text>
    <text y="22">Jede Karte ist ein Posten — Severity, Beschreibung und Mitigation stehen sichtbar. Für Senior-Architekten als Review-Checkliste.</text>
  </g>
</svg>
