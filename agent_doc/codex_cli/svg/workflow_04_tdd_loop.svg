<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>TDD-Loop mit explizitem Stop-Checkpoint</title>
  <desc>Klassische TDD-Schleife als Verkehrsampel-Metapher: Failing Test (rot), Stop-Checkpoint, Implementation, Grün, Regressionen.</desc>

  <defs>
    <marker id="arrowT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/>
    </marker>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Title -->
  <text x="60" y="64" font-size="30" font-weight="700" fill="#e2e8f0">TDD-Loop (klassisch) — mit Stop-Checkpoint</text>
  <text x="60" y="94" font-size="16" fill="#94a3b8">Verkehrsampel rot → grün: Codex schreibt den Test, hält an, der Mensch prüft, dann läuft die Implementation</text>
  <text x="1340" y="64" font-size="14" fill="#94a3b8" text-anchor="end">Codex CLI · Workflow 04</text>

  <!-- Traffic light metaphor (left side) -->
  <g transform="translate(80,160)">
    <rect width="180" height="460" rx="20" fill="#1e293b" stroke="#334155" stroke-width="3"/>
    <rect x="60" y="-20" width="60" height="20" rx="4" fill="#334155"/>
    <!-- Red -->
    <circle cx="90" cy="100" r="60" fill="url(#redGlow)"/>
    <circle cx="90" cy="100" r="46" fill="#ef4444" stroke="#7f1d1d" stroke-width="3"/>
    <text x="90" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">RED</text>
    <!-- Yellow STOP -->
    <circle cx="90" cy="230" r="46" fill="#f59e0b" stroke="#78350f" stroke-width="3"/>
    <text x="90" y="236" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">STOP</text>
    <!-- Green -->
    <circle cx="90" cy="360" r="60" fill="url(#greenGlow)"/>
    <circle cx="90" cy="360" r="46" fill="#10b981" stroke="#064e3b" stroke-width="3"/>
    <text x="90" y="366" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">GREEN</text>

    <text x="90" y="490" text-anchor="middle" font-size="12" fill="#94a3b8">Ampel-Disziplin</text>
  </g>

  <!-- Right side: workflow steps -->
  <g>
    <!-- Step 1: Failing test (red) -->
    <g transform="translate(320,180)">
      <rect width="380" height="160" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
      <circle cx="32" cy="32" r="20" fill="#7f1d1d"/>
      <text x="32" y="38" font-size="16" font-weight="700" fill="#fecaca" text-anchor="middle">1</text>
      <text x="64" y="38" font-size="16" font-weight="700" fill="#e2e8f0">Failing Test schreiben</text>
      <text x="20" y="72" font-size="12" fill="#94a3b8">Codex erstellt nur den Test — keine Implementation.</text>
      <rect x="20" y="86" width="340" height="58" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="32" y="106" font-size="11" fill="#ef4444" font-family="'JetBrains Mono', ui-monospace, monospace">commit: test: feature x — red</text>
      <text x="32" y="124" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">just test → 1 failing</text>
      <text x="32" y="138" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">"Do not implement yet."</text>
    </g>

    <!-- Step 2: STOP -->
    <g transform="translate(320,360)">
      <rect width="380" height="120" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 4"/>
      <circle cx="32" cy="32" r="20" fill="#78350f"/>
      <text x="32" y="38" font-size="16" font-weight="700" fill="#fde68a" text-anchor="middle">2</text>
      <text x="64" y="38" font-size="16" font-weight="700" fill="#fbbf24">STOP — Mensch prüft Diff</text>
      <text x="20" y="68" font-size="12" fill="#cbd5e1">"Verhindert, dass der Agent Tests anpasst statt Code."</text>
      <text x="20" y="88" font-size="12" fill="#94a3b8">- Diff-Review im Editor</text>
      <text x="20" y="104" font-size="12" fill="#94a3b8">- Erwartete Failure validieren</text>
    </g>

    <!-- Step 3: Implement -->
    <g transform="translate(320,500)">
      <rect width="380" height="160" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <circle cx="32" cy="32" r="20" fill="#064e3b"/>
      <text x="32" y="38" font-size="16" font-weight="700" fill="#a7f3d0" text-anchor="middle">3</text>
      <text x="64" y="38" font-size="16" font-weight="700" fill="#e2e8f0">Implementation (minimal)</text>
      <text x="20" y="72" font-size="12" fill="#94a3b8">"Minimum to pass · do not touch other files"</text>
      <rect x="20" y="86" width="340" height="58" rx="6" fill="#0b1220" stroke="#334155"/>
      <text x="32" y="106" font-size="11" fill="#10b981" font-family="'JetBrains Mono', ui-monospace, monospace">commit: feat: feature x</text>
      <text x="32" y="124" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">just test → all green</text>
      <text x="32" y="138" font-size="11" fill="#94a3b8" font-family="'JetBrains Mono', ui-monospace, monospace">scope: nur betroffene Datei</text>
    </g>

    <!-- Step 4: Regression run -->
    <g transform="translate(740,180)">
      <rect width="580" height="220" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
      <circle cx="32" cy="32" r="20" fill="#155e75"/>
      <text x="32" y="38" font-size="16" font-weight="700" fill="#a5f3fc" text-anchor="middle">4</text>
      <text x="64" y="38" font-size="16" font-weight="700" fill="#e2e8f0">Regressions-Run + Repair</text>

      <text x="20" y="74" font-size="12" fill="#cbd5e1">just test (gesamt) → fix etwaige Folgefehler</text>

      <!-- Mini test result table -->
      <rect x="20" y="92" width="540" height="110" rx="8" fill="#0b1220" stroke="#334155"/>
      <text x="32" y="114" font-size="12" fill="#94a3b8">Suite</text>
      <text x="320" y="114" font-size="12" fill="#94a3b8">vorher</text>
      <text x="450" y="114" font-size="12" fill="#94a3b8">nachher</text>
      <line x1="20" y1="122" x2="560" y2="122" stroke="#334155"/>

      <text x="32" y="142" font-size="11" fill="#cbd5e1">unit/auth</text>
      <text x="320" y="142" font-size="11" fill="#10b981">ok</text>
      <text x="450" y="142" font-size="11" fill="#10b981">ok</text>

      <text x="32" y="162" font-size="11" fill="#cbd5e1">unit/feature_x</text>
      <text x="320" y="162" font-size="11" fill="#ef4444">fail</text>
      <text x="450" y="162" font-size="11" fill="#10b981">ok</text>

      <text x="32" y="182" font-size="11" fill="#cbd5e1">integration/api</text>
      <text x="320" y="182" font-size="11" fill="#10b981">ok</text>
      <text x="450" y="182" font-size="11" fill="#10b981">ok</text>
    </g>

    <!-- Step 5: Loop -->
    <g transform="translate(740,420)">
      <rect width="580" height="240" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
      <circle cx="32" cy="32" r="20" fill="#4c1d95"/>
      <text x="32" y="38" font-size="16" font-weight="700" fill="#ddd6fe" text-anchor="middle">5</text>
      <text x="64" y="38" font-size="16" font-weight="700" fill="#e2e8f0">Refactor + nächster Zyklus</text>

      <text x="20" y="74" font-size="12" fill="#cbd5e1">Refactor unter Schutz der grünen Tests, dann zurück zu 1.</text>

      <!-- Loop arrow visualization -->
      <g transform="translate(40,100)">
        <circle cx="80" cy="60" r="50" fill="none" stroke="#a78bfa" stroke-width="3" stroke-dasharray="4 4"/>
        <path d="M125 50 L 138 60 L 125 70" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round"/>
        <text x="80" y="56" text-anchor="middle" font-size="14" font-weight="700" fill="#a78bfa">Red</text>
        <text x="80" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#a78bfa">Green</text>
        <text x="80" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#a78bfa">Refactor</text>
      </g>

      <g transform="translate(220,108)">
        <text x="0" y="0" font-size="13" font-weight="700" fill="#22d3ee">Codex-Verhalten</text>
        <text x="0" y="22" font-size="12" fill="#cbd5e1">- One commit per phase</text>
        <text x="0" y="40" font-size="12" fill="#cbd5e1">- "Stop after red" = Hard-Gate</text>
        <text x="0" y="58" font-size="12" fill="#cbd5e1">- Nicht über Scope hinaus editieren</text>
        <text x="0" y="76" font-size="12" fill="#cbd5e1">- /review als Abschluss-Check</text>
      </g>
    </g>
  </g>

  <!-- Connecting arrows between steps -->
  <line x1="510" y1="340" x2="510" y2="360" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowT)"/>
  <line x1="510" y1="480" x2="510" y2="500" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowT)"/>
  <line x1="700" y1="290" x2="740" y2="290" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowT)"/>
  <line x1="700" y1="580" x2="740" y2="540" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowT)"/>
  <line x1="1030" y1="660" x2="1030" y2="700" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowT)"/>
  <text x="1030" y="730" font-size="12" fill="#a78bfa" text-anchor="middle">zurück zu Phase 1</text>

  <!-- Bottom legend -->
  <g transform="translate(60,820)">
    <rect width="14" height="14" fill="#ef4444"/>
    <text x="22" y="12" font-size="12" fill="#cbd5e1">Red — failing test</text>
    <rect x="190" width="14" height="14" fill="#f59e0b"/>
    <text x="212" y="12" font-size="12" fill="#cbd5e1">STOP — manuelles Gate</text>
    <rect x="400" width="14" height="14" fill="#10b981"/>
    <text x="422" y="12" font-size="12" fill="#cbd5e1">Green — minimal pass</text>
    <rect x="590" width="14" height="14" fill="#22d3ee"/>
    <text x="612" y="12" font-size="12" fill="#cbd5e1">Regression run</text>
    <rect x="780" width="14" height="14" fill="#a78bfa"/>
    <text x="802" y="12" font-size="12" fill="#cbd5e1">Refactor + Loop</text>
  </g>
</svg>
