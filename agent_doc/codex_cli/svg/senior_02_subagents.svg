<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Subagents - parallelisierte Spezialisten</title>
  <desc>Haupt-Agent delegiert parallel an Subagenten wie sec-reviewer, perf-reviewer und doc-writer, konsolidiert deren Ergebnisse. Metapher: Dirigent mit Orchester. Praxishinweise zu narrow descriptions, Tool-Minimum und Ergebnis-Konsolidierung.</desc>

  <defs>
    <marker id="arrV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrBack" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="40" y="54" fill="#e2e8f0" font-size="30" font-weight="700">Subagents - Dirigent und Orchester</text>
  <text x="40" y="82" fill="#94a3b8" font-size="16">Haupt-Agent delegiert parallel an Spezialisten, konsolidiert die Ergebnisse - Kapitel 2</text>
  <text x="1280" y="54" fill="#a78bfa" font-size="16" font-weight="600" text-anchor="end">Codex CLI / Senior 02</text>

  <!-- Haupt-Agent (Dirigent) -->
  <g>
    <rect x="540" y="130" width="320" height="130" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="700" y="164" fill="#ddd6fe" font-size="18" font-weight="700" text-anchor="middle">Haupt-Agent (Dirigent)</text>
    <text x="700" y="190" fill="#94a3b8" font-size="12" text-anchor="middle">liest Diff, plant, delegiert, synthetisiert</text>

    <!-- Taktstock-Symbol -->
    <g transform="translate(580,205)">
      <line x1="0" y1="30" x2="40" y2="0" stroke="#fbbf24" stroke-width="3"/>
      <circle cx="40" cy="0" r="4" fill="#fde68a"/>
      <text x="55" y="24" fill="#e2e8f0" font-size="12">delegate in parallel</text>
    </g>
  </g>

  <!-- Pfeile Haupt -> Sub -->
  <g stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrV)">
    <path d="M620 262 L260 360"/>
    <path d="M700 262 L700 360"/>
    <path d="M780 262 L1140 360"/>
  </g>

  <!-- Subagent 1: sec-reviewer -->
  <g>
    <rect x="100" y="370" width="320" height="260" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <circle cx="140" cy="408" r="22" fill="#7f1d1d" stroke="#ef4444"/>
    <path d="M140 395 L140 420 M129 407 L151 407" stroke="#fecaca" stroke-width="2"/>
    <text x="180" y="402" fill="#fecaca" font-size="17" font-weight="700">sec-reviewer</text>
    <text x="180" y="422" fill="#94a3b8" font-size="11">OWASP, Secrets, Injection</text>

    <rect x="120" y="448" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="132" y="468" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">sandbox: read-only</text>

    <rect x="120" y="486" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="132" y="506" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">model: gpt-5.3-codex</text>

    <rect x="120" y="524" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="132" y="544" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">tools: grep, read</text>

    <text x="120" y="580" fill="#94a3b8" font-size="11">description: scans changeset</text>
    <text x="120" y="598" fill="#94a3b8" font-size="11">for OWASP, secrets, injection</text>
    <text x="120" y="616" fill="#94a3b8" font-size="11">risks. Report by severity.</text>
  </g>

  <!-- Subagent 2: perf-reviewer -->
  <g>
    <rect x="540" y="370" width="320" height="260" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="580" cy="408" r="22" fill="#78350f" stroke="#f59e0b"/>
    <path d="M570 412 L578 402 L584 414 L592 400" stroke="#fde68a" stroke-width="2" fill="none"/>
    <text x="620" y="402" fill="#fde68a" font-size="17" font-weight="700">perf-reviewer</text>
    <text x="620" y="422" fill="#94a3b8" font-size="11">Hot paths, O(N2), sync IO</text>

    <rect x="560" y="448" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="572" y="468" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">sandbox: read-only</text>

    <rect x="560" y="486" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="572" y="506" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">focus: loops, queries, IO</text>

    <rect x="560" y="524" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="572" y="544" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">tools: grep, read, bench</text>

    <text x="560" y="580" fill="#94a3b8" font-size="11">analyzes hot paths, repeated</text>
    <text x="560" y="598" fill="#94a3b8" font-size="11">queries, blocking IO calls</text>
  </g>

  <!-- Subagent 3: doc-writer -->
  <g>
    <rect x="980" y="370" width="320" height="260" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <circle cx="1020" cy="408" r="22" fill="#064e3b" stroke="#10b981"/>
    <path d="M1010 400 L1030 400 L1030 418 L1010 418 Z M1013 406 L1027 406 M1013 412 L1027 412" stroke="#6ee7b7" stroke-width="1.5" fill="none"/>
    <text x="1060" y="402" fill="#6ee7b7" font-size="17" font-weight="700">doc-writer</text>
    <text x="1060" y="422" fill="#94a3b8" font-size="11">Docstrings, API-Referenz</text>

    <rect x="1000" y="448" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="1012" y="468" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">sandbox: workspace-write</text>

    <rect x="1000" y="486" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="1012" y="506" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">style: Google docstrings</text>

    <rect x="1000" y="524" width="280" height="30" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="1012" y="544" fill="#e2e8f0" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace">tools: read, apply_patch</text>

    <text x="1000" y="580" fill="#94a3b8" font-size="11">generates/refreshes docstrings</text>
    <text x="1000" y="598" fill="#94a3b8" font-size="11">in consistent Google style</text>
  </g>

  <!-- Rückfluss zur Konsolidierung -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrBack)" stroke-dasharray="5 3">
    <path d="M260 630 Q 500 720 620 720"/>
    <path d="M700 630 L700 720"/>
    <path d="M1140 630 Q 900 720 780 720"/>
  </g>

  <!-- Konsolidierung -->
  <g>
    <rect x="420" y="720" width="560" height="150" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="700" y="752" fill="#a5f3fc" font-size="17" font-weight="700" text-anchor="middle">Ergebnis-Konsolidierung durch Haupt-Agent</text>
    <text x="700" y="778" fill="#94a3b8" font-size="12" text-anchor="middle">dedupliziert, priorisiert, liefert EINE geordnete Liste an den Nutzer</text>

    <g transform="translate(440,795)">
      <rect x="0" y="0" width="170" height="30" rx="6" fill="#0b1220" stroke="#ef4444"/>
      <text x="85" y="20" fill="#fecaca" font-size="12" text-anchor="middle">Security-Findings</text>
    </g>
    <g transform="translate(620,795)">
      <rect x="0" y="0" width="170" height="30" rx="6" fill="#0b1220" stroke="#f59e0b"/>
      <text x="85" y="20" fill="#fde68a" font-size="12" text-anchor="middle">Perf-Hotspots</text>
    </g>
    <g transform="translate(800,795)">
      <rect x="0" y="0" width="170" height="30" rx="6" fill="#0b1220" stroke="#10b981"/>
      <text x="85" y="20" fill="#6ee7b7" font-size="12" text-anchor="middle">Doc-Patches</text>
    </g>

    <text x="700" y="855" fill="#94a3b8" font-size="12" text-anchor="middle">Subagenten reden nicht direkt mit Dir - nur der Dirigent spricht nach aussen.</text>
  </g>

  <!-- Praxishinweise links -->
  <g>
    <rect x="60" y="670" width="330" height="200" rx="14" fill="#111827" stroke="#334155"/>
    <text x="78" y="700" fill="#e2e8f0" font-size="15" font-weight="700">Praxishinweise</text>
    <text x="78" y="726" fill="#94a3b8" font-size="12">- Narrow descriptions fuer Matching</text>
    <text x="78" y="748" fill="#94a3b8" font-size="12">- Tool-Minimum pro Subagent</text>
    <text x="78" y="770" fill="#94a3b8" font-size="12">- read-only fuer Reviewer</text>
    <text x="78" y="792" fill="#94a3b8" font-size="12">- Hoehere Token-Kosten - dafuer</text>
    <text x="78" y="810" fill="#94a3b8" font-size="12">  echte Parallelitaet</text>
    <text x="78" y="832" fill="#94a3b8" font-size="12">- Erst ab realer Workload einsetzen</text>
    <text x="78" y="854" fill="#94a3b8" font-size="12">- Definiert in AGENTS.md</text>
  </g>

  <g>
    <rect x="1010" y="670" width="330" height="200" rx="14" fill="#111827" stroke="#334155"/>
    <text x="1028" y="700" fill="#e2e8f0" font-size="15" font-weight="700">Ideale Einsatzfelder</text>
    <text x="1028" y="726" fill="#94a3b8" font-size="12">- Codebase-Exploration (1 Agent</text>
    <text x="1028" y="744" fill="#94a3b8" font-size="12">  pro Modul/Verzeichnis)</text>
    <text x="1028" y="770" fill="#94a3b8" font-size="12">- Feature-Split: UI / API / Tests</text>
    <text x="1028" y="796" fill="#94a3b8" font-size="12">- Review-Swarm: Sec + Perf + Style</text>
    <text x="1028" y="822" fill="#94a3b8" font-size="12">- Migration pro Modul parallel</text>
    <text x="1028" y="848" fill="#94a3b8" font-size="12">- Mehrsprachige Doku-Generierung</text>
  </g>
</svg>
