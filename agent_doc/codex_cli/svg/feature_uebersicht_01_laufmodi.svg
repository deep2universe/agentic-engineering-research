<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Codex CLI Laufmodi — 7 Betriebsarten als Mode-Dial</title>
  <desc>Panel-Grid mit sieben Laufmodi: Interactive TUI, Headless Exec, Resume, Cloud Handoff, MCP Server, Review und Completion. Jedes Panel zeigt Befehl, Einsatzzweck und Icon. Metapher: Schalthebel-Board.</desc>
  <rect width="1400" height="900" fill="#0f172a"/>

  <!-- Titel -->
  <text x="60" y="60" fill="#e2e8f0" font-size="30" font-weight="700">1. Laufmodi — Mode-Dial der Codex CLI</text>
  <text x="60" y="90" fill="#94a3b8" font-size="16">Sieben Betriebsarten, jede mit eigenem Einstiegspunkt und Zielkontext</text>
  <text x="1340" y="60" fill="#64748b" font-size="14" text-anchor="end">Codex CLI · Kapitel 1</text>

  <!-- Zentraler Mode-Dial -->
  <g transform="translate(700,480)">
    <circle cx="0" cy="0" r="90" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <circle cx="0" cy="0" r="70" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
    <text x="0" y="-10" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">MODE</text>
    <text x="0" y="14" fill="#818cf8" font-size="14" text-anchor="middle">DIAL</text>
    <!-- Zeiger -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#22d3ee"/>
  </g>

  <!-- Panels -->
  <!-- Panel 1: Interactive TUI -->
  <g transform="translate(60,140)">
    <rect width="360" height="170" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <g transform="translate(22,28)">
      <rect x="0" y="0" width="36" height="28" rx="4" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
      <rect x="4" y="4" width="28" height="16" fill="#6366f1" opacity="0.3"/>
      <text x="18" y="16" fill="#818cf8" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">&gt;_</text>
    </g>
    <text x="74" y="42" fill="#e2e8f0" font-size="18" font-weight="700">Interactive TUI</text>
    <text x="74" y="62" fill="#94a3b8" font-size="12">Default · Full-Screen-UI</text>
    <rect x="22" y="80" width="316" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="98" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', monospace">$ codex</text>
    <text x="22" y="130" fill="#cbd5e1" font-size="12">Prompt-Box, Diff-View,</text>
    <text x="22" y="148" fill="#cbd5e1" font-size="12">Thinking-Panel, Slash-Popup</text>
  </g>

  <!-- Panel 2: Headless Exec -->
  <g transform="translate(440,140)">
    <rect width="360" height="170" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(22,28)">
      <rect x="0" y="0" width="36" height="28" rx="3" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
      <path d="M6 10 L14 14 L6 18" fill="none" stroke="#10b981" stroke-width="2"/>
      <line x1="18" y1="20" x2="30" y2="20" stroke="#10b981" stroke-width="2"/>
    </g>
    <text x="74" y="42" fill="#e2e8f0" font-size="18" font-weight="700">Headless Exec</text>
    <text x="74" y="62" fill="#94a3b8" font-size="12">Nicht-interaktiv · CI/Scripts</text>
    <rect x="22" y="80" width="316" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="98" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', monospace">$ codex exec "&lt;prompt&gt;"</text>
    <text x="22" y="130" fill="#cbd5e1" font-size="12">Finale Antwort auf stdout,</text>
    <text x="22" y="148" fill="#cbd5e1" font-size="12">--json / --output-schema</text>
  </g>

  <!-- Panel 3: Resume -->
  <g transform="translate(820,140)">
    <rect width="360" height="170" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <g transform="translate(22,28)">
      <circle cx="18" cy="14" r="13" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <path d="M18 6 L18 14 L24 18" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
      <path d="M6 4 L6 10 L12 10" fill="none" stroke="#a78bfa" stroke-width="2"/>
    </g>
    <text x="74" y="42" fill="#e2e8f0" font-size="18" font-weight="700">Resume</text>
    <text x="74" y="62" fill="#94a3b8" font-size="12">Letzte Session fortsetzen</text>
    <rect x="22" y="80" width="316" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="98" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', monospace">$ codex resume --last</text>
    <text x="22" y="130" fill="#cbd5e1" font-size="12">Session-Picker mit History,</text>
    <text x="22" y="148" fill="#cbd5e1" font-size="12">Images &amp; Kontext persistiert</text>
  </g>

  <!-- Panel 4: Cloud Handoff -->
  <g transform="translate(60,330)">
    <rect width="360" height="170" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <g transform="translate(22,28)">
      <path d="M10 22 Q4 22 4 16 Q4 10 10 10 Q10 4 18 4 Q28 4 30 12 Q36 12 36 18 Q36 24 28 24 Z"
            fill="none" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="74" y="42" fill="#e2e8f0" font-size="18" font-weight="700">Cloud Handoff</text>
    <text x="74" y="62" fill="#94a3b8" font-size="12">Remote-Task delegieren</text>
    <rect x="22" y="80" width="316" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="98" fill="#22d3ee" font-size="12" font-family="'JetBrains Mono', monospace">$ codex cloud exec --env ID</text>
    <text x="22" y="130" fill="#cbd5e1" font-size="12">list · logs · pull · Diff zurück</text>
    <text x="22" y="148" fill="#cbd5e1" font-size="12">Langläufer ausserhalb TUI</text>
  </g>

  <!-- Panel 5: MCP Server -->
  <g transform="translate(980,330)">
    <rect width="360" height="170" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <g transform="translate(22,28)">
      <rect x="2" y="4" width="32" height="10" rx="2" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <rect x="2" y="16" width="32" height="10" rx="2" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="8" cy="9" r="1.5" fill="#f59e0b"/>
      <circle cx="8" cy="21" r="1.5" fill="#f59e0b"/>
    </g>
    <text x="74" y="42" fill="#e2e8f0" font-size="18" font-weight="700">MCP Server</text>
    <text x="74" y="62" fill="#94a3b8" font-size="12">Codex als Tool für andere</text>
    <rect x="22" y="80" width="316" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="98" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', monospace">$ codex mcp serve</text>
    <text x="22" y="130" fill="#cbd5e1" font-size="12">Sub-Agent · Federation ·</text>
    <text x="22" y="148" fill="#cbd5e1" font-size="12">ChatGPT / IDE-Brücken</text>
  </g>

  <!-- Panel 6: Review -->
  <g transform="translate(60,700)">
    <rect width="600" height="150" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(22,28)">
      <path d="M18 4 L32 12 L32 22 Q32 30 18 36 Q4 30 4 22 L4 12 Z"
            fill="none" stroke="#10b981" stroke-width="2"/>
      <path d="M12 20 L17 25 L26 14" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="74" y="42" fill="#e2e8f0" font-size="18" font-weight="700">Review</text>
    <text x="74" y="62" fill="#94a3b8" font-size="12">Dedizierter Review-Agent</text>
    <rect x="22" y="80" width="556" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="98" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', monospace">$ codex review  oder  /review</text>
    <text x="22" y="130" fill="#cbd5e1" font-size="12">Behavior-Changes, fehlende Tests, Regressionen — Fokus auf Risiko statt Nice-to-haves</text>
  </g>

  <!-- Panel 7: Completion -->
  <g transform="translate(740,700)">
    <rect width="600" height="150" rx="12" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
    <g transform="translate(22,28)">
      <rect x="2" y="4" width="34" height="28" rx="3" fill="none" stroke="#94a3b8" stroke-width="2"/>
      <line x1="8" y1="14" x2="20" y2="14" stroke="#94a3b8" stroke-width="2"/>
      <line x1="8" y1="20" x2="26" y2="20" stroke="#94a3b8" stroke-width="2"/>
      <line x1="8" y1="26" x2="16" y2="26" stroke="#94a3b8" stroke-width="2"/>
    </g>
    <text x="74" y="42" fill="#e2e8f0" font-size="18" font-weight="700">Completion</text>
    <text x="74" y="62" fill="#94a3b8" font-size="12">Shell-Completion-Scripts</text>
    <rect x="22" y="80" width="556" height="28" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="98" fill="#22d3ee" font-size="13" font-family="'JetBrains Mono', monospace">$ codex completion bash | zsh | fish | powershell</text>
    <text x="22" y="130" fill="#cbd5e1" font-size="12">Tab-Completion für alle Subcommands &amp; Flags — einmal in rc-Datei sourcen</text>
  </g>

  <!-- Verbindungslinien zum Dial -->
  <g stroke="#334155" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.5">
    <line x1="420" y1="225" x2="610" y2="470"/>
    <line x1="620" y1="225" x2="680" y2="400"/>
    <line x1="800" y1="225" x2="720" y2="400"/>
    <line x1="420" y1="415" x2="610" y2="480"/>
    <line x1="980" y1="415" x2="790" y2="480"/>
    <line x1="500" y1="700" x2="650" y2="560"/>
    <line x1="900" y1="700" x2="750" y2="560"/>
  </g>
</svg>
