<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Modi-Cheat — 2D-Matrix Sandbox × Approval</title>
  <desc>Matrix mit Y-Achse Sandbox (read-only, workspace-write, danger) und X-Achse Approval (never, on-request); Zellen zeigen Einsatzszenarien: Analyse, Tägliche Arbeit, CI-Autofix, VM/Container, Planning.</desc>

  <rect width="1400" height="900" fill="#0f172a"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="30" font-weight="700">Modi-Cheat · Sandbox × Approval</text>
  <text x="60" y="100" fill="#94a3b8" font-size="16">Ampel-Matrix: welcher Modus für welche Aufgabe</text>
  <text x="1340" y="70" fill="#64748b" font-size="14" text-anchor="end">cheat_sheet · 10/13</text>

  <!-- Achsen-Beschriftung -->
  <text x="40" y="460" fill="#e2e8f0" font-size="18" font-weight="700" transform="rotate(-90 40 460)" text-anchor="middle">SANDBOX</text>
  <text x="720" y="880" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">APPROVAL</text>

  <!-- Matrix Koordinatensystem -->
  <!-- x: 200..1260, y: 170..800 -->
  <g>
    <!-- Spaltenköpfe -->
    <rect x="200" y="140" width="530" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="465" y="165" fill="#22d3ee" font-size="14" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">never</text>
    <text x="465" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">kein Prompt, läuft headless durch</text>

    <rect x="740" y="140" width="520" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="1000" y="165" fill="#f59e0b" font-size="14" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">on-request</text>
    <text x="1000" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">fragt bei heiklen Aktionen</text>

    <!-- Zeilenköpfe -->
    <rect x="60" y="200" width="130" height="200" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="125" y="295" fill="#10b981" font-size="14" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">read-only</text>
    <text x="125" y="315" fill="#94a3b8" font-size="11" text-anchor="middle">keine Writes</text>

    <rect x="60" y="410" width="130" height="200" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="125" y="505" fill="#f59e0b" font-size="14" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">workspace-write</text>
    <text x="125" y="525" fill="#94a3b8" font-size="11" text-anchor="middle">Writes im Repo</text>

    <rect x="60" y="620" width="130" height="200" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="125" y="715" fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono', ui-monospace, monospace">danger-full-access</text>
    <text x="125" y="735" fill="#94a3b8" font-size="11" text-anchor="middle">alles erlaubt</text>
  </g>

  <!-- Matrix-Zellen -->
  <!-- (read-only, never) -->
  <g transform="translate(200 200)">
    <rect width="530" height="200" rx="10" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(20 20)">
      <rect width="60" height="22" rx="11" fill="#10b981"/>
      <text x="30" y="16" fill="#0f172a" font-size="11" font-weight="700" text-anchor="middle">SAFE</text>
    </g>
    <text x="100" y="38" fill="#10b981" font-size="18" font-weight="700">Analyse / PR-Review</text>
    <text x="20" y="80" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">-s read-only -a never</text>
    <text x="20" y="110" fill="#94a3b8" font-size="12">Keine Writes, keine Prompts — headless für CI</text>
    <text x="20" y="132" fill="#94a3b8" font-size="12">Diff-Lesen, Vulnerability-Scan, Architektur-Review</text>
    <text x="20" y="162" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">codex review · codex exec --json …</text>
  </g>

  <!-- (read-only, on-request) -->
  <g transform="translate(740 200)">
    <rect width="520" height="200" rx="10" fill="#0b1220" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(20 20)">
      <rect width="72" height="22" rx="11" fill="#10b981"/>
      <text x="36" y="16" fill="#0f172a" font-size="11" font-weight="700" text-anchor="middle">EXPLORE</text>
    </g>
    <text x="110" y="38" fill="#10b981" font-size="18" font-weight="700">Erkunden im TUI</text>
    <text x="20" y="80" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">-s read-only -a on-request</text>
    <text x="20" y="110" fill="#94a3b8" font-size="12">Fragen stellen, Code verstehen, Dokumente lesen</text>
    <text x="20" y="132" fill="#94a3b8" font-size="12">Agent fragt, bevor er doch mal schreiben will</text>
    <text x="20" y="162" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">Einstieg in ein fremdes Repo</text>
  </g>

  <!-- (workspace-write, never) -->
  <g transform="translate(200 410)">
    <rect width="530" height="200" rx="10" fill="#0b1220" stroke="#f59e0b" stroke-width="2"/>
    <g transform="translate(20 20)">
      <rect width="60" height="22" rx="11" fill="#f59e0b"/>
      <text x="30" y="16" fill="#0f172a" font-size="11" font-weight="700" text-anchor="middle">CI</text>
    </g>
    <text x="100" y="38" fill="#f59e0b" font-size="18" font-weight="700">CI-Autofix</text>
    <text x="20" y="80" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">-s workspace-write -a never</text>
    <text x="20" y="110" fill="#94a3b8" font-size="12">Schreibt im Repo, ohne zu fragen — daher strikt in CI</text>
    <text x="20" y="132" fill="#94a3b8" font-size="12">Autofix-PRs, Dependency-Updates, Formatierung</text>
    <text x="20" y="162" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">--model gpt-5.3-codex · headless Runner</text>
  </g>

  <!-- (workspace-write, on-request) = default / full-auto -->
  <g transform="translate(740 410)">
    <rect width="520" height="200" rx="10" fill="#0b1220" stroke="#22d3ee" stroke-width="3"/>
    <g transform="translate(20 20)">
      <rect width="80" height="22" rx="11" fill="#22d3ee"/>
      <text x="40" y="16" fill="#0f172a" font-size="11" font-weight="700" text-anchor="middle">DAILY</text>
    </g>
    <text x="118" y="38" fill="#22d3ee" font-size="18" font-weight="700">Tägliche Arbeit · Default</text>
    <text x="20" y="80" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">--full-auto</text>
    <text x="20" y="110" fill="#94a3b8" font-size="12">Writes im Workspace, Approval bei Risiko</text>
    <text x="20" y="132" fill="#94a3b8" font-size="12">Feature-Bau, Refactorings, Tests erweitern</text>
    <text x="20" y="162" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">= workspace-write + on-request (Voreinstellung)</text>
  </g>

  <!-- (danger-full-access, never) -->
  <g transform="translate(200 620)">
    <rect width="530" height="200" rx="10" fill="#0b1220" stroke="#ef4444" stroke-width="2"/>
    <g transform="translate(20 20)">
      <rect width="72" height="22" rx="11" fill="#ef4444"/>
      <text x="36" y="16" fill="#0f172a" font-size="11" font-weight="700" text-anchor="middle">VM-ONLY</text>
    </g>
    <text x="110" y="38" fill="#ef4444" font-size="18" font-weight="700">VM / Container</text>
    <text x="20" y="80" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">--yolo</text>
    <text x="20" y="110" fill="#94a3b8" font-size="12">Ohne Sandbox, ohne Approval — volle Maschine</text>
    <text x="20" y="132" fill="#94a3b8" font-size="12">Nur in isolierten, wegwerfbaren Umgebungen!</text>
    <text x="20" y="162" fill="#ef4444" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">Alias: --dangerously-bypass-approvals-and-sandbox</text>
  </g>

  <!-- (danger-full-access, on-request) = Planning -->
  <g transform="translate(740 620)">
    <rect width="520" height="200" rx="10" fill="#0b1220" stroke="#a78bfa" stroke-width="2"/>
    <g transform="translate(20 20)">
      <rect width="80" height="22" rx="11" fill="#a78bfa"/>
      <text x="40" y="16" fill="#0f172a" font-size="11" font-weight="700" text-anchor="middle">PLAN</text>
    </g>
    <text x="118" y="38" fill="#a78bfa" font-size="18" font-weight="700">Multi-Hour-Planning</text>
    <text x="20" y="80" fill="#e2e8f0" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace">-p planning --model gpt-5.4 --search</text>
    <text x="20" y="110" fill="#94a3b8" font-size="12">Hohe Autonomie mit strategischem Approval-Check</text>
    <text x="20" y="132" fill="#94a3b8" font-size="12">Recherche, Migrations-Planung, Repo-weite Refactors</text>
    <text x="20" y="162" fill="#64748b" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">+ Live-Websearch, höheres Reasoning-Budget</text>
  </g>

  <!-- Legende unten -->
  <g transform="translate(60 840)">
    <rect x="0" y="0" width="12" height="12" fill="#10b981"/>
    <text x="20" y="11" fill="#94a3b8" font-size="12">SAFE (keine Writes)</text>
    <rect x="200" y="0" width="12" height="12" fill="#22d3ee"/>
    <text x="220" y="11" fill="#94a3b8" font-size="12">Default-Arbeit</text>
    <rect x="370" y="0" width="12" height="12" fill="#f59e0b"/>
    <text x="390" y="11" fill="#94a3b8" font-size="12">CI / Warnung</text>
    <rect x="540" y="0" width="12" height="12" fill="#ef4444"/>
    <text x="560" y="11" fill="#94a3b8" font-size="12">Gefahr — nur VM</text>
    <rect x="720" y="0" width="12" height="12" fill="#a78bfa"/>
    <text x="740" y="11" fill="#94a3b8" font-size="12">Strategisch / Planning</text>
  </g>
</svg>
