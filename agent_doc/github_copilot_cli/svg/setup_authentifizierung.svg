<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><marker id="ara" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/></marker></defs>
  <rect width="860" height="540" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Authentifizierung – Token-Discovery-Kette</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Reihenfolge, in der Copilot CLI nach Credentials sucht</text>

  <!-- Chain -->
  <g font-size="11">
    <g transform="translate(100,100)">
      <rect width="200" height="50" rx="8" fill="#161b22" stroke="#58a6ff"/>
      <text x="100" y="22" text-anchor="middle" fill="#58a6ff" font-weight="700" font-size="12">1. COPILOT_GITHUB_TOKEN</text>
      <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-size="10">höchste Priorität</text>
    </g>
    <g transform="translate(320,100)">
      <rect width="200" height="50" rx="8" fill="#161b22" stroke="#58a6ff"/>
      <text x="100" y="22" text-anchor="middle" fill="#58a6ff" font-weight="700" font-size="12">2. GITHUB_TOKEN</text>
      <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-size="10">CI-Standard</text>
    </g>
    <g transform="translate(540,100)">
      <rect width="200" height="50" rx="8" fill="#161b22" stroke="#58a6ff"/>
      <text x="100" y="22" text-anchor="middle" fill="#58a6ff" font-weight="700" font-size="12">3. GH_TOKEN</text>
      <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-size="10">gh-Konvention</text>
    </g>
    <line x1="300" y1="125" x2="320" y2="125" stroke="#58a6ff" stroke-width="2" marker-end="url(#ara)"/>
    <line x1="520" y1="125" x2="540" y2="125" stroke="#58a6ff" stroke-width="2" marker-end="url(#ara)"/>

    <g transform="translate(100,180)">
      <rect width="200" height="50" rx="8" fill="#161b22" stroke="#3fb950"/>
      <text x="100" y="22" text-anchor="middle" fill="#3fb950" font-weight="700" font-size="12">4. gh-Installation</text>
      <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-size="10">geerbter Token</text>
    </g>
    <g transform="translate(320,180)">
      <rect width="200" height="50" rx="8" fill="#161b22" stroke="#3fb950"/>
      <text x="100" y="22" text-anchor="middle" fill="#3fb950" font-weight="700" font-size="12">5. GITHUB_ASKPASS</text>
      <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-size="10">Helper-Program</text>
    </g>
    <g transform="translate(540,180)">
      <rect width="200" height="50" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
      <text x="100" y="22" text-anchor="middle" fill="#d29922" font-weight="700" font-size="12">6. OAuth Device Flow</text>
      <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-size="10">interaktiver Fallback</text>
    </g>
    <line x1="300" y1="205" x2="320" y2="205" stroke="#58a6ff" stroke-width="2" marker-end="url(#ara)"/>
    <line x1="520" y1="205" x2="540" y2="205" stroke="#58a6ff" stroke-width="2" marker-end="url(#ara)"/>
  </g>

  <!-- Plans table -->
  <g transform="translate(40,260)">
    <rect width="780" height="260" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="28" fill="#c9d1d9" font-weight="700" font-size="14">Plans (Stand 04/2026)</text>
    <g font-size="11">
      <rect x="20" y="44" width="740" height="30" fill="#0d1117"/>
      <text x="30" y="64" fill="#8b949e">Plan</text>
      <text x="180" y="64" fill="#8b949e">Preis</text>
      <text x="340" y="64" fill="#8b949e">Premium Req.</text>
      <text x="540" y="64" fill="#8b949e">Eignung</text>

      <text x="30" y="95" fill="#c9d1d9">Free</text><text x="180" y="95" fill="#c9d1d9">$0</text><text x="340" y="95" fill="#8b949e">sehr begrenzt</text><text x="540" y="95" fill="#8b949e">Probieren</text>
      <text x="30" y="120" fill="#c9d1d9">Pro</text><text x="180" y="120" fill="#c9d1d9">~$10/m</text><text x="340" y="120" fill="#8b949e">mittel</text><text x="540" y="120" fill="#8b949e">Einzelentwickler</text>
      <text x="30" y="145" fill="#c9d1d9">Pro+</text><text x="180" y="145" fill="#c9d1d9">~$39/m</text><text x="340" y="145" fill="#8b949e">hoch</text><text x="540" y="145" fill="#8b949e">Power-User</text>
      <text x="30" y="170" fill="#c9d1d9">Business</text><text x="180" y="170" fill="#c9d1d9">$19/User/m</text><text x="340" y="170" fill="#8b949e">hoch + Org-Policies</text><text x="540" y="170" fill="#8b949e">Teams</text>
      <text x="30" y="195" fill="#c9d1d9">Enterprise</text><text x="180" y="195" fill="#c9d1d9">$39/User/m</text><text x="340" y="195" fill="#8b949e">sehr hoch</text><text x="540" y="195" fill="#8b949e">Konzerne + SSO</text>
    </g>
    <text x="20" y="232" fill="#8b949e" font-size="10">Org-/Enterprise-Policies (Modell-Whitelist · Content-Exclusion · SSO) werden geerbt.</text>
  </g>
</svg>
