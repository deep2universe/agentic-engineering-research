<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="540" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Context Engineering – die wichtigste Disziplin</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Vier Säulen: AGENTS.md · Custom Agents · Memory · Token-Effizienz</text>

  <g transform="translate(40,90)">
    <rect width="380" height="200" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="20" y="28" fill="#58a6ff" font-weight="700" font-size="14">📜 AGENTS.md als Verfassung</text>
    <text x="20" y="54" fill="#c9d1d9" font-size="11">Stack &amp; Build · Architektur 1 Satz</text>
    <text x="20" y="74" fill="#c9d1d9" font-size="11">Don't touch · Konventionen · Glossar</text>
    <text x="20" y="104" fill="#d29922" font-weight="700" font-size="12">Faustregel: &lt; 300 Zeilen</text>
    <text x="20" y="124" fill="#8b949e" font-size="11">Alles darüber wird verwässert.</text>
    <text x="20" y="156" fill="#3fb950" font-size="11">Hierarchie: nested AGENTS.md</text>
    <text x="20" y="174" fill="#8b949e" font-size="11">überschreibt, kombiniert mit Root</text>
  </g>

  <g transform="translate(440,90)">
    <rect width="380" height="200" rx="10" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="20" y="28" fill="#f778ba" font-weight="700" font-size="14">🤖 Custom Agents &amp; Skills</text>
    <rect x="20" y="42" width="340" height="130" rx="4" fill="#0d1117"/>
    <g font-family="monospace" font-size="10" fill="#c9d1d9">
      <text x="30" y="60">---</text>
      <text x="30" y="74">name: refactor</text>
      <text x="30" y="88">tools: [view, edit, "shell(rg:*)"]</text>
      <text x="30" y="102">model: claude-opus-4-6</text>
      <text x="30" y="116">---</text>
      <text x="30" y="134" fill="#8b949e">Konservativer Refactor-Agent:</text>
      <text x="30" y="148" fill="#8b949e">1. Keine API-Signaturen ändern</text>
      <text x="30" y="162" fill="#8b949e">2. Nach Schritt: pnpm test</text>
    </g>
  </g>

  <g transform="translate(40,310)">
    <rect width="380" height="210" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="20" y="28" fill="#3fb950" font-weight="700" font-size="14">🧠 Memory – persistent, aber diszipliniert</text>
    <text x="20" y="54" fill="#c9d1d9" font-size="11">/memory → sessionsübergreifende Notizen</text>
    <text x="20" y="78" fill="#c9d1d9" font-size="11">z. B. "Repo nutzt Vitest, nicht Jest"</text>
    <text x="20" y="110" fill="#d29922" font-weight="700" font-size="11">⚠ explizit pflegen</text>
    <text x="20" y="130" fill="#8b949e" font-size="11">sonst wird's zur Mülldeponie.</text>
    <text x="20" y="164" fill="#8b949e" font-size="11">Hierarchie:</text>
    <text x="20" y="182" fill="#8b949e" font-size="11">Session → AGENTS.md → ~/.copilot Instr.</text>
  </g>

  <g transform="translate(440,310)">
    <rect width="380" height="210" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="20" y="28" fill="#d29922" font-weight="700" font-size="14">💰 Token-Effizienz</text>
    <g font-size="11">
      <text x="20" y="54" fill="#f85149">❌ ganze Files in Prompt pasten</text>
      <text x="20" y="70" fill="#3fb950">✓ view + rg arbeiten lassen</text>
      <text x="20" y="94" fill="#f85149">❌ lange Sessions ohne /clear</text>
      <text x="20" y="110" fill="#3fb950">✓ nach Task /clear</text>
      <text x="20" y="134" fill="#f85149">❌ Default-Modell für Trivialitäten</text>
      <text x="20" y="150" fill="#3fb950">✓ Haiku für mechanische Tasks</text>
      <text x="20" y="174" fill="#f85149">❌ Plan im Prompt wiederholen</text>
      <text x="20" y="190" fill="#3fb950">✓ Plan in docs/specs/*.md persistieren</text>
    </g>
  </g>
</svg>
