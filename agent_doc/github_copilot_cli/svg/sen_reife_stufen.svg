      <text x="75" y="24" text-anchor="middle" fill="#f778ba" font-weight="700" font-size="13">Stufe 4</text>
      <text x="75" y="44" text-anchor="middle" fill="#c9d1d9" font-size="11">Agentic-First</text>
    </g>
