      <text x="75" y="44" text-anchor="middle" fill="#c9d1d9" font-size="11">Experiment</text>
    </g>
    <g transform="translate(210,340)">
      <rect width="150" height="120" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
      <text x="75" y="24" text-anchor="middle" fill="#58a6ff" font-weight="700" font-size="13">Stufe 1</text>
      <text x="75" y="44" text-anchor="middle" fill="#c9d1d9" font-size="11">Repo-fähig</text>
    </g>
    <g transform="translate(360,280)">
      <rect width="150" height="180" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
      <text x="75" y="24" text-anchor="middle" fill="#3fb950" font-weight="700" font-size="13">Stufe 2</text>
      <text x="75" y="44" text-anchor="middle" fill="#c9d1d9" font-size="11">Team-fähig</text>
    </g>
    <g transform="translate(510,220)">
