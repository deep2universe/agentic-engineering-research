      <text x="75" y="24" text-anchor="middle" fill="#d29922" font-weight="700" font-size="13">Stufe 3</text>
      <text x="75" y="44" text-anchor="middle" fill="#c9d1d9" font-size="11">CI-integriert</text>
    </g>
    <g transform="translate(660,140)">
