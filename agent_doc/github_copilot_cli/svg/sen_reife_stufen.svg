    <text x="285" y="402" text-anchor="middle">Pro-Lizenzen</text>
    <text x="435" y="314" text-anchor="middle">Custom Agents</text>
    <text x="435" y="328" text-anchor="middle">.github/agents/</text>
    <text x="435" y="342" text-anchor="middle">MCP-Allowlist</text>
    <text x="435" y="356" text-anchor="middle">Org-Policies</text>
    <text x="585" y="254" text-anchor="middle">Headless Runs</text>
    <text x="585" y="268" text-anchor="middle">PR-Bots</text>
    <text x="585" y="282" text-anchor="middle">Audit-Logging</text>
    <text x="735" y="174" text-anchor="middle">Spec-driven</text>
