<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><marker id="arl1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/></marker></defs>
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Mentales Modell – Coding-Agent als LLM-Schleife</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Observe → Plan → Act → Verify · wiederhole</text>

  <!-- Cycle -->
  <g transform="translate(260,280)">
    <circle r="170" fill="none" stroke="#30363d" stroke-dasharray="4 4"/>
    <g transform="translate(0,-170)">
      <rect x="-70" y="-30" width="140" height="60" rx="10" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text y="-5" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">Observe</text>
      <text y="15" text-anchor="middle" fill="#8b949e" font-size="10">Kontext lesen</text>
    </g>
    <g transform="translate(170,0)">
      <rect x="-70" y="-30" width="140" height="60" rx="10" fill="#0f5323" stroke="#3fb950" stroke-width="2"/>
      <text y="-5" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">Plan</text>
      <text y="15" text-anchor="middle" fill="#8b949e" font-size="10">Schritte skizzieren</text>
    </g>
    <g transform="translate(0,170)">
      <rect x="-70" y="-30" width="140" height="60" rx="10" fill="#6e1744" stroke="#f778ba" stroke-width="2"/>
      <text y="-5" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">Act</text>
      <text y="15" text-anchor="middle" fill="#8b949e" font-size="10">read/write/bash/MCP</text>
    </g>
    <g transform="translate(-170,0)">
      <rect x="-70" y="-30" width="140" height="60" rx="10" fill="#693b00" stroke="#d29922" stroke-width="2"/>
      <text y="-5" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">Verify</text>
      <text y="15" text-anchor="middle" fill="#8b949e" font-size="10">Tests, Lint</text>
    </g>
    <path d="M70,-155 A170,170 0 0 1 155,-70" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arl1)"/>
    <path d="M155,70 A170,170 0 0 1 70,155" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arl1)"/>
    <path d="M-70,155 A170,170 0 0 1 -155,70" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arl1)"/>
    <path d="M-155,-70 A170,170 0 0 1 -70,-155" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arl1)"/>
  </g>

  <!-- Hebel -->
  <g transform="translate(500,140)">
    <rect width="340" height="110" rx="10" fill="#161b22" stroke="#f85149" stroke-width="2"/>
    <text x="16" y="28" fill="#f85149" font-weight="700" font-size="14">Dein Hebel</text>
    <text x="16" y="54" fill="#c9d1d9" font-size="12">Context Engineering</text>
    <text x="16" y="74" fill="#8b949e" font-size="11">nicht Prompt-Tricks.</text>
    <text x="16" y="92" fill="#8b949e" font-size="11">AGENTS.md, Tools, Leitplanken.</text>
  </g>

  <g transform="translate(500,270)">
    <rect width="340" height="220" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="16" y="28" fill="#58a6ff" font-weight="700" font-size="14">Copilot CLI Komponenten</text>
    <text x="16" y="54" fill="#c9d1d9" font-size="11">• Context: AGENTS.md, Memory, MCP, Git</text>
    <text x="16" y="76" fill="#c9d1d9" font-size="11">• Tool-Use: view/create/edit/bash/MCP</text>
    <text x="16" y="98" fill="#c9d1d9" font-size="11">• Planning: Shift+Tab, Critic Agent</text>
    <text x="16" y="120" fill="#c9d1d9" font-size="11">• Verification: Hooks, Tests, /review</text>
    <text x="16" y="142" fill="#c9d1d9" font-size="11">• Subagents: /fleet (lokal), /delegate (cloud)</text>
    <text x="16" y="180" fill="#8b949e" font-size="10">Kein Autocomplete mehr – ein System.</text>
  </g>
</svg>
