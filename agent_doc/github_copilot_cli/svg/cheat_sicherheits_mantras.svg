<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">7 Sicherheits-Mantras</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Ins Muscle-Memory jedes Senior Devs</text>

  <g font-size="13">
    <g transform="translate(50,90)">
      <circle cx="30" cy="30" r="24" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text x="30" y="36" text-anchor="middle" fill="#c9d1d9" font-weight="700" font-size="16">1</text>
      <text x="70" y="28" fill="#c9d1d9" font-weight="700">Default = Interactive</text>
      <text x="70" y="46" fill="#8b949e" font-size="11">jeder Tool-Call wird gesehen</text>
    </g>
    <g transform="translate(440,90)">
      <circle cx="30" cy="30" r="24" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text x="30" y="36" text-anchor="middle" fill="#c9d1d9" font-weight="700" font-size="16">2</text>
      <text x="70" y="28" fill="#c9d1d9" font-weight="700">Deny &gt; Allow</text>
      <text x="70" y="46" fill="#8b949e" font-size="11">rm · curl · env · chmod blocken</text>
    </g>
    <g transform="translate(50,170)">
      <circle cx="30" cy="30" r="24" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text x="30" y="36" text-anchor="middle" fill="#c9d1d9" font-weight="700" font-size="16">3</text>
      <text x="70" y="28" fill="#c9d1d9" font-weight="700">Nur bekannte Workspaces</text>
      <text x="70" y="46" fill="#8b949e" font-size="11">Fremder Code = Fremdes Risiko</text>
    </g>
    <g transform="translate(440,170)">
      <circle cx="30" cy="30" r="24" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text x="30" y="36" text-anchor="middle" fill="#c9d1d9" font-weight="700" font-size="16">4</text>
      <text x="70" y="28" fill="#c9d1d9" font-weight="700">Fine-grained PATs</text>
      <text x="70" y="46" fill="#8b949e" font-size="11">niemals Prod-Credentials</text>
    </g>
    <g transform="translate(50,250)">
      <circle cx="30" cy="30" r="24" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text x="30" y="36" text-anchor="middle" fill="#c9d1d9" font-weight="700" font-size="16">5</text>
      <text x="70" y="28" fill="#c9d1d9" font-weight="700">Sandbox für --allow-all</text>
      <text x="70" y="46" fill="#8b949e" font-size="11">Docker / VM / Codespaces</text>
    </g>
    <g transform="translate(440,250)">
      <circle cx="30" cy="30" r="24" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text x="30" y="36" text-anchor="middle" fill="#c9d1d9" font-weight="700" font-size="16">6</text>
      <text x="70" y="28" fill="#c9d1d9" font-weight="700">Hooks als Wächter</text>
      <text x="70" y="46" fill="#8b949e" font-size="11">preToolUse blockt hart</text>
    </g>
    <g transform="translate(240,340)">
      <circle cx="30" cy="30" r="24" fill="#6e1744" stroke="#f778ba" stroke-width="3"/>
      <text x="30" y="36" text-anchor="middle" fill="#c9d1d9" font-weight="700" font-size="16">7</text>
      <text x="70" y="28" fill="#f778ba" font-weight="700">Audit-Log an</text>
      <text x="70" y="46" fill="#8b949e" font-size="11">postToolUse → JSONL-Trail</text>
    </g>
  </g>
</svg>
