<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><marker id="arrs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/></marker></defs>
  <rect width="860" height="460" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Sessions &amp; History</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Time-Travel durch Checkpoints, Undo und Share</text>

  <!-- Timeline -->
  <line x1="80" y1="200" x2="780" y2="200" stroke="#30363d" stroke-width="3"/>
  <g>
    <circle cx="140" cy="200" r="14" fill="#0f5323" stroke="#3fb950" stroke-width="2"/>
    <text x="140" y="205" text-anchor="middle" fill="#c9d1d9" font-size="11">T1</text>
    <text x="140" y="240" text-anchor="middle" fill="#8b949e" font-size="11">Start</text>
    <text x="140" y="256" text-anchor="middle" fill="#8b949e" font-size="10">copilot</text>
  </g>
  <g>
    <circle cx="280" cy="200" r="14" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
    <text x="280" y="205" text-anchor="middle" fill="#c9d1d9" font-size="11">T2</text>
    <text x="280" y="240" text-anchor="middle" fill="#8b949e" font-size="11">Plan</text>
    <text x="280" y="256" text-anchor="middle" fill="#8b949e" font-size="10">checkpoint</text>
  </g>
  <g>
    <circle cx="420" cy="200" r="14" fill="#6e1744" stroke="#f778ba" stroke-width="2"/>
    <text x="420" y="205" text-anchor="middle" fill="#c9d1d9" font-size="11">T3</text>
    <text x="420" y="240" text-anchor="middle" fill="#8b949e" font-size="11">Edit</text>
    <text x="420" y="256" text-anchor="middle" fill="#8b949e" font-size="10">/undo möglich</text>
  </g>
  <g>
    <circle cx="560" cy="200" r="14" fill="#693b00" stroke="#d29922" stroke-width="2"/>
    <text x="560" y="205" text-anchor="middle" fill="#c9d1d9" font-size="11">T4</text>
    <text x="560" y="240" text-anchor="middle" fill="#8b949e" font-size="11">Tests ✓</text>
  </g>
  <g>
    <circle cx="700" cy="200" r="14" fill="#471f70" stroke="#bc8cff" stroke-width="2"/>
    <text x="700" y="205" text-anchor="middle" fill="#c9d1d9" font-size="11">T5</text>
    <text x="700" y="240" text-anchor="middle" fill="#8b949e" font-size="11">/share html</text>
  </g>

  <!-- Commands -->
  <g transform="translate(40,300)">
    <rect width="780" height="140" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="28" fill="#c9d1d9" font-size="14" font-weight="700">Commands</text>
    <g font-family="monospace" font-size="11">
      <text x="20" y="52" fill="#3fb950">--resume / --continue / /resume</text><text x="340" y="52" fill="#8b949e">→ frühere Session laden</text>
      <text x="20" y="72" fill="#3fb950">/session</text><text x="340" y="72" fill="#8b949e">→ Inspect · Rename · Checkpoints · Plan · Files</text>
      <text x="20" y="92" fill="#3fb950">/undo</text><text x="340" y="92" fill="#8b949e">→ letzten Turn rückgängig, inkl. Datei-Edits</text>
      <text x="20" y="112" fill="#3fb950">/share · /share html</text><text x="340" y="112" fill="#8b949e">→ Markdown / Gist / Self-contained HTML</text>
    </g>
  </g>

  <text x="430" y="130" text-anchor="middle" fill="#8b949e" font-size="12">Persistiert: Verlauf · Plan · Checkpoints · Approvals · Trusted Dirs</text>
</svg>
