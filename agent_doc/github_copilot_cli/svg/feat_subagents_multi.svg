<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><marker id="arm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/></marker></defs>
  <rect width="860" height="540" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Subagenten &amp; Multi-Agent</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Orchestrator, Fleet, Delegate, Critic</text>

  <!-- Orchestrator center -->
  <g transform="translate(430,170)">
    <rect x="-110" y="-40" width="220" height="80" rx="10" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
    <text y="-8" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="700">Main Agent</text>
    <text y="14" text-anchor="middle" fill="#8b949e" font-size="11">Orchestrator</text>
  </g>

  <!-- Fleet local -->
  <g transform="translate(60,330)">
    <rect width="200" height="180" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">/fleet – lokal parallel</text>
    <g font-family="monospace" font-size="10">
      <rect x="20" y="46" width="160" height="26" rx="3" fill="#0d1117"/>
      <text x="100" y="63" text-anchor="middle" fill="#c9d1d9">subagent A</text>
      <rect x="20" y="78" width="160" height="26" rx="3" fill="#0d1117"/>
      <text x="100" y="95" text-anchor="middle" fill="#c9d1d9">subagent B</text>
      <rect x="20" y="110" width="160" height="26" rx="3" fill="#0d1117"/>
      <text x="100" y="127" text-anchor="middle" fill="#c9d1d9">subagent C</text>
    </g>
    <text x="100" y="160" text-anchor="middle" fill="#8b949e" font-size="10">Sweeps, Multi-File Refactor</text>
  </g>

  <!-- Delegate cloud -->
  <g transform="translate(330,330)">
    <rect width="200" height="180" rx="10" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" fill="#f778ba" font-size="13" font-weight="700">/delegate – Cloud</text>
    <g transform="translate(100,90)">
      <ellipse cx="0" cy="0" rx="70" ry="30" fill="#6e1744" stroke="#f778ba"/>
      <text y="5" text-anchor="middle" fill="#c9d1d9" font-size="11">GitHub Cloud</text>
    </g>
    <text x="100" y="148" text-anchor="middle" fill="#8b949e" font-size="10">asynchron, neuer Branch</text>
    <text x="100" y="164" text-anchor="middle" fill="#8b949e" font-size="10">commits unstaged changes</text>
  </g>

  <!-- Critic -->
  <g transform="translate(600,330)">
    <rect width="200" height="180" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" fill="#d29922" font-size="13" font-weight="700">Critic-Agent</text>
    <text x="100" y="60" text-anchor="middle" fill="#c9d1d9" font-size="11">automatische</text>
    <text x="100" y="78" text-anchor="middle" fill="#c9d1d9" font-size="11">Plan-Review</text>
    <text x="100" y="110" text-anchor="middle" fill="#8b949e" font-size="10">seit v1.0.18</text>
    <text x="100" y="150" text-anchor="middle" fill="#bc8cff" font-size="10">BYOM · Anthropic-Provider</text>
  </g>

  <!-- Arrows -->
  <line x1="360" y1="210" x2="160" y2="330" stroke="#8b949e" stroke-width="2" marker-end="url(#arm)"/>
  <line x1="430" y1="210" x2="430" y2="330" stroke="#8b949e" stroke-width="2" marker-end="url(#arm)"/>
  <line x1="500" y1="210" x2="700" y2="330" stroke="#8b949e" stroke-width="2" marker-end="url(#arm)"/>

  <!-- Helpers -->
  <g transform="translate(40,110)">
    <rect width="220" height="80" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="16" y="24" fill="#58a6ff" font-size="12" font-weight="700">Custom Agents</text>
    <text x="16" y="44" fill="#c9d1d9" font-size="11" font-family="monospace">--agent · /agent · /agents</text>
    <text x="16" y="62" fill="#8b949e" font-size="10">Markdown-Files mit Frontmatter</text>
  </g>
  <g transform="translate(600,110)">
    <rect width="220" height="80" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="16" y="24" fill="#58a6ff" font-size="12" font-weight="700">write_agent &amp; /tasks</text>
    <text x="16" y="44" fill="#c9d1d9" font-size="11" font-family="monospace">Multi-Turn mit Subagent</text>
    <text x="16" y="62" fill="#8b949e" font-size="10">Background-Task-Tracking</text>
  </g>
</svg>
