<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="480" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">AGENTS.md – Mini-Template als „Steckbrief"</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Fünf Felder, die jedes Repo ausfüllen sollte</text>

  <!-- Paper mockup -->
  <g transform="translate(150,90)">
    <rect width="560" height="370" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <rect x="0" y="0" width="560" height="34" rx="8" fill="#21262d"/>
    <circle cx="16" cy="17" r="5" fill="#f85149"/>
    <circle cx="32" cy="17" r="5" fill="#d29922"/>
    <circle cx="48" cy="17" r="5" fill="#3fb950"/>
    <text x="280" y="22" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">AGENTS.md</text>

    <g font-size="12" font-family="monospace">
      <text x="24" y="68" fill="#f778ba" font-weight="700">## Stack</text>
      <text x="24" y="86" fill="#c9d1d9">Node 22, pnpm 9, TypeScript strict</text>

      <text x="24" y="120" fill="#f778ba" font-weight="700">## Build/Test</text>
      <text x="24" y="138" fill="#c9d1d9">- pnpm install</text>
      <text x="24" y="154" fill="#c9d1d9">- pnpm test muss grün sein</text>

      <text x="24" y="188" fill="#f778ba" font-weight="700">## Don't touch</text>
      <text x="24" y="206" fill="#f85149">- /legacy, /migrations, *.generated.*</text>

      <text x="24" y="240" fill="#f778ba" font-weight="700">## Konventionen</text>
      <text x="24" y="258" fill="#c9d1d9">- Conventional Commits, snake_case</text>

      <text x="24" y="292" fill="#f778ba" font-weight="700">## Glossar</text>
      <text x="24" y="310" fill="#c9d1d9">- Booking: Reservierung mit Status …</text>
      <text x="24" y="326" fill="#c9d1d9">- Tenant: Mandant mit eigener DB</text>
    </g>

    <text x="24" y="360" fill="#8b949e" font-size="10">↗ wird beim Start automatisch geladen</text>
  </g>
</svg>
