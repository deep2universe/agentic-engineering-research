<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><marker id="arh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/></marker></defs>
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Headless / Scripting / CI</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Copilot CLI als unix-fähiger Pipeline-Baustein</text>

  <!-- Pipeline diagram -->
  <g transform="translate(40,90)">
    <rect width="130" height="60" rx="8" fill="#161b22" stroke="#58a6ff"/>
    <text x="65" y="28" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">Stdin</text>
    <text x="65" y="48" text-anchor="middle" fill="#8b949e" font-size="10">echo "…" |</text>
  </g>
  <line x1="170" y1="120" x2="220" y2="120" stroke="#3fb950" stroke-width="2" marker-end="url(#arh)"/>

  <g transform="translate(220,90)">
    <rect width="200" height="60" rx="8" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
    <text x="100" y="26" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="700">copilot -p</text>
    <text x="100" y="46" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">--silent --output-format json</text>
  </g>
  <line x1="420" y1="120" x2="470" y2="120" stroke="#3fb950" stroke-width="2" marker-end="url(#arh)"/>

  <g transform="translate(470,90)">
    <rect width="130" height="60" rx="8" fill="#161b22" stroke="#d29922"/>
    <text x="65" y="28" text-anchor="middle" fill="#d29922" font-size="12" font-weight="700">jq</text>
    <text x="65" y="48" text-anchor="middle" fill="#8b949e" font-size="10">Filter/Assert</text>
  </g>
  <line x1="600" y1="120" x2="650" y2="120" stroke="#3fb950" stroke-width="2" marker-end="url(#arh)"/>

  <g transform="translate(650,90)">
    <rect width="130" height="60" rx="8" fill="#161b22" stroke="#3fb950"/>
    <text x="65" y="28" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">CI Exit</text>
    <text x="65" y="48" text-anchor="middle" fill="#8b949e" font-size="10">0 or 1</text>
  </g>

  <!-- Features list -->
  <g transform="translate(40,180)">
    <rect width="780" height="140" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="28" fill="#c9d1d9" font-weight="700" font-size="14">Features für Automation</text>
    <g font-size="11">
      <text x="20" y="52" fill="#c9d1d9">• --output-format json → JSONL-Stream mit Events + finalem result-Objekt</text>
      <text x="20" y="72" fill="#c9d1d9">• --silent → nur reine Antwort, perfekt für Pipes</text>
      <text x="20" y="92" fill="#c9d1d9">• GH_TOKEN/GITHUB_TOKEN → headless Auth</text>
      <text x="20" y="112" fill="#c9d1d9">• OpenTelemetry-Instrumentierung → Observability aus der Box</text>
    </g>
  </g>

  <!-- CI snippet -->
  <g transform="translate(40,340)">
    <rect width="780" height="160" rx="8" fill="#010409" stroke="#3fb950" stroke-width="2"/>
    <rect width="780" height="28" fill="#161b22" rx="8"/>
    <text x="12" y="20" fill="#8b949e" font-size="11" font-family="monospace">ci-release.yml</text>
    <g font-family="monospace" font-size="11">
      <text x="20" y="56" fill="#8b949e">$</text>
      <text x="36" y="56" fill="#c9d1d9">GH_TOKEN=$TOKEN copilot \</text>
      <text x="36" y="74" fill="#c9d1d9">  -p "Update CHANGELOG for current release" \</text>
      <text x="36" y="92" fill="#c9d1d9">  --model claude-sonnet-4.5 \</text>
      <text x="36" y="110" fill="#3fb950">  --allow-tool 'shell(git:*)' \</text>
      <text x="36" y="128" fill="#f85149">  --deny-tool 'shell(git push)' \</text>
      <text x="36" y="146" fill="#c9d1d9">  --output-format json --silent</text>
    </g>
  </g>
</svg>
