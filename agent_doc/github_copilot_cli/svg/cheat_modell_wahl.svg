<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="500" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Modell-Wahl – Daumenregel</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Kosten / Intelligenz-Matrix für 5 Modelle</text>

  <!-- Axes -->
  <g stroke="#30363d" stroke-width="1">
    <line x1="100" y1="440" x2="780" y2="440"/>
    <line x1="100" y1="100" x2="100" y2="440"/>
  </g>
  <text x="440" y="470" text-anchor="middle" fill="#8b949e" font-size="12">Kosten pro Task →</text>
  <g transform="translate(60,270) rotate(-90)">
    <text text-anchor="middle" fill="#8b949e" font-size="12">Reasoning-Fähigkeit →</text>
  </g>

  <!-- Points -->
  <g font-size="12" fill="#c9d1d9">
    <circle cx="160" cy="400" r="20" fill="#0f5323" stroke="#3fb950" stroke-width="2"/>
    <text x="160" y="404" text-anchor="middle" font-size="11" fill="#c9d1d9">Haiku</text>
    <text x="160" y="440" text-anchor="middle" fill="#8b949e" font-size="10">mechanisch, Volume</text>

    <circle cx="320" cy="300" r="28" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
    <text x="320" y="305" text-anchor="middle" font-size="11" fill="#c9d1d9">Sonnet 4.6</text>
    <text x="320" y="345" text-anchor="middle" fill="#8b949e" font-size="10">Default, alles Standard</text>

    <circle cx="560" cy="170" r="36" fill="#693b00" stroke="#d29922" stroke-width="2"/>
