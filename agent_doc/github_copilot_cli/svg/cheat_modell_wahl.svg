    <text x="560" y="218" text-anchor="middle" fill="#8b949e" font-size="10">Architektur, Refactor</text>

    <circle cx="440" cy="230" r="26" fill="#6e1744" stroke="#f778ba" stroke-width="2"/>
    <text x="440" y="234" text-anchor="middle" font-size="10" fill="#c9d1d9">GPT-5.3</text>
    <text x="440" y="272" text-anchor="middle" fill="#8b949e" font-size="10">Codegen</text>

    <circle cx="680" cy="260" r="28" fill="#471f70" stroke="#bc8cff" stroke-width="2"/>
    <text x="680" y="264" text-anchor="middle" font-size="10" fill="#c9d1d9">Gemini 3</text>
    <text x="680" y="302" text-anchor="middle" fill="#8b949e" font-size="10">huge context</text>
  </g>
