<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="540" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Best Practices für Senior Devs &amp; Architekten</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Kontext · Layout · Token · Reviews · Sicherheit</text>

  <g transform="translate(40,90)">
    <rect width="380" height="210" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="20" y="28" fill="#58a6ff" font-weight="700" font-size="14">🧩 Kontext-Engineering</text>
    <text x="20" y="54" fill="#c9d1d9" font-size="11">• AGENTS.md im Root: Standards, Build,</text>
    <text x="30" y="70" fill="#c9d1d9" font-size="11">Test, Dependencies, Don't-Touch</text>
    <text x="20" y="92" fill="#c9d1d9" font-size="11">• .github/agents/ für rollenspezifisch</text>
    <text x="20" y="110" fill="#c9d1d9" font-size="11">• ~/.copilot/agents/ für persönliche</text>
    <text x="20" y="140" fill="#d29922" font-weight="700" font-size="11">AGENTS.md &lt; 300 Zeilen</text>
    <text x="20" y="156" fill="#8b949e" font-size="10">Token-Budget zählt.</text>
  </g>

  <g transform="translate(440,90)">
    <rect width="380" height="210" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="20" y="28" fill="#3fb950" font-weight="700" font-size="14">🏗 Repo-Layout</text>
    <text x="20" y="54" fill="#c9d1d9" font-size="11">Monorepo:</text>
    <text x="30" y="70" fill="#c9d1d9" font-size="11">pro Service eine AGENTS.md</text>
    <text x="30" y="86" fill="#c9d1d9" font-size="11">Root verweist auf Service-Spezifika</text>
    <text x="20" y="110" fill="#c9d1d9" font-size="11">.copilot/instructions/*.md</text>
    <text x="30" y="126" fill="#c9d1d9" font-size="11">via Slash-Command nachladbar</text>
  </g>

  <g transform="translate(40,320)">
    <rect width="250" height="200" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="16" y="26" fill="#d29922" font-weight="700" font-size="13">💰 Token-Effizienz</text>
    <text x="16" y="48" fill="#c9d1d9" font-size="11">• Plan-Mode spart Re-Runs</text>
    <text x="16" y="66" fill="#c9d1d9" font-size="11">• /fleet nur wenn parallelisierbar</text>
    <text x="16" y="84" fill="#c9d1d9" font-size="11">• große Files indizieren</text>
    <text x="30" y="100" fill="#c9d1d9" font-size="11">via Grep/Glob</text>
    <text x="16" y="124" fill="#c9d1d9" font-size="11">• Sessions schließen</text>
  </g>

  <g transform="translate(305,320)">
    <rect width="250" height="200" rx="10" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="16" y="26" fill="#f778ba" font-weight="700" font-size="13">🔍 Reviews</text>
    <text x="16" y="48" fill="#c9d1d9" font-size="11">Doppelschleife:</text>
    <text x="16" y="66" fill="#c9d1d9" font-size="11">lokal /review vor Commit</text>
    <text x="16" y="84" fill="#c9d1d9" font-size="11">+ @copilot als Reviewer im PR</text>
    <text x="16" y="114" fill="#c9d1d9" font-size="11">Auto-Review pro Push,</text>
    <text x="16" y="130" fill="#c9d1d9" font-size="11">menschl. Approval Required</text>
  </g>

  <g transform="translate(570,320)">
    <rect width="250" height="200" rx="10" fill="#161b22" stroke="#f85149" stroke-width="2"/>
    <text x="16" y="26" fill="#f85149" font-weight="700" font-size="13">🛡 Sicherheit</text>
    <text x="16" y="48" fill="#c9d1d9" font-size="11">• MCP minimaler Scope</text>
    <text x="30" y="64" fill="#c9d1d9" font-size="11">OAuth &gt; PAT</text>
    <text x="16" y="86" fill="#c9d1d9" font-size="11">• Allowlists in CI</text>
    <text x="30" y="102" fill="#c9d1d9" font-size="11">statt --yolo</text>
    <text x="16" y="124" fill="#c9d1d9" font-size="11">• Secret-Scanning-MCP</text>
    <text x="30" y="140" fill="#c9d1d9" font-size="11">vor autonomen Commits</text>
  </g>
</svg>
