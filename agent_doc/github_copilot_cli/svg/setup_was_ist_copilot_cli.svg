<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Was ist die GitHub Copilot CLI?</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Evolution von Befehls-Sugar zum vollagentischen Coding-Tool</text>

  <!-- Before / After -->
  <g transform="translate(40,90)">
    <rect width="380" height="180" rx="10" fill="#161b22" stroke="#8b949e" stroke-width="2"/>
    <text x="20" y="28" fill="#8b949e" font-weight="700" font-size="14">⚰ Alt: gh-copilot Extension</text>
    <text x="20" y="52" fill="#c9d1d9" font-size="12" font-family="monospace">gh copilot suggest / explain</text>
    <text x="20" y="78" fill="#8b949e" font-size="11">• Nur Text-Vorschlag</text>
    <text x="20" y="98" fill="#8b949e" font-size="11">• User kopiert manuell</text>
    <text x="20" y="118" fill="#8b949e" font-size="11">• Kein Filesystem-Zugriff</text>
    <text x="20" y="148" fill="#f85149" font-weight="700" font-size="12">Deprecated: 25.10.2025</text>
  </g>

  <g transform="translate(440,90)">
    <rect width="380" height="180" rx="10" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
    <text x="20" y="28" fill="#58a6ff" font-weight="700" font-size="14">🚀 Neu: copilot CLI</text>
    <text x="20" y="52" fill="#c9d1d9" font-size="12" font-family="monospace">copilot [flags] [prompt]</text>
    <text x="20" y="78" fill="#c9d1d9" font-size="11">• Vollständiger AI-Agent</text>
    <text x="20" y="98" fill="#c9d1d9" font-size="11">• Liest/schreibt Dateien</text>
    <text x="20" y="118" fill="#c9d1d9" font-size="11">• Plant &amp; führt Tools aus</text>
    <text x="20" y="148" fill="#3fb950" font-weight="700" font-size="12">GA: 25.02.2026</text>
  </g>

  <!-- Timeline -->
  <g transform="translate(40,310)">
    <rect width="780" height="180" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="28" fill="#c9d1d9" font-weight="700" font-size="14">Zeitleiste</text>
    <line x1="60" y1="100" x2="760" y2="100" stroke="#30363d" stroke-width="3"/>
    <g font-size="10">
      <circle cx="100" cy="100" r="8" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
      <text x="100" y="80" text-anchor="middle" fill="#58a6ff" font-weight="700">Sep 2025</text>
      <text x="100" y="128" text-anchor="middle" fill="#8b949e">Public Preview</text>

      <circle cx="260" cy="100" r="8" fill="#0f5323" stroke="#3fb950" stroke-width="2"/>
      <text x="260" y="80" text-anchor="middle" fill="#3fb950" font-weight="700">Okt 2025</text>
      <text x="260" y="128" text-anchor="middle" fill="#8b949e">Modelle · Image</text>
      <text x="260" y="142" text-anchor="middle" fill="#8b949e">Shift+Enter</text>

      <circle cx="420" cy="100" r="8" fill="#693b00" stroke="#d29922" stroke-width="2"/>
      <text x="420" y="80" text-anchor="middle" fill="#d29922" font-weight="700">Jan 2026</text>
      <text x="420" y="128" text-anchor="middle" fill="#8b949e">Enhanced Agents</text>
      <text x="420" y="142" text-anchor="middle" fill="#8b949e">gh install</text>

      <circle cx="580" cy="100" r="11" fill="#6e1744" stroke="#f778ba" stroke-width="3"/>
      <text x="580" y="76" text-anchor="middle" fill="#f778ba" font-weight="700" font-size="12">25.02.2026</text>
      <text x="580" y="128" text-anchor="middle" fill="#c9d1d9" font-weight="700">GA</text>

      <circle cx="720" cy="100" r="8" fill="#471f70" stroke="#bc8cff" stroke-width="2"/>
      <text x="720" y="80" text-anchor="middle" fill="#bc8cff" font-weight="700">Apr 2026</text>
      <text x="720" y="128" text-anchor="middle" fill="#8b949e">v1.0.18</text>
      <text x="720" y="142" text-anchor="middle" fill="#8b949e">Critic</text>
    </g>
  </g>
</svg>
