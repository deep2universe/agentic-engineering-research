<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="480" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Copilot CLI 2026 – Big Picture</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Voll agentischer Terminal-Client mit MCP, Approval, AGENTS.md, Hooks</text>

  <!-- Central diamond -->
  <g transform="translate(430,260)">
    <rect x="-90" y="-50" width="180" height="100" rx="12" fill="#0d419d" stroke="#58a6ff" stroke-width="2"/>
    <text y="-10" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="700">Copilot CLI</text>
    <text y="10" text-anchor="middle" fill="#8b949e" font-size="11">Plan / Approval / Autopilot</text>
    <text y="28" text-anchor="middle" fill="#8b949e" font-size="11">copilot --resume</text>
  </g>

  <!-- 4 surrounding blocks -->
  <g transform="translate(40,120)">
    <rect width="230" height="90" rx="8" fill="#161b22" stroke="#3fb950"/>
    <text x="16" y="28" fill="#3fb950" font-size="13" font-weight="700">MCP Ecosystem</text>
    <text x="16" y="50" fill="#c9d1d9" font-size="11">GitHub built-in + stdio/http</text>
    <text x="16" y="68" fill="#8b949e" font-size="11">Team-Config einchecken</text>
  </g>
  <g transform="translate(590,120)">
    <rect width="230" height="90" rx="8" fill="#161b22" stroke="#f778ba"/>
    <text x="16" y="28" fill="#f778ba" font-size="13" font-weight="700">Approval-System</text>
    <text x="16" y="50" fill="#c9d1d9" font-size="11">shell · write · mcp_server</text>
    <text x="16" y="68" fill="#8b949e" font-size="11">--allow-tool · --deny-tool</text>
  </g>
  <g transform="translate(40,340)">
    <rect width="230" height="90" rx="8" fill="#161b22" stroke="#d29922"/>
    <text x="16" y="28" fill="#d29922" font-size="13" font-weight="700">AGENTS.md + Custom Agents</text>
    <text x="16" y="50" fill="#c9d1d9" font-size="11">Long-Term Memory</text>
    <text x="16" y="68" fill="#8b949e" font-size="11">@reviewer · @implementer</text>
  </g>
  <g transform="translate(590,340)">
    <rect width="230" height="90" rx="8" fill="#161b22" stroke="#f85149"/>
    <text x="16" y="28" fill="#f85149" font-size="13" font-weight="700">Hooks + Sandbox</text>
    <text x="16" y="50" fill="#c9d1d9" font-size="11">preToolUse blockt hart</text>
    <text x="16" y="68" fill="#8b949e" font-size="11">Docker · Devcontainer</text>
  </g>

  <!-- Lines -->
  <g stroke="#30363d" stroke-width="2" fill="none">
    <line x1="270" y1="165" x2="345" y2="230"/>
    <line x1="590" y1="165" x2="515" y2="230"/>
    <line x1="270" y1="385" x2="345" y2="290"/>
    <line x1="590" y1="385" x2="515" y2="290"/>
  </g>
</svg>
