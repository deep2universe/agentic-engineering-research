<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="460" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Limits &amp; häufige Setup-Fallstricke</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Problem → Ursache → Lösung</text>

  <g font-size="11">
    <rect x="40" y="90" width="780" height="30" fill="#161b22" stroke="#30363d"/>
    <text x="56" y="110" fill="#58a6ff" font-weight="700">Problem</text>
    <text x="320" y="110" fill="#58a6ff" font-weight="700">Ursache</text>
    <text x="580" y="110" fill="#58a6ff" font-weight="700">Lösung</text>

    <g fill="#c9d1d9">
      <g transform="translate(40,125)">
        <rect width="780" height="56" fill="#0d1117" stroke="#30363d"/>
        <circle cx="22" cy="28" r="10" fill="#f85149"/>
        <text x="42" y="32" font-weight="700" font-family="monospace">Node 22 required</text>
        <text x="280" y="32" fill="#8b949e">alte Node-Version</text>
        <text x="540" y="32" fill="#3fb950" font-family="monospace">nvm install 22</text>
      </g>
      <g transform="translate(40,185)">
        <rect width="780" height="56" fill="#0d1117" stroke="#30363d"/>
        <circle cx="22" cy="28" r="10" fill="#f85149"/>
        <text x="42" y="32" font-weight="700">401 in CI</text>
        <text x="280" y="32" fill="#8b949e">GITHUB_TOKEN ohne Scope</text>
        <text x="540" y="32" fill="#3fb950" font-family="monospace">COPILOT_GITHUB_TOKEN</text>
      </g>
      <g transform="translate(40,245)">
        <rect width="780" height="56" fill="#0d1117" stroke="#30363d"/>
        <circle cx="22" cy="28" r="10" fill="#d29922"/>
        <text x="42" y="32" font-weight="700">OAuth hängt in SSH</text>
        <text x="280" y="32" fill="#8b949e">Kein Browser</text>
        <text x="540" y="32" fill="#3fb950">Code auf github.com/login/device</text>
      </g>
      <g transform="translate(40,305)">
        <rect width="780" height="56" fill="#0d1117" stroke="#30363d"/>
        <circle cx="22" cy="28" r="10" fill="#d29922"/>
        <text x="42" y="32" font-weight="700">Tool fragt jedesmal</text>
        <text x="280" y="32" fill="#8b949e">Trust nicht gespeichert</text>
        <text x="540" y="32" fill="#3fb950">"trust this folder" bestätigen</text>
      </g>
      <g transform="translate(40,365)">
        <rect width="780" height="56" fill="#0d1117" stroke="#30363d"/>
        <circle cx="22" cy="28" r="10" fill="#58a6ff"/>
        <text x="42" y="32" font-weight="700">Config nicht geladen</text>
        <text x="280" y="32" fill="#8b949e">falscher Pfad</text>
        <text x="540" y="32" fill="#3fb950" font-family="monospace">COPILOT_HOME prüfen</text>
      </g>
    </g>
  </g>
</svg>
