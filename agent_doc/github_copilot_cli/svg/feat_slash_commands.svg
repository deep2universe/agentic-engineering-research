<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="600" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Slash-Commands in 7 Domänen</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Von Lifecycle bis Multi-Agent</text>

  <g font-size="11" font-family="monospace">
    <g transform="translate(40,90)">
      <rect width="380" height="110" rx="8" fill="#161b22" stroke="#58a6ff"/>
      <text x="16" y="24" fill="#58a6ff" font-weight="700" font-family="sans-serif" font-size="13">🔄 Hilfe &amp; Lifecycle</text>
      <text x="16" y="48" fill="#c9d1d9">/help  /exit  /quit  /clear</text>
      <text x="16" y="68" fill="#c9d1d9">/login  /logout  /version</text>
      <text x="16" y="88" fill="#c9d1d9">/changelog  /feedback  /usage  /status</text>
    </g>
    <g transform="translate(440,90)">
      <rect width="380" height="110" rx="8" fill="#161b22" stroke="#3fb950"/>
      <text x="16" y="24" fill="#3fb950" font-weight="700" font-family="sans-serif" font-size="13">⚙ Modell &amp; Config</text>
      <text x="16" y="48" fill="#c9d1d9">/model  /theme</text>
      <text x="16" y="68" fill="#c9d1d9">/experimental  /terminal-setup</text>
    </g>
    <g transform="translate(40,210)">
      <rect width="380" height="110" rx="8" fill="#161b22" stroke="#f778ba"/>
      <text x="16" y="24" fill="#f778ba" font-weight="700" font-family="sans-serif" font-size="13">📁 Kontext &amp; Scope</text>
      <text x="16" y="48" fill="#c9d1d9">/cwd  /cd  /add-dir</text>
      <text x="16" y="68" fill="#c9d1d9">/session  /resume  /undo</text>
    </g>
    <g transform="translate(440,210)">
      <rect width="380" height="110" rx="8" fill="#161b22" stroke="#f85149"/>
      <text x="16" y="24" fill="#f85149" font-weight="700" font-family="sans-serif" font-size="13">🛡 Tools, Approvals, MCP</text>
      <text x="16" y="48" fill="#c9d1d9">/approvals  /yolo  /autoApprove</text>
      <text x="16" y="68" fill="#c9d1d9">/mcp show/add/edit/delete</text>
      <text x="16" y="88" fill="#c9d1d9">/lsp  /extensions</text>
    </g>
    <g transform="translate(40,330)">
      <rect width="380" height="110" rx="8" fill="#161b22" stroke="#d29922"/>
      <text x="16" y="24" fill="#d29922" font-weight="700" font-family="sans-serif" font-size="13">🤖 Agenten &amp; Multi-Agent</text>
      <text x="16" y="48" fill="#c9d1d9">/agent  /agents</text>
      <text x="16" y="68" fill="#c9d1d9">/delegate  /fleet  /tasks</text>
      <text x="16" y="88" fill="#c9d1d9">/pr</text>
    </g>
    <g transform="translate(440,330)">
      <rect width="380" height="110" rx="8" fill="#161b22" stroke="#bc8cff"/>
      <text x="16" y="24" fill="#bc8cff" font-weight="700" font-family="sans-serif" font-size="13">📤 Sharing &amp; Export</text>
      <text x="16" y="48" fill="#c9d1d9">/share  /share html  /copy</text>
      <text x="16" y="68" fill="#c9d1d9">/chronicle  /init</text>
    </g>
    <g transform="translate(180,450)">
      <rect width="500" height="90" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
      <text x="250" y="30" text-anchor="middle" fill="#58a6ff" font-weight="700" font-family="sans-serif" font-size="14">💡 Workflow-Triade</text>
      <text x="250" y="58" text-anchor="middle" fill="#c9d1d9">/plan → /review --staged → /pr</text>
      <text x="250" y="76" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Der Goldstandard für spec-driven Dev</text>
    </g>
  </g>
</svg>
