<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="560" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Architektur – Modelle, Agents, Modi</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Drei Bausteine, die das Verhalten der CLI bestimmen</text>

  <!-- Models -->
  <g transform="translate(40,90)">
    <rect width="780" height="140" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="20" y="28" fill="#58a6ff" font-weight="700" font-size="14">🧠 Modelle (April 2026)</text>
    <g font-size="11">
      <rect x="20" y="46" width="170" height="40" rx="4" fill="#0d419d"/>
      <text x="105" y="64" text-anchor="middle" fill="#c9d1d9" font-weight="700">Claude Sonnet 4.6</text>
      <text x="105" y="78" text-anchor="middle" fill="#8b949e" font-size="9">DEFAULT</text>

      <rect x="200" y="46" width="130" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="265" y="71" text-anchor="middle" fill="#c9d1d9">Claude Opus 4.6</text>

      <rect x="340" y="46" width="130" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="405" y="71" text-anchor="middle" fill="#c9d1d9">Claude Haiku 4.5</text>

      <rect x="480" y="46" width="130" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="545" y="71" text-anchor="middle" fill="#c9d1d9">GPT-5.3-Codex</text>

      <rect x="620" y="46" width="140" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="690" y="71" text-anchor="middle" fill="#c9d1d9">Gemini 3 Pro</text>

      <rect x="200" y="94" width="130" height="30" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="265" y="114" text-anchor="middle" fill="#8b949e" font-size="10">GPT-5.2-Codex</text>
      <rect x="340" y="94" width="130" height="30" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="405" y="114" text-anchor="middle" fill="#8b949e" font-size="10">GPT-5 mini</text>
      <rect x="480" y="94" width="130" height="30" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="545" y="114" text-anchor="middle" fill="#8b949e" font-size="10">GPT-4.1</text>
    </g>
  </g>

  <!-- Spezialisierte Agents -->
  <g transform="translate(40,250)">
    <rect width="780" height="140" rx="10" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="20" y="28" fill="#f778ba" font-weight="700" font-size="14">🤖 Spezialisierte Agents</text>
    <g font-size="11">
      <rect x="20" y="46" width="140" height="70" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="90" y="68" text-anchor="middle" fill="#c9d1d9" font-weight="700">Explore</text>
      <text x="90" y="88" text-anchor="middle" fill="#8b949e" font-size="10">Codebase-Analyse</text>
      <rect x="170" y="46" width="140" height="70" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="240" y="68" text-anchor="middle" fill="#c9d1d9" font-weight="700">Plan</text>
      <text x="240" y="88" text-anchor="middle" fill="#8b949e" font-size="10">Impl.-Planung</text>
      <rect x="320" y="46" width="140" height="70" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="390" y="68" text-anchor="middle" fill="#c9d1d9" font-weight="700">Task</text>
      <text x="390" y="88" text-anchor="middle" fill="#8b949e" font-size="10">Builds · Tests</text>
      <rect x="470" y="46" width="140" height="70" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="540" y="68" text-anchor="middle" fill="#c9d1d9" font-weight="700">Code Review</text>
      <text x="540" y="88" text-anchor="middle" fill="#8b949e" font-size="10">Change-Reviews</text>
      <rect x="620" y="46" width="140" height="70" rx="6" fill="#471f70" stroke="#bc8cff" stroke-width="2"/>
      <text x="690" y="68" text-anchor="middle" fill="#c9d1d9" font-weight="700">Critic ✨</text>
      <text x="690" y="88" text-anchor="middle" fill="#8b949e" font-size="10">experimentell</text>
    </g>
  </g>

  <!-- Modes -->
  <g transform="translate(40,410)">
    <rect width="780" height="130" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="20" y="28" fill="#d29922" font-weight="700" font-size="14">🛡 Approval-Modi</text>
    <g font-size="10">
      <text x="20" y="52" fill="#c9d1d9">Interactive</text><text x="200" y="52" fill="#8b949e">Default · fragt pro Call</text>
      <text x="20" y="70" fill="#c9d1d9">Allow-Listing</text><text x="200" y="70" fill="#8b949e">--allow-tool 'shell(git:*)'</text>
      <text x="20" y="88" fill="#c9d1d9">Deny-Listing</text><text x="200" y="88" fill="#8b949e">--deny-tool gewinnt immer</text>
      <text x="420" y="52" fill="#c9d1d9">--no-ask-user</text><text x="560" y="52" fill="#8b949e">autonom</text>
      <text x="420" y="70" fill="#c9d1d9">--autopilot</text><text x="560" y="70" fill="#8b949e">vollautonom · Shift+Tab</text>
      <text x="420" y="88" fill="#f85149">--allow-all-tools</text><text x="560" y="88" fill="#8b949e">nur Sandbox!</text>
    </g>
    <text x="20" y="118" fill="#f85149" font-size="11">⚠ Auto-Approve nur in isolierter Sandbox (Container/VM/dedizierte Maschine)</text>
  </g>
</svg>
