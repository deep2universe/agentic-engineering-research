<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Built-in Tools – Werkzeugkasten des Agenten</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Read auto-erlaubt, Write/Execute approval-pflichtig</text>

  <g transform="translate(40,90)">
    <rect width="250" height="190" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="16" y="26" fill="#3fb950" font-weight="700" font-size="14">📖 Read (auto)</text>
    <g font-family="monospace" font-size="11" fill="#c9d1d9">
      <text x="16" y="52">view</text>
      <text x="16" y="74">Codebase-Search</text>
      <text x="16" y="96">Tool Search</text>
      <text x="16" y="118">Web-Fetch *</text>
    </g>
    <text x="16" y="150" fill="#8b949e" font-size="10">* Web-Fetch ist approval-pflichtig</text>
  </g>

  <g transform="translate(305,90)">
    <rect width="250" height="190" rx="10" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="16" y="26" fill="#f778ba" font-weight="700" font-size="14">✏ Write</text>
    <g font-family="monospace" font-size="11" fill="#c9d1d9">
      <text x="16" y="52">create</text>
      <text x="16" y="74">edit</text>
      <text x="16" y="96">write_agent</text>
    </g>
    <text x="16" y="140" fill="#8b949e" font-size="10">approval-pflichtig</text>
  </g>

  <g transform="translate(570,90)">
    <rect width="250" height="190" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="16" y="26" fill="#d29922" font-weight="700" font-size="14">⚡ Execute (Shell)</text>
    <g font-family="monospace" font-size="11" fill="#c9d1d9">
      <text x="16" y="52">bash (sync · async · detached)</text>
      <text x="16" y="74">write_bash</text>
      <text x="16" y="96">read_bash</text>
      <text x="16" y="118">stop_bash</text>
    </g>
    <text x="16" y="150" fill="#8b949e" font-size="10">langläufige Jobs möglich</text>
  </g>

  <g transform="translate(40,300)">
    <rect width="380" height="190" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="16" y="26" fill="#58a6ff" font-weight="700" font-size="14">🐙 GitHub (MCP, eingebaut)</text>
    <text x="16" y="52" fill="#c9d1d9" font-size="12">Issues · Pull Requests · Repositories</text>
    <text x="16" y="72" fill="#c9d1d9" font-size="12">Code-Search · Workflows · Reviews</text>
    <text x="16" y="92" fill="#c9d1d9" font-size="12">Secret Scanning · Copilot Review</text>
    <text x="16" y="124" fill="#8b949e" font-size="10">Zero-Config – via /mcp show sichtbar</text>
  </g>

  <g transform="translate(440,300)">
    <rect width="380" height="190" rx="10" fill="#161b22" stroke="#f85149" stroke-width="2"/>
    <text x="16" y="26" fill="#f85149" font-weight="700" font-size="14">🧭 Plan / Todo-Tool</text>
    <text x="16" y="52" fill="#c9d1d9" font-size="12">Plan-Items, Checkpoints, Critic-Review</text>
    <text x="16" y="84" fill="#c9d1d9" font-size="12" font-family="monospace">✓ Step 1 — done</text>
    <text x="16" y="104" fill="#3fb950" font-size="12" font-family="monospace">▶ Step 2 — in progress</text>
    <text x="16" y="124" fill="#8b949e" font-size="12" font-family="monospace">○ Step 3 — pending</text>
  </g>
