<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><marker id="ar1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/></marker></defs>
  <rect width="860" height="360" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Install &amp; Update – 3 Commands</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Lifecycle eines Copilot-CLI-Binaries</text>

  <g transform="translate(80,120)">
    <rect width="200" height="160" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">① Install</text>
    <rect x="20" y="50" width="160" height="40" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="100" y="76" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">npm i -g @github/copilot</text>
    <text x="100" y="120" text-anchor="middle" fill="#8b949e" font-size="11">Node 22 LTS empfohlen</text>
    <text x="100" y="138" text-anchor="middle" fill="#8b949e" font-size="11">global bin</text>
  </g>

  <g transform="translate(330,120)">
    <rect width="200" height="160" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="700">② Update</text>
    <rect x="20" y="50" width="160" height="40" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="100" y="76" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">copilot update</text>
    <text x="100" y="120" text-anchor="middle" fill="#8b949e" font-size="11">self-update</text>
    <text x="100" y="138" text-anchor="middle" fill="#8b949e" font-size="11">keine npm nötig</text>
  </g>

  <g transform="translate(580,120)">
    <rect width="200" height="160" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#d29922" font-size="14" font-weight="700">③ Verify</text>
    <rect x="20" y="50" width="160" height="40" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="100" y="76" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">copilot --version</text>
    <text x="100" y="120" text-anchor="middle" fill="#8b949e" font-size="11">Sanity-Check</text>
    <text x="100" y="138" text-anchor="middle" fill="#8b949e" font-size="11">vor CI-Jobs pflicht</text>
  </g>

  <line x1="285" y1="200" x2="328" y2="200" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar1)"/>
  <line x1="535" y1="200" x2="578" y2="200" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar1)"/>
</svg>
