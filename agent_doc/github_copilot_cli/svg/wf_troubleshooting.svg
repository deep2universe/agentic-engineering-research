<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="600" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Troubleshooting &amp; häufige Fehler</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Problem → Ursache → Lösung</text>

  <g font-size="11">
    <g transform="translate(40,90)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#f85149"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">Rate limit trotz Pro</text>
      <text x="42" y="38" fill="#8b949e">Token-Bucket/Backend-Bug → /model wechseln · GitHub Support</text>
    </g>
    <g transform="translate(40,142)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#f85149"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">401 Unauthorized headless</text>
      <text x="42" y="38" fill="#8b949e">GITHUB_TOKEN ohne copilot-Scope → COPILOT_GITHUB_TOKEN Fine-grained PAT</text>
    </g>
    <g transform="translate(40,194)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#d29922"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">Tool-Hang in Actions</text>
      <text x="42" y="38" fill="#8b949e">Interaktive Prompts in non-TTY → -p + explizite --allow-tool Flags</text>
    </g>
    <g transform="translate(40,246)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#d29922"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">MCP-Server startet nicht</text>
      <text x="42" y="38" fill="#8b949e">falscher Pfad/ENV → copilot mcp list · copilot mcp test &lt;name&gt;</text>
    </g>
    <g transform="translate(40,298)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#d29922"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">Stale Auth nach Update</text>
      <text x="42" y="38" fill="#8b949e">Cache in ~/.copilot → logout + login · Cache löschen</text>
    </g>
    <g transform="translate(40,350)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#58a6ff"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">Plan-Mode endlos</text>
      <text x="42" y="38" fill="#8b949e">unklares Ziel → konkrete Akzeptanzkriterien + Beispieldateien</text>
    </g>
    <g transform="translate(40,402)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#58a6ff"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">Riesige Diffs nicht reviewbar</text>
      <text x="42" y="38" fill="#8b949e">kein /fleet split → /review mit Pfad-Filter · Diffs in Chunks</text>
    </g>
    <g transform="translate(40,454)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#d29922"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700" font-family="monospace">command not found: copilot</text>
      <text x="42" y="38" fill="#8b949e">falscher PATH nach npm i -g → npm root -g prüfen, PATH ergänzen</text>
    </g>
    <g transform="translate(40,506)"><rect width="780" height="48" fill="#0d1117" stroke="#30363d"/>
      <circle cx="24" cy="24" r="10" fill="#f85149"/>
      <text x="42" y="20" fill="#c9d1d9" font-weight="700">VPN/IP-Rate-Limit</text>
      <text x="42" y="38" fill="#8b949e">Shared Egress → VPN aus oder dedizierte Egress-IP</text>
    </g>
  </g>
</svg>
