<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><marker id="ars" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/></marker></defs>
  <rect width="860" height="500" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">5-Minuten-Smoketest</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Von „frisch installiert" bis „autonomer Autopilot"</text>

  <!-- Steps -->
  <g font-size="12" font-family="monospace">
    <g transform="translate(60,90)">
      <rect width="740" height="36" rx="6" fill="#161b22" stroke="#3fb950"/>
      <circle cx="20" cy="18" r="12" fill="#0f5323" stroke="#3fb950"/>
      <text x="20" y="22" text-anchor="middle" fill="#c9d1d9" font-weight="700">1</text>
      <text x="48" y="23" fill="#c9d1d9">npm i -g @github/copilot</text>
      <text x="620" y="23" fill="#8b949e" font-family="sans-serif" font-size="10">→ binary bereit</text>
    </g>
    <g transform="translate(60,140)">
      <rect width="740" height="36" rx="6" fill="#161b22" stroke="#3fb950"/>
      <circle cx="20" cy="18" r="12" fill="#0f5323" stroke="#3fb950"/>
      <text x="20" y="22" text-anchor="middle" fill="#c9d1d9" font-weight="700">2</text>
      <text x="48" y="23" fill="#c9d1d9">cd ~/code/my-repo  &amp;&amp;  copilot</text>
      <text x="620" y="23" fill="#8b949e" font-family="sans-serif" font-size="10">→ REPL startet</text>
    </g>
    <g transform="translate(60,190)">
      <rect width="740" height="36" rx="6" fill="#161b22" stroke="#58a6ff"/>
      <circle cx="20" cy="18" r="12" fill="#0d419d" stroke="#58a6ff"/>
      <text x="20" y="22" text-anchor="middle" fill="#c9d1d9" font-weight="700">3</text>
      <text x="48" y="23" fill="#c9d1d9">/login</text>
      <text x="620" y="23" fill="#8b949e" font-family="sans-serif" font-size="10">→ OAuth Device Flow</text>
    </g>
    <g transform="translate(60,240)">
      <rect width="740" height="36" rx="6" fill="#161b22" stroke="#58a6ff"/>
      <circle cx="20" cy="18" r="12" fill="#0d419d" stroke="#58a6ff"/>
      <text x="20" y="22" text-anchor="middle" fill="#c9d1d9" font-weight="700">4</text>
      <text x="48" y="23" fill="#c9d1d9">/init</text>
      <text x="620" y="23" fill="#8b949e" font-family="sans-serif" font-size="10">→ legt AGENTS.md an</text>
    </g>
    <g transform="translate(60,290)">
      <rect width="740" height="36" rx="6" fill="#161b22" stroke="#d29922"/>
      <circle cx="20" cy="18" r="12" fill="#693b00" stroke="#d29922"/>
      <text x="20" y="22" text-anchor="middle" fill="#c9d1d9" font-weight="700">5</text>
      <text x="48" y="23" fill="#c9d1d9">/model  /mcp show</text>
      <text x="620" y="23" fill="#8b949e" font-family="sans-serif" font-size="10">→ Modell + MCP checken</text>
    </g>
    <g transform="translate(60,340)">
      <rect width="740" height="36" rx="6" fill="#161b22" stroke="#f778ba"/>
      <circle cx="20" cy="18" r="12" fill="#6e1744" stroke="#f778ba"/>
      <text x="20" y="22" text-anchor="middle" fill="#c9d1d9" font-weight="700">6</text>
      <text x="48" y="23" fill="#c9d1d9">Erkläre mir die Architektur dieses Repos.</text>
      <text x="620" y="23" fill="#8b949e" font-family="sans-serif" font-size="10">→ erste Exploration</text>
    </g>
    <g transform="translate(60,390)">
      <rect width="740" height="36" rx="6" fill="#161b22" stroke="#f85149"/>
      <circle cx="20" cy="18" r="12" fill="#6e1744" stroke="#f85149"/>
      <text x="20" y="22" text-anchor="middle" fill="#c9d1d9" font-weight="700">7</text>
      <text x="48" y="23" fill="#c9d1d9">/plan Füge eine /healthz Route hinzu.</text>
      <text x="620" y="23" fill="#8b949e" font-family="sans-serif" font-size="10">→ Shift+Tab → Autopilot</text>
    </g>
  </g>
  <text x="430" y="460" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">✓ Smoketest bestanden</text>
</svg>
