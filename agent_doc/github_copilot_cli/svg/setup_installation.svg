<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="540" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Installation – 4 Pfade</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Je nach Umgebung wählen</text>

  <!-- Prereqs -->
  <g transform="translate(40,90)">
    <rect width="780" height="70" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="20" y="28" fill="#d29922" font-weight="700" font-size="14">Voraussetzungen</text>
    <text x="20" y="52" fill="#c9d1d9" font-size="11">Node.js ≥ 22 · npm · aktives Copilot-Abo · macOS / Linux / Windows (WSL)</text>
  </g>

  <!-- 4 boxes -->
  <g transform="translate(40,180)">
    <rect width="380" height="160" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="20" y="28" fill="#3fb950" font-weight="700" font-size="14">① Standard (npm)</text>
    <rect x="20" y="40" width="340" height="48" rx="4" fill="#0d1117"/>
    <text x="30" y="60" fill="#c9d1d9" font-size="11" font-family="monospace">npm install -g @github/copilot</text>
    <text x="30" y="78" fill="#c9d1d9" font-size="11" font-family="monospace">copilot --version</text>
    <text x="20" y="122" fill="#8b949e" font-size="11">Default für Workstations</text>
  </g>

  <g transform="translate(440,180)">
    <rect width="380" height="160" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="20" y="28" fill="#58a6ff" font-weight="700" font-size="14">② via gh CLI</text>
    <rect x="20" y="40" width="340" height="48" rx="4" fill="#0d1117"/>
    <text x="30" y="60" fill="#c9d1d9" font-size="11" font-family="monospace">gh extension install</text>
    <text x="30" y="78" fill="#c9d1d9" font-size="11" font-family="monospace">  github/gh-copilot-cli</text>
    <text x="20" y="122" fill="#8b949e" font-size="11">Erbt gh-Auth automatisch</text>
  </g>

  <g transform="translate(40,360)">
    <rect width="380" height="160" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="20" y="28" fill="#d29922" font-weight="700" font-size="14">③ Update</text>
    <rect x="20" y="40" width="340" height="48" rx="4" fill="#0d1117"/>
    <text x="30" y="60" fill="#c9d1d9" font-size="11" font-family="monospace">copilot update</text>
    <text x="30" y="78" fill="#c9d1d9" font-size="11" font-family="monospace">npm update -g @github/copilot</text>
    <text x="20" y="122" fill="#8b949e" font-size="11">In-place oder via npm</text>
  </g>

  <g transform="translate(440,360)">
    <rect width="380" height="160" rx="10" fill="#161b22" stroke="#f85149" stroke-width="2"/>
    <text x="20" y="28" fill="#f85149" font-weight="700" font-size="14">④ Sandbox (Docker)</text>
    <rect x="20" y="40" width="340" height="70" rx="4" fill="#0d1117"/>
    <text x="30" y="58" fill="#c9d1d9" font-size="10" font-family="monospace">docker run -it --rm \</text>
    <text x="30" y="72" fill="#c9d1d9" font-size="10" font-family="monospace">  -v "$PWD":/work -w /work \</text>
    <text x="30" y="86" fill="#c9d1d9" font-size="10" font-family="monospace">  -e GH_TOKEN node:22-bookworm</text>
    <text x="20" y="130" fill="#f85149" font-size="11" font-weight="700">Pflicht für --allow-all-tools</text>
  </g>
</svg>
