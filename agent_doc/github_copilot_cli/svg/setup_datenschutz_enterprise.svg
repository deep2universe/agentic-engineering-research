<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="460" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Datenschutz &amp; Enterprise</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Fünf Säulen für Compliance-fähige Nutzung</text>

  <g font-size="12">
    <g transform="translate(40,100)">
      <rect width="250" height="150" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
      <text x="20" y="28" fill="#58a6ff" font-weight="700" font-size="13">📝 Audit-Logging</text>
      <text x="20" y="54" fill="#c9d1d9" font-size="11">GitHub Enterprise Audit-Log</text>
      <text x="20" y="72" fill="#c9d1d9" font-size="11">Microsoft Purview</text>
      <text x="20" y="100" fill="#8b949e" font-size="10">User · Zeit · Ressource</text>
    </g>
    <g transform="translate(305,100)">
      <rect width="250" height="150" rx="10" fill="#161b22" stroke="#f85149" stroke-width="2"/>
      <text x="20" y="28" fill="#f85149" font-weight="700" font-size="13">🚫 Content Exclusions</text>
      <text x="20" y="54" fill="#c9d1d9" font-size="11">Org-Policies blocken</text>
      <text x="20" y="72" fill="#c9d1d9" font-size="11">sensible Pfade</text>
      <text x="20" y="100" fill="#8b949e" font-size="10">z. B. /secrets/*, *.pem</text>
    </g>
    <g transform="translate(570,100)">
      <rect width="250" height="150" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
      <text x="20" y="28" fill="#d29922" font-weight="700" font-size="13">📡 Telemetrie</text>
      <text x="20" y="54" fill="#c9d1d9" font-size="11">OpenTelemetry-</text>
      <text x="20" y="72" fill="#c9d1d9" font-size="11">Instrumentierung</text>
      <text x="20" y="100" fill="#8b949e" font-size="10">deaktivierbar in Config</text>
    </g>
    <g transform="translate(170,270)">
      <rect width="250" height="150" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
      <text x="20" y="28" fill="#3fb950" font-weight="700" font-size="13">📦 Sandbox-Empfehlung</text>
      <text x="20" y="54" fill="#c9d1d9" font-size="11">Container · Devcontainer</text>
      <text x="20" y="72" fill="#c9d1d9" font-size="11">Codespaces</text>
      <text x="20" y="100" fill="#8b949e" font-size="10">keine Prod-Credentials</text>
      <text x="20" y="118" fill="#8b949e" font-size="10">fine-grained PATs</text>
    </g>
    <g transform="translate(440,270)">
      <rect width="250" height="150" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
      <text x="20" y="28" fill="#bc8cff" font-weight="700" font-size="13">⚖ Responsible Use</text>
      <text x="20" y="54" fill="#c9d1d9" font-size="11">docs.github.com/copilot/</text>
      <text x="20" y="72" fill="#c9d1d9" font-size="11">responsible-use/copilot-cli</text>
      <text x="20" y="100" fill="#8b949e" font-size="10">Usage Metrics seit 04/2026</text>
    </g>
  </g>
</svg>
