<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Hidden Gems 💎</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Wenig bekannte, hoch-nützliche Features</text>

  <g font-size="12">
    <g transform="translate(40,90)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#58a6ff"/>
      <text x="16" y="26" fill="#58a6ff" font-weight="700">💎 Shift+Tab</text>
      <text x="16" y="46" fill="#8b949e">Plan-Mode toggle mitten in der Session</text>
    </g>
    <g transform="translate(440,90)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#3fb950"/>
      <text x="16" y="26" fill="#3fb950" font-weight="700">💎 /research</text>
      <text x="16" y="46" fill="#8b949e">Web + Repo + Issues kombiniert</text>
    </g>
    <g transform="translate(40,160)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#f778ba"/>
      <text x="16" y="26" fill="#f778ba" font-weight="700">💎 /delegate</text>
      <text x="16" y="46" fill="#8b949e">startet Cloud-Agent asynchron</text>
    </g>
    <g transform="translate(440,160)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#d29922"/>
      <text x="16" y="26" fill="#d29922" font-weight="700">💎 /share html</text>
      <text x="16" y="46" fill="#8b949e">exportiert Session als HTML-Bericht</text>
    </g>
    <g transform="translate(40,230)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#58a6ff"/>
      <text x="16" y="26" fill="#58a6ff" font-weight="700">💎 Multi-Repo Workspace</text>
      <text x="16" y="46" fill="#8b949e">mehrere Klone in einem Kontext</text>
    </g>
    <g transform="translate(440,230)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#3fb950"/>
      <text x="16" y="26" fill="#3fb950" font-weight="700">💎 --output-format json</text>
      <text x="16" y="46" fill="#8b949e">jede Pipeline wird parsebar</text>
    </g>
    <g transform="translate(40,300)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#f778ba"/>
      <text x="16" y="26" fill="#f778ba" font-weight="700">💎 MCP-Chaining</text>
      <text x="16" y="46" fill="#8b949e">GitHub + Postgres + Sentry E2E-Triage</text>
    </g>
    <g transform="translate(440,300)">
      <rect width="380" height="60" rx="8" fill="#161b22" stroke="#d29922"/>
      <text x="16" y="26" fill="#d29922" font-weight="700">💎 session list/resume</text>
      <text x="16" y="46" fill="#8b949e">rettet abgebrochene Refactors</text>
    </g>
    <g transform="translate(240,380)">
      <rect width="380" height="90" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
      <text x="16" y="26" fill="#bc8cff" font-weight="700">💎 Custom Agents pro Aufgabe</text>
      <text x="16" y="50" fill="#c9d1d9">@refactor · @reviewer · @doc-writer</text>
      <text x="16" y="72" fill="#8b949e">eigene Tools, Modelle, System-Prompts</text>
    </g>
  </g>
</svg>
