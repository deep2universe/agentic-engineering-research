<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Tool-Approval-System – 3 Risiko-Achsen</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Granulare Freigabe pro Kategorie mit Allow/Deny-Listen</text>

  <!-- 3 Säulen -->
  <g transform="translate(60,90)">
    <rect width="230" height="260" rx="10" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="115" y="30" text-anchor="middle" fill="#f778ba" font-size="15" font-weight="700">shell(&lt;cmd&gt;)</text>
    <text x="115" y="50" text-anchor="middle" fill="#8b949e" font-size="11">jeglicher Shell-Befehl</text>
    <rect x="20" y="70" width="190" height="30" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="115" y="90" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">shell(git status)</text>
    <rect x="20" y="108" width="190" height="30" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="115" y="128" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">shell(npm test)</text>
    <text x="115" y="170" text-anchor="middle" fill="#3fb950" font-size="11">Read-Only Allowlist:</text>
    <text x="115" y="188" text-anchor="middle" fill="#8b949e" font-size="10">ls · cat · env · pwd</text>
    <text x="115" y="220" text-anchor="middle" fill="#f85149" font-size="10">⚠ Injection-Vektor via env</text>
    <text x="115" y="238" text-anchor="middle" fill="#8b949e" font-size="10">Default: Approval</text>
  </g>

  <g transform="translate(315,90)">
    <rect width="230" height="260" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="115" y="30" text-anchor="middle" fill="#58a6ff" font-size="15" font-weight="700">write</text>
    <text x="115" y="50" text-anchor="middle" fill="#8b949e" font-size="11">datei-modifizierende Tools</text>
    <rect x="20" y="70" width="190" height="30" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="115" y="90" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">write_file</text>
    <rect x="20" y="108" width="190" height="30" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="115" y="128" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">edit</text>
    <text x="115" y="170" text-anchor="middle" fill="#c9d1d9" font-size="11">alles außer Shell</text>
    <text x="115" y="220" text-anchor="middle" fill="#8b949e" font-size="10">Default: Approval</text>
  </g>

  <g transform="translate(570,90)">
    <rect width="230" height="260" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="115" y="30" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="700">&lt;MCP_SERVER&gt;</text>
    <text x="115" y="50" text-anchor="middle" fill="#8b949e" font-size="11">Tools externer MCP-Server</text>
    <rect x="20" y="70" width="190" height="30" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="115" y="90" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">github</text>
    <rect x="20" y="108" width="190" height="30" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="115" y="128" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="monospace">playwright</text>
    <text x="115" y="170" text-anchor="middle" fill="#c9d1d9" font-size="11">Server-spezifische Tools</text>
    <text x="115" y="220" text-anchor="middle" fill="#8b949e" font-size="10">Default: Approval</text>
  </g>

  <!-- CLI Flags -->
  <g transform="translate(60,370)">
    <rect width="740" height="130" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="26" fill="#c9d1d9" font-size="14" font-weight="700">CLI-Flags</text>
    <g font-family="monospace" font-size="11">
      <rect x="20" y="40" width="340" height="22" rx="3" fill="#0d1117"/>
      <text x="28" y="56" fill="#3fb950">--allow-tool 'shell(git status)'</text>
      <rect x="20" y="66" width="340" height="22" rx="3" fill="#0d1117"/>
      <text x="28" y="82" fill="#3fb950">--allow-tool write</text>
      <rect x="20" y="92" width="340" height="22" rx="3" fill="#0d1117"/>
      <text x="28" y="108" fill="#3fb950">--allow-tool github</text>

      <rect x="380" y="40" width="340" height="22" rx="3" fill="#0d1117"/>
      <text x="388" y="56" fill="#f85149">--deny-tool 'shell(rm)'</text>
      <rect x="380" y="66" width="340" height="22" rx="3" fill="#0d1117"/>
      <text x="388" y="82" fill="#f85149">--allow-all-tools  ⚠ nur Sandbox!</text>
    </g>
    <text x="20" y="125" fill="#8b949e" font-size="11">Session: y = einmal · a = always (nur Session) · n = ablehnen</text>
  </g>
</svg>
