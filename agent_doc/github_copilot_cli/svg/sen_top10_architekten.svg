      <rect x="52" y="6" width="768" height="36" rx="4" fill="#161b22" stroke="#bc8cff"/>
      <text x="64" y="30" fill="#bc8cff" font-weight="700">AI-Postmortem-Format etablieren: Was hat der Agent getan, was nicht?</text>
