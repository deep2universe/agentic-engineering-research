<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="500" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">MCP-Config – drei klassische Server</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">~/.copilot/mcp-config.json</text>

  <g transform="translate(60,90)">
    <rect width="740" height="70" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="20" y="28" fill="#58a6ff" font-weight="700" font-size="14">🐙 github</text>
    <text x="20" y="50" fill="#8b949e" font-size="11">type: http · url: api.githubcopilot.com/mcp/ · Bearer ${GITHUB_PAT}</text>
    <text x="700" y="50" text-anchor="end" fill="#c9d1d9" font-family="monospace" font-size="11">remote</text>
  </g>

  <g transform="translate(60,180)">
    <rect width="740" height="70" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="20" y="28" fill="#3fb950" font-weight="700" font-size="14">📁 filesystem</text>
    <text x="20" y="50" fill="#8b949e" font-size="11">type: stdio · npx @modelcontextprotocol/server-filesystem /workspace</text>
    <text x="700" y="50" text-anchor="end" fill="#c9d1d9" font-family="monospace" font-size="11">local</text>
  </g>

  <g transform="translate(60,270)">
    <rect width="740" height="70" rx="8" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="20" y="28" fill="#f778ba" font-weight="700" font-size="14">🎭 playwright</text>
    <text x="20" y="50" fill="#8b949e" font-size="11">type: stdio · npx @playwright/mcp@latest</text>
    <text x="700" y="50" text-anchor="end" fill="#c9d1d9" font-family="monospace" font-size="11">local</text>
  </g>

  <g transform="translate(60,370)">
    <rect width="740" height="100" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="28" fill="#d29922" font-weight="700" font-size="13">💡 Tipps</text>
    <text x="20" y="52" fill="#c9d1d9" font-size="11">• Secrets via ${ENV_VAR} – niemals hardcoded in JSON</text>
    <text x="20" y="72" fill="#c9d1d9" font-size="11">• tools: [...] Filter reduziert Tokens pro Request</text>
    <text x="20" y="92" fill="#c9d1d9" font-size="11">• .copilot/mcp-config.json im Repo für Team-Setup einchecken</text>
  </g>
</svg>
