<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Interaktive REPL – UI im Überblick</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Statuszeile, Diff-Anzeige, Tool-Prompts, Plan-Mode</text>

  <!-- Terminal mockup -->
  <g transform="translate(60,90)">
    <rect width="740" height="400" rx="10" fill="#010409" stroke="#30363d" stroke-width="2"/>
    <rect x="0" y="0" width="740" height="30" rx="10" fill="#161b22"/>
    <circle cx="16" cy="15" r="5" fill="#f85149"/>
    <circle cx="32" cy="15" r="5" fill="#d29922"/>
    <circle cx="48" cy="15" r="5" fill="#3fb950"/>
    <text x="370" y="20" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">~/app — copilot</text>

    <!-- Status line -->
    <rect x="12" y="42" width="716" height="26" rx="4" fill="#0d419d"/>
    <text x="24" y="59" fill="#c9d1d9" font-size="11" font-family="monospace">● claude-opus-4.6  📁 ~/app  🛡 interactive  🧮 12k/200k</text>

    <!-- Prompt -->
    <text x="24" y="96" fill="#3fb950" font-size="12" font-family="monospace">›</text>
    <text x="40" y="96" fill="#c9d1d9" font-size="12" font-family="monospace">Refactor user service to use Dependency Injection</text>

    <!-- Plan box -->
    <rect x="24" y="110" width="700" height="90" rx="4" fill="#161b22" stroke="#58a6ff"/>
    <text x="34" y="130" fill="#58a6ff" font-size="11" font-weight="700">📝 Plan (3 Schritte)</text>
    <text x="34" y="150" fill="#c9d1d9" font-size="11" font-family="monospace">1. Interface UserRepository extrahieren</text>
    <text x="34" y="168" fill="#c9d1d9" font-size="11" font-family="monospace">2. Konstruktor-Injection einführen</text>
    <text x="34" y="186" fill="#c9d1d9" font-size="11" font-family="monospace">3. Tests anpassen und laufen lassen</text>

    <!-- Tool call box -->
    <rect x="24" y="216" width="700" height="70" rx="4" fill="#161b22" stroke="#d29922"/>
    <text x="34" y="236" fill="#d29922" font-size="11" font-weight="700">🔧 edit src/user_service.ts</text>
    <text x="34" y="256" fill="#3fb950" font-size="11" font-family="monospace">+ constructor(private repo: UserRepository) {}</text>
    <text x="34" y="272" fill="#f85149" font-size="11" font-family="monospace">- const repo = new UserRepository()</text>

    <!-- Approval line -->
    <rect x="24" y="300" width="700" height="36" rx="4" fill="#693b00"/>
    <text x="34" y="323" fill="#c9d1d9" font-size="12" font-weight="700">? Approve edit?  [y] once  [a] always  [n] no</text>

    <!-- footer hint -->
    <text x="24" y="370" fill="#8b949e" font-size="10" font-family="monospace">Shift+Tab: toggle Plan/Autopilot   Esc: abort   /help</text>
  </g>
</svg>
