<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" fill="#0d1117"/>
  <text x="430" y="34" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">AGENTS.md · Custom Agents · Memory · Hooks</text>
  <text x="430" y="56" text-anchor="middle" fill="#8b949e" font-size="13">Vier Bausteine, mit denen Teams Verhalten der Copilot CLI formen</text>

  <!-- AGENTS.md -->
  <g transform="translate(50,90)">
    <rect width="370" height="200" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="20" y="28" fill="#58a6ff" font-size="15" font-weight="700">AGENTS.md – Long-Term Memory</text>
    <text x="20" y="52" fill="#8b949e" font-size="11">Automatisch geladen von:</text>
    <g font-size="11" fill="#c9d1d9">
      <text x="30" y="74">📁 Repo-Root AGENTS.md</text>
      <text x="30" y="94">📁 cwd/AGENTS.md</text>
      <text x="30" y="114">📁 Nested AGENTS.md (Subtree-scope)</text>
      <text x="30" y="134">🌐 COPILOT_CUSTOM_INSTRUCTIONS_DIRS</text>
    </g>
    <text x="20" y="162" fill="#8b949e" font-size="11">Polyglott akzeptiert:</text>
    <text x="30" y="182" fill="#c9d1d9" font-size="11">CLAUDE.md · GEMINI.md · copilot-instructions.md</text>
  </g>

  <!-- Custom Agents -->
  <g transform="translate(440,90)">
    <rect width="370" height="200" rx="10" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="20" y="28" fill="#f778ba" font-size="15" font-weight="700">Custom Agents</text>
    <text x="20" y="50" fill="#8b949e" font-size="11">~/.copilot/agents/  ·  .copilot/agents/</text>
    <rect x="20" y="62" width="330" height="120" rx="4" fill="#0d1117" stroke="#30363d"/>
    <g font-family="monospace" font-size="10" fill="#c9d1d9">
      <text x="30" y="80">---</text>
      <text x="30" y="94">name: my-reviewer</text>
      <text x="30" y="108">tools: ["shell(git diff)", "github"]</text>
      <text x="30" y="122">model: claude-opus-4-6</text>
      <text x="30" y="136">---</text>
      <text x="30" y="154" fill="#8b949e"># System-Prompt Markdown ...</text>
      <text x="30" y="172" fill="#3fb950">copilot --agent my-reviewer</text>
    </g>
  </g>

  <!-- Memory -->
  <g transform="translate(50,310)">
    <rect width="370" height="180" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="20" y="28" fill="#3fb950" font-size="15" font-weight="700">Memory-Schichten</text>
    <g transform="translate(20,50)">
      <rect width="330" height="28" rx="4" fill="#0d419d"/>
      <text x="12" y="19" fill="#c9d1d9" font-size="12">Session (resume) – kurz</text>
    </g>
    <g transform="translate(20,88)">
      <rect width="330" height="28" rx="4" fill="#0f5323"/>
      <text x="12" y="19" fill="#c9d1d9" font-size="12">AGENTS.md – mittel (Repo)</text>
    </g>
    <g transform="translate(20,126)">
      <rect width="330" height="28" rx="4" fill="#693b00"/>
      <text x="12" y="19" fill="#c9d1d9" font-size="12">Custom Instructions – lang (global)</text>
    </g>
  </g>

  <!-- Hooks -->
  <g transform="translate(440,310)">
    <rect width="370" height="180" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="20" y="28" fill="#d29922" font-size="15" font-weight="700">Hooks – Policy Enforcement</text>
    <text x="20" y="48" fill="#8b949e" font-size="11">Shell-Scripts · JSON-in/out · hart blockierend</text>
    <g font-size="11">
      <circle cx="30" cy="70" r="4" fill="#58a6ff"/>
      <text x="42" y="74" fill="#c9d1d9">sessionStart – Audit, Env-Validierung</text>
      <circle cx="30" cy="92" r="4" fill="#f85149"/>
      <text x="42" y="96" fill="#c9d1d9">preToolUse – Tool-Call blockieren</text>
      <circle cx="30" cy="114" r="4" fill="#3fb950"/>
      <text x="42" y="118" fill="#c9d1d9">postToolUse – Logging, Lint</text>
      <circle cx="30" cy="136" r="4" fill="#d29922"/>
      <text x="42" y="140" fill="#c9d1d9">userPromptSubmit – Input-Filter</text>
    </g>
    <text x="20" y="166" fill="#8b949e" font-size="10">Konfig: ~/.copilot/config.json · .copilot/config.json</text>
  </g>
</svg>
