<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgBP5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shBP5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrBP5" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="1100" height="800" fill="url(#bgBP5)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Architektur-Patterns fuer COBOL-Migrationen</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Strangler Fig, Anti-Corruption Layer, Event-Driven, CQRS &#8211; das pragmatische Toolkit</text>

  <!-- Strangler Fig -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">5.1 Strangler Fig Pattern &#8211; das wichtigste Migrations-Pattern</text>

    <g transform="translate(0,15)" filter="url(#shBP5)">
      <rect width="475" height="280" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <!-- Strangler Facade box -->
      <g transform="translate(20,30)">
        <rect width="430" height="40" rx="6" fill="#1e3a5f"/>
        <text x="215" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">Strangler Facade</text>
        <text x="215" y="32" text-anchor="middle" font-size="10" fill="#cbd5e0">API Gateway / Load Balancer</text>
      </g>

      <!-- Branches -->
      <line x1="100" y1="100" x2="100" y2="130" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP5)"/>
      <line x1="235" y1="100" x2="235" y2="130" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP5)"/>
      <line x1="370" y1="100" x2="370" y2="130" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP5)"/>

      <g transform="translate(40,140)">
        <rect width="120" height="55" rx="6" fill="#9b2c2c"/>
        <text x="60" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">COBOL</text>
        <text x="60" y="36" text-anchor="middle" font-size="10" fill="#fed7d7">Mainframe</text>
        <text x="60" y="48" text-anchor="middle" font-size="9" fill="#fed7d7">Legacy</text>
      </g>
      <g transform="translate(175,140)">
        <rect width="120" height="55" rx="6" fill="#dd6b20"/>
        <text x="60" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Java MS</text>
        <text x="60" y="36" text-anchor="middle" font-size="10" fill="#fed7aa">Phase 1</text>
        <text x="60" y="48" text-anchor="middle" font-size="9" fill="#fed7aa">migriert</text>
      </g>
      <g transform="translate(310,140)">
        <rect width="120" height="55" rx="6" fill="#38a169"/>
        <text x="60" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Java MS</text>
        <text x="60" y="36" text-anchor="middle" font-size="10" fill="#c6f6d5">Phase 2</text>
        <text x="60" y="48" text-anchor="middle" font-size="9" fill="#c6f6d5">migriert</text>
      </g>

      <!-- Lifecycle -->
      <text x="20" y="226" font-size="11" font-weight="700" fill="#1a202c">Lifecycle</text>
      <g font-size="10" fill="#4a5568">
        <text x="20" y="244">&#9656; <tspan font-weight="700">Transform</tspan>: Eine Domain wird identifiziert und neu gebaut</text>
        <text x="20" y="258">&#9656; <tspan font-weight="700">Coexist</tspan>: Neuer Service laeuft parallel zum Mainframe; Facade routet</text>
        <text x="20" y="272">&#9656; <tspan font-weight="700">Eliminate</tspan>: Entsprechender Mainframe-Anteil wird abgeschaltet</text>
      </g>
    </g>
  </g>

  <!-- Anti-Corruption Layer -->
  <g transform="translate(565,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">5.2 Anti-Corruption Layer (ACL) &#8211; Eric Evans, DDD</text>

    <g transform="translate(0,15)" filter="url(#shBP5)">
      <rect width="475" height="280" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <g transform="translate(40,40)">
        <rect width="100" height="60" rx="6" fill="#9b2c2c"/>
        <text x="50" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">COBOL</text>
        <text x="50" y="42" text-anchor="middle" font-size="10" fill="#fed7d7">Mainframe</text>
        <text x="50" y="54" text-anchor="middle" font-size="9" fill="#fed7d7">(alt)</text>

        <g transform="translate(110,0)">
          <line x1="0" y1="30" x2="20" y2="30" stroke="#4a5568" stroke-width="2"/>
          <line x1="20" y1="30" x2="0" y2="30" stroke="#4a5568" stroke-width="2"/>
          <line x1="0" y1="33" x2="3" y2="36"/>
          <line x1="0" y1="33" x2="3" y2="30"/>
        </g>

        <rect x="135" width="155" height="60" rx="6" fill="#dd6b20"/>
        <text x="212" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Anti-Corruption</text>
        <text x="212" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Layer</text>

        <g transform="translate(290,0)">
          <line x1="0" y1="30" x2="20" y2="30" stroke="#4a5568" stroke-width="2"/>
        </g>

        <rect x="315" width="100" height="60" rx="6" fill="#38a169"/>
        <text x="365" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Java MS</text>
        <text x="365" y="42" text-anchor="middle" font-size="10" fill="#c6f6d5">(neu)</text>
      </g>

      <text x="20" y="148" font-size="11" font-weight="700" fill="#1a202c">Was der ACL macht</text>
      <g font-size="10" fill="#4a5568">
        <text x="20" y="166">&#9656; <tspan font-weight="700">Datenformat</tspan>: EBCDIC &#8596; UTF-8, Packed Decimal &#8596; BigDecimal</text>
        <text x="20" y="182">&#9656; <tspan font-weight="700">Begriffe</tspan>: CUST-NBR &#8594; customerId</text>
        <text x="20" y="198">&#9656; <tspan font-weight="700">Protokoll</tspan>: CICS COMMAREA &#8596; JSON REST</text>
        <text x="20" y="214">&#9656; <tspan font-weight="700">Fehler-Mapping</tspan>: Mainframe Return Codes &#8596; HTTP Status</text>
      </g>

      <text x="20" y="246" font-size="10" font-style="italic" fill="#dd6b20">Verhindert, dass Legacy-Konzepte das neue Domain-Modell "verschmutzen".</text>
      <text x="20" y="262" font-size="10" font-style="italic" fill="#dd6b20">Eigener Microservice oder Library &#8211; testbar, unabhaengig deploybar.</text>
    </g>
  </g>

  <!-- Event-Driven + CQRS -->
  <g transform="translate(60,420)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">5.3 Event-Driven Architecture (EDA) als Migrationsziel</text>

    <g transform="translate(0,15)" filter="url(#shBP5)">
      <rect width="475" height="220" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <text x="20" y="28" font-size="11" font-weight="700" fill="#1a202c">AWS-Bausteine</text>

      <g transform="translate(20,40)" font-size="10">
        <g>
          <rect width="200" height="22" rx="4" fill="#fed7aa"/>
          <text x="100" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">Amazon EventBridge</text>
        </g>
        <g transform="translate(0,28)">
          <rect width="200" height="22" rx="4" fill="#fed7aa"/>
          <text x="100" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">Amazon SQS / SNS</text>
        </g>
        <g transform="translate(0,56)">
          <rect width="200" height="22" rx="4" fill="#fed7aa"/>
          <text x="100" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">Kinesis Data Streams</text>
        </g>
        <g transform="translate(0,84)">
          <rect width="200" height="22" rx="4" fill="#fed7aa"/>
          <text x="100" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">AWS Lambda</text>
        </g>
        <g transform="translate(0,112)">
          <rect width="200" height="22" rx="4" fill="#fed7aa"/>
          <text x="100" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">AWS Step Functions</text>
        </g>
      </g>

      <text x="240" y="40" font-size="11" font-weight="700" fill="#1a202c">Vorteile fuer Migrationen</text>
      <g transform="translate(240,52)" font-size="10" fill="#4a5568">
        <text>&#9656; Decoupling: Services kennen sich nicht direkt</text>
        <text y="14">&#9656; Resilienz: Ausfaelle propagieren nicht</text>
        <text y="28">&#9656; Skalierbarkeit: Producer/Consumer unabhaengig</text>
        <text y="42">&#9656; Migration Window: parallel verarbeiten</text>
      </g>

      <text x="240" y="120" font-size="11" font-weight="700" fill="#dd6b20">Pattern: CDC (Change Data Capture)</text>
      <text x="240" y="136" font-size="9" fill="#4a5568">Erst Read-Operations migrieren via</text>
      <text x="240" y="148" font-size="9" fill="#4a5568">Precisely Connect oder AWS DMS &#8594;</text>
      <text x="240" y="160" font-size="9" fill="#4a5568">Cloud uebernimmt 80 % der MIPS-Last,</text>
      <text x="240" y="172" font-size="9" fill="#4a5568">bevor Write-Logik migriert wird.</text>

      <text x="20" y="206" font-size="10" font-style="italic" fill="#718096">Tier-1-europaeische Bank: Read-Last zuerst, dann Write-Logik</text>
    </g>

    <g transform="translate(505,15)" filter="url(#shBP5)">
      <rect width="475" height="220" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <text x="20" y="28" font-size="13" font-weight="700" fill="#1a202c">5.4 Microservices vs. Modularer Monolith</text>

      <rect x="20" y="40" width="430" height="32" fill="#2d3748"/>
      <text x="30" y="60" font-size="10" font-weight="700" fill="#fff">Aspekt</text>
      <text x="180" y="60" font-size="10" font-weight="700" fill="#fbbf24">Microservices</text>
      <text x="320" y="60" font-size="10" font-weight="700" fill="#9ae6b4">Modularer Monolith</text>

      <g font-size="10" fill="#4a5568">
        <g transform="translate(0,72)">
          <rect width="450" height="22" fill="#f7fafc"/>
          <text x="30" y="15" font-weight="600">Komplexitaet</text>
          <text x="180" y="15" fill="#9b2c2c">Hoch</text>
          <text x="320" y="15" fill="#38a169">Niedriger</text>
        </g>
        <g transform="translate(0,94)">
          <rect width="450" height="22" fill="#fff"/>
          <text x="30" y="15" font-weight="600">Skalierbarkeit</text>
          <text x="180" y="15" fill="#38a169">Granular</text>
          <text x="320" y="15" fill="#dd6b20">Gesamt-System</text>
        </g>
        <g transform="translate(0,116)">
          <rect width="450" height="22" fill="#f7fafc"/>
          <text x="30" y="15" font-weight="600">Datenkonsistenz</text>
          <text x="180" y="15" fill="#dd6b20">Eventual</text>
          <text x="320" y="15" fill="#38a169">ACID</text>
        </g>
        <g transform="translate(0,138)">
          <rect width="450" height="22" fill="#fff"/>
          <text x="30" y="15" font-weight="600">Migration aus COBOL</text>
          <text x="180" y="15" fill="#9b2c2c">Schwer</text>
          <text x="320" y="15" fill="#38a169">Einfacher</text>
        </g>
      </g>

      <text x="20" y="186" font-size="11" font-weight="700" fill="#dd6b20">Empfehlung</text>
      <text x="20" y="202" font-size="10" fill="#4a5568">Beginne mit modularem Monolithen, evolviere zu Microservices</text>
      <text x="20" y="214" font-size="10" font-style="italic" fill="#dd6b20">Vorzeitige Microservices = haeufige Quelle des Scheiterns</text>
    </g>
  </g>

  <!-- CQRS + Database per Service -->
  <g transform="translate(60,660)" filter="url(#shBP5)">
    <rect width="980" height="120" rx="10" fill="#1e3a5f"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#fbbf24">5.5 Database-per-Service evolviert in 3 Phasen &#8211; pragmatisch ueber dogmatisch</text>

    <g transform="translate(20,52)" font-size="11" fill="#fff">
      <text>&#9656; <tspan font-weight="700">Phase 1</tspan>: Shared Database, Services greifen auf gemeinsame Schemas zu</text>
      <text y="20">&#9656; <tspan font-weight="700">Phase 2</tspan>: Schema-Splitting in Bounded Contexts</text>
      <text y="40">&#9656; <tspan font-weight="700">Phase 3</tspan>: Database-per-Service mit Event-basierter Synchronisation (CQRS + Event Sourcing)</text>
    </g>
    <text x="490" y="110" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">"Anti-Pattern" Shared Database ist haeufig die pragmatisch richtige Bruecke waehrend der Migration.</text>
  </g>
</svg>
