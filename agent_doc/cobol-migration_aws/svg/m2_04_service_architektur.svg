<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgM4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shM4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrM4" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="1100" height="760" fill="url(#bgM4)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Service-Architektur und AWS-Integration</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Wie M2 in das AWS-Oekosystem eingebettet ist</text>

  <!-- AWS Cloud Boundary -->
  <g transform="translate(60,100)" filter="url(#shM4)">
    <rect width="980" height="500" rx="14" fill="#fff" stroke="#dd6b20" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="20" y="28" font-size="13" font-weight="700" fill="#dd6b20">AWS Cloud</text>
  </g>

  <!-- Top: Transform + M2 -->
  <g transform="translate(100,160)">
    <g filter="url(#shM4)">
      <rect width="280" height="100" rx="10" fill="#1e3a5f"/>
      <text x="140" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">AWS Transform</text>
      <text x="140" y="50" text-anchor="middle" font-size="11" fill="#cbd5e0">Analyse &amp; Transformation</text>
      <line x1="20" y1="60" x2="260" y2="60" stroke="#475569"/>
      <text x="140" y="78" text-anchor="middle" font-size="10" fill="#94a3b8">Assessment &#8226; Refactor &#8226; Reforge</text>
      <text x="140" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">Reimagine &#8226; Testing</text>
    </g>

    <line x1="280" y1="50" x2="340" y2="50" stroke="#4a5568" stroke-width="3" marker-end="url(#arrM4)"/>

    <g transform="translate(340,0)" filter="url(#shM4)">
      <rect width="540" height="100" rx="10" fill="#fef5e7" stroke="#dd6b20" stroke-width="2"/>
      <text x="270" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">AWS Mainframe Modernization Service (M2)</text>
      <text x="270" y="44" text-anchor="middle" font-size="11" fill="#9a3412">Runtime &amp; Deployment</text>

      <g transform="translate(20,55)">
        <rect width="240" height="36" rx="6" fill="#fff" stroke="#dd6b20"/>
        <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#dd6b20">Blu Age Runtime (Java)</text>
      </g>
      <g transform="translate(280,55)">
        <rect width="240" height="36" rx="6" fill="#fff" stroke="#dd6b20"/>
        <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#dd6b20">Rocket Enterprise Server</text>
      </g>
    </g>
  </g>

  <!-- Compute layer -->
  <g transform="translate(100,300)">
    <text x="0" y="-5" font-size="11" font-weight="700" fill="#7c2d12">Compute</text>
    <g filter="url(#shM4)">
      <rect width="880" height="56" rx="8" fill="#fff" stroke="#cbd5e0"/>
      <g transform="translate(20,12)">
        <rect width="200" height="32" rx="6" fill="#fbd38d"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Amazon EC2</text>
      </g>
      <g transform="translate(240,12)">
        <rect width="200" height="32" rx="6" fill="#fbd38d"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Amazon ECS</text>
      </g>
      <g transform="translate(460,12)">
        <rect width="200" height="32" rx="6" fill="#fbd38d"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Fargate</text>
      </g>
      <g transform="translate(680,12)">
        <rect width="180" height="32" rx="6" fill="#fbd38d"/>
        <text x="90" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Elastic Load Balancer</text>
      </g>
    </g>
  </g>

  <!-- Data layer -->
  <g transform="translate(100,390)">
    <text x="0" y="-5" font-size="11" font-weight="700" fill="#3182ce">Data &amp; Storage</text>
    <g filter="url(#shM4)">
      <rect width="880" height="56" rx="8" fill="#fff" stroke="#cbd5e0"/>
      <g transform="translate(20,12)">
        <rect width="200" height="32" rx="6" fill="#bee3f8"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#2c5282">Amazon Aurora</text>
      </g>
      <g transform="translate(240,12)">
        <rect width="200" height="32" rx="6" fill="#bee3f8"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#2c5282">Amazon RDS</text>
      </g>
      <g transform="translate(460,12)">
        <rect width="200" height="32" rx="6" fill="#bee3f8"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#2c5282">DynamoDB</text>
      </g>
      <g transform="translate(680,12)">
        <rect width="180" height="32" rx="6" fill="#bee3f8"/>
        <text x="90" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#2c5282">Amazon S3</text>
      </g>
    </g>
  </g>

  <!-- Operations layer -->
  <g transform="translate(100,480)">
    <text x="0" y="-5" font-size="11" font-weight="700" fill="#38a169">Operations &amp; Pipelines</text>
    <g filter="url(#shM4)">
      <rect width="880" height="86" rx="8" fill="#fff" stroke="#cbd5e0"/>
      <g transform="translate(20,12)">
        <rect width="180" height="32" rx="6" fill="#c6f6d5"/>
        <text x="90" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">CloudWatch</text>
      </g>
      <g transform="translate(220,12)">
        <rect width="180" height="32" rx="6" fill="#c6f6d5"/>
        <text x="90" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">AWS X-Ray</text>
      </g>
      <g transform="translate(420,12)">
        <rect width="200" height="32" rx="6" fill="#c6f6d5"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">CodePipeline + CodeBuild</text>
      </g>
      <g transform="translate(640,12)">
        <rect width="220" height="32" rx="6" fill="#c6f6d5"/>
        <text x="110" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">CloudFormation / Terraform / CDK</text>
      </g>
      <g transform="translate(20,48)">
        <rect width="180" height="28" rx="6" fill="#c6f6d5"/>
        <text x="90" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">IAM</text>
      </g>
      <g transform="translate(220,48)">
        <rect width="180" height="28" rx="6" fill="#c6f6d5"/>
        <text x="90" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">Secrets Manager</text>
      </g>
      <g transform="translate(420,48)">
        <rect width="200" height="28" rx="6" fill="#c6f6d5"/>
        <text x="100" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">VPC + Security Groups</text>
      </g>
      <g transform="translate(640,48)">
        <rect width="220" height="28" rx="6" fill="#c6f6d5"/>
        <text x="110" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#22543d">EventBridge / Step Functions</text>
      </g>
    </g>
  </g>

  <!-- Bottom: Self-Managed vs Managed -->
  <g transform="translate(60,640)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Self-Managed vs. Managed Deployment</text>
    <g transform="translate(0,15)" filter="url(#shM4)">
      <rect width="475" height="100" rx="10" fill="#f0fff4" stroke="#38a169"/>
      <text x="14" y="22" font-size="12" font-weight="700" fill="#2f855a">Self-Managed (aktiv)</text>
      <g font-size="10" fill="#22543d">
        <text x="14" y="42">&#9656; Eigene EC2-Instanzen, volle Kontrolle</text>
        <text x="14" y="58">&#9656; Patching &amp; Skalierung in Eigenverantwortung</text>
        <text x="14" y="74">&#9656; Standard EC2-Kosten + Lizenz</text>
        <text x="14" y="90">&#9656; <tspan font-weight="700">Empfehlung fuer alle Neuprojekte</tspan></text>
      </g>
    </g>
    <g transform="translate(505,15)" filter="url(#shM4)">
      <rect width="475" height="100" rx="10" fill="#fff5f5" stroke="#c53030"/>
      <text x="14" y="22" font-size="12" font-weight="700" fill="#c53030">Managed (closed fuer Neukunden)</text>
      <g font-size="10" fill="#742a2a">
        <text x="14" y="42">&#9656; AWS verwaltet Infrastruktur und Patching</text>
        <text x="14" y="58">&#9656; Automatische Skalierung, all-inclusive Pricing</text>
        <text x="14" y="74">&#9656; Eingeschraenkte Kontrolle</text>
        <text x="14" y="90">&#9656; <tspan font-weight="700">Seit Nov 2025 nicht mehr fuer Neukunden</tspan></text>
      </g>
    </g>
  </g>
</svg>
