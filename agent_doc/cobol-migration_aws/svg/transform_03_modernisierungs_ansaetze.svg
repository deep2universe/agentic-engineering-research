<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgT3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shT3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrT3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="1100" height="800" fill="url(#bgT3)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Drei Modernisierungsansaetze</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Refactor &#8594; Reforge &#8594; Reimagine &#8211; vom funktionalen Aequivalent zur Cloud-Native Architektur</text>

  <!-- Three approaches as evolution -->
  <g transform="translate(60,100)">
    <!-- 1. Refactor -->
    <g filter="url(#shT3)">
      <rect width="320" height="340" rx="14" fill="#fff" stroke="#dd6b20" stroke-width="2"/>
      <rect width="320" height="64" rx="14" fill="#dd6b20"/>
      <rect y="52" width="320" height="12" fill="#dd6b20"/>
      <text x="160" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">1. Refactor</text>
      <text x="160" y="52" text-anchor="middle" font-size="11" fill="#fed7aa">Blu Age Engine &#8226; deterministisch</text>

      <text x="14" y="90" font-size="11" font-weight="700" fill="#dd6b20">Mappings</text>
      <g font-size="10" font-family="Menlo,monospace" fill="#4a5568">
        <text x="14" y="108">COBOL    &#8594; Java Spring Boot</text>
        <text x="14" y="122">JCL      &#8594; Groovy-Skripte</text>
        <text x="14" y="136">BMS/MFS  &#8594; Angular + HTML</text>
        <text x="14" y="150">CICS     &#8594; Web Services</text>
        <text x="14" y="164">VSAM     &#8594; PostgreSQL (Blusam)</text>
        <text x="14" y="178">DB2      &#8594; Aurora PostgreSQL</text>
      </g>

      <text x="14" y="208" font-size="11" font-weight="700" fill="#dd6b20">Charakteristika</text>
      <g font-size="10" fill="#4a5568">
        <text x="14" y="226">&#9656; Initial bewahrt funktionale Aequivalenz</text>
        <text x="14" y="242">&#9656; COBOL-beeinflusste Datenstrukturen</text>
        <text x="14" y="258">&#9656; Variablennamen bleiben zunaechst</text>
        <text x="14" y="274">&#9656; Millionen LOC in Minuten</text>
      </g>

      <text x="14" y="306" font-size="11" font-weight="700" fill="#7c2d12">Output:</text>
      <text x="76" y="306" font-size="11" fill="#dd6b20" font-weight="600">Funktional aequivalenter Java-Code</text>
      <text x="14" y="324" font-size="9" font-style="italic" fill="#9b2c2c">JOBOL-Risiko bleibt &#8594; Reforge empfohlen</text>
    </g>

    <!-- 2. Reforge -->
    <g transform="translate(335,0)" filter="url(#shT3)">
      <rect width="320" height="340" rx="14" fill="#fff" stroke="#805ad5" stroke-width="2"/>
      <rect width="320" height="64" rx="14" fill="#805ad5"/>
      <rect y="52" width="320" height="12" fill="#805ad5"/>
      <text x="160" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">2. Reforge</text>
      <text x="160" y="52" text-anchor="middle" font-size="11" fill="#e9d8fd">LLM-basiert &#8226; nicht deterministisch</text>

      <text x="14" y="90" font-size="11" font-weight="700" fill="#805ad5">Was Reforge tut</text>
      <g font-size="10" fill="#4a5568">
        <text x="14" y="108">&#9656; Umstrukturierung zu modernen</text>
        <text x="14" y="122">    Java-Praktiken und -Idiomen</text>
        <text x="14" y="138">&#9656; Ersetzung von COBOL-Konstrukten</text>
        <text x="14" y="152">    durch native Java Collections</text>
        <text x="14" y="168">&#9656; Naming Conventions modernisiert</text>
        <text x="14" y="182">&#9656; Menschenlesbare Kommentare</text>
        <text x="14" y="196">&#9656; Coding-Patterns &amp; Best Practices</text>
      </g>

      <text x="14" y="226" font-size="11" font-weight="700" fill="#805ad5">Adressiertes Problem</text>
      <text x="14" y="244" font-size="10" font-weight="600" fill="#9b2c2c">JOBOL &#8211; Java, das wie COBOL aussieht</text>
      <text x="14" y="262" font-size="10" fill="#4a5568">Java-Entwickler verstehen den Code</text>
      <text x="14" y="276" font-size="10" fill="#4a5568">und koennen erweitern, ohne</text>
      <text x="14" y="290" font-size="10" fill="#4a5568">COBOL-Expertise zu benoetigen.</text>

      <text x="14" y="322" font-size="11" font-weight="700" fill="#553c9a">Output:</text>
      <text x="76" y="322" font-size="11" fill="#805ad5" font-weight="600">Idiomatischer Java-Code</text>
    </g>

    <!-- 3. Reimagine -->
    <g transform="translate(670,0)" filter="url(#shT3)">
      <rect width="320" height="340" rx="14" fill="#fff" stroke="#38a169" stroke-width="2"/>
      <rect width="320" height="64" rx="14" fill="#38a169"/>
      <rect y="52" width="320" height="12" fill="#38a169"/>
      <text x="160" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">3. Reimagine</text>
      <text x="160" y="52" text-anchor="middle" font-size="11" fill="#c6f6d5">re:Invent 2025 &#8226; Cloud-Native</text>

      <text x="14" y="90" font-size="11" font-weight="700" fill="#38a169">Phase 1 &#8211; Reverse Engineering</text>
      <g font-size="10" fill="#4a5568">
        <text x="14" y="108">&#9656; Business-Logik extrahieren</text>
        <text x="14" y="122">&#9656; Geschaeftsregeln aus COBOL/JCL</text>
        <text x="14" y="136">&#9656; Vier hierarchische Ebenen</text>
        <text x="14" y="150">&#9656; Data Lineage Analysis</text>
      </g>

      <text x="14" y="178" font-size="11" font-weight="700" fill="#38a169">Phase 2 &#8211; Forward Engineering (Kiro)</text>
      <g font-size="10" fill="#4a5568">
        <text x="14" y="196">&#9656; Bounded Contexts identifizieren</text>
        <text x="14" y="210">&#9656; Aggregate Roots, Entities</text>
        <text x="14" y="224">&#9656; Domain Events</text>
        <text x="14" y="238">&#9656; Microservice-Spezifikationen</text>
        <text x="14" y="252">&#9656; Quellcode-Generierung</text>
      </g>

      <text x="14" y="282" font-size="11" font-weight="700" fill="#38a169">Phase 3 &#8211; Deploy &amp; Test</text>
      <text x="14" y="298" font-size="10" fill="#4a5568">Microservices auf AWS via IaC</text>

      <text x="14" y="324" font-size="11" font-weight="700" fill="#22543d">Output:</text>
      <text x="76" y="324" font-size="11" fill="#38a169" font-weight="600">Cloud-Native Microservices</text>
    </g>
  </g>

  <!-- Bottom: When to use what -->
  <g transform="translate(60,470)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Wann welcher Ansatz?</text>

    <g transform="translate(0,15)" filter="url(#shT3)">
      <rect width="980" height="180" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="30" font-size="12" font-weight="700" fill="#1a202c">Empfehlungs-Matrix</text>

      <g transform="translate(20,50)" font-size="11">
        <g>
          <circle cx="14" cy="14" r="14" fill="#dd6b20"/>
          <text x="14" y="18" text-anchor="middle" font-weight="700" fill="#fff">R</text>
          <text x="40" y="14" font-weight="700" fill="#dd6b20">Refactor allein</text>
          <text x="40" y="30" font-size="10" fill="#4a5568">Wenn Funktionsgleichheit oberste Prioritaet hat &#8211; z. B. fuer Audit-Compliance,</text>
          <text x="40" y="44" font-size="10" fill="#4a5568">regulierte Berechnungen, ungeklaerte Geschaeftslogik.</text>
        </g>
        <g transform="translate(0,60)">
          <circle cx="14" cy="14" r="14" fill="#805ad5"/>
          <text x="14" y="18" text-anchor="middle" font-weight="700" fill="#fff">RR</text>
          <text x="40" y="14" font-weight="700" fill="#805ad5">Refactor + Reforge</text>
          <text x="40" y="30" font-size="10" fill="#4a5568">Standard-Empfehlung fuer die meisten Migrationen &#8211; bessere Wartbarkeit ohne</text>
          <text x="40" y="44" font-size="10" fill="#4a5568">komplettes Re-Architecting. Reforge-Ergebnisse muessen gereviewed werden.</text>
        </g>
        <g transform="translate(0,120)">
          <circle cx="14" cy="14" r="14" fill="#38a169"/>
          <text x="14" y="18" text-anchor="middle" font-weight="700" fill="#fff">RI</text>
          <text x="40" y="14" font-weight="700" fill="#38a169">Reimagine</text>
          <text x="40" y="30" font-size="10" fill="#4a5568">Fuer kritische Domains, in denen Cloud-Native-Vorteile (Skalierung, Event-driven,</text>
          <text x="40" y="44" font-size="10" fill="#4a5568">Lambda) den Re-Architecting-Aufwand rechtfertigen. Erst nach erfolgreichem Pilot.</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Bottom Output flow -->
  <g transform="translate(60,680)" filter="url(#shT3)">
    <rect width="980" height="100" rx="12" fill="#1e3a5f"/>
    <text x="490" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">Drei Stufen, eine Pipeline</text>
    <g transform="translate(60,50)" font-size="13" fill="#fff">
      <text font-weight="700">Mainframe COBOL</text>
      <text x="220" font-weight="700" fill="#dd6b20">&#8594; Refactor &#8594;</text>
      <text x="380" font-weight="700">Java (JOBOL)</text>
      <text x="540" font-weight="700" fill="#805ad5">&#8594; Reforge &#8594;</text>
      <text x="690" font-weight="700">Idiomatic Java</text>
      <text x="40" y="22" font-size="9" fill="#94a3b8">&#9650; Phase 0</text>
      <text x="380" y="22" font-size="9" fill="#94a3b8">&#9650; Phase 1</text>
      <text x="690" y="22" font-size="9" fill="#94a3b8">&#9650; Phase 2</text>
    </g>
  </g>
</svg>
