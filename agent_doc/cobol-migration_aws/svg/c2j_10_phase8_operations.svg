<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgC10" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shC10" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="760" fill="url(#bgC10)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Phase 8: Operations &amp; Continuous Improvement</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Monitoring, Tracing und kontinuierliche Modernisierung nach dem Go-Live</text>

  <!-- CloudWatch Metrics -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">10.1 Monitoring mit CloudWatch</text>

    <g transform="translate(0,15)" filter="url(#shC10)">
      <rect width="475" height="220" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="220" fill="#38a169"/>

      <text x="22" y="28" font-size="12" font-weight="700" fill="#38a169">Metriken</text>
      <g font-size="10" fill="#4a5568">
        <text x="22" y="46">&#9656; JVM-Metriken (Heap, GC, Threads)</text>
        <text x="22" y="62">&#9656; HTTP-Metriken (Latency, Error Rate, Throughput)</text>
        <text x="22" y="78">&#9656; DB-Metriken (Connection Pool, Query Time)</text>
        <text x="22" y="94">&#9656; Business-Metriken (Tx/Sek, Geschaeftsfehler)</text>
      </g>

      <text x="22" y="120" font-size="12" font-weight="700" fill="#38a169">Logs</text>
      <g font-size="10" fill="#4a5568">
        <text x="22" y="138">&#9656; Application Logs (Spring Boot Logback)</text>
        <text x="22" y="152">&#9656; Tomcat Access Logs</text>
        <text x="22" y="166">&#9656; Audit Logs</text>
        <text x="22" y="180">&#9656; Gapwalk Execution Logs</text>
      </g>
    </g>

    <g transform="translate(505,15)" filter="url(#shC10)">
      <rect width="475" height="220" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="220" fill="#dd6b20"/>

      <text x="22" y="28" font-size="12" font-weight="700" fill="#dd6b20">Alarms (Beispiele)</text>

      <g transform="translate(22,40)">
        <rect width="431" height="38" rx="6" fill="#fef5e7" stroke="#dd6b20"/>
        <text x="14" y="24" font-size="11" fill="#7c2d12">Latenz &gt; 500 ms (P99)</text>
      </g>
      <g transform="translate(22,82)">
        <rect width="431" height="38" rx="6" fill="#fef5e7" stroke="#dd6b20"/>
        <text x="14" y="24" font-size="11" fill="#7c2d12">Error Rate &gt; 1 %</text>
      </g>
      <g transform="translate(22,124)">
        <rect width="431" height="38" rx="6" fill="#fef5e7" stroke="#dd6b20"/>
        <text x="14" y="24" font-size="11" fill="#7c2d12">DB Connection Pool &gt; 80 % ausgelastet</text>
      </g>
      <g transform="translate(22,166)">
        <rect width="431" height="38" rx="6" fill="#fef5e7" stroke="#dd6b20"/>
        <text x="14" y="24" font-size="11" fill="#7c2d12">Heap &gt; 85 %</text>
      </g>
    </g>
  </g>

  <!-- X-Ray + Continuous Improvement -->
  <g transform="translate(60,360)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">10.2 + 10.3 Distributed Tracing &amp; Continuous Improvement</text>

    <g transform="translate(0,15)" filter="url(#shC10)">
      <rect width="475" height="220" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="220" fill="#3182ce"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#3182ce">AWS X-Ray fuer Microservices</text>

      <g font-size="11" fill="#4a5568">
        <text x="22" y="56">&#9656; <tspan font-weight="700">End-to-End Tracing</tspan></text>
        <text x="36" y="72" font-size="10">vom API Gateway durch alle Services</text>
        <text x="22" y="98">&#9656; <tspan font-weight="700">Service Map</tspan></text>
        <text x="36" y="114" font-size="10">Visualisierung der Abhaengigkeiten</text>
        <text x="22" y="140">&#9656; <tspan font-weight="700">Performance Hotspots</tspan></text>
        <text x="36" y="156" font-size="10">Erkennung langsamer Komponenten</text>
        <text x="22" y="180">&#9656; <tspan font-weight="700">Error Analysis</tspan></text>
        <text x="36" y="196" font-size="10">Stacktraces mit Kontext</text>
      </g>
    </g>

    <g transform="translate(505,15)" filter="url(#shC10)">
      <rect width="475" height="220" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="220" fill="#805ad5"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#805ad5">Continuous Improvement nach Go-Live</text>
      <text x="22" y="46" font-size="10" font-style="italic" fill="#718096">Die eigentliche Modernisierung beginnt erst hier!</text>

      <g font-size="11" fill="#4a5568">
        <text x="22" y="76"><tspan font-weight="700" fill="#805ad5">1.</tspan> Performance-Tuning (JVM, DB, Caching)</text>
        <text x="22" y="94"><tspan font-weight="700" fill="#805ad5">2.</tspan> Schrittweise Microservice-Extraktion</text>
        <text x="36" y="108" font-size="10">Strangler Fig auch innerhalb der Java-Anwendung</text>
        <text x="22" y="128"><tspan font-weight="700" fill="#805ad5">3.</tspan> API-First Refactoring</text>
        <text x="22" y="148"><tspan font-weight="700" fill="#805ad5">4.</tspan> Cloud-Native Features</text>
        <text x="36" y="162" font-size="10">Lambda fuer Event-Handler, Step Functions</text>
        <text x="22" y="182"><tspan font-weight="700" fill="#805ad5">5.</tspan> AI/ML-Integration</text>
        <text x="36" y="196" font-size="10">Modernisierte Daten fuer Analytics, ML</text>
      </g>
    </g>
  </g>

  <!-- Bottom takeaway -->
  <g transform="translate(60,620)" filter="url(#shC10)">
    <rect width="980" height="120" rx="12" fill="#1e3a5f"/>
    <text x="490" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">Go-Live ist nicht das Ende &#8211; sondern der Anfang.</text>
    <text x="490" y="68" text-anchor="middle" font-size="13" fill="#fff">Die Modernisierung der Anwendung selbst beginnt nach dem ersten erfolgreichen Cutover.</text>
    <text x="490" y="92" text-anchor="middle" font-size="11" font-style="italic" fill="#cbd5e0">Continuous Improvement, Cloud-Native-Features und AI/ML-Integration sind die naechsten Schritte.</text>
  </g>
</svg>
