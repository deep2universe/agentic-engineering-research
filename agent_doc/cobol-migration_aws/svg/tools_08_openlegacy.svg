<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgTL8" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shTL8" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrTL8" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#dd6b20"/></marker>
  </defs>
  <rect width="1100" height="600" fill="url(#bgTL8)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">OpenLegacy &#8211; API-Wrapping statt Migration</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Der fundamental andere Ansatz: Mainframe bleibt, aber wird per REST integriert</text>

  <!-- Concept diagram -->
  <g transform="translate(60,100)">
    <g filter="url(#shTL8)">
      <rect width="170" height="70" rx="8" fill="#9b2c2c"/>
      <text x="85" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Mainframe</text>
      <text x="85" y="46" text-anchor="middle" font-size="10" fill="#fed7d7">CICS, IMS, MQ,</text>
      <text x="85" y="60" text-anchor="middle" font-size="10" fill="#fed7d7">sequentielle Files</text>
    </g>

    <line x1="170" y1="135" x2="240" y2="135" stroke="#dd6b20" stroke-width="3" marker-end="url(#arrTL8)"/>

    <g transform="translate(250,100)" filter="url(#shTL8)">
      <rect width="240" height="70" rx="8" fill="#dd6b20"/>
      <text x="120" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">OpenLegacy Wrapper</text>
      <text x="120" y="46" text-anchor="middle" font-size="10" fill="#fed7aa">Automatische API-Generierung</text>
      <text x="120" y="60" text-anchor="middle" font-size="10" fill="#fed7aa">REST + OpenAPI Specs</text>
    </g>

    <line x1="490" y1="135" x2="560" y2="135" stroke="#dd6b20" stroke-width="3" marker-end="url(#arrTL8)"/>

    <g transform="translate(570,100)" filter="url(#shTL8)">
      <rect width="180" height="70" rx="8" fill="#38a169"/>
      <text x="90" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Microservices</text>
      <text x="90" y="46" text-anchor="middle" font-size="10" fill="#c6f6d5">Multi-Cloud:</text>
      <text x="90" y="60" text-anchor="middle" font-size="10" fill="#c6f6d5">K8s/AWS/Azure/GCP</text>
    </g>

    <line x1="750" y1="135" x2="820" y2="135" stroke="#dd6b20" stroke-width="3" marker-end="url(#arrTL8)"/>

    <g transform="translate(830,100)" filter="url(#shTL8)">
      <rect width="160" height="70" rx="8" fill="#3182ce"/>
      <text x="80" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Mobile / Web /</text>
      <text x="80" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Cloud Apps</text>
      <text x="80" y="62" text-anchor="middle" font-size="9" fill="#bee3f8">Konsumenten</text>
    </g>
  </g>

  <text x="550" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#4a5568">"Lasst den Mainframe in Ruhe &#8211; aber macht ihn fuer moderne Anwendungen nutzbar."</text>

  <!-- When sinnvoll + Pros/Cons -->
  <g transform="translate(60,230)">
    <g filter="url(#shTL8)">
      <rect width="320" height="170" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="170" fill="#dd6b20"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#dd6b20">Wann sinnvoll?</text>
      <g font-size="10" fill="#4a5568">
        <text x="22" y="50">&#9656; <tspan font-weight="700">Bruecken-Strategie</tspan></text>
        <text x="22" y="64">    Mainframe bleibt, neue Apps via API</text>
        <text x="22" y="84">&#9656; Mobile/Web-Frontends fuer Mainframe</text>
        <text x="22" y="104">&#9656; Schrittweise Modernisierung</text>
        <text x="22" y="118">    Erst APIs, spaeter ggf. Migration</text>
        <text x="22" y="138">&#9656; Hybride Architekturen</text>
        <text x="22" y="152">    Cloud-Apps + Mainframe als Backend</text>
      </g>
    </g>

    <g transform="translate(335,0)" filter="url(#shTL8)">
      <rect width="320" height="170" rx="10" fill="#f0fff4" stroke="#38a169"/>
      <text x="14" y="24" font-size="12" font-weight="700" fill="#38a169">+ Vorteile</text>
      <g font-size="10" fill="#22543d">
        <text x="14" y="44">&#9656; Sehr schnelle Time-to-Market</text>
        <text x="14" y="60">&#9656; Geringes Migrationsrisiko</text>
        <text x="14" y="76">&#9656; Saubere API-First-Architektur</text>
        <text x="14" y="92">&#9656; Multi-Cloud-Deployment</text>
        <text x="14" y="108">&#9656; OpenAPI-Specs als Basis</text>
        <text x="14" y="124">&#9656; Mainframe bleibt unveraendert</text>
        <text x="14" y="140">&#9656; Keine COBOL-Konvertierung noetig</text>
        <text x="14" y="156">&#9656; Sofortige Cloud-App-Entwicklung</text>
      </g>
    </g>

    <g transform="translate(670,0)" filter="url(#shTL8)">
      <rect width="315" height="170" rx="10" fill="#fff5f5" stroke="#c53030"/>
      <text x="14" y="24" font-size="12" font-weight="700" fill="#c53030">&#8722; Nachteile</text>
      <g font-size="10" fill="#742a2a">
        <text x="14" y="44">&#9656; Loest die Mainframe-Bindung NICHT</text>
        <text x="14" y="60">&#9656; Kein Cost-Reduction durch</text>
        <text x="14" y="74">    Mainframe-Decommissioning</text>
        <text x="14" y="92">&#9656; Erhoehte Komplexitaet</text>
        <text x="14" y="108">    (zwei Welten parallel)</text>
        <text x="14" y="126">&#9656; Vendor Lock-in zu OpenLegacy</text>
        <text x="14" y="142">&#9656; Mainframe-Lizenzen bleiben</text>
        <text x="14" y="158">&#9656; Skill-Problem nicht geloest</text>
      </g>
    </g>
  </g>

  <g transform="translate(60,430)" filter="url(#shTL8)">
    <rect width="980" height="80" rx="10" fill="#1e3a5f"/>
    <text x="20" y="34" font-size="13" font-weight="700" fill="#fbbf24">Faehigkeiten im Detail</text>
    <text x="20" y="56" font-size="11" fill="#fff">&#9656; Verbindung zu CICS, IMS, MQ, sequentielle Files  &#9656; Automatische API-Generierung aus CICS-Transaktionen</text>
    <text x="20" y="72" font-size="11" fill="#fff">&#9656; Microservice-Wrapper als deploybare Units  &#9656; Multi-Cloud auf Kubernetes, AWS, Azure, GCP, on-premises</text>
  </g>

  <text x="550" y="565" text-anchor="middle" font-size="12" font-style="italic" fill="#4a5568">Ideal als Bruecke &#8211; nicht als Endloesung. Kombinierbar mit spaeteren Migrationen.</text>
</svg>
