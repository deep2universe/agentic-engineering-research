<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgT2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shT2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrT2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="1100" height="760" fill="url(#bgT2)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Agentenbasierter KI-Ansatz</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Multi-Agent-Architektur auf Amazon Bedrock &#8211; mit Human-in-the-Loop</text>

  <!-- Center: Bedrock platform -->
  <g transform="translate(380,560)" filter="url(#shT2)">
    <rect width="340" height="80" rx="12" fill="#1e3a5f"/>
    <text x="170" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">Amazon Bedrock</text>
    <text x="170" y="50" text-anchor="middle" font-size="11" fill="#cbd5e0">Foundation-Model-Plattform</text>
    <text x="170" y="68" text-anchor="middle" font-size="10" fill="#94a3b8">LLM-Infra &#8226; Orchestrierung &#8226; Multi-Agent-Kollaboration</text>
  </g>

  <!-- 5 Agents around -->
  <g transform="translate(60,120)">
    <!-- Agent 1: Assessment -->
    <g filter="url(#shT2)">
      <rect width="190" height="160" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="190" height="6" fill="#1e3a5f"/>
      <circle cx="95" cy="40" r="22" fill="#ebf8ff"/>
      <text x="95" y="46" text-anchor="middle" font-size="20">&#9786;</text>
      <text x="95" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Assessment Agent</text>
      <text x="14" y="106" font-size="10" fill="#4a5568">Analysiert Mainframe-Code</text>
      <text x="14" y="120" font-size="10" fill="#4a5568">Kategorisiert Artefakte</text>
      <text x="14" y="134" font-size="10" fill="#4a5568">JCL, BMS, COBOL, Copy-</text>
      <text x="14" y="148" font-size="10" fill="#4a5568">books, identifiziert Deps</text>
    </g>

    <g transform="translate(210,0)" filter="url(#shT2)">
      <rect width="190" height="160" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="190" height="6" fill="#2c5282"/>
      <circle cx="95" cy="40" r="22" fill="#ebf8ff"/>
      <text x="95" y="46" text-anchor="middle" font-size="20">&#9783;</text>
      <text x="95" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#2c5282">Planungs Agent</text>
      <text x="14" y="106" font-size="10" fill="#4a5568">Erstellt Migrationsplaene,</text>
      <text x="14" y="120" font-size="10" fill="#4a5568">Wave Planning und</text>
      <text x="14" y="134" font-size="10" fill="#4a5568">Priorisierungen.</text>
    </g>

    <g transform="translate(420,0)" filter="url(#shT2)">
      <rect width="190" height="160" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="190" height="6" fill="#dd6b20"/>
      <circle cx="95" cy="40" r="22" fill="#fef5e7"/>
      <text x="95" y="46" text-anchor="middle" font-size="20">&#9776;</text>
      <text x="95" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#dd6b20">Dokumentations Agent</text>
      <text x="14" y="106" font-size="10" fill="#4a5568">Generiert technische</text>
      <text x="14" y="120" font-size="10" fill="#4a5568">Dokumentation und</text>
      <text x="14" y="134" font-size="10" fill="#4a5568">Business-Logic-</text>
      <text x="14" y="148" font-size="10" fill="#4a5568">Beschreibungen.</text>
    </g>

    <g transform="translate(630,0)" filter="url(#shT2)">
      <rect width="190" height="160" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="190" height="6" fill="#38a169"/>
      <circle cx="95" cy="40" r="22" fill="#f0fff4"/>
      <text x="95" y="46" text-anchor="middle" font-size="20">&#10148;</text>
      <text x="95" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#38a169">Transformations Agent</text>
      <text x="14" y="106" font-size="10" fill="#4a5568">Fuehrt die eigentliche</text>
      <text x="14" y="120" font-size="10" fill="#4a5568">Code-Konvertierung</text>
      <text x="14" y="134" font-size="10" fill="#4a5568">durch &#8211; deterministisch</text>
      <text x="14" y="148" font-size="10" fill="#4a5568">via Blu Age Engine.</text>
    </g>

    <g transform="translate(840,0)" filter="url(#shT2)">
      <rect width="160" height="160" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="160" height="6" fill="#805ad5"/>
      <circle cx="80" cy="40" r="22" fill="#faf5ff"/>
      <text x="80" y="46" text-anchor="middle" font-size="20">&#9745;</text>
      <text x="80" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#805ad5">Test Agent</text>
      <text x="14" y="106" font-size="10" fill="#4a5568">Test-Plaene,</text>
      <text x="14" y="120" font-size="10" fill="#4a5568">Test-Daten-Skripte</text>
      <text x="14" y="134" font-size="10" fill="#4a5568">und Automatisierung.</text>
    </g>
  </g>

  <!-- Connection lines from agents to Bedrock -->
  <g stroke="#cbd5e0" stroke-width="2" stroke-dasharray="3,3">
    <line x1="155" y1="280" x2="450" y2="560"/>
    <line x1="365" y1="280" x2="500" y2="560"/>
    <line x1="575" y1="280" x2="550" y2="560"/>
    <line x1="785" y1="280" x2="600" y2="560"/>
    <line x1="970" y1="280" x2="650" y2="560"/>
  </g>

  <!-- Tech stack components -->
  <g transform="translate(60,330)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Eingesetzte KI/ML-Technologien</text>

    <g transform="translate(0,15)" filter="url(#shT2)">
      <rect width="240" height="140" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="#dd6b20">Amazon Q Developer</text>
      <text x="14" y="44" font-size="10" fill="#4a5568">KI-Assistent von AWS &#8211; bietet</text>
      <text x="14" y="58" font-size="10" fill="#4a5568">die Web-Erfahrung fuer die</text>
      <text x="14" y="72" font-size="10" fill="#4a5568">Transformation. Transformation</text>
      <text x="14" y="86" font-size="10" fill="#4a5568">wird ueber Q-Oberflaeche</text>
      <text x="14" y="100" font-size="10" fill="#4a5568">angestossen.</text>
      <text x="14" y="124" font-size="10" font-style="italic" fill="#718096">Frontend-Layer</text>
    </g>

    <g transform="translate(255,15)" filter="url(#shT2)">
      <rect width="240" height="140" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="#dd6b20">Large Language Models</text>
      <text x="14" y="44" font-size="10" fill="#4a5568">Eingesetzt insbesondere fuer</text>
      <text x="14" y="58" font-size="10" fill="#4a5568">das Reforge-Feature, um</text>
      <text x="14" y="72" font-size="10" fill="#4a5568">refaktorierten Code in</text>
      <text x="14" y="86" font-size="10" fill="#4a5568">idiomatisches Java</text>
      <text x="14" y="100" font-size="10" fill="#4a5568">umzuschreiben.</text>
      <text x="14" y="124" font-size="10" font-style="italic" fill="#718096">Reforge &amp; Code-Verstaendnis</text>
    </g>

    <g transform="translate(510,15)" filter="url(#shT2)">
      <rect width="240" height="140" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="#dd6b20">Kiro</text>
      <text x="14" y="44" font-size="10" fill="#4a5568">KI-gestuetzter Coding-Assistent</text>
      <text x="14" y="58" font-size="10" fill="#4a5568">fuer die Forward-Engineering-</text>
      <text x="14" y="72" font-size="10" fill="#4a5568">Phase (Reimagine-Ansatz).</text>
      <text x="14" y="86" font-size="10" fill="#4a5568">Generiert Microservice-</text>
      <text x="14" y="100" font-size="10" fill="#4a5568">Spezifikationen und Code.</text>
      <text x="14" y="124" font-size="10" font-style="italic" fill="#718096">Microservice-Generierung</text>
    </g>

    <g transform="translate(765,15)" filter="url(#shT2)">
      <rect width="240" height="140" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="#dd6b20">Blu Age Engine</text>
      <text x="14" y="44" font-size="10" fill="#4a5568">Deterministische Code-</text>
      <text x="14" y="58" font-size="10" fill="#4a5568">Konvertierungsengine fuer</text>
      <text x="14" y="72" font-size="10" fill="#4a5568">die regelbasierte COBOL-</text>
      <text x="14" y="86" font-size="10" fill="#4a5568">zu-Java-Transformation.</text>
      <text x="14" y="124" font-size="10" font-style="italic" fill="#718096">Refactor-Schicht</text>
    </g>
  </g>

  <!-- Human in the Loop -->
  <g transform="translate(60,650)" filter="url(#shT2)">
    <rect width="980" height="100" rx="12" fill="#fef5e7" stroke="#dd6b20" stroke-width="2"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#7c2d12">Human-in-the-Loop &#8211; AWS Transform pausiert und fragt nach</text>
    <g font-size="11" fill="#9a3412">
      <text x="20" y="56">&#9656; Wenn zusaetzliche Informationen zur Aufgabenausfuehrung benoetigt werden</text>
      <text x="20" y="74">&#9656; Bei Freigaben fuer Zwischenartefakte (Domain-Dekomposition, Wave Planning)</text>
      <text x="20" y="92">&#9656; Wenn Probleme auftreten, die der Agent nicht automatisch loesen kann</text>
    </g>
  </g>
</svg>
