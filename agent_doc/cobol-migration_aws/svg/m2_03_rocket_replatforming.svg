<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgM3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shM3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1100" height="760" fill="url(#bgM3)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Rocket Software &#8211; Replatforming</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Mainframe-Emulation auf AWS &#8211; COBOL bleibt COBOL, aber 50&#8211;90 % billiger</text>

  <!-- Top: Rocket Suite components -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Rocket Enterprise Suite</text>

    <g transform="translate(0,15)" filter="url(#shM3)">
      <rect width="320" height="160" rx="10" fill="#fff" stroke="#38a169" stroke-width="2"/>
      <rect width="320" height="42" rx="10" fill="#38a169"/>
      <rect y="30" width="320" height="12" fill="#38a169"/>
      <text x="160" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Enterprise Server</text>
      <g transform="translate(14,58)" font-size="10" fill="#4a5568">
        <text font-weight="700" fill="#2d3748">Mainframe-Runtime-Emulation</text>
        <text y="18">&#9656; CICS-Regionen mit COMMAREA-Support</text>
        <text y="34">&#9656; JCL-Engine fuer Batch-Ausfuehrung</text>
        <text y="50">&#9656; VSAM-Emulation (KSDS, ESDS, RRDS)</text>
        <text y="66">&#9656; IMS- und DB2-Schnittstellen</text>
        <text y="82">&#9656; Linux: Amazon Linux 2, RHEL, SLES</text>
      </g>
    </g>

    <g transform="translate(340,15)" filter="url(#shM3)">
      <rect width="320" height="160" rx="10" fill="#fff" stroke="#38a169" stroke-width="2"/>
      <rect width="320" height="42" rx="10" fill="#38a169"/>
      <rect y="30" width="320" height="12" fill="#38a169"/>
      <text x="160" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Enterprise Developer</text>
      <g transform="translate(14,58)" font-size="10" fill="#4a5568">
        <text font-weight="700" fill="#2d3748">Eclipse-basierte IDE</text>
        <text y="18">&#9656; COBOL/PL/I-Entwicklung &amp; Build</text>
        <text y="34">&#9656; Debugger &amp; Profiler</text>
        <text y="50">&#9656; Unit-Testing-Framework fuer COBOL</text>
        <text y="66">&#9656; Git-Integration, modernes VCS</text>
        <text y="82">&#9656; COBOL-Code zu modernen Workflows</text>
      </g>
    </g>

    <g transform="translate(680,15)" filter="url(#shM3)">
      <rect width="320" height="160" rx="10" fill="#fff" stroke="#38a169" stroke-width="2"/>
      <rect width="320" height="42" rx="10" fill="#38a169"/>
      <rect y="30" width="320" height="12" fill="#38a169"/>
      <text x="160" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Enterprise Analyzer</text>
      <g transform="translate(14,58)" font-size="10" fill="#4a5568">
        <text font-weight="700" fill="#2d3748">Statische Code-Analyse</text>
        <text y="18">&#9656; Abhaengigkeitsvisualisierung</text>
        <text y="34">&#9656; Impact-Analyse fuer Aenderungen</text>
        <text y="50">&#9656; LOC, Complexity, Quality Metrics</text>
        <text y="66">&#9656; Discovery vor Migration</text>
        <text y="82">&#9656; Reports fuer Architektur-Reviews</text>
      </g>
    </g>
  </g>

  <!-- Middle: Mapping table -->
  <g transform="translate(60,310)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Emulierte Subsysteme &#8211; alle Mainframe-Konzepte bleiben erhalten</text>
    <g transform="translate(0,15)" filter="url(#shM3)">
      <rect width="980" height="200" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <!-- Header -->
      <rect width="980" height="36" rx="10" fill="#2d3748"/>
      <rect y="24" width="980" height="12" fill="#2d3748"/>
      <text x="20" y="22" font-size="11" font-weight="700" fill="#fff">Mainframe-Subsystem</text>
      <text x="350" y="22" font-size="11" font-weight="700" fill="#fff">Rocket-Emulation</text>
      <text x="660" y="22" font-size="11" font-weight="700" fill="#fff">Verhalten</text>

      <g font-size="11" fill="#2d3748">
        <g transform="translate(0,42)">
          <rect width="980" height="26" fill="#f7fafc"/>
          <text x="20" y="17" font-weight="700">CICS</text>
          <text x="350" y="17" fill="#4a5568">Enterprise Server CICS-Region</text>
          <text x="660" y="17" fill="#4a5568">Volle Transaktion + BMS Maps + COMMAREA</text>
        </g>
        <g transform="translate(0,68)">
          <rect width="980" height="26" fill="#fff"/>
          <text x="20" y="17" font-weight="700">JCL</text>
          <text x="350" y="17" fill="#4a5568">Enterprise Server JCL-Engine</text>
          <text x="660" y="17" fill="#4a5568">JCL-Interpretation und -Ausfuehrung</text>
        </g>
        <g transform="translate(0,94)">
          <rect width="980" height="26" fill="#f7fafc"/>
          <text x="20" y="17" font-weight="700">VSAM</text>
          <text x="350" y="17" fill="#4a5568">Enterprise Server VSAM-Emulation</text>
          <text x="660" y="17" fill="#4a5568">KSDS, ESDS, RRDS &#8212; alternativ RDS-Backend</text>
        </g>
        <g transform="translate(0,120)">
          <rect width="980" height="26" fill="#fff"/>
          <text x="20" y="17" font-weight="700">DB2</text>
          <text x="350" y="17" fill="#4a5568">Amazon RDS for Db2 / Aurora</text>
          <text x="660" y="17" fill="#4a5568">Nativer SQL-Zugriff oder ODBC-Bridge</text>
        </g>
        <g transform="translate(0,146)">
          <rect width="980" height="26" fill="#f7fafc"/>
          <text x="20" y="17" font-weight="700">IMS TM</text>
          <text x="350" y="17" fill="#4a5568">Enterprise Server IMS-Emulation</text>
          <text x="660" y="17" fill="#4a5568">Message-Processing-Programme</text>
        </g>
        <g transform="translate(0,172)">
          <rect width="980" height="26" fill="#fff"/>
          <text x="20" y="17" font-weight="700">Batch</text>
          <text x="350" y="17" fill="#4a5568">Enterprise Server Batch-Engine</text>
          <text x="660" y="17" fill="#4a5568">COBOL-Batch mit JCL-Steuerung</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Bottom: Pros vs Cons -->
  <g transform="translate(60,545)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Vor- und Nachteile &amp; Status April 2026</text>

    <g transform="translate(0,15)" filter="url(#shM3)">
      <rect width="475" height="190" rx="10" fill="#f0fff4" stroke="#38a169"/>
      <text x="14" y="24" font-size="12" font-weight="700" fill="#2f855a">&#10003; Vorteile</text>
      <g font-size="10" fill="#22543d">
        <text x="14" y="46">&#9656; Minimales Risiko &#8211; der Code aendert sich nicht</text>
        <text x="14" y="62">&#9656; Schnellere Migration (Monate statt Jahre)</text>
        <text x="14" y="78">&#9656; Bestehende COBOL-Expertise bleibt nutzbar</text>
        <text x="14" y="94">&#9656; Sofortige Kostenreduktion (MIPS-Einsparung)</text>
        <text x="14" y="110">&#9656; Kein Funktionalitaetsrisiko</text>
        <text x="14" y="126">&#9656; Bewaehrtes Pattern (frueher Micro Focus)</text>
      </g>
      <text x="14" y="158" font-size="10" font-weight="700" fill="#2f855a">Status April 2026</text>
      <text x="14" y="174" font-size="10" fill="#22543d">Self-Managed: aktiv (Enterprise Server auf EC2)</text>
    </g>

    <g transform="translate(505,15)" filter="url(#shM3)">
      <rect width="475" height="190" rx="10" fill="#fff5f5" stroke="#c53030"/>
      <text x="14" y="24" font-size="12" font-weight="700" fill="#c53030">&#10007; Nachteile</text>
      <g font-size="10" fill="#742a2a">
        <text x="14" y="46">&#9656; Technische Schulden bleiben bestehen</text>
        <text x="14" y="62">&#9656; COBOL-Entwickler weiterhin noetig (knapp!)</text>
        <text x="14" y="78">&#9656; Keine Cloud-Native Vorteile (Auto-Scale)</text>
        <text x="14" y="94">&#9656; Vendor Lock-in zu Rocket Software</text>
        <text x="14" y="110">&#9656; Langfristig hoehere TCO als Refactoring</text>
        <text x="14" y="126">&#9656; Managed Runtime nicht fuer Neukunden</text>
      </g>
      <text x="14" y="158" font-size="10" font-weight="700" fill="#c53030">Empfehlung</text>
      <text x="14" y="174" font-size="10" fill="#742a2a">AWS empfiehlt fuer Neuprojekte AWS Transform Refactor</text>
    </g>
  </g>
</svg>
