<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgTL5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shTL5" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="580" fill="url(#bgTL5)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Heirloom Computing &#8211; Elastic COBOL</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">COBOL bleibt COBOL &#8211; aber laeuft auf der JVM. Compile-Zeit-Transpile zu Java-Bytecode</text>

  <g transform="translate(60,100)" filter="url(#shTL5)">
    <rect width="980" height="80" rx="12" fill="#319795"/>
    <text x="490" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">Heirloom Elastic COBOL</text>
    <text x="490" y="54" text-anchor="middle" font-size="12" fill="#b2f5ea">ISV / Compiler-basierte Migration &#8226; AWS Mainframe Modernization Software Competency Partner</text>
    <text x="490" y="72" text-anchor="middle" font-size="11" fill="#81e6d9">5x schneller als manuelles Refactoring &#8226; 65&#8211;85 % Kostenersparnis vs. Mainframe</text>
  </g>

  <g transform="translate(60,210)">
    <g filter="url(#shTL5)">
      <rect width="475" height="200" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="200" fill="#319795"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#319795">Schluessel-Features</text>
      <g font-size="11" fill="#4a5568">
        <text x="22" y="52">&#9656; Volle Cloud-Native-Ausfuehrung auf JVM</text>
        <text x="22" y="68">&#9656; <tspan font-weight="700">No-disruption-Migration</tspan>: COBOL-Entwickler arbeiten weiter</text>
        <text x="22" y="84">&#9656; Eclipse-basierte IDE mit Debugger und Profiler</text>
        <text x="22" y="100">&#9656; Cloud-agnostisch: AWS, Azure, GCP, on-premises</text>
        <text x="22" y="116">&#9656; Compile-Zeit Transpilation &#8594; Java Bytecode</text>
        <text x="22" y="132">&#9656; Kein Refactoring im klassischen Sinn</text>
        <text x="22" y="148">&#9656; AWS Mainframe Modernization Competency</text>
      </g>
      <text x="22" y="184" font-size="10" font-style="italic" fill="#319795">Einzigartiger Ansatz im Markt</text>
    </g>

    <g transform="translate(505,0)" filter="url(#shTL5)">
      <rect width="475" height="200" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="200" fill="#dd6b20"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#dd6b20">Wann sinnvoll?</text>
      <g font-size="11" fill="#4a5568">
        <text x="22" y="52">&#9656; Organisationen, die COBOL-Expertise erhalten wollen</text>
        <text x="22" y="68">&#9656; Schnelle Cloud-Migration ohne Code-Rewrite</text>
        <text x="22" y="84">&#9656; Hybride Strategien (Java + COBOL koexistieren)</text>
        <text x="22" y="100">&#9656; Brueckenloesung vor langfristigem Refactoring</text>
        <text x="22" y="116">&#9656; Wochen statt Jahre Migrationsdauer</text>
      </g>
      <text x="22" y="148" font-size="10" font-weight="700" fill="#9b2c2c">&#9888; Achtung</text>
      <text x="22" y="164" font-size="10" fill="#742a2a">COBOL bleibt COBOL &#8211; keine Modernisierung im engeren Sinn.</text>
      <text x="22" y="180" font-size="10" fill="#742a2a">Java-Entwickler koennen den Code trotzdem nicht warten.</text>
    </g>
  </g>

  <g transform="translate(60,440)">
    <g filter="url(#shTL5)">
      <rect width="475" height="120" rx="10" fill="#f0fff4" stroke="#38a169"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#38a169">+ Vorteile</text>
      <g font-size="10" fill="#22543d">
        <text x="14" y="42">&#9656; Sehr schnelle Migration (Wochen)</text>
        <text x="14" y="58">&#9656; Kein Refactoring-Risiko</text>
        <text x="14" y="74">&#9656; COBOL-Skills bleiben relevant</text>
        <text x="14" y="90">&#9656; Cloud-Native auf JVM</text>
        <text x="14" y="106">&#9656; AWS-Competency-Partner</text>
      </g>
    </g>
    <g transform="translate(505,0)" filter="url(#shTL5)">
      <rect width="475" height="120" rx="10" fill="#fff5f5" stroke="#c53030"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#c53030">&#8722; Nachteile</text>
      <g font-size="10" fill="#742a2a">
        <text x="14" y="42">&#9656; COBOL bleibt COBOL</text>
        <text x="14" y="58">&#9656; Vendor Lock-in zu Heirloom</text>
        <text x="14" y="74">&#9656; Java-Entwickler koennen Code nicht warten</text>
        <text x="14" y="90">&#9656; Langfristige Skill-Problematik bleibt</text>
        <text x="14" y="106">&#9656; Kein Schritt Richtung Cloud-Native</text>
      </g>
    </g>
  </g>
</svg>
