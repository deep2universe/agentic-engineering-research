<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgC5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shC5" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="800" fill="url(#bgC5)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Phase 3: Code Transformation (Refactor)</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Vorher / Nachher: COBOL &#8594; JOBOL &#8594; idiomatisches Java</text>

  <!-- Mappings -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Transformations-Mappings</text>

    <g transform="translate(0,15)" filter="url(#shC5)">
      <rect width="980" height="200" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="980" height="32" fill="#2d3748"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#fff">Quelle</text>
      <text x="350" y="20" font-size="11" font-weight="700" fill="#fbbf24">Ziel</text>
      <text x="700" y="20" font-size="11" font-weight="700" fill="#9ae6b4">Technologie</text>

      <g font-size="11" font-family="Menlo,monospace" fill="#2d3748">
        <g transform="translate(0,32)">
          <rect width="980" height="22" fill="#f7fafc"/>
          <text x="14" y="15">COBOL Programme</text>
          <text x="350" y="15" fill="#dd6b20">Java-Klassen</text>
          <text x="700" y="15" font-family="-apple-system" fill="#4a5568">Spring Boot</text>
        </g>
        <g transform="translate(0,54)">
          <rect width="980" height="22" fill="#fff"/>
          <text x="14" y="15">Copybooks</text>
          <text x="350" y="15" fill="#dd6b20">Java Model-Klassen</text>
          <text x="700" y="15" font-family="-apple-system" fill="#4a5568">RecordEntity</text>
        </g>
        <g transform="translate(0,76)">
          <rect width="980" height="22" fill="#f7fafc"/>
          <text x="14" y="15">JCL Jobs</text>
          <text x="350" y="15" fill="#dd6b20">Groovy-Skripte</text>
          <text x="700" y="15" font-family="-apple-system" fill="#4a5568">Gapwalk-Lambda</text>
        </g>
        <g transform="translate(0,98)">
          <rect width="980" height="22" fill="#fff"/>
          <text x="14" y="15">BMS Maps</text>
          <text x="350" y="15" fill="#dd6b20">Angular SPA</text>
          <text x="700" y="15" font-family="-apple-system" fill="#4a5568">TypeScript + Sass</text>
        </g>
        <g transform="translate(0,120)">
          <rect width="980" height="22" fill="#f7fafc"/>
          <text x="14" y="15">CICS Transactions</text>
          <text x="350" y="15" fill="#dd6b20">REST Endpoints</text>
          <text x="700" y="15" font-family="-apple-system" fill="#4a5568">Spring @RestController</text>
        </g>
        <g transform="translate(0,142)">
          <rect width="980" height="22" fill="#fff"/>
          <text x="14" y="15">VSAM Files</text>
          <text x="350" y="15" fill="#dd6b20">PostgreSQL Tabellen</text>
          <text x="700" y="15" font-family="-apple-system" fill="#4a5568">Blusam</text>
        </g>
        <g transform="translate(0,164)">
          <rect width="980" height="22" fill="#f7fafc"/>
          <text x="14" y="15">DB2 SQL</text>
          <text x="350" y="15" fill="#dd6b20">PostgreSQL SQL</text>
          <text x="700" y="15" font-family="-apple-system" fill="#4a5568">Aurora Compatibility</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Code transformation -->
  <g transform="translate(60,340)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Vorher / Nachher: 3 Stufen der Transformation</text>

    <g transform="translate(0,15)">
      <g filter="url(#shC5)">
        <rect width="320" height="430" rx="10" fill="#fff" stroke="#9b2c2c" stroke-width="2"/>
        <rect width="320" height="38" rx="10" fill="#9b2c2c"/>
        <rect y="26" width="320" height="12" fill="#9b2c2c"/>
        <text x="14" y="24" font-size="12" font-weight="700" fill="#fff">COBOL Original</text>

        <g font-family="Menlo,monospace" font-size="9" fill="#2d3748">
          <text x="14" y="58">PROGRAM-ID. CALCBAL.</text>
          <text x="14" y="72">DATA DIVISION.</text>
          <text x="14" y="86">WORKING-STORAGE SECTION.</text>
          <text x="14" y="100">01  WS-CUSTOMER.</text>
          <text x="14" y="114">    05  WS-CUST-ID</text>
          <text x="14" y="128">        PIC 9(8).</text>
          <text x="14" y="142">    05  WS-CUST-NAME</text>
          <text x="14" y="156">        PIC X(30).</text>
          <text x="14" y="170">    05  WS-CUST-BALANCE</text>
          <text x="14" y="184">        PIC S9(9)V99 COMP-3.</text>
          <text x="14" y="198">01  WS-INTEREST-RATE</text>
          <text x="14" y="212">    PIC S9(3)V99 COMP-3</text>
          <text x="14" y="226">    VALUE 1.50.</text>
          <text x="14" y="246">PROCEDURE DIVISION.</text>
          <text x="14" y="262">MAIN-LOGIC.</text>
          <text x="14" y="276">  READ CUST-FILE INTO</text>
          <text x="14" y="290">       WS-CUSTOMER</text>
          <text x="14" y="304">    AT END GO TO END-PRG</text>
          <text x="14" y="318">  END-READ.</text>
          <text x="14" y="332">  COMPUTE WS-NEW-BALANCE =</text>
          <text x="14" y="346">    WS-CUST-BALANCE *</text>
          <text x="14" y="360">    (1 + WS-INTEREST-RATE</text>
          <text x="14" y="374">    / 100).</text>
          <text x="14" y="388">  STOP RUN.</text>
        </g>
        <text x="160" y="416" text-anchor="middle" font-size="10" font-style="italic" fill="#9b2c2c">Original</text>
      </g>

      <g transform="translate(335,0)" filter="url(#shC5)">
        <rect width="320" height="430" rx="10" fill="#fff" stroke="#dd6b20" stroke-width="2"/>
        <rect width="320" height="38" rx="10" fill="#dd6b20"/>
        <rect y="26" width="320" height="12" fill="#dd6b20"/>
        <text x="14" y="24" font-size="12" font-weight="700" fill="#fff">JOBOL (Refactor)</text>

        <g font-family="Menlo,monospace" font-size="9" fill="#2d3748">
          <text x="14" y="58" fill="#805ad5">@Component</text>
          <text x="14" y="72">public class CalcbalProgram {</text>
          <text x="14" y="86">  private final RecordEntity</text>
          <text x="14" y="100">      wsCustomer;</text>
          <text x="14" y="114">  private BigDecimal</text>
          <text x="14" y="128">      wsInterestRate =</text>
          <text x="14" y="142">      new BigDecimal("1.50");</text>
          <text x="14" y="156">  private BigDecimal wsNewBalance;</text>
          <text x="14" y="180">  public void run() {</text>
          <text x="14" y="194">    if (custFile.read(wsCustomer)) {</text>
          <text x="14" y="208">      BigDecimal balance =</text>
          <text x="14" y="222">         wsCustomer.getBalance();</text>
          <text x="14" y="236">      wsNewBalance =</text>
          <text x="14" y="250">         balance.multiply(</text>
          <text x="14" y="264">           BigDecimal.ONE.add(</text>
          <text x="14" y="278">             wsInterestRate.divide(</text>
          <text x="14" y="292">               new BigDecimal("100"),</text>
          <text x="14" y="306">                 4, RoundingMode.HALF_UP)));</text>
          <text x="14" y="320">      log.info("NEW BAL: {}",</text>
          <text x="14" y="334">         wsNewBalance);</text>
          <text x="14" y="348">    }</text>
          <text x="14" y="362">  }</text>
          <text x="14" y="376">}</text>
        </g>
        <text x="160" y="416" text-anchor="middle" font-size="10" font-style="italic" fill="#dd6b20">Funktional aequivalent &#8594; JOBOL</text>
      </g>

      <g transform="translate(670,0)" filter="url(#shC5)">
        <rect width="315" height="430" rx="10" fill="#fff" stroke="#38a169" stroke-width="2"/>
        <rect width="315" height="38" rx="10" fill="#38a169"/>
        <rect y="26" width="315" height="12" fill="#38a169"/>
        <text x="14" y="24" font-size="12" font-weight="700" fill="#fff">Idiomatisch (Reforge)</text>

        <g font-family="Menlo,monospace" font-size="9" fill="#2d3748">
          <text x="14" y="58" fill="#805ad5">@Service</text>
          <text x="14" y="72" fill="#805ad5">@RequiredArgsConstructor</text>
          <text x="14" y="86">public class</text>
          <text x="14" y="100">    BalanceCalculationService {</text>
          <text x="14" y="120">  private static final BigDecimal</text>
          <text x="14" y="134">      INTEREST_RATE =</text>
          <text x="14" y="148">      new BigDecimal("0.015");</text>
          <text x="14" y="162">  private final CustomerRepository</text>
          <text x="14" y="176">      customerRepository;</text>
          <text x="14" y="200">  public BigDecimal calculateNewBalance(</text>
          <text x="14" y="214">      Long customerId) {</text>
          <text x="14" y="228">    return customerRepository</text>
          <text x="14" y="242">      .findById(customerId)</text>
          <text x="14" y="256">      .map(customer ->customer</text>
          <text x="14" y="270">         .getBalance()</text>
          <text x="14" y="284">         .multiply(</text>
          <text x="14" y="298">           BigDecimal.ONE.add(</text>
          <text x="14" y="312">             INTEREST_RATE))</text>
          <text x="14" y="326">         .setScale(2,</text>
          <text x="14" y="340">           RoundingMode.HALF_UP))</text>
          <text x="14" y="354">      .orElseThrow(() ->new</text>
          <text x="14" y="368">         CustomerNotFoundException());</text>
          <text x="14" y="382">  }</text>
          <text x="14" y="396">}</text>
        </g>
        <text x="160" y="420" text-anchor="middle" font-size="10" font-style="italic" fill="#38a169">Java-Idiome, klare Verantwortung</text>
      </g>
    </g>
  </g>
</svg>
