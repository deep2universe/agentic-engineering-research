<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgH2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shH2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrH2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fff"/>
    </marker>
  </defs>
  <rect width="1100" height="760" fill="url(#bgH2)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Orchestrierung &amp; Projektmanagement</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Migration Phasen, Waves und Workload-Gruppierung im AWS-Framework</text>

  <!-- 3 Phases banner -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">AWS-Migrationsphasen</text>

    <g transform="translate(0,15)" filter="url(#shH2)">
      <rect width="320" height="140" rx="12" fill="#1e3a5f"/>
      <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">1.  ASSESS</text>
      <text x="160" y="50" text-anchor="middle" font-size="11" fill="#cbd5e0">Bewertung der Migrationsbereitschaft</text>
      <line x1="20" y1="62" x2="300" y2="62" stroke="#4a5568"/>
      <g font-size="10" fill="#e2e8f0">
        <text x="20" y="82">&#9656; Portfolio-Analyse</text>
        <text x="20" y="98">&#9656; Abhaengigkeitserfassung</text>
        <text x="20" y="114">&#9656; TCO-Analyse</text>
        <text x="20" y="130">&#9656; Priorisierung</text>
      </g>
    </g>

    <g transform="translate(335,15)" filter="url(#shH2)">
      <rect width="320" height="140" rx="12" fill="#2c5282"/>
      <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">2.  MOBILIZE</text>
      <text x="160" y="50" text-anchor="middle" font-size="11" fill="#cbd5e0">Vorbereitung und Planung</text>
      <line x1="20" y1="62" x2="300" y2="62" stroke="#4a5568"/>
      <g font-size="10" fill="#e2e8f0">
        <text x="20" y="82">&#9656; Wave Planning</text>
        <text x="20" y="98">&#9656; Team-Aufbau</text>
        <text x="20" y="114">&#9656; Proof of Concept</text>
        <text x="20" y="130">&#9656; Landing Zone</text>
      </g>
    </g>

    <g transform="translate(670,15)" filter="url(#shH2)">
      <rect width="320" height="140" rx="12" fill="#dd6b20"/>
      <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">3.  MIGRATE &amp; MODERNIZE</text>
      <text x="160" y="50" text-anchor="middle" font-size="11" fill="#fed7aa">Durchfuehrung und Optimierung</text>
      <line x1="20" y1="62" x2="300" y2="62" stroke="#4a5568"/>
      <g font-size="10" fill="#fff">
        <text x="20" y="82">&#9656; Initialize (Pilots)</text>
        <text x="20" y="98">&#9656; Wave-basierte Umsetzung</text>
        <text x="20" y="114">&#9656; Optimierung</text>
        <text x="20" y="130">&#9656; Continuous Improvement</text>
      </g>
    </g>
  </g>

  <!-- Migration Waves visualization -->
  <g transform="translate(60,290)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Migration Waves &#8211; je 4&#8211;8 Wochen</text>

    <g transform="translate(0,20)">
      <!-- Timeline base -->
      <line x1="0" y1="50" x2="980" y2="50" stroke="#cbd5e0" stroke-width="2"/>

      <g transform="translate(0,15)" filter="url(#shH2)">
        <rect width="170" height="70" rx="8" fill="#fff" stroke="#1e3a5f" stroke-width="2"/>
        <rect width="170" height="6" fill="#1e3a5f"/>
        <text x="14" y="26" font-size="11" font-weight="700" fill="#1e3a5f">Wave 1 (Pilot)</text>
        <text x="14" y="42" font-size="9" fill="#4a5568">Reporting (read-only)</text>
        <text x="14" y="56" font-size="9" fill="#4a5568">80k LOC, 12 Programme</text>
        <text x="14" y="68" font-size="9" font-style="italic" fill="#1e3a5f">4&#8211;6 Wochen</text>
      </g>

      <g transform="translate(190,15)" filter="url(#shH2)">
        <rect width="170" height="70" rx="8" fill="#fff" stroke="#2c5282" stroke-width="2"/>
        <rect width="170" height="6" fill="#2c5282"/>
        <text x="14" y="26" font-size="11" font-weight="700" fill="#2c5282">Wave 2</text>
        <text x="14" y="42" font-size="9" fill="#4a5568">Customer Master</text>
        <text x="14" y="56" font-size="9" fill="#4a5568">200k LOC, 45 Programme</text>
        <text x="14" y="68" font-size="9" font-style="italic" fill="#2c5282">6&#8211;8 Wochen</text>
      </g>

      <g transform="translate(380,15)" filter="url(#shH2)">
        <rect width="170" height="70" rx="8" fill="#fff" stroke="#dd6b20" stroke-width="2"/>
        <rect width="170" height="6" fill="#dd6b20"/>
        <text x="14" y="26" font-size="11" font-weight="700" fill="#dd6b20">Wave 3</text>
        <text x="14" y="42" font-size="9" fill="#4a5568">Account Management</text>
        <text x="14" y="56" font-size="9" fill="#4a5568">350k LOC, 80 Programme</text>
        <text x="14" y="68" font-size="9" font-style="italic" fill="#dd6b20">8&#8211;10 Wochen</text>
      </g>

      <g transform="translate(570,15)" filter="url(#shH2)">
        <rect width="170" height="70" rx="8" fill="#fff" stroke="#38a169" stroke-width="2"/>
        <rect width="170" height="6" fill="#38a169"/>
        <text x="14" y="26" font-size="11" font-weight="700" fill="#38a169">Wave 4</text>
        <text x="14" y="42" font-size="9" fill="#4a5568">Transactions</text>
        <text x="14" y="56" font-size="9" fill="#4a5568">500k LOC, 110 Programme</text>
        <text x="14" y="68" font-size="9" font-style="italic" fill="#38a169">10&#8211;12 Wochen</text>
      </g>

      <g transform="translate(760,15)" filter="url(#shH2)">
        <rect width="220" height="70" rx="8" fill="#fff" stroke="#805ad5" stroke-width="2"/>
        <rect width="220" height="6" fill="#805ad5"/>
        <text x="14" y="26" font-size="11" font-weight="700" fill="#805ad5">Wave 5</text>
        <text x="14" y="42" font-size="9" fill="#4a5568">Batch Processing</text>
        <text x="14" y="56" font-size="9" fill="#4a5568">800k LOC, 200 Programme</text>
        <text x="14" y="68" font-size="9" font-style="italic" fill="#805ad5">12&#8211;16 Wochen</text>
      </g>
    </g>
  </g>

  <!-- Workload grouping criteria -->
  <g transform="translate(60,440)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Wave-Gruppierungs-Kriterien</text>

    <g transform="translate(0,15)" filter="url(#shH2)">
      <rect width="475" height="280" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <g font-size="11" fill="#2d3748">
        <text x="14" y="28" font-weight="700" fill="#1e3a5f">&#9679; Dependency Groups</text>
        <text x="14" y="46" font-size="10" fill="#4a5568">Anwendungen mit technischen und nicht-</text>
        <text x="14" y="60" font-size="10" fill="#4a5568">technischen Abhaengigkeiten gemeinsam migrieren</text>

        <text x="14" y="86" font-weight="700" fill="#2c5282">&#9679; Anwendungsarchitektur</text>
        <text x="14" y="104" font-size="10" fill="#4a5568">Aehnliche Anwendungen werden zusammengefasst</text>
        <text x="14" y="118" font-size="10" fill="#4a5568">(z. B. CICS-orientiert vs. Batch)</text>

        <text x="14" y="144" font-weight="700" fill="#dd6b20">&#9679; Business-Funktionalitaet</text>
        <text x="14" y="162" font-size="10" fill="#4a5568">Fachliche Zusammengehoerigkeit</text>
        <text x="14" y="176" font-size="10" fill="#4a5568">(Kreditkarten, Konten, Reporting)</text>

        <text x="14" y="202" font-weight="700" fill="#38a169">&#9679; Nicht-technische Abhaengigkeiten</text>
        <text x="14" y="220" font-size="10" fill="#4a5568">Release-Kalender, Wartungsfenster,</text>
        <text x="14" y="234" font-size="10" fill="#4a5568">Geschaeftstermine (Monats-/Quartalsabschluesse)</text>

        <text x="14" y="260" font-weight="700" fill="#805ad5">&#9679; Prioritaet</text>
      </g>
    </g>

    <g transform="translate(505,15)" filter="url(#shH2)">
      <rect width="475" height="280" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="28" font-size="13" font-weight="700" fill="#1a202c">Migration Hub Orchestrator</text>
      <text x="14" y="48" font-size="10" fill="#4a5568">Vordefinierte und anpassbare Workflow Templates</text>

      <g font-size="10">
        <text x="14" y="76" font-weight="700" fill="#2c5282">Vordefinierte Templates fuer:</text>
        <text x="20" y="92" fill="#4a5568">&#8226; SAP-NetWeaver-Migrationen</text>
        <text x="20" y="106" fill="#4a5568">&#8226; Rehosting auf Amazon EC2</text>
        <text x="20" y="120" fill="#4a5568">&#8226; SQL-Server-Migrationen</text>
        <text x="20" y="134" fill="#4a5568">&#8226; Replatforming auf Amazon RDS</text>
        <text x="20" y="148" fill="#4a5568">&#8226; Import von VM-Images</text>
        <text x="20" y="162" fill="#4a5568">&#8226; .NET/Java auf ECS</text>

        <text x="14" y="188" font-weight="700" fill="#dd6b20">Custom Templates</text>
        <text x="20" y="204" fill="#4a5568">Eigene Workflow-Vorlagen fuer spezifische</text>
        <text x="20" y="218" fill="#4a5568">Migrationsszenarien</text>

        <text x="14" y="244" font-weight="700" fill="#38a169">Automatisierte Tasks</text>
        <text x="20" y="260" fill="#4a5568">Migration Hub Automation fuer Lift-and-Shift</text>
      </g>
    </g>
  </g>
</svg>
