<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="cobolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a5568"/>
      <stop offset="1" stop-color="#2d3748"/>
    </linearGradient>
    <linearGradient id="awsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ed8936"/>
      <stop offset="1" stop-color="#dd6b20"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1100" height="720" fill="url(#bg1)"/>

  <text x="550" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Executive Summary &#8212; COBOL-Modernisierung 2026</text>
  <text x="550" y="68" text-anchor="middle" font-size="14" fill="#4a5568">220+ Mrd. LOC produktiv &#8211; Modernisierung ist unvermeidlich</text>

  <!-- Left big stat: 220B LOC -->
  <g transform="translate(60,100)" filter="url(#shadow)">
    <rect width="320" height="180" rx="12" fill="url(#cobolGrad)"/>
    <text x="160" y="60" text-anchor="middle" font-size="56" font-weight="800" fill="#ffd166">220 Mrd.</text>
    <text x="160" y="92" text-anchor="middle" font-size="16" fill="#e2e8f0">Lines of COBOL Code</text>
    <text x="160" y="120" text-anchor="middle" font-size="13" fill="#cbd5e0">produktiv im Einsatz (2026)</text>
    <line x1="40" y1="135" x2="280" y2="135" stroke="#4a5568" stroke-width="1"/>
    <text x="160" y="158" text-anchor="middle" font-size="12" fill="#a0aec0">Banken &#8226; Versicherungen &#8226; Behoerden</text>
  </g>

  <!-- Center: 4 Treiber -->
  <g transform="translate(410,100)">
    <text x="0" y="-5" font-size="15" font-weight="700" fill="#1a202c">Vier Treiber der Modernisierung</text>

    <g transform="translate(0,10)">
      <rect width="320" height="38" rx="6" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <circle cx="22" cy="19" r="11" fill="#e53e3e"/>
      <text x="22" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
      <text x="42" y="23" font-size="13" fill="#2d3748">COBOL-Entwickler gehen in Rente</text>
    </g>
    <g transform="translate(0,55)">
      <rect width="320" height="38" rx="6" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <circle cx="22" cy="19" r="11" fill="#dd6b20"/>
      <text x="22" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
      <text x="42" y="23" font-size="13" fill="#2d3748">MIPS-Lizenzen + Hardware = teuer</text>
    </g>
    <g transform="translate(0,100)">
      <rect width="320" height="38" rx="6" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <circle cx="22" cy="19" r="11" fill="#3182ce"/>
      <text x="22" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
      <text x="42" y="23" font-size="13" fill="#2d3748">Agilitaets-Limit der Mainframes</text>
    </g>
    <g transform="translate(0,145)">
      <rect width="320" height="38" rx="6" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <circle cx="22" cy="19" r="11" fill="#805ad5"/>
      <text x="22" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
      <text x="42" y="23" font-size="13" fill="#2d3748">Compliance &amp; Cybersecurity Pflicht</text>
    </g>
  </g>

  <!-- Right: AWS Transform -->
  <g transform="translate(760,100)" filter="url(#shadow)">
    <rect width="280" height="180" rx="12" fill="url(#awsGrad)"/>
    <text x="140" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">AWS Transform</text>
    <text x="140" y="60" text-anchor="middle" font-size="12" fill="#fff5e6">Strategischer Pfad seit Mai 2025</text>
    <line x1="30" y1="78" x2="250" y2="78" stroke="#fff5e6" stroke-opacity="0.4"/>
    <text x="140" y="105" text-anchor="middle" font-size="42" font-weight="800" fill="#fff">1,1 Mrd.</text>
    <text x="140" y="124" text-anchor="middle" font-size="13" fill="#fff5e6">analysierte LOC (2026)</text>
    <text x="140" y="153" text-anchor="middle" font-size="13" font-weight="600" fill="#ffd166">810k h manueller Aufwand eingespart</text>
  </g>

  <!-- Bottom: Top 10 Erkenntnisse als Kacheln -->
  <text x="60" y="320" font-size="15" font-weight="700" fill="#1a202c">Top-10-Erkenntnisse aus dieser Research</text>

  <g font-size="12" fill="#2d3748">
    <g transform="translate(60,335)">
      <rect width="240" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#dd6b20">01 &#9656; AWS Transform = Pfad</text>
      <text x="14" y="40" fill="#4a5568">Agentic AI fuer Discovery,</text>
      <text x="14" y="55" fill="#4a5568">Planung, Code, Testing</text>
    </g>
    <g transform="translate(310,335)">
      <rect width="240" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#e53e3e">02 &#9656; Migration Hub closed</text>
      <text x="14" y="40" fill="#4a5568">Seit 11/2025: keine Neukunden,</text>
      <text x="14" y="55" fill="#4a5568">Transform ist Nachfolger</text>
    </g>
    <g transform="translate(560,335)">
      <rect width="240" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#3182ce">03 &#9656; M2 Self-Managed bleibt</text>
      <text x="14" y="40" fill="#4a5568">Managed Runtime nicht mehr</text>
      <text x="14" y="55" fill="#4a5568">fuer Neukunden verfuegbar</text>
    </g>
    <g transform="translate(810,335)">
      <rect width="230" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#38a169">04 &#9656; Refactor + Replatform</text>
      <text x="14" y="40" fill="#4a5568">Blu Age + Rocket sind die zwei</text>
      <text x="14" y="55" fill="#4a5568">Hauptpfade auf AWS</text>
    </g>

    <g transform="translate(60,415)">
      <rect width="240" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#d69e2e">05 &#9656; JOBOL als Anti-Pattern</text>
      <text x="14" y="40" fill="#4a5568">Java, das wie COBOL aussieht &#8211;</text>
      <text x="14" y="55" fill="#4a5568">durch Reforge adressiert</text>
    </g>
    <g transform="translate(310,415)">
      <rect width="240" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#805ad5">06 &#9656; Testing = 50&#8211;70%</text>
      <text x="14" y="40" fill="#4a5568">Automation reduziert, aber</text>
      <text x="14" y="55" fill="#4a5568">eliminiert nicht den Aufwand</text>
    </g>
    <g transform="translate(560,415)">
      <rect width="240" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#319795">07 &#9656; Strangler Fig = Pflicht</text>
      <text x="14" y="40" fill="#4a5568">Big-Bang-Migrationen</text>
      <text x="14" y="55" fill="#4a5568">scheitern zuverlaessig</text>
    </g>
    <g transform="translate(810,415)">
      <rect width="230" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#2b6cb0">08 &#9656; Markt vielfaeltig</text>
      <text x="14" y="40" fill="#4a5568">IBM, Google, Heirloom,</text>
      <text x="14" y="55" fill="#4a5568">SoftwareMining, Astadia ...</text>
    </g>

    <g transform="translate(60,495)">
      <rect width="490" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#9b2c2c">09 &#9656; GenAI = Augmentation, kein Standalone-Tool</text>
      <text x="14" y="40" fill="#4a5568">Claude, Copilot, ChatGPT sind nicht-deterministisch &#8211; sie brauchen</text>
      <text x="14" y="55" fill="#4a5568">Orchestrierung, Validierung, Human-in-the-Loop</text>
    </g>
    <g transform="translate(560,495)">
      <rect width="480" height="68" rx="8" fill="#fff" stroke="#cbd5e0" filter="url(#shadow)"/>
      <text x="14" y="22" font-weight="700" fill="#9b2c2c">10 &#9656; Kultur schlaegt Technik</text>
      <text x="14" y="40" fill="#4a5568">Skill-Transition, Operations-Modell und Change Management</text>
      <text x="14" y="55" fill="#4a5568">sind erfolgsentscheidender als jedes Tool</text>
    </g>
  </g>

  <!-- Bottom strip: takeaway -->
  <g transform="translate(60,590)">
    <rect width="980" height="100" rx="12" fill="#1a202c"/>
    <text x="490" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#ffd166">Wann, wie und mit welchen Tools?</text>
    <text x="490" y="58" text-anchor="middle" font-size="13" fill="#e2e8f0">Modernisierung ist keine Option mehr &#8211; sie ist unvermeidlich.</text>
    <text x="490" y="78" text-anchor="middle" font-size="13" fill="#a0aec0">Der entscheidende Erfolgsfaktor bleibt der Mensch: Senior Architekten und Senior Developer mit tiefem Verstaendnis beider Welten.</text>
  </g>
</svg>
