<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgC9" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shC9" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrC9" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dd6b20"/>
    </marker>
  </defs>
  <rect width="1100" height="760" fill="url(#bgC9)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Phase 7: Deployment via Infrastructure as Code</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">AWS Transform generiert IaC-Templates fuer komplette AWS-Infrastruktur</text>

  <!-- IaC formats -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">9.1 IaC-Templates &#8211; drei Formate auf Knopfdruck</text>

    <g transform="translate(0,15)">
      <g filter="url(#shC9)">
        <rect width="320" height="100" rx="12" fill="#fff" stroke="#cbd5e0"/>
        <rect width="320" height="6" fill="#7c3aed"/>
        <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">Terraform</text>
        <text x="160" y="50" text-anchor="middle" font-size="10" fill="#718096">HCL</text>
        <text x="160" y="74" text-anchor="middle" font-size="10" fill="#4a5568">Multi-Cloud-faehig, AWS-Provider</text>
        <text x="160" y="88" text-anchor="middle" font-size="10" fill="#4a5568">am haeufigsten in Enterprise-Setups</text>
      </g>

      <g transform="translate(335,0)" filter="url(#shC9)">
        <rect width="320" height="100" rx="12" fill="#fff" stroke="#cbd5e0"/>
        <rect width="320" height="6" fill="#dd6b20"/>
        <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#dd6b20">CloudFormation</text>
        <text x="160" y="50" text-anchor="middle" font-size="10" fill="#718096">YAML / JSON</text>
        <text x="160" y="74" text-anchor="middle" font-size="10" fill="#4a5568">AWS-nativ, mit Stacks und</text>
        <text x="160" y="88" text-anchor="middle" font-size="10" fill="#4a5568">ChangeSets fuer sicheres Update</text>
      </g>

      <g transform="translate(670,0)" filter="url(#shC9)">
        <rect width="315" height="100" rx="12" fill="#fff" stroke="#cbd5e0"/>
        <rect width="315" height="6" fill="#0f9d58"/>
        <text x="158" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#0f9d58">AWS CDK</text>
        <text x="158" y="50" text-anchor="middle" font-size="10" fill="#718096">TypeScript / Python / Java</text>
        <text x="158" y="74" text-anchor="middle" font-size="10" fill="#4a5568">Programmatisches Setup</text>
        <text x="158" y="88" text-anchor="middle" font-size="10" fill="#4a5568">in der eigenen Sprache</text>
      </g>
    </g>
  </g>

  <!-- Generated Infrastructure -->
  <g transform="translate(60,260)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Generierte Infrastruktur &#8211; was AWS Transform automatisch erstellt</text>

    <g transform="translate(0,15)" filter="url(#shC9)">
      <rect width="980" height="220" rx="12" fill="#fff" stroke="#cbd5e0"/>

      <g font-size="11" fill="#2d3748">
        <g transform="translate(20,30)">
          <rect width="220" height="22" rx="4" fill="#bee3f8"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#2c5282">VPC (Multi-AZ)</text>
        </g>
        <g transform="translate(20,60)">
          <rect width="220" height="22" rx="4" fill="#bee3f8"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#2c5282">Application Load Balancer</text>
        </g>
        <g transform="translate(20,90)">
          <rect width="220" height="22" rx="4" fill="#bee3f8"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#2c5282">Auto Scaling Group / ECS</text>
        </g>
        <g transform="translate(20,120)">
          <rect width="220" height="22" rx="4" fill="#bee3f8"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#2c5282">EC2 / Fargate Tasks</text>
        </g>
        <g transform="translate(20,150)">
          <rect width="220" height="22" rx="4" fill="#bee3f8"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#2c5282">RDS Aurora PostgreSQL</text>
        </g>

        <g transform="translate(260,30)">
          <rect width="220" height="22" rx="4" fill="#fed7aa"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">S3 Buckets (Source/Logs)</text>
        </g>
        <g transform="translate(260,60)">
          <rect width="220" height="22" rx="4" fill="#fed7aa"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">CloudWatch Log Groups</text>
        </g>
        <g transform="translate(260,90)">
          <rect width="220" height="22" rx="4" fill="#fed7aa"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">CloudWatch Alarms</text>
        </g>
        <g transform="translate(260,120)">
          <rect width="220" height="22" rx="4" fill="#fed7aa"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">IAM Roles &amp; Policies</text>
        </g>
        <g transform="translate(260,150)">
          <rect width="220" height="22" rx="4" fill="#fed7aa"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#7c2d12">Security Groups</text>
        </g>

        <g transform="translate(500,30)">
          <rect width="220" height="22" rx="4" fill="#c6f6d5"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#22543d">Secrets Manager</text>
        </g>
        <g transform="translate(500,60)">
          <rect width="220" height="22" rx="4" fill="#c6f6d5"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#22543d">Route 53 DNS</text>
        </g>
        <g transform="translate(500,90)">
          <rect width="220" height="22" rx="4" fill="#c6f6d5"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#22543d">CodePipeline</text>
        </g>
        <g transform="translate(500,120)">
          <rect width="220" height="22" rx="4" fill="#c6f6d5"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#22543d">CodeBuild Projects</text>
        </g>
        <g transform="translate(500,150)">
          <rect width="220" height="22" rx="4" fill="#c6f6d5"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#22543d">ECR Repositories</text>
        </g>

        <g transform="translate(740,30)">
          <rect width="220" height="22" rx="4" fill="#e9d8fd"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#553c9a">CardDemo Pattern</text>
        </g>
        <g transform="translate(740,60)">
          <rect width="220" height="22" rx="4" fill="#e9d8fd"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#553c9a">Blue/Green Deployment</text>
        </g>
        <g transform="translate(740,90)">
          <rect width="220" height="22" rx="4" fill="#e9d8fd"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#553c9a">WAF Rules</text>
        </g>
        <g transform="translate(740,120)">
          <rect width="220" height="22" rx="4" fill="#e9d8fd"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#553c9a">VPC Endpoints</text>
        </g>
        <g transform="translate(740,150)">
          <rect width="220" height="22" rx="4" fill="#e9d8fd"/>
          <text x="110" y="15" text-anchor="middle" font-weight="700" fill="#553c9a">KMS Keys</text>
        </g>
      </g>

      <text x="490" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#4a5568">Best Practice Pattern: CardDemo mit Aurora Serverless v2, ECS Fargate und Multi-AZ-HA</text>
    </g>
  </g>

  <!-- CodePipeline flow -->
  <g transform="translate(60,520)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">CI/CD-Pipeline mit AWS CodePipeline</text>

    <g transform="translate(0,15)" filter="url(#shC9)">
      <rect width="980" height="220" rx="12" fill="#fff" stroke="#cbd5e0"/>

      <g transform="translate(40,30)">
        <g>
          <rect width="200" height="50" rx="6" fill="#1e3a5f"/>
          <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">CodeCommit</text>
          <text x="100" y="38" text-anchor="middle" font-size="10" fill="#cbd5e0">(Source)</text>
        </g>
        <line x1="200" y1="25" x2="280" y2="25" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrC9)"/>
        <g transform="translate(290,0)">
          <rect width="200" height="50" rx="6" fill="#2c5282"/>
          <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">CodeBuild</text>
          <text x="100" y="38" text-anchor="middle" font-size="10" fill="#bee3f8">(Build)</text>
        </g>
        <line x1="490" y1="25" x2="570" y2="25" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrC9)"/>
        <g transform="translate(580,0)">
          <rect width="200" height="50" rx="6" fill="#dd6b20"/>
          <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">CodeBuild</text>
          <text x="100" y="38" text-anchor="middle" font-size="10" fill="#fed7aa">(Test)</text>
        </g>
        <line x1="780" y1="25" x2="850" y2="25" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrC9)"/>
        <g transform="translate(820,60)">
          <rect width="80" height="50" rx="6" fill="#38a169"/>
          <text x="40" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">CodeDeploy</text>
          <text x="40" y="38" text-anchor="middle" font-size="10" fill="#c6f6d5">(Deploy)</text>
        </g>
      </g>

      <g transform="translate(40,110)" font-size="10" fill="#718096">
        <text x="100" text-anchor="middle">Java + IaC in Git Repo</text>
        <text x="390" text-anchor="middle">Maven/Gradle Build WAR</text>
        <text x="680" text-anchor="middle">JUnit + Equiv. Tests</text>
        <text x="860" text-anchor="middle">Blue/Green</text>
      </g>

      <text x="490" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#dd6b20">Best Practices: Blue/Green &#8226; Canary Releases &#8226; Automated Rollback &#8226; Approval Gates fuer Production</text>
    </g>
  </g>
</svg>
