<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgBP3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shBP3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrBP3" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dd6b20"/>
    </marker>
  </defs>
  <rect width="1100" height="760" fill="url(#bgBP3)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Testing und Validierung</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">50&#8211;70 % der Projektdauer &#8211; Functional Equivalence + Dual Run als Goldstandard</text>

  <!-- Functional Equivalence Process -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">3.1 Functional Equivalence Testing &#8211; Bit-genaue Aequivalenz</text>

    <g transform="translate(0,15)" filter="url(#shBP3)">
      <rect width="980" height="200" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <!-- 5 Steps -->
      <g transform="translate(20,30)">
        <g>
          <circle cx="20" cy="60" r="20" fill="#1e3a5f"/>
          <text x="20" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1</text>
          <text x="20" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">Golden</text>
          <text x="20" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">Datasets</text>
          <text x="20" y="100" text-anchor="middle" font-size="9" fill="#4a5568">Repraesentative</text>
          <text x="20" y="113" text-anchor="middle" font-size="9" fill="#4a5568">Testdaten aus</text>
          <text x="20" y="126" text-anchor="middle" font-size="9" fill="#4a5568">Produktion</text>
          <text x="20" y="139" text-anchor="middle" font-size="9" fill="#4a5568">(anonymisiert)</text>
        </g>
        <line x1="50" y1="60" x2="170" y2="60" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrBP3)"/>

        <g transform="translate(180,0)">
          <circle cx="20" cy="60" r="20" fill="#2c5282"/>
          <text x="20" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2</text>
          <text x="20" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#2c5282">Original</text>
          <text x="20" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#2c5282">laufen</text>
          <text x="20" y="100" text-anchor="middle" font-size="9" fill="#4a5568">Output sammeln</text>
          <text x="20" y="113" text-anchor="middle" font-size="9" fill="#4a5568">Files, DB-Stand,</text>
          <text x="20" y="126" text-anchor="middle" font-size="9" fill="#4a5568">Reports</text>
        </g>
        <line x1="230" y1="60" x2="350" y2="60" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrBP3)"/>

        <g transform="translate(360,0)">
          <circle cx="20" cy="60" r="20" fill="#dd6b20"/>
          <text x="20" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3</text>
          <text x="20" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#dd6b20">Modernized</text>
          <text x="20" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#dd6b20">laufen</text>
          <text x="20" y="100" text-anchor="middle" font-size="9" fill="#4a5568">Gleicher Input,</text>
          <text x="20" y="113" text-anchor="middle" font-size="9" fill="#4a5568">selbe Reihenfolge</text>
        </g>
        <line x1="410" y1="60" x2="530" y2="60" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrBP3)"/>

        <g transform="translate(540,0)">
          <circle cx="20" cy="60" r="20" fill="#38a169"/>
          <text x="20" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">4</text>
          <text x="20" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#38a169">Output</text>
          <text x="20" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#38a169">vergleichen</text>
          <text x="20" y="100" text-anchor="middle" font-size="9" fill="#4a5568">Byte-genau,</text>
          <text x="20" y="113" text-anchor="middle" font-size="9" fill="#4a5568">Feld-genau,</text>
          <text x="20" y="126" text-anchor="middle" font-size="9" fill="#4a5568">semantisch</text>
        </g>
        <line x1="590" y1="60" x2="710" y2="60" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrBP3)"/>

        <g transform="translate(720,0)">
          <circle cx="20" cy="60" r="20" fill="#805ad5"/>
          <text x="20" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">5</text>
          <text x="20" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#805ad5">Differenzen</text>
          <text x="20" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#805ad5">analysieren</text>
          <text x="20" y="100" text-anchor="middle" font-size="9" fill="#4a5568">Echte Bugs vs.</text>
          <text x="20" y="113" text-anchor="middle" font-size="9" fill="#4a5568">zulaessige</text>
          <text x="20" y="126" text-anchor="middle" font-size="9" fill="#4a5568">Abweichungen</text>
          <text x="20" y="139" text-anchor="middle" font-size="9" fill="#4a5568">(Timestamps)</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Dual Run Pattern -->
  <g transform="translate(60,330)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">3.2 Dual-Run / Parallel Run &#8211; Goldstandard fuer kritische Systeme</text>

    <g transform="translate(0,15)" filter="url(#shBP3)">
      <rect width="980" height="220" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <g transform="translate(40,30)">
        <!-- Production Input -->
        <g>
          <rect width="160" height="50" rx="6" fill="#1e3a5f"/>
          <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Production Input</text>
          <text x="80" y="38" text-anchor="middle" font-size="10" fill="#cbd5e0">Echte Live-Anfragen</text>
        </g>

        <!-- Splitter -->
        <line x1="160" y1="25" x2="220" y2="25" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP3)"/>
        <circle cx="225" cy="25" r="8" fill="#dd6b20"/>
        <text x="225" y="29" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">T</text>

        <!-- Top: Mainframe -->
        <line x1="225" y1="25" x2="320" y2="25" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP3)"/>
        <g transform="translate(330,0)">
          <rect width="200" height="50" rx="6" fill="#9b2c2c"/>
          <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Mainframe (alt)</text>
          <text x="100" y="38" text-anchor="middle" font-size="10" fill="#fed7d7">COBOL Production</text>
        </g>
        <line x1="530" y1="25" x2="620" y2="25" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP3)"/>
        <g transform="translate(630,0)">
          <rect width="190" height="50" rx="6" fill="#1e3a5f"/>
          <text x="95" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Production Output</text>
          <text x="95" y="38" text-anchor="middle" font-size="10" fill="#cbd5e0">Live-Antworten</text>
        </g>

        <!-- Bottom: AWS-System -->
        <line x1="225" y1="35" x2="320" y2="100" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP3)"/>
        <g transform="translate(330,90)">
          <rect width="200" height="50" rx="6" fill="#dd6b20"/>
          <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">AWS-System (neu)</text>
          <text x="100" y="38" text-anchor="middle" font-size="10" fill="#fed7aa">Java Spring Boot</text>
        </g>
        <line x1="530" y1="115" x2="620" y2="155" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP3)"/>
        <g transform="translate(630,150)">
          <rect width="190" height="40" rx="6" fill="#fed7aa"/>
          <text x="95" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Shadow Output</text>
          <text x="95" y="32" text-anchor="middle" font-size="9" fill="#9a3412">nicht produktiv</text>
        </g>

        <!-- Comparator -->
        <line x1="725" y1="40" x2="725" y2="155" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="3,3"/>
        <line x1="820" y1="170" x2="855" y2="170" stroke="#4a5568" stroke-width="2" marker-end="url(#arrBP3)"/>
        <g transform="translate(860,150)">
          <rect width="80" height="40" rx="6" fill="#805ad5"/>
          <text x="40" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Comparator</text>
          <text x="40" y="32" text-anchor="middle" font-size="9" fill="#e9d8fd">Diff Reports</text>
        </g>
      </g>

      <text x="490" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#4a5568">Realistische Last + fruehe Edge-Case-Erkennung + Confidence-Building vor Cutover</text>
    </g>
  </g>

  <!-- Performance + Coverage -->
  <g transform="translate(60,580)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">3.3 Regressionstests und 3.4 Performance-Benchmarking</text>

    <g transform="translate(0,15)" filter="url(#shBP3)">
      <rect width="475" height="160" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="160" fill="#dd6b20"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#dd6b20">Regressionstests</text>
      <g font-size="10" fill="#4a5568">
        <text x="22" y="50">&#9656; Selten existierende Unit-Tests fuer COBOL-Programme</text>
        <text x="22" y="64">&#9656; Tests aus Specs &amp; Production-Daten nachbauen</text>
        <text x="22" y="78">&#9656; Coverage-Messung in COBOL ist schwierig</text>
        <text x="22" y="100" font-weight="700" fill="#dd6b20">Empfehlung</text>
        <text x="22" y="116">&#9656; AWS Transform und IBM watsonx generieren Testfaelle</text>
        <text x="22" y="130">&#9656; Fokus auf High-Risk-Pfade</text>
        <text x="22" y="144">&#9656; Continuous Regression Testing in CI/CD</text>
      </g>
    </g>

    <g transform="translate(505,15)" filter="url(#shBP3)">
      <rect width="475" height="160" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="160" fill="#805ad5"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#805ad5">Performance: Mainframe vs. Cloud-Metriken</text>
      <g font-size="10" font-family="Menlo,monospace" fill="#2d3748">
        <text x="22" y="48">MIPS         &#8594; vCPU-h, CPUUtilization</text>
        <text x="22" y="64">MSU          &#8594; Compute-Cost-Units</text>
        <text x="22" y="80">4HRA         &#8594; Average CPU 4h Window</text>
        <text x="22" y="96">CICS Resp    &#8594; ALB Target Response Time</text>
        <text x="22" y="112">Batch Thrpt  &#8594; Spring Batch Metrics</text>
      </g>
      <text x="22" y="138" font-size="10" font-style="italic" fill="#805ad5">1:1-Vergleiche sind oft irrefuehrend &#8211; horizontale</text>
      <text x="22" y="152" font-size="10" font-style="italic" fill="#805ad5">Skalierung erfordert anderes Performance-Mindset.</text>
    </g>
  </g>
</svg>
