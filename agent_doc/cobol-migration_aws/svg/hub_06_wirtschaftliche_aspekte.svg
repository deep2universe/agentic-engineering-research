<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgH6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shH6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1100" height="580" fill="url(#bgH6)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Wirtschaftliche Aspekte</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">EPAM Mainframe Modernization ROI-Analyse 2025</text>

  <!-- ROI bar chart -->
  <g transform="translate(60,110)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Projektkosten 2024 vs. 2025</text>

    <g transform="translate(0,30)" filter="url(#shH6)">
      <rect width="600" height="280" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <!-- Y-Axis -->
      <line x1="80" y1="40" x2="80" y2="240" stroke="#2d3748" stroke-width="2"/>
      <line x1="80" y1="240" x2="560" y2="240" stroke="#2d3748" stroke-width="2"/>

      <text x="68" y="50" text-anchor="end" font-size="9" fill="#718096">10 Mio</text>
      <text x="68" y="92" text-anchor="end" font-size="9" fill="#718096">8 Mio</text>
      <text x="68" y="134" text-anchor="end" font-size="9" fill="#718096">6 Mio</text>
      <text x="68" y="176" text-anchor="end" font-size="9" fill="#718096">4 Mio</text>
      <text x="68" y="218" text-anchor="end" font-size="9" fill="#718096">2 Mio</text>

      <line x1="80" y1="50" x2="560" y2="50" stroke="#e2e8f0"/>
      <line x1="80" y1="92" x2="560" y2="92" stroke="#e2e8f0"/>
      <line x1="80" y1="134" x2="560" y2="134" stroke="#e2e8f0"/>
      <line x1="80" y1="176" x2="560" y2="176" stroke="#e2e8f0"/>
      <line x1="80" y1="218" x2="560" y2="218" stroke="#e2e8f0"/>

      <!-- Bar 2024: 9.1M -->
      <rect x="180" y="50" width="100" height="190" fill="#9b2c2c" rx="4"/>
      <text x="230" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#9b2c2c">9,1 Mio $</text>
      <text x="230" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#2d3748">2024</text>

      <!-- Bar 2025: 7.2M -->
      <rect x="380" y="90" width="100" height="150" fill="#38a169" rx="4"/>
      <text x="430" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#38a169">7,2 Mio $</text>
      <text x="430" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#2d3748">2025</text>

      <!-- Reduction arrow -->
      <line x1="290" y1="140" x2="370" y2="140" stroke="#dd6b20" stroke-width="2" stroke-dasharray="4,3"/>
      <text x="330" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#dd6b20">&#8211;21 %</text>

      <text x="320" y="290" text-anchor="middle" font-size="10" font-style="italic" fill="#718096">Durchschnittliche Projektkosten in USD</text>
    </g>
  </g>

  <!-- Right: Savings + ROI Card -->
  <g transform="translate(700,140)">
    <g filter="url(#shH6)">
      <rect width="340" height="300" rx="12" fill="#1e3a5f"/>
      <rect width="340" height="6" fill="#fbbf24"/>
      <text x="170" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">Jaehrliche Einsparungen</text>
      <text x="170" y="100" text-anchor="middle" font-size="56" font-weight="800" fill="#fff">23,3</text>
      <text x="170" y="124" text-anchor="middle" font-size="14" fill="#cbd5e0">Mio. USD pro Jahr</text>
      <text x="170" y="142" text-anchor="middle" font-size="10" fill="#94a3b8">mindestens, nach erfolgreicher Migration</text>

      <line x1="40" y1="160" x2="300" y2="160" stroke="#475569"/>

      <text x="170" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">ROI hat sich</text>
      <text x="170" y="222" text-anchor="middle" font-size="36" font-weight="800" fill="#fff">2x</text>
      <text x="170" y="244" text-anchor="middle" font-size="12" fill="#cbd5e0">verdoppelt vs. Vorjahr</text>

      <text x="170" y="278" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">Quelle: EPAM Mainframe Modernization 2025</text>
    </g>
  </g>

  <!-- Bottom takeaway -->
  <g transform="translate(60,455)" filter="url(#shH6)">
    <rect width="980" height="100" rx="12" fill="#fff" stroke="#cbd5e0"/>
    <rect width="6" height="100" fill="#dd6b20"/>
    <text x="22" y="32" font-size="13" font-weight="700" fill="#1a202c">Was die Zahlen fuer Senior Architekten bedeuten</text>
    <text x="22" y="54" font-size="11" fill="#4a5568">&#9656; Migrationskosten sinken durch automatisierte Tools (AWS Transform: 30 % niedriger als manuell).</text>
    <text x="22" y="70" font-size="11" fill="#4a5568">&#9656; Die Einsparungen amortisieren typische Projekte nach <tspan font-weight="700" fill="#2d3748">18&#8211;36 Monaten</tspan>.</text>
    <text x="22" y="86" font-size="11" fill="#4a5568">&#9656; Hauptkostenpunkte bleiben Testing (50&#8211;70 % der Projektzeit) und manuelles Architektur-Review.</text>
  </g>
</svg>
