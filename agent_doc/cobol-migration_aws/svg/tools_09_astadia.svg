<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgTL9" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shTL9" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="540" fill="url(#bgTL9)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Astadia &#8211; Multi-Cloud End-to-End Services</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Services-getriebener Anbieter &#8211; jahrzehntelange Mainframe-Modernisierungserfahrung</text>

  <g transform="translate(60,100)" filter="url(#shTL9)">
    <rect width="980" height="80" rx="12" fill="#2d3748"/>
    <text x="490" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">Astadia</text>
    <text x="490" y="54" text-anchor="middle" font-size="12" fill="#cbd5e0">End-to-End Mainframe Migration Services &#8226; Aktiv, Multi-Cloud</text>
    <text x="490" y="72" text-anchor="middle" font-size="11" fill="#94a3b8">Astadia fuehrt das Projekt durch &#8211; nicht der Kunde selbst</text>
  </g>

  <g transform="translate(60,210)">
    <g filter="url(#shTL9)">
      <rect width="475" height="200" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="200" fill="#2d3748"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#2d3748">Faehigkeiten</text>
      <g font-size="11" fill="#4a5568">
        <text x="22" y="52">&#9656; 100 % automatisierte Code- und Datenkonvertierung</text>
        <text x="22" y="68">&#9656; Automated Testing fuer Batch und Online-Workloads</text>
        <text x="22" y="84">&#9656; Voll-integrierter Workflow: Code, Daten, Test, Cutover</text>
        <text x="22" y="100">&#9656; DB2, IMS, VSAM &#8594; SQL Server, Oracle, PostgreSQL</text>
        <text x="22" y="116">&#9656; Multi-Cloud: AWS, Azure, GCP, on-premises</text>
        <text x="22" y="132">&#9656; Linux/Windows/Docker als Zielplattformen</text>
        <text x="22" y="148">&#9656; Services-Modell &#8211; Astadia fuehrt aus</text>
      </g>
      <text x="22" y="184" font-size="10" font-style="italic" fill="#2d3748">Multi-Cloud-Faehigkeit als Alleinstellung gegen Hyperscaler</text>
    </g>

    <g transform="translate(505,0)" filter="url(#shTL9)">
      <rect width="475" height="200" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="200" fill="#dd6b20"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#dd6b20">Vor- und Nachteile</text>

      <text x="22" y="52" font-size="11" font-weight="700" fill="#38a169">+ Vorteile</text>
      <g font-size="10" fill="#22543d">
        <text x="36" y="68">&#9656; Sehr breite Mainframe-Erfahrung</text>
        <text x="36" y="82">&#9656; Multi-Cloud-Faehigkeit (kein Lock-in)</text>
        <text x="36" y="96">&#9656; End-to-End-Verantwortung des Anbieters</text>
        <text x="36" y="110">&#9656; Replatform UND Refactor im Portfolio</text>
      </g>

      <text x="22" y="134" font-size="11" font-weight="700" fill="#c53030">&#8722; Nachteile</text>
      <g font-size="10" fill="#742a2a">
        <text x="36" y="150">&#9656; Hoehere Projektkosten (Services-Modell)</text>
        <text x="36" y="164">&#9656; Weniger Self-Service-Faehigkeiten</text>
        <text x="36" y="178">&#9656; Abhaengigkeit von Astadia-Consultants</text>
      </g>
    </g>
  </g>

  <g transform="translate(60,440)" filter="url(#shTL9)">
    <rect width="980" height="80" rx="10" fill="#2d3748"/>
    <text x="20" y="34" font-size="13" font-weight="700" fill="#fbbf24">Wann Astadia?</text>
    <text x="20" y="56" font-size="11" fill="#fff">Wenn Multi-Cloud strategisch wichtig ist (kein Hyperscaler-Lock-in), die Verantwortung end-to-end an einen</text>
    <text x="20" y="72" font-size="11" fill="#fff">erfahrenen Service-Provider gehen soll und das Budget fuer ein klassisches Consulting-Modell vorhanden ist.</text>
  </g>
</svg>
