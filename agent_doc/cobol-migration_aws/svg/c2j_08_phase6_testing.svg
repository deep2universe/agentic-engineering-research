<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgC8" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shC8" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrC8" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38a169"/>
    </marker>
  </defs>
  <rect width="1100" height="720" fill="url(#bgC8)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Phase 6: Testing &amp; Validation</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">AWS Transform Testing Automation &#8211; vier automatisierte Aufgaben</text>

  <!-- Four test capabilities -->
  <g transform="translate(60,100)">
    <g filter="url(#shC8)">
      <rect width="240" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="240" height="6" fill="#1e3a5f"/>
      <text x="14" y="28" font-size="13" font-weight="700" fill="#1e3a5f">1. Test Plan Generation</text>
      <text x="14" y="48" font-size="10" fill="#4a5568">Identifikation kritischer</text>
      <text x="14" y="62" font-size="10" fill="#4a5568">funktionaler Tests aus dem</text>
      <text x="14" y="76" font-size="10" fill="#4a5568">COBOL-Code.</text>
      <text x="14" y="100" font-size="10" font-style="italic" fill="#1e3a5f">Automatisch generiert</text>
    </g>

    <g transform="translate(255,0)" filter="url(#shC8)">
      <rect width="240" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="240" height="6" fill="#2c5282"/>
      <text x="14" y="28" font-size="13" font-weight="700" fill="#2c5282">2. Test Data Collection</text>
      <text x="14" y="48" font-size="10" fill="#4a5568">JCL-Skripte zur Extraktion</text>
      <text x="14" y="62" font-size="10" fill="#4a5568">realer Testdaten aus</text>
      <text x="14" y="76" font-size="10" fill="#4a5568">VSAM/DB2.</text>
      <text x="14" y="100" font-size="10" font-style="italic" fill="#2c5282">Production-aehnliche Daten</text>
    </g>

    <g transform="translate(510,0)" filter="url(#shC8)">
      <rect width="240" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="240" height="6" fill="#dd6b20"/>
      <text x="14" y="28" font-size="13" font-weight="700" fill="#dd6b20">3. Test Case Automation</text>
      <text x="14" y="48" font-size="10" fill="#4a5568">Vollstaendige Test-Suite</text>
      <text x="14" y="62" font-size="10" fill="#4a5568">mit Setup, Execution und</text>
      <text x="14" y="76" font-size="10" fill="#4a5568">Validation.</text>
      <text x="14" y="100" font-size="10" font-style="italic" fill="#dd6b20">CI/CD-faehig</text>
    </g>

    <g transform="translate(765,0)" filter="url(#shC8)">
      <rect width="220" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="220" height="6" fill="#38a169"/>
      <text x="14" y="28" font-size="13" font-weight="700" fill="#38a169">4. Functional Parity</text>
      <text x="14" y="48" font-size="10" fill="#4a5568">Golden-Master-Vergleich</text>
      <text x="14" y="62" font-size="10" fill="#4a5568">zwischen Original und</text>
      <text x="14" y="76" font-size="10" fill="#4a5568">Modernisierung.</text>
      <text x="14" y="100" font-size="10" font-style="italic" fill="#38a169">Bit-genauer Vergleich</text>
    </g>
  </g>

  <!-- Test Pipeline -->
  <g transform="translate(60,260)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Test-Pipeline auf AWS &#8211; visualisiert</text>

    <g transform="translate(0,15)" filter="url(#shC8)">
      <rect width="980" height="280" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <!-- Top Row: Source pipeline -->
      <g transform="translate(40,40)">
        <g filter="url(#shC8)">
          <rect width="200" height="60" rx="6" fill="#9b2c2c"/>
          <text x="100" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Mainframe Source</text>
          <text x="100" y="46" text-anchor="middle" font-size="10" fill="#fed7d7">COBOL run</text>
        </g>
        <line x1="200" y1="30" x2="280" y2="30" stroke="#38a169" stroke-width="2" marker-end="url(#arrC8)"/>
        <g transform="translate(290,0)" filter="url(#shC8)">
          <rect width="200" height="60" rx="6" fill="#2c5282"/>
          <text x="100" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Test Data Generation</text>
          <text x="100" y="46" text-anchor="middle" font-size="10" fill="#bee3f8">JCL Scripts</text>
        </g>
        <line x1="490" y1="30" x2="570" y2="30" stroke="#38a169" stroke-width="2" marker-end="url(#arrC8)"/>
        <g transform="translate(580,0)" filter="url(#shC8)">
          <rect width="200" height="60" rx="6" fill="#1e3a5f"/>
          <text x="100" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">Golden Master</text>
          <text x="100" y="46" text-anchor="middle" font-size="10" fill="#cbd5e0">S3</text>
        </g>
      </g>

      <!-- Bottom Row: Modern pipeline -->
      <g transform="translate(40,140)">
        <g filter="url(#shC8)">
          <rect width="200" height="60" rx="6" fill="#dd6b20"/>
          <text x="100" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Java App (modernized)</text>
          <text x="100" y="46" text-anchor="middle" font-size="10" fill="#fed7aa">Spring Boot</text>
        </g>
        <line x1="200" y1="30" x2="280" y2="30" stroke="#38a169" stroke-width="2" marker-end="url(#arrC8)"/>
        <g transform="translate(290,0)" filter="url(#shC8)">
          <rect width="200" height="60" rx="6" fill="#805ad5"/>
          <text x="100" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Test Runner</text>
          <text x="100" y="46" text-anchor="middle" font-size="10" fill="#e9d8fd">CodeBuild</text>
        </g>
        <line x1="490" y1="30" x2="570" y2="30" stroke="#38a169" stroke-width="2" marker-end="url(#arrC8)"/>
        <g transform="translate(580,0)" filter="url(#shC8)">
          <rect width="200" height="60" rx="6" fill="#38a169"/>
          <text x="100" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Comparator</text>
          <text x="100" y="46" text-anchor="middle" font-size="10" fill="#c6f6d5">Lambda</text>
        </g>
      </g>

      <!-- Diff Reports -->
      <line x1="780" y1="100" x2="850" y2="100" stroke="#38a169" stroke-width="2" stroke-dasharray="3,3"/>
      <line x1="780" y1="170" x2="850" y2="170" stroke="#38a169" stroke-width="2" stroke-dasharray="3,3"/>
      <line x1="850" y1="100" x2="850" y2="170" stroke="#38a169" stroke-width="2"/>
      <line x1="850" y1="135" x2="900" y2="135" stroke="#38a169" stroke-width="2" marker-end="url(#arrC8)"/>

      <g transform="translate(820,210)" filter="url(#shC8)">
        <rect width="140" height="50" rx="6" fill="#fbbf24"/>
        <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1a202c">Diff Reports</text>
        <text x="70" y="38" text-anchor="middle" font-size="9" fill="#4a5568">CloudWatch</text>
      </g>
    </g>
  </g>

  <!-- Continuous Regression -->
  <g transform="translate(60,580)" filter="url(#shC8)">
    <rect width="980" height="120" rx="12" fill="#1e3a5f"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#fbbf24">Continuous Regression Testing</text>
    <text x="20" y="56" font-size="12" fill="#fff">Nach erfolgreichem Initial-Test wird die Test-Suite Teil der CI/CD-Pipeline.</text>
    <text x="20" y="74" font-size="12" fill="#fff">Jeder Code-Change loest automatisch Regressionstests aus.</text>
    <text x="20" y="100" font-size="11" font-style="italic" fill="#94a3b8">Testing macht typischerweise 50&#8211;70 % der Projektdauer aus &#8211; Automation reduziert das, eliminiert es nicht.</text>
  </g>
</svg>
