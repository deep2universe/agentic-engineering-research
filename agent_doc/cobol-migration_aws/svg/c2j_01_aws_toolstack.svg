<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgC1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shC" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="700" fill="url(#bgC1)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Der AWS-Toolstack 2026 im Ueberblick</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Sieben Tools im COBOL-zu-Java-Workflow &#8211; ihre Rollen und Status</text>

  <g transform="translate(60,100)" filter="url(#shC)">
    <rect width="980" height="450" rx="12" fill="#fff" stroke="#cbd5e0"/>
    <rect width="980" height="42" rx="12" fill="#2d3748"/>
    <rect y="30" width="980" height="12" fill="#2d3748"/>
    <text x="14" y="26" font-size="13" font-weight="700" fill="#fff">Tool</text>
    <text x="370" y="26" font-size="13" font-weight="700" fill="#fbbf24">Rolle</text>
    <text x="780" y="26" font-size="13" font-weight="700" fill="#9ae6b4">Status 2026</text>

    <g font-size="11" fill="#2d3748">
      <g transform="translate(0,42)">
        <rect width="980" height="56" fill="#fef5e7"/>
        <text x="14" y="22" font-weight="700" fill="#dd6b20">AWS Transform for Mainframe &#9733;</text>
        <text x="14" y="40" font-size="9" fill="#718096">Zentrale Plattform</text>
        <text x="370" y="22" fill="#4a5568">KI-gestuetzte Analyse + Transformation</text>
        <text x="370" y="40" font-size="9" fill="#718096">Discovery, Refactor, Reforge, Reimagine, Testing</text>
        <text x="780" y="22" fill="#dd6b20" font-weight="700">Strategisch, empfohlen</text>
        <text x="780" y="40" font-size="9" fill="#718096">Mai 2025 GA</text>
      </g>

      <g transform="translate(0,98)">
        <rect width="980" height="56" fill="#fff"/>
        <text x="14" y="22" font-weight="700" fill="#dd6b20">AWS Blu Age</text>
        <text x="14" y="40" font-size="9" fill="#718096">jetzt: Transform for Mainframe Refactor</text>
        <text x="370" y="22" fill="#4a5568">Deterministische Transformation Engine</text>
        <text x="370" y="40" font-size="9" fill="#718096">Model-to-Model COBOL &#8594; Java</text>
        <text x="780" y="22" fill="#38a169" font-weight="700">Aktiv, GA</text>
        <text x="780" y="40" font-size="9" fill="#718096">Re-brand Maerz 2026</text>
      </g>

      <g transform="translate(0,154)">
        <rect width="980" height="56" fill="#f7fafc"/>
        <text x="14" y="22" font-weight="700" fill="#dd6b20">AWS Mainframe Modernization (M2)</text>
        <text x="14" y="40" font-size="9" fill="#718096">Runtime-Service</text>
        <text x="370" y="22" fill="#4a5568">Runtime-Service (Self-Managed)</text>
        <text x="370" y="40" font-size="9" fill="#718096">Blu Age Tomcat + Rocket Enterprise Server</text>
        <text x="780" y="22" fill="#d69e2e" font-weight="700">Self-Managed aktiv</text>
        <text x="780" y="40" font-size="9" fill="#9b2c2c">Managed nicht mehr fuer Neukunden</text>
      </g>

      <g transform="translate(0,210)">
        <rect width="980" height="56" fill="#fff"/>
        <text x="14" y="22" font-weight="700" fill="#dd6b20">Amazon Q Developer</text>
        <text x="14" y="40" font-size="9" fill="#718096">KI-Assistent</text>
        <text x="370" y="22" fill="#4a5568">KI-Assistent fuer Entwickler</text>
        <text x="370" y="40" font-size="9" fill="#718096">Web-Erfahrung fuer Transformation</text>
        <text x="780" y="22" fill="#38a169" font-weight="700">GA, integriert mit Transform</text>
      </g>

      <g transform="translate(0,266)">
        <rect width="980" height="56" fill="#f7fafc"/>
        <text x="14" y="22" font-weight="700" fill="#dd6b20">Kiro</text>
        <text x="14" y="40" font-size="9" fill="#718096">Forward Engineering</text>
        <text x="370" y="22" fill="#4a5568">Forward Engineering, Microservice-Generierung</text>
        <text x="370" y="40" font-size="9" fill="#718096">Reimagine-Workflow Phase 2</text>
        <text x="780" y="22" fill="#38a169" font-weight="700">Reimagine-Workflow</text>
      </g>

      <g transform="translate(0,322)">
        <rect width="980" height="56" fill="#fff"/>
        <text x="14" y="22" font-weight="700" fill="#dd6b20">AWS Migration Hub</text>
        <text x="14" y="40" font-size="9" fill="#718096">Tracking (alt)</text>
        <text x="370" y="22" fill="#4a5568">Tracking (alt)</text>
        <text x="370" y="40" font-size="9" fill="#718096">Single Pane of Glass</text>
        <text x="780" y="22" fill="#9b2c2c" font-weight="700">Nicht fuer Neukunden</text>
        <text x="780" y="40" font-size="9" fill="#9b2c2c">seit November 2025</text>
      </g>

      <g transform="translate(0,378)">
        <rect width="980" height="56" fill="#f7fafc"/>
        <text x="14" y="22" font-weight="700" fill="#dd6b20">AWS Application Discovery Service</text>
        <text x="14" y="40" font-size="9" fill="#718096">Klassische Discovery</text>
        <text x="370" y="22" fill="#4a5568">Nicht-Mainframe Discovery</text>
        <text x="370" y="40" font-size="9" fill="#718096">VMs, physische Server, Cloud Workloads</text>
        <text x="780" y="22" fill="#38a169" font-weight="700">Aktiv</text>
      </g>
    </g>
  </g>

  <g transform="translate(60,580)" filter="url(#shC)">
    <rect width="980" height="100" rx="12" fill="#1e3a5f"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#fbbf24">Empfohlener Pfad fuer Neuprojekte (2026)</text>
    <text x="20" y="56" font-size="12" fill="#fff">AWS Transform for Mainframe als zentrale Plattform, mit Self-Managed Blu Age Runtime auf EC2/ECS.</text>
    <text x="20" y="74" font-size="11" fill="#cbd5e0">&#9656; Discovery + Refactor + Testing aus einem Workflow  &#9656; Reforge + Reimagine bei Bedarf  &#9656; IaC-Templates fuer Deployment</text>
    <text x="20" y="92" font-size="10" font-style="italic" fill="#94a3b8">Migration Hub bleibt nur fuer bestehende Kunden &#8211; AWS Transform ist der strategische Nachfolger.</text>
  </g>
</svg>
