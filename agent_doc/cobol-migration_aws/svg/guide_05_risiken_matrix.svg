<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="sh5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1100" height="760" fill="url(#bg5)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Die wichtigsten Risiken &#8211; und wie man sie minimiert</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Risiko-Matrix nach Wahrscheinlichkeit (X) und Impact (Y)</text>

  <!-- Matrix axes -->
  <g transform="translate(120,110)">
    <!-- Background quadrants -->
    <rect x="0" y="0" width="450" height="225" fill="#fefcbf" opacity="0.4"/>
    <rect x="450" y="0" width="450" height="225" fill="#fed7d7" opacity="0.5"/>
    <rect x="0" y="225" width="450" height="225" fill="#e6fffa" opacity="0.5"/>
    <rect x="450" y="225" width="450" height="225" fill="#fefcbf" opacity="0.4"/>

    <!-- Quadrant labels -->
    <text x="225" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#975a16">MONITOR</text>
    <text x="675" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#9b2c2c">MITIGATE NOW</text>
    <text x="225" y="445" text-anchor="middle" font-size="10" font-weight="700" fill="#234e52">ACCEPT</text>
    <text x="675" y="445" text-anchor="middle" font-size="10" font-weight="700" fill="#975a16">PREPARE</text>

    <!-- Axes -->
    <line x1="0" y1="450" x2="900" y2="450" stroke="#2d3748" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="450" stroke="#2d3748" stroke-width="2"/>
    <line x1="450" y1="0" x2="450" y2="450" stroke="#cbd5e0" stroke-dasharray="4,4"/>
    <line x1="0" y1="225" x2="900" y2="225" stroke="#cbd5e0" stroke-dasharray="4,4"/>

    <!-- Axis labels -->
    <text x="450" y="478" text-anchor="middle" font-size="12" font-weight="700" fill="#2d3748">Wahrscheinlichkeit &#8594;</text>
    <text x="-15" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#2d3748" transform="rotate(-90,-15,225)">&#8593; Impact</text>

    <text x="0" y="465" text-anchor="middle" font-size="9" fill="#718096">niedrig</text>
    <text x="900" y="465" text-anchor="middle" font-size="9" fill="#718096">sehr hoch</text>
    <text x="-10" y="450" text-anchor="end" font-size="9" fill="#718096">niedrig</text>
    <text x="-10" y="6" text-anchor="end" font-size="9" fill="#718096">sehr hoch</text>

    <!-- Risks as bubbles. Size = severity, position = (probability, impact) -->
    <g font-size="10" fill="#fff" font-weight="700">
      <!-- Hochwahrsch., sehr hoch impact -->
      <g>
        <circle cx="780" cy="35" r="32" fill="#9b2c2c" opacity="0.85"/>
        <text x="780" y="32" text-anchor="middle">Test-Aufwand</text>
        <text x="780" y="46" text-anchor="middle">unterschaetzt</text>
      </g>
      <g>
        <circle cx="700" cy="60" r="30" fill="#c53030" opacity="0.85"/>
        <text x="700" y="58" text-anchor="middle">Undok.</text>
        <text x="700" y="71" text-anchor="middle">Business-Logic</text>
      </g>
      <g>
        <circle cx="640" cy="100" r="28" fill="#c53030" opacity="0.85"/>
        <text x="640" y="98" text-anchor="middle">JOBOL</text>
        <text x="640" y="111" text-anchor="middle">(Refactor)</text>
      </g>
      <g>
        <circle cx="600" cy="160" r="26" fill="#dd6b20" opacity="0.85"/>
        <text x="600" y="158" text-anchor="middle">Big-Bang</text>
        <text x="600" y="170" text-anchor="middle">scheitert</text>
      </g>
      <g>
        <circle cx="680" cy="170" r="26" fill="#dd6b20" opacity="0.85"/>
        <text x="680" y="168" text-anchor="middle">Skill-</text>
        <text x="680" y="180" text-anchor="middle">Mangel</text>
      </g>
      <g>
        <circle cx="380" cy="80" r="26" fill="#dd6b20" opacity="0.85"/>
        <text x="380" y="78" text-anchor="middle">Daten-</text>
        <text x="380" y="91" text-anchor="middle">Inkonsistenz</text>
      </g>
      <g>
        <circle cx="560" cy="200" r="24" fill="#d69e2e" opacity="0.85"/>
        <text x="560" y="198" text-anchor="middle">Performance</text>
        <text x="560" y="210" text-anchor="middle">Probleme</text>
      </g>
      <g>
        <circle cx="500" cy="260" r="22" fill="#d69e2e" opacity="0.85"/>
        <text x="500" y="258" text-anchor="middle">Operations-</text>
        <text x="500" y="270" text-anchor="middle">Modell</text>
      </g>
      <g>
        <circle cx="320" cy="120" r="22" fill="#d69e2e" opacity="0.85"/>
        <text x="320" y="118" text-anchor="middle">Compliance-</text>
        <text x="320" y="130" text-anchor="middle">Verletzung</text>
      </g>
      <g>
        <circle cx="800" cy="280" r="22" fill="#319795" opacity="0.85"/>
        <text x="800" y="278" text-anchor="middle">Vendor</text>
        <text x="800" y="290" text-anchor="middle">Lock-in</text>
      </g>
    </g>
  </g>

  <!-- Mitigation legend -->
  <g transform="translate(60,610)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">Top-Mitigationen</text>
    <g transform="translate(0,15)" filter="url(#sh5)">
      <rect width="320" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#9b2c2c">Test-Aufwand &amp; Daten-Inkonsistenz</text>
      <text x="14" y="38" font-size="10" fill="#4a5568">&#8226; 50&#8211;70 % Projektzeit fuer Testing planen</text>
      <text x="14" y="52" font-size="10" fill="#4a5568">&#8226; AWS Transform Test Automation</text>
      <text x="14" y="66" font-size="10" fill="#4a5568">&#8226; Functional Equivalence Testing</text>
      <text x="14" y="80" font-size="10" fill="#4a5568">&#8226; Dual-Run vor Cutover</text>
      <text x="14" y="94" font-size="10" fill="#4a5568">&#8226; Golden Master Datasets</text>
      <text x="14" y="108" font-size="10" fill="#4a5568">&#8226; Continuous Regression in CI/CD</text>
    </g>
    <g transform="translate(340,15)" filter="url(#sh5)">
      <rect width="320" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#dd6b20">JOBOL &amp; Big-Bang</text>
      <text x="14" y="38" font-size="10" fill="#4a5568">&#8226; Strangler Fig Pattern (Pflicht)</text>
      <text x="14" y="52" font-size="10" fill="#4a5568">&#8226; AWS Transform Reforge fuer JOBOL</text>
      <text x="14" y="66" font-size="10" fill="#4a5568">&#8226; Wave Planning, Pilot zuerst</text>
      <text x="14" y="80" font-size="10" fill="#4a5568">&#8226; Code-Reviews durch Java-Senior</text>
      <text x="14" y="94" font-size="10" fill="#4a5568">&#8226; Kein Rollout ohne Pilot-Erfahrung</text>
      <text x="14" y="108" font-size="10" fill="#4a5568">&#8226; Scope-Schutz durch Charter</text>
    </g>
    <g transform="translate(680,15)" filter="url(#sh5)">
      <rect width="360" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#805ad5">Skill-Mangel &amp; Operations</text>
      <text x="14" y="38" font-size="10" fill="#4a5568">&#8226; Pair Programming COBOL &#8596; Java</text>
      <text x="14" y="52" font-size="10" fill="#4a5568">&#8226; Schulungen, Mentoring-Programme</text>
      <text x="14" y="66" font-size="10" fill="#4a5568">&#8226; DevOps/SRE-Aufbau parallel zur Migration</text>
      <text x="14" y="80" font-size="10" fill="#4a5568">&#8226; IaC + Observability von Tag 1</text>
      <text x="14" y="94" font-size="10" fill="#4a5568">&#8226; Externe Hilfe einplanen (Implementation Partner)</text>
      <text x="14" y="108" font-size="10" fill="#4a5568">&#8226; Change Management fuer Teams</text>
    </g>
  </g>
</svg>
