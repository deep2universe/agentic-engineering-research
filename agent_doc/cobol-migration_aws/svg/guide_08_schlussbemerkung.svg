<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="sh8" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1100" height="620" fill="url(#bg8)"/>

  <text x="550" y="56" text-anchor="middle" font-size="28" font-weight="800" fill="#f1f5f9">Schlussbemerkung</text>
  <text x="550" y="84" text-anchor="middle" font-size="14" fill="#94a3b8">Die wichtigsten Wahrheiten ueber COBOL-Migrationen 2026</text>

  <!-- Center: Three pillars -->
  <g transform="translate(60,140)">
    <!-- Pillar 1: Tools -->
    <g transform="translate(0,0)" filter="url(#sh8)">
      <rect width="300" height="220" rx="12" fill="#1e3a5f"/>
      <rect width="300" height="6" rx="3" fill="#fbbf24"/>
      <text x="150" y="50" text-anchor="middle" font-size="36">&#9881;</text>
      <text x="150" y="92" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Tools</text>
      <line x1="40" y1="105" x2="260" y2="105" stroke="#475569" stroke-width="1"/>
      <text x="150" y="130" text-anchor="middle" font-size="11" fill="#cbd5e1">AWS Transform &amp; Blu Age,</text>
      <text x="150" y="146" text-anchor="middle" font-size="11" fill="#cbd5e1">Reforge, Reimagine, Testing</text>
      <text x="150" y="162" text-anchor="middle" font-size="11" fill="#cbd5e1">Automation</text>
      <text x="150" y="195" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">Sind nur ein Teil</text>
      <text x="150" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">der Loesung.</text>
    </g>

    <!-- Pillar 2: Hard Problems -->
    <g transform="translate(340,0)" filter="url(#sh8)">
      <rect width="300" height="220" rx="12" fill="#7c2d12"/>
      <rect width="300" height="6" rx="3" fill="#fbbf24"/>
      <text x="150" y="50" text-anchor="middle" font-size="36">&#9888;</text>
      <text x="150" y="92" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Die harten Probleme</text>
      <line x1="40" y1="105" x2="260" y2="105" stroke="#a16207" stroke-width="1"/>
      <text x="150" y="130" text-anchor="middle" font-size="11" fill="#fed7aa">Menschen.</text>
      <text x="150" y="146" text-anchor="middle" font-size="11" fill="#fed7aa">Prozesse.</text>
      <text x="150" y="162" text-anchor="middle" font-size="11" fill="#fed7aa">Daten.</text>
      <text x="150" y="195" text-anchor="middle" font-size="11" font-style="italic" fill="#fdba74">Loesen keine KI</text>
      <text x="150" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#fdba74">und keine Plattform.</text>
    </g>

    <!-- Pillar 3: Erfolgsfaktor -->
    <g transform="translate(680,0)" filter="url(#sh8)">
      <rect width="300" height="220" rx="12" fill="#4c1d95"/>
      <rect width="300" height="6" rx="3" fill="#fbbf24"/>
      <text x="150" y="50" text-anchor="middle" font-size="36">&#9733;</text>
      <text x="150" y="92" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Erfolgsfaktor</text>
      <line x1="40" y1="105" x2="260" y2="105" stroke="#7c3aed" stroke-width="1"/>
      <text x="150" y="130" text-anchor="middle" font-size="11" fill="#ddd6fe">Senior Architekten und</text>
      <text x="150" y="146" text-anchor="middle" font-size="11" fill="#ddd6fe">Senior Developer mit tiefem</text>
      <text x="150" y="162" text-anchor="middle" font-size="11" fill="#ddd6fe">Verstaendnis beider Welten</text>
      <text x="150" y="195" text-anchor="middle" font-size="11" font-style="italic" fill="#c4b5fd">Der Mensch bleibt</text>
      <text x="150" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#c4b5fd">unverzichtbar.</text>
    </g>
  </g>

  <!-- Bottom Quote Banner -->
  <g transform="translate(60,400)" filter="url(#sh8)">
    <rect width="980" height="170" rx="14" fill="#0f172a" stroke="url(#goldGrad)" stroke-width="2"/>
    <text x="40" y="56" font-size="32" fill="#fbbf24">&#8220;</text>
    <text x="490" y="68" text-anchor="middle" font-size="18" font-weight="700" font-style="italic" fill="#f1f5f9">Tools sind nur ein Teil der Loesung. Die wirklich harten Probleme</text>
    <text x="490" y="92" text-anchor="middle" font-size="18" font-weight="700" font-style="italic" fill="#f1f5f9">sind Menschen, Prozesse und Daten &#8211;</text>
    <text x="490" y="116" text-anchor="middle" font-size="18" font-weight="700" font-style="italic" fill="#fbbf24">und die loesen keine KI und keine Plattform alleine.</text>
    <text x="940" y="138" text-anchor="end" font-size="32" fill="#fbbf24">&#8221;</text>
    <text x="490" y="150" text-anchor="middle" font-size="11" fill="#94a3b8">COBOL-Migration ist eines der komplexesten IT-Projekte ueberhaupt &#8211; und mit dem richtigen Mindset machbar.</text>
  </g>
</svg>
