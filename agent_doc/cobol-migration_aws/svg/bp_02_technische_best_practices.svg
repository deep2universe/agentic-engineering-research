<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgBP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shBP2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1100" height="800" fill="url(#bgBP2)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Technische Best Practices &#8211; die heiklen Themen</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Datentypen, EBCDIC, JCL, CICS, VSAM, Copybooks &#8211; jeder Bereich mit Fallstricken</text>

  <!-- COBOL Type mapping -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">2.1 PIC-Klauseln &#8594; Java &#8211; das technisch heikelste Thema</text>

    <g transform="translate(0,15)" filter="url(#shBP2)">
      <rect width="475" height="320" rx="10" fill="#fff" stroke="#cbd5e0"/>

      <rect width="475" height="32" fill="#2d3748"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#fff">COBOL PIC</text>
      <text x="170" y="20" font-size="11" font-weight="700" fill="#fff">Java-Mapping</text>
      <text x="320" y="20" font-size="11" font-weight="700" fill="#fff">Anmerkung</text>

      <g font-size="10" font-family="Menlo,monospace">
        <g transform="translate(0,32)">
          <rect width="475" height="32" fill="#f7fafc"/>
          <text x="14" y="20" fill="#2d3748">PIC X(n)</text>
          <text x="170" y="20" fill="#2c5282">String</text>
          <text x="320" y="20" font-family="-apple-system" fill="#4a5568">Padding mit Spaces</text>
        </g>
        <g transform="translate(0,64)">
          <rect width="475" height="32" fill="#fff"/>
          <text x="14" y="20" fill="#2d3748">PIC 9(n)</text>
          <text x="170" y="20" fill="#2c5282">int / long / BigInteger</text>
          <text x="320" y="20" font-family="-apple-system" fill="#4a5568">Je nach Groesse</text>
        </g>
        <g transform="translate(0,96)">
          <rect width="475" height="32" fill="#f7fafc"/>
          <text x="14" y="20" fill="#2d3748">PIC S9(n)</text>
          <text x="170" y="20" fill="#2c5282">int / long / BigDecimal</text>
          <text x="320" y="20" font-family="-apple-system" fill="#4a5568">Sign-Handling beachten</text>
        </g>
        <g transform="translate(0,128)">
          <rect width="475" height="32" fill="#fff"/>
          <text x="14" y="20" fill="#2d3748">PIC 9(n)V9(m)</text>
          <text x="170" y="20" fill="#2c5282">BigDecimal</text>
          <text x="320" y="20" font-family="-apple-system" fill="#4a5568">Skalierung wichtig</text>
        </g>
        <g transform="translate(0,160)">
          <rect width="475" height="32" fill="#fff5f5"/>
          <text x="14" y="20" fill="#9b2c2c" font-weight="700">PIC S9(n) COMP-3</text>
          <text x="170" y="20" fill="#9b2c2c" font-weight="700">BigDecimal</text>
          <text x="320" y="20" font-family="-apple-system" font-size="11" font-weight="700" fill="#9b2c2c">SEHR KRITISCH!</text>
        </g>
        <g transform="translate(0,192)">
          <rect width="475" height="32" fill="#fff"/>
          <text x="14" y="20" fill="#2d3748">PIC S9(n) COMP</text>
          <text x="170" y="20" fill="#2c5282">int / long</text>
          <text x="320" y="20" font-family="-apple-system" fill="#4a5568">Endianness pruefen</text>
        </g>
      </g>

      <g transform="translate(20,240)" font-size="10" fill="#4a5568">
        <text font-weight="700" fill="#9b2c2c">COMP-3 (Packed Decimal) &#8211; der gefaehrlichste Datentyp</text>
        <text y="14">&#9656; Jede Ziffer in einem halben Byte (Nibble), Vorzeichen im letzten Nibble</text>
        <text y="28">&#9656; "+12345" = 12 34 5C (3 Bytes; C = positiv, D = negativ, F = unsigned)</text>
        <text y="42">&#9656; Darf nicht als ASCII/EBCDIC umkodiert werden &#8211; muss byte-genau bleiben</text>
        <text y="56">&#9656; BigDecimal ist deutlich langsamer als primitive Typen &#8594; Performance pruefen</text>
      </g>
    </g>
  </g>

  <!-- EBCDIC + JCL right column -->
  <g transform="translate(565,115)">
    <g filter="url(#shBP2)">
      <rect width="475" height="155" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="155" fill="#dd6b20"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#dd6b20">2.2 EBCDIC zu UTF-8 &#8211; nicht trivial</text>
      <g font-size="11" fill="#4a5568">
        <text x="22" y="50">&#9656; <tspan font-weight="700">Mixed-Mode-Records</tspan>: Text + Binary in einer Datei</text>
        <text x="22" y="66">&#9656; <tspan font-weight="700">Code Page Varianten</tspan>: CP037 US, CP1141 DE, CP1147 FR</text>
        <text x="22" y="82">&#9656; <tspan font-weight="700">Sign Handling</tspan>: Zoned Decimal-Vorzeichen im letzten Nibble</text>
        <text x="22" y="98">&#9656; <tspan font-weight="700">Newline-Handling</tspan>: feste Record-Laengen statt Trennzeichen</text>
      </g>
      <text x="22" y="124" font-size="10" font-style="italic" fill="#dd6b20">Niemals pauschale iconv-Konvertierung &#8211; Copybook-getrieben!</text>
      <text x="22" y="140" font-size="10" font-style="italic" fill="#dd6b20">Bit-genaue Vergleiche zwischen Quelle und Ziel</text>
    </g>

    <g transform="translate(0,170)" filter="url(#shBP2)">
      <rect width="475" height="155" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="155" fill="#38a169"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#38a169">2.3 JCL nach modernen Frameworks</text>

      <g font-size="10" font-family="Menlo,monospace" fill="#2d3748">
        <text x="22" y="48">JOB         &#8594; Groovy-Skript / Spring Batch Job</text>
        <text x="22" y="62">EXEC PGM=   &#8594; Java-Methodenaufruf / Spring Step</text>
        <text x="22" y="76">DD-Statement &#8594; Properties / S3 / Filesystem</text>
        <text x="22" y="90">IF-THEN-ELSE &#8594; Groovy-Logik / Decision</text>
        <text x="22" y="104">SORT/MERGE  &#8594; Java-Streams / DB-Operations</text>
      </g>
      <text x="22" y="130" font-size="10" font-style="italic" fill="#38a169">Step-Restartability und Checkpointing kritisch &#8211; Spring Batch unterstuetzt das.</text>
    </g>
  </g>

  <!-- Bottom: CICS, VSAM, Copybooks -->
  <g transform="translate(60,460)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#1a202c">CICS, VSAM und Copybook-Handling</text>

    <g transform="translate(0,15)" filter="url(#shBP2)">
      <rect width="320" height="320" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="320" fill="#2c5282"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#2c5282">2.4 CICS &#8594; Web Services</text>

      <g font-size="10" font-family="Menlo,monospace" fill="#2d3748">
        <text x="22" y="56" fill="#9b2c2c">TRANSID: PAY1</text>
        <text x="22" y="72" fill="#9b2c2c">BMS Map: PAYSCRN</text>
        <text x="22" y="88" fill="#9b2c2c">COBOL: PAYPGM01</text>
        <text x="22" y="104" fill="#9b2c2c">COMMAREA: 2048 Bytes</text>
        <text x="180" y="64" font-family="-apple-system" font-size="14" font-weight="700" fill="#dd6b20">&#8594;</text>
        <text x="200" y="56" fill="#2c5282">POST /api/payments</text>
        <text x="200" y="72" fill="#2c5282">JSON Body</text>
        <text x="200" y="88" fill="#2c5282">@RestController</text>
        <text x="200" y="104" fill="#2c5282">DTO-Klassen</text>
      </g>

      <text x="22" y="140" font-size="11" font-weight="700" fill="#2c5282">Best Practices</text>
      <g font-size="10" fill="#4a5568">
        <text x="22" y="158">&#9656; REST-First &#8211; jede Transaktion = Endpoint</text>
        <text x="22" y="174">&#9656; DTO-Mapping fuer COMMAREA</text>
        <text x="22" y="190">&#9656; Stateless Design (CICS Pseudo-Conv)</text>
        <text x="22" y="206">&#9656; API Gateway als Strangler Facade</text>
        <text x="22" y="222">&#9656; Frontend-Entkopplung Angular/React</text>
      </g>

      <text x="22" y="252" font-size="10" font-style="italic" fill="#718096">CICS-Pseudo-Conversational-Design</text>
      <text x="22" y="266" font-size="10" font-style="italic" fill="#718096">passt natuerlich gut zu REST.</text>
    </g>

    <g transform="translate(335,15)" filter="url(#shBP2)">
      <rect width="320" height="320" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="320" fill="#805ad5"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#805ad5">2.5 VSAM &#8594; RDBMS / NoSQL</text>

      <g font-size="11" fill="#2d3748">
        <g transform="translate(22,46)">
          <text font-weight="700" fill="#805ad5">KSDS</text>
          <text x="60" font-size="10" fill="#4a5568">&#8594; PostgreSQL oder DynamoDB</text>
        </g>
        <g transform="translate(22,68)">
          <text font-weight="700" fill="#805ad5">ESDS</text>
          <text x="60" font-size="10" fill="#4a5568">&#8594; S3, Append-Only Tables</text>
        </g>
        <g transform="translate(22,90)">
          <text font-weight="700" fill="#805ad5">RRDS</text>
          <text x="60" font-size="10" fill="#4a5568">&#8594; RDBMS mit synthetischem Key</text>
        </g>
        <g transform="translate(22,112)">
          <text font-weight="700" fill="#805ad5">LDS</text>
          <text x="60" font-size="10" fill="#4a5568">&#8594; EBS Volume, S3</text>
        </g>
      </g>

      <text x="22" y="148" font-size="11" font-weight="700" fill="#805ad5">AWS-Loesungen</text>
      <g font-size="10" fill="#4a5568">
        <text x="22" y="166">&#9656; <tspan font-weight="700">Blusam</tspan> &#8211; PostgreSQL-VSAM-Emulation</text>
        <text x="22" y="180">&#9656; Direkte RDBMS-Migration via Domain</text>
        <text x="22" y="194">&#9656; Hybrid: KSDS &#8594; DynamoDB, ESDS &#8594; S3</text>
      </g>

      <text x="22" y="222" font-size="11" font-weight="700" fill="#9b2c2c">Fallstricke</text>
      <g font-size="10" fill="#4a5568">
        <text x="22" y="240">&#9656; Alternate Indexes auf RDBMS mappen</text>
        <text x="22" y="254">&#9656; Locking-Semantik Record vs. Row</text>
        <text x="22" y="268">&#9656; Reorganisation entfaellt &#8594; Performance</text>
        <text x="22" y="284">&#9656; Batch-Performance kann anders sein</text>
      </g>
    </g>

    <g transform="translate(670,15)" filter="url(#shBP2)">
      <rect width="315" height="320" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="320" fill="#dd6b20"/>
      <text x="22" y="28" font-size="13" font-weight="700" fill="#dd6b20">2.6 Copybook-Handling</text>

      <g font-size="10" fill="#4a5568">
        <text x="22" y="56" font-weight="700" fill="#dd6b20">Vollstaendigkeit pruefen</text>
        <text x="22" y="72">Vor Migration sicherstellen, dass alle</text>
        <text x="22" y="86">referenzierten Copybooks verfuegbar sind.</text>

        <text x="22" y="110" font-weight="700" fill="#dd6b20">Versionierung</text>
        <text x="22" y="126">Verschiedene Programme nutzen oft</text>
        <text x="22" y="140">unterschiedliche Versionen &#8211; konsolidieren.</text>

        <text x="22" y="164" font-weight="700" fill="#dd6b20">Generic Records</text>
        <text x="22" y="180">PIC X(8000) erfordert Business-Logik-</text>
        <text x="22" y="194">Analyse fuer wirkliche Struktur.</text>

        <text x="22" y="218" font-weight="700" fill="#dd6b20">REPLACING-Klauseln</text>
        <text x="22" y="234">COPY ... REPLACING ersetzt zur Compile-</text>
        <text x="22" y="248">zeit Strings &#8211; erschwert statische Analyse.</text>
      </g>

      <text x="22" y="282" font-size="10" font-style="italic" fill="#dd6b20">Fehlende Copybooks = fehlende</text>
      <text x="22" y="296" font-size="10" font-style="italic" fill="#dd6b20">Typinformationen &#8594; unvollstaendige</text>
      <text x="22" y="310" font-size="10" font-style="italic" fill="#dd6b20">Transformation.</text>
    </g>
  </g>
</svg>
