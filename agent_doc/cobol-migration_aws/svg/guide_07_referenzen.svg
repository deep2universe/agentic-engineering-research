      <rect width="475" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="120" fill="#ed8936"/>
      <text x="22" y="32" font-size="13" font-weight="700" fill="#1a202c">AWS Mainframe Modernization</text>
      <text x="22" y="50" font-size="11" font-family="Menlo,monospace" fill="#dd6b20">aws.amazon.com/mainframe-modernization</text>
      <text x="22" y="74" font-size="10" fill="#4a5568">Service-Hauptseite mit Ueberblick zu Blu Age,</text>
      <text x="22" y="88" font-size="10" fill="#4a5568">Rocket Software, Pricing und Use Cases.</text>
      <text x="22" y="106" font-size="10" font-style="italic" fill="#718096">Einstieg fuer Architekten</text>
    </g>
    <g transform="translate(505,0)" filter="url(#sh7)">
      <rect width="475" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="120" fill="#ed8936"/>
      <text x="22" y="32" font-size="13" font-weight="700" fill="#1a202c">AWS Transform fuer Mainframe</text>
      <text x="22" y="50" font-size="11" font-family="Menlo,monospace" fill="#dd6b20">aws.amazon.com/transform/mainframe</text>
      <text x="22" y="74" font-size="10" fill="#4a5568">Strategischer Migrationspfad mit Agentic AI &#8211;</text>
      <text x="22" y="88" font-size="10" fill="#4a5568">Refactor, Reforge und Reimagine Capabilities.</text>
      <text x="22" y="106" font-size="10" font-style="italic" fill="#718096">Pflichtlektuere fuer Neuprojekte</text>
    </g>
  </g>

  <g transform="translate(60,250)">
    <g filter="url(#sh7)">
      <rect width="475" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="120" fill="#3182ce"/>
      <text x="22" y="32" font-size="13" font-weight="700" fill="#1a202c">AWS Blu Age Documentation</text>
      <text x="22" y="50" font-size="11" font-family="Menlo,monospace" fill="#2c5282">docs.aws.amazon.com/m2/latest/userguide/</text>
      <text x="22" y="74" font-size="10" fill="#4a5568">Vollstaendige Dokumentation der Blu Age</text>
      <text x="22" y="88" font-size="10" fill="#4a5568">Transformation Engine und Runtime.</text>
      <text x="22" y="106" font-size="10" font-style="italic" fill="#718096">Tiefe technische Referenz</text>
    </g>
    <g transform="translate(505,0)" filter="url(#sh7)">
      <rect width="475" height="120" rx="10" fill="#fff" stroke="#cbd5e0"/>
      <rect width="6" height="120" fill="#38a169"/>
      <text x="22" y="32" font-size="13" font-weight="700" fill="#1a202c">CardDemo Reference Application</text>
      <text x="22" y="50" font-size="11" font-family="Menlo,monospace" fill="#2f855a">github.com/aws-samples/aws-mainframe-modernization-carddemo</text>
      <text x="22" y="74" font-size="10" fill="#4a5568">Vollstaendige COBOL-Referenz-App fuer</text>
      <text x="22" y="88" font-size="10" fill="#4a5568">Hands-on-Tutorials und Workshops.</text>
