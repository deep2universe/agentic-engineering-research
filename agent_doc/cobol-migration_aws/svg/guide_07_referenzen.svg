  <text x="550" y="535" text-anchor="middle" font-size="11" fill="#718096">Vollstaendige Quellenliste mit URLs, Zusammenfassungen und Datum: <tspan font-family="Menlo,monospace" fill="#2d3748">_quellen.md</tspan></text>
