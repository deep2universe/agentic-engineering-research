      <rect width="6" height="100" fill="#805ad5"/>
      <text x="22" y="32" font-size="13" font-weight="700" fill="#1a202c">AWS Mainframe Modernization Blog</text>
      <text x="22" y="50" font-size="11" font-family="Menlo,monospace" fill="#553c9a">aws.amazon.com/blogs/migration-and-modernization/</text>
