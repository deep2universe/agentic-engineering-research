<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="sh7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1100" height="560" fill="url(#bg7)"/>

  <text x="550" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Wichtige offizielle AWS-Referenzen</text>
  <text x="550" y="66" text-anchor="middle" font-size="13" fill="#4a5568">Ausgangspunkte fuer eigene Recherche &#8211; alle Quellen sind in _quellen.md gepflegt</text>

  <!-- Reference cards -->
  <g transform="translate(60,110)">
