<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgTL19" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <filter id="shTL19" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="580" fill="url(#bgTL19)"/>

  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Zusammenfassung &#8211; Markt 2026</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#4a5568">Fuenf Erkenntnisse fuer Senior Architekten aus dem Tool-Vergleich</text>

  <g transform="translate(60,110)">
    <g filter="url(#shTL19)">
      <rect width="195" height="380" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="195" height="50" rx="12" fill="#dd6b20"/>
      <rect y="38" width="195" height="12" fill="#dd6b20"/>
      <text x="98" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">01</text>
      <text x="98" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">Hyperscaler</text>
      <text x="98" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">sind in Front</text>
      <line x1="14" y1="108" x2="180" y2="108" stroke="#cbd5e0"/>
      <text x="14" y="132" font-size="10" fill="#4a5568">AWS Transform, Google</text>
      <text x="14" y="146" font-size="10" fill="#4a5568">Cloud Dual Run und das</text>
      <text x="14" y="160" font-size="10" fill="#4a5568">Azure-Partner-Modell</text>
      <text x="14" y="174" font-size="10" fill="#4a5568">dominieren den Diskurs.</text>
      <text x="14" y="208" font-size="10" font-style="italic" fill="#dd6b20">Eigene KI-Plattformen</text>
      <text x="14" y="222" font-size="10" font-style="italic" fill="#dd6b20">+ Partner-Oekosysteme</text>
    </g>

    <g transform="translate(205,0)" filter="url(#shTL19)">
      <rect width="195" height="380" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="195" height="50" rx="12" fill="#0f62fe"/>
      <rect y="38" width="195" height="12" fill="#0f62fe"/>
      <text x="98" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">02</text>
      <text x="98" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">IBM bleibt</text>
      <text x="98" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">relevant</text>
      <line x1="14" y1="108" x2="180" y2="108" stroke="#cbd5e0"/>
      <text x="14" y="132" font-size="10" fill="#4a5568">watsonx Code Assistant</text>
      <text x="14" y="146" font-size="10" fill="#4a5568">for Z fuer Kunden, die im</text>
      <text x="14" y="160" font-size="10" fill="#4a5568">IBM-Oekosystem bleiben</text>
      <text x="14" y="174" font-size="10" fill="#4a5568">moechten oder muessen.</text>
      <text x="14" y="208" font-size="10" font-style="italic" fill="#0f62fe">Project Bob (2026 GA)</text>
      <text x="14" y="222" font-size="10" font-style="italic" fill="#0f62fe">als Antwort auf Transform</text>
    </g>

    <g transform="translate(410,0)" filter="url(#shTL19)">
      <rect width="195" height="380" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="195" height="50" rx="12" fill="#319795"/>
      <rect y="38" width="195" height="12" fill="#319795"/>
      <text x="98" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">03</text>
      <text x="98" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">Spezialisten haben</text>
      <text x="98" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">ihre Nischen</text>
      <line x1="14" y1="108" x2="180" y2="108" stroke="#cbd5e0"/>
      <text x="14" y="132" font-size="10" fill="#4a5568">Heirloom (JVM)</text>
      <text x="14" y="146" font-size="10" fill="#4a5568">Raincode (.NET)</text>
      <text x="14" y="160" font-size="10" fill="#4a5568">OpenLegacy (API)</text>
      <text x="14" y="174" font-size="10" fill="#4a5568">SoftwareMining</text>
      <text x="14" y="188" font-size="10" fill="#4a5568">(Determinismus)</text>
      <text x="14" y="222" font-size="10" font-style="italic" fill="#319795">Kein One-Size-Fits-All</text>
    </g>

    <g transform="translate(615,0)" filter="url(#shTL19)">
      <rect width="195" height="380" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="195" height="50" rx="12" fill="#9b2c2c"/>
      <rect y="38" width="195" height="12" fill="#9b2c2c"/>
      <text x="98" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">04</text>
      <text x="98" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">GenAI ist</text>
      <text x="98" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">ergaenzend</text>
      <line x1="14" y1="108" x2="180" y2="108" stroke="#cbd5e0"/>
      <text x="14" y="132" font-size="10" fill="#4a5568">LLMs sind wertvoll als</text>
      <text x="14" y="146" font-size="10" fill="#4a5568">Augmentation, aber nicht</text>
      <text x="14" y="160" font-size="10" fill="#4a5568">als alleinige Loesung.</text>
      <text x="14" y="174" font-size="10" fill="#4a5568">Probabilistisch, kein</text>
      <text x="14" y="188" font-size="10" fill="#4a5568">echtes Reasoning.</text>
      <text x="14" y="222" font-size="10" font-style="italic" fill="#9b2c2c">Mit Orchestrierung</text>
    </g>

    <g transform="translate(820,0)" filter="url(#shTL19)">
      <rect width="195" height="380" rx="12" fill="#fff" stroke="#cbd5e0"/>
      <rect width="195" height="50" rx="12" fill="#805ad5"/>
      <rect y="38" width="195" height="12" fill="#805ad5"/>
      <text x="98" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">05</text>
      <text x="98" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">Multi-Tool-Strategien</text>
      <text x="98" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">sind die Norm</text>
      <line x1="14" y1="108" x2="180" y2="108" stroke="#cbd5e0"/>
      <text x="14" y="132" font-size="10" fill="#4a5568">Grosse Migrationen</text>
      <text x="14" y="146" font-size="10" fill="#4a5568">kombinieren mehrere</text>
      <text x="14" y="160" font-size="10" fill="#4a5568">Tools fuer unterschiedliche</text>
      <text x="14" y="174" font-size="10" fill="#4a5568">Aufgaben (Discovery,</text>
      <text x="14" y="188" font-size="10" fill="#4a5568">Refactor, Testing, Bridge).</text>
      <text x="14" y="222" font-size="10" font-style="italic" fill="#805ad5">3&#8211;5 Tools parallel</text>
    </g>
  </g>

  <g transform="translate(60,520)" filter="url(#shTL19)">
    <rect width="980" height="50" rx="10" fill="#1e3a5f"/>
    <text x="490" y="32" text-anchor="middle" font-size="13" font-style="italic" fill="#fbbf24">"Die richtige Tool-Wahl haengt von Zielarchitektur, Risikoprofil, Budget, Zeitrahmen und strategischer Cloud-Ausrichtung ab."</text>
  </g>
</svg>
