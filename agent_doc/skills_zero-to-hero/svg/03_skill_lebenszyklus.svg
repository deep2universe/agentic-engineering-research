<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="ar03" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <filter id="s03"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1100" height="450" fill="url(#bg03)" rx="16"/>
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Skill-Lebenszyklus — Von Discovery bis Return</text>
  <line x1="310" y1="48" x2="790" y2="48" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Phase 1: Discovery -->
  <g filter="s03" transform="translate(40, 80)">
    <rect width="230" height="200" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="42" rx="14" fill="#064e3b"/>
    <text x="115" y="28" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">Phase 1: Discovery</text>
    <text x="115" y="68" text-anchor="middle" fill="#6ee7b7" font-size="22">🔍</text>
    <text x="20" y="100" fill="#94a3b8" font-size="11">Agent startet Session</text>
    <text x="20" y="120" fill="#94a3b8" font-size="11">→ Liest YAML Frontmatter</text>
    <text x="20" y="140" fill="#94a3b8" font-size="11">→ Nur name + description</text>
    <rect x="20" y="155" width="190" height="30" rx="6" fill="#0f172a" stroke="#065f46" stroke-width="1"/>
    <text x="115" y="174" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">~100 Token / Skill</text>
  </g>

  <!-- Arrow 1-2 -->
  <line x1="275" y1="180" x2="315" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ar03)"/>

  <!-- Phase 2: Activation -->
  <g filter="s03" transform="translate(320, 80)">
    <rect width="230" height="200" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="42" rx="14" fill="#451a03"/>
    <text x="115" y="28" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">Phase 2: Activation</text>
    <text x="115" y="68" text-anchor="middle" fill="#fbbf24" font-size="22">⚡</text>
    <text x="20" y="100" fill="#94a3b8" font-size="11">User-Anfrage matcht</text>
    <text x="20" y="120" fill="#94a3b8" font-size="11">→ SKILL.md Body geladen</text>
    <text x="20" y="140" fill="#94a3b8" font-size="11">→ Vollständige Anweisungen</text>
    <rect x="20" y="155" width="190" height="30" rx="6" fill="#0f172a" stroke="#78350f" stroke-width="1"/>
    <text x="115" y="174" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">&lt;5.000 Token</text>
  </g>

  <!-- Arrow 2-3 -->
  <line x1="555" y1="180" x2="595" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ar03)"/>

  <!-- Phase 3: Execution -->
  <g filter="s03" transform="translate(600, 80)">
    <rect width="230" height="200" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="42" rx="14" fill="#312e81"/>
    <text x="115" y="28" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">Phase 3: Execution</text>
    <text x="115" y="68" text-anchor="middle" fill="#c4b5fd" font-size="22">🚀</text>
    <text x="20" y="100" fill="#94a3b8" font-size="11">Agent führt Anweisungen aus</text>
    <text x="20" y="120" fill="#94a3b8" font-size="11">→ Referenz-Dateien lesen</text>
    <text x="20" y="140" fill="#94a3b8" font-size="11">→ Skripte ausführen</text>
    <text x="20" y="160" fill="#94a3b8" font-size="11">→ Tools aufrufen</text>
    <rect x="20" y="170" width="190" height="18" rx="4" fill="#0f172a"/>
    <text x="115" y="183" text-anchor="middle" fill="#64748b" font-size="9">Unbegrenzter Ressourcen-Zugriff</text>
  </g>

  <!-- Arrow 3-4 -->
  <line x1="835" y1="180" x2="875" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ar03)"/>

  <!-- Phase 4: Return -->
  <g filter="s03" transform="translate(880, 80)">
    <rect width="180" height="200" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="42" rx="14" fill="#0c4a6e"/>
    <text x="90" y="28" text-anchor="middle" fill="#67e8f9" font-size="14" font-weight="700">Phase 4: Return</text>
    <text x="90" y="68" text-anchor="middle" fill="#67e8f9" font-size="22">✅</text>
    <text x="15" y="100" fill="#94a3b8" font-size="11">context: fork →</text>
    <text x="15" y="116" fill="#94a3b8" font-size="11">Zusammenfassung</text>
    <text x="15" y="140" fill="#94a3b8" font-size="11">inline →</text>
    <text x="15" y="156" fill="#94a3b8" font-size="11">Direkt sichtbar</text>
  </g>

  <!-- Bottom: Content-Typen -->
  <g filter="s03" transform="translate(40, 310)">
    <rect width="1020" height="120" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="510" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Content-Typen und Token-Effizienz</text>

    <g transform="translate(30, 45)">
      <rect width="300" height="60" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
      <text x="15" y="22" fill="#6ee7b7" font-size="12" font-weight="700">Instructions</text>
      <text x="15" y="40" fill="#94a3b8" font-size="10">Markdown-Anweisungen</text>
      <text x="15" y="54" fill="#64748b" font-size="9">Direkte Token-Kosten im Context Window</text>
    </g>
    <g transform="translate(360, 45)">
      <rect width="300" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
      <text x="15" y="22" fill="#fbbf24" font-size="12" font-weight="700">Code (Scripts)</text>
      <text x="15" y="40" fill="#94a3b8" font-size="10">Python, Shell, JS — ausführbar</text>
      <text x="15" y="54" fill="#64748b" font-size="9">Nur Output verbraucht Token</text>
    </g>
    <g transform="translate(690, 45)">
      <rect width="300" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="15" y="22" fill="#c4b5fd" font-size="12" font-weight="700">Resources</text>
      <text x="15" y="40" fill="#94a3b8" font-size="10">Schemas, API-Docs, Templates</text>
      <text x="15" y="54" fill="#64748b" font-size="9">Keine Kosten bis tatsächlich gelesen</text>
    </g>
  </g>
</svg>