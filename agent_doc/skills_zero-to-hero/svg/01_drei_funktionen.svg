<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg01c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="s01c"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1100" height="420" fill="url(#bg01c)" rx="16"/>
  <text x="550" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Die drei Funktionen eines Skills</text>
  <line x1="350" y1="50" x2="750" y2="50" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Function 1: Wissensvermittlung -->
  <g filter="s01c" transform="translate(40, 75)">
    <rect width="320" height="310" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="50" rx="14" fill="#451a03"/>
    <circle cx="35" cy="25" r="18" fill="#78350f" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="35" y="30" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">1</text>
    <text x="170" y="30" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">Wissensvermittlung</text>
    <text x="160" y="72" text-anchor="middle" fill="#fcd34d" font-size="12" font-style="italic">Reference Content</text>

    <!-- Book metaphor -->
    <g transform="translate(100, 95)">
      <rect x="0" y="0" width="120" height="80" rx="4" fill="#292524" stroke="#78350f" stroke-width="1.5"/>
      <rect x="5" y="5" width="110" height="70" rx="2" fill="#1c1917"/>
      <line x1="60" y1="10" x2="60" y2="70" stroke="#78350f" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="30" y="30" text-anchor="middle" fill="#d97706" font-size="8">API</text>
      <text x="30" y="45" text-anchor="middle" fill="#d97706" font-size="8">Docs</text>
      <text x="90" y="30" text-anchor="middle" fill="#d97706" font-size="8">Domain</text>
      <text x="90" y="45" text-anchor="middle" fill="#d97706" font-size="8">Know-</text>
      <text x="90" y="58" text-anchor="middle" fill="#d97706" font-size="8">ledge</text>
    </g>

    <text x="25" y="210" fill="#94a3b8" font-size="11">• Projektkonventionen</text>
    <text x="25" y="230" fill="#94a3b8" font-size="11">• API-Referenzen</text>
    <text x="25" y="250" fill="#94a3b8" font-size="11">• Geschäftslogik</text>
    <text x="25" y="270" fill="#94a3b8" font-size="11">• Teamspezifische Standards</text>
    <rect x="25" y="285" width="270" height="3" rx="1.5" fill="#f59e0b" opacity="0.3"/>
  </g>

  <!-- Function 2: Handlungsanleitung -->
  <g filter="s01c" transform="translate(390, 75)">
    <rect width="320" height="310" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="50" rx="14" fill="#0c4a6e"/>
    <circle cx="35" cy="25" r="18" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="35" y="30" text-anchor="middle" fill="#67e8f9" font-size="16" font-weight="700">2</text>
    <text x="170" y="30" text-anchor="middle" fill="#67e8f9" font-size="15" font-weight="700">Handlungsanleitung</text>
    <text x="160" y="72" text-anchor="middle" fill="#a5f3fc" font-size="12" font-style="italic">Task Content</text>

    <!-- Checklist metaphor -->
    <g transform="translate(100, 90)">
      <rect x="0" y="0" width="120" height="90" rx="6" fill="#0f172a" stroke="#0e7490" stroke-width="1.5"/>
      <rect x="12" y="12" width="14" height="14" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
      <path d="M15 19 L19 23 L25 15" stroke="#10b981" stroke-width="2" fill="none"/>
      <rect x="35" y="14" width="70" height="8" rx="2" fill="#164e63"/>
      <rect x="12" y="35" width="14" height="14" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
      <path d="M15 42 L19 46 L25 38" stroke="#10b981" stroke-width="2" fill="none"/>
      <rect x="35" y="37" width="55" height="8" rx="2" fill="#164e63"/>
      <rect x="12" y="58" width="14" height="14" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
      <rect x="35" y="60" width="60" height="8" rx="2" fill="#164e63"/>
    </g>

    <text x="25" y="210" fill="#94a3b8" font-size="11">• Deployment-Prozeduren</text>
    <text x="25" y="230" fill="#94a3b8" font-size="11">• Code-Review-Workflows</text>
    <text x="25" y="250" fill="#94a3b8" font-size="11">• Migrations-Skripte</text>
    <text x="25" y="270" fill="#94a3b8" font-size="11">• Test-Strategien</text>
    <rect x="25" y="285" width="270" height="3" rx="1.5" fill="#06b6d4" opacity="0.3"/>
  </g>

  <!-- Function 3: Capability Extension -->
  <g filter="s01c" transform="translate(740, 75)">
    <rect width="320" height="310" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="50" rx="14" fill="#312e81"/>
    <circle cx="35" cy="25" r="18" fill="#3730a3" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="35" y="30" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="700">3</text>
    <text x="175" y="30" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">Capability Extension</text>
    <text x="160" y="72" text-anchor="middle" fill="#ddd6fe" font-size="12" font-style="italic">Erweiterte Fähigkeiten</text>

    <!-- Gear/Extension metaphor -->
    <g transform="translate(100, 90)">
      <rect x="0" y="0" width="120" height="90" rx="6" fill="#0f172a" stroke="#6d28d9" stroke-width="1.5"/>
      <circle cx="40" cy="45" r="20" fill="none" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="40" cy="45" r="8" fill="#4c1d95"/>
      <rect x="70" y="20" width="35" height="12" rx="3" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
      <text x="87" y="29" text-anchor="middle" fill="#a78bfa" font-size="7">.py</text>
      <rect x="70" y="38" width="35" height="12" rx="3" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
      <text x="87" y="47" text-anchor="middle" fill="#a78bfa" font-size="7">.sh</text>
      <rect x="70" y="56" width="35" height="12" rx="3" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
      <text x="87" y="65" text-anchor="middle" fill="#a78bfa" font-size="7">.html</text>
    </g>

    <text x="25" y="210" fill="#94a3b8" font-size="11">• Utility-Skripte</text>
    <text x="25" y="230" fill="#94a3b8" font-size="11">• Output-Templates</text>
    <text x="25" y="250" fill="#94a3b8" font-size="11">• Visualisierungen</text>
    <text x="25" y="270" fill="#94a3b8" font-size="11">• Validierungs-Tools</text>
    <rect x="25" y="285" width="270" height="3" rx="1.5" fill="#8b5cf6" opacity="0.3"/>
  </g>
</svg>