<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg01b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="s01b"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1100" height="480" fill="url(#bg01b)" rx="16"/>
  <text x="550" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Skills vs. verwandte Konzepte — Einordnung</text>
  <line x1="300" y1="50" x2="800" y2="50" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Spectrum bar -->
  <text x="100" y="90" fill="#64748b" font-size="12" font-weight="600">GRANULARITÄT</text>
  <text x="100" y="108" fill="#64748b" font-size="10">Fein</text>
  <text x="1000" y="108" fill="#64748b" font-size="10" text-anchor="end">Grob</text>
  <rect x="140" y="100" width="820" height="6" rx="3" fill="#1e293b"/>
  <rect x="140" y="100" width="820" height="6" rx="3" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Prompt -->
  <g filter="s01b" transform="translate(80, 130)">
    <rect width="180" height="140" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="90" cy="35" r="22" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="90" y="40" text-anchor="middle" fill="#fbbf24" font-size="18">💬</text>
    <text x="90" y="75" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">Prompt</text>
    <text x="90" y="95" text-anchor="middle" fill="#94a3b8" font-size="10">Transient</text>
    <text x="90" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">Einmalige Anweisung</text>
    <text x="90" y="125" text-anchor="middle" fill="#94a3b8" font-size="10">Nicht wiederverwendbar</text>
  </g>

  <!-- Tool -->
  <g filter="s01b" transform="translate(300, 130)">
    <rect width="180" height="140" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="90" cy="35" r="22" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="90" y="40" text-anchor="middle" fill="#67e8f9" font-size="18">🔧</text>
    <text x="90" y="75" text-anchor="middle" fill="#67e8f9" font-size="15" font-weight="700">Tool</text>
    <text x="90" y="95" text-anchor="middle" fill="#94a3b8" font-size="10">Persistent</text>
    <text x="90" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">Einzelne Funktion</text>
    <text x="90" y="125" text-anchor="middle" fill="#94a3b8" font-size="10">API / Script</text>
  </g>

  <!-- Skill (highlighted) -->
  <g filter="s01b" transform="translate(520, 120)">
    <rect width="200" height="160" rx="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="3"/>
    <rect x="0" y="0" width="200" height="160" rx="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="100" cy="38" r="24" fill="#312e81" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="100" y="43" text-anchor="middle" fill="#c4b5fd" font-size="20">⚡</text>
    <text x="100" y="80" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="700">SKILL</text>
    <text x="100" y="100" text-anchor="middle" fill="#a5b4fc" font-size="10">Persistent · Modular</text>
    <text x="100" y="116" text-anchor="middle" fill="#94a3b8" font-size="10">Wissen + Anleitung + Tools</text>
    <text x="100" y="132" text-anchor="middle" fill="#94a3b8" font-size="10">Wiederverwendbar</text>
    <text x="100" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">Standardisiert (SKILL.md)</text>
  </g>

  <!-- Agent -->
  <g filter="s01b" transform="translate(760, 130)">
    <rect width="180" height="140" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <circle cx="90" cy="35" r="22" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
    <text x="90" y="40" text-anchor="middle" fill="#6ee7b7" font-size="18">🤖</text>
    <text x="90" y="75" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">Agent</text>
    <text x="90" y="95" text-anchor="middle" fill="#94a3b8" font-size="10">Runtime</text>
    <text x="90" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">Autonomer Akteur</text>
    <text x="90" y="125" text-anchor="middle" fill="#94a3b8" font-size="10">Reasoning + Tool Use</text>
  </g>

  <!-- Arrows showing composition -->
  <path d="M265 200 L300 200" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr01)" opacity="0.4"/>
  <path d="M485 200 L520 200" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <path d="M725 200 L760 200" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>

  <!-- Bottom: Key differentiators -->
  <g transform="translate(80, 320)">
    <rect width="940" height="140" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="470" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Warum Skills und nicht einfach Prompts?</text>

    <g transform="translate(30, 50)">
      <rect width="130" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="65" y="25" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Wiederverwendbar</text>
      <text x="65" y="43" text-anchor="middle" fill="#94a3b8" font-size="9">Einmal erstellen,</text>
      <text x="65" y="57" text-anchor="middle" fill="#94a3b8" font-size="9">automatisch laden</text>
    </g>
    <g transform="translate(185, 50)">
      <rect width="130" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="65" y="25" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Entdeckbar</text>
      <text x="65" y="43" text-anchor="middle" fill="#94a3b8" font-size="9">Agent findet Skills</text>
      <text x="65" y="57" text-anchor="middle" fill="#94a3b8" font-size="9">via Beschreibung</text>
    </g>
    <g transform="translate(340, 50)">
      <rect width="130" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="65" y="25" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Strukturiert</text>
      <text x="65" y="43" text-anchor="middle" fill="#94a3b8" font-size="9">YAML + Markdown</text>
      <text x="65" y="57" text-anchor="middle" fill="#94a3b8" font-size="9">Standard-Format</text>
    </g>
    <g transform="translate(495, 50)">
      <rect width="130" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="65" y="25" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Komponierbar</text>
      <text x="65" y="43" text-anchor="middle" fill="#94a3b8" font-size="9">Skills lassen sich</text>
      <text x="65" y="57" text-anchor="middle" fill="#94a3b8" font-size="9">kombinieren</text>
    </g>
    <g transform="translate(650, 50)">
      <rect width="130" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="65" y="25" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Versionierbar</text>
      <text x="65" y="43" text-anchor="middle" fill="#94a3b8" font-size="9">Git-verwaltbar,</text>
      <text x="65" y="57" text-anchor="middle" fill="#94a3b8" font-size="9">reviewbar</text>
    </g>
    <g transform="translate(805, 50)">
      <rect width="105" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
      <text x="52" y="25" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Sharing</text>
      <text x="52" y="43" text-anchor="middle" fill="#94a3b8" font-size="9">Marketplace</text>
      <text x="52" y="57" text-anchor="middle" fill="#94a3b8" font-size="9">&amp; Plugins</text>
    </g>
  </g>
</svg>