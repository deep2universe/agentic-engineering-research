<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgVM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sVM"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1100" height="500" fill="url(#bgVM)" rx="16"/>
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Framework-Vergleich — Skill-Systeme auf einen Blick</text>
  <line x1="280" y1="48" x2="820" y2="48" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Table Header -->
  <g transform="translate(40, 65)">
    <rect width="1020" height="35" rx="8" fill="#312e81"/>
    <text x="75" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Framework</text>
    <text x="220" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Skill-Konzept</text>
    <text x="370" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Discovery</text>
    <text x="500" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">MCP</text>
    <text x="580" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">SKILL.md</text>
    <text x="670" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Memory</text>
    <text x="785" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Multi-Agent</text>
    <text x="930" y="23" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Open Source</text>
  </g>

  <!-- Rows -->
  <g transform="translate(40, 105)" font-size="10">
    <!-- LangChain -->
    <rect width="1020" height="40" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="25" text-anchor="middle" fill="#8b5cf6" font-weight="700" font-size="11">LangChain</text>
    <text x="220" y="25" text-anchor="middle" fill="#94a3b8">Tools + SKILL.md</text>
    <text x="370" y="25" text-anchor="middle" fill="#94a3b8">Dynamisch + MCP</text>
    <text x="500" y="25" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>
    <text x="580" y="25" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>
    <text x="670" y="25" text-anchor="middle" fill="#f59e0b">Checkpointing</text>
    <text x="785" y="25" text-anchor="middle" fill="#94a3b8">Graph Nodes</text>
    <text x="930" y="25" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>

    <!-- CrewAI -->
    <rect y="45" width="1020" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="70" text-anchor="middle" fill="#10b981" font-weight="700" font-size="11">CrewAI</text>
    <text x="220" y="70" text-anchor="middle" fill="#94a3b8">BaseTool / @tool</text>
    <text x="370" y="70" text-anchor="middle" fill="#94a3b8">Statisch pro Agent</text>
    <text x="500" y="70" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>
    <text x="580" y="70" text-anchor="middle" fill="#fca5a5">✗</text>
    <text x="670" y="70" text-anchor="middle" fill="#6ee7b7" font-weight="700">Echtes Memory</text>
    <text x="785" y="70" text-anchor="middle" fill="#94a3b8">Crew + Process</text>
    <text x="930" y="70" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>

    <!-- AutoGen -->
    <rect y="90" width="1020" height="40" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="115" text-anchor="middle" fill="#64748b" font-weight="700" font-size="11">AutoGen</text>
    <text x="220" y="115" text-anchor="middle" fill="#94a3b8">Components</text>
    <text x="370" y="115" text-anchor="middle" fill="#94a3b8">Event-getrieben</text>
    <text x="500" y="115" text-anchor="middle" fill="#f59e0b">~</text>
    <text x="580" y="115" text-anchor="middle" fill="#fca5a5">✗</text>
    <text x="670" y="115" text-anchor="middle" fill="#f59e0b">Checkpointing</text>
    <text x="785" y="115" text-anchor="middle" fill="#94a3b8">AgentChat Groups</text>
    <text x="930" y="115" text-anchor="middle" fill="#f59e0b">Wartungsmodus</text>

    <!-- OpenAI SDK -->
    <rect y="135" width="1020" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="160" text-anchor="middle" fill="#06b6d4" font-weight="700" font-size="11">OpenAI SDK</text>
    <text x="220" y="160" text-anchor="middle" fill="#94a3b8">Function Calling</text>
    <text x="370" y="160" text-anchor="middle" fill="#94a3b8">Modell-getrieben</text>
    <text x="500" y="160" text-anchor="middle" fill="#fca5a5">✗</text>
    <text x="580" y="160" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓ (Codex)</text>
    <text x="670" y="160" text-anchor="middle" fill="#fca5a5">Kein Built-in</text>
    <text x="785" y="160" text-anchor="middle" fill="#94a3b8">Handoffs</text>
    <text x="930" y="160" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>

    <!-- Claude SDK -->
    <rect y="180" width="1020" height="40" rx="4" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="75" y="205" text-anchor="middle" fill="#c4b5fd" font-weight="700" font-size="11">Claude SDK</text>
    <text x="220" y="205" text-anchor="middle" fill="#c4b5fd">SKILL.md Standard</text>
    <text x="370" y="205" text-anchor="middle" fill="#c4b5fd">3-Stufen Progressive</text>
    <text x="500" y="205" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>
    <text x="580" y="205" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓ (Autor)</text>
    <text x="670" y="205" text-anchor="middle" fill="#fca5a5">Kein Built-in</text>
    <text x="785" y="205" text-anchor="middle" fill="#c4b5fd">Tool-basiert</text>
    <text x="930" y="205" text-anchor="middle" fill="#f59e0b">Teilweise</text>

    <!-- Semantic Kernel -->
    <rect y="225" width="1020" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="250" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="11">Sem. Kernel</text>
    <text x="220" y="250" text-anchor="middle" fill="#94a3b8">Plugins (nativ+sem.)</text>
    <text x="370" y="250" text-anchor="middle" fill="#94a3b8">Planner-getrieben</text>
    <text x="500" y="250" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>
    <text x="580" y="250" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>
    <text x="670" y="250" text-anchor="middle" fill="#f59e0b">Memory Backend</text>
    <text x="785" y="250" text-anchor="middle" fill="#94a3b8">Agent Framework</text>
    <text x="930" y="250" text-anchor="middle" fill="#6ee7b7" font-weight="700">✓</text>

    <!-- Bedrock -->
    <rect y="270" width="1020" height="40" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="295" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="11">Bedrock</text>
    <text x="220" y="295" text-anchor="middle" fill="#94a3b8">Action Groups</text>
    <text x="370" y="295" text-anchor="middle" fill="#94a3b8">Schema-basiert</text>
    <text x="500" y="295" text-anchor="middle" fill="#fca5a5">✗</text>
    <text x="580" y="295" text-anchor="middle" fill="#fca5a5">✗</text>
    <text x="670" y="295" text-anchor="middle" fill="#f59e0b">Knowledge Bases</text>
    <text x="785" y="295" text-anchor="middle" fill="#94a3b8">Supervisor</text>
    <text x="930" y="295" text-anchor="middle" fill="#fca5a5">Managed</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 430)">
    <rect width="1020" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="100" y="22" text-anchor="middle" fill="#6ee7b7" font-size="11">✓ = Unterstützt</text>
    <text x="250" y="22" text-anchor="middle" fill="#fca5a5" font-size="11">✗ = Nicht unterstützt</text>
    <text x="400" y="22" text-anchor="middle" fill="#f59e0b" font-size="11">~ = Teilweise/indirekt</text>
    <text x="680" y="22" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Hervorgehoben: Claude SDK als Standard-Autor</text>
    <text x="510" y="40" text-anchor="middle" fill="#64748b" font-size="10">SKILL.md und MCP sind die zwei aufkommenden Standards für plattformübergreifende Interoperabilität</text>
  </g>
</svg>