    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 11px; font-weight: 600; }
    .small { font-size: 10px; fill: #94a3b8; }
    .tiny { font-size: 9px; fill: #cbd5e1; }
    .badge { font-size: 8px; font-weight: 700; }
    .fwname { font-size: 12px; font-weight: 700; }
    .val { font-size: 9px; font-weight: 600; }
    .check { font-size: 12px; font-weight: 700; fill: #10b981; }
    .cross { font-size: 12px; font-weight: 700; fill: #dc2626; }
    .partial { font-size: 10px; font-weight: 600; fill: #f59e0b; }
  </style>

