<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0" fill="#06b6d4"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; fill: #e2e8f0; }
    .title { font-size: 16px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 12px; font-weight: 600; }
    .small { font-size: 10px; fill: #cbd5e1; }
    .tiny { font-size: 9px; fill: #94a3b8; }
    .badge { font-size: 8px; font-weight: 600; }
    .warn { font-size: 9px; fill: #fca5a5; font-weight: 600; }
  </style>

  <!-- Hintergrund -->
  <rect width="1100" height="420" fill="url(#bgGrad)" rx="8"/>

  <!-- Titel -->
  <text x="550" y="28" text-anchor="middle" class="title">AutoGPT &amp; AutoGen -- Architektur &amp; Fusion</text>

  <!-- ===== LINKE SEITE: AutoGPT ===== -->
  <rect x="30" y="45" width="430" height="360" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="45" width="430" height="30" rx="12" fill="#6366f1" opacity="0.2"/>
  <text x="245" y="65" text-anchor="middle" class="label" fill="#a5b4fc">AutoGPT (2025)</text>
  <text x="245" y="80" text-anchor="middle" class="tiny">Open-Source Autonomous Agent Platform</text>

  <!-- Server -->
  <rect x="50" y="92" width="190" height="130" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1" filter="url(#shadow)"/>
  <rect x="50" y="92" width="190" height="24" rx="8" fill="#6366f1" opacity="0.15"/>
  <text x="145" y="108" text-anchor="middle" class="small" fill="#a5b4fc" font-weight="600">AutoGPT Server</text>

  <rect x="65" y="124" width="160" height="22" rx="4" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
  <text x="145" y="139" text-anchor="middle" class="tiny" fill="#a5b4fc">Agent Execution Engine</text>

  <rect x="65" y="152" width="160" height="22" rx="4" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
  <text x="145" y="167" text-anchor="middle" class="tiny" fill="#a5b4fc">Graph-based Workflows</text>

  <rect x="65" y="180" width="160" height="22" rx="4" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
  <text x="145" y="195" text-anchor="middle" class="tiny" fill="#a5b4fc">REST API / WebSocket</text>

  <!-- Frontend -->
  <rect x="260" y="92" width="180" height="130" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1" filter="url(#shadow)"/>
  <rect x="260" y="92" width="180" height="24" rx="8" fill="#06b6d4" opacity="0.15"/>
  <text x="350" y="108" text-anchor="middle" class="small" fill="#67e8f9" font-weight="600">AutoGPT Frontend</text>

  <rect x="275" y="124" width="150" height="22" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="350" y="139" text-anchor="middle" class="tiny" fill="#67e8f9">React / Next.js UI</text>

  <rect x="275" y="152" width="150" height="22" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="350" y="167" text-anchor="middle" class="tiny" fill="#67e8f9">Drag &amp; Drop Builder</text>

  <rect x="275" y="180" width="150" height="22" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="350" y="195" text-anchor="middle" class="tiny" fill="#67e8f9">Agent Marketplace</text>

  <!-- Components (nicht mehr Plugins) -->
  <rect x="50" y="235" width="390" height="80" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <rect x="50" y="235" width="390" height="24" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="245" y="251" text-anchor="middle" class="small" fill="#6ee7b7" font-weight="600">Components (ehem. Plugins)</text>

  <rect x="65" y="268" width="80" height="22" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="105" y="283" text-anchor="middle" class="badge" fill="#6ee7b7">LLM Provider</text>

  <rect x="152" y="268" width="68" height="22" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="186" y="283" text-anchor="middle" class="badge" fill="#6ee7b7">Web Search</text>

  <rect x="227" y="268" width="68" height="22" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="261" y="283" text-anchor="middle" class="badge" fill="#6ee7b7">File I/O</text>

  <rect x="302" y="268" width="56" height="22" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="330" y="283" text-anchor="middle" class="badge" fill="#6ee7b7">GitHub</text>

  <rect x="365" y="268" width="60" height="22" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="395" y="283" text-anchor="middle" class="badge" fill="#6ee7b7">Custom</text>

  <!-- Key Features -->
  <rect x="50" y="328" width="390" height="60" rx="6" fill="#0f172a" stroke="#6366f1" stroke-width="0.5"/>
  <text x="65" y="348" class="tiny" fill="#6366f1">Key: Monorepo-Struktur, Docker-basiert</text>
  <text x="65" y="362" class="tiny" fill="#6366f1">Benchmark: agbenchmark fuer Agent-Tests</text>
  <text x="65" y="376" class="tiny" fill="#6366f1">forge SDK fuer eigene Agent-Entwicklung</text>

  <!-- ===== RECHTE SEITE: AutoGen ===== -->
  <rect x="560" y="45" width="520" height="360" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="560" y="45" width="520" height="30" rx="12" fill="#f59e0b" opacity="0.2"/>
  <text x="820" y="65" text-anchor="middle" class="label" fill="#fbbf24">AutoGen 0.4+ (Microsoft)</text>

  <!-- Wartungsmodus-Banner -->
  <rect x="920" y="49" width="150" height="22" rx="4" fill="#dc2626" opacity="0.25" stroke="#dc2626" stroke-width="1"/>
  <text x="995" y="63" text-anchor="middle" class="warn">WARTUNGSMODUS</text>

  <text x="820" y="80" text-anchor="middle" class="tiny">Multi-Agent Conversation Framework</text>

  <!-- Schicht 1: Core -->
  <rect x="580" y="92" width="480" height="75" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.2"/>
  <rect x="580" y="92" width="480" height="22" rx="8" fill="#f59e0b" opacity="0.12"/>
  <text x="820" y="107" text-anchor="middle" class="small" fill="#fbbf24" font-weight="600">Core Layer (autogen-core)</text>

  <rect x="600" y="122" width="100" height="22" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="650" y="137" text-anchor="middle" class="tiny" fill="#fbbf24">Message Protocol</text>

  <rect x="710" y="122" width="100" height="22" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="760" y="137" text-anchor="middle" class="tiny" fill="#fbbf24">Agent Runtime</text>

  <rect x="820" y="122" width="100" height="22" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="870" y="137" text-anchor="middle" class="tiny" fill="#fbbf24">Event-Driven</text>

  <rect x="930" y="122" width="115" height="22" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="987" y="137" text-anchor="middle" class="tiny" fill="#fbbf24">Type-Safe Interfaces</text>

  <!-- Schicht 2: AgentChat -->
  <rect x="580" y="178" width="480" height="85" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.2"/>
  <rect x="580" y="178" width="480" height="22" rx="8" fill="#06b6d4" opacity="0.12"/>
  <text x="820" y="193" text-anchor="middle" class="small" fill="#67e8f9" font-weight="600">AgentChat Layer (autogen-agentchat)</text>

  <rect x="600" y="208" width="105" height="22" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="652" y="223" text-anchor="middle" class="tiny" fill="#67e8f9">AssistantAgent</text>

  <rect x="715" y="208" width="115" height="22" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="772" y="223" text-anchor="middle" class="tiny" fill="#67e8f9">UserProxyAgent</text>

  <rect x="840" y="208" width="95" height="22" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="887" y="223" text-anchor="middle" class="tiny" fill="#67e8f9">GroupChat</text>

  <rect x="945" y="208" width="100" height="22" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="995" y="223" text-anchor="middle" class="tiny" fill="#67e8f9">Team Patterns</text>

  <text x="820" y="253" text-anchor="middle" class="tiny">Conversation-Patterns: RoundRobin, Selector, Swarm, Magentic-One</text>

  <!-- Schicht 3: Extensions -->
  <rect x="580" y="275" width="480" height="65" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <rect x="580" y="275" width="480" height="22" rx="8" fill="#10b981" opacity="0.12"/>
  <text x="820" y="290" text-anchor="middle" class="small" fill="#6ee7b7" font-weight="600">Extensions (autogen-ext)</text>

  <rect x="600" y="302" width="85" height="20" rx="4" fill="#10b981" opacity="0.12"/>
  <text x="642" y="316" text-anchor="middle" class="badge" fill="#6ee7b7">OpenAI Models</text>

  <rect x="693" y="302" width="75" height="20" rx="4" fill="#10b981" opacity="0.12"/>
  <text x="730" y="316" text-anchor="middle" class="badge" fill="#6ee7b7">Azure AI</text>

  <rect x="776" y="302" width="85" height="20" rx="4" fill="#10b981" opacity="0.12"/>
  <text x="818" y="316" text-anchor="middle" class="badge" fill="#6ee7b7">Code Executor</text>

  <rect x="869" y="302" width="75" height="20" rx="4" fill="#10b981" opacity="0.12"/>
  <text x="906" y="316" text-anchor="middle" class="badge" fill="#6ee7b7">Web Tools</text>

  <rect x="952" y="302" width="95" height="20" rx="4" fill="#10b981" opacity="0.12"/>
  <text x="999" y="316" text-anchor="middle" class="badge" fill="#6ee7b7">File Surfer</text>

  <!-- Fusion-Info -->
  <rect x="580" y="352" width="480" height="42" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="0.8"/>
  <text x="820" y="370" text-anchor="middle" class="tiny" fill="#fca5a5">AutoGen wird in Microsoft Agent Framework (Azure AI Foundry)</text>
  <text x="820" y="384" text-anchor="middle" class="tiny" fill="#fca5a5">integriert. Bestehende APIs bleiben, aber Neuentwicklung pausiert.</text>

  <!-- Grosser Fusions-Pfeil in der Mitte -->
  <rect x="462" y="175" width="96" height="110" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <line x1="462" y1="230" x2="480" y2="230" stroke="#f59e0b" stroke-width="2"/>
  <line x1="540" y1="230" x2="558" y2="230" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowRight)"/>

  <text x="510" y="200" text-anchor="middle" class="badge" fill="#fbbf24">Microsoft</text>
  <text x="510" y="213" text-anchor="middle" class="badge" fill="#fbbf24">Agent</text>
  <text x="510" y="226" text-anchor="middle" class="badge" fill="#fbbf24">Framework</text>

  <text x="510" y="248" text-anchor="middle" class="tiny" fill="#f59e0b">Fusion</text>
  <text x="510" y="260" text-anchor="middle" class="tiny" fill="#f59e0b">2025</text>

  <!-- AutoGPT bleibt unabhaengig -->
  <rect x="462" y="145" width="96" height="22" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="510" y="160" text-anchor="middle" class="tiny" fill="#a5b4fc">Unabhaengig</text>
</svg>