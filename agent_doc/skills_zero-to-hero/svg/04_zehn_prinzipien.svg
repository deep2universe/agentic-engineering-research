<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Gruppe Farben -->
    <linearGradient id="grpA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="grpB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="grpC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="grpD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="550" fill="url(#bgGrad)" rx="12"/>

  <!-- Header -->
  <rect x="30" y="18" width="1040" height="48" rx="8" fill="url(#headerGrad)" opacity="0.15"/>
  <text x="550" y="50" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="0.5">Die 10 Prinzipien für Skill-Design</text>
  <line x1="200" y1="60" x2="900" y2="60" stroke="url(#headerGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Gruppen-Labels -->
  <text x="160" y="88" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600" letter-spacing="1.5" text-transform="uppercase">CONTENT &amp; STRUKTUR</text>
  <text x="420" y="88" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600" letter-spacing="1.5">ARCHITEKTUR</text>
  <text x="680" y="88" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600" letter-spacing="1.5">ZUVERLÄSSIGKEIT</text>
  <text x="940" y="88" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600" letter-spacing="1.5">QUALITÄT</text>

  <!-- === GRUPPE A: Content & Struktur (Prinzip 1-3) === -->
  <!-- Karte 1 -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="240" height="190" rx="10" fill="url(#grpA)" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
    <circle cx="56" cy="124" r="14" fill="#6366f1" opacity="0.9"/>
    <text x="56" y="129" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
    <text x="78" y="129" fill="#a78bfa" font-size="14" font-weight="700">Conciseness</text>
    <line x1="42" y1="142" x2="258" y2="142" stroke="#6366f1" stroke-width="0.5" opacity="0.4"/>
    <text x="50" y="162" fill="#cbd5e1" font-size="11">Nur schreiben, was der</text>
    <text x="50" y="178" fill="#cbd5e1" font-size="11">Agent nicht bereits weiß.</text>
    <text x="50" y="202" fill="#94a3b8" font-size="10" font-style="italic">"The context window</text>
    <text x="50" y="216" fill="#94a3b8" font-size="10" font-style="italic"> is a public good."</text>
    <rect x="46" y="236" rx="4" width="82" height="20" fill="#6366f1" opacity="0.2"/>
    <text x="56" y="250" fill="#a78bfa" font-size="9">&lt; 500 Zeilen</text>
    <rect x="136" y="236" rx="4" width="82" height="20" fill="#6366f1" opacity="0.2"/>
    <text x="146" y="250" fill="#a78bfa" font-size="9">~100 Tok/Skill</text>
  </g>

  <!-- Karte 2 -->
  <g filter="url(#shadow)">
    <rect x="30" y="300" width="240" height="190" rx="10" fill="url(#grpA)" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
    <circle cx="56" cy="324" r="14" fill="#6366f1" opacity="0.9"/>
    <text x="56" y="329" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
    <text x="78" y="329" fill="#a78bfa" font-size="14" font-weight="700">Progressive Disclosure</text>
    <line x1="42" y1="342" x2="258" y2="342" stroke="#6366f1" stroke-width="0.5" opacity="0.4"/>
    <text x="50" y="362" fill="#cbd5e1" font-size="11">Stufenweise laden,</text>
    <text x="50" y="378" fill="#cbd5e1" font-size="11">nicht alles auf einmal.</text>
    <!-- Stufen-Balken -->
    <rect x="46" y="396" rx="3" width="60" height="16" fill="#6366f1" opacity="0.5"/>
    <text x="52" y="408" fill="#e2e8f0" font-size="8" font-weight="600">Metadaten</text>
    <rect x="112" y="396" rx="3" width="72" height="16" fill="#6366f1" opacity="0.35"/>
    <text x="118" y="408" fill="#e2e8f0" font-size="8" font-weight="600">Anweisungen</text>
    <rect x="190" y="396" rx="3" width="60" height="16" fill="#6366f1" opacity="0.2"/>
    <text x="196" y="408" fill="#e2e8f0" font-size="8" font-weight="600">Details</text>
    <text x="50" y="436" fill="#94a3b8" font-size="10">~100 → &lt;5k → unbegrenzt Token</text>
    <text x="50" y="456" fill="#94a3b8" font-size="10">Max. 1 Ebene Referenztiefe</text>
  </g>

  <!-- Karte 3 -->
  <g filter="url(#shadow)">
    <rect x="290" y="100" width="240" height="190" rx="10" fill="url(#grpA)" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
    <circle cx="316" cy="124" r="14" fill="#6366f1" opacity="0.9"/>
    <text x="316" y="129" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
    <text x="338" y="129" fill="#a78bfa" font-size="14" font-weight="700">Appropriate Freedom</text>
    <line x1="302" y1="142" x2="518" y2="142" stroke="#6366f1" stroke-width="0.5" opacity="0.4"/>
    <text x="310" y="162" fill="#cbd5e1" font-size="11">Spezifität an Fragilität</text>
    <text x="310" y="178" fill="#cbd5e1" font-size="11">der Aufgabe anpassen.</text>
    <!-- Freiheitsgrad-Balken -->
    <rect x="306" y="196" rx="3" width="40" height="14" fill="#dc2626" opacity="0.6"/>
    <text x="312" y="207" fill="#fca5a5" font-size="8">Niedrig</text>
    <rect x="352" y="196" rx="3" width="40" height="14" fill="#f59e0b" opacity="0.5"/>
    <text x="360" y="207" fill="#fde68a" font-size="8">Mittel</text>
    <rect x="398" y="196" rx="3" width="40" height="14" fill="#10b981" opacity="0.5"/>
    <text x="409" y="207" fill="#6ee7b7" font-size="8">Hoch</text>
    <text x="310" y="235" fill="#94a3b8" font-size="10">Brücke → Pfad → Feld</text>
    <text x="310" y="252" fill="#94a3b8" font-size="10">Fragilität bestimmt Freiheit</text>
  </g>

  <!-- === GRUPPE B: Architektur (Prinzip 4-5) === -->
  <!-- Karte 4 -->
  <g filter="url(#shadow)">
    <rect x="290" y="300" width="240" height="190" rx="10" fill="url(#grpB)" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <circle cx="316" cy="324" r="14" fill="#10b981" opacity="0.9"/>
    <text x="316" y="329" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
    <text x="338" y="329" fill="#34d399" font-size="14" font-weight="700">Single Responsibility</text>
    <line x1="302" y1="342" x2="518" y2="342" stroke="#10b981" stroke-width="0.5" opacity="0.4"/>
    <text x="310" y="362" fill="#cbd5e1" font-size="11">Ein Skill, eine klar</text>
    <text x="310" y="378" fill="#cbd5e1" font-size="11">definierte Aufgabe/Domäne.</text>
    <!-- Modulare Boxen -->
    <rect x="306" y="396" rx="3" width="50" height="24" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
    <text x="314" y="412" fill="#6ee7b7" font-size="8">Deploy</text>
    <rect x="362" y="396" rx="3" width="50" height="24" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
    <text x="370" y="412" fill="#6ee7b7" font-size="8">Review</text>
    <rect x="418" y="396" rx="3" width="50" height="24" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
    <text x="432" y="412" fill="#6ee7b7" font-size="8">API</text>
    <rect x="474" y="396" rx="3" width="44" height="24" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
    <text x="482" y="412" fill="#6ee7b7" font-size="8">Tests</text>
    <text x="310" y="448" fill="#94a3b8" font-size="10">Entdeckbarkeit + Token-Effizienz</text>
    <text x="310" y="464" fill="#94a3b8" font-size="10">+ Wartbarkeit + Komposition</text>
  </g>

  <!-- Karte 5 -->
  <g filter="url(#shadow)">
    <rect x="550" y="100" width="240" height="190" rx="10" fill="url(#grpB)" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <circle cx="576" cy="124" r="14" fill="#10b981" opacity="0.9"/>
    <text x="576" y="129" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>
    <text x="598" y="129" fill="#34d399" font-size="14" font-weight="700">Descriptive Discovery</text>
    <line x1="562" y1="142" x2="778" y2="142" stroke="#10b981" stroke-width="0.5" opacity="0.4"/>
    <text x="570" y="162" fill="#cbd5e1" font-size="11">Description = Nadelöhr</text>
    <text x="570" y="178" fill="#cbd5e1" font-size="11">für Skill-Aktivierung.</text>
    <!-- Trichter -->
    <polygon points="620,200 740,200 710,222 650,222" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
    <polygon points="650,224 710,224 698,242 662,242" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="0.5"/>
    <rect x="662" y="244" width="36" height="12" rx="2" fill="#10b981" opacity="0.4"/>
    <text x="670" y="253" fill="#e2e8f0" font-size="7">Match</text>
    <text x="570" y="276" fill="#94a3b8" font-size="10">Was + Wann + Front-Loading</text>
  </g>

  <!-- === GRUPPE C: Zuverlässigkeit (Prinzip 6-7) === -->
  <!-- Karte 6 -->
  <g filter="url(#shadow)">
    <rect x="550" y="300" width="240" height="190" rx="10" fill="url(#grpC)" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <circle cx="576" cy="324" r="14" fill="#f59e0b" opacity="0.9"/>
    <text x="576" y="329" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">6</text>
    <text x="598" y="329" fill="#fbbf24" font-size="14" font-weight="700">Determinism</text>
    <line x1="562" y1="342" x2="778" y2="342" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <text x="570" y="362" fill="#cbd5e1" font-size="11">Skripte statt generiertem</text>
    <text x="570" y="378" fill="#cbd5e1" font-size="11">Code für reproduzierbare Ops.</text>
    <!-- Vergleich -->
    <rect x="566" y="394" rx="3" width="100" height="40" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="0.5"/>
    <text x="576" y="410" fill="#fca5a5" font-size="9">Generiert:</text>
    <text x="576" y="424" fill="#94a3b8" font-size="8">Variabel, teuer</text>
    <rect x="676" y="394" rx="3" width="100" height="40" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
    <text x="686" y="410" fill="#6ee7b7" font-size="9">Gebündelt:</text>
    <text x="686" y="424" fill="#94a3b8" font-size="8">Stabil, günstig</text>
    <text x="570" y="458" fill="#94a3b8" font-size="10">Getestet → Konsistent → Schnell</text>
  </g>

  <!-- Karte 7 -->
  <g filter="url(#shadow)">
    <rect x="810" y="100" width="260" height="190" rx="10" fill="url(#grpC)" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <circle cx="836" cy="124" r="14" fill="#f59e0b" opacity="0.9"/>
    <text x="836" y="129" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">7</text>
    <text x="858" y="129" fill="#fbbf24" font-size="14" font-weight="700">Explicit Error Handling</text>
    <line x1="822" y1="142" x2="1058" y2="142" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <text x="830" y="162" fill="#cbd5e1" font-size="11">Fehler im Skript behandeln,</text>
    <text x="830" y="178" fill="#cbd5e1" font-size="11">nicht an Agent delegieren.</text>
    <!-- Code-Snippet -->
    <rect x="826" y="192" rx="4" width="230" height="52" fill="#0f172a" opacity="0.6"/>
    <text x="836" y="208" fill="#f59e0b" font-size="9" font-family="monospace">try:</text>
    <text x="836" y="220" fill="#94a3b8" font-size="9" font-family="monospace">  process(file)</text>
    <text x="836" y="232" fill="#f59e0b" font-size="9" font-family="monospace">except FileNotFoundError:</text>
    <text x="836" y="244" fill="#6ee7b7" font-size="9" font-family="monospace">  use_default()</text>
    <text x="830" y="272" fill="#94a3b8" font-size="10">Keine "Voodoo Constants"</text>
  </g>

  <!-- === GRUPPE D: Qualität (Prinzip 8-10) === -->
  <!-- Karte 8 -->
  <g filter="url(#shadow)">
    <rect x="810" y="300" width="260" height="80" rx="10" fill="url(#grpD)" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
    <circle cx="836" cy="324" r="14" fill="#06b6d4" opacity="0.9"/>
    <text x="836" y="329" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">8</text>
    <text x="858" y="329" fill="#22d3ee" font-size="14" font-weight="700">Konsistente Terminologie</text>
    <line x1="822" y1="342" x2="1058" y2="342" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
    <text x="830" y="362" fill="#cbd5e1" font-size="11">Ein Begriff pro Konzept —</text>
    <text x="830" y="376" fill="#94a3b8" font-size="10">nicht "Feld" + "Box" + "Element"</text>
  </g>

  <!-- Karte 9 -->
  <g filter="url(#shadow)">
    <rect x="810" y="390" width="126" height="100" rx="10" fill="url(#grpD)" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
    <circle cx="836" cy="414" r="14" fill="#06b6d4" opacity="0.9"/>
    <text x="836" y="419" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">9</text>
    <text x="830" y="444" fill="#22d3ee" font-size="11" font-weight="700">Cross-Model-</text>
    <text x="830" y="458" fill="#22d3ee" font-size="11" font-weight="700">Kompatibilität</text>
    <text x="830" y="478" fill="#94a3b8" font-size="9">Haiku → Opus</text>
  </g>

  <!-- Karte 10 -->
  <g filter="url(#shadow)">
    <rect x="944" y="390" width="126" height="100" rx="10" fill="url(#grpD)" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
    <circle cx="970" cy="414" r="14" fill="#dc2626" opacity="0.9"/>
    <text x="970" y="419" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">10</text>
    <text x="958" y="444" fill="#22d3ee" font-size="11" font-weight="700">Security by</text>
    <text x="958" y="458" fill="#22d3ee" font-size="11" font-weight="700">Design</text>
    <!-- Lock icon -->
    <rect x="972" y="468" width="14" height="10" rx="2" fill="none" stroke="#dc2626" stroke-width="1.2"/>
    <path d="M975,468 v-4 a4,4 0 0 1 8,0 v4" fill="none" stroke="#dc2626" stroke-width="1.2"/>
    <text x="958" y="488" fill="#94a3b8" font-size="8">Least Privilege</text>
  </g>

  <!-- Footer -->
  <text x="550" y="540" text-anchor="middle" fill="#475569" font-size="10">Kapitel 04 — Prinzipien für Skill-Design · Skills Zero-to-Hero</text>
</svg>