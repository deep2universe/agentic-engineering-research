<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg06b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="ar06b-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="ar06b-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="ar06b-o" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="ar06b-c" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
    <filter id="s06b"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
    <filter id="glow06b"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.35"/></filter>
    <filter id="glow06b-g"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#10b981" flood-opacity="0.35"/></filter>
    <filter id="glow06b-o"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f59e0b" flood-opacity="0.35"/></filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="1100" height="400" fill="url(#bg06b)" rx="16"/>

  <!-- Titel -->
  <text x="550" y="36" text-anchor="middle" fill="#e2e8f0" font-size="21" font-weight="700">Claude A / Claude B — Zwei-Agenten-Workflow</text>
  <line x1="300" y1="46" x2="800" y2="46" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- CLAUDE A — Skill-Designer (links)            -->
  <!-- ============================================ -->
  <g filter="url(#s06b)" transform="translate(50, 70)">
    <rect width="310" height="210" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <!-- Header -->
    <rect width="310" height="42" rx="14" fill="#312e81"/>
    <text x="155" y="28" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">🤖 Claude A — Skill-Designer</text>
    <!-- Inhalt -->
    <text x="155" y="72" text-anchor="middle" fill="#6366f1" font-size="22">✍️</text>
    <text x="22" y="100" fill="#e2e8f0" font-size="11" font-weight="600">Aufgaben:</text>
    <text x="22" y="118" fill="#94a3b8" font-size="10.5">• SKILL.md erstellen &amp; iterieren</text>
    <text x="22" y="134" fill="#94a3b8" font-size="10.5">• Prompt-Engineering optimieren</text>
    <text x="22" y="150" fill="#94a3b8" font-size="10.5">• Struktur &amp; Token-Budget</text>
    <text x="22" y="166" fill="#94a3b8" font-size="10.5">• Referenz-Dateien anlegen</text>
    <!-- Status-Badge -->
    <rect x="22" y="180" width="266" height="22" rx="6" fill="#0f172a" stroke="#4338ca" stroke-width="1"/>
    <text x="155" y="195" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Session: Eigenes Kontextfenster</text>
  </g>

  <!-- ============================================ -->
  <!-- CLAUDE B — Skill-Nutzer (rechts)             -->
  <!-- ============================================ -->
  <g filter="url(#s06b)" transform="translate(740, 70)">
    <rect width="310" height="210" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <!-- Header -->
    <rect width="310" height="42" rx="14" fill="#064e3b"/>
    <text x="155" y="28" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">🤖 Claude B — Skill-Nutzer</text>
    <!-- Inhalt -->
    <text x="155" y="72" text-anchor="middle" fill="#10b981" font-size="22">🧪</text>
    <text x="22" y="100" fill="#e2e8f0" font-size="11" font-weight="600">Aufgaben:</text>
    <text x="22" y="118" fill="#94a3b8" font-size="10.5">• Skill als End-User ausführen</text>
    <text x="22" y="134" fill="#94a3b8" font-size="10.5">• Edge Cases provozieren</text>
    <text x="22" y="150" fill="#94a3b8" font-size="10.5">• Unklarheiten aufdecken</text>
    <text x="22" y="166" fill="#94a3b8" font-size="10.5">• Ergebnis-Qualität bewerten</text>
    <!-- Status-Badge -->
    <rect x="22" y="180" width="266" height="22" rx="6" fill="#0f172a" stroke="#065f46" stroke-width="1"/>
    <text x="155" y="195" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Session: Frisches Kontextfenster</text>
  </g>

  <!-- ============================================ -->
  <!-- Pfeile: A → B (Skill-Draft)                 -->
  <!-- ============================================ -->
  <line x1="364" y1="145" x2="736" y2="145" stroke="#6366f1" stroke-width="2" marker-end="url(#ar06b-r)"/>
  <rect x="445" y="130" width="150" height="22" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="520" y="145" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Skill-Draft übergeben</text>

  <!-- Pfeile: B → A (Feedback) -->
  <line x1="736" y1="200" x2="364" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#ar06b-g)"/>
  <rect x="440" y="186" width="160" height="22" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="520" y="201" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Fehler + Verbesserungen</text>

  <!-- ============================================ -->
  <!-- ENTWICKLER — Domänenexperte (Mitte unten)    -->
  <!-- ============================================ -->
  <g filter="url(#s06b)" transform="translate(365, 295)">
    <rect width="370" height="90" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect width="370" height="36" rx="14" fill="#451a03"/>
    <text x="185" y="25" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">👨‍💻 Entwickler — Domänenexperte</text>
    <text x="20" y="58" fill="#94a3b8" font-size="10.5">• Beobachtet beide Agenten-Sessions</text>
    <text x="20" y="74" fill="#94a3b8" font-size="10.5">• Steuert Iterationsrichtung &amp; gibt Domänenwissen ein</text>
    <rect x="240" y="46" width="116" height="36" rx="8" fill="#0f172a" stroke="#78350f" stroke-width="1"/>
    <text x="298" y="62" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="600">Entscheidungs-</text>
    <text x="298" y="76" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="600">autorität</text>
  </g>

  <!-- Pfeil: Entwickler → Claude A (Steuerung) -->
  <path d="M 430,295 Q 340,270 280,284" stroke="#f59e0b" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#ar06b-o)"/>
  <text x="320" y="275" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600" opacity="0.9">Steuerung</text>

  <!-- Pfeil: Entwickler → Claude B (Steuerung) -->
  <path d="M 670,295 Q 760,270 820,284" stroke="#f59e0b" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#ar06b-o)"/>
  <text x="780" y="275" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600" opacity="0.9">Steuerung</text>

  <!-- Iterations-Zähler oben mittig -->
  <g transform="translate(475, 58)">
    <rect width="150" height="28" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" filter="url(#s06b)"/>
    <text x="75" y="19" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">🔄 3–5 Iterationen</text>
  </g>

</svg>