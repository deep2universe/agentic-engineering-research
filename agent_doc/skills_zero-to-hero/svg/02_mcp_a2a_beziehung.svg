    <text x="150" y="185" text-anchor="middle" fill="#94a3b8" font-size="11">Ressourcen &amp; Templates</text>
    <rect x="30" y="210" width="240" height="40" rx="8" fill="#0f172a" stroke="#4c1d95" stroke-width="1"/>
    <text x="150" y="228" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">agentskills.io</text>
    <text x="150" y="244" text-anchor="middle" fill="#64748b" font-size="10">30+ Plattformen · SKILL.md Format</text>
    <rect x="30" y="265" width="100" height="22" rx="4" fill="#4c1d95"/><text x="80" y="280" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Prompt-basiert</text>
    <rect x="140" y="265" width="80" height="22" rx="4" fill="#4c1d95"/><text x="180" y="280" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Modular</text>
    <rect x="230" y="265" width="60" height="22" rx="4" fill="#4c1d95"/><text x="260" y="280" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Offen</text>
