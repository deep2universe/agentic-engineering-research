    <rect x="30" y="210" width="240" height="40" rx="8" fill="#0f172a" stroke="#065f46" stroke-width="1"/>
    <text x="150" y="228" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Google A2A Protocol</text>
    <text x="150" y="244" text-anchor="middle" fill="#64748b" font-size="10">150+ Organisationen</text>
    <rect x="30" y="265" width="100" height="22" rx="4" fill="#065f46"/><text x="80" y="280" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">Multi-Agent</text>
    <rect x="140" y="265" width="80" height="22" rx="4" fill="#065f46"/><text x="180" y="280" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">HTTP</text>
    <rect x="230" y="265" width="60" height="22" rx="4" fill="#065f46"/><text x="260" y="280" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">Offen</text>
  </g>
