    <text x="150" y="185" text-anchor="middle" fill="#94a3b8" font-size="11">Prompt Templates</text>
    <rect x="30" y="210" width="240" height="40" rx="8" fill="#0f172a" stroke="#164e63" stroke-width="1"/>
    <text x="150" y="228" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">modelcontextprotocol.io</text>
    <text x="150" y="244" text-anchor="middle" fill="#64748b" font-size="10">97 Mio. Downloads · 10k+ Server</text>
    <rect x="30" y="265" width="100" height="22" rx="4" fill="#164e63"/><text x="80" y="280" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">Code-basiert</text>
    <rect x="140" y="265" width="80" height="22" rx="4" fill="#164e63"/><text x="180" y="280" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">JSON-RPC</text>
    <rect x="230" y="265" width="60" height="22" rx="4" fill="#164e63"/><text x="260" y="280" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">Offen</text>
