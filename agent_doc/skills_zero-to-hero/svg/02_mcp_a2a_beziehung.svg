  <g filter="s02c" transform="translate(740, 80)">
    <rect width="300" height="280" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="50" rx="14" fill="#064e3b"/>
    <text x="150" y="32" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="700">A2A (Agent-to-Agent)</text>
    <text x="150" y="75" text-anchor="middle" fill="#6ee7b7" font-size="28">🔗</text>
    <text x="150" y="105" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="600">"WIE Agents kommunizieren"</text>
    <line x1="30" y1="120" x2="270" y2="120" stroke="#065f46" stroke-width="1"/>
    <text x="150" y="145" text-anchor="middle" fill="#94a3b8" font-size="11">Agent Discovery</text>
    <text x="150" y="165" text-anchor="middle" fill="#94a3b8" font-size="11">Task Delegation</text>
