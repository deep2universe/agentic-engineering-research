<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg03b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="s03b"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1100" height="420" fill="url(#bg03b)" rx="16"/>
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Skill-Verzeichnisstruktur — Vom Minimal- zum Komplex-Skill</text>
  <line x1="270" y1="48" x2="830" y2="48" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Minimal -->
  <g filter="s03b" transform="translate(40, 70)">
    <rect width="300" height="150" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="36" rx="12" fill="#064e3b"/>
    <text x="150" y="24" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">Minimal-Skill</text>
    <g transform="translate(25, 55)">
      <text fill="#6ee7b7" font-size="12">📁</text><text x="22" fill="#e2e8f0" font-size="12" font-weight="600"> my-skill/</text>
      <text y="24" fill="#64748b" font-size="12">  └──</text><text x="40" y="24" fill="#fbbf24" font-size="12"> SKILL.md</text>
      <text x="130" y="24" fill="#64748b" font-size="10"> (Pflicht)</text>
    </g>
    <rect x="20" y="110" width="260" height="24" rx="4" fill="#0f172a"/>
    <text x="150" y="126" text-anchor="middle" fill="#64748b" font-size="10">Nur eine Datei — sofort einsatzbereit</text>
  </g>

  <!-- Standard -->
  <g filter="s03b" transform="translate(400, 70)">
    <rect width="300" height="200" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="36" rx="12" fill="#451a03"/>
    <text x="150" y="24" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">Standard-Skill</text>
    <g transform="translate(25, 55)" font-size="12">
      <text fill="#fbbf24">📁</text><text x="22" fill="#e2e8f0" font-weight="600"> my-skill/</text>
      <text y="22" fill="#64748b">  ├──</text><text x="40" y="22" fill="#fbbf24"> SKILL.md</text>
      <text y="44" fill="#64748b">  ├──</text><text x="40" y="44" fill="#94a3b8"> reference.md</text>
      <text y="66" fill="#64748b">  ├──</text><text x="40" y="66" fill="#94a3b8"> examples.md</text>
      <text y="88" fill="#64748b">  └──</text><text x="40" y="88" fill="#94a3b8"> templates/</text>
      <text x="60" y="106" fill="#64748b">  └── output.md</text>
    </g>
  </g>

  <!-- Complex -->
  <g filter="s03b" transform="translate(760, 70)">
    <rect width="300" height="330" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="36" rx="12" fill="#312e81"/>
    <text x="150" y="24" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Komplex-Skill (mit Scripts)</text>
    <g transform="translate(20, 50)" font-size="11">
      <text fill="#c4b5fd">📁</text><text x="20" fill="#e2e8f0" font-weight="600"> codebase-visualizer/</text>
      <text y="20" fill="#64748b">  ├──</text><text x="38" y="20" fill="#fbbf24"> SKILL.md</text>
      <text y="40" fill="#64748b">  ├──</text><text x="38" y="40" fill="#94a3b8"> REFERENCE.md</text>
      <text y="60" fill="#64748b">  ├──</text><text x="38" y="60" fill="#94a3b8"> FORMS.md</text>
      <text y="80" fill="#64748b">  ├──</text><text x="38" y="80" fill="#67e8f9"> examples/</text>
      <text x="58" y="98" fill="#64748b">├── basic.md</text>
      <text x="58" y="116" fill="#64748b">└── advanced.md</text>
      <text y="136" fill="#64748b">  ├──</text><text x="38" y="136" fill="#6ee7b7"> scripts/</text>
      <text x="58" y="154" fill="#6ee7b7">├── visualize.py</text>
      <text x="58" y="172" fill="#6ee7b7">├── validate.py</text>
      <text x="58" y="190" fill="#6ee7b7">└── analyze.py</text>
      <text y="210" fill="#64748b">  └──</text><text x="38" y="210" fill="#fbbf24"> templates/</text>
      <text x="58" y="228" fill="#64748b">└── report.html</text>
    </g>
    <rect x="20" y="290" width="260" height="24" rx="4" fill="#0f172a"/>
    <text x="150" y="306" text-anchor="middle" fill="#64748b" font-size="9">Deterministische Skripte + Referenzmaterial</text>
  </g>

  <!-- Bottom: Progression arrow -->
  <g transform="translate(40, 390)">
    <line x1="0" y1="0" x2="1020" y2="0" stroke="#334155" stroke-width="2"/>
    <text x="170" y="20" text-anchor="middle" fill="#10b981" font-size="11">Einfach</text>
    <text x="550" y="20" text-anchor="middle" fill="#f59e0b" font-size="11">Standard</text>
    <text x="910" y="20" text-anchor="middle" fill="#8b5cf6" font-size="11">Komplex</text>
    <polygon points="1010,-5 1020,0 1010,5" fill="#334155"/>
  </g>
</svg>