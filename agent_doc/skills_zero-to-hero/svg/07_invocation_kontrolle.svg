<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDown" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto">
      <polygon points="0 0, 7 0, 3.5 10" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Hintergrund -->
  <rect width="1100" height="380" fill="url(#bgGrad)" rx="12"/>

  <!-- Titel -->
  <text x="50" y="38" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700">Invocation-Kontrolle — Entscheidungsbaum</text>
  <line x1="50" y1="48" x2="430" y2="48" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Root Node: Skill definiert -->
  <g filter="url(#shadow)">
    <rect x="390" y="65" width="320" height="48" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  </g>
  <text x="550" y="85" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Skill mit Frontmatter definiert</text>
  <text x="550" y="102" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" text-anchor="middle">Welche Invocation-Flags sind gesetzt?</text>

  <!-- Verbindungslinien vom Root -->
  <!-- Links -->
  <line x1="440" y1="113" x2="160" y2="155" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <!-- Mitte -->
  <line x1="550" y1="113" x2="550" y2="155" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <!-- Rechts -->
  <line x1="660" y1="113" x2="940" y2="155" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>

  <!-- Labels auf den Linien -->
  <rect x="235" y="120" width="170" height="18" rx="3" fill="#0f172a" opacity="0.8"/>
  <text x="320" y="133" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">keine speziellen Flags</text>

  <rect x="460" y="126" width="180" height="18" rx="3" fill="#0f172a" opacity="0.8"/>
  <text x="550" y="139" fill="#f59e0b" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle" font-weight="600">disable-model-invocation: true</text>

  <rect x="780" y="120" width="155" height="18" rx="3" fill="#0f172a" opacity="0.8"/>
  <text x="857" y="133" fill="#06b6d4" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle" font-weight="600">user-invocable: false</text>

  <!-- === LINKE SPALTE: Standard === -->
  <g filter="url(#shadow)">
    <rect x="40" y="155" width="240" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="160" y="178" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Standard</text>
  <text x="160" y="196" fill="#86efac" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" text-anchor="middle">User + Agent koennen aufrufen</text>

  <!-- Zugriffs-Icons Standard -->
  <g transform="translate(55, 218)">
    <rect width="100" height="28" rx="5" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="14" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="18">&#x1F464;</text>
    <text x="38" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">User</text>
    <text x="75" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">&#x2713;</text>
  </g>
  <g transform="translate(165, 218)">
    <rect width="100" height="28" rx="5" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="14" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="18">&#x1F916;</text>
    <text x="38" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">Agent</text>
    <text x="80" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">&#x2713;</text>
  </g>

  <!-- Beispiel Standard -->
  <g filter="url(#shadow)">
    <rect x="55" y="260" width="210" height="100" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"/>
  </g>
  <text x="160" y="280" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">BEISPIEL</text>
  <text x="160" y="300" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Code-Erklaerung</text>
  <text x="160" y="320" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle">/explain — User tippt Befehl</text>
  <text x="160" y="336" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle">oder Agent erkennt Bedarf</text>

  <!-- === MITTLERE SPALTE: disable-model-invocation === -->
  <g filter="url(#shadow)">
    <rect x="430" y="155" width="240" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="550" y="178" fill="#f59e0b" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Nur User</text>
  <text x="550" y="196" fill="#fcd34d" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" text-anchor="middle">Agent-Aufruf blockiert</text>

  <!-- Zugriffs-Icons disable-model -->
  <g transform="translate(445, 218)">
    <rect width="100" height="28" rx="5" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="14" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="18">&#x1F464;</text>
    <text x="38" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">User</text>
    <text x="75" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">&#x2713;</text>
  </g>
  <g transform="translate(555, 218)">
    <rect width="100" height="28" rx="5" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1"/>
    <text x="14" y="19" fill="#dc2626" font-family="'Segoe UI', system-ui, sans-serif" font-size="18">&#x1F916;</text>
    <text x="38" y="19" fill="#dc2626" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">Agent</text>
    <text x="80" y="19" fill="#dc2626" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">&#x2717;</text>
  </g>

  <!-- Beispiel disable-model -->
  <g filter="url(#shadow)">
    <rect x="445" y="260" width="210" height="100" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"/>
  </g>
  <text x="550" y="280" fill="#f59e0b" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">BEISPIEL</text>
  <text x="550" y="300" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Deploy-Skill</text>
  <text x="550" y="320" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle">/deploy — Nur bewusste</text>
  <text x="550" y="336" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle">User-Entscheidung erlaubt</text>

  <!-- === RECHTE SPALTE: user-invocable false === -->
  <g filter="url(#shadow)">
    <rect x="820" y="155" width="240" height="50" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  </g>
  <text x="940" y="178" fill="#06b6d4" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Nur Agent</text>
  <text x="940" y="196" fill="#67e8f9" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" text-anchor="middle">Kein Slash-Command verfuegbar</text>

  <!-- Zugriffs-Icons user-invocable false -->
  <g transform="translate(835, 218)">
    <rect width="100" height="28" rx="5" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1"/>
    <text x="14" y="19" fill="#dc2626" font-family="'Segoe UI', system-ui, sans-serif" font-size="18">&#x1F464;</text>
    <text x="38" y="19" fill="#dc2626" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">User</text>
    <text x="75" y="19" fill="#dc2626" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">&#x2717;</text>
  </g>
  <g transform="translate(945, 218)">
    <rect width="100" height="28" rx="5" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="14" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="18">&#x1F916;</text>
    <text x="38" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">Agent</text>
    <text x="80" y="19" fill="#10b981" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">&#x2713;</text>
  </g>

  <!-- Beispiel user-invocable false -->
  <g filter="url(#shadow)">
    <rect x="835" y="260" width="210" height="100" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"/>
  </g>
  <text x="940" y="280" fill="#06b6d4" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">BEISPIEL</text>
  <text x="940" y="300" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Legacy-System-Kontext</text>
  <text x="940" y="320" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle">Automatisch geladen wenn</text>
  <text x="940" y="336" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle">Agent Legacy-Code erkennt</text>
</svg>