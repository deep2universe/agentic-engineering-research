<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg06a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="ar06a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="ar06a-feed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <filter id="s06a"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
    <filter id="glow06a"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.4"/></filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="1100" height="450" fill="url(#bg06a)" rx="16"/>

  <!-- Titel -->
  <text x="550" y="36" text-anchor="middle" fill="#e2e8f0" font-size="21" font-weight="700">7 Phasen der Skill-Erstellung</text>
  <line x1="330" y1="46" x2="770" y2="46" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

  <!-- === Obere Reihe: Phase 1–4 === -->

  <!-- Phase 1: Bedarfsanalyse -->
  <g filter="url(#s06a)" transform="translate(30, 70)">
    <rect width="230" height="150" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.8"/>
    <rect width="230" height="36" rx="12" fill="#064e3b"/>
    <text x="115" y="24" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Phase 1: Bedarfsanalyse</text>
    <text x="115" y="62" text-anchor="middle" fill="#10b981" font-size="20">🔍</text>
    <text x="18" y="88" fill="#94a3b8" font-size="10.5">Wiederkehrende Muster erkennen</text>
    <text x="18" y="104" fill="#94a3b8" font-size="10.5">Workflow-Reibung identifizieren</text>
    <text x="18" y="120" fill="#94a3b8" font-size="10.5">Prompt-Wiederholungen sammeln</text>
    <rect x="18" y="130" width="194" height="14" rx="3" fill="#0f172a"/>
    <text x="115" y="141" text-anchor="middle" fill="#6ee7b7" font-size="8.5" font-weight="600">Trigger: ≥3× gleicher Prompt</text>
  </g>

  <!-- Pfeil 1→2 -->
  <line x1="264" y1="145" x2="290" y2="145" stroke="#6366f1" stroke-width="1.8" marker-end="url(#ar06a)"/>

  <!-- Phase 2: Evaluation-Driven Development -->
  <g filter="url(#s06a)" transform="translate(295, 70)">
    <rect width="230" height="150" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.8"/>
    <rect width="230" height="36" rx="12" fill="#312e81"/>
    <text x="115" y="24" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Phase 2: EDD</text>
    <text x="115" y="62" text-anchor="middle" fill="#6366f1" font-size="20">🧪</text>
    <text x="18" y="88" fill="#94a3b8" font-size="10.5">Erwartete Ergebnisse definieren</text>
    <text x="18" y="104" fill="#94a3b8" font-size="10.5">Test-Szenarien erstellen</text>
    <text x="18" y="120" fill="#94a3b8" font-size="10.5">Lücken im Ist-Zustand finden</text>
    <rect x="18" y="130" width="194" height="14" rx="3" fill="#0f172a"/>
    <text x="115" y="141" text-anchor="middle" fill="#c4b5fd" font-size="8.5" font-weight="600">Tests VOR dem Skill schreiben</text>
  </g>

  <!-- Pfeil 2→3 -->
  <line x1="529" y1="145" x2="555" y2="145" stroke="#6366f1" stroke-width="1.8" marker-end="url(#ar06a)"/>

  <!-- Phase 3: Skill-Erstellung -->
  <g filter="url(#s06a)" transform="translate(560, 70)">
    <rect width="230" height="150" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1.8"/>
    <rect width="230" height="36" rx="12" fill="#164e63"/>
    <text x="115" y="24" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Phase 3: Skill-Erstellung</text>
    <text x="115" y="62" text-anchor="middle" fill="#06b6d4" font-size="20">🤖</text>
    <text x="18" y="88" fill="#94a3b8" font-size="10.5">Claude A erstellt Skill-Draft</text>
    <text x="18" y="104" fill="#94a3b8" font-size="10.5">Claude B testet als Nutzer</text>
    <text x="18" y="120" fill="#94a3b8" font-size="10.5">Iterativer A/B-Workflow</text>
    <rect x="18" y="130" width="194" height="14" rx="3" fill="#0f172a"/>
    <text x="115" y="141" text-anchor="middle" fill="#67e8f9" font-size="8.5" font-weight="600">Zwei-Agenten-Methodik</text>
  </g>

  <!-- Pfeil 3→4 -->
  <line x1="794" y1="145" x2="820" y2="145" stroke="#6366f1" stroke-width="1.8" marker-end="url(#ar06a)"/>

  <!-- Phase 4: Naming + Description -->
  <g filter="url(#s06a)" transform="translate(825, 70)">
    <rect width="240" height="150" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.8"/>
    <rect width="240" height="36" rx="12" fill="#451a03"/>
    <text x="120" y="24" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Phase 4: Naming &amp; Description</text>
    <text x="120" y="62" text-anchor="middle" fill="#f59e0b" font-size="20">🏷️</text>
    <text x="18" y="88" fill="#94a3b8" font-size="10.5">Verb-first Naming Convention</text>
    <text x="18" y="104" fill="#94a3b8" font-size="10.5">Präzise, disambiguierende Desc.</text>
    <text x="18" y="120" fill="#94a3b8" font-size="10.5">Discovery-optimierte Keywords</text>
    <rect x="18" y="130" width="204" height="14" rx="3" fill="#0f172a"/>
    <text x="120" y="141" text-anchor="middle" fill="#fbbf24" font-size="8.5" font-weight="600">Matching-Qualität ≥ 90%</text>
  </g>

  <!-- === Untere Reihe: Phase 5–7 + Feedback === -->

  <!-- Verbindungslinie 4 → unten -->
  <path d="M 945,224 L 945,258 L 890,258" stroke="#6366f1" stroke-width="1.8" fill="none" marker-end="url(#ar06a)"/>

  <!-- Phase 5: Strukturierung -->
  <g filter="url(#s06a)" transform="translate(650, 270)">
    <rect width="236" height="150" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.8"/>
    <rect width="236" height="36" rx="12" fill="#064e3b"/>
    <text x="118" y="24" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Phase 5: Strukturierung</text>
    <text x="118" y="62" text-anchor="middle" fill="#10b981" font-size="20">📐</text>
    <text x="18" y="88" fill="#94a3b8" font-size="10.5">Progressive Disclosure Pattern</text>
    <text x="18" y="104" fill="#94a3b8" font-size="10.5">YAML → Markdown → Referenzen</text>
    <text x="18" y="120" fill="#94a3b8" font-size="10.5">Token-Budget einhalten</text>
    <rect x="18" y="130" width="200" height="14" rx="3" fill="#0f172a"/>
    <text x="118" y="141" text-anchor="middle" fill="#6ee7b7" font-size="8.5" font-weight="600">Body &lt; 5.000 Token</text>
  </g>

  <!-- Pfeil 5→6 -->
  <line x1="646" y1="345" x2="620" y2="345" stroke="#6366f1" stroke-width="1.8" marker-end="url(#ar06a)"/>

  <!-- Phase 6: Testen -->
  <g filter="url(#s06a)" transform="translate(380, 270)">
    <rect width="236" height="150" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.8"/>
    <rect width="236" height="36" rx="12" fill="#312e81"/>
    <text x="118" y="24" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Phase 6: Testen</text>
    <text x="118" y="62" text-anchor="middle" fill="#6366f1" font-size="20">✅</text>
    <text x="18" y="88" fill="#94a3b8" font-size="10.5">Multi-Modell-Validierung</text>
    <text x="18" y="104" fill="#94a3b8" font-size="10.5">Edge Cases + Grenzfälle</text>
    <text x="18" y="120" fill="#94a3b8" font-size="10.5">Activation-Trigger prüfen</text>
    <rect x="18" y="130" width="200" height="14" rx="3" fill="#0f172a"/>
    <text x="118" y="141" text-anchor="middle" fill="#c4b5fd" font-size="8.5" font-weight="600">Opus / Sonnet / Haiku</text>
  </g>

  <!-- Pfeil 6→7 -->
  <line x1="376" y1="345" x2="350" y2="345" stroke="#6366f1" stroke-width="1.8" marker-end="url(#ar06a)"/>

  <!-- Phase 7: Iteration -->
  <g filter="url(#s06a)" transform="translate(110, 270)">
    <rect width="236" height="150" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.8"/>
    <rect width="236" height="36" rx="12" fill="#451a03"/>
    <text x="118" y="24" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Phase 7: Iteration</text>
    <text x="118" y="62" text-anchor="middle" fill="#f59e0b" font-size="20">🔄</text>
    <text x="18" y="88" fill="#94a3b8" font-size="10.5">Nutzungsdaten auswerten</text>
    <text x="18" y="104" fill="#94a3b8" font-size="10.5">Fehlschläge analysieren</text>
    <text x="18" y="120" fill="#94a3b8" font-size="10.5">Skill kontinuierlich verbessern</text>
    <rect x="18" y="130" width="200" height="14" rx="3" fill="#0f172a"/>
    <text x="118" y="141" text-anchor="middle" fill="#fbbf24" font-size="8.5" font-weight="600">Feedback-Loop → Phase 2</text>
  </g>

  <!-- Feedback-Loop: Phase 7 zurück zu Phase 2 -->
  <path d="M 228,270 L 228,250 L 410,250 L 410,224" stroke="#f59e0b" stroke-width="1.8" fill="none" stroke-dasharray="6 3" marker-end="url(#ar06a-feed)"/>
  <text x="320" y="244" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600" opacity="0.8">Feedback-Loop</text>

</svg>