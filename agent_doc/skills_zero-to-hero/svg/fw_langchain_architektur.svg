<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#06b6d4"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; fill: #e2e8f0; }
    .title { font-size: 16px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 12px; font-weight: 600; }
    .small { font-size: 10px; fill: #cbd5e1; }
    .tiny { font-size: 9px; fill: #94a3b8; }
  </style>

  <!-- Hintergrund -->
  <rect width="1100" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- Titel -->
  <text x="550" y="30" text-anchor="middle" class="title">LangChain / LangGraph Architektur</text>
  <text x="550" y="46" text-anchor="middle" class="subtitle">Evolution: Chains -> Agents -> LangGraph</text>

  <!-- Evolution-Pfeil unten -->
  <line x1="100" y1="365" x2="830" y2="365" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowHead)" stroke-dasharray="6,3"/>
  <text x="200" y="390" text-anchor="middle" class="tiny">Einfach</text>
  <text x="465" y="390" text-anchor="middle" class="tiny">Dynamisch</text>
  <text x="730" y="390" text-anchor="middle" class="tiny">Komplex / Graphbasiert</text>

  <!-- Schicht 1: Chains -->
  <rect x="40" y="65" width="250" height="280" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="65" width="250" height="32" rx="10" fill="#6366f1" opacity="0.2"/>
  <circle cx="62" cy="81" r="8" fill="#6366f1" opacity="0.6"/>
  <text x="75" y="86" class="label" fill="#a5b4fc">1. Chains (Sequentiell)</text>

  <!-- Chain-Elemente -->
  <rect x="75" y="115" width="180" height="34" rx="6" fill="#0f172a" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="165" y="136" text-anchor="middle" class="small">Prompt Template</text>

  <line x1="165" y1="149" x2="165" y2="165" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <rect x="75" y="165" width="180" height="34" rx="6" fill="#0f172a" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="165" y="186" text-anchor="middle" class="small">LLM Call</text>

  <line x1="165" y1="199" x2="165" y2="215" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <rect x="75" y="215" width="180" height="34" rx="6" fill="#0f172a" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="165" y="236" text-anchor="middle" class="small">Output Parser</text>

  <line x1="165" y1="249" x2="165" y2="265" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <rect x="75" y="265" width="180" height="34" rx="6" fill="#0f172a" stroke="#6366f1" stroke-width="1" opacity="0.9"/>
  <text x="165" y="286" text-anchor="middle" class="small">Retriever / Tool</text>

  <text x="165" y="320" text-anchor="middle" class="tiny">LCEL: pipe-Syntax |</text>

  <!-- Schicht 2: Agents -->
  <rect x="320" y="65" width="250" height="280" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="320" y="65" width="250" height="32" rx="10" fill="#06b6d4" opacity="0.2"/>
  <circle cx="342" cy="81" r="8" fill="#06b6d4" opacity="0.6"/>
  <text x="355" y="86" class="label" fill="#67e8f9">2. Agents (Dynamisch)</text>

  <!-- Agent-Loop -->
  <rect x="355" y="115" width="180" height="34" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
  <text x="445" y="136" text-anchor="middle" class="small">LLM (Reasoning)</text>

  <path d="M535,132 C560,132 560,186 535,186" stroke="#06b6d4" stroke-width="1.2" fill="none" marker-end="url(#arrowHead)"/>
  <text x="563" y="162" class="tiny" fill="#06b6d4">Loop</text>

  <rect x="355" y="165" width="180" height="34" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
  <text x="445" y="186" text-anchor="middle" class="small">Tool Selection</text>

  <line x1="445" y1="199" x2="445" y2="215" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <rect x="355" y="215" width="180" height="34" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
  <text x="445" y="236" text-anchor="middle" class="small">Tool Execution</text>

  <line x1="445" y1="249" x2="445" y2="265" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <rect x="355" y="265" width="180" height="34" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
  <text x="445" y="286" text-anchor="middle" class="small" fill="#fbbf24">Observation -> Repeat?</text>

  <text x="445" y="320" text-anchor="middle" class="tiny">ReAct / Tool-Calling Agent</text>

  <!-- Schicht 3: LangGraph -->
  <rect x="600" y="65" width="260" height="280" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="600" y="65" width="260" height="32" rx="10" fill="#10b981" opacity="0.2"/>
  <circle cx="622" cy="81" r="8" fill="#10b981" opacity="0.6"/>
  <text x="635" y="86" class="label" fill="#6ee7b7">3. LangGraph (Graphbasiert)</text>

  <!-- Graph-Nodes -->
  <circle cx="660" cy="135" r="20" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="139" text-anchor="middle" class="tiny" fill="#10b981">Start</text>

  <line x1="680" y1="135" x2="715" y2="135" stroke="#10b981" stroke-width="1" marker-end="url(#arrowHeadGreen)"/>

  <rect x="715" y="118" width="70" height="34" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <text x="750" y="139" text-anchor="middle" class="tiny" fill="#6ee7b7">Node A</text>

  <line x1="750" y1="152" x2="750" y2="178" stroke="#10b981" stroke-width="1" marker-end="url(#arrowHeadGreen)"/>
  <line x1="785" y1="135" x2="810" y2="170" stroke="#10b981" stroke-width="1" marker-end="url(#arrowHeadGreen)"/>

  <rect x="715" y="178" width="70" height="34" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="750" y="199" text-anchor="middle" class="tiny" fill="#67e8f9">Node B</text>

  <rect x="795" y="158" width="55" height="34" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="822" y="179" text-anchor="middle" class="tiny" fill="#fbbf24">Cond.</text>

  <line x1="750" y1="212" x2="750" y2="238" stroke="#10b981" stroke-width="1" marker-end="url(#arrowHeadGreen)"/>

  <circle cx="750" cy="255" r="18" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="750" y="259" text-anchor="middle" class="tiny" fill="#10b981">End</text>

  <!-- State-Box -->
  <rect x="620" y="228" width="100" height="30" rx="5" fill="#10b981" opacity="0.12" stroke="#10b981" stroke-width="0.8"/>
  <text x="670" y="247" text-anchor="middle" class="tiny" fill="#10b981">State (dict)</text>

  <!-- Graph-Merkmale -->
  <text x="730" y="296" text-anchor="middle" class="tiny">Nodes + Edges + State</text>
  <text x="730" y="310" text-anchor="middle" class="tiny">Conditional Routing</text>
  <text x="730" y="324" text-anchor="middle" class="tiny">Checkpoints / Persistence</text>
  <text x="730" y="338" text-anchor="middle" class="tiny">Human-in-the-Loop</text>

  <!-- MCP + Deep Agents Box rechts -->
  <rect x="890" y="65" width="190" height="135" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="890" y="65" width="190" height="28" rx="10" fill="#f59e0b" opacity="0.15"/>
  <text x="985" y="84" text-anchor="middle" class="label" fill="#fbbf24">MCP-Integration</text>

  <rect x="905" y="100" width="160" height="28" rx="5" fill="#0f172a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="985" y="118" text-anchor="middle" class="tiny" fill="#fbbf24">MCP Server als Tool</text>

  <rect x="905" y="135" width="160" height="28" rx="5" fill="#0f172a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="985" y="153" text-anchor="middle" class="tiny" fill="#fbbf24">langchain-mcp-adapters</text>

  <rect x="905" y="170" width="160" height="22" rx="5" fill="#f59e0b" opacity="0.1"/>
  <text x="985" y="185" text-anchor="middle" class="tiny" fill="#f59e0b">Standardisierte Tool-Anbindung</text>

  <!-- Deep Agents Box -->
  <rect x="890" y="215" width="190" height="130" rx="10" fill="#1e293b" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="890" y="215" width="190" height="28" rx="10" fill="#dc2626" opacity="0.15"/>
  <text x="985" y="234" text-anchor="middle" class="label" fill="#fca5a5">Deep Agents</text>

  <rect x="905" y="252" width="160" height="24" rx="5" fill="#0f172a" stroke="#dc2626" stroke-width="0.8"/>
  <text x="985" y="268" text-anchor="middle" class="tiny" fill="#fca5a5">Multi-Agent Graphs</text>

  <rect x="905" y="282" width="160" height="24" rx="5" fill="#0f172a" stroke="#dc2626" stroke-width="0.8"/>
  <text x="985" y="298" text-anchor="middle" class="tiny" fill="#fca5a5">Supervisor Pattern</text>

  <rect x="905" y="312" width="160" height="24" rx="5" fill="#0f172a" stroke="#dc2626" stroke-width="0.8"/>
  <text x="985" y="328" text-anchor="middle" class="tiny" fill="#fca5a5">Subgraph Composition</text>
</svg>