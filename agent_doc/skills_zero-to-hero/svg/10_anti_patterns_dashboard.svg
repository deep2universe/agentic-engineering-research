    <text x="80" y="42" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">#3 Tiefe Referenzen</text>
    <text x="80" y="58" text-anchor="middle" fill="#94a3b8" font-size="9">A → B → C → D</text>
    <text x="80" y="72" text-anchor="middle" fill="#64748b" font-size="8">→ Max. 1 Ebene</text>
  </g>
  <g filter="s10" transform="translate(565, 95)">
