<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; fill: #e2e8f0; }
    .title { font-size: 16px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 12px; font-weight: 600; }
    .small { font-size: 10px; fill: #cbd5e1; }
    .tiny { font-size: 9px; fill: #94a3b8; }
    .badge { font-size: 8px; font-weight: 600; }
    .philosophy { font-size: 10px; fill: #94a3b8; font-style: italic; }
  </style>

  <!-- Hintergrund -->
  <rect width="1100" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- Titel -->
  <text x="550" y="28" text-anchor="middle" class="title">OpenAI Agents SDK</text>
  <text x="550" y="44" text-anchor="middle" class="subtitle">"Minimale Abstraktion" -- Wenige, aber maechtige Primitives</text>

  <!-- ===== 3 Core Primitives (Zentrum) ===== -->

  <!-- Agents -->
  <rect x="340" y="130" width="140" height="90" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="340" y="130" width="140" height="24" rx="10" fill="#6366f1" opacity="0.25"/>
  <text x="410" y="147" text-anchor="middle" class="label" fill="#a5b4fc">Agents</text>
  <text x="410" y="170" text-anchor="middle" class="tiny" fill="#a5b4fc">Instructions</text>
  <text x="410" y="183" text-anchor="middle" class="tiny" fill="#a5b4fc">Model Config</text>
  <text x="410" y="196" text-anchor="middle" class="tiny" fill="#a5b4fc">Tools &amp; Handoffs</text>

  <!-- Handoffs -->
  <rect x="500" y="130" width="140" height="90" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="500" y="130" width="140" height="24" rx="10" fill="#10b981" opacity="0.25"/>
  <text x="570" y="147" text-anchor="middle" class="label" fill="#6ee7b7">Handoffs</text>
  <text x="570" y="170" text-anchor="middle" class="tiny" fill="#6ee7b7">Agent -> Agent</text>
  <text x="570" y="183" text-anchor="middle" class="tiny" fill="#6ee7b7">Delegation</text>
  <text x="570" y="196" text-anchor="middle" class="tiny" fill="#6ee7b7">Context Transfer</text>

  <!-- Guardrails -->
  <rect x="660" y="130" width="140" height="90" rx="10" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <rect x="660" y="130" width="140" height="24" rx="10" fill="#dc2626" opacity="0.25"/>
  <text x="730" y="147" text-anchor="middle" class="label" fill="#fca5a5">Guardrails</text>
  <text x="730" y="170" text-anchor="middle" class="tiny" fill="#fca5a5">Input Validation</text>
  <text x="730" y="183" text-anchor="middle" class="tiny" fill="#fca5a5">Output Validation</text>
  <text x="730" y="196" text-anchor="middle" class="tiny" fill="#fca5a5">Tripwire / Filter</text>

  <!-- "Core Primitives" Label -->
  <rect x="420" y="107" width="130" height="18" rx="4" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="485" y="120" text-anchor="middle" class="badge" fill="#fbbf24">3 CORE PRIMITIVES</text>

  <!-- Verbindungslinien zwischen Primitives -->
  <line x1="480" y1="175" x2="500" y2="175" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="640" y1="175" x2="660" y2="175" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== 5 Tool-Kategorien (drum herum) ===== -->

  <!-- Tool 1: Hosted Tools (oben links) -->
  <rect x="50" y="65" width="210" height="80" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="50" y="65" width="210" height="22" rx="8" fill="#06b6d4" opacity="0.15"/>
  <text x="155" y="80" text-anchor="middle" class="small" fill="#67e8f9" font-weight="600">Hosted Tools</text>

  <rect x="65" y="95" width="80" height="18" rx="3" fill="#06b6d4" opacity="0.12"/>
  <text x="105" y="108" text-anchor="middle" class="badge" fill="#67e8f9">Web Search</text>
  <rect x="150" y="95" width="95" height="18" rx="3" fill="#06b6d4" opacity="0.12"/>
  <text x="197" y="108" text-anchor="middle" class="badge" fill="#67e8f9">File Search</text>
  <rect x="65" y="118" width="95" height="18" rx="3" fill="#06b6d4" opacity="0.12"/>
  <text x="112" y="131" text-anchor="middle" class="badge" fill="#67e8f9">Computer Use</text>

  <line x1="260" y1="105" x2="340" y2="155" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Tool 2: Local Tools (oben rechts) -->
  <rect x="870" y="65" width="200" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="870" y="65" width="200" height="22" rx="8" fill="#f59e0b" opacity="0.15"/>
  <text x="970" y="80" text-anchor="middle" class="small" fill="#fbbf24" font-weight="600">Local Tools</text>

  <rect x="885" y="95" width="80" height="18" rx="3" fill="#f59e0b" opacity="0.12"/>
  <text x="925" y="108" text-anchor="middle" class="badge" fill="#fbbf24">@function_tool</text>
  <rect x="885" y="118" width="170" height="18" rx="3" fill="#f59e0b" opacity="0.12"/>
  <text x="970" y="131" text-anchor="middle" class="badge" fill="#fbbf24">Python-Funktionen als Tools</text>

  <line x1="870" y1="105" x2="800" y2="155" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Tool 3: Function Calling (unten links) -->
  <rect x="50" y="260" width="210" height="80" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="50" y="260" width="210" height="22" rx="8" fill="#6366f1" opacity="0.15"/>
  <text x="155" y="275" text-anchor="middle" class="small" fill="#a5b4fc" font-weight="600">Function Calling</text>

  <text x="155" y="300" text-anchor="middle" class="tiny" fill="#a5b4fc">JSON Schema basiert</text>
  <text x="155" y="314" text-anchor="middle" class="tiny" fill="#a5b4fc">Automatische Typ-Validierung</text>
  <text x="155" y="328" text-anchor="middle" class="tiny" fill="#a5b4fc">Pydantic-Integration</text>

  <line x1="260" y1="295" x2="340" y2="210" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Tool 4: Agents as Tools (unten mitte) -->
  <rect x="460" y="260" width="210" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="460" y="260" width="210" height="22" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="565" y="275" text-anchor="middle" class="small" fill="#6ee7b7" font-weight="600">Agents as Tools</text>

  <text x="565" y="300" text-anchor="middle" class="tiny" fill="#6ee7b7">Agent als Tool eines anderen</text>
  <text x="565" y="314" text-anchor="middle" class="tiny" fill="#6ee7b7">Agents verwenden</text>
  <text x="565" y="328" text-anchor="middle" class="tiny" fill="#6ee7b7">Composable Hierarchien</text>

  <line x1="565" y1="260" x2="565" y2="220" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Tool 5: Codex (unten rechts) -->
  <rect x="870" y="260" width="200" height="80" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="870" y="260" width="200" height="22" rx="8" fill="#dc2626" opacity="0.15"/>
  <text x="970" y="275" text-anchor="middle" class="small" fill="#fca5a5" font-weight="600">Codex</text>

  <text x="970" y="300" text-anchor="middle" class="tiny" fill="#fca5a5">Cloud-basierte Code-Ausfuehrung</text>
  <text x="970" y="314" text-anchor="middle" class="tiny" fill="#fca5a5">Sandboxed Environment</text>
  <text x="970" y="328" text-anchor="middle" class="tiny" fill="#fca5a5">Autonomer Coding-Agent</text>

  <line x1="870" y1="295" x2="800" y2="210" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Philosophie-Box unten -->
  <rect x="180" y="365" width="740" height="28" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="0.6"/>
  <text x="550" y="384" text-anchor="middle" class="philosophy">"Enough features to be worth using, but few enough to be quick to learn" -- OpenAI Design-Philosophie</text>

  <!-- Tracing-Hinweis -->
  <rect x="340" y="232" width="170" height="20" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.6"/>
  <text x="425" y="246" text-anchor="middle" class="tiny" fill="#f59e0b">Built-in Tracing &amp; Observability</text>

  <rect x="530" y="232" width="170" height="20" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.6"/>
  <text x="615" y="246" text-anchor="middle" class="tiny" fill="#06b6d4">Runner: run() / run_streamed()</text>
</svg>