    <line x1="310" y1="130" x2="310" y2="80" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="225" y="20" width="170" height="60" rx="8" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="310" y="42" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Dez 2025</text>
    <text x="310" y="58" text-anchor="middle" fill="#a5b4fc" font-size="10">Agent Skills Standard</text>
    <text x="310" y="72" text-anchor="middle" fill="#94a3b8" font-size="9">Anthropic — Offener Standard</text>
  </g>

  <!-- Jan 2026: Microsoft + OpenAI -->
  <g filter="s02">
    <circle cx="500" cy="150" r="12" fill="#059669" stroke="#10b981" stroke-width="2"/>
    <line x1="500" y1="165" x2="500" y2="210" stroke="#10b981" stroke-width="1.5"/>
    <rect x="415" y="210" width="170" height="72" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="500" y="232" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Jan 2026</text>
    <text x="500" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">Microsoft adoptiert</text>
    <text x="500" y="264" text-anchor="middle" fill="#94a3b8" font-size="10">(VS Code, Copilot)</text>
    <text x="500" y="278" text-anchor="middle" fill="#94a3b8" font-size="10">OpenAI Codex folgt</text>
  </g>

  <!-- Feb 2026: Wave 2 -->
  <g filter="s02">
    <circle cx="690" cy="150" r="12" fill="#d97706" stroke="#f59e0b" stroke-width="2"/>
    <line x1="690" y1="130" x2="690" y2="80" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="600" y="20" width="180" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="690" y="42" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Feb 2026</text>
    <text x="690" y="58" text-anchor="middle" fill="#94a3b8" font-size="10">Cursor, Junie, Goose,</text>
    <text x="690" y="72" text-anchor="middle" fill="#94a3b8" font-size="10">Amp adoptieren</text>
  </g>

  <!-- Mar 2026: 30+ -->
  <g filter="s02">
    <circle cx="880" cy="150" r="16" fill="#dc2626" stroke="#f87171" stroke-width="2"/>
    <text x="880" y="155" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">30+</text>
    <line x1="880" y1="165" x2="880" y2="210" stroke="#f87171" stroke-width="1.5"/>
    <rect x="790" y="210" width="180" height="72" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
    <text x="880" y="232" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">März 2026</text>
    <text x="880" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">30+ Plattformen</text>
    <text x="880" y="264" text-anchor="middle" fill="#94a3b8" font-size="10">150+ Skills auf</text>
    <text x="880" y="278" text-anchor="middle" fill="#94a3b8" font-size="10">Marketplace</text>
