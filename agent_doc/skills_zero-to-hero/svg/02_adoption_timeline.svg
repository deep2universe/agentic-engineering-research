<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg02a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="s02"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1100" height="400" fill="url(#bg02a)" rx="16"/>
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Agent Skills Standard — Adoption Timeline</text>
  <line x1="320" y1="48" x2="780" y2="48" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Timeline line -->
  <line x1="80" y1="150" x2="1020" y2="150" stroke="#334155" stroke-width="3" stroke-linecap="round"/>

  <!-- Nov 2024: MCP -->
  <g filter="s02">
    <circle cx="130" cy="150" r="12" fill="#0891b2" stroke="#06b6d4" stroke-width="2"/>
    <line x1="130" y1="165" x2="130" y2="210" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="55" y="210" width="150" height="60" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="130" y="232" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">Nov 2024</text>
    <text x="130" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">MCP veröffentlicht</text>
    <text x="130" y="264" text-anchor="middle" fill="#64748b" font-size="9">(Anthropic)</text>
  </g>

  <!-- Dec 2025: Agent Skills -->
  <g filter="s02">
    <circle cx="310" cy="150" r="16" fill="#7c3aed" stroke="#a78bfa" stroke-width="3"/>
