  <rect x="80" y="320" width="940" height="55" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="550" y="340" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">Unterstützende Plattformen</text>
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="90" height="20" rx="4" fill="#312e81"/><text x="45" y="14" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Claude Code</text>
    <rect x="100" y="0" width="80" height="20" rx="4" fill="#0c4a6e"/><text x="140" y="14" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">VS Code</text>
    <rect x="190" y="0" width="80" height="20" rx="4" fill="#064e3b"/><text x="230" y="14" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">Copilot</text>
    <rect x="280" y="0" width="70" height="20" rx="4" fill="#451a03"/><text x="315" y="14" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Codex</text>
    <rect x="360" y="0" width="70" height="20" rx="4" fill="#1e293b"/><text x="395" y="14" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Cursor</text>
    <rect x="440" y="0" width="70" height="20" rx="4" fill="#1e293b"/><text x="475" y="14" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Junie</text>
    <rect x="520" y="0" width="70" height="20" rx="4" fill="#1e293b"/><text x="555" y="14" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Goose</text>
    <rect x="600" y="0" width="60" height="20" rx="4" fill="#1e293b"/><text x="630" y="14" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Amp</text>
    <rect x="670" y="0" width="100" height="20" rx="4" fill="#1e293b"/><text x="720" y="14" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">OpenCode</text>
    <rect x="780" y="0" width="60" height="20" rx="4" fill="#334155"/><text x="810" y="14" text-anchor="middle" fill="#94a3b8" font-size="9">u.v.m.</text>
