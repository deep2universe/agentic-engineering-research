<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg09" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="ar09" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <filter id="s09"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1100" height="450" fill="url(#bg09)" rx="16"/>
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">Fortgeschrittene Patterns — Multi-Agent &amp; Skill Composition</text>
  <line x1="260" y1="48" x2="840" y2="48" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Orchestrator -->
  <g filter="s09" transform="translate(360, 65)">
    <rect width="380" height="70" rx="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="190" y="30" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">Orchestrator-Agent</text>
    <text x="190" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Recherche → Zerlegung → Plan → Delegation</text>
  </g>

  <!-- Arrows down -->
  <line x1="430" y1="140" x2="200" y2="190" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ar09)"/>
  <line x1="550" y1="140" x2="550" y2="190" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ar09)"/>
  <line x1="670" y1="140" x2="900" y2="190" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ar09)"/>

  <!-- Worker 1 -->
  <g filter="s09" transform="translate(60, 195)">
    <rect width="260" height="120" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="32" rx="12" fill="#064e3b"/>
    <text x="130" y="22" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Worker 1 (Worktree)</text>
    <text x="130" y="58" text-anchor="middle" fill="#94a3b8" font-size="11">Security Review</text>
    <text x="130" y="78" text-anchor="middle" fill="#64748b" font-size="10">OWASP Top 10 · Dependencies</text>
    <rect x="15" y="90" width="70" height="20" rx="4" fill="#0f172a"/>
    <text x="50" y="104" text-anchor="middle" fill="#6ee7b7" font-size="9">Isoliert</text>
    <rect x="95" y="90" width="70" height="20" rx="4" fill="#0f172a"/>
    <text x="130" y="104" text-anchor="middle" fill="#6ee7b7" font-size="9">Parallel</text>
  </g>

  <!-- Worker 2 -->
  <g filter="s09" transform="translate(420, 195)">
    <rect width="260" height="120" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="32" rx="12" fill="#451a03"/>
    <text x="130" y="22" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Worker 2 (Worktree)</text>
    <text x="130" y="58" text-anchor="middle" fill="#94a3b8" font-size="11">Performance Review</text>
    <text x="130" y="78" text-anchor="middle" fill="#64748b" font-size="10">N+1 Queries · Memory Leaks</text>
    <rect x="15" y="90" width="70" height="20" rx="4" fill="#0f172a"/>
    <text x="50" y="104" text-anchor="middle" fill="#fbbf24" font-size="9">Isoliert</text>
    <rect x="95" y="90" width="70" height="20" rx="4" fill="#0f172a"/>
    <text x="130" y="104" text-anchor="middle" fill="#fbbf24" font-size="9">Parallel</text>
  </g>

  <!-- Worker N -->
  <g filter="s09" transform="translate(780, 195)">
    <rect width="260" height="120" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="32" rx="12" fill="#0c4a6e"/>
    <text x="130" y="22" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Worker N (Worktree)</text>
    <text x="130" y="58" text-anchor="middle" fill="#94a3b8" font-size="11">Architecture Review</text>
    <text x="130" y="78" text-anchor="middle" fill="#64748b" font-size="10">SOLID · Coupling · API Design</text>
    <rect x="15" y="90" width="70" height="20" rx="4" fill="#0f172a"/>
    <text x="50" y="104" text-anchor="middle" fill="#67e8f9" font-size="9">Isoliert</text>
    <rect x="95" y="90" width="70" height="20" rx="4" fill="#0f172a"/>
    <text x="130" y="104" text-anchor="middle" fill="#67e8f9" font-size="9">Parallel</text>
  </g>

  <!-- Aggregation -->
  <line x1="190" y1="320" x2="550" y2="360" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="550" y1="320" x2="550" y2="360" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="910" y1="320" x2="550" y2="360" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3"/>

  <g filter="s09" transform="translate(350, 360)">
    <rect width="400" height="60" rx="12" fill="#1e293b" stroke="#dc2626" stroke-width="2"/>
    <text x="200" y="25" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">Aggregation &amp; Priorisierung</text>
    <text x="200" y="45" text-anchor="middle" fill="#94a3b8" font-size="11">Findings zusammenführen → nach Severity sortieren → Report</text>
  </g>
</svg>