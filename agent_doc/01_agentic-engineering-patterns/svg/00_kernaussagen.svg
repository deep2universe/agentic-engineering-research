<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1000" height="650" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="bold" fill="url(#gold)">6 Kernaussagen des Agentic Engineering</text>
  <line x1="200" y1="60" x2="800" y2="60" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

  <!-- Hexagonal layout — 6 pillars -->
  <!-- Pillar 1: Einfachheit -->
  <g filter="url(#sh)">
    <rect x="40" y="90" width="290" height="150" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="40" y="90" width="290" height="32" rx="10" fill="#6366f1" opacity="0.15"/>
    <circle cx="65" cy="106" r="12" fill="#6366f1"/>
    <text x="65" y="111" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="white" font-weight="bold">1</text>
    <text x="85" y="112" font-family="Segoe UI, Arial" font-size="14" fill="#a5b4fc" font-weight="bold">Einfachheit vor Komplexität</text>
    <text x="60" y="145" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Einfache, komponierbare Patterns</text>
    <text x="60" y="163" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">schlagen komplexe Frameworks.</text>
    <text x="60" y="185" font-family="Segoe UI, Arial" font-size="10" fill="#64748b" font-style="italic">Starte minimal, skaliere bei Bedarf.</text>
    <!-- Icon: simple blocks -->
    <rect x="270" y="145" width="20" height="20" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="295" y="145" width="20" height="20" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="270" y="170" width="20" height="20" rx="3" fill="#6366f1" opacity="0.3"/>
  </g>

  <!-- Pillar 2: Workflows vs Agents -->
  <g filter="url(#sh)">
    <rect x="355" y="90" width="290" height="150" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="355" y="90" width="290" height="32" rx="10" fill="#8b5cf6" opacity="0.15"/>
    <circle cx="380" cy="106" r="12" fill="#8b5cf6"/>
    <text x="380" y="111" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="white" font-weight="bold">2</text>
    <text x="400" y="112" font-family="Segoe UI, Arial" font-size="14" fill="#c4b5fd" font-weight="bold">Workflows vs. Agents</text>
    <text x="375" y="145" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Workflows = deterministische Pfade</text>
    <text x="375" y="163" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Agents = LLM-gesteuerte Dynamik</text>
    <text x="375" y="185" font-family="Segoe UI, Arial" font-size="10" fill="#64748b" font-style="italic">Bewusste Entscheidung, nicht Default.</text>
    <!-- Icon: fork -->
    <line x1="595" y1="150" x2="595" y2="170" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="585" y1="170" x2="595" y2="170" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="605" y1="170" x2="595" y2="170" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="585" cy="175" r="4" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="605" cy="175" r="4" fill="#8b5cf6" opacity="0.6"/>
  </g>

  <!-- Pillar 3: Context Engineering -->
  <g filter="url(#sh)">
    <rect x="670" y="90" width="290" height="150" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <rect x="670" y="90" width="290" height="32" rx="10" fill="#ec4899" opacity="0.15"/>
    <circle cx="695" cy="106" r="12" fill="#ec4899"/>
    <text x="695" y="111" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="white" font-weight="bold">3</text>
    <text x="715" y="112" font-family="Segoe UI, Arial" font-size="14" fill="#f9a8d4" font-weight="bold">Context Engineering</text>
    <text x="690" y="145" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Die neue Schlüsselkompetenz 2026.</text>
    <text x="690" y="163" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Dynamische Kontextauswahl,</text>
    <text x="690" y="181" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Kompression und Memory.</text>
    <!-- Icon: funnel -->
    <polygon points="910,142 940,142 930,175 920,175" fill="#ec4899" opacity="0.4"/>
    <rect x="920" y="175" width="10" height="10" rx="2" fill="#ec4899" opacity="0.6"/>
  </g>

  <!-- Pillar 4: Defense-in-Depth -->
  <g filter="url(#sh)">
    <rect x="40" y="270" width="290" height="150" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect x="40" y="270" width="290" height="32" rx="10" fill="#ef4444" opacity="0.15"/>
    <circle cx="65" cy="286" r="12" fill="#ef4444"/>
    <text x="65" y="291" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="white" font-weight="bold">4</text>
    <text x="85" y="292" font-family="Segoe UI, Arial" font-size="14" fill="#fca5a5" font-weight="bold">Defense-in-Depth</text>
    <text x="60" y="325" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Mehrschichtige Sicherheit:</text>
    <text x="60" y="343" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Input, Guardrails, Sandbox, Output.</text>
    <text x="60" y="365" font-family="Segoe UI, Arial" font-size="10" fill="#64748b" font-style="italic">Keine einzelne Schicht reicht aus.</text>
    <!-- Icon: shield layers -->
    <rect x="275" y="320" width="30" height="35" rx="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
    <rect x="280" y="325" width="20" height="25" rx="4" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <rect x="285" y="330" width="10" height="15" rx="3" fill="#ef4444" opacity="0.4"/>
  </g>

  <!-- Pillar 5: Observability -->
  <g filter="url(#sh)">
    <rect x="355" y="270" width="290" height="150" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="355" y="270" width="290" height="32" rx="10" fill="#10b981" opacity="0.15"/>
    <circle cx="380" cy="286" r="12" fill="#10b981"/>
    <text x="380" y="291" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="white" font-weight="bold">5</text>
    <text x="400" y="292" font-family="Segoe UI, Arial" font-size="14" fill="#6ee7b7" font-weight="bold">Observability</text>
    <text x="375" y="325" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Nicht-deterministisches Verhalten</text>
    <text x="375" y="343" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">erfordert strukturiertes Tracing</text>
    <text x="375" y="361" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">über alle Agent-Schritte.</text>
    <!-- Icon: eye -->
    <ellipse cx="605" cy="340" rx="18" ry="12" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <circle cx="605" cy="340" r="6" fill="#10b981" opacity="0.5"/>
  </g>

  <!-- Pillar 6: Human-in-the-Loop -->
  <g filter="url(#sh)">
    <rect x="670" y="270" width="290" height="150" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="670" y="270" width="290" height="32" rx="10" fill="#22d3ee" opacity="0.15"/>
    <circle cx="695" cy="286" r="12" fill="#22d3ee"/>
    <text x="695" y="291" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#0f172a" font-weight="bold">6</text>
    <text x="715" y="292" font-family="Segoe UI, Arial" font-size="14" fill="#67e8f9" font-weight="bold">Human-in-the-Loop</text>
    <text x="690" y="325" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Menschliche Aufsicht ist kein</text>
    <text x="690" y="343" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Notbehelf, sondern ein bewusstes</text>
    <text x="690" y="361" font-family="Segoe UI, Arial" font-size="11" fill="#cbd5e1">Architektur-Pattern.</text>
    <!-- Icon: person + loop -->
    <circle cx="920" cy="332" r="6" fill="#22d3ee" opacity="0.5"/>
    <line x1="920" y1="338" x2="920" y2="355" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
    <path d="M908,358 Q920,368 932,358" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Central connecting visual -->
  <text x="500" y="470" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#f59e0b" font-weight="bold">Zusammenspiel aller Prinzipien</text>

  <!-- Flow arrows bottom -->
  <g opacity="0.5">
    <path d="M200,490 C300,510 400,490 500,510 C600,530 700,490 800,510" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="8,4"/>
  </g>

  <!-- Bottom bar -->
  <rect x="100" y="530" width="800" height="90" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#sh)"/>
  <text x="500" y="560" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#f59e0b" font-weight="bold">Leitgedanke</text>
  <text x="500" y="585" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0">"Die erfolgreichsten Agent-Implementierungen nutzen einfache, komponierbare Patterns</text>
  <text x="500" y="605" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0">statt komplexer Frameworks." — Anthropic</text>
</svg>