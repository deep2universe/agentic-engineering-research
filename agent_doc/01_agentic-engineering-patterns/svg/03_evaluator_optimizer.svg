<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380">
  <defs>
    <linearGradient id="bg03e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh03e"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="750" height="380" fill="url(#bg03e)" rx="12"/>

  <text x="375" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Evaluator-Optimizer Pattern</text>
  <text x="375" y="53" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">Iterative Verbesserung bis Qualitätsschwellwert erreicht</text>

  <!-- Input -->
  <rect x="30" y="120" width="80" height="40" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="70" y="145" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#67e8f9">Input</text>
  <line x1="110" y1="140" x2="150" y2="140" stroke="#22d3ee" stroke-width="2"/>

  <!-- Generator -->
  <rect x="155" y="100" width="160" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#sh03e)"/>
  <text x="235" y="130" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#a5b4fc">Generator</text>
  <text x="235" y="150" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Erstellt / überarbeitet</text>
  <text x="235" y="165" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">den Output</text>

  <!-- Arrow down to Draft -->
  <line x1="315" y1="140" x2="370" y2="140" stroke="#6366f1" stroke-width="2"/>
  <polygon points="370,140 363,135 363,145" fill="#6366f1"/>

  <!-- Draft output -->
  <rect x="375" y="115" width="100" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="425" y="140" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#cbd5e1">Draft v{n}</text>
  <text x="425" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#64748b">Output</text>

  <!-- Arrow to Evaluator -->
  <line x1="425" y1="165" x2="425" y2="210" stroke="#475569" stroke-width="2"/>
  <polygon points="425,210 420,203 430,203" fill="#475569"/>

  <!-- Evaluator -->
  <rect x="345" y="215" width="160" height="80" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2" filter="url(#sh03e)"/>
  <text x="425" y="245" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#f472b6">Evaluator</text>
  <text x="425" y="265" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Bewertet Qualität</text>
  <text x="425" y="280" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Gibt Feedback</text>

  <!-- Decision: Quality OK? -->
  <line x1="505" y1="255" x2="560" y2="255" stroke="#ec4899" stroke-width="2"/>
  <polygon points="560,255 553,250 553,260" fill="#ec4899"/>

  <!-- Quality check diamond -->
  <polygon points="610,225 650,255 610,285 570,255" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="610" y="252" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#fbbf24">Qualität</text>
  <text x="610" y="264" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#fbbf24">≥ Ziel?</text>

  <!-- YES path -->
  <line x1="650" y1="255" x2="700" y2="255" stroke="#10b981" stroke-width="2"/>
  <polygon points="700,255 693,250 693,260" fill="#10b981"/>
  <text x="675" y="245" font-family="Segoe UI, Arial" font-size="9" fill="#10b981" font-weight="bold">JA</text>
  <rect x="700" y="240" width="40" height="30" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="720" y="259" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#6ee7b7">Done</text>

  <!-- NO path: Feedback loop back -->
  <text x="610" y="305" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#ef4444" font-weight="bold">NEIN</text>
  <path d="M610,285 L610,320 Q610,330 600,330 L250,330 Q235,330 235,315 L235,180" fill="none" stroke="#ef4444" stroke-width="2"/>
  <polygon points="235,180 230,188 240,188" fill="#ef4444"/>
  <rect x="355" y="320" width="140" height="22" rx="4" fill="#ef4444" opacity="0.1"/>
  <text x="425" y="335" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#ef4444">Strukturiertes Feedback</text>

  <!-- Iteration counter -->
  <rect x="155" y="200" width="120" height="22" rx="4" fill="#f59e0b" opacity="0.1"/>
  <text x="215" y="215" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#f59e0b">Max N Iterationen</text>

  <!-- Bottom insight -->
  <text x="375" y="370" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#64748b" font-style="italic">Verschiedene Modelle möglich: Starkes Modell als Evaluator, effizientes als Generator</text>
</svg>