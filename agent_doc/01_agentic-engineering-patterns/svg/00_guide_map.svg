<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Header -->
  <rect x="30" y="20" width="940" height="60" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="500" y="58" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="bold" fill="white">Agentic Engineering: Guide Map</text>

  <!-- Connection lines -->
  <g stroke="#4f46e5" stroke-width="2" stroke-dasharray="6,4" opacity="0.5">
    <line x1="260" y1="160" x2="260" y2="200"/>
    <line x1="500" y1="160" x2="500" y2="200"/>
    <line x1="740" y1="160" x2="740" y2="200"/>
    <line x1="260" y1="300" x2="260" y2="340"/>
    <line x1="500" y1="300" x2="500" y2="340"/>
    <line x1="740" y1="300" x2="740" y2="340"/>
    <line x1="260" y1="440" x2="260" y2="480"/>
    <line x1="500" y1="440" x2="500" y2="480"/>
    <line x1="740" y1="440" x2="740" y2="480"/>
  </g>

  <!-- Row 1 -->
  <!-- Card 01 -->
  <rect x="50" y="100" width="200" height="100" rx="8" fill="url(#cardGrad)" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="130" font-family="Segoe UI, Arial" font-size="11" fill="#818cf8" font-weight="bold">01</text>
  <text x="100" y="130" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Grundlagen</text>
  <text x="70" y="152" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Definitionen, Agentic Loop</text>
  <text x="70" y="168" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Autonomie-Level, Rollen</text>
  <circle cx="230" cy="120" r="12" fill="#6366f1" opacity="0.3"/><text x="230" y="124" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#a5b4fc">F</text>

  <!-- Card 02 -->
  <rect x="290" y="100" width="200" height="100" rx="8" fill="url(#cardGrad)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="130" font-family="Segoe UI, Arial" font-size="11" fill="#a78bfa" font-weight="bold">02</text>
  <text x="340" y="130" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Architektur</text>
  <text x="310" y="152" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">10 Design-Prinzipien</text>
  <text x="310" y="168" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">ACI, Separation of Concerns</text>
  <circle cx="470" cy="120" r="12" fill="#8b5cf6" opacity="0.3"/><text x="470" y="124" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#c4b5fd">P</text>

  <!-- Card 03 -->
  <rect x="530" y="100" width="200" height="100" rx="8" fill="url(#cardGrad)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
