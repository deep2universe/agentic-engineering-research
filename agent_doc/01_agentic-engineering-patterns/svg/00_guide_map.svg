  <text x="100" y="270" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Reasoning</text>
  <text x="70" y="292" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">ReAct, CoT, Tree of Thought</text>
  <text x="70" y="308" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Reflection, Plan-and-Execute</text>
