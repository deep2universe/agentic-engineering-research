  <rect x="290" y="240" width="200" height="100" rx="8" fill="url(#cardGrad)" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="270" font-family="Segoe UI, Arial" font-size="11" fill="#fb923c" font-weight="bold">05</text>
  <text x="340" y="270" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Multi-Agent</text>
  <text x="310" y="292" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Supervisor, Swarm, Hierarchy</text>
  <text x="310" y="308" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Scatter-Gather, A2A, Ensemble</text>
