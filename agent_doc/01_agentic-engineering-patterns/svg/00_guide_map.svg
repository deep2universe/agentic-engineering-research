  <text x="580" y="130" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Workflows</text>
  <text x="550" y="152" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Chaining, Routing, Parallel</text>
  <text x="550" y="168" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Orchestrator, Evaluator</text>
