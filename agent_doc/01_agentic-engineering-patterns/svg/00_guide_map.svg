  <!-- Card 10 -->
  <rect x="50" y="520" width="200" height="80" rx="8" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="550" font-family="Segoe UI, Arial" font-size="11" fill="#34d399" font-weight="bold">10</text>
  <text x="100" y="550" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Observability</text>
  <text x="70" y="572" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Tracing, Evaluation, Kosten</text>

  <!-- Card 11 -->
  <rect x="290" y="520" width="200" height="80" rx="8" fill="url(#cardGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="550" font-family="Segoe UI, Arial" font-size="11" fill="#60a5fa" font-weight="bold">11</text>
  <text x="340" y="550" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Frameworks</text>
  <text x="310" y="572" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">LangGraph, CrewAI, AutoGen</text>

  <!-- Card 12 -->
  <rect x="530" y="520" width="200" height="80" rx="8" fill="url(#cardGrad)" stroke="#d946ef" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="550" font-family="Segoe UI, Arial" font-size="11" fill="#e879f9" font-weight="bold">12</text>
  <text x="580" y="550" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Coding Patterns</text>
  <text x="550" y="572" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Willison, TDD, Git, Subagents</text>

  <!-- Legend -->
  <rect x="770" y="100" width="200" height="200" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1" opacity="0.9"/>
  <text x="870" y="125" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#94a3b8" font-weight="bold">Legende</text>
