  <text x="340" y="410" font-family="Segoe UI, Arial" font-size="13" fill="#e2e8f0" font-weight="bold">Safety &amp; Security</text>
  <text x="310" y="432" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Guardrails, Sandboxing</text>
  <text x="310" y="448" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Defense-in-Depth, OWASP</text>
