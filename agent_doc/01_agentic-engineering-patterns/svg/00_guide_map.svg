  <circle cx="790" y="170" r="5" fill="#ec4899"/><text x="805" y="174" font-family="Segoe UI, Arial" font-size="10" fill="#cbd5e1">Kognition</text>
  <circle cx="790" y="195" r="5" fill="#f97316"/><text x="805" y="199" font-family="Segoe UI, Arial" font-size="10" fill="#cbd5e1">Koordination</text>
  <circle cx="790" y="220" r="5" fill="#ef4444"/><text x="805" y="224" font-family="Segoe UI, Arial" font-size="10" fill="#cbd5e1">Robustheit</text>
  <circle cx="790" y="245" r="5" fill="#10b981"/><text x="805" y="249" font-family="Segoe UI, Arial" font-size="10" fill="#cbd5e1">Betrieb</text>
