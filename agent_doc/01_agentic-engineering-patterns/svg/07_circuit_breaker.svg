<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    </marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#eab308" stroke-width="1.2"/>
    </marker>
    <marker id="arrC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" fill="#f1f5f9" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700">Circuit Breaker &#x2014; Zustandsmaschine</text>
  <text x="440" y="58" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Schutz vor kaskadierenden Fehlern durch automatische Unterbrechung</text>

  <!-- Config bar -->
  <rect x="60" y="75" width="760" height="30" rx="6" fill="#0f172a" opacity="0.5"/>
  <text x="100" y="95" fill="#64748b" font-family="monospace" font-size="10">failure_count: 0</text>
  <text x="280" y="95" fill="#64748b" font-family="monospace" font-size="10">threshold: 5</text>
  <text x="430" y="95" fill="#64748b" font-family="monospace" font-size="10">cooldown: 30s</text>
  <text x="600" y="95" fill="#64748b" font-family="monospace" font-size="10">half_open_max_requests: 3</text>

  <!-- ===== CLOSED State (green) ===== -->
  <rect x="60" y="160" width="210" height="130" rx="16" fill="#0f172a" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="165" cy="198" r="16" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="165" y="204" text-anchor="middle" fill="#22c55e" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="800">&#x2713;</text>
  <text x="165" y="235" text-anchor="middle" fill="#22c55e" font-family="Segoe UI, system-ui, sans-serif" font-size="17" font-weight="700">CLOSED</text>
  <text x="165" y="255" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Normalbetrieb</text>
  <text x="165" y="275" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Alle Requests durchleiten</text>

  <!-- ===== OPEN State (red) ===== -->
  <rect x="600" y="160" width="210" height="130" rx="16" fill="#0f172a" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="705" cy="198" r="16" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="705" y="204" text-anchor="middle" fill="#ef4444" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="800">&#x2717;</text>
  <text x="705" y="235" text-anchor="middle" fill="#ef4444" font-family="Segoe UI, system-ui, sans-serif" font-size="17" font-weight="700">OPEN</text>
  <text x="705" y="255" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Blockiert</text>
  <text x="705" y="275" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Sofort Fehler zur&#xFC;ck</text>

  <!-- ===== HALF-OPEN State (yellow) ===== -->
  <rect x="330" y="310" width="210" height="115" rx="16" fill="#0f172a" stroke="#eab308" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="435" cy="345" r="16" fill="#eab308" opacity="0.15" stroke="#eab308" stroke-width="1"/>
  <text x="435" y="351" text-anchor="middle" fill="#eab308" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="800">?</text>
  <text x="435" y="380" text-anchor="middle" fill="#eab308" font-family="Segoe UI, system-ui, sans-serif" font-size="17" font-weight="700">HALF-OPEN</text>
  <text x="435" y="400" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Testbetrieb</text>
  <text x="435" y="416" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Begrenzte Requests testen</text>

  <!-- Transition: CLOSED -> OPEN -->
  <path d="M270,210 L598,210" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
  <rect x="350" y="150" width="190" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="445" y="168" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">Failure Rate > Threshold</text>
  <text x="445" y="185" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10">z.B. 5 Fehler in 60 Sekunden</text>

  <!-- Transition: OPEN -> HALF-OPEN -->
  <path d="M680,290 C680,350 560,367 542,367" fill="none" stroke="#eab308" stroke-width="2" marker-end="url(#arrY)"/>
  <rect x="575" y="298" width="155" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="652" y="316" text-anchor="middle" fill="#fde047" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">Cooldown Timer</text>
  <text x="652" y="333" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10">z.B. nach 30 Sekunden</text>

  <!-- Transition: HALF-OPEN -> CLOSED (success) -->
  <path d="M345,350 C260,340 210,315 178,292" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <rect x="170" y="300" width="155" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="247" y="318" text-anchor="middle" fill="#86efac" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">Test erfolgreich</text>
  <text x="247" y="335" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Failure Counter Reset</text>

  <!-- Transition: HALF-OPEN -> OPEN (failure) -->
  <path d="M540,340 C575,320 610,300 680,292" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
  <rect x="542" y="350" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="602" y="366" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Test fehlgeschlagen</text>

  <!-- Self-loop: CLOSED stays CLOSED -->
  <path d="M105,160 C85,115 245,115 225,160" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrC)"/>
  <text x="165" y="122" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Requests OK</text>

  <!-- Initial state indicator -->
  <circle cx="38" cy="225" r="7" fill="#22c55e"/>
  <line x1="45" y1="225" x2="58" y2="225" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="38" y="248" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="9">Start</text>
</svg>