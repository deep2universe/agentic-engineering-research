<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg03a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh03"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="900" height="280" fill="url(#bg03a)" rx="12"/>

  <text x="450" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Prompt Chaining</text>
  <text x="450" y="53" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">Sequentielle Verarbeitung mit Validierungs-Gates</text>

  <!-- Input -->
  <rect x="30" y="100" width="80" height="50" rx="8" fill="#164e63" stroke="#22d3ee" stroke-width="1.5" filter="url(#sh03)"/>
  <text x="70" y="130" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#67e8f9">Input</text>

  <!-- Arrow -->
  <line x1="110" y1="125" x2="145" y2="125" stroke="#22d3ee" stroke-width="2"/>
  <polygon points="145,125 138,120 138,130" fill="#22d3ee"/>

  <!-- Step 1 -->
  <rect x="150" y="85" width="130" height="80" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#sh03)"/>
  <text x="215" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#a5b4fc" font-weight="bold">LLM Step 1</text>
  <text x="215" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Generieren</text>
  <text x="215" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#64748b">Spezialisierter Prompt</text>

  <!-- Gate 1 -->
  <line x1="280" y1="125" x2="310" y2="125" stroke="#6366f1" stroke-width="2"/>
  <rect x="310" y="108" width="50" height="34" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="335" y="129" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fbbf24" font-weight="bold">Gate</text>
  <line x1="360" y1="125" x2="390" y2="125" stroke="#f59e0b" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="395" y="85" width="130" height="80" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#sh03)"/>
  <text x="460" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#c4b5fd" font-weight="bold">LLM Step 2</text>
  <text x="460" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Validieren</text>
  <text x="460" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#64748b">Spezialisierter Prompt</text>

  <!-- Gate 2 -->
  <line x1="525" y1="125" x2="555" y2="125" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="555" y="108" width="50" height="34" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="580" y="129" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fbbf24" font-weight="bold">Gate</text>
  <line x1="605" y1="125" x2="635" y2="125" stroke="#f59e0b" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="640" y="85" width="130" height="80" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="2" filter="url(#sh03)"/>
  <text x="705" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#f9a8d4" font-weight="bold">LLM Step 3</text>
  <text x="705" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Formatieren</text>
  <text x="705" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#64748b">Spezialisierter Prompt</text>

  <!-- Arrow to output -->
  <line x1="770" y1="125" x2="805" y2="125" stroke="#ec4899" stroke-width="2"/>
  <polygon points="805,125 798,120 798,130" fill="#ec4899"/>

  <!-- Output -->
  <rect x="810" y="100" width="80" height="50" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5" filter="url(#sh03)"/>
  <text x="850" y="130" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#6ee7b7">Output</text>

  <!-- Error path from gates -->
  <path d="M335,142 L335,190 Q335,200 325,200 L280,200" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="280" y="215" font-family="Segoe UI, Arial" font-size="9" fill="#ef4444">Fehler → Retry / Abbruch</text>

  <!-- Trade-offs -->
  <rect x="150" y="235" width="300" height="28" rx="6" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="300" y="253" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#6ee7b7">Pro: Einfach zu debuggen, isoliert testbar</text>
  <rect x="480" y="235" width="300" height="28" rx="6" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="630" y="253" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#fca5a5">Contra: Höhere Latenz, Fehler-Propagation</text>
</svg>