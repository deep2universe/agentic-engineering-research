<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="s01"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="450" fill="url(#bg01)" rx="12"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="bold" fill="#e2e8f0">Workflow vs. Agent — Fundamentale Unterscheidung</text>

  <!-- Workflow Side -->
  <rect x="40" y="70" width="430" height="340" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#s01)"/>
  <rect x="40" y="70" width="430" height="40" rx="12" fill="#3b82f6" opacity="0.2"/>
  <text x="255" y="97" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="bold" fill="#60a5fa">WORKFLOW</text>
  <text x="255" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">Vordefinierte Code-Pfade</text>

  <!-- Workflow diagram: straight line with fixed nodes -->
  <rect x="80" y="145" width="100" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="170" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#93c5fd">Step 1</text>
  <line x1="180" y1="165" x2="210" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="210" y="145" width="100" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="170" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#93c5fd">Step 2</text>
  <line x1="310" y1="165" x2="340" y2="165" stroke="#3b82f6" stroke-width="2"/>
  <rect x="340" y="145" width="100" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="170" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#93c5fd">Step 3</text>

  <!-- Properties -->
  <g font-family="Segoe UI, Arial" font-size="12" fill="#cbd5e1">
    <circle cx="75" cy="220" r="4" fill="#3b82f6"/><text x="88" y="224">Deterministisch</text>
    <circle cx="75" cy="248" r="4" fill="#3b82f6"/><text x="88" y="252">Vorhersagbar</text>
    <circle cx="75" cy="276" r="4" fill="#3b82f6"/><text x="88" y="280">Einfaches Debugging</text>
    <circle cx="75" cy="304" r="4" fill="#3b82f6"/><text x="88" y="308">Gut definierte Aufgaben</text>
    <circle cx="75" cy="332" r="4" fill="#3b82f6"/><text x="88" y="336">Geringe Flexibilität</text>
  </g>
  <!-- Metaphor: Train on rails -->
  <rect x="310" y="360" width="140" height="30" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
  <text x="380" y="380" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#60a5fa">Zug auf Schienen</text>

  <!-- VS divider -->
  <line x1="500" y1="80" x2="500" y2="400" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="500" cy="240" r="20" fill="#334155" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="245" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#f59e0b">VS</text>

  <!-- Agent Side -->
  <rect x="530" y="70" width="430" height="340" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2" filter="url(#s01)"/>
  <rect x="530" y="70" width="430" height="40" rx="12" fill="#a855f7" opacity="0.2"/>
  <text x="745" y="97" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="bold" fill="#c084fc">AGENT</text>
  <text x="745" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">LLM steuert dynamisch</text>

  <!-- Agent diagram: dynamic branching -->
  <circle cx="620" cy="160" r="20" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <text x="620" y="164" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#d8b4fe">LLM</text>
  <line x1="640" y1="155" x2="700" y2="135" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="640" y1="165" x2="700" y2="165" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="640" y1="170" x2="700" y2="190" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="700" y="122" width="70" height="26" rx="5" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
  <text x="735" y="139" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#d8b4fe">Tool A</text>
  <rect x="700" y="152" width="70" height="26" rx="5" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
  <text x="735" y="169" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#d8b4fe">Tool B</text>
  <rect x="700" y="182" width="70" height="26" rx="5" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
  <text x="735" y="199" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#d8b4fe">Tool C</text>
  <!-- Loop arrow -->
  <path d="M770,165 Q800,165 800,140 Q800,115 770,115" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="815" y="142" font-family="Segoe UI, Arial" font-size="9" fill="#a855f7">Loop</text>

  <!-- Properties -->
  <g font-family="Segoe UI, Arial" font-size="12" fill="#cbd5e1">
    <circle cx="565" cy="230" r="4" fill="#a855f7"/><text x="578" y="234">Modell-basierte Entscheidungen</text>
    <circle cx="565" cy="258" r="4" fill="#a855f7"/><text x="578" y="262">Hohe Flexibilität</text>
    <circle cx="565" cy="286" r="4" fill="#a855f7"/><text x="578" y="290">Komplexes Debugging</text>
    <circle cx="565" cy="314" r="4" fill="#a855f7"/><text x="578" y="318">Offene Problemstellungen</text>
    <circle cx="565" cy="342" r="4" fill="#a855f7"/><text x="578" y="346">Weniger vorhersagbar</text>
  </g>
  <!-- Metaphor: autonomous car -->
  <rect x="800" y="360" width="140" height="30" rx="6" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1"/>
  <text x="870" y="380" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#c084fc">Autonomes Fahrzeug</text>

  <!-- Bottom hint -->
  <text x="500" y="435" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b" font-style="italic">Anthropic: "Beginne mit Workflows. Nutze Agents nur bei nachgewiesenem Bedarf."</text>
</svg>