<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg04a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh04"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg04a)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">ReAct Pattern — Reasoning + Acting</text>
  <text x="400" y="53" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">Alternierender Zyklus: Thought → Action → Observation</text>

  <!-- Iteration 1 -->
  <g filter="url(#sh04)">
    <!-- Thought -->
    <rect x="50" y="80" width="200" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="75" cy="105" r="12" fill="#8b5cf6" opacity="0.2"/>
    <text x="75" y="109" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#c4b5fd">T</text>
    <text x="95" y="100" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd" font-weight="bold">Thought</text>
    <text x="95" y="117" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">"Ich muss X herausfinden..."</text>
  </g>
  <line x1="250" y1="105" x2="280" y2="105" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="280,105 274,100 274,110" fill="#8b5cf6"/>

  <!-- Action -->
  <g filter="url(#sh04)">
    <rect x="285" y="80" width="200" height="50" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <circle cx="310" cy="105" r="12" fill="#f97316" opacity="0.2"/>
    <text x="310" y="109" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#fb923c">A</text>
    <text x="330" y="100" font-family="Segoe UI, Arial" font-size="11" fill="#fb923c" font-weight="bold">Action</text>
    <text x="330" y="117" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">weather_api.get("Berlin")</text>
  </g>
  <line x1="485" y1="105" x2="515" y2="105" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="515,105 509,100 509,110" fill="#f97316"/>

  <!-- Observation -->
  <g filter="url(#sh04)">
    <rect x="520" y="80" width="230" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <circle cx="545" cy="105" r="12" fill="#10b981" opacity="0.2"/>
    <text x="545" y="109" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#6ee7b7">O</text>
    <text x="565" y="100" font-family="Segoe UI, Arial" font-size="11" fill="#6ee7b7" font-weight="bold">Observation</text>
    <text x="565" y="117" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">→ 15°C, teilweise bewölkt</text>
  </g>

  <!-- Loop arrow back to next Thought -->
  <path d="M635,130 Q635,145 400,155" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Iteration 2 -->
  <g filter="url(#sh04)" opacity="0.85">
    <rect x="50" y="165" width="200" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="75" cy="190" r="12" fill="#8b5cf6" opacity="0.2"/>
    <text x="75" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#c4b5fd">T</text>
    <text x="95" y="185" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd" font-weight="bold">Thought</text>
    <text x="95" y="202" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">"Auch Vorhersage prüfen..."</text>
  </g>
  <line x1="250" y1="190" x2="280" y2="190" stroke="#8b5cf6" stroke-width="1.5"/>
  <g filter="url(#sh04)" opacity="0.85">
    <rect x="285" y="165" width="200" height="50" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="310" cy="190" r="12" fill="#f97316" opacity="0.2"/>
    <text x="310" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#fb923c">A</text>
    <text x="330" y="185" font-family="Segoe UI, Arial" font-size="11" fill="#fb923c" font-weight="bold">Action</text>
    <text x="330" y="202" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">forecast_api.get(days=3)</text>
  </g>
  <line x1="485" y1="190" x2="515" y2="190" stroke="#f97316" stroke-width="1.5"/>
  <g filter="url(#sh04)" opacity="0.85">
    <rect x="520" y="165" width="230" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="545" cy="190" r="12" fill="#10b981" opacity="0.2"/>
    <text x="545" y="194" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#6ee7b7">O</text>
    <text x="565" y="185" font-family="Segoe UI, Arial" font-size="11" fill="#6ee7b7" font-weight="bold">Observation</text>
    <text x="565" y="202" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">→ 18°C morgen, 12°C Regen</text>
  </g>

  <!-- Loop arrow -->
  <path d="M635,215 Q635,230 400,240" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Final iteration (concluding) -->
  <g filter="url(#sh04)" opacity="0.7">
    <rect x="50" y="250" width="200" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="95" y="270" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd" font-weight="bold">Thought</text>
    <text x="95" y="287" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">"Alle Infos vorhanden."</text>
  </g>
  <line x1="250" y1="275" x2="280" y2="275" stroke="#8b5cf6" stroke-width="1.5"/>
  <g filter="url(#sh04)" opacity="0.7">
    <rect x="285" y="250" width="200" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="385" y="270" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#6ee7b7" font-weight="bold">Final Response</text>
    <text x="385" y="287" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">"Aktuell 15°C in Berlin..."</text>
  </g>

  <!-- Key insight -->
  <rect x="100" y="330" width="600" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#sh04)"/>
  <text x="400" y="352" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#f59e0b" font-weight="bold">Kernidee: Der Agent entscheidet selbstständig, wann er fertig ist</text>
  <text x="400" y="370" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Jede Observation wird in den Kontext aufgenommen → adaptive Entscheidungsfindung</text>
</svg>