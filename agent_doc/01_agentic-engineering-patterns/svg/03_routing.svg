<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg03b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh03b"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="350" fill="url(#bg03b)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Routing Pattern — Kostenoptimierung</text>

  <!-- Input -->
  <rect x="30" y="135" width="100" height="50" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" filter="url(#sh03b)"/>
  <text x="80" y="165" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#67e8f9">Input</text>

  <!-- Arrow to Router -->
  <line x1="130" y1="160" x2="190" y2="160" stroke="#22d3ee" stroke-width="2"/>
  <polygon points="190,160 183,155 183,165" fill="#22d3ee"/>

  <!-- Router (diamond shape) -->
  <polygon points="290,100 370,160 290,220 210,160" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#sh03b)"/>
  <text x="290" y="152" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#fbbf24" font-weight="bold">Classifier</text>
  <text x="290" y="168" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fcd34d">Router LLM</text>

  <!-- Route 1: Einfach (80%) — top -->
  <line x1="335" y1="120" x2="430" y2="80" stroke="#10b981" stroke-width="2"/>
  <polygon points="430,80 422,79 424,88" fill="#10b981"/>
  <rect x="435" y="55" width="200" height="55" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#sh03b)"/>
  <rect x="435" y="55" width="200" height="22" rx="8" fill="#10b981" opacity="0.12"/>
  <text x="535" y="72" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#6ee7b7" font-weight="bold">Haiku (günstig, schnell)</text>
  <text x="535" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">80% der Anfragen</text>
  <!-- Cost indicator -->
  <text x="660" y="82" font-family="Segoe UI, Arial" font-size="14" fill="#10b981">$</text>

  <!-- Route 2: Mittel (15%) — middle -->
  <line x1="370" y1="160" x2="430" y2="160" stroke="#f97316" stroke-width="2"/>
  <polygon points="430,160 423,155 423,165" fill="#f97316"/>
  <rect x="435" y="135" width="200" height="55" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="2" filter="url(#sh03b)"/>
  <rect x="435" y="135" width="200" height="22" rx="8" fill="#f97316" opacity="0.12"/>
  <text x="535" y="152" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#fb923c" font-weight="bold">Sonnet (balanciert)</text>
  <text x="535" y="175" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">15% der Anfragen</text>
  <text x="660" y="162" font-family="Segoe UI, Arial" font-size="14" fill="#f97316">$$</text>

  <!-- Route 3: Komplex (5%) — bottom -->
  <line x1="335" y1="200" x2="430" y2="240" stroke="#a855f7" stroke-width="2"/>
  <polygon points="430,240 422,232 424,241" fill="#a855f7"/>
  <rect x="435" y="215" width="200" height="55" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2" filter="url(#sh03b)"/>
  <rect x="435" y="215" width="200" height="22" rx="8" fill="#a855f7" opacity="0.12"/>
  <text x="535" y="232" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#c084fc" font-weight="bold">Opus (leistungsstark)</text>
  <text x="535" y="255" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">5% der Anfragen</text>
  <text x="660" y="242" font-family="Segoe UI, Arial" font-size="14" fill="#a855f7">$$$</text>

  <!-- Output merge -->
  <line x1="635" y1="82" x2="700" y2="160" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="635" y1="162" x2="700" y2="160" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="635" y1="242" x2="700" y2="160" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
  <rect x="700" y="135" width="80" height="50" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5" filter="url(#sh03b)"/>
  <text x="740" y="165" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#6ee7b7">Output</text>

  <!-- Cost saving indicator -->
  <rect x="250" y="285" width="300" height="40" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="303" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#6ee7b7" font-weight="bold">Kostenoptimierung durch intelligentes Routing</text>
  <text x="400" y="318" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">80% günstig · 15% mittel · 5% premium</text>
</svg>