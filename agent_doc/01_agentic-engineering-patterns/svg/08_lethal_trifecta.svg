<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380">
  <defs>
    <linearGradient id="bg08a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh08"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="750" height="380" fill="url(#bg08a)" rx="12"/>

  <text x="375" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#ef4444">Das "Lethal Trifecta"</text>
  <text x="375" y="53" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">Drei Faktoren, die zusammen eine kritische Verwundbarkeit erzeugen</text>

  <!-- Triangle of doom -->
  <!-- Factor 1: Top -->
  <g filter="url(#sh08)">
    <rect x="250" y="80" width="250" height="70" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <circle cx="280" cy="115" r="16" fill="#ef4444" opacity="0.2"/>
    <text x="280" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ef4444" font-weight="bold">1</text>
    <text x="305" y="108" font-family="Segoe UI, Arial" font-size="12" fill="#fca5a5" font-weight="bold">Private Daten</text>
    <text x="305" y="128" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Agent kann sensible Infos lesen</text>
  </g>

  <!-- Factor 2: Bottom Left -->
  <g filter="url(#sh08)">
    <rect x="50" y="200" width="250" height="70" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <circle cx="80" cy="235" r="16" fill="#f97316" opacity="0.2"/>
    <text x="80" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#f97316" font-weight="bold">2</text>
    <text x="105" y="228" font-family="Segoe UI, Arial" font-size="12" fill="#fdba74" font-weight="bold">Untrusted Tokens</text>
    <text x="105" y="248" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Agent verarbeitet externe Inhalte</text>
  </g>

  <!-- Factor 3: Bottom Right -->
  <g filter="url(#sh08)">
    <rect x="450" y="200" width="250" height="70" rx="10" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
    <circle cx="480" cy="235" r="16" fill="#eab308" opacity="0.2"/>
    <text x="480" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#eab308" font-weight="bold">3</text>
    <text x="505" y="228" font-family="Segoe UI, Arial" font-size="12" fill="#fde68a" font-weight="bold">Exfiltrations-Vektoren</text>
    <text x="505" y="248" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Agent kann Daten nach außen senden</text>
  </g>

  <!-- Triangle connecting lines -->
  <line x1="375" y1="150" x2="175" y2="200" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
  <line x1="375" y1="150" x2="575" y2="200" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="245" x2="450" y2="245" stroke="#ef4444" stroke-width="2" opacity="0.4"/>

  <!-- Center warning -->
  <circle cx="375" cy="210" r="35" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
  <text x="375" y="205" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="#ef4444">⚠</text>
  <text x="375" y="225" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#ef4444" font-weight="bold">KRITISCH</text>

  <!-- Warning box -->
  <rect x="125" y="300" width="500" height="55" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5" filter="url(#sh08)"/>
  <text x="375" y="322" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#fca5a5" font-weight="bold">Wenn alle drei Faktoren gleichzeitig präsent sind:</text>
  <text x="375" y="342" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#ef4444">Das System ist hochgradig verwundbar — Defense-in-Depth erforderlich</text>
</svg>