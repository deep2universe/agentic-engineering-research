<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh02"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="700" fill="url(#bg02)" rx="12"/>

  <text x="500" y="40" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="bold" fill="#e2e8f0">10 Architektur-Prinzipien für Agent-Systeme</text>

  <!-- 2x5 Grid -->
  <!-- P1: Einfachheit -->
  <g filter="url(#sh02)">
    <rect x="30" y="70" width="185" height="120" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="55" cy="95" r="14" fill="#6366f1" opacity="0.3"/>
    <text x="55" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#a5b4fc" font-weight="bold">1</text>
    <text x="78" y="98" font-family="Segoe UI, Arial" font-size="12" fill="#e2e8f0" font-weight="bold">Einfachheit</text>
    <line x1="45" y1="112" x2="200" y2="112" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <text x="45" y="130" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Starte minimal.</text>
    <text x="45" y="145" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Komponierbare Patterns</text>
    <text x="45" y="160" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">vor Frameworks.</text>
    <!-- Icon: single block -->
    <rect x="180" y="78" width="18" height="18" rx="3" fill="#6366f1" opacity="0.4"/>
  </g>

  <!-- P2: Transparenz -->
  <g filter="url(#sh02)">
    <rect x="225" y="70" width="185" height="120" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="250" cy="95" r="14" fill="#8b5cf6" opacity="0.3"/>
    <text x="250" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#c4b5fd" font-weight="bold">2</text>
    <text x="273" y="98" font-family="Segoe UI, Arial" font-size="12" fill="#e2e8f0" font-weight="bold">Transparenz</text>
    <line x1="240" y1="112" x2="395" y2="112" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
    <text x="240" y="130" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Reasoning offenlegen.</text>
    <text x="240" y="145" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Jeden Schritt loggen.</text>
    <text x="240" y="160" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Debugging ermöglichen.</text>
    <!-- Icon: eye -->
    <ellipse cx="385" cy="88" rx="12" ry="8" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <circle cx="385" cy="88" r="4" fill="#8b5cf6" opacity="0.4"/>
  </g>

  <!-- P3: ACI Design -->
  <g filter="url(#sh02)">
    <rect x="420" y="70" width="185" height="120" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <circle cx="445" cy="95" r="14" fill="#ec4899" opacity="0.3"/>
    <text x="445" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#f9a8d4" font-weight="bold">3</text>
    <text x="468" y="98" font-family="Segoe UI, Arial" font-size="12" fill="#e2e8f0" font-weight="bold">ACI Design</text>
    <line x1="435" y1="112" x2="590" y2="112" stroke="#ec4899" stroke-width="0.5" opacity="0.3"/>
    <text x="435" y="130" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Tool-Interfaces wie</text>
    <text x="435" y="145" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">UIs designen. Klare</text>
    <text x="435" y="160" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Beschreibungen + Typen.</text>
  </g>

  <!-- P4: Separation of Concerns -->
  <g filter="url(#sh02)">
    <rect x="615" y="70" width="185" height="120" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="640" cy="95" r="14" fill="#f97316" opacity="0.3"/>
    <text x="640" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#fdba74" font-weight="bold">4</text>
    <text x="663" y="98" font-family="Segoe UI, Arial" font-size="11" fill="#e2e8f0" font-weight="bold">Separation</text>
    <line x1="630" y1="112" x2="785" y2="112" stroke="#f97316" stroke-width="0.5" opacity="0.3"/>
    <text x="630" y="130" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Ein Agent = eine Aufgabe.</text>
    <text x="630" y="145" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Klare Schnittstellen.</text>
    <text x="630" y="160" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Pipeline of Agents.</text>
  </g>

  <!-- P5: Graceful Degradation -->
  <g filter="url(#sh02)">
    <rect x="810" y="70" width="160" height="120" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="835" cy="95" r="14" fill="#ef4444" opacity="0.3"/>
    <text x="835" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#fca5a5" font-weight="bold">5</text>
    <text x="858" y="98" font-family="Segoe UI, Arial" font-size="11" fill="#e2e8f0" font-weight="bold">Degradation</text>
    <line x1="825" y1="112" x2="955" y2="112" stroke="#ef4444" stroke-width="0.5" opacity="0.3"/>
    <text x="825" y="130" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Kontrolliert</text>
    <text x="825" y="145" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">degradieren.</text>
    <text x="825" y="160" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Partial Results.</text>
  </g>

  <!-- Row 2 -->
  <!-- P6: Least Privilege -->
  <g filter="url(#sh02)">
    <rect x="30" y="210" width="185" height="120" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="1.5"/>
    <circle cx="55" cy="235" r="14" fill="#eab308" opacity="0.3"/>
    <text x="55" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#fde68a" font-weight="bold">6</text>
    <text x="78" y="238" font-family="Segoe UI, Arial" font-size="12" fill="#e2e8f0" font-weight="bold">Least Privilege</text>
    <line x1="45" y1="252" x2="200" y2="252" stroke="#eab308" stroke-width="0.5" opacity="0.3"/>
    <text x="45" y="270" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Minimale Rechte.</text>
    <text x="45" y="285" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Sandbox-Umgebungen.</text>
    <text x="45" y="300" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Scope einschränken.</text>
  </g>

  <!-- P7: Idempotenz -->
  <g filter="url(#sh02)">
    <rect x="225" y="210" width="185" height="120" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="250" cy="235" r="14" fill="#22d3ee" opacity="0.3"/>
    <text x="250" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#67e8f9" font-weight="bold">7</text>
    <text x="273" y="238" font-family="Segoe UI, Arial" font-size="12" fill="#e2e8f0" font-weight="bold">Idempotenz</text>
    <line x1="240" y1="252" x2="395" y2="252" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
    <text x="240" y="270" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Sicher wiederholbar.</text>
    <text x="240" y="285" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Checkpoints nutzen.</text>
    <text x="240" y="300" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Gleicher Input = Output.</text>
  </g>

  <!-- P8: Observability -->
  <g filter="url(#sh02)">
    <rect x="420" y="210" width="185" height="120" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="445" cy="235" r="14" fill="#10b981" opacity="0.3"/>
    <text x="445" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#6ee7b7" font-weight="bold">8</text>
    <text x="468" y="238" font-family="Segoe UI, Arial" font-size="12" fill="#e2e8f0" font-weight="bold">Observability</text>
    <line x1="435" y1="252" x2="590" y2="252" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
    <text x="435" y="270" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Von Anfang an!</text>
    <text x="435" y="285" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Structured Logging.</text>
    <text x="435" y="300" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">OpenTelemetry.</text>
  </g>

  <!-- P9: Iterativ -->
  <g filter="url(#sh02)">
    <rect x="615" y="210" width="185" height="120" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
    <circle cx="640" cy="235" r="14" fill="#a855f7" opacity="0.3"/>
    <text x="640" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#d8b4fe" font-weight="bold">9</text>
    <text x="663" y="238" font-family="Segoe UI, Arial" font-size="11" fill="#e2e8f0" font-weight="bold">Iteration</text>
    <line x1="630" y1="252" x2="785" y2="252" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <text x="630" y="270" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Eval-Driven Dev.</text>
    <text x="630" y="285" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">A/B-Testing.</text>
    <text x="630" y="300" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Feedback-Loops.</text>
  </g>

  <!-- P10: Kosten -->
  <g filter="url(#sh02)">
    <rect x="810" y="210" width="160" height="120" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="835" cy="235" r="14" fill="#f59e0b" opacity="0.3"/>
    <text x="835" y="240" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#fcd34d" font-weight="bold">10</text>
    <text x="858" y="238" font-family="Segoe UI, Arial" font-size="10" fill="#e2e8f0" font-weight="bold">Kosten-Bewusst</text>
    <line x1="825" y1="252" x2="955" y2="252" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
    <text x="825" y="270" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Model-Routing.</text>
    <text x="825" y="285" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Caching.</text>
    <text x="825" y="300" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Parallelisierung.</text>
  </g>

  <!-- Categorization bands -->
  <rect x="30" y="355" width="940" height="320" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1" filter="url(#sh02)"/>

  <text x="500" y="385" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#e2e8f0">Prinzipien-Cluster</text>

  <!-- Cluster: Design -->
  <rect x="55" y="410" width="270" height="100" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
  <text x="190" y="435" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#a5b4fc">Design-Prinzipien</text>
  <text x="190" y="460" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">P1 Einfachheit · P3 ACI Design</text>
  <text x="190" y="478" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">P4 Separation · P7 Idempotenz</text>
  <text x="190" y="498" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#64748b" font-style="italic">Wie baue ich richtig?</text>

  <!-- Cluster: Operations -->
  <rect x="365" y="410" width="270" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="500" y="435" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#6ee7b7">Betriebs-Prinzipien</text>
  <text x="500" y="460" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">P2 Transparenz · P5 Degradation</text>
  <text x="500" y="478" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">P8 Observability · P9 Iteration</text>
  <text x="500" y="498" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#64748b" font-style="italic">Wie betreibe ich sicher?</text>

  <!-- Cluster: Governance -->
  <rect x="675" y="410" width="270" height="100" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="810" y="435" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#fcd34d">Governance-Prinzipien</text>
  <text x="810" y="460" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">P6 Least Privilege</text>
  <text x="810" y="478" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">P10 Kosten-Bewusstsein</text>
  <text x="810" y="498" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#64748b" font-style="italic">Wie kontrolliere ich?</text>

  <!-- Bottom insight -->
  <rect x="200" y="540" width="600" height="45" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="500" y="560" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#f59e0b" font-weight="bold">Leitgedanke</text>
  <text x="500" y="577" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#e2e8f0" font-style="italic">"Beginne immer mit der einfachsten Lösung." — Anthropic</text>

  <!-- Connection lines between clusters -->
  <line x1="325" y1="460" x2="365" y2="460" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="635" y1="460" x2="675" y2="460" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
</svg>