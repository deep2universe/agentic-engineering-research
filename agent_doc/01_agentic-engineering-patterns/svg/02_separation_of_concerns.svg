<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bgSoC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shSoC"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="300" fill="url(#bgSoC)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Separation of Concerns — Pipeline of Agents</text>

  <!-- Agent 1: Researcher -->
  <g filter="url(#shSoC)">
    <rect x="40" y="75" width="180" height="110" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <rect x="40" y="75" width="180" height="30" rx="10" fill="#22d3ee" opacity="0.15"/>
    <text x="130" y="96" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#67e8f9">Researcher Agent</text>
    <text x="130" y="125" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">Daten sammeln</text>
    <text x="130" y="142" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">Quellen finden</text>
    <rect x="75" y="158" width="110" height="18" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
    <text x="130" y="171" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#67e8f9">Web Search Tool</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="130" x2="270" y2="130" stroke="#475569" stroke-width="2"/>
  <polygon points="270,130 262,125 262,135" fill="#475569"/>

  <!-- Agent 2: Analyst -->
  <g filter="url(#shSoC)">
    <rect x="280" y="75" width="180" height="110" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <rect x="280" y="75" width="180" height="30" rx="10" fill="#a855f7" opacity="0.15"/>
    <text x="370" y="96" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#c084fc">Analyst Agent</text>
    <text x="370" y="125" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">Daten analysieren</text>
    <text x="370" y="142" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">Muster erkennen</text>
    <rect x="315" y="158" width="110" height="18" rx="4" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
    <text x="370" y="171" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#c084fc">Data Analysis Tool</text>
  </g>

  <!-- Arrow -->
  <line x1="460" y1="130" x2="510" y2="130" stroke="#475569" stroke-width="2"/>
  <polygon points="510,130 502,125 502,135" fill="#475569"/>

  <!-- Agent 3: Writer -->
  <g filter="url(#shSoC)">
    <rect x="520" y="75" width="180" height="110" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <rect x="520" y="75" width="180" height="30" rx="10" fill="#f97316" opacity="0.15"/>
    <text x="610" y="96" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#fb923c">Writer Agent</text>
    <text x="610" y="125" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">Text generieren</text>
    <text x="610" y="142" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#94a3b8">Formatieren</text>
    <rect x="555" y="158" width="110" height="18" rx="4" fill="#431407" stroke="#f97316" stroke-width="1"/>
    <text x="610" y="171" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fb923c">Text Gen Tool</text>
  </g>

  <!-- Single Responsibility badges -->
  <g font-family="Segoe UI, Arial" font-size="9" fill="#f59e0b">
    <rect x="80" y="195" width="100" height="18" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="130" y="207" text-anchor="middle">1 Agent = 1 Aufgabe</text>
    <rect x="320" y="195" width="100" height="18" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="370" y="207" text-anchor="middle">1 Agent = 1 Aufgabe</text>
    <rect x="560" y="195" width="100" height="18" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="610" y="207" text-anchor="middle">1 Agent = 1 Aufgabe</text>
  </g>

  <!-- Principle box -->
  <rect x="150" y="240" width="500" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shSoC)"/>
  <text x="400" y="258" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#f59e0b" font-weight="bold">Single Responsibility Principle für Agents</text>
  <text x="400" y="273" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Jeder Agent beherrscht eine Sache exzellent — klare Schnittstellen dazwischen</text>
</svg>