<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg04d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh04d"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="350" fill="url(#bg04d)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Reflection / Self-Critique</text>

  <!-- Phase 1: Generation -->
  <rect x="40" y="70" width="160" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#sh04d)"/>
  <text x="120" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#6366f1" font-weight="bold">Phase 1</text>
  <text x="120" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#a5b4fc" font-weight="bold">Generation</text>
  <text x="120" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Initialen Output erstellen</text>

  <!-- Arrow -->
  <line x1="200" y1="110" x2="235" y2="110" stroke="#6366f1" stroke-width="2"/>
  <polygon points="235,110 228,105 228,115" fill="#6366f1"/>

  <!-- Phase 2: Kritik -->
  <rect x="240" y="70" width="160" height="80" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2" filter="url(#sh04d)"/>
  <text x="320" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#ec4899" font-weight="bold">Phase 2</text>
  <text x="320" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#f472b6" font-weight="bold">Self-Critique</text>
  <text x="320" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Genauigkeit, Lücken prüfen</text>

  <!-- Arrow -->
  <line x1="400" y1="110" x2="435" y2="110" stroke="#ec4899" stroke-width="2"/>
  <polygon points="435,110 428,105 428,115" fill="#ec4899"/>

  <!-- Phase 3: Revision -->
  <rect x="440" y="70" width="160" height="80" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="2" filter="url(#sh04d)"/>
  <text x="520" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#f97316" font-weight="bold">Phase 3</text>
  <text x="520" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#fb923c" font-weight="bold">Revision</text>
  <text x="520" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Basierend auf Kritik</text>

  <!-- Arrow -->
  <line x1="600" y1="110" x2="635" y2="110" stroke="#f97316" stroke-width="2"/>
  <polygon points="635,110 628,105 628,115" fill="#f97316"/>

  <!-- Phase 4: Re-Evaluation -->
  <rect x="640" y="70" width="140" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#sh04d)"/>
  <text x="710" y="95" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#10b981" font-weight="bold">Phase 4</text>
  <text x="710" y="115" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#6ee7b7" font-weight="bold">Re-Evaluation</text>
  <text x="710" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Qualität ausreichend?</text>

  <!-- Loop back arrow -->
  <path d="M710,150 Q710,180 400,185 Q120,190 120,155" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="120,155 115,163 125,163" fill="#f59e0b"/>
  <text x="400" y="200" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#f59e0b">Wiederholung bis Qualität ausreichend</text>

  <!-- Varianten -->
  <rect x="40" y="225" width="225" height="100" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1" filter="url(#sh04d)"/>
  <text x="152" y="248" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#f472b6" font-weight="bold">Reflexion (Shinn)</text>
  <text x="60" y="268" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Feedback aus Umgebung (Tests)</text>
  <text x="60" y="283" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">→ Verbale Reflexion erstellen</text>
  <text x="60" y="298" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">→ Als episodisches Gedächtnis</text>

  <rect x="290" y="225" width="225" height="100" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" filter="url(#sh04d)"/>
  <text x="402" y="248" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#c4b5fd" font-weight="bold">Self-Consistency</text>
  <text x="310" y="268" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Mehrere unabhängige Antworten</text>
  <text x="310" y="283" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">→ Konsens durch</text>
  <text x="310" y="298" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">   Mehrheitsentscheid</text>

  <rect x="540" y="225" width="225" height="100" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1" filter="url(#sh04d)"/>
  <text x="652" y="248" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#67e8f9" font-weight="bold">Constitutional AI</text>
  <text x="560" y="268" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Output gegen definierte</text>
  <text x="560" y="283" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Prinzipien/Regeln prüfen</text>
  <text x="560" y="298" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">→ Überarbeitung bei Verstößen</text>
</svg>