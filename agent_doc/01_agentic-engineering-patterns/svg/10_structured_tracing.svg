<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg10a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh10"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="420" fill="url(#bg10a)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Structured Tracing — Agent Observability</text>
  <text x="400" y="53" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">"Traces sind der Call Stack für AI-Systeme" — LangChain</text>

  <!-- Trace Container -->
  <rect x="40" y="70" width="720" height="300" rx="10" fill="#0f172a" stroke="#6366f1" stroke-width="2" filter="url(#sh10)"/>
  <text x="60" y="95" font-family="Segoe UI, monospace" font-size="12" fill="#6366f1" font-weight="bold">Trace: "User fragt nach Wetterbericht"</text>

  <!-- Span 1: LLM Routing -->
  <rect x="70" y="110" width="670" height="55" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="70" y="110" width="4" height="55" rx="2" fill="#8b5cf6"/>
  <text x="90" y="130" font-family="Segoe UI, monospace" font-size="11" fill="#c4b5fd">Span: LLM Call (Routing)</text>
  <text x="90" y="148" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Input: "Wie wird das Wetter?" → Output: "→ Weather Agent"</text>
  <rect x="540" y="118" width="80" height="18" rx="3" fill="#8b5cf6" opacity="0.1"/>
  <text x="580" y="130" text-anchor="middle" font-family="Segoe UI, monospace" font-size="8" fill="#8b5cf6">150+20 tok</text>
  <rect x="640" y="118" width="80" height="18" rx="3" fill="#8b5cf6" opacity="0.1"/>
  <text x="680" y="130" text-anchor="middle" font-family="Segoe UI, monospace" font-size="8" fill="#8b5cf6">320ms</text>

  <!-- Span 2: Tool Call -->
  <rect x="100" y="175" width="640" height="55" rx="6" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <rect x="100" y="175" width="4" height="55" rx="2" fill="#f97316"/>
  <text x="120" y="195" font-family="Segoe UI, monospace" font-size="11" fill="#fdba74">Span: Tool Call (weather_api)</text>
  <text x="120" y="213" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Params: {city: "Berlin", days: 1} → {temp: 18, condition: "cloudy"}</text>
  <rect x="640" y="183" width="80" height="18" rx="3" fill="#f97316" opacity="0.1"/>
  <text x="680" y="195" text-anchor="middle" font-family="Segoe UI, monospace" font-size="8" fill="#f97316">450ms</text>

  <!-- Span 3: LLM Response -->
  <rect x="100" y="240" width="640" height="55" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="100" y="240" width="4" height="55" rx="2" fill="#10b981"/>
  <text x="120" y="260" font-family="Segoe UI, monospace" font-size="11" fill="#6ee7b7">Span: LLM Call (Response Generation)</text>
  <text x="120" y="278" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Input: Context + Weather Data → Output: "Morgen wird es..."</text>
  <rect x="540" y="248" width="80" height="18" rx="3" fill="#10b981" opacity="0.1"/>
  <text x="580" y="260" text-anchor="middle" font-family="Segoe UI, monospace" font-size="8" fill="#10b981">300+80 tok</text>
  <rect x="640" y="248" width="80" height="18" rx="3" fill="#10b981" opacity="0.1"/>
  <text x="680" y="260" text-anchor="middle" font-family="Segoe UI, monospace" font-size="8" fill="#10b981">580ms</text>

  <!-- Trace Metadata -->
  <rect x="70" y="310" width="670" height="45" rx="6" fill="#334155" opacity="0.3"/>
  <text x="90" y="330" font-family="Segoe UI, monospace" font-size="10" fill="#f59e0b">Trace-Metadaten:</text>
  <text x="90" y="347" font-family="Segoe UI, monospace" font-size="9" fill="#94a3b8">Gesamtlatenz: 1350ms · Gesamtkosten: $0.004 · Qualitäts-Score: 0.92</text>

  <!-- Bottom -->
  <text x="400" y="400" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#f59e0b" font-weight="bold">Best Practice: Typed Observations · Vollständiger Kontext · Kosten-Attribution · Hierarchische Spans</text>
</svg>