<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg05k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh05k"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arr05kCyan" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#22d3ee"/></marker>
    <marker id="arr05kPurple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#a78bfa"/></marker>
    <marker id="arr05kGreen" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#34d399"/></marker>
    <marker id="arr05kAmber" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#fbbf24"/></marker>
    <marker id="arr05kRose" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#fb7185"/></marker>
    <marker id="arr05kGray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#94a3b8"/></marker>
  </defs>
  <rect width="900" height="500" fill="url(#bg05k)" rx="12"/>

  <text x="450" y="32" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Kommunikations-Patterns für Multi-Agent-Systeme</text>
  <text x="450" y="50" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">Fünf fundamentale Wege, wie Agents Informationen austauschen</text>

  <!-- ═══════════════ 1. DIRECT MESSAGE PASSING ═══════════════ -->
  <rect x="15" y="68" width="260" height="195" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" filter="url(#sh05k)"/>
  <text x="145" y="90" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#67e8f9">1. Direct Message Passing</text>
  <text x="145" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#64748b">Punkt-zu-Punkt-Kommunikation</text>

  <!-- Agent A -->
  <rect x="40" y="120" width="70" height="35" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="75" y="142" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#67e8f9">Agent A</text>

  <!-- Agent B -->
  <rect x="180" y="120" width="70" height="35" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="215" y="142" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#67e8f9">Agent B</text>

  <!-- Direkter Pfeil A→B -->
  <line x1="110" y1="132" x2="173" y2="132" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr05kCyan)"/>
  <rect x="120" y="122" width="40" height="14" rx="3" fill="#164e63"/>
  <text x="140" y="132" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#22d3ee">msg</text>

  <!-- Rückpfeil B→A -->
  <line x1="180" y1="147" x2="117" y2="147" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr05kCyan)"/>
  <rect x="128" y="148" width="30" height="12" rx="3" fill="#164e63"/>
  <text x="143" y="157" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#22d3ee">ack</text>

  <!-- Beschreibung -->
  <text x="35" y="185" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Direkte Nachrichten zwischen zwei Agents.</text>
  <text x="35" y="197" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Einfach, aber nicht skalierbar (n*n).</text>
  <text x="35" y="215" font-family="Segoe UI, Arial" font-size="8" fill="#34d399">Einsatz: Tool-Aufrufe, Handoffs</text>
  <text x="35" y="248" font-family="Segoe UI, Arial" font-size="8" fill="#475569">Pattern: send(agent_b, message)</text>

  <!-- ═══════════════ 2. PUBLISH-SUBSCRIBE ═══════════════ -->
  <rect x="290" y="68" width="295" height="195" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5" filter="url(#sh05k)"/>
  <text x="437" y="90" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#c4b5fd">2. Publish-Subscribe</text>
  <text x="437" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#64748b">Topic-basierte Entkopplung</text>

  <!-- Publisher -->
  <rect x="310" y="125" width="65" height="35" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="342" y="147" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#c4b5fd">Publisher</text>

  <!-- Topic/Bus -->
  <rect x="395" y="118" width="70" height="48" rx="4" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="430" y="139" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#c4b5fd" font-weight="bold">Topic</text>
  <text x="430" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#818cf8">/results</text>

  <!-- Subscriber 1 -->
  <rect x="490" y="112" width="70" height="28" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="525" y="130" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#c4b5fd">Sub A</text>

  <!-- Subscriber 2 -->
  <rect x="490" y="148" width="70" height="28" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="525" y="166" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#c4b5fd">Sub B</text>

  <!-- Pfeile -->
  <line x1="375" y1="142" x2="390" y2="142" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#arr05kPurple)"/>
  <line x1="465" y1="130" x2="485" y2="126" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#arr05kPurple)"/>
  <line x1="465" y1="150" x2="485" y2="158" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#arr05kPurple)"/>

  <!-- Beschreibung -->
  <text x="310" y="192" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Publisher sendet an Topic, Subscriber</text>
  <text x="310" y="204" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">empfangen ohne Wissen vom Sender.</text>
  <text x="310" y="222" font-family="Segoe UI, Arial" font-size="8" fill="#34d399">Einsatz: Event-Streams, Broadcast-Updates</text>
  <text x="310" y="248" font-family="Segoe UI, Arial" font-size="8" fill="#475569">Pattern: topic.publish(event) / topic.subscribe(fn)</text>

  <!-- ═══════════════ 3. REQUEST-RESPONSE ═══════════════ -->
  <rect x="600" y="68" width="285" height="195" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.5" filter="url(#sh05k)"/>
  <text x="742" y="90" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#6ee7b7">3. Request-Response</text>
  <text x="742" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#64748b">Synchroner Aufruf mit Rückgabe</text>

  <!-- Requester -->
  <rect x="625" y="125" width="75" height="35" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.2"/>
  <text x="662" y="147" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#6ee7b7">Requester</text>

  <!-- Responder -->
  <rect x="780" y="125" width="75" height="35" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.2"/>
  <text x="817" y="147" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#6ee7b7">Responder</text>

  <!-- Request arrow -->
  <line x1="700" y1="135" x2="773" y2="135" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr05kGreen)"/>
  <rect x="720" y="125" width="35" height="14" rx="3" fill="#065f46"/>
  <text x="737" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#34d399">req</text>

  <!-- Response arrow -->
  <line x1="780" y1="150" x2="707" y2="150" stroke="#34d399" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr05kGreen)"/>
  <rect x="725" y="151" width="35" height="14" rx="3" fill="#065f46"/>
  <text x="742" y="161" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#34d399">res</text>

  <!-- Beschreibung -->
  <text x="620" y="192" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Agent sendet Anfrage und wartet auf</text>
  <text x="620" y="204" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Antwort. Blockierend, aber vorhersagbar.</text>
  <text x="620" y="222" font-family="Segoe UI, Arial" font-size="8" fill="#34d399">Einsatz: Tool Calls, API-Aufrufe</text>
  <text x="620" y="248" font-family="Segoe UI, Arial" font-size="8" fill="#475569">Pattern: result = await agent.ask(query)</text>

  <!-- ═══════════════ 4. EVENT-DRIVEN ═══════════════ -->
  <rect x="15" y="280" width="420" height="205" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" filter="url(#sh05k)"/>
  <text x="225" y="302" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#fcd34d">4. Event-Driven</text>
  <text x="225" y="317" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#64748b">Asynchrone Reaktion auf Events</text>

  <!-- Event Bus -->
  <rect x="130" y="335" width="190" height="30" rx="4" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="225" y="355" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#fcd34d" font-weight="bold">Event Bus</text>

  <!-- Agent 1 (emitter) -->
  <rect x="35" y="330" width="70" height="40" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="70" y="350" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fcd34d">Emitter</text>
  <text x="70" y="363" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#92400e">emit()</text>
  <line x1="105" y1="350" x2="123" y2="350" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#arr05kAmber)"/>

  <!-- Listener agents -->
  <rect x="340" y="325" width="70" height="28" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="375" y="343" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fcd34d">Handler A</text>

  <rect x="340" y="358" width="70" height="28" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="375" y="376" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fcd34d">Handler B</text>

  <line x1="320" y1="343" x2="333" y2="339" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#arr05kAmber)"/>
  <line x1="320" y1="357" x2="333" y2="367" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#arr05kAmber)"/>

  <!-- Events -->
  <rect x="155" y="374" width="60" height="16" rx="3" fill="#92400e"/>
  <text x="185" y="385" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#fbbf24">task_done</text>
  <rect x="220" y="374" width="60" height="16" rx="3" fill="#92400e"/>
  <text x="250" y="385" text-anchor="middle" font-family="Segoe UI, Arial" font-size="7" fill="#fbbf24">error</text>

  <!-- Beschreibung -->
  <text x="35" y="415" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Events werden in einen Bus emittiert. Registrierte Handler</text>
  <text x="35" y="427" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">reagieren asynchron. Lose Kopplung, hohe Flexibilität.</text>
  <text x="35" y="445" font-family="Segoe UI, Arial" font-size="8" fill="#34d399">Einsatz: Workflow-Trigger, Logging, Monitoring</text>
  <text x="35" y="472" font-family="Segoe UI, Arial" font-size="8" fill="#475569">Pattern: bus.on("task_done", handler) / bus.emit("task_done", data)</text>

  <!-- ═══════════════ 5. SHARED CONTEXT ═══════════════ -->
  <rect x="450" y="280" width="435" height="205" rx="8" fill="#0f172a" stroke="#fb7185" stroke-width="1.5" filter="url(#sh05k)"/>
  <text x="667" y="302" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#fda4af">5. Shared Context (Blackboard)</text>
  <text x="667" y="317" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#64748b">Gemeinsamer Speicher als Kommunikationsmedium</text>

  <!-- Shared Memory (zentral) -->
  <rect x="590" y="335" width="155" height="50" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2"/>
  <text x="667" y="357" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#fda4af" font-weight="bold">Shared Context</text>
  <text x="667" y="373" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#fb7185">State / Memory / DB</text>

  <!-- Agent 1 -->
  <rect x="475" y="330" width="70" height="30" rx="6" fill="#1e293b" stroke="#fb7185" stroke-width="1.2"/>
  <text x="510" y="350" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fda4af">Agent A</text>

  <!-- Agent 2 -->
  <rect x="475" y="370" width="70" height="30" rx="6" fill="#1e293b" stroke="#fb7185" stroke-width="1.2"/>
  <text x="510" y="390" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fda4af">Agent B</text>

  <!-- Agent 3 -->
  <rect x="790" y="330" width="70" height="30" rx="6" fill="#1e293b" stroke="#fb7185" stroke-width="1.2"/>
  <text x="825" y="350" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#fda4af">Agent C</text>

  <!-- Read/Write Pfeile -->
  <line x1="545" y1="342" x2="583" y2="350" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arr05kRose)"/>
  <text x="558" y="338" font-family="Segoe UI, Arial" font-size="7" fill="#fb7185">write</text>

  <line x1="590" y1="370" x2="552" y2="380" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr05kRose)"/>
  <text x="565" y="382" font-family="Segoe UI, Arial" font-size="7" fill="#fb7185">read</text>

  <line x1="790" y1="345" x2="752" y2="352" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arr05kRose)"/>
  <text x="764" y="338" font-family="Segoe UI, Arial" font-size="7" fill="#fb7185">read/write</text>

  <!-- Beschreibung -->
  <text x="470" y="420" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Agents lesen und schreiben in einen gemeinsamen Speicher.</text>
  <text x="470" y="432" font-family="Segoe UI, Arial" font-size="8" fill="#94a3b8">Kein direkter Nachrichtenaustausch nötig. Blackboard-Pattern.</text>
  <text x="470" y="450" font-family="Segoe UI, Arial" font-size="8" fill="#34d399">Einsatz: Multi-Agent Reasoning, gemeinsamer Kontext</text>
  <text x="470" y="472" font-family="Segoe UI, Arial" font-size="8" fill="#475569">Pattern: ctx.set("result", data) / ctx.get("result")</text>
</svg>