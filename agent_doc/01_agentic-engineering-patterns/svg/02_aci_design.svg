<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgACI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shACI"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgACI)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Agent-Computer Interface (ACI) Design</text>
  <text x="400" y="55" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">"ACI erfordert genauso viel Sorgfalt wie HCI." — Anthropic</text>

  <!-- Left: Tool Definition -->
  <g filter="url(#shACI)">
    <rect x="40" y="80" width="320" height="280" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <rect x="40" y="80" width="320" height="35" rx="10" fill="#ec4899" opacity="0.12"/>
    <text x="200" y="103" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#f472b6">Tool-Definition (Checkliste)</text>

    <!-- Checklist items -->
    <g font-family="Segoe UI, Arial" font-size="12" fill="#cbd5e1">
      <rect x="60" y="130" width="16" height="16" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="64" y="143" font-size="11" fill="#10b981" font-weight="bold">✓</text>
      <text x="85" y="143">Selbsterklärender Tool-Name</text>

      <rect x="60" y="160" width="16" height="16" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="64" y="173" font-size="11" fill="#10b981" font-weight="bold">✓</text>
      <text x="85" y="173">Beschreibung: WANN nutzen?</text>

      <rect x="60" y="190" width="16" height="16" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="64" y="203" font-size="11" fill="#10b981" font-weight="bold">✓</text>
      <text x="85" y="203">Parameter mit Typen + Docs</text>

      <rect x="60" y="220" width="16" height="16" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="64" y="233" font-size="11" fill="#10b981" font-weight="bold">✓</text>
      <text x="85" y="233">Nutzungs-Beispiele</text>

      <rect x="60" y="250" width="16" height="16" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="64" y="263" font-size="11" fill="#10b981" font-weight="bold">✓</text>
      <text x="85" y="263">Fehlerfälle dokumentiert</text>

      <rect x="60" y="280" width="16" height="16" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="64" y="293" font-size="11" fill="#10b981" font-weight="bold">✓</text>
      <text x="85" y="293">Idempotent (wo möglich)</text>
    </g>

    <rect x="60" y="315" width="280" height="28" rx="6" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="1"/>
    <text x="200" y="334" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#f472b6" font-style="italic">Regelmäßig testen: Missversteht der Agent das Tool?</text>
  </g>

  <!-- Right: Flow diagram -->
  <g filter="url(#shACI)">
    <rect x="400" y="80" width="370" height="280" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect x="400" y="80" width="370" height="35" rx="10" fill="#6366f1" opacity="0.12"/>
    <text x="585" y="103" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#a5b4fc">Agent ↔ Tool Interaction Flow</text>

    <!-- Agent box -->
    <rect x="430" y="135" width="120" height="45" rx="8" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
    <text x="490" y="162" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#d8b4fe">Agent (LLM)</text>

    <!-- Arrow down: Tool Call -->
    <line x1="490" y1="180" x2="490" y2="220" stroke="#a855f7" stroke-width="2"/>
    <polygon points="490,220 485,212 495,212" fill="#a855f7"/>
    <text x="530" y="205" font-family="Segoe UI, Arial" font-size="9" fill="#a855f7">JSON Tool Call</text>

    <!-- Tool Interface -->
    <rect x="420" y="225" width="260" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="550" y="245" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#60a5fa" font-weight="bold">Tool Interface (ACI)</text>
    <text x="550" y="263" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Name · Beschreibung · Parameter · Typen</text>

    <!-- Arrow down: Execution -->
    <line x1="550" y1="275" x2="550" y2="300" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="550,300 545,292 555,292" fill="#3b82f6"/>

    <!-- Tool Execution -->
    <rect x="470" y="305" width="160" height="35" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
    <text x="550" y="327" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#6ee7b7">Tool Execution</text>

    <!-- Arrow back up: Result -->
    <path d="M690,320 Q720,320 720,250 Q720,160 620,157" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="620,157 628,153 628,161" fill="#10b981"/>
    <text x="730" y="250" font-family="Segoe UI, Arial" font-size="9" fill="#10b981">Result</text>

    <!-- Error path -->
    <path d="M470,340 Q440,350 430,330 Q420,310 430,290" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="415" y="345" font-family="Segoe UI, Arial" font-size="8" fill="#ef4444">Error → Retry</text>
  </g>

  <!-- Bottom -->
  <text x="400" y="390" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b" font-style="italic">Fehlermeldungen müssen dem Agent helfen, sich selbst zu korrigieren</text>
</svg>