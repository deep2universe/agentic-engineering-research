<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg05b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh05b"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arr05bCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22d3ee"/></marker>
    <marker id="arr05bPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a78bfa"/></marker>
  </defs>
  <rect width="900" height="500" fill="url(#bg05b)" rx="12"/>

  <text x="450" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Supervisor vs. Swarm — Zwei Haupt-Paradigmen</text>

  <!-- ═══════════════ LEFT: SUPERVISOR ═══════════════ -->
  <rect x="20" y="55" width="400" height="430" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" filter="url(#sh05b)"/>
  <text x="220" y="82" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#67e8f9">Supervisor (Hierarchisch)</text>
  <text x="220" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#64748b">Zentraler Koordinator steuert alle Worker</text>

  <!-- Supervisor Node -->
  <rect x="162" y="118" width="116" height="46" rx="8" fill="#164e63" stroke="#22d3ee" stroke-width="2"/>
  <text x="220" y="139" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#67e8f9" font-weight="bold">Supervisor</text>
  <text x="220" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#22d3ee">Koordinator</text>

  <!-- Sternförmige Verbindungen -->
  <line x1="180" y1="164" x2="100" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr05bCyan)"/>
  <line x1="220" y1="164" x2="220" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr05bCyan)"/>
  <line x1="260" y1="164" x2="340" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr05bCyan)"/>

  <!-- Worker 1 -->
  <rect x="50" y="210" width="100" height="40" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="100" y="235" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#67e8f9">Worker A</text>

  <!-- Worker 2 -->
  <rect x="170" y="210" width="100" height="40" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="220" y="235" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#67e8f9">Worker B</text>

  <!-- Worker 3 -->
  <rect x="290" y="210" width="100" height="40" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="340" y="235" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#67e8f9">Worker C</text>

  <!-- Rückpfeile (gestrichelt) -->
  <line x1="100" y1="210" x2="185" y2="168" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="210" x2="220" y2="168" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="340" y1="210" x2="255" y2="168" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Vorteile -->
  <text x="40" y="285" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#34d399">Vorteile</text>
  <text x="40" y="302" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Klare Kontrolle und Übersicht</text>
  <text x="40" y="317" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Einfaches Debugging</text>
  <text x="40" y="332" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Deterministische Orchestrierung</text>
  <text x="40" y="347" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Zentrale Fehlerbehandlung</text>

  <!-- Nachteile -->
  <text x="40" y="375" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#f87171">Nachteile</text>
  <text x="40" y="392" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Single Point of Failure</text>
  <text x="40" y="407" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Bottleneck bei vielen Agents</text>
  <text x="40" y="422" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Weniger flexibel bei Änderungen</text>
  <text x="40" y="437" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Supervisor muss alles kennen</text>

  <!-- Anwendungsfall -->
  <rect x="40" y="450" width="360" height="22" rx="4" fill="#164e63" opacity="0.5"/>
  <text x="220" y="465" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#67e8f9">Ideal: Klar definierte Workflows, Task Decomposition</text>

  <!-- ═══════════════ VS DIVIDER ═══════════════ -->
  <line x1="450" y1="70" x2="450" y2="475" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="430" y="130" width="40" height="30" rx="6" fill="#7c3aed"/>
  <text x="450" y="150" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#fff">VS</text>

  <!-- ═══════════════ RIGHT: SWARM ═══════════════ -->
  <rect x="480" y="55" width="400" height="430" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5" filter="url(#sh05b)"/>
  <text x="680" y="82" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" fill="#c4b5fd">Swarm (Dezentral)</text>
  <text x="680" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#64748b">Agents kommunizieren direkt — Mesh-Netz</text>

  <!-- Agent Nodes im Mesh -->
  <!-- Agent 1 (oben) -->
  <rect x="640" y="118" width="80" height="40" rx="20" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="680" y="143" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd">Agent 1</text>

  <!-- Agent 2 (links) -->
  <rect x="530" y="190" width="80" height="40" rx="20" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="570" y="215" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd">Agent 2</text>

  <!-- Agent 3 (rechts) -->
  <rect x="750" y="190" width="80" height="40" rx="20" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="790" y="215" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd">Agent 3</text>

  <!-- Agent 4 (unten) -->
  <rect x="640" y="250" width="80" height="40" rx="20" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="680" y="275" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd">Agent 4</text>

  <!-- Mesh-Verbindungen (alle zu allen) -->
  <!-- 1-2 -->
  <line x1="645" y1="150" x2="605" y2="190" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <!-- 1-3 -->
  <line x1="715" y1="150" x2="755" y2="190" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <!-- 1-4 -->
  <line x1="680" y1="158" x2="680" y2="250" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <!-- 2-3 -->
  <line x1="610" y1="210" x2="750" y2="210" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <!-- 2-4 -->
  <line x1="600" y1="230" x2="645" y2="255" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <!-- 3-4 -->
  <line x1="760" y1="230" x2="715" y2="255" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>

  <!-- Bidirektionale Pfeile (kleine Dreiecke an den Linien) -->
  <circle cx="625" cy="170" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="735" cy="170" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="680" cy="205" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="680" cy="205" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="625" cy="242" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="735" cy="242" r="3" fill="#a78bfa" opacity="0.8"/>

  <!-- Vorteile -->
  <text x="500" y="315" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#34d399">Vorteile</text>
  <text x="500" y="332" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Keine zentrale Abhängigkeit</text>
  <text x="500" y="347" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Hohe Skalierbarkeit</text>
  <text x="500" y="362" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Resilient — Agent-Ausfall tolerierbar</text>
  <text x="500" y="377" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">+ Emergentes Verhalten möglich</text>

  <!-- Nachteile -->
  <text x="500" y="405" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" fill="#f87171">Nachteile</text>
  <text x="500" y="422" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Schwer zu debuggen</text>
  <text x="500" y="437" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Nicht-deterministisches Verhalten</text>
  <text x="500" y="452" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Komplexe Kommunikation (n²)</text>
  <text x="500" y="467" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">- Konsensbildung aufwändig</text>

  <!-- Anwendungsfall -->
  <rect x="500" y="450" width="360" height="22" rx="4" fill="#2e1065" opacity="0.5"/>
  <text x="680" y="465" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#c4b5fd">Ideal: Kreative/explorative Tasks, autonome Systeme</text>
</svg>