<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg03d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh03d"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="380" fill="url(#bg03d)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="bold" fill="#e2e8f0">Orchestrator-Worker Pattern</text>
  <text x="400" y="53" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#64748b">Dynamische Aufgabenzerlegung — Teilschritte nicht vordefiniert</text>

  <!-- Input -->
  <rect x="30" y="100" width="100" height="45" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="80" y="127" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#67e8f9">Aufgabe</text>

  <line x1="130" y1="122" x2="195" y2="122" stroke="#22d3ee" stroke-width="2"/>
  <polygon points="195,122 188,117 188,127" fill="#22d3ee"/>

  <!-- Orchestrator (large, central) -->
  <rect x="200" y="75" width="180" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5" filter="url(#sh03d)"/>
  <rect x="200" y="75" width="180" height="30" rx="12" fill="#f59e0b" opacity="0.12"/>
  <text x="290" y="97" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#fbbf24">Orchestrator</text>
  <text x="290" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">1. Analysiert Aufgabe</text>
  <text x="290" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">2. Erstellt Plan dynamisch</text>
  <text x="290" y="150" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">3. Delegiert Sub-Tasks</text>

  <!-- Dynamic plan indicator -->
  <rect x="215" y="160" width="150" height="18" rx="4" fill="#f59e0b" opacity="0.1"/>
  <text x="290" y="173" text-anchor="middle" font-family="Segoe UI, Arial" font-size="8" fill="#f59e0b">Plan wird zur Laufzeit erstellt</text>

  <!-- Delegation arrows -->
  <line x1="380" y1="100" x2="450" y2="80" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="380" y1="125" x2="450" y2="155" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="380" y1="150" x2="450" y2="230" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Worker A -->
  <rect x="455" y="55" width="140" height="55" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#sh03d)"/>
  <text x="525" y="75" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#a5b4fc" font-weight="bold">Worker A</text>
  <text x="525" y="92" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Code analysieren</text>

  <!-- Worker B -->
  <rect x="455" y="130" width="140" height="55" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh03d)"/>
  <text x="525" y="150" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#c4b5fd" font-weight="bold">Worker B</text>
  <text x="525" y="167" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Interface designen</text>

  <!-- Worker C -->
  <rect x="455" y="205" width="140" height="55" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" filter="url(#sh03d)"/>
  <text x="525" y="225" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#d8b4fe" font-weight="bold">Worker C</text>
  <text x="525" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Tests schreiben</text>

  <!-- Results back to Orchestrator Synthese -->
  <line x1="595" y1="82" x2="650" y2="155" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="595" y1="157" x2="650" y2="160" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="595" y1="232" x2="650" y2="165" stroke="#a855f7" stroke-width="1.5"/>

  <!-- Synthese -->
  <rect x="650" y="130" width="120" height="65" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#sh03d)"/>
  <text x="710" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#fbbf24" font-weight="bold">Synthese</text>
  <text x="710" y="173" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">Ergebnisse</text>
  <text x="710" y="186" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#94a3b8">zusammenführen</text>

  <!-- Feedback loop -->
  <path d="M710,195 Q710,260 525,270" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="640" y="270" font-family="Segoe UI, Arial" font-size="8" fill="#f59e0b">Bei Bedarf: weitere Tasks</text>

  <!-- Key difference box -->
  <rect x="150" y="310" width="500" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#sh03d)"/>
  <text x="400" y="330" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#fbbf24" font-weight="bold">Schlüsselunterschied zu Parallelisierung</text>
  <text x="400" y="348" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#94a3b8">Teilaufgaben werden dynamisch vom Orchestrator bestimmt, nicht vordefiniert</text>
</svg>