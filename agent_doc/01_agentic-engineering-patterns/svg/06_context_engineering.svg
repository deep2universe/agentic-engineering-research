<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="writeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="selectGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="compressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="isolateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="880" height="440" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" fill="#f1f5f9" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Context Engineering -- Die 4 Techniken</text>
  <line x1="270" y1="50" x2="610" y2="50" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <text x="440" y="68" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="11">Wie man den richtigen Kontext zur richtigen Zeit ins Context Window bringt</text>

  <!-- Quadrant Grid Lines -->
  <line x1="440" y1="88" x2="440" y2="410" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="248" x2="850" y2="248" stroke="#334155" stroke-width="1" opacity="0.4"/>

  <!-- ========== Q1: Writing Context (top-left) ========== -->
  <g filter="url(#sh)">
    <rect x="45" y="95" width="380" height="142" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" opacity="0.95"/>
    <!-- Header bar -->
    <rect x="45" y="95" width="380" height="34" rx="12" fill="url(#writeGrad)" opacity="0.9"/>
    <rect x="45" y="115" width="380" height="14" fill="url(#writeGrad)" opacity="0.9"/>
    <text x="235" y="117" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Writing Context</text>
    <!-- Icon metaphor -->
    <rect x="65" y="142" width="44" height="44" rx="8" fill="#312e81" opacity="0.8"/>
    <text x="87" y="170" text-anchor="middle" fill="#a5b4fc" font-family="Inter, system-ui, sans-serif" font-size="22">&#x1F4BE;</text>
    <!-- Description -->
    <text x="125" y="152" fill="#c7d2fe" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Kontext persistieren &amp; speichern</text>
    <text x="125" y="170" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Scratchpads, CLAUDE.md, Memory-Files,</text>
    <text x="125" y="185" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Tool-Results in Messages schreiben</text>
    <!-- Tags -->
    <rect x="65" y="200" width="72" height="20" rx="5" fill="#312e81" opacity="0.6"/>
    <text x="101" y="214" text-anchor="middle" fill="#a5b4fc" font-family="'Fira Code', monospace" font-size="8">Scratchpad</text>
    <rect x="145" y="200" width="82" height="20" rx="5" fill="#312e81" opacity="0.6"/>
    <text x="186" y="214" text-anchor="middle" fill="#a5b4fc" font-family="'Fira Code', monospace" font-size="8">System Prompt</text>
    <rect x="235" y="200" width="75" height="20" rx="5" fill="#312e81" opacity="0.6"/>
    <text x="272" y="214" text-anchor="middle" fill="#a5b4fc" font-family="'Fira Code', monospace" font-size="8">Memory DB</text>
  </g>

  <!-- ========== Q2: Selecting Context (top-right) ========== -->
  <g filter="url(#sh)">
    <rect x="455" y="95" width="380" height="142" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5" opacity="0.95"/>
    <rect x="455" y="95" width="380" height="34" rx="12" fill="url(#selectGrad)" opacity="0.9"/>
    <rect x="455" y="115" width="380" height="14" fill="url(#selectGrad)" opacity="0.9"/>
    <text x="645" y="117" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Selecting Context</text>
    <!-- Icon -->
    <rect x="475" y="142" width="44" height="44" rx="8" fill="#0c4a6e" opacity="0.8"/>
    <text x="497" y="170" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="22">&#x1F50D;</text>
    <!-- Description -->
    <text x="535" y="152" fill="#bae6fd" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Relevanten Kontext abrufen &amp; filtern</text>
    <text x="535" y="170" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">RAG, Semantic Search, Knowledge-Graph-</text>
    <text x="535" y="185" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Lookup, Tool-Auswahl nach Relevanz</text>
    <!-- Tags -->
    <rect x="475" y="200" width="42" height="20" rx="5" fill="#0c4a6e" opacity="0.6"/>
    <text x="496" y="214" text-anchor="middle" fill="#7dd3fc" font-family="'Fira Code', monospace" font-size="8">RAG</text>
    <rect x="525" y="200" width="80" height="20" rx="5" fill="#0c4a6e" opacity="0.6"/>
    <text x="565" y="214" text-anchor="middle" fill="#7dd3fc" font-family="'Fira Code', monospace" font-size="8">Vector Search</text>
    <rect x="613" y="200" width="68" height="20" rx="5" fill="#0c4a6e" opacity="0.6"/>
    <text x="647" y="214" text-anchor="middle" fill="#7dd3fc" font-family="'Fira Code', monospace" font-size="8">Filtering</text>
  </g>

  <!-- ========== Q3: Compressing Context (bottom-left) ========== -->
  <g filter="url(#sh)">
    <rect x="45" y="260" width="380" height="142" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <rect x="45" y="260" width="380" height="34" rx="12" fill="url(#compressGrad)" opacity="0.9"/>
    <rect x="45" y="280" width="380" height="14" fill="url(#compressGrad)" opacity="0.9"/>
    <text x="235" y="282" text-anchor="middle" fill="#1c1917" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Compressing Context</text>
    <!-- Icon -->
    <rect x="65" y="307" width="44" height="44" rx="8" fill="#78350f" opacity="0.8"/>
    <text x="87" y="335" text-anchor="middle" fill="#fde68a" font-family="Inter, system-ui, sans-serif" font-size="22">&#x1F5DC;</text>
    <!-- Description -->
    <text x="125" y="317" fill="#fde68a" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Kontext verdichten &amp; zusammenfassen</text>
    <text x="125" y="335" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Summarization, Trimming, Sliding Window,</text>
    <text x="125" y="350" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">redundante Informationen entfernen</text>
    <!-- Tags -->
    <rect x="65" y="365" width="75" height="20" rx="5" fill="#78350f" opacity="0.6"/>
    <text x="102" y="379" text-anchor="middle" fill="#fde68a" font-family="'Fira Code', monospace" font-size="8">Summarize</text>
    <rect x="148" y="365" width="55" height="20" rx="5" fill="#78350f" opacity="0.6"/>
    <text x="175" y="379" text-anchor="middle" fill="#fde68a" font-family="'Fira Code', monospace" font-size="8">Trim</text>
    <rect x="211" y="365" width="88" height="20" rx="5" fill="#78350f" opacity="0.6"/>
    <text x="255" y="379" text-anchor="middle" fill="#fde68a" font-family="'Fira Code', monospace" font-size="8">Sliding Window</text>
  </g>

  <!-- ========== Q4: Isolating Context (bottom-right) ========== -->
  <g filter="url(#sh)">
    <rect x="455" y="260" width="380" height="142" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.95"/>
    <rect x="455" y="260" width="380" height="34" rx="12" fill="url(#isolateGrad)" opacity="0.9"/>
    <rect x="455" y="280" width="380" height="14" fill="url(#isolateGrad)" opacity="0.9"/>
    <text x="645" y="282" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Isolating Context</text>
    <!-- Icon -->
    <rect x="475" y="307" width="44" height="44" rx="8" fill="#022c22" opacity="0.8"/>
    <text x="497" y="335" text-anchor="middle" fill="#6ee7b7" font-family="Inter, system-ui, sans-serif" font-size="22">&#x1F9E9;</text>
    <!-- Description -->
    <text x="535" y="317" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Kontext aufteilen &amp; isolieren</text>
    <text x="535" y="335" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Subagents mit eigenem Context Window,</text>
    <text x="535" y="350" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Multi-Agent-Delegation, Sandboxing</text>
    <!-- Tags -->
    <rect x="475" y="365" width="72" height="20" rx="5" fill="#022c22" opacity="0.6"/>
    <text x="511" y="379" text-anchor="middle" fill="#6ee7b7" font-family="'Fira Code', monospace" font-size="8">Subagents</text>
    <rect x="555" y="365" width="76" height="20" rx="5" fill="#022c22" opacity="0.6"/>
    <text x="593" y="379" text-anchor="middle" fill="#6ee7b7" font-family="'Fira Code', monospace" font-size="8">Delegation</text>
    <rect x="639" y="365" width="70" height="20" rx="5" fill="#022c22" opacity="0.6"/>
    <text x="674" y="379" text-anchor="middle" fill="#6ee7b7" font-family="'Fira Code', monospace" font-size="8">Sandbox</text>
  </g>

  <!-- Bottom -->
  <text x="440" y="430" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10">Context Engineering = die Kunst, dem LLM zur richtigen Zeit den richtigen Kontext bereitzustellen</text>
</svg>