<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="wf_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="wf_phase1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#0f2540"/>
    </linearGradient>
    <linearGradient id="wf_phase2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c5282"/>
      <stop offset="1" stop-color="#1a365d"/>
    </linearGradient>
    <linearGradient id="wf_phase3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b6cb0"/>
      <stop offset="1" stop-color="#1a4480"/>
    </linearGradient>
    <filter id="wf_sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="wf_arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2c5282"/>
    </marker>
  </defs>

  <rect width="1400" height="520" fill="url(#wf_bg)"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#1a202c">Workflow: Vom Research zur Wissensbasis</text>
  <text x="700" y="76" text-anchor="middle" font-size="15" fill="#4a5568">Drei Phasen &#8212; vollstaendig agentengestuetzt mit Claude Code</text>

  <!-- Phase 1: Deep Research -->
  <g transform="translate(60,130)" filter="url(#wf_sh)">
    <rect width="380" height="320" rx="16" fill="#ffffff" stroke="#cbd5e0" stroke-width="1.5"/>
    <rect width="380" height="64" rx="16" fill="url(#wf_phase1)"/>
    <rect y="48" width="380" height="16" fill="#1e3a5f"/>

    <!-- Phase Number Badge -->
    <circle cx="42" cy="32" r="22" fill="#ffffff"/>
    <text x="42" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a5f">1</text>

    <text x="80" y="28" font-size="20" font-weight="700" fill="#ffffff">Deep Research</text>
    <text x="80" y="48" font-size="12" fill="#cbd5e0">Agentengestuetzte Quellen-Recherche</text>

    <!-- Icon: Magnifying glass -->
    <g transform="translate(140,100)">
      <circle cx="35" cy="35" r="28" fill="none" stroke="#1e3a5f" stroke-width="5"/>
      <line x1="56" y1="56" x2="78" y2="78" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>
    </g>

    <g transform="translate(24,210)" font-size="13" fill="#2d3748">
      <circle cx="8" cy="8" r="5" fill="#1e3a5f"/>
      <text x="22" y="12" font-weight="600">Web Search &amp; Web Fetch</text>

      <circle cx="8" cy="36" r="5" fill="#1e3a5f"/>
      <text x="22" y="40" font-weight="600">Strukturierte Markdown-Berichte</text>

      <circle cx="8" cy="64" r="5" fill="#1e3a5f"/>
      <text x="22" y="68" font-weight="600">Quellen mit URL &amp; Zusammenfassung</text>

      <circle cx="8" cy="92" r="5" fill="#1e3a5f"/>
      <text x="22" y="96" font-weight="600">Snake_case Dateinamen</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <line x1="450" y1="290" x2="500" y2="290" stroke="#2c5282" stroke-width="4" marker-end="url(#wf_arrow)"/>

  <!-- Phase 2: Visualisierungen -->
  <g transform="translate(510,130)" filter="url(#wf_sh)">
    <rect width="380" height="320" rx="16" fill="#ffffff" stroke="#cbd5e0" stroke-width="1.5"/>
    <rect width="380" height="64" rx="16" fill="url(#wf_phase2)"/>
    <rect y="48" width="380" height="16" fill="#2c5282"/>

    <circle cx="42" cy="32" r="22" fill="#ffffff"/>
    <text x="42" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#2c5282">2</text>

    <text x="80" y="28" font-size="20" font-weight="700" fill="#ffffff">Visualisierungen</text>
    <text x="80" y="48" font-size="12" fill="#cbd5e0">SVG-Diagramme zu jedem Kapitel</text>

    <!-- Icon: Chart bars -->
    <g transform="translate(140,98)">
      <rect x="0"  y="40" width="16" height="40" fill="#2c5282"/>
      <rect x="22" y="20" width="16" height="60" fill="#2c5282"/>
      <rect x="44" y="0"  width="16" height="80" fill="#2c5282"/>
      <rect x="66" y="28" width="16" height="52" fill="#2c5282"/>
      <line x1="-4" y1="82" x2="92" y2="82" stroke="#2c5282" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g transform="translate(24,210)" font-size="13" fill="#2d3748">
      <circle cx="8" cy="8" r="5" fill="#2c5282"/>
      <text x="22" y="12" font-weight="600">SVG aus Markdown-Inhalten</text>

      <circle cx="8" cy="36" r="5" fill="#2c5282"/>
      <text x="22" y="40" font-weight="600">Decision Frameworks &amp; Matrizen</text>

      <circle cx="8" cy="64" r="5" fill="#2c5282"/>
      <text x="22" y="68" font-weight="600">Workflow-Diagramme &amp; Patterns</text>

      <circle cx="8" cy="92" r="5" fill="#2c5282"/>
      <text x="22" y="96" font-weight="600">Lesbar im dunklen Theme</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <line x1="900" y1="290" x2="950" y2="290" stroke="#2c5282" stroke-width="4" marker-end="url(#wf_arrow)"/>

  <!-- Phase 3: GitHub Pages -->
  <g transform="translate(960,130)" filter="url(#wf_sh)">
    <rect width="380" height="320" rx="16" fill="#ffffff" stroke="#cbd5e0" stroke-width="1.5"/>
    <rect width="380" height="64" rx="16" fill="url(#wf_phase3)"/>
    <rect y="48" width="380" height="16" fill="#2b6cb0"/>

    <circle cx="42" cy="32" r="22" fill="#ffffff"/>
    <text x="42" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#2b6cb0">3</text>

    <text x="80" y="28" font-size="20" font-weight="700" fill="#ffffff">GitHub Pages</text>
    <text x="80" y="48" font-size="12" fill="#cbd5e0">Veroeffentlichung als Wiki</text>

    <!-- Icon: Globe -->
    <g transform="translate(150,95)">
      <circle cx="40" cy="40" r="36" fill="none" stroke="#2b6cb0" stroke-width="4"/>
      <ellipse cx="40" cy="40" rx="14" ry="36" fill="none" stroke="#2b6cb0" stroke-width="3"/>
      <line x1="4"  y1="40" x2="76" y2="40" stroke="#2b6cb0" stroke-width="3"/>
      <path d="M 8 26 Q 40 14 72 26" fill="none" stroke="#2b6cb0" stroke-width="3"/>
      <path d="M 8 54 Q 40 66 72 54" fill="none" stroke="#2b6cb0" stroke-width="3"/>
    </g>

    <g transform="translate(24,210)" font-size="13" fill="#2d3748">
      <circle cx="8" cy="8" r="5" fill="#2b6cb0"/>
      <text x="22" y="12" font-weight="600">SVG &#8594; PNG via rsvg-convert</text>

      <circle cx="8" cy="36" r="5" fill="#2b6cb0"/>
      <text x="22" y="40" font-weight="600">Front-Matter &amp; Link-Rewriting</text>

      <circle cx="8" cy="64" r="5" fill="#2b6cb0"/>
      <text x="22" y="68" font-weight="600">Just-the-Docs Theme (dark)</text>

      <circle cx="8" cy="92" r="5" fill="#2b6cb0"/>
      <text x="22" y="96" font-weight="600">Auto-Push in den pages-Branch</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="700" y="492" text-anchor="middle" font-size="13" fill="#4a5568">Alle Phasen werden von Claude Code orchestriert &#8212; Skript: <tspan font-family="monospace" fill="#2c5282">scripts/sync-wiki.sh</tspan></text>
</svg>
